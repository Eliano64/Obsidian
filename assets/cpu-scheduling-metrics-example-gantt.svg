<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">调度计算示例甘特图</title>
  <desc id="desc">横轴为时间，纵轴为进程，P1 在 0 到 4 运行，P2 在 4 到 7 运行，P3 在 7 到 9 运行。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root {
      --bg: #ffffff;
      --panel: #f8fafc;
      --text: #172033;
      --muted: #526174;
      --line: #536273;
      --grid: #cbd5e1;
      --p1: #2563eb;
      --p2: #0f766e;
      --p3: #b45309;
      --shadow: rgba(15, 23, 42, 0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111318;
        --panel: #1b2029;
        --text: #e8edf5;
        --muted: #aab5c4;
        --line: #9aa8ba;
        --grid: #455366;
        --p1: #7aa2ff;
        --p2: #62d4c5;
        --p3: #f6b85f;
        --shadow: rgba(0, 0, 0, 0.38);
      }
    }
    svg {
      background: var(--bg);
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
    }
    .title {
      fill: var(--text);
      font-size: 24px;
      font-weight: 700;
    }
    .small {
      fill: var(--muted);
      font-size: 14px;
    }
    .axis {
      stroke: var(--line);
      stroke-width: 2;
    }
    .grid {
      stroke: var(--grid);
      stroke-width: 1;
      stroke-dasharray: 4 5;
    }
    .frame {
      fill: var(--panel);
      stroke: var(--line);
      stroke-width: 1.6;
      rx: 12;
      filter: drop-shadow(0 6px 12px var(--shadow));
    }
    .row {
      stroke: var(--grid);
      stroke-width: 1;
    }
    .bar {
      stroke: var(--line);
      stroke-width: 1.2;
      rx: 7;
    }
    .barText {
      fill: #ffffff;
      font-size: 18px;
      font-weight: 700;
    }
    .label {
      fill: var(--text);
      font-size: 17px;
      font-weight: 700;
    }
    .time {
      fill: var(--text);
      font-size: 16px;
      font-weight: 700;
    }
    .note {
      fill: var(--muted);
      font-size: 13px;
    }
    .arrival {
      stroke: var(--muted);
      stroke-width: 1.4;
      stroke-dasharray: 4 4;
    }
    .arrivalText {
      fill: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    /* contrast-audit-fix */
  @media(prefers-color-scheme:dark){.barText{fill:#0f172a}}
  </style>

  <text class="title" x="490" y="40" text-anchor="middle">调度计算示例甘特图</text>
  <text class="small" x="490" y="68" text-anchor="middle">纵轴是进程，横轴是时间；每个横向条表示该进程占用 CPU 的时间区间。</text>

  <rect class="frame" x="92" y="98" width="808" height="238"/>

  <line class="axis" x1="190" y1="278" x2="860" y2="278"/>
  <line class="axis" x1="190" y1="116" x2="190" y2="278"/>

  <line class="grid" x1="190" y1="116" x2="190" y2="278"/>
  <line class="grid" x1="487.78" y1="116" x2="487.78" y2="278"/>
  <line class="grid" x1="711.11" y1="116" x2="711.11" y2="278"/>
  <line class="grid" x1="860" y1="116" x2="860" y2="278"/>

  <line class="row" x1="190" y1="150" x2="860" y2="150"/>
  <line class="row" x1="190" y1="206" x2="860" y2="206"/>
  <line class="row" x1="190" y1="262" x2="860" y2="262"/>

  <text class="label" x="138" y="142" text-anchor="middle">P1</text>
  <text class="label" x="138" y="198" text-anchor="middle">P2</text>
  <text class="label" x="138" y="254" text-anchor="middle">P3</text>

  <line class="arrival" x1="190" y1="114" x2="190" y2="166"/>
  <text class="arrivalText" x="224" y="114" text-anchor="middle">到达 0</text>
  <line class="arrival" x1="264.44" y1="170" x2="264.44" y2="222"/>
  <text class="arrivalText" x="298" y="170" text-anchor="middle">到达 1</text>
  <line class="arrival" x1="338.89" y1="226" x2="338.89" y2="278"/>
  <text class="arrivalText" x="372" y="226" text-anchor="middle">到达 2</text>

  <rect class="bar" x="190" y="122" width="297.78" height="40" fill="var(--p1)"/>
  <text class="barText" x="338.89" y="148" text-anchor="middle">0-4</text>

  <rect class="bar" x="487.78" y="178" width="223.33" height="40" fill="var(--p2)"/>
  <text class="barText" x="599.44" y="204" text-anchor="middle">4-7</text>

  <rect class="bar" x="711.11" y="234" width="148.89" height="40" fill="var(--p3)"/>
  <text class="barText" x="785.56" y="260" text-anchor="middle">7-9</text>

  <line class="axis" x1="190" y1="270" x2="190" y2="286"/>
  <line class="axis" x1="487.78" y1="270" x2="487.78" y2="286"/>
  <line class="axis" x1="711.11" y1="270" x2="711.11" y2="286"/>
  <line class="axis" x1="860" y1="270" x2="860" y2="286"/>

  <text class="time" x="190" y="310" text-anchor="middle">0</text>
  <text class="time" x="487.78" y="310" text-anchor="middle">4</text>
  <text class="time" x="711.11" y="310" text-anchor="middle">7</text>
  <text class="time" x="860" y="310" text-anchor="middle">9</text>

  <text class="small" x="525" y="368" text-anchor="middle">读图：P1 到达 0 并运行 0-4；P2 到达 1、运行 4-7；P3 到达 2、运行 7-9。</text>
</svg>
