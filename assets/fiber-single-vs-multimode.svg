<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">单模光纤与多模光纤</title>
  <desc id="desc">对比单模光纤和多模光纤中光的传播路径</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--fiber:#2563eb;--core:#dbeafe;--ray:#f59e0b}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--fiber:#60a5fa;--core:#1e3a8a;--ray:#fbbf24}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.core{fill:var(--core);stroke:var(--fiber);stroke-width:3}.ray{fill:none;stroke:var(--ray);stroke-width:3;marker-end:url(#arrow)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:22px;font-weight:700}.small{font-size:16px;fill:var(--muted)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--ray)"/></marker></defs>
  <rect class="bg" width="980" height="430"/>
  <text x="50" y="58" class="title">多模光纤与单模光纤</text>
  <rect x="70" y="105" width="390" height="250" rx="10" class="panel"/>
  <text x="265" y="145" text-anchor="middle" class="label">多模光纤</text>
  <rect x="120" y="210" width="290" height="70" rx="35" class="core"/>
  <path d="M135 245 L190 215 L245 275 L300 215 L355 275 L398 245" class="ray"/>
  <path d="M135 250 L210 275 L285 215 L360 275 L398 250" class="ray"/>
  <text x="265" y="320" text-anchor="middle" class="small">多条路径反射传播，色散较明显</text>
  <rect x="520" y="105" width="390" height="250" rx="10" class="panel"/>
  <text x="715" y="145" text-anchor="middle" class="label">单模光纤</text>
  <rect x="570" y="225" width="290" height="40" rx="20" class="core"/>
  <path d="M585 245 H845" class="ray"/>
  <text x="715" y="320" text-anchor="middle" class="small">近似沿一条路径传播，适合长距离</text>
</svg>
