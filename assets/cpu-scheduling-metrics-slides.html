<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CPU Scheduling Metrics</title>
  <style>
    :root {
      --bg:#ffffff; --panel:#f8fafc; --text:#172033; --muted:#526174; --line:#536273;
      --blue:#2563eb; --green:#0f766e; --amber:#b45309; --red:#b42318; --chip:#e6eef9;
      --shadow:rgba(15,23,42,.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#111318; --panel:#1b2029; --text:#e8edf5; --muted:#aab5c4; --line:#9aa8ba;
        --blue:#7aa2ff; --green:#62d4c5; --amber:#f6b85f; --red:#ff8a80; --chip:#263142;
        --shadow:rgba(0,0,0,.38);
      }
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:760px; background:var(--bg); color:var(--text);
      font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;
      display:flex; flex-direction:column;
    }
    header { padding:20px 24px 8px; text-align:center; }
    h1 { margin:0; font-size:24px; }
    .sub { margin-top:8px; color:var(--muted); font-size:14px; }
    main { flex:1; padding:12px 24px 18px; display:grid; gap:14px; grid-template-rows:auto auto 1fr; }
    .timeline {
      border:1.5px solid var(--line); border-radius:14px; background:var(--panel);
      padding:16px; box-shadow:0 6px 16px var(--shadow);
    }
    .axis { display:grid; grid-template-columns:4fr 3fr 2fr; height:54px; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    .seg { display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; min-width:0; }
    .p1 { background:var(--blue); }
    .p2 { background:var(--green); }
    .p3 { background:var(--amber); }
    .ticks { display:grid; grid-template-columns:0.9fr 2.8fr 2.8fr 1.9fr .8fr; color:var(--muted); font-size:13px; padding-top:8px; }
    .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .card {
      border:1.2px solid var(--line); border-radius:12px; background:var(--panel);
      padding:14px; min-height:120px; box-shadow:0 6px 14px var(--shadow);
    }
    .card h2 { margin:0 0 10px; font-size:18px; }
    .card p { margin:6px 0 0; color:var(--muted); line-height:1.55; font-size:15px; }
    .calc {
      border:1.2px solid var(--line); border-radius:12px; background:var(--panel);
      padding:16px; display:grid; grid-template-columns:1fr 1fr; gap:14px; align-content:start;
    }
    .formula { border:1px solid var(--line); border-radius:10px; padding:12px; background:var(--chip); min-height:76px; }
    .formula strong { display:block; color:var(--blue); margin-bottom:8px; }
    .formula span { color:var(--text); line-height:1.45; }
    footer { display:flex; align-items:center; justify-content:center; gap:12px; padding:10px 20px 18px; }
    button { border:1px solid var(--line); background:var(--panel); color:var(--text); border-radius:8px; padding:8px 14px; cursor:pointer; font-size:14px; }
    .count { color:var(--muted); min-width:64px; text-align:center; font-size:14px; }
    @media (max-width: 820px) {
      body { min-height:820px; }
      main { padding:10px 14px; }
      .cards, .calc { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
  </header>
  <main>
    <section class="timeline">
      <div class="axis">
        <div class="seg p1">P1: 0-4</div>
        <div class="seg p2">P2: 4-7</div>
        <div class="seg p3">P3: 7-9</div>
      </div>
      <div class="ticks"><span>0</span><span>4</span><span>7</span><span>9</span><span></span></div>
    </section>
    <section class="cards" id="cards"></section>
    <section class="calc" id="calc"></section>
  </main>
  <footer>
    <button id="prev" type="button">上一页</button>
    <div class="count" id="count"></div>
    <button id="next" type="button">下一页</button>
  </footer>
  <script>
    const slides = [
      {
        title: "统一例子",
        subtitle: "P1 到达 0 运行 4；P2 到达 1 运行 3；P3 到达 2 运行 2。调度顺序：P1 → P2 → P3。",
        cards: [
          ["P1", "到达 0，开始 0，完成 4，运行时间 4。"],
          ["P2", "到达 1，开始 4，完成 7，运行时间 3。"],
          ["P3", "到达 2，开始 7，完成 9，运行时间 2。"]
        ],
        formulas: [
          ["先定位四个时间", "到达时间、首次开始时间、完成时间、运行时间。"],
          ["再套公式", "周转、等待、响应都可以从这四个时间推出。"]
        ]
      },
      {
        title: "周转时间",
        subtitle: "周转时间看的是一个作业从提交到完成总共等了多久。",
        cards: [
          ["P1", "4 - 0 = 4"],
          ["P2", "7 - 1 = 6"],
          ["P3", "9 - 2 = 7"]
        ],
        formulas: [
          ["公式", "周转时间 = 完成时间 - 到达时间"],
          ["平均周转时间", "(4 + 6 + 7) / 3 = 17 / 3"]
        ]
      },
      {
        title: "带权周转时间",
        subtitle: "带权周转时间把作业本身运行时间也考虑进去，短作业等同样时间会更难受。",
        cards: [
          ["P1", "4 / 4 = 1"],
          ["P2", "6 / 3 = 2"],
          ["P3", "7 / 2 = 3.5"]
        ],
        formulas: [
          ["公式", "带权周转时间 = 周转时间 / 实际运行时间"],
          ["平均带权周转时间", "(1 + 2 + 3.5) / 3 = 13 / 6"]
        ]
      },
      {
        title: "等待时间",
        subtitle: "等待时间只算等待处理机的时间；等待 I/O 完成不算等待处理机。",
        cards: [
          ["P1", "0 - 0 = 0"],
          ["P2", "4 - 1 = 3"],
          ["P3", "7 - 2 = 5"]
        ],
        formulas: [
          ["无 I/O 且不被抢占", "等待时间 = 开始时间 - 到达时间"],
          ["一般关系", "等待时间 = 周转时间 - CPU 运行时间 - I/O 服务时间"]
        ]
      },
      {
        title: "响应时间",
        subtitle: "响应时间只关心第一次得到响应有多快，不关心后续什么时候完成。",
        cards: [
          ["P1", "0 - 0 = 0"],
          ["P2", "4 - 1 = 3"],
          ["P3", "7 - 2 = 5"]
        ],
        formulas: [
          ["公式", "响应时间 = 首次开始被服务时间 - 到达时间"],
          ["和等待时间的区别", "简单非抢占情形下二者相等；一旦被抢占，等待时间还要加上后续等待 CPU 的时间。"]
        ]
      },
      {
        title: "利用率与吞吐量",
        subtitle: "这两个指标从系统整体角度评价，而不是盯着某一个作业。",
        cards: [
          ["CPU 忙碌时间", "P1 4 + P2 3 + P3 2 = 9"],
          ["总时间", "从 0 到 9，共 9 个时间单位。"],
          ["完成作业数", "共完成 3 个作业。"]
        ],
        formulas: [
          ["CPU 利用率", "忙碌时间 / 总时间 = 9 / 9 = 100%"],
          ["系统吞吐量", "完成作业数 / 总时间 = 3 / 9 = 1/3 道/时间单位"]
        ]
      }
    ];
    let index = 0;
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const cards = document.getElementById("cards");
    const calc = document.getElementById("calc");
    const count = document.getElementById("count");
    function render() {
      const s = slides[index];
      title.textContent = s.title;
      subtitle.textContent = s.subtitle;
      cards.innerHTML = s.cards.map(([h,p]) => `<article class="card"><h2>${h}</h2><p>${p}</p></article>`).join("");
      calc.innerHTML = s.formulas.map(([h,p]) => `<div class="formula"><strong>${h}</strong><span>${p}</span></div>`).join("");
      count.textContent = `${index + 1} / ${slides.length}`;
    }
    document.getElementById("prev").addEventListener("click", () => { index = (index + slides.length - 1) % slides.length; render(); });
    document.getElementById("next").addEventListener("click", () => { index = (index + 1) % slides.length; render(); });
    render();
  </script>
</body>
</html>
