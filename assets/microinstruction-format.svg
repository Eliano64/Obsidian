<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="300" viewBox="0 0 1120 300" role="img" aria-labelledby="title desc">
  <title id="title">微指令基本格式</title>
  <desc id="desc">微指令由操作控制字段和顺序控制字段组成。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    .bg { fill: #ffffff; }
    .field1 { fill: #ecfeff; stroke: #0f766e; stroke-width: 2.5; }
    .field2 { fill: #fff7ed; stroke: #c2410c; stroke-width: 2.5; }
    .text { fill: #0f172a; font: 26px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    .small { fill: #475569; font: 19px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    .bit { stroke: #94a3b8; stroke-width: 1; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f172a; }
      .field1 { fill: #0f2f2e; stroke: #5eead4; }
      .field2 { fill: #2b1a0d; stroke: #fdba74; }
      .text { fill: #e5e7eb; }
      .small { fill: #cbd5e1; }
      .bit { stroke: #475569; }
    }
  </style>
  <rect class="bg" width="1120" height="300"/>
  <rect class="field1" x="90" y="105" width="570" height="90" rx="10"/>
  <rect class="field2" x="660" y="105" width="370" height="90" rx="10"/>
  <line class="bit" x1="185" y1="105" x2="185" y2="195"/>
  <line class="bit" x1="280" y1="105" x2="280" y2="195"/>
  <line class="bit" x1="375" y1="105" x2="375" y2="195"/>
  <line class="bit" x1="470" y1="105" x2="470" y2="195"/>
  <line class="bit" x1="565" y1="105" x2="565" y2="195"/>
  <line class="bit" x1="782" y1="105" x2="782" y2="195"/>
  <line class="bit" x1="905" y1="105" x2="905" y2="195"/>
  <text class="text" x="375" y="150" text-anchor="middle">操作控制字段</text>
  <text class="small" x="375" y="178" text-anchor="middle">本条微指令发出哪些微命令</text>
  <text class="text" x="845" y="150" text-anchor="middle">顺序控制字段</text>
  <text class="small" x="845" y="178" text-anchor="middle">下一微地址怎样形成</text>
  <text class="small" x="375" y="238" text-anchor="middle">面向“做什么”</text>
  <text class="small" x="845" y="238" text-anchor="middle">面向“下一步到哪”</text>
</svg>
