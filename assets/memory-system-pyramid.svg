<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700" role="img" aria-labelledby="title desc">
  <title id="title">Multi-level memory hierarchy pyramid</title>
  <desc id="desc">Classic memory hierarchy pyramid showing the relationship among speed, capacity, and cost per bit.</desc>
  <defs>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      .bg{fill:#fbfcff}.title{font:700 28px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.label{font:700 19px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.small{font:400 14px "Microsoft YaHei",Arial,sans-serif;fill:#40506a}.note{font:700 16px "Microsoft YaHei",Arial,sans-serif;fill:#8a4b00}.lvl1{fill:#e8f2ff;stroke:#5f92d6}.lvl2{fill:#edf8f1;stroke:#62a87c}.lvl3{fill:#fff4df;stroke:#d49a3a}.lvl4{fill:#ffecec;stroke:#c77777}.axis{stroke:#27354f;stroke-width:2.2;fill:none}.dash{stroke:#758399;stroke-width:1.8;stroke-dasharray:7 6;fill:none}.tri{stroke-width:2.2}
      @media (prefers-color-scheme: dark){.bg{fill:#111827}.title,.label{fill:#f3f4f6}.small{fill:#cbd5e1}.note{fill:#fbbf24}.lvl1{fill:#172554;stroke:#60a5fa}.lvl2{fill:#143525;stroke:#4ade80}.lvl3{fill:#3b2a12;stroke:#f59e0b}.lvl4{fill:#3b1d1d;stroke:#f87171}.axis{stroke:#d1d5db}.dash{stroke:#94a3b8}}
    </style>
  </defs>
  <rect class="bg" width="1080" height="700"/>
  <text class="title" x="54" y="58">多级存储器结构：速度、容量、价格的折中</text>

  <polygon class="tri lvl1" points="540,110 455,210 625,210"/>
  <polygon class="tri lvl2" points="455,220 360,340 720,340 625,220"/>
  <polygon class="tri lvl3" points="360,350 245,490 835,490 720,350"/>
  <polygon class="tri lvl4" points="245,500 110,640 970,640 835,500"/>

  <text class="label" x="540" y="170" text-anchor="middle">寄存器</text>
  <text class="small" x="540" y="194" text-anchor="middle">CPU 内部，最快，最小</text>

  <text class="label" x="540" y="276" text-anchor="middle">Cache</text>
  <text class="small" x="540" y="302" text-anchor="middle">SRAM，缓存主存块</text>

  <text class="label" x="540" y="416" text-anchor="middle">主存</text>
  <text class="small" x="540" y="444" text-anchor="middle">DRAM，程序运行时直接访问</text>

  <text class="label" x="540" y="574" text-anchor="middle">辅存</text>
  <text class="small" x="540" y="602" text-anchor="middle">SSD / 磁盘，长期保存，容量最大</text>

  <line class="axis" x1="92" y1="120" x2="92" y2="630"/>
  <text class="note" x="92" y="96" text-anchor="middle">速度快</text>
  <text class="note" x="92" y="666" text-anchor="middle">速度慢</text>
  <line class="axis" x1="990" y1="630" x2="990" y2="120"/>
  <text class="note" x="990" y="96" text-anchor="middle">单位价格高</text>
  <text class="note" x="990" y="666" text-anchor="middle">单位价格低</text>
  <line class="axis" x1="185" y1="665" x2="895" y2="665"/>
  <text class="note" x="540" y="690" text-anchor="middle">容量从上到下增大</text>

  <line class="dash" x1="205" y1="210" x2="875" y2="210"/>
  <line class="dash" x1="205" y1="340" x2="875" y2="340"/>
  <line class="dash" x1="205" y1="490" x2="875" y2="490"/>
</svg>
