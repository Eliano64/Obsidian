<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390" role="img" aria-labelledby="title desc">
  <title id="title">TCP byte stream vs UDP message</title>
  <desc id="desc">UDP preserves message boundaries, TCP provides a continuous byte stream.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.udp{fill:#dcfce7;stroke:#16a34a}.tcp{fill:#dbeafe;stroke:#2563eb}.label{font-size:22px;font-weight:700}.small{font-size:15px}.mid{font-size:17px;font-weight:700}
    @media(prefers-color-scheme:dark){text{fill:#e5e7eb}.box{fill:#111827;stroke:#94a3b8}.udp{fill:#0f2b1d;stroke:#4ade80}.tcp{fill:#10213f;stroke:#60a5fa}}
  </style>
  <text x="490" y="38" text-anchor="middle" class="label">UDP 报文单位与 TCP 字节流</text>
  <text x="120" y="90" class="mid">UDP：以报文为单位</text>
  <rect x="120" y="115" width="150" height="56" rx="8" class="udp"/><text x="195" y="149" text-anchor="middle" class="small">应用报文 A</text>
  <rect x="295" y="115" width="115" height="56" rx="8" class="udp"/><text x="352" y="149" text-anchor="middle" class="small">报文 B</text>
  <rect x="435" y="115" width="190" height="56" rx="8" class="udp"/><text x="530" y="149" text-anchor="middle" class="small">应用报文 C</text>
  <text x="705" y="149" class="small">边界随数据报交付</text>
  <text x="120" y="235" class="mid">TCP：以字节流为单位</text>
  <rect x="120" y="260" width="640" height="56" rx="8" class="tcp"/>
  <line x1="250" y1="260" x2="250" y2="316" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="420" y1="260" x2="420" y2="316" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5"/>
  <line x1="590" y1="260" x2="590" y2="316" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="440" y="293" text-anchor="middle" class="small">连续字节流，读写边界不必一致</text>
  <text x="490" y="355" text-anchor="middle" class="small">TCP 应用需要自己定义长度字段、分隔符等方式恢复应用层报文边界</text>
</svg>
