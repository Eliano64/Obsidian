<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kosaraju SCC Hand Calculation</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --panel: #ffffff;
    --text: #0f172a;
    --muted: #475569;
    --line: #334155;
    --soft: #e2e8f0;
    --blue: #2563eb;
    --green: #16a34a;
    --orange: #ea580c;
    --red: #dc2626;
    --violet: #7c3aed;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b1120;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #cbd5e1;
      --soft: #334155;
      --blue: #60a5fa;
      --green: #4ade80;
      --orange: #fb923c;
      --red: #f87171;
      --violet: #a78bfa;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 18px;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .card {
    max-width: 1040px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--soft);
    border-radius: 8px;
    padding: 18px;
  }
  .top {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 22px;
    line-height: 1.25;
    margin: 0 0 6px;
    letter-spacing: 0;
  }
  .desc {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .controls {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  button {
    border: 1px solid var(--soft);
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    padding: 7px 10px;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { border-color: var(--blue); }
  .stage {
    display: grid;
    grid-template-columns: 1.35fr 1fr;
    gap: 16px;
    align-items: stretch;
  }
  svg {
    width: 100%;
    min-height: 470px;
    border: 1px solid var(--soft);
    border-radius: 8px;
    background: color-mix(in srgb, var(--panel), var(--bg) 35%);
  }
  .node circle {
    fill: var(--panel);
    stroke: var(--line);
    stroke-width: 2.2;
  }
  .node.active circle {
    stroke: var(--red);
    stroke-width: 4;
  }
  .node.done circle {
    fill: color-mix(in srgb, var(--green), transparent 82%);
    stroke: var(--green);
  }
  .node text {
    fill: var(--text);
    font-weight: 750;
    font-size: 18px;
    dominant-baseline: middle;
    text-anchor: middle;
  }
  .edge {
    fill: none;
    stroke: var(--line);
    stroke-width: 2.1;
    marker-end: url(#arrow);
  }
  .edge.reverse {
    stroke-dasharray: 7 5;
  }
  .edge.highlight {
    stroke: var(--blue);
    stroke-width: 3;
  }
  .edge.dim {
    opacity: .32;
  }
  .panel {
    border: 1px solid var(--soft);
    border-radius: 8px;
    padding: 14px;
    min-height: 470px;
  }
  .step-title {
    font-size: 18px;
    font-weight: 750;
    margin-bottom: 10px;
  }
  .text {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.65;
    margin-bottom: 12px;
  }
  .formula {
    border-left: 3px solid var(--blue);
    padding: 8px 10px;
    background: color-mix(in srgb, var(--blue), transparent 90%);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-top: 12px;
  }
  th, td {
    border-bottom: 1px solid var(--soft);
    text-align: left;
    padding: 7px 6px;
    vertical-align: top;
  }
  th { color: var(--muted); font-weight: 650; }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 10px;
  }
  .chip {
    border: 1px solid var(--soft);
    border-radius: 999px;
    padding: 5px 9px;
    font-size: 13px;
    color: var(--text);
  }
  .note {
    margin-top: 12px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }
  @media (max-width: 860px) {
    .top, .stage { display: block; }
    .controls { margin-top: 10px; }
    .panel { margin-top: 14px; min-height: auto; }
  }
</style>
</head>
<body>
<main class="card">
  <div class="top">
    <div>
      <h1 id="title">Kosaraju：用两次 DFS 判断强连通分量</h1>
      <div class="desc">第一次 DFS 记录完成时间；第二次在反图中按完成时间从大到小搜索。</div>
    </div>
    <div class="controls">
      <button id="prev" type="button">上一步</button>
      <button id="next" type="button">下一步</button>
    </div>
  </div>

  <section class="stage">
    <svg viewBox="0 0 640 470" aria-labelledby="title">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"></path>
        </marker>
      </defs>
      <g id="edges"></g>
      <g id="nodes"></g>
    </svg>

    <aside class="panel">
      <div class="step-title" id="stepTitle"></div>
      <div class="text" id="body"></div>
      <div class="formula" id="formula"></div>
      <table>
        <thead><tr><th>阶段</th><th>结果</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="chips" id="chips"></div>
      <div class="note" id="note"></div>
    </aside>
  </section>
</main>

<script>
const nodes = {
  1: [320, 56],
  2: [94, 156],
  3: [320, 170],
  4: [545, 154],
  5: [190, 292],
  6: [468, 280],
  7: [320, 385]
};

const baseEdges = [
  [1, 2], [1, 3], [1, 4],
  [2, 3], [2, 5],
  [3, 5],
  [4, 6],
  [6, 3], [6, 7],
  [5, 7]
];

const steps = [
  {
    title: '先只保留方向',
    mode: 'base',
    active: [],
    done: [],
    highlight: [],
    body: '先只看弧方向。强连通分量讨论的是顶点之间能否沿有向路径互相到达。',
    formula: '1->2, 1->3, 1->4\n2->3, 2->5\n3->5\n4->6\n6->3, 6->7\n5->7',
    rows: [['图结构', '该图沿箭头方向整体向下扩展，没有能回到前面顶点的弧']],
    chips: [],
    note: '这张图中没有从下方顶点回到上方顶点的路径。'
  },
  {
    title: '第一次 DFS：得到完成时间',
    mode: 'base',
    active: [1,2,3,5,7,4,6],
    done: [],
    highlight: [[1,2], [2,3], [3,5], [5,7], [1,4], [4,6]],
    body: '按顶点编号从小到大、邻接点也从小到大进行 DFS。第一次 DFS 只记录退出递归时的完成时间。',
    formula: 'DFS 路径：1, 2, 3, 5, 7, 4, 6\n完成顺序：7, 5, 3, 2, 6, 4, 1\n完成时间从大到小：1, 4, 6, 2, 3, 5, 7',
    rows: [['第一次 DFS', '记录完成时间，不在这一步划分 SCC']],
    chips: ['finish: 1 > 4 > 6 > 2 > 3 > 5 > 7'],
    note: '邻接顺序不同，完成时间可能不同；但第二次 DFS 得到的 SCC 划分不变。'
  },
  {
    title: '构造反图',
    mode: 'reverse',
    active: [],
    done: [],
    highlight: [],
    body: '把每条弧反向，得到反图。第二次 DFS 必须在反图上做。',
    formula: '2->1, 3->1, 4->1\n3->2, 5->2\n5->3\n6->4\n3->6, 7->6\n7->5',
    rows: [['反图', '所有弧方向取反'], ['搜索顺序', '仍按完成时间从大到小：1, 4, 6, 2, 3, 5, 7']],
    chips: [],
    note: '反图不是重新画无向边，而是每条有向边单独调转方向。'
  },
  {
    title: '从 1 开始第二次 DFS',
    mode: 'reverse',
    active: [1],
    done: [1],
    highlight: [],
    body: '按完成时间从大到小，先选 1。反图中 1 没有通向未访问顶点的出边，所以单独形成一个 SCC。',
    formula: 'start 1 in G^T -> {1}',
    rows: [['第 1 次启动', '{1}']],
    chips: ['SCC 1: {1}'],
    note: '第二次 DFS 每启动一次，就确定一个强连通分量。'
  },
  {
    title: '继续按顺序处理 4 和 6',
    mode: 'reverse',
    active: [4,6],
    done: [1,4,6],
    highlight: [[4,1], [6,4]],
    body: '4 在反图中只能到达已访问的 1，所以得到 {4}。6 在反图中只能到达已访问的 4，所以得到 {6}。',
    formula: 'start 4 in G^T -> {4}\nstart 6 in G^T -> {6}',
    rows: [['第 1 块', '{1}'], ['第 2 块', '{4}'], ['第 3 块', '{6}']],
    chips: ['SCC 1: {1}', 'SCC 2: {4}', 'SCC 3: {6}'],
    note: '能到达已经访问过的 SCC，不会把两个 SCC 合并。'
  },
  {
    title: '继续处理 2、3、5、7',
    mode: 'reverse',
    active: [2,3,5,7],
    done: [1,2,3,4,5,6,7],
    highlight: [[2,1], [3,1], [3,2], [3,6], [5,2], [5,3], [7,5], [7,6]],
    body: '2、3、5、7 在反图中都只能扩展到已经访问过的顶点，因此它们也分别形成单点 SCC。',
    formula: 'start 2 -> {2}\nstart 3 -> {3}\nstart 5 -> {5}\nstart 7 -> {7}',
    rows: [['剩余 SCC', '{2}, {3}, {5}, {7}'], ['SCC 个数', '7']],
    chips: ['SCC 4: {2}', 'SCC 5: {3}', 'SCC 6: {5}', 'SCC 7: {7}'],
    note: '该图没有非平凡强连通分量，每个顶点都是一个单独的强连通分量。'
  }
];

let index = 0;
const edgeGroup = document.getElementById('edges');
const nodeGroup = document.getElementById('nodes');

function keyOf(u, v) {
  return `${u}->${v}`;
}

function edgePath(from, to, reverseMode) {
  const [x1, y1] = nodes[from];
  const [x2, y2] = nodes[to];
  const dx = x2 - x1;
  const dy = y2 - y1;
  const len = Math.hypot(dx, dy) || 1;
  const sx = x1 + dx / len * 27;
  const sy = y1 + dy / len * 27;
  const ex = x2 - dx / len * 27;
  const ey = y2 - dy / len * 27;
  const bend = reverseMode ? -12 : 12;
  const mx = (sx + ex) / 2 - dy / len * bend;
  const my = (sy + ey) / 2 + dx / len * bend;
  return `M ${sx} ${sy} Q ${mx} ${my} ${ex} ${ey}`;
}

function draw() {
  const step = steps[index];
  const reverseMode = step.mode === 'reverse';
  const highlighted = new Set(step.highlight.map(([u, v]) => keyOf(u, v)));
  edgeGroup.innerHTML = '';
  nodeGroup.innerHTML = '';

  const edges = reverseMode
    ? baseEdges.map(([u, v]) => [v, u])
    : baseEdges.map(([u, v]) => [u, v]);

  for (const [u, v] of edges) {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', edgePath(u, v, reverseMode));
    const hi = highlighted.has(keyOf(u, v));
    path.setAttribute('class', `edge ${reverseMode ? 'reverse' : ''} ${hi ? 'highlight' : ''} ${step.highlight.length && !hi ? 'dim' : ''}`);
    edgeGroup.appendChild(path);
  }

  for (const [name, [x, y]] of Object.entries(nodes)) {
    const n = Number(name);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const classes = ['node'];
    if (step.active.includes(n)) classes.push('active');
    if (step.done.includes(n)) classes.push('done');
    g.setAttribute('class', classes.join(' '));
    g.innerHTML = `<circle cx="${x}" cy="${y}" r="24"></circle><text x="${x}" y="${y + 1}">${name}</text>`;
    nodeGroup.appendChild(g);
  }

  document.getElementById('stepTitle').textContent = `${index + 1}. ${step.title}`;
  document.getElementById('body').textContent = step.body;
  document.getElementById('formula').textContent = step.formula;
  document.getElementById('rows').innerHTML = step.rows.map(([a, b]) => `<tr><td>${a}</td><td>${b}</td></tr>`).join('');
  document.getElementById('chips').innerHTML = step.chips.map(x => `<span class="chip">${x}</span>`).join('');
  document.getElementById('note').textContent = step.note;
}

document.getElementById('prev').addEventListener('click', () => {
  index = (index + steps.length - 1) % steps.length;
  draw();
});
document.getElementById('next').addEventListener('click', () => {
  index = (index + 1) % steps.length;
  draw();
});
draw();
</script>
</body>
</html>
