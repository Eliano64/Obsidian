<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Multiplier Logic Structure</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8f6;
      --panel: #fff;
      --text: #20242a;
      --muted: #5b6570;
      --line: #20242a;
      --soft: #cbd4dd;
      --active: #d98600;
      --data: #2d6f9f;
      --control: #7a4bb3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151719;
        --panel: #20252a;
        --text: #edf0f2;
        --muted: #aeb7c0;
        --line: #edf0f2;
        --soft: #3a424b;
        --active: #ffb84d;
        --data: #82bee8;
        --control: #c7a8ff;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    main { max-width: 1120px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    .sub { margin: 0 0 16px; color: var(--muted); }
    .stage {
      background: var(--panel);
      border: 1px solid var(--soft);
      border-radius: 8px;
      padding: 14px;
    }
    svg { width: 100%; height: auto; display: block; }
    .box, .alu, .ctrl, .carry {
      fill: var(--panel);
      stroke: var(--line);
      stroke-width: 2.4;
    }
    .alu { stroke-width: 3; }
    .ctrl { rx: 24; }
    .label { fill: var(--text); font: 700 22px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .small { fill: var(--muted); font: 15px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .value { fill: var(--data); font: 700 20px Consolas, monospace; }
    .wire { stroke: var(--line); stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    .control { stroke: var(--control); stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrowCtrl); }
    .active { stroke: var(--active) !important; stroke-width: 5 !important; }
    .node-active { stroke: var(--active) !important; stroke-width: 4 !important; }
    .caption { margin-top: 14px; display: grid; grid-template-columns: 1.1fr .9fr; gap: 14px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--soft);
      border-radius: 8px;
      padding: 14px;
    }
    .hint { color: var(--muted); font-size: 14px; margin-bottom: 8px; }
    .mono { font: 20px/1.6 Consolas, "Microsoft YaHei", monospace; white-space: pre-wrap; }
    .controls { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
    button {
      border: 1px solid var(--soft);
      background: var(--panel);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 14px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { border-color: var(--data); }
    .status { color: var(--muted); }
    @media (max-width: 760px) { main { padding: 14px; } .caption { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <h1>无符号乘法运算器逻辑结构</h1>
  <p class="sub">例：5 × 3。`X` 是被乘数寄存器，`P/ACC` 是部分积寄存器，`Y/MQ` 是乘数寄存器，`C` 保存加法进位。</p>
  <section class="stage">
    <svg viewBox="0 0 1080 560" role="img" aria-label="无符号乘法运算器逻辑结构">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,7 L9,3.5 z" fill="currentColor"></path>
        </marker>
        <marker id="arrowCtrl" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,7 L9,3.5 z" fill="currentColor"></path>
        </marker>
      </defs>

      <rect id="node-x" class="box" x="360" y="26" width="260" height="62"></rect>
      <text class="label" x="405" y="65">被乘数寄存器 X</text>
      <text id="val-x" class="value" x="468" y="112">0101</text>

      <path id="node-alu" class="alu" d="M285 150 L470 150 L500 182 L530 150 L715 150 L660 252 L340 252 Z"></path>
      <text class="label" x="430" y="208">32 位 ALU</text>
      <text class="small" x="735" y="205">加</text>

      <rect id="node-c" class="carry" x="116" y="330" width="58" height="64"></rect>
      <text class="label" x="133" y="370">C</text>
      <text id="val-c" class="value" x="134" y="418">0</text>

      <rect id="node-p" class="box" x="260" y="330" width="306" height="72"></rect>
      <text class="label" x="320" y="370">乘积寄存器 P</text>
      <text class="small" x="382" y="397">ACC</text>
      <text id="val-p" class="value" x="378" y="428">0000</text>

      <rect id="node-y" class="box" x="566" y="330" width="306" height="72"></rect>
      <text class="label" x="633" y="370">乘数寄存器 Y</text>
      <text class="small" x="692" y="397">MQ</text>
      <text id="val-y" class="value" x="690" y="428">0011</text>
      <text class="small" x="515" y="320">64 位</text>

      <rect id="node-ctrl" class="ctrl" x="810" y="198" width="230" height="92" rx="28"></rect>
      <text class="label" x="856" y="235">控制逻辑</text>
      <text class="label" x="870" y="268">计数器 Cn</text>

      <path id="w-x-alu" class="wire" d="M490 88 V150"></path>
      <text class="small" x="512" y="125">32</text>
      <path id="w-p-alu" class="wire" d="M410 330 V252"></path>
      <text class="small" x="428" y="300">32</text>
      <path id="w-alu-p" class="wire" d="M500 252 V330"></path>
      <text class="small" x="518" y="295">32</text>
      <path id="w-c-p" class="wire" d="M174 362 H260"></path>
      <path id="w-carry" class="wire" d="M145 330 V116 H304 V150"></path>
      <path id="w-shift" class="wire" d="M300 318 H827"></path>
      <text class="label" x="674" y="310">右移</text>
      <path id="w-y-ctrl" class="wire" d="M720 402 V488 H920 V290"></path>
      <text class="small" x="745" y="488">Y0 送控制逻辑</text>
      <path id="w-ctrl-add" class="control" d="M810 224 H715"></path>
      <text class="small" x="744" y="214">加</text>
      <path id="w-ctrl-shift" class="control" d="M810 258 H872 V330"></path>
      <text class="small" x="890" y="318">右移</text>
      <path id="w-ctrl-write" class="control" d="M810 276 H872 V392"></path>
      <text class="small" x="890" y="384">写使能</text>
    </svg>
  </section>

  <section class="caption">
    <div class="panel">
      <div class="hint">当前步骤</div>
      <div id="step" class="mono"></div>
    </div>
    <div class="panel">
      <div class="hint">寄存器观察</div>
      <div id="state" class="mono"></div>
    </div>
  </section>

  <div class="controls">
    <button id="prev">上一步</button>
    <button id="next">下一步</button>
    <span id="status" class="status"></span>
  </div>
</main>
<script>
  const steps = [
    { c:"0", p:"0000", y:"0011", active:["node-x","node-p","node-y"], step:"初始化：X=0101，P=0000，Y=0011，C=0。计数器 Cn=4。", state:"C|P|Y = 0 0000 0011\n待处理位数：4" },
    { c:"0", p:"0000", y:"0011", active:["node-y","node-ctrl","w-y-ctrl"], step:"第 1 轮，读 Y0。Y0=1，控制逻辑决定本轮需要执行加法。", state:"Y = 0011\nY0 = 1" },
    { c:"0", p:"0101", y:"0011", active:["node-x","node-p","node-alu","w-x-alu","w-p-alu","w-alu-p","w-ctrl-add"], step:"第 1 轮，加法：X 和 P 进入 ALU，P = P + X。", state:"0000 + 0101 = 0101\nC=0，P=0101" },
    { c:"0", p:"0010", y:"1001", active:["node-c","node-p","node-y","w-shift","w-ctrl-shift","w-ctrl-write"], step:"第 1 轮，右移：C|P|Y 整体右移 1 位并写回。", state:"0 0101 0011 >> 1\n= 0 0010 1001\nCn=3" },
    { c:"0", p:"0010", y:"1001", active:["node-y","node-ctrl","w-y-ctrl"], step:"第 2 轮，读 Y0。Y0=1，控制逻辑决定继续执行加法。", state:"Y = 1001\nY0 = 1" },
    { c:"0", p:"0111", y:"1001", active:["node-x","node-p","node-alu","w-x-alu","w-p-alu","w-alu-p","w-ctrl-add"], step:"第 2 轮，加法：P = P + X。", state:"0010 + 0101 = 0111\nC=0，P=0111" },
    { c:"0", p:"0011", y:"1100", active:["node-c","node-p","node-y","w-shift","w-ctrl-shift","w-ctrl-write"], step:"第 2 轮，右移：C|P|Y 整体右移 1 位并写回。", state:"0 0111 1001 >> 1\n= 0 0011 1100\nCn=2" },
    { c:"0", p:"0011", y:"1100", active:["node-y","node-ctrl","w-y-ctrl"], step:"第 3 轮，读 Y0。Y0=0，控制逻辑禁止加法器写回加法结果。", state:"Y = 1100\nY0 = 0" },
    { c:"0", p:"0011", y:"1100", active:["node-ctrl","w-ctrl-add"], step:"第 3 轮，跳过加法：P 保持不变。", state:"P = 0011" },
    { c:"0", p:"0001", y:"1110", active:["node-c","node-p","node-y","w-shift","w-ctrl-shift","w-ctrl-write"], step:"第 3 轮，右移：C|P|Y 整体右移 1 位并写回。", state:"0 0011 1100 >> 1\n= 0 0001 1110\nCn=1" },
    { c:"0", p:"0001", y:"1110", active:["node-y","node-ctrl","w-y-ctrl"], step:"第 4 轮，读 Y0。Y0=0，本轮仍不加 X。", state:"Y = 1110\nY0 = 0" },
    { c:"0", p:"0001", y:"1110", active:["node-ctrl","w-ctrl-add"], step:"第 4 轮，跳过加法：P 保持不变。", state:"P = 0001" },
    { c:"0", p:"0000", y:"1111", active:["node-c","node-p","node-y","w-shift","w-ctrl-shift","w-ctrl-write"], step:"第 4 轮，右移：C|P|Y 整体右移 1 位并写回。", state:"0 0001 1110 >> 1\n= 0 0000 1111\nCn=0" },
    { c:"0", p:"0000", y:"1111", active:["node-p","node-y"], step:"计数器为 0，运算结束。完整乘积保存在 P|Y 中。", state:"P|Y = 0000 1111₂ = 15" }
  ];
  const ids = ["node-x","node-alu","node-c","node-p","node-y","node-ctrl","w-x-alu","w-p-alu","w-alu-p","w-c-p","w-carry","w-shift","w-y-ctrl","w-ctrl-add","w-ctrl-shift","w-ctrl-write"];
  let pos = 0;
  function render() {
    const s = steps[pos];
    document.getElementById("val-c").textContent = s.c;
    document.getElementById("val-p").textContent = s.p;
    document.getElementById("val-y").textContent = s.y;
    document.getElementById("step").textContent = s.step;
    document.getElementById("state").textContent = s.state;
    document.getElementById("status").textContent = `${pos + 1} / ${steps.length}`;
    ids.forEach(id => document.getElementById(id)?.classList.remove("active", "node-active"));
    s.active.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.add(id.startsWith("node") ? "node-active" : "active");
    });
  }
  document.getElementById("prev").addEventListener("click", () => { pos = Math.max(0, pos - 1); render(); });
  document.getElementById("next").addEventListener("click", () => { pos = Math.min(steps.length - 1, pos + 1); render(); });
  render();
</script>
</body>
</html>
