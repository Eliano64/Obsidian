<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Double Buffering Timing</title>
  <style>
    :root{color-scheme:light dark;--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706;--red:#dc2626}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24;--red:#f87171}}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.wrap{max-width:1160px;margin:0 auto;padding:18px 22px 22px}header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:12px}h1{margin:0;font-size:24px;letter-spacing:0}.controls{display:flex;gap:8px;align-items:center}button{border:1px solid var(--line);background:var(--panel);color:var(--fg);border-radius:6px;padding:7px 10px;font-size:14px;cursor:pointer}button:hover{border-color:var(--blue)}.stage{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:14px 16px 16px;min-height:660px}svg{width:100%;height:575px;display:block}.caption{margin:8px 4px 0;color:var(--muted);font-size:15px;line-height:1.55}.progress{color:var(--muted);min-width:54px;text-align:center;font-size:14px}.panel{fill:var(--bg);stroke:var(--line);stroke-width:2}.axis{stroke:var(--line);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.device{fill:color-mix(in srgb,var(--blue) 16%,var(--bg));stroke:var(--blue);stroke-width:2}.buffer{fill:color-mix(in srgb,var(--green) 16%,var(--bg));stroke:var(--green);stroke-width:2}.work{fill:color-mix(in srgb,var(--orange) 16%,var(--bg));stroke:var(--orange);stroke-width:2}.cpuBox{fill:color-mix(in srgb,var(--red) 12%,var(--bg));stroke:var(--red);stroke-width:2}.barT{fill:color-mix(in srgb,var(--blue) 22%,var(--bg));stroke:var(--blue);stroke-width:2}.barM{fill:color-mix(in srgb,var(--green) 22%,var(--bg));stroke:var(--green);stroke-width:2}.barC{fill:color-mix(in srgb,var(--orange) 24%,var(--bg));stroke:var(--orange);stroke-width:2}.wait{fill:color-mix(in srgb,var(--red) 13%,var(--bg));stroke:var(--red);stroke-width:2}.flowT{stroke:var(--blue);stroke-width:4;fill:none;marker-end:url(#blueArrow)}.flowM{stroke:var(--green);stroke-width:4;fill:none;marker-end:url(#greenArrow)}.flowC{stroke:var(--orange);stroke-width:4;fill:none;marker-end:url(#orangeArrow)}.hidden{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>双缓冲平均处理时间</h1>
      <div class="controls"><button id="prev" type="button">上一步</button><span class="progress" id="progress"></span><button id="next" type="button">下一步</button></div>
    </header>
    <section class="stage">
      <svg viewBox="0 0 1120 575" role="img" aria-label="双缓冲部件结构和时空图分析">
        <defs>
          <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"></path></marker>
          <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--green)"></path></marker>
          <marker id="orangeArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--orange)"></path></marker>
        </defs>
        <text class="m" x="560" y="27" text-anchor="middle" font-size="14">上半部看两个缓冲区如何交替；下半部看 T 与 M+C 谁决定下一轮开始。</text>
        <rect class="panel" x="28" y="48" width="1064" height="215" rx="8"></rect>
        <rect class="panel" x="28" y="286" width="1064" height="252" rx="8"></rect>
        <text class="t" x="64" y="82" font-size="18" font-weight="700">双缓冲部件结构</text>
        <rect class="device" x="94" y="122" width="142" height="72" rx="8"></rect><text class="t" x="165" y="151" text-anchor="middle" font-size="16" font-weight="700">块设备</text><text class="m" x="165" y="174" text-anchor="middle" font-size="12">输入下一块</text>
        <rect class="buffer" x="360" y="92" width="158" height="64" rx="8"></rect><text class="t" x="439" y="119" text-anchor="middle" font-size="15" font-weight="700">缓冲区 1</text><text class="m" x="439" y="140" text-anchor="middle" font-size="12">初始为满</text>
        <rect class="buffer" x="360" y="176" width="158" height="64" rx="8"></rect><text class="t" x="439" y="203" text-anchor="middle" font-size="15" font-weight="700">缓冲区 2</text><text class="m" x="439" y="224" text-anchor="middle" font-size="12">初始为空</text>
        <rect class="work" x="664" y="116" width="170" height="84" rx="8"></rect><text class="t" x="749" y="148" text-anchor="middle" font-size="16" font-weight="700">用户工作区</text><text class="m" x="749" y="173" text-anchor="middle" font-size="12">初始为空</text>
        <rect class="cpuBox" x="928" y="122" width="120" height="72" rx="8"></rect><text class="t" x="988" y="151" text-anchor="middle" font-size="16" font-weight="700">CPU</text><text class="m" x="988" y="174" text-anchor="middle" font-size="12">处理工作区</text>
        <path class="flowT" d="M236 158 C290 158 304 208 360 208"></path><path class="flowM" d="M518 124 C590 124 600 158 664 158"></path><path class="flowC" d="M834 158 H928"></path>
        <text class="t" x="303" y="184" text-anchor="middle" font-size="16" font-weight="700">T</text><text class="t" x="596" y="140" text-anchor="middle" font-size="16" font-weight="700">M</text><text class="t" x="881" y="140" text-anchor="middle" font-size="16" font-weight="700">C</text>
        <text class="m" x="560" y="236" text-anchor="middle" font-size="14">变化：一个缓冲区输入时，另一个满缓冲区可以传给工作区并被 CPU 处理。</text>
        <text class="t" x="64" y="318" font-size="18" font-weight="700">时空图</text>
        <line class="axis" x1="120" y1="370" x2="1038" y2="370"></line><line class="axis" x1="120" y1="440" x2="1038" y2="440"></line><line class="axis" x1="120" y1="510" x2="1038" y2="510"></line>
        <text class="t" x="58" y="375" font-size="14">设备输入 T</text><text class="t" x="58" y="445" font-size="14">传送 M</text><text class="t" x="58" y="515" font-size="14">CPU 处理 C</text>
        <text class="m" x="120" y="555" text-anchor="middle" font-size="12">工作区空、一满一空</text>
        <g id="slow" class="case hidden">
          <text class="t" x="560" y="318" text-anchor="middle" font-size="18" font-weight="700">T &gt; C + M</text>
          <rect class="barT" x="120" y="348" width="300" height="44" rx="5"></rect><text class="t" x="270" y="375" text-anchor="middle" font-size="14">设备填空缓冲区 T</text>
          <rect class="barM" x="120" y="418" width="78" height="44" rx="5"></rect><text class="t" x="159" y="445" text-anchor="middle" font-size="14">M</text>
          <rect class="barC" x="198" y="488" width="140" height="44" rx="5"></rect><text class="t" x="268" y="515" text-anchor="middle" font-size="14">C</text>
          <rect class="wait" x="338" y="488" width="82" height="44" rx="5"></rect><text class="t" x="379" y="515" text-anchor="middle" font-size="14">等待 T</text>
          <line class="axis" x1="420" y1="340" x2="420" y2="535"></line><text class="t" x="560" y="570" text-anchor="middle" font-size="17" font-weight="700">下一块输入结束进入下一轮：T</text>
        </g>
        <g id="fast" class="case hidden">
          <text class="t" x="560" y="318" text-anchor="middle" font-size="18" font-weight="700">T &lt; C + M</text>
          <rect class="barT" x="120" y="348" width="150" height="44" rx="5"></rect><text class="t" x="195" y="375" text-anchor="middle" font-size="14">填空缓冲区 T</text>
          <rect class="wait" x="270" y="348" width="238" height="44" rx="5"></rect><text class="t" x="389" y="375" text-anchor="middle" font-size="14">空缓冲区已满，设备等待</text>
          <rect class="barM" x="120" y="418" width="78" height="44" rx="5"></rect><text class="t" x="159" y="445" text-anchor="middle" font-size="14">M</text>
          <rect class="barC" x="198" y="488" width="310" height="44" rx="5"></rect><text class="t" x="353" y="515" text-anchor="middle" font-size="14">CPU 处理 C</text>
          <line class="axis" x1="508" y1="340" x2="508" y2="535"></line><text class="t" x="560" y="570" text-anchor="middle" font-size="17" font-weight="700">传送和处理结束进入下一轮：M + C</text>
        </g>
      </svg>
      <p class="caption" id="caption"></p>
    </section>
  </div>
  <script>
    const steps=[
      {id:"slow",text:"从“工作区空、一满一空”出发。T > C + M 时，已有满缓冲区传到工作区并被处理，这些都能藏在设备填另一个空缓冲区的 T 中。"},
      {id:"fast",text:"从同一状态出发。T < C + M 时，设备先填满另一个缓冲区，但要等上一块完成传送和处理，系统节奏由 M + C 决定。"}
    ];
    let index=0;const groups=Array.from(document.querySelectorAll(".case"));const caption=document.getElementById("caption");const progress=document.getElementById("progress");
    function render(){groups.forEach(g=>g.classList.add("hidden"));document.getElementById(steps[index].id).classList.remove("hidden");caption.textContent=steps[index].text;progress.textContent=`${index+1} / ${steps.length}`;}
    document.getElementById("prev").addEventListener("click",()=>{index=(index+steps.length-1)%steps.length;render();});
    document.getElementById("next").addEventListener("click",()=>{index=(index+1)%steps.length;render();});
    render();
  </script>
</body>
</html>
