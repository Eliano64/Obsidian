<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Network layer and transport layer scope</title>
  <desc id="desc">Network layer provides host-to-host delivery, transport layer provides process-to-process logical communication.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}
    .host{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .proc{fill:#dbeafe;stroke:#2563eb;stroke-width:2}
    .ip{fill:#dcfce7;stroke:#16a34a;stroke-width:2}
    .line{stroke:#64748b;stroke-width:3;fill:none}
    .tline{stroke:#2563eb;stroke-width:4;fill:none;stroke-dasharray:10 7}
    .nline{stroke:#16a34a;stroke-width:4;fill:none}
    .label{font-size:22px;font-weight:700}.small{font-size:15px}.mid{font-size:18px;font-weight:700}
    @media(prefers-color-scheme:dark){
      text{fill:#e5e7eb}.host{fill:#111827;stroke:#94a3b8}.proc{fill:#10213f;stroke:#60a5fa}.ip{fill:#0f2b1d;stroke:#4ade80}.line{stroke:#94a3b8}.tline{stroke:#60a5fa}.nline{stroke:#4ade80}
    }
  </style>
  <text x="490" y="38" text-anchor="middle" class="label">网络层与运输层的作用范围</text>
  <rect x="90" y="85" width="260" height="250" rx="12" class="host"/>
  <rect x="630" y="85" width="260" height="250" rx="12" class="host"/>
  <text x="220" y="116" text-anchor="middle" class="mid">主机 A</text>
  <text x="760" y="116" text-anchor="middle" class="mid">主机 B</text>
  <rect x="130" y="145" width="85" height="50" rx="8" class="proc"/><text x="172" y="176" text-anchor="middle" class="small">进程 P1</text>
  <rect x="225" y="145" width="85" height="50" rx="8" class="proc"/><text x="267" y="176" text-anchor="middle" class="small">进程 P2</text>
  <rect x="670" y="145" width="85" height="50" rx="8" class="proc"/><text x="712" y="176" text-anchor="middle" class="small">进程 Q1</text>
  <rect x="765" y="145" width="85" height="50" rx="8" class="proc"/><text x="807" y="176" text-anchor="middle" class="small">进程 Q2</text>
  <rect x="135" y="250" width="170" height="55" rx="8" class="ip"/><text x="220" y="283" text-anchor="middle" class="small">IP 层：主机 A 地址</text>
  <rect x="675" y="250" width="170" height="55" rx="8" class="ip"/><text x="760" y="283" text-anchor="middle" class="small">IP 层：主机 B 地址</text>
  <path d="M267 145 C375 65,605 65,712 145" class="tline"/>
  <text x="490" y="82" text-anchor="middle" class="small">运输层逻辑通信：进程到进程，靠端口号区分</text>
  <path d="M305 278 C420 355,560 355,675 278" class="nline"/>
  <text x="490" y="365" text-anchor="middle" class="small">网络层交付范围：主机到主机，靠 IP 地址转发</text>
  <path d="M267 198 L267 250" class="line"/><path d="M712 198 L712 250" class="line"/>
</svg>
