<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Complete graph</title>
  <desc id="desc">Undirected complete graph and directed complete graph with four vertices.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    .edge{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}
    .arc{stroke:#64748b;stroke-width:2.7;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    .node{fill:#ffffff;stroke:#2563eb;stroke-width:3}
    .node2{fill:#ffffff;stroke:#16a34a;stroke-width:3}
    .text{fill:#0f172a;font-size:22px;font-weight:650}
    .small{fill:#334155;font-size:18px}
    .formula{fill:#7c2d12;font-size:20px;font-weight:650}
    @media (prefers-color-scheme: dark){
      .panel{fill:#111827;stroke:#334155}
      .edge,.arc{stroke:#cbd5e1}
      .node,.node2{fill:#0b1220}
      .text{fill:#f8fafc}
      .small{fill:#cbd5e1}
      .formula{fill:#fdba74}
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="panel" x="32" y="30" width="426" height="430" rx="10"/>
  <rect class="panel" x="522" y="30" width="426" height="430" rx="10"/>

  <text class="text" x="72" y="80">无向完全图 K₄</text>
  <line class="edge" x1="170" y1="150" x2="315" y2="150"/>
  <line class="edge" x1="170" y1="150" x2="150" y2="300"/>
  <line class="edge" x1="170" y1="150" x2="335" y2="300"/>
  <line class="edge" x1="315" y1="150" x2="150" y2="300"/>
  <line class="edge" x1="315" y1="150" x2="335" y2="300"/>
  <line class="edge" x1="150" y1="300" x2="335" y2="300"/>
  <circle class="node" cx="170" cy="150" r="27"/><text class="text" x="160" y="158">A</text>
  <circle class="node" cx="315" cy="150" r="27"/><text class="text" x="305" y="158">B</text>
  <circle class="node" cx="150" cy="300" r="27"/><text class="text" x="140" y="308">C</text>
  <circle class="node" cx="335" cy="300" r="27"/><text class="text" x="325" y="308">D</text>
  <text class="small" x="74" y="380">任意两个顶点之间都有一条边</text>
  <text class="formula" x="74" y="415">|E| = C²ₙ = n(n-1)/2</text>

  <text class="text" x="562" y="80">有向完全图</text>
  <path class="arc" d="M660 142 C700 118, 748 118, 790 142"/>
  <path class="arc" d="M790 158 C748 182, 700 182, 660 158"/>
  <path class="arc" d="M652 168 C620 205, 617 254, 640 292"/>
  <path class="arc" d="M665 292 C695 252, 697 205, 676 168"/>
  <path class="arc" d="M807 168 C845 205, 850 252, 825 292"/>
  <path class="arc" d="M800 292 C768 252, 765 205, 790 168"/>
  <path class="arc" d="M665 315 C705 340, 765 340, 805 315"/>
  <path class="arc" d="M805 300 C765 275, 705 275, 665 300"/>
  <path class="arc" d="M675 170 C720 205, 755 245, 805 292"/>
  <path class="arc" d="M790 292 C742 250, 705 205, 660 170"/>
  <path class="arc" d="M792 170 C740 210, 700 250, 665 292"/>
  <path class="arc" d="M650 292 C690 250, 730 210, 778 170"/>
  <circle class="node2" cx="660" cy="150" r="27"/><text class="text" x="650" y="158">A</text>
  <circle class="node2" cx="795" cy="150" r="27"/><text class="text" x="785" y="158">B</text>
  <circle class="node2" cx="650" cy="305" r="27"/><text class="text" x="640" y="313">C</text>
  <circle class="node2" cx="815" cy="305" r="27"/><text class="text" x="805" y="313">D</text>
  <text class="small" x="562" y="380">任意两个顶点之间都有相反两条弧</text>
  <text class="formula" x="562" y="415">|E| = 2C²ₙ = n(n-1)</text>
</svg>
