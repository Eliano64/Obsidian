<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1190" role="img" aria-labelledby="title desc">
  <title id="title">六种链表的结构和头尾插删性能</title>
  <desc id="desc">比较非循环单链表、非循环双链表、头指针循环单链表、尾指针循环单链表、头指针循环双链表和尾指针循环双链表的结构，以及头插、头删、尾插、尾删复杂度。</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#64748b"/></marker>
    <marker id="arrowBack" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#8b5cf6"/></marker>
    <style>
      :root{color-scheme:light dark}.bg{fill:#f7f9fc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.ink{fill:#172033;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif}.muted{fill:#5b687b}.node{fill:#eaf3ff;stroke:#3b82f6;stroke-width:2}.sentinel{fill:#fff3d6;stroke:#d97706;stroke-width:2}.edge{fill:none;stroke:#64748b;stroke-width:2.5;marker-end:url(#arrow)}.back{fill:none;stroke:#8b5cf6;stroke-width:2.5;marker-end:url(#arrowBack)}.pointer{fill:none;stroke:#d97706;stroke-width:2.5;marker-end:url(#arrow)}.fast{fill:#dcfce7;stroke:#16a34a}.slow{fill:#fee2e2;stroke:#ef4444}.badge{stroke-width:1.5}.celltext{font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;fill:#172033;text-anchor:middle}.divider{stroke:#cbd5e1;stroke-width:1.5}
      @media(prefers-color-scheme:dark){.bg{fill:#0f1722}.panel{fill:#172331;stroke:#3a4a60}.ink{fill:#f3f6fb}.muted{fill:#b8c5d8}.node{fill:#173554;stroke:#60a5fa}.sentinel{fill:#523b12;stroke:#fbbf24}.fast{fill:#153d2b;stroke:#4ade80}.slow{fill:#512225;stroke:#fb7185}.celltext{fill:#f3f6fb}.divider{stroke:#3a4a60}}
    </style>
  </defs>
  <rect class="bg" width="1000" height="1190" rx="18"/>
  <text class="ink" x="44" y="52" font-size="30" font-weight="700">六种链表：结构决定头尾操作的代价</text>
  <text class="muted ink" x="44" y="83" font-size="17">均采用带头结点；只保留标题所示的入口指针。复杂度包含定位结点和修改指针。</text>

  <!-- 1 非循环单链表 -->
  <g transform="translate(35 108)">
    <rect class="panel" width="450" height="320" rx="14"/>
    <text class="ink" x="22" y="38" font-size="22" font-weight="700">非循环单链表</text><text class="muted ink" x="428" y="38" font-size="15" text-anchor="end">入口：head</text>
    <text class="muted ink" x="31" y="74" font-size="14">head</text><path class="pointer" d="M68 70L92 92"/>
    <rect class="sentinel" x="90" y="82" width="58" height="50" rx="8"/><text class="celltext" x="119" y="113" font-size="15">头</text>
    <path class="edge" d="M148 107H184"/><rect class="node" x="188" y="82" width="58" height="50" rx="8"/><text class="celltext" x="217" y="113" font-size="16">a</text>
    <path class="edge" d="M246 107H282"/><rect class="node" x="286" y="82" width="58" height="50" rx="8"/><text class="celltext" x="315" y="113" font-size="16">b</text>
    <path class="edge" d="M344 107H378"/><text class="muted ink" x="409" y="113" font-size="15" text-anchor="middle">NULL</text>
    <line class="divider" x1="20" y1="160" x2="430" y2="160"/>
    <text class="muted ink" x="71" y="189" font-size="15" text-anchor="middle">头插</text><text class="muted ink" x="173" y="189" font-size="15" text-anchor="middle">头删</text><text class="muted ink" x="277" y="189" font-size="15" text-anchor="middle">尾插</text><text class="muted ink" x="379" y="189" font-size="15" text-anchor="middle">尾删</text>
    <rect class="fast badge" x="30" y="205" width="82" height="50" rx="10"/><rect class="fast badge" x="132" y="205" width="82" height="50" rx="10"/><rect class="slow badge" x="236" y="205" width="82" height="50" rx="10"/><rect class="slow badge" x="338" y="205" width="82" height="50" rx="10"/>
    <text class="celltext" x="71" y="237" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="173" y="237" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="277" y="237" font-size="19" font-weight="700">O(n)</text><text class="celltext" x="379" y="237" font-size="19" font-weight="700">O(n)</text>
    <text class="muted ink" x="225" y="289" font-size="15" text-anchor="middle">尾部操作必须从 head 找到表尾或其前驱</text>
  </g>

  <!-- 2 非循环双链表 -->
  <g transform="translate(515 108)">
    <rect class="panel" width="450" height="320" rx="14"/>
    <text class="ink" x="22" y="38" font-size="22" font-weight="700">非循环双链表</text><text class="muted ink" x="428" y="38" font-size="15" text-anchor="end">入口：head</text>
    <text class="muted ink" x="31" y="74" font-size="14">head</text><path class="pointer" d="M68 70L92 92"/>
    <rect class="sentinel" x="90" y="82" width="58" height="50" rx="8"/><text class="celltext" x="119" y="113" font-size="15">头</text>
    <path class="edge" d="M148 98H184"/><path class="back" d="M188 119H152"/><rect class="node" x="188" y="82" width="58" height="50" rx="8"/><text class="celltext" x="217" y="113" font-size="16">a</text>
    <path class="edge" d="M246 98H282"/><path class="back" d="M286 119H250"/><rect class="node" x="286" y="82" width="58" height="50" rx="8"/><text class="celltext" x="315" y="113" font-size="16">b</text>
    <path class="edge" d="M344 107H378"/><text class="muted ink" x="409" y="113" font-size="15" text-anchor="middle">NULL</text>
    <line class="divider" x1="20" y1="160" x2="430" y2="160"/>
    <text class="muted ink" x="71" y="189" font-size="15" text-anchor="middle">头插</text><text class="muted ink" x="173" y="189" font-size="15" text-anchor="middle">头删</text><text class="muted ink" x="277" y="189" font-size="15" text-anchor="middle">尾插</text><text class="muted ink" x="379" y="189" font-size="15" text-anchor="middle">尾删</text>
    <rect class="fast badge" x="30" y="205" width="82" height="50" rx="10"/><rect class="fast badge" x="132" y="205" width="82" height="50" rx="10"/><rect class="slow badge" x="236" y="205" width="82" height="50" rx="10"/><rect class="slow badge" x="338" y="205" width="82" height="50" rx="10"/>
    <text class="celltext" x="71" y="237" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="173" y="237" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="277" y="237" font-size="19" font-weight="700">O(n)</text><text class="celltext" x="379" y="237" font-size="19" font-weight="700">O(n)</text>
    <text class="muted ink" x="225" y="289" font-size="15" text-anchor="middle">prior 便于改链，但 head 不能直接定位表尾</text>
  </g>

  <!-- 3 循环单链表 head -->
  <g transform="translate(35 455)">
    <rect class="panel" width="450" height="320" rx="14"/>
    <text class="ink" x="22" y="38" font-size="22" font-weight="700">循环单链表</text><text class="muted ink" x="428" y="38" font-size="15" text-anchor="end">入口：head</text>
    <text class="muted ink" x="31" y="74" font-size="14">head</text><path class="pointer" d="M68 70L92 92"/>
    <rect class="sentinel" x="90" y="82" width="58" height="50" rx="8"/><text class="celltext" x="119" y="113" font-size="15">头</text>
    <path class="edge" d="M148 107H184"/><rect class="node" x="188" y="82" width="58" height="50" rx="8"/><text class="celltext" x="217" y="113" font-size="16">a</text>
    <path class="edge" d="M246 107H282"/><rect class="node" x="286" y="82" width="58" height="50" rx="8"/><text class="celltext" x="315" y="113" font-size="16">b</text>
    <path class="edge" d="M344 107C407 107 403 55 315 55H119C76 55 65 82 86 101"/>
    <line class="divider" x1="20" y1="160" x2="430" y2="160"/>
    <text class="muted ink" x="71" y="189" font-size="15" text-anchor="middle">头插</text><text class="muted ink" x="173" y="189" font-size="15" text-anchor="middle">头删</text><text class="muted ink" x="277" y="189" font-size="15" text-anchor="middle">尾插</text><text class="muted ink" x="379" y="189" font-size="15" text-anchor="middle">尾删</text>
    <rect class="fast badge" x="30" y="205" width="82" height="50" rx="10"/><rect class="fast badge" x="132" y="205" width="82" height="50" rx="10"/><rect class="slow badge" x="236" y="205" width="82" height="50" rx="10"/><rect class="slow badge" x="338" y="205" width="82" height="50" rx="10"/>
    <text class="celltext" x="71" y="237" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="173" y="237" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="277" y="237" font-size="19" font-weight="700">O(n)</text><text class="celltext" x="379" y="237" font-size="19" font-weight="700">O(n)</text>
    <text class="muted ink" x="225" y="289" font-size="15" text-anchor="middle">头部在 head 之后；表尾仍需遍历</text>
  </g>

  <!-- 4 循环单链表 tail -->
  <g transform="translate(515 455)">
    <rect class="panel" width="450" height="320" rx="14"/>
    <text class="ink" x="22" y="38" font-size="22" font-weight="700">循环单链表</text><text class="muted ink" x="428" y="38" font-size="15" text-anchor="end">入口：tail</text>
    <text class="muted ink" x="380" y="74" font-size="14">tail</text><path class="pointer" d="M380 70L324 91"/>
    <rect class="sentinel" x="90" y="82" width="58" height="50" rx="8"/><text class="celltext" x="119" y="113" font-size="15">头</text>
    <path class="edge" d="M148 107H184"/><rect class="node" x="188" y="82" width="58" height="50" rx="8"/><text class="celltext" x="217" y="113" font-size="16">a</text>
    <path class="edge" d="M246 107H282"/><rect class="node" x="286" y="82" width="58" height="50" rx="8"/><text class="celltext" x="315" y="113" font-size="16">b</text>
    <path class="edge" d="M344 107C407 107 403 55 315 55H119C76 55 65 82 86 101"/>
    <line class="divider" x1="20" y1="160" x2="430" y2="160"/>
    <text class="muted ink" x="71" y="189" font-size="15" text-anchor="middle">头插</text><text class="muted ink" x="173" y="189" font-size="15" text-anchor="middle">头删</text><text class="muted ink" x="277" y="189" font-size="15" text-anchor="middle">尾插</text><text class="muted ink" x="379" y="189" font-size="15" text-anchor="middle">尾删</text>
    <rect class="fast badge" x="30" y="205" width="82" height="50" rx="10"/><rect class="fast badge" x="132" y="205" width="82" height="50" rx="10"/><rect class="fast badge" x="236" y="205" width="82" height="50" rx="10"/><rect class="slow badge" x="338" y="205" width="82" height="50" rx="10"/>
    <text class="celltext" x="71" y="237" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="173" y="237" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="277" y="237" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="379" y="237" font-size="19" font-weight="700">O(n)</text>
    <text class="muted ink" x="225" y="289" font-size="15" text-anchor="middle">tail→next 是头结点；删除表尾仍需找前驱</text>
  </g>

  <!-- 5 循环双链表 head -->
  <g transform="translate(35 802)">
    <rect class="panel" width="450" height="320" rx="14"/>
    <text class="ink" x="22" y="38" font-size="22" font-weight="700">循环双链表</text><text class="muted ink" x="428" y="38" font-size="15" text-anchor="end">入口：head</text>
    <text class="muted ink" x="31" y="74" font-size="14">head</text><path class="pointer" d="M68 70L92 92"/>
    <rect class="sentinel" x="90" y="82" width="58" height="50" rx="8"/><text class="celltext" x="119" y="113" font-size="15">头</text>
    <path class="edge" d="M148 98H184"/><path class="back" d="M188 119H152"/><rect class="node" x="188" y="82" width="58" height="50" rx="8"/><text class="celltext" x="217" y="113" font-size="16">a</text>
    <path class="edge" d="M246 98H282"/><path class="back" d="M286 119H250"/><rect class="node" x="286" y="82" width="58" height="50" rx="8"/><text class="celltext" x="315" y="113" font-size="16">b</text>
    <path class="edge" d="M344 94C397 55 374 43 315 43H119C72 43 67 70 87 91"/><path class="back" d="M90 128C62 158 84 174 145 174H315C380 174 400 145 346 123"/>
    <line class="divider" x1="20" y1="190" x2="430" y2="190"/>
    <text class="muted ink" x="71" y="219" font-size="15" text-anchor="middle">头插</text><text class="muted ink" x="173" y="219" font-size="15" text-anchor="middle">头删</text><text class="muted ink" x="277" y="219" font-size="15" text-anchor="middle">尾插</text><text class="muted ink" x="379" y="219" font-size="15" text-anchor="middle">尾删</text>
    <rect class="fast badge" x="30" y="235" width="82" height="50" rx="10"/><rect class="fast badge" x="132" y="235" width="82" height="50" rx="10"/><rect class="fast badge" x="236" y="235" width="82" height="50" rx="10"/><rect class="fast badge" x="338" y="235" width="82" height="50" rx="10"/>
    <text class="celltext" x="71" y="267" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="173" y="267" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="277" y="267" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="379" y="267" font-size="19" font-weight="700">O(1)</text>
    <text class="muted ink" x="225" y="307" font-size="15" text-anchor="middle">head→prior 直接指向表尾</text>
  </g>

  <!-- 6 循环双链表 tail -->
  <g transform="translate(515 802)">
    <rect class="panel" width="450" height="320" rx="14"/>
    <text class="ink" x="22" y="38" font-size="22" font-weight="700">循环双链表</text><text class="muted ink" x="428" y="38" font-size="15" text-anchor="end">入口：tail</text>
    <text class="muted ink" x="380" y="74" font-size="14">tail</text><path class="pointer" d="M380 70L324 91"/>
    <rect class="sentinel" x="90" y="82" width="58" height="50" rx="8"/><text class="celltext" x="119" y="113" font-size="15">头</text>
    <path class="edge" d="M148 98H184"/><path class="back" d="M188 119H152"/><rect class="node" x="188" y="82" width="58" height="50" rx="8"/><text class="celltext" x="217" y="113" font-size="16">a</text>
    <path class="edge" d="M246 98H282"/><path class="back" d="M286 119H250"/><rect class="node" x="286" y="82" width="58" height="50" rx="8"/><text class="celltext" x="315" y="113" font-size="16">b</text>
    <path class="edge" d="M344 94C397 55 374 43 315 43H119C72 43 67 70 87 91"/><path class="back" d="M90 128C62 158 84 174 145 174H315C380 174 400 145 346 123"/>
    <line class="divider" x1="20" y1="190" x2="430" y2="190"/>
    <text class="muted ink" x="71" y="219" font-size="15" text-anchor="middle">头插</text><text class="muted ink" x="173" y="219" font-size="15" text-anchor="middle">头删</text><text class="muted ink" x="277" y="219" font-size="15" text-anchor="middle">尾插</text><text class="muted ink" x="379" y="219" font-size="15" text-anchor="middle">尾删</text>
    <rect class="fast badge" x="30" y="235" width="82" height="50" rx="10"/><rect class="fast badge" x="132" y="235" width="82" height="50" rx="10"/><rect class="fast badge" x="236" y="235" width="82" height="50" rx="10"/><rect class="fast badge" x="338" y="235" width="82" height="50" rx="10"/>
    <text class="celltext" x="71" y="267" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="173" y="267" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="277" y="267" font-size="19" font-weight="700">O(1)</text><text class="celltext" x="379" y="267" font-size="19" font-weight="700">O(1)</text>
    <text class="muted ink" x="225" y="307" font-size="15" text-anchor="middle">tail、tail→next 和 prior 覆盖两端</text>
  </g>

  <rect class="fast badge" x="247" y="1152" width="55" height="22" rx="6"/><text class="muted ink" x="312" y="1169" font-size="15">可直接定位并改链</text>
  <rect class="slow badge" x="535" y="1152" width="55" height="22" rx="6"/><text class="muted ink" x="600" y="1169" font-size="15">需要遍历定位</text>
</svg>
