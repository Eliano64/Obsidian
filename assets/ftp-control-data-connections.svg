<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">FTP 控制连接与数据连接</title><desc id="desc">控制连接贯穿整个会话并双向传送命令应答；数据连接按次建立并双向传送文件或目录列表。</desc>
  <defs><marker id="redArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#dc2626"/></marker><marker id="orangeArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#d97706"/></marker></defs>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}
:root{color-scheme:light dark}.title{font:700 24px "Microsoft YaHei",sans-serif;fill:#172033}.label{font:700 18px "Microsoft YaHei",sans-serif;fill:#172033}.sub{font:14px "Microsoft YaHei",sans-serif;fill:#526174}.box{fill:#fff;stroke:#64748b;stroke-width:2}.client{fill:#ecfdf5;stroke:#059669}.server{fill:#eff6ff;stroke:#2563eb}.control{fill:none;stroke:#dc2626;stroke-width:3;marker-start:url(#redArrow);marker-end:url(#redArrow)}.data{fill:none;stroke:#d97706;stroke-width:3;stroke-dasharray:8 6;marker-start:url(#orangeArrow);marker-end:url(#orangeArrow)}.panel{fill:#f8fafc;stroke:#cbd5e1}.red{fill:#dc2626}.orange{fill:#b45309}@media(prefers-color-scheme:dark){.title,.label{fill:#e5edf5}.sub{fill:#a9b7c6}.box{fill:#121b25}.client{fill:#123d2d}.server{fill:#17345a}.panel{fill:#121b25;stroke:#344354}.red{fill:#fca5a5}.orange{fill:#fcd34d}}</style>
  <text x="480" y="38" text-anchor="middle" class="title">FTP 同时维护两类 TCP 连接</text>
  <rect x="44" y="82" width="210" height="194" rx="9" class="box client"/><text x="149" y="116" text-anchor="middle" class="label">FTP 客户</text><text x="149" y="140" text-anchor="middle" class="sub">控制连接由客户发起</text><rect x="70" y="166" width="158" height="40" rx="5" class="box"/><text x="149" y="191" text-anchor="middle" class="sub">客户临时端口 ↔ 服务器 21</text><rect x="70" y="220" width="158" height="40" rx="5" class="box"/><text x="149" y="245" text-anchor="middle" class="sub">客户临时端口 ↔ 数据端口</text>
  <rect x="706" y="82" width="210" height="194" rx="9" class="box server"/><text x="811" y="116" text-anchor="middle" class="label">FTP 服务器</text><text x="811" y="140" text-anchor="middle" class="sub">固定控制端口 21</text><rect x="732" y="166" width="158" height="40" rx="5" class="box"/><text x="811" y="191" text-anchor="middle" class="sub">TCP 21：控制</text><rect x="732" y="220" width="158" height="40" rx="5" class="box"/><text x="811" y="239" text-anchor="middle" class="sub">主动：TCP 20</text><text x="811" y="256" text-anchor="middle" class="sub">被动：临时端口</text>
  <line x1="254" y1="186" x2="706" y2="186" class="control"/><text x="480" y="168" text-anchor="middle" class="label red">控制连接：命令 →　← 应答</text><text x="480" y="207" text-anchor="middle" class="sub">登录后建立，整个 FTP 会话期间保持打开</text>
  <line x1="254" y1="240" x2="706" y2="240" class="data"/><text x="480" y="265" text-anchor="middle" class="label orange">数据连接：上传 ↔ 下载 / 目录列表</text><text x="480" y="286" text-anchor="middle" class="sub">每次传送时临时建立，传送完成后释放</text>
  <rect x="44" y="314" width="872" height="54" rx="7" class="panel"/><text x="480" y="338" text-anchor="middle" class="label">“主动 / 被动”只描述谁发起数据连接</text><text x="480" y="359" text-anchor="middle" class="sub">控制连接始终由客户主动连接服务器 TCP 21；数据内容本身可向任一方向传送</text>
</svg>
