<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Undirected and directed graph degree</title>
  <desc id="desc">Comparison of degree in undirected graph and in-degree and out-degree in directed graph.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    .node{fill:#ffffff;stroke:#2563eb;stroke-width:3}
    .node2{fill:#ffffff;stroke:#16a34a;stroke-width:3}
    .edge{stroke:#475569;stroke-width:3;fill:none;stroke-linecap:round}
    .arc{stroke:#475569;stroke-width:3;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    .text{fill:#0f172a;font-size:22px;font-weight:650}
    .small{fill:#334155;font-size:18px}
    .formula{fill:#7c2d12;font-size:20px;font-weight:650}
    @media (prefers-color-scheme: dark){
      .panel{fill:#111827;stroke:#334155}
      .node,.node2{fill:#0b1220}
      .edge,.arc{stroke:#cbd5e1}
      .text{fill:#f8fafc}
      .small{fill:#cbd5e1}
      .formula{fill:#fdba74}
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="panel" x="28" y="28" width="430" height="464" rx="10"/>
  <rect class="panel" x="502" y="28" width="430" height="464" rx="10"/>

  <text class="text" x="68" y="78">无向图：度 TD(v)</text>
  <line class="edge" x1="170" y1="160" x2="300" y2="145"/>
  <line class="edge" x1="170" y1="160" x2="210" y2="300"/>
  <line class="edge" x1="300" y1="145" x2="210" y2="300"/>
  <line class="edge" x1="300" y1="145" x2="340" y2="305"/>
  <line class="edge" x1="210" y1="300" x2="340" y2="305"/>
  <circle class="node" cx="170" cy="160" r="28"/><text class="text" x="160" y="168">A</text>
  <circle class="node" cx="300" cy="145" r="28"/><text class="text" x="290" y="153">B</text>
  <circle class="node" cx="210" cy="300" r="28"/><text class="text" x="200" y="308">C</text>
  <circle class="node" cx="340" cy="305" r="28"/><text class="text" x="329" y="313">D</text>
  <text class="small" x="82" y="392">每条边被两个端点各统计一次</text>
  <text class="formula" x="82" y="430">Σ TD(vᵢ) = 2e</text>

  <text class="text" x="542" y="78">有向图：入度 ID(v)、出度 OD(v)</text>
  <path class="arc" d="M640 160 C700 120, 736 122, 778 150"/>
  <path class="arc" d="M640 170 C620 235, 626 264, 665 296"/>
  <path class="arc" d="M792 178 C785 230, 770 265, 728 300"/>
  <path class="arc" d="M720 318 C780 350, 820 342, 836 308"/>
  <path class="arc" d="M830 282 C780 252, 725 250, 692 282"/>
  <circle class="node2" cx="630" cy="160" r="28"/><text class="text" x="620" y="168">A</text>
  <circle class="node2" cx="800" cy="160" r="28"/><text class="text" x="790" y="168">B</text>
  <circle class="node2" cx="690" cy="305" r="28"/><text class="text" x="680" y="313">C</text>
  <circle class="node2" cx="845" cy="295" r="28"/><text class="text" x="834" y="303">D</text>
  <text class="small" x="552" y="392">每条弧贡献一次出度、一次入度</text>
  <text class="formula" x="552" y="430">Σ ID(vᵢ) = Σ OD(vᵢ) = e</text>
</svg>
