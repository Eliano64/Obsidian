<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Direct Insertion Sort</title>
<style>
:root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--accent:#2563eb;--ok:#059669;--warn:#d97706;--bad:#dc2626;--code:#0f172a}
@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--accent:#60a5fa;--ok:#34d399;--warn:#fbbf24;--bad:#f87171;--code:#e5e7eb}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.wrap{padding:22px;max-width:1120px;margin:auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.title{font-weight:800;font-size:22px}.btns{display:flex;gap:8px}.btn{border:1px solid var(--line);background:var(--panel);color:var(--fg);border-radius:8px;padding:8px 12px;cursor:pointer}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}.panel{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:16px}.array{display:flex;gap:8px;align-items:flex-end;min-height:150px;flex-wrap:wrap}.cell{width:62px;border:2px solid var(--line);background:var(--bg);border-radius:10px;text-align:center;padding:10px 4px;position:relative}.cell .v{font-size:20px;font-weight:800}.cell .i{font-size:12px;color:var(--muted);margin-top:4px}.sorted{border-color:var(--ok)}.current{border-color:var(--warn);box-shadow:0 0 0 3px color-mix(in srgb,var(--warn) 24%,transparent)}.move{border-color:var(--accent);transform:translateX(12px)}.hole{border-style:dashed;color:var(--muted)}.note{font-size:16px;line-height:1.75}.code{white-space:pre-wrap;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;font-family:Consolas,monospace;font-size:13px;color:var(--code);line-height:1.45}.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;color:var(--muted);font-size:13px}.dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:4px;vertical-align:-1px}.progress{color:var(--muted);font-size:14px}
@media(max-width:820px){.grid{grid-template-columns:1fr}.cell{width:54px}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><div class="title">直接插入排序：拿出 temp，较大元素后移</div><div class="progress" id="progress"></div></div>
    <div class="btns"><button class="btn" id="prev">上一步</button><button class="btn" id="next">下一步</button></div>
  </div>
  <div class="grid">
    <div class="panel">
      <div class="array" id="array"></div>
      <div class="legend">
        <span><span class="dot" style="background:var(--ok)"></span>已有序前缀</span>
        <span><span class="dot" style="background:var(--warn)"></span>当前待插入元素</span>
        <span><span class="dot" style="background:var(--accent)"></span>右移元素</span>
      </div>
    </div>
    <div class="panel">
      <div class="note" id="note"></div>
      <div class="code" id="code"></div>
    </div>
  </div>
</div>
<script>
const steps=[
{a:[49,38,65,97,76,13,27,49],sorted:[0],cur:1,n:"初始认为 A[0] 已有序。现在处理 A[1]=38。",c:"temp = A[1];\nj = 0;"},
{a:[49,null,65,97,76,13,27,49],sorted:[0],cur:1,move:[0],n:"取出 temp=38，A[1] 留出空位。从已排序前缀的最右端开始向左比较。",c:"while (j >= 0 && A[j] > temp)"},
{a:[null,49,65,97,76,13,27,49],sorted:[1],cur:0,move:[1],n:"49 > 38，所以 49 后移一格，j 继续左移。",c:"A[j + 1] = A[j];\nj--;"},
{a:[38,49,65,97,76,13,27,49],sorted:[0,1],n:"j 已越过表头，把 temp 放到 j+1，也就是 0 号位置。",c:"A[j + 1] = temp;"},
{a:[38,49,65,97,76,13,27,49],sorted:[0,1,2,3],cur:4,n:"处理 A[4]=76。前缀 38,49,65,97 已有序。",c:"temp = A[4];\nj = 3;"},
{a:[38,49,65,null,97,13,27,49],sorted:[0,1,2,4],cur:3,move:[4],n:"97 > 76，97 后移。继续比较 65 与 76。",c:"A[4] = A[3];\nj = 2;"},
{a:[38,49,65,76,97,13,27,49],sorted:[0,1,2,3,4],n:"65 <= 76，停止后移，把 temp 放在 97 原来的位置。",c:"A[j + 1] = temp;"},
{a:[13,27,38,49,49,65,76,97],sorted:[0,1,2,3,4,5,6,7],n:"持续处理每个 i 后，整个表有序。相等元素不会越过前面的相等元素，所以稳定。",c:"for (int i = 1; i < n; i++)\n    insert A[i] into A[0..i-1];"}
];
let k=0;
function render(){
 const s=steps[k], arr=document.getElementById('array');
 arr.innerHTML='';
 s.a.forEach((v,i)=>{const d=document.createElement('div');d.className='cell';if(s.sorted?.includes(i))d.classList.add('sorted');if(s.cur===i)d.classList.add('current');if(s.move?.includes(i))d.classList.add('move');if(v===null)d.classList.add('hole');d.innerHTML=`<div class="v">${v===null?'':v}</div><div class="i">${i}</div>`;arr.appendChild(d)});
 document.getElementById('note').textContent=s.n;
 document.getElementById('code').textContent=s.c;
 document.getElementById('progress').textContent=`${k+1} / ${steps.length}`;
}
document.getElementById('prev').onclick=()=>{k=(k-1+steps.length)%steps.length;render()};
document.getElementById('next').onclick=()=>{k=(k+1)%steps.length;render()};
render();
</script>
</body>
</html>
