<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 520" role="img" aria-labelledby="title desc">
  <title id="title">Directed and undirected graph</title>
  <desc id="desc">Comparison between undirected edges and directed arcs.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="context-stroke"/>
    </marker>
  </defs>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--fg:#111827;--muted:#475569;--line:#334155;--node:#fff;--fill:#dbeafe;--accent:#2563eb}
    @media(prefers-color-scheme:dark){:root{--fg:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--node:#0f172a;--fill:#172554;--accent:#60a5fa}}
    text{fill:var(--fg);font-family:"Segoe UI",Arial,sans-serif}.title{font-size:27px;font-weight:700}.small{font-size:17px;fill:var(--muted)}.label{font-size:20px;font-weight:700;text-anchor:middle}.node{fill:var(--node);stroke:var(--line);stroke-width:2.2}.main{fill:var(--fill);stroke:var(--accent);stroke-width:3}.edge{stroke:var(--line);stroke-width:2.7;fill:none}.arc{stroke:var(--accent);stroke-width:2.9;fill:none;marker-end:url(#arrow)}.box{fill:transparent;stroke:var(--line);stroke-width:1.5;rx:12}
  </style>
  <text class="title" x="38" y="50">无向图与有向图</text>
  <text class="small" x="38" y="82">无向边是无序对；有向边也称弧，是有序对。</text>

  <rect class="box" x="50" y="130" width="385" height="315"/>
  <text class="label" x="242" y="165">无向图</text>
  <line class="edge" x1="150" y1="270" x2="260" y2="205"/>
  <line class="edge" x1="260" y1="205" x2="345" y2="305"/>
  <line class="edge" x1="150" y1="270" x2="345" y2="305"/>
  <circle class="main" cx="150" cy="270" r="25"/><text class="label" x="150" y="278">v</text>
  <circle class="node" cx="260" cy="205" r="23"/><text class="label" x="260" y="213">w</text>
  <circle class="node" cx="345" cy="305" r="23"/><text class="label" x="345" y="313">x</text>
  <text x="92" y="390" font-size="18">(v,w) = (w,v)</text>
  <text x="92" y="418" class="small">v 与 w 互为邻接点，边依附于两个顶点。</text>

  <rect class="box" x="500" y="130" width="385" height="315"/>
  <text class="label" x="692" y="165">有向图</text>
  <path class="arc" d="M600 270 C630 218,660 205,700 205"/>
  <path class="arc" d="M700 230 C668 285,640 305,600 295"/>
  <path class="arc" d="M700 215 C745 225,770 255,790 305"/>
  <circle class="main" cx="600" cy="270" r="25"/><text class="label" x="600" y="278">v</text>
  <circle class="node" cx="700" cy="205" r="23"/><text class="label" x="700" y="213">w</text>
  <circle class="node" cx="790" cy="305" r="23"/><text class="label" x="790" y="313">x</text>
  <text x="542" y="390" font-size="18">&lt;v,w&gt; ≠ &lt;w,v&gt;</text>
  <text x="542" y="418" class="small">v 是弧尾，w 是弧头；v 邻接到 w，w 邻接自 v。</text>
</svg>
