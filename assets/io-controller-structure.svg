<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">I/O Controller Structure</title>
  <desc id="desc">I/O controller connects system bus and devices, exposing data, status, and control registers.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.reg{fill:var(--bg);stroke:var(--blue);stroke-width:2}.logic{fill:color-mix(in srgb,var(--orange) 18%,var(--bg));stroke:var(--orange);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.line{stroke:var(--line);stroke-width:3;fill:none}.data{stroke:var(--blue);stroke-width:4;fill:none;marker-end:url(#ba)}.ctrl{stroke:var(--orange);stroke-width:3;fill:none;marker-end:url(#oa)}.state{stroke:var(--green);stroke-width:3;fill:none;marker-end:url(#ga)}
  </style>
  <defs>
    <marker id="ba" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"/></marker>
    <marker id="oa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--orange)"/></marker>
    <marker id="ga" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--green)"/></marker>
  </defs>
  <rect class="bg" width="1080" height="520"/>
  <text class="t" x="540" y="42" text-anchor="middle" font-size="24" font-weight="700">I/O 控制器的基本组成</text>
  <rect class="box" x="42" y="122" width="150" height="250" rx="8"/>
  <text class="t" x="117" y="182" text-anchor="middle" font-size="20" font-weight="700">CPU</text>
  <text class="m" x="117" y="212" text-anchor="middle" font-size="14">读写端口</text>
  <text class="m" x="117" y="238" text-anchor="middle" font-size="14">发出命令</text>
  <line class="data" x1="192" y1="168" x2="315" y2="168"/>
  <line class="line" x1="192" y1="247" x2="315" y2="247"/>
  <line class="ctrl" x1="192" y1="326" x2="315" y2="326"/>
  <text class="m" x="254" y="154" text-anchor="middle" font-size="13">数据线</text>
  <text class="m" x="254" y="234" text-anchor="middle" font-size="13">地址线</text>
  <text class="m" x="254" y="312" text-anchor="middle" font-size="13">控制线</text>
  <rect class="box" x="315" y="86" width="430" height="348" rx="10"/>
  <text class="t" x="530" y="118" text-anchor="middle" font-size="20" font-weight="700">I/O 控制器</text>
  <rect class="reg" x="365" y="148" width="160" height="58" rx="6"/>
  <text class="t" x="445" y="172" text-anchor="middle" font-size="16" font-weight="700">数据寄存器</text>
  <text class="m" x="445" y="194" text-anchor="middle" font-size="12">暂存输入 / 输出数据</text>
  <rect class="reg" x="365" y="232" width="160" height="58" rx="6"/>
  <text class="t" x="445" y="256" text-anchor="middle" font-size="16" font-weight="700">状态寄存器</text>
  <text class="m" x="445" y="278" text-anchor="middle" font-size="12">忙 / 就绪 / 出错</text>
  <rect class="reg" x="365" y="316" width="160" height="58" rx="6"/>
  <text class="t" x="445" y="340" text-anchor="middle" font-size="16" font-weight="700">控制寄存器</text>
  <text class="m" x="445" y="362" text-anchor="middle" font-size="12">读 / 写 / 启动</text>
  <rect class="logic" x="580" y="206" width="120" height="108" rx="8"/>
  <text class="t" x="640" y="247" text-anchor="middle" font-size="17" font-weight="700">I/O 逻辑</text>
  <text class="m" x="640" y="273" text-anchor="middle" font-size="13">译码 / 控制</text>
  <path class="data" d="M525 177 H580"/>
  <path class="state" d="M580 261 H525"/>
  <path class="ctrl" d="M525 345 C560 345 560 300 580 286"/>
  <rect class="box" x="850" y="120" width="160" height="80" rx="8"/>
  <text class="t" x="930" y="153" text-anchor="middle" font-size="17" font-weight="700">设备接口 1</text>
  <text class="m" x="930" y="177" text-anchor="middle" font-size="13">数据 / 状态 / 控制</text>
  <rect class="box" x="850" y="290" width="160" height="80" rx="8"/>
  <text class="t" x="930" y="323" text-anchor="middle" font-size="17" font-weight="700">设备接口 n</text>
  <text class="m" x="930" y="347" text-anchor="middle" font-size="13">连接具体外设</text>
  <path class="data" d="M700 238 C770 200 780 160 850 160"/>
  <path class="ctrl" d="M700 282 C770 300 780 330 850 330"/>
  <text class="m" x="785" y="254" text-anchor="middle" font-size="13">控制器与设备通信</text>
</svg>
