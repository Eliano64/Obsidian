<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 430" role="img" aria-labelledby="title desc">
  <title id="title">Logical Device Mapping</title>
  <desc id="desc">Logical device name maps through LUT to physical device and driver entry.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.hit{fill:color-mix(in srgb,var(--orange) 18%,var(--bg));stroke:var(--orange);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--blue);stroke-width:3;fill:none;marker-end:url(#ba)}
  </style>
  <defs><marker id="ba" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"/></marker></defs>
  <rect class="bg" width="1060" height="430"/>
  <text class="t" x="530" y="42" text-anchor="middle" font-size="24" font-weight="700">逻辑设备名到物理设备的映射</text>
  <rect class="box" x="55" y="155" width="210" height="90" rx="8"/>
  <text class="t" x="160" y="190" text-anchor="middle" font-size="17" font-weight="700">用户请求</text>
  <text class="m" x="160" y="218" text-anchor="middle" font-size="14">逻辑设备名</text>
  <text class="m" x="160" y="240" text-anchor="middle" font-size="13">/dev/printer</text>
  <rect class="box" x="365" y="95" width="310" height="210" rx="8"/>
  <text class="t" x="520" y="126" text-anchor="middle" font-size="18" font-weight="700">LUT</text>
  <rect class="box" x="392" y="154" width="256" height="34" rx="4"/>
  <text class="m" x="520" y="177" text-anchor="middle" font-size="13">/dev/tty -> 5 -> 2046</text>
  <rect class="hit" x="392" y="198" width="256" height="38" rx="4"/>
  <text class="t" x="520" y="223" text-anchor="middle" font-size="13" font-weight="700">/dev/printer -> 3 -> 1024</text>
  <rect class="box" x="392" y="246" width="256" height="34" rx="4"/>
  <text class="m" x="520" y="269" text-anchor="middle" font-size="13">... -> ... -> ...</text>
  <rect class="box" x="775" y="110" width="210" height="75" rx="8"/>
  <text class="t" x="880" y="140" text-anchor="middle" font-size="17" font-weight="700">物理设备名</text>
  <text class="m" x="880" y="165" text-anchor="middle" font-size="14">设备 3</text>
  <rect class="box" x="775" y="235" width="210" height="75" rx="8"/>
  <text class="t" x="880" y="265" text-anchor="middle" font-size="17" font-weight="700">驱动程序入口</text>
  <text class="m" x="880" y="290" text-anchor="middle" font-size="14">地址 1024</text>
  <path class="a" d="M265 200 H365"/>
  <path class="a" d="M675 217 C720 190 735 147 775 147"/>
  <path class="a" d="M675 217 C720 238 735 272 775 272"/>
</svg>
