<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">QAM 星座图与格雷码</title>
  <desc id="desc">展示 QAM-16 星座点和格雷码相邻只差一位</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--grid:#cbd5e1;--blue:#2563eb;--amber:#d97706;--red:#dc2626}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--grid:#334155;--blue:#60a5fa;--amber:#fbbf24;--red:#f87171}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.axis{stroke:var(--line);stroke-width:2;marker-end:url(#arrow)}.grid{stroke:var(--grid);stroke-width:1}.pt{fill:var(--blue);stroke:var(--bg);stroke-width:2}.near{stroke:var(--red);stroke-width:2.4;fill:none}.formula{font-size:24px;font-weight:700}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:18px;font-weight:700}.small{font-size:15px;fill:var(--muted)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="560"/>
  <text x="50" y="56" class="title">QAM-16：一个码元对应一个星座点</text>
  <rect x="60" y="90" width="540" height="410" rx="10" class="panel"/>
  <g transform="translate(330,300)">
    <line x1="-210" y1="0" x2="215" y2="0" class="axis"/><line x1="0" y1="170" x2="0" y2="-175" class="axis"/>
    <text x="220" y="25" class="small">I</text><text x="15" y="-175" class="small">Q</text>
    <g class="grid"><line x1="-150" y1="-150" x2="-150" y2="150"/><line x1="-50" y1="-150" x2="-50" y2="150"/><line x1="50" y1="-150" x2="50" y2="150"/><line x1="150" y1="-150" x2="150" y2="150"/><line x1="-150" y1="-150" x2="150" y2="-150"/><line x1="-150" y1="-50" x2="150" y2="-50"/><line x1="-150" y1="50" x2="150" y2="50"/><line x1="-150" y1="150" x2="150" y2="150"/></g>
    <g>
      <circle cx="-150" cy="-150" r="8" class="pt"/><text x="-150" y="-166" text-anchor="middle" class="small">0000</text>
      <circle cx="-50" cy="-150" r="8" class="pt"/><text x="-50" y="-166" text-anchor="middle" class="small">0001</text>
      <circle cx="50" cy="-150" r="8" class="pt"/><text x="50" y="-166" text-anchor="middle" class="small">0011</text>
      <circle cx="150" cy="-150" r="8" class="pt"/><text x="150" y="-166" text-anchor="middle" class="small">0010</text>
      <circle cx="-150" cy="-50" r="8" class="pt"/><text x="-150" y="-66" text-anchor="middle" class="small">0100</text>
      <circle cx="-50" cy="-50" r="8" class="pt"/><text x="-50" y="-66" text-anchor="middle" class="small">0101</text>
      <circle cx="50" cy="-50" r="8" class="pt"/><text x="50" y="-66" text-anchor="middle" class="small">0111</text>
      <circle cx="150" cy="-50" r="8" class="pt"/><text x="150" y="-66" text-anchor="middle" class="small">0110</text>
      <circle cx="-150" cy="50" r="8" class="pt"/><text x="-150" y="76" text-anchor="middle" class="small">1100</text>
      <circle cx="-50" cy="50" r="8" class="pt"/><text x="-50" y="76" text-anchor="middle" class="small">1101</text>
      <circle cx="50" cy="50" r="8" class="pt"/><text x="50" y="76" text-anchor="middle" class="small">1111</text>
      <circle cx="150" cy="50" r="8" class="pt"/><text x="150" y="76" text-anchor="middle" class="small">1110</text>
      <circle cx="-150" cy="150" r="8" class="pt"/><text x="-150" y="176" text-anchor="middle" class="small">1000</text>
      <circle cx="-50" cy="150" r="8" class="pt"/><text x="-50" y="176" text-anchor="middle" class="small">1001</text>
      <circle cx="50" cy="150" r="8" class="pt"/><text x="50" y="176" text-anchor="middle" class="small">1011</text>
      <circle cx="150" cy="150" r="8" class="pt"/><text x="150" y="176" text-anchor="middle" class="small">1010</text>
    </g>
    <path d="M-50 -50 H50" class="near"/>
  </g>
  <rect x="640" y="120" width="285" height="330" rx="10" class="panel"/>
  <text x="782" y="170" text-anchor="middle" class="label">QAM-16</text>
  <text x="782" y="215" text-anchor="middle" class="formula">log₂16 = 4 bit</text>
  <text x="782" y="260" text-anchor="middle" class="small">16 个星座点</text>
  <text x="782" y="290" text-anchor="middle" class="small">每个点是一种码元状态</text>
  <text x="782" y="345" text-anchor="middle" class="label">格雷码</text>
  <text x="782" y="380" text-anchor="middle" class="small">相邻点编号只差 1 位</text>
  <text x="782" y="410" text-anchor="middle" class="small">相邻误判通常只错 1 bit</text>
</svg>
