<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">五层原理体系结构</title>
  <desc id="desc">从应用层到物理层展示五层网络体系结构的主要职责、典型标识和数据单元。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#cbd5e1;--app:#dbeafe;--app-l:#2563eb;--tran:#dcfce7;--tran-l:#16a34a;--net:#fef3c7;--net-l:#d97706;--link:#fee2e2;--link-l:#dc2626;--phy:#ede9fe;--phy-l:#7c3aed}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#334155;--app:#1e3a8a;--app-l:#60a5fa;--tran:#14532d;--tran-l:#4ade80;--net:#713f12;--net-l:#fbbf24;--link:#7f1d1d;--link-l:#f87171;--phy:#4c1d95;--phy-l:#a78bfa}}
    .bg{fill:var(--bg)} .card{fill:var(--panel);stroke:var(--line);stroke-width:1.5}.box{stroke-width:2.2;rx:12}
    .app{fill:var(--app);stroke:var(--app-l)}.tran{fill:var(--tran);stroke:var(--tran-l)}.net{fill:var(--net);stroke:var(--net-l)}.link{fill:var(--link);stroke:var(--link-l)}.phy{fill:var(--phy);stroke:var(--phy-l)}
    text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.layer{font-size:22px;font-weight:700}.desc{font-size:16px}.muted{font-size:14px;fill:var(--muted)}.tag{font-size:15px;font-weight:700}
  </style>
  <rect class="bg" width="980" height="620"/>
  <rect class="card" x="28" y="26" width="924" height="560" rx="16"/>
  <text class="title" x="58" y="70">五层原理体系结构：每层只解决一类问题</text>
  <text class="muted" x="58" y="98">上层使用下层服务；下层隐藏实现细节。</text>
  <g transform="translate(58,126)">
    <rect class="box app" x="0" y="0" width="864" height="76" rx="12"/>
    <text class="layer" x="28" y="32">应用层</text><text class="desc" x="160" y="31">应用进程之间按应用协议交换报文</text><text class="tag" x="650" y="31">数据单元：应用报文</text><text class="muted" x="160" y="56">例：HTTP、SMTP、FTP、DNS</text>
    <rect class="box tran" x="0" y="88" width="864" height="76" rx="12"/>
    <text class="layer" x="28" y="120">运输层</text><text class="desc" x="160" y="119">进程到进程通信，区分应用进程，可提供可靠传输</text><text class="tag" x="650" y="119">TCP 段 / UDP 数据报</text><text class="muted" x="160" y="144">关键标识：端口号</text>
    <rect class="box net" x="0" y="176" width="864" height="76" rx="12"/>
    <text class="layer" x="28" y="208">网络层</text><text class="desc" x="160" y="207">跨网络传输，寻址与路由选择</text><text class="tag" x="650" y="207">分组 / IP 数据报</text><text class="muted" x="160" y="232">关键标识：IP 地址</text>
    <rect class="box link" x="0" y="264" width="864" height="76" rx="12"/>
    <text class="layer" x="28" y="296">数据链路层</text><text class="desc" x="160" y="295">一段链路或一个局域网内传输，成帧和差错检测</text><text class="tag" x="650" y="295">帧</text><text class="muted" x="160" y="320">关键标识：MAC 地址</text>
    <rect class="box phy" x="0" y="352" width="864" height="76" rx="12"/>
    <text class="layer" x="28" y="384">物理层</text><text class="desc" x="160" y="383">把比特流转换为电信号、光信号或无线信号传输</text><text class="tag" x="650" y="383">比特流</text><text class="muted" x="160" y="408">关注传输媒体、信号、电气/光学特性</text>
  </g>
</svg>
