<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>DHCP 四报文</title><style>:root{color-scheme:light dark;--bg:#f8fafc;--fg:#0f172a;--muted:#475569;--border:#cbd5e1;--accent:#0369a1;--msg:#dbeafe}@media(prefers-color-scheme:dark){:root{--bg:#020617;--fg:#e5e7eb;--muted:#cbd5e1;--border:#334155;--accent:#67e8f9;--msg:#172554}}body{margin:0;background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif}.wrap{max-width:980px;margin:auto;padding:28px}.title{text-align:center;font-size:26px;font-weight:700}.lane{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:26px}.life{border-left:3px solid var(--muted);min-height:360px;padding-left:18px}.head{font-weight:700;color:var(--accent);margin-bottom:14px}.msg{background:var(--msg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin:14px 0}.info{border:1px solid var(--border);border-radius:10px;padding:16px;min-height:110px}.controls{text-align:center;margin-top:16px}button{background:transparent;color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:8px 16px;margin:0 6px;font:inherit}</style></head><body><div class="wrap"><div class="title">DHCP：Discover、Offer、Request、ACK</div><div class="lane"><div class="life"><div class="head">DHCP 客户</div><div id="c"></div></div><div class="life"><div class="head">DHCP 服务器</div><div id="s"></div></div></div><div id="info" class="info"></div><div class="controls"><button id="prev">上一步</button><button id="next">下一步</button></div></div><script>
const data=[
["Discover 广播","", "客户还没有 IP，源 IP 用 0.0.0.0，目的 IP 用 255.255.255.255，寻找 DHCP 服务器。"],
["Discover 广播","Offer 提供租约", "服务器提供可租用 IP、子网掩码、默认网关、DNS、租期等信息。"],
["Request 广播选择租约","Offer 提供租约", "客户可能收到多个 Offer，用 Request 广播说明自己选择哪个服务器，也通知其他服务器释放预留。"],
["Request 广播选择租约","ACK 确认租约", "客户收到 ACK 后才正式使用租约。使用前通常再用 ARP 检测地址冲突。"]
];let i=0;function r(){c.innerHTML=data.slice(0,i+1).map(x=>x[0]?`<div class="msg">${x[0]}</div>`:"").join("");s.innerHTML=data.slice(0,i+1).map(x=>x[1]?`<div class="msg">${x[1]}</div>`:"").join("");info.textContent=data[i][2]}prev.onclick=()=>{i=Math.max(0,i-1);r()};next.onclick=()=>{i=Math.min(data.length-1,i+1);r()};r();
</script></body></html>
