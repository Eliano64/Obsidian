<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">系统总线三类信号</title>
  <desc id="desc">系统总线按传送信息内容分为数据总线、地址总线和控制总线，分别说明方向、内容和位数含义。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #172033;
      --muted: #64748b;
      --line: #64748b;
      --box: #f8fafc;
      --addr: #2563eb;
      --data: #16a34a;
      --ctrl: #dc2626;
      --chip: #eef2ff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --fg: #e5e7eb;
        --muted: #a8b3c3;
        --line: #94a3b8;
        --box: #111827;
        --addr: #60a5fa;
        --data: #4ade80;
        --ctrl: #f87171;
        --chip: #1b2440;
      }
    }
    svg { background: var(--bg); font-family: "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif; }
    text { fill: var(--fg); }
    .title { font-size: 30px; font-weight: 700; }
    .h { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; fill: var(--muted); }
    .label { font-size: 18px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    .box { fill: var(--box); stroke: var(--line); stroke-width: 2; rx: 10; }
    .chip { fill: var(--chip); stroke: var(--line); stroke-width: 2; rx: 10; }
    .arrow { fill: none; stroke-width: 5; marker-end: url(#arrow); }
    .bi { marker-start: url(#arrowStart); }
    .addr { stroke: var(--addr); }
    .data { stroke: var(--data); }
    .ctrl { stroke: var(--ctrl); }
    .thin { stroke-width: 2.2; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="context-stroke" />
    </marker>
    <marker id="arrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M10 0 L0 5 L10 10 Z" fill="context-stroke" />
    </marker>
  </defs>
  <rect width="1120" height="560" fill="var(--bg)" />
  <text class="title" x="52" y="58">系统总线按信息内容分为三类</text>
  <text class="small" x="52" y="90">看系统总线时，优先问：这组线传什么、方向如何、根数意味着什么。</text>

  <rect class="chip" x="72" y="185" width="170" height="150" />
  <text class="label" x="157" y="250">CPU</text>
  <text class="small" x="112" y="285">发地址</text>
  <text class="small" x="112" y="307">发命令/收状态</text>

  <rect class="chip" x="878" y="150" width="180" height="110" />
  <text class="label" x="968" y="205">主存</text>
  <rect class="chip" x="878" y="310" width="180" height="110" />
  <text class="label" x="968" y="365">I/O 接口</text>

  <g>
    <path class="arrow addr" d="M245 185 H850" />
    <text class="h" x="330" y="164" fill="var(--addr)">地址总线</text>
    <text class="small" x="430" y="164">指出主存单元或 I/O 端口地址；通常由 CPU / 主设备发出</text>
  </g>

  <g>
    <path class="arrow data bi" d="M245 260 H850" />
    <text class="h" x="330" y="246" fill="var(--data)">数据总线</text>
    <text class="small" x="430" y="246">传送指令、操作数和结果；通常双向</text>
  </g>

  <g>
    <path class="arrow ctrl bi" d="M245 335 H850" />
    <text class="h" x="330" y="390" fill="var(--ctrl)">控制总线</text>
    <text class="small" x="430" y="390">CPU 发读写命令，主存或外设返回状态、应答、中断等反馈</text>
  </g>

  <g>
    <rect class="box" x="84" y="455" width="292" height="58" />
    <text class="small" x="104" y="480">数据总线宽度：影响一次能传多少数据，</text>
    <text class="small" x="104" y="502">与机器字长、存储字长有关。</text>
    <rect class="box" x="414" y="455" width="292" height="58" />
    <text class="small" x="434" y="480">地址总线宽度：决定可表达多少地址，</text>
    <text class="small" x="434" y="502">与主存地址空间和设备数量有关。</text>
    <rect class="box" x="744" y="455" width="292" height="58" />
    <text class="small" x="764" y="480">控制线：通常一根线对应一种控制</text>
    <text class="small" x="764" y="502">或状态信号。</text>
  </g>
</svg>
