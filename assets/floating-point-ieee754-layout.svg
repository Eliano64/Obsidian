<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">IEEE 754 floating-point layout</title>
  <desc id="desc">Single precision and double precision bit fields: sign, exponent, and fraction.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    .bg { fill: #f7f8f6; }
    .text { fill: #20242a; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    .muted { fill: #5b6570; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    .box { stroke: #20242a; stroke-width: 2; }
    .sign { fill: #f2c94c; }
    .exp { fill: #82bee8; }
    .frac { fill: #a8d8a1; }
    .special { fill: #f4a6a6; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #151719; }
      .text { fill: #edf0f2; }
      .muted { fill: #aeb7c0; }
      .box { stroke: #edf0f2; }
      .sign { fill: #8d6b1d; }
      .exp { fill: #235875; }
      .frac { fill: #3c7045; }
      .special { fill: #843b3b; }
    }
  </style>
  <rect class="bg" x="0" y="0" width="1080" height="520" rx="0"/>

  <text class="text" x="54" y="66" font-size="30" font-weight="700">IEEE 754 浮点数格式</text>
  <text class="muted" x="54" y="102" font-size="18">符号位决定正负，阶码决定数量级，尾数字段决定有效精度。</text>

  <text class="text" x="54" y="165" font-size="24" font-weight="700">单精度 float：32 bit</text>
  <rect class="box sign" x="54" y="190" width="74" height="72" rx="6"/>
  <rect class="box exp" x="128" y="190" width="224" height="72" rx="6"/>
  <rect class="box frac" x="352" y="190" width="620" height="72" rx="6"/>
  <text class="text" x="82" y="234" font-size="23" font-weight="700">S</text>
  <text class="text" x="204" y="234" font-size="23" font-weight="700">Exponent</text>
  <text class="text" x="592" y="234" font-size="23" font-weight="700">Fraction</text>
  <text class="muted" x="73" y="288" font-size="18">1 bit</text>
  <text class="muted" x="202" y="288" font-size="18">8 bit, bias = 127</text>
  <text class="muted" x="570" y="288" font-size="18">23 bit, 隐藏位用于规格化数</text>

  <text class="text" x="54" y="355" font-size="24" font-weight="700">双精度 double：64 bit</text>
  <rect class="box sign" x="54" y="380" width="54" height="72" rx="6"/>
  <rect class="box exp" x="108" y="380" width="190" height="72" rx="6"/>
  <rect class="box frac" x="298" y="380" width="674" height="72" rx="6"/>
  <text class="text" x="74" y="424" font-size="23" font-weight="700">S</text>
  <text class="text" x="154" y="424" font-size="23" font-weight="700">Exponent</text>
  <text class="text" x="584" y="424" font-size="23" font-weight="700">Fraction</text>
  <text class="muted" x="60" y="478" font-size="18">1 bit</text>
  <text class="muted" x="132" y="478" font-size="18">11 bit, bias = 1023</text>
  <text class="muted" x="570" y="478" font-size="18">52 bit, 隐藏位用于规格化数</text>
</svg>
