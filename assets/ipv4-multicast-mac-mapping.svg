<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="430" viewBox="0 0 1040 430" role="img" aria-labelledby="title desc">
  <title id="title">IPv4 multicast to Ethernet MAC mapping</title>
  <desc id="desc">IPv4 multicast address lower 23 bits map to Ethernet multicast MAC 01-00-5E plus 23 bits, so mapping is not unique.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2}
    .fixed{fill:#dbeafe}.bits{fill:#dcfce7}.lost{fill:#fee2e2}.head{fill:#e2e8f0}
    .line{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arr)}
    .label{font-size:21px;font-weight:700}.small{font-size:15px}.code{font-family:Consolas,monospace;font-size:16px}
    @media(prefers-color-scheme:dark){
      text{fill:#e5e7eb}.box{fill:#111827;stroke:#94a3b8}.fixed{fill:#10213f}.bits{fill:#0f2b1d}.lost{fill:#3b0d0d}.head{fill:#1f2937}.line{stroke:#60a5fa}
    }
  </style>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
  </defs>
  <text x="520" y="38" text-anchor="middle" class="label">IPv4 多播地址到以太网多播 MAC 的映射</text>
  <text x="70" y="101" class="small">IPv4 多播地址</text>
  <rect x="210" y="76" width="60" height="54" class="box head"/>
  <rect x="270" y="76" width="75" height="54" class="box lost"/>
  <rect x="345" y="76" width="345" height="54" class="box bits"/>
  <text x="240" y="108" text-anchor="middle" class="code">1110</text>
  <text x="307" y="99" text-anchor="middle" class="small">高 5 bit</text>
  <text x="307" y="118" text-anchor="middle" class="small">丢弃</text>
  <text x="517" y="108" text-anchor="middle" class="small">组号低 23 bit</text>
  <text x="210" y="150" class="small">bit 31</text>
  <text x="266" y="150" class="small">28</text>
  <text x="337" y="150" class="small">23</text>
  <text x="683" y="150" class="small">0</text>

  <path d="M517 137 L745 228" class="line"/>
  <text x="610" y="177" class="small">低 23 bit 原样复制</text>

  <text x="70" y="278" class="small">以太网多播 MAC</text>
  <rect x="210" y="246" width="360" height="58" class="box fixed"/>
  <rect x="570" y="246" width="18" height="58" class="box head"/>
  <rect x="588" y="246" width="345" height="58" class="box bits"/>
  <text x="390" y="281" text-anchor="middle" class="code">01-00-5E</text>
  <text x="579" y="281" text-anchor="middle" class="code">0</text>
  <text x="760" y="281" text-anchor="middle" class="small">IP 组号低 23 bit</text>
  <text x="210" y="325" class="small">bit 47</text>
  <text x="560" y="325" class="small">24</text>
  <text x="584" y="342" class="small">23</text>
  <text x="925" y="325" class="small">0</text>

  <rect x="205" y="365" width="630" height="38" rx="8" class="box"/>
  <text x="520" y="390" text-anchor="middle" class="small">28 bit 组号只保留低 23 bit：每 32 个 IP 多播地址可能映射到同一个 MAC 地址</text>
</svg>
