<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">CPU and main memory interface</title>
  <desc id="desc">CPU accesses main memory through MAR, MDR, address bus, data bus, and control signals.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 z" fill="#27354f"/>
    </marker>
    <marker id="arrowBoth" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 z" fill="#2f6f53"/>
    </marker>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      .bg { fill: #fbfcff; }
      .title { font: 700 26px "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .label { font: 700 18px "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .small { font: 400 14px "Microsoft YaHei", Arial, sans-serif; fill: #46556f; }
      .tiny { font: 400 12px "Microsoft YaHei", Arial, sans-serif; fill: #5c687b; }
      .box { fill: #ffffff; stroke: #92a1b8; stroke-width: 1.8; rx: 8; }
      .blue { fill: #eef6ff; stroke: #5f92d6; stroke-width: 2; rx: 8; }
      .green { fill: #effaf3; stroke: #62a87c; stroke-width: 2; rx: 8; }
      .amber { fill: #fff7e8; stroke: #d49a3a; stroke-width: 2; rx: 8; }
      .line { stroke: #27354f; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .data { stroke: #2f6f53; stroke-width: 2.4; fill: none; marker-end: url(#arrowBoth); }
      .dash { stroke: #7d8797; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      #arrow path { fill: #27354f; }
      #arrowBoth path { fill: #2f6f53; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #111827; }
        .title, .label { fill: #f3f4f6; }
        .small, .tiny { fill: #cbd5e1; }
        .box { fill: #1f2937; stroke: #64748b; }
        .blue { fill: #172554; stroke: #60a5fa; }
        .green { fill: #143525; stroke: #4ade80; }
        .amber { fill: #3b2a12; stroke: #f59e0b; }
        .line { stroke: #d1d5db; }
        .data { stroke: #4ade80; }
        .dash { stroke: #94a3b8; }
        #arrow path { fill: #d1d5db; }
        #arrowBoth path { fill: #4ade80; }
      }
    </style>
  </defs>
  <rect class="bg" width="980" height="520"/>
  <text class="title" x="48" y="52">CPU 与主存的基本接口</text>

  <rect class="blue" x="70" y="110" width="230" height="280"/>
  <text class="label" x="185" y="145" text-anchor="middle">CPU</text>
  <rect class="box" x="105" y="180" width="160" height="58"/>
  <text class="label" x="185" y="205" text-anchor="middle">MAR</text>
  <text class="small" x="185" y="226" text-anchor="middle">存放要访问的地址</text>
  <rect class="box" x="105" y="270" width="160" height="58"/>
  <text class="label" x="185" y="295" text-anchor="middle">MDR</text>
  <text class="small" x="185" y="316" text-anchor="middle">暂存读写数据</text>

  <rect class="amber" x="680" y="110" width="230" height="280"/>
  <text class="label" x="795" y="145" text-anchor="middle">主存</text>
  <rect class="box" x="720" y="180" width="150" height="155"/>
  <text class="label" x="795" y="213" text-anchor="middle">存储体</text>
  <text class="small" x="795" y="243" text-anchor="middle">许多带地址的</text>
  <text class="small" x="795" y="266" text-anchor="middle">存储单元</text>
  <text class="tiny" x="795" y="303" text-anchor="middle">一个地址选中一个单元</text>

  <path class="line" d="M265 209 L675 209"/>
  <text class="label" x="470" y="190" text-anchor="middle">地址总线</text>
  <text class="small" x="470" y="228" text-anchor="middle">地址线数决定可寻址范围</text>

  <path class="data" d="M680 299 L270 299"/>
  <path class="data" d="M270 311 L680 311"/>
  <text class="label" x="470" y="285" text-anchor="middle">数据总线</text>
  <text class="small" x="470" y="334" text-anchor="middle">宽度影响一次传送的数据量</text>

  <path class="dash" d="M300 372 L680 372"/>
  <text class="label" x="470" y="361" text-anchor="middle">控制线</text>
  <text class="small" x="470" y="395" text-anchor="middle">读 / 写 / 片选 / 使能</text>

  <rect class="green" x="290" y="430" width="400" height="48"/>
  <text class="small" x="490" y="460" text-anchor="middle">读：地址进入 MAR，主存把数据送入 MDR；写：地址进入 MAR，MDR 中数据写入目标单元</text>
</svg>
