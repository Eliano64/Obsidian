<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      text { font-family: Arial, "Microsoft YaHei", sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 13px; }
      .small { font-size: 11px; }
      .node { fill: #fff; stroke: #3b82f6; stroke-width: 1.5; }
      .node-root { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; }
      .node-tld { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.5; }
      .node-sld { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.3; }
      .node-3ld { fill: #f8fafc; stroke: #64748b; stroke-width: 1.1; }
      .edge { stroke: #94a3b8; stroke-width: 1; fill: none; }
      .example { font-size: 11px; fill: #059669; font-style: italic; }
      @media (prefers-color-scheme: dark) {
        .title { fill: #e6edf3; }
        .node { fill: #16212c; stroke: #3b82f6; }
        .node-root { fill: #2a1a1a; stroke: #f87171; }
        .node-tld { fill: #2a2410; stroke: #fbbf24; }
        .node-sld { fill: #1e293b; stroke: #3b82f6; }
        .node-3ld { fill: #16212c; stroke: #52616b; }
        .edge { stroke: #475569; }
        .example { fill: #10b981; }
        text { fill: #e6edf3; }
      }
    </style>
  </defs>

  <text x="450" y="24" text-anchor="middle" class="title">因特网域名空间（倒置树结构）</text>

  <!-- Root (invisible but conceptually there) -->
  <circle cx="450" cy="55" r="18" class="node-root"/>
  <text x="450" y="59" text-anchor="middle" class="label" font-weight="700" fill="#dc2626">根</text>
  <text x="450" y="84" text-anchor="middle" class="small" fill="#64748b">（无域名）</text>

  <!-- Edges from root to TLDs -->
  <path d="M435,70 L180,110" class="edge"/>
  <path d="M440,70 L300,110" class="edge"/>
  <path d="M445,70 L400,110" class="edge"/>
  <path d="M450,70 L500,110" class="edge"/>
  <path d="M455,70 L600,110" class="edge"/>
  <path d="M460,70 L700,110" class="edge"/>
  <path d="M465,70 L800,110" class="edge"/>

  <!-- TLDs -->
  <rect x="120" y="110" width="80" height="36" rx="5" class="node-tld"/>
  <text x="160" y="132" text-anchor="middle" class="label" font-weight="700" fill="#a16207">com</text>

  <rect x="240" y="110" width="80" height="36" rx="5" class="node-tld"/>
  <text x="280" y="132" text-anchor="middle" class="label" font-weight="700" fill="#a16207">net</text>

  <rect x="350" y="110" width="80" height="36" rx="5" class="node-tld"/>
  <text x="390" y="132" text-anchor="middle" class="label" font-weight="700" fill="#a16207">org</text>

  <rect x="450" y="110" width="80" height="36" rx="5" class="node-tld"/>
  <text x="490" y="132" text-anchor="middle" class="label" font-weight="700" fill="#a16207">cn</text>

  <rect x="550" y="110" width="80" height="36" rx="5" class="node-tld"/>
  <text x="590" y="132" text-anchor="middle" class="label" font-weight="700" fill="#a16207">edu</text>

  <rect x="650" y="110" width="80" height="36" rx="5" class="node-tld"/>
  <text x="690" y="132" text-anchor="middle" class="label" font-weight="700" fill="#a16207">gov</text>

  <rect x="750" y="110" width="80" height="36" rx="5" class="node-tld"/>
  <text x="790" y="132" text-anchor="middle" class="label" font-weight="700" fill="#a16207">mil</text>

  <!-- TLD labels -->
  <text x="160" y="160" text-anchor="middle" class="small" fill="#64748b">通用 TLD</text>
  <text x="280" y="160" text-anchor="middle" class="small" fill="#64748b">通用 TLD</text>
  <text x="490" y="160" text-anchor="middle" class="small" fill="#64748b">国家 TLD</text>

  <!-- Edges from cn to second-level -->
  <path d="M475,146 L460,200" class="edge"/>
  <path d="M490,146 L520,200" class="edge"/>
  <path d="M500,146 L620,200" class="edge"/>

  <!-- China second-level domains -->
  <rect x="390" y="200" width="80" height="36" rx="5" class="node-sld"/>
  <text x="430" y="222" text-anchor="middle" class="label" font-weight="700" fill="#2563eb">com</text>

  <rect x="480" y="200" width="80" height="36" rx="5" class="node-sld"/>
  <text x="520" y="222" text-anchor="middle" class="label" font-weight="700" fill="#2563eb">edu</text>

  <rect x="570" y="200" width="80" height="36" rx="5" class="node-sld"/>
  <text x="610" y="222" text-anchor="middle" class="label" font-weight="700" fill="#2563eb">gov</text>

  <text x="430" y="250" text-anchor="middle" class="small" fill="#64748b">cn 二级</text>
  <text x="520" y="250" text-anchor="middle" class="small" fill="#64748b">cn 二级</text>

  <!-- Edges from cn.edu and cn.com to third-level -->
  <path d="M505,236 L480,300" class="edge"/>
  <path d="M530,236 L530,300" class="edge"/>
  <path d="M430,236 L360,300" class="edge"/>

  <!-- Third-level domains -->
  <rect x="430" y="300" width="100" height="36" rx="5" class="node-3ld"/>
  <text x="480" y="320" text-anchor="middle" class="label" fill="#334155">tsinghua</text>
  <text x="480" y="350" text-anchor="middle" class="example">tsinghua.edu.cn</text>

  <rect x="540" y="300" width="90" height="36" rx="5" class="node-3ld"/>
  <text x="585" y="320" text-anchor="middle" class="label" fill="#334155">pku</text>
  <text x="585" y="350" text-anchor="middle" class="example">pku.edu.cn</text>

  <rect x="310" y="300" width="100" height="36" rx="5" class="node-3ld"/>
  <text x="360" y="320" text-anchor="middle" class="label" fill="#334155">cctv</text>
  <text x="360" y="350" text-anchor="middle" class="example">cctv.com.cn</text>

  <!-- Edges from com TLD to second-level companies -->
  <path d="M145,146 L120,200" class="edge"/>
  <path d="M165,146 L180,200" class="edge"/>

  <rect x="80" y="200" width="80" height="36" rx="5" class="node-sld"/>
  <text x="120" y="222" text-anchor="middle" class="label" font-weight="700" fill="#2563eb">cctv</text>

  <rect x="170" y="200" width="80" height="36" rx="5" class="node-sld"/>
  <text x="210" y="222" text-anchor="middle" class="label" font-weight="700" fill="#2563eb">ibm</text>

  <text x="120" y="250" text-anchor="middle" class="small" fill="#64748b">com 二级</text>

  <!-- Third-level under cctv.com -->
  <path d="M120,236 L120,300" class="edge"/>
  <rect x="70" y="300" width="100" height="36" rx="5" class="node-3ld"/>
  <text x="120" y="320" text-anchor="middle" class="label" fill="#334155">mail</text>
  <text x="120" y="350" text-anchor="middle" class="example">mail.cctv.com</text>

  <!-- Right side annotation box -->
  <rect x="670" y="195" width="210" height="195" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <style>
    @media (prefers-color-scheme: dark) { rect[fill="#f8fafc"] { fill: #16212c; stroke: #334155; } }
  </style>
  <text x="685" y="218" class="label" font-weight="700" fill="#1e293b">域名规则</text>
  <text x="685" y="242" class="small" fill="#334155">• 级别最低写在最左边</text>
  <text x="685" y="262" class="small" fill="#334155">• 级别最高写在最右边</text>
  <text x="685" y="282" class="small" fill="#334155">• 各分量间用 . 分隔</text>
  <text x="685" y="308" class="label" font-weight="700" fill="#1e293b">注意</text>
  <text x="685" y="332" class="small" fill="#334155">com 既是通用 TLD</text>
  <text x="685" y="350" class="small" fill="#334155">也是 cn 下的二级域名</text>
  <text x="685" y="370" class="small" fill="#334155">域名 ≠ 物理位置</text>

  <!-- Bottom: nTLD, gTLD, arpa legend -->
  <rect x="30" y="415" width="840" height="95" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <style>
    @media (prefers-color-scheme: dark) { rect[fill="#f8fafc"] { fill: #16212c; stroke: #334155; } }
  </style>
  <text x="450" y="440" text-anchor="middle" class="label" font-weight="700" fill="#1e293b">顶级域名 TLD 三类</text>
  <text x="60" y="465" class="label" fill="#334155"><tspan font-weight="700" fill="#a16207">nTLD 国家顶级域名</tspan>：按 ISO 3166 规定，如 cn（中国）、us（美国）、uk（英国）</text>
  <text x="60" y="485" class="label" fill="#334155"><tspan font-weight="700" fill="#a16207">gTLD 通用顶级域名</tspan>：com、net、org、int、edu、gov、mil</text>
  <text x="60" y="503" class="label" fill="#334155"><tspan font-weight="700" fill="#a16207">arpa 反向域</tspan>：用于 IP 地址反向解析为域名</text>
</svg>
