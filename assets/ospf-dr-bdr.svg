<svg xmlns="http://www.w3.org/2000/svg" width="920" height="410" viewBox="0 0 920 410" role="img" aria-labelledby="title desc">
  <title id="title">OSPF DR and BDR on a multi-access network</title>
  <desc id="desc">Ordinary OSPF routers form adjacencies with DR and BDR instead of every router with every other router.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .bus { stroke: #475569; stroke-width: 5; }
    .node { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
    .dr { fill: #fff7ed; stroke: #ea580c; }
    .bdr { fill: #eff6ff; stroke: #2563eb; }
    .adj { stroke: #64748b; stroke-width: 2.2; fill: none; stroke-dasharray: 8 6; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .bus { stroke: #cbd5e1; }
      .node { fill: #111827; stroke: #94a3b8; }
      .dr { fill: #2b1708; stroke: #fb923c; }
      .bdr { fill: #10213f; stroke: #60a5fa; }
      .adj { stroke: #94a3b8; }
    }
  </style>
  <text x="460" y="38" text-anchor="middle" class="label">多点接入网络中的 DR/BDR</text>
  <line x1="115" y1="220" x2="805" y2="220" class="bus"/>
  <rect x="90" y="90" width="105" height="64" class="node"/><text x="142" y="128" text-anchor="middle" class="small">R1</text>
  <rect x="245" y="90" width="105" height="64" class="node dr"/><text x="297" y="118" text-anchor="middle" class="small">R2</text><text x="297" y="139" text-anchor="middle" class="small">DR</text>
  <rect x="400" y="90" width="105" height="64" class="node bdr"/><text x="452" y="118" text-anchor="middle" class="small">R3</text><text x="452" y="139" text-anchor="middle" class="small">BDR</text>
  <rect x="555" y="90" width="105" height="64" class="node"/><text x="607" y="128" text-anchor="middle" class="small">R4</text>
  <rect x="710" y="90" width="105" height="64" class="node"/><text x="762" y="128" text-anchor="middle" class="small">R5</text>
  <path d="M142 154 V220 M297 154 V220 M452 154 V220 M607 154 V220 M762 154 V220" class="adj"/>
  <path d="M142 154 C180 260, 255 260, 297 154" class="adj"/>
  <path d="M142 154 C230 315, 370 315, 452 154" class="adj"/>
  <path d="M607 154 C565 260, 492 260, 452 154" class="adj"/>
  <path d="M762 154 C690 315, 525 315, 452 154" class="adj"/>
  <path d="M607 154 C555 250, 355 250, 297 154" class="adj"/>
  <path d="M762 154 C690 280, 385 280, 297 154" class="adj"/>
  <text x="460" y="305" text-anchor="middle" class="small">普通路由器主要与 DR/BDR 建立邻接关系，减少多点接入网络中的同步和洪泛开销</text>
  <text x="460" y="335" text-anchor="middle" class="small">DR 负责代表该网络与其他路由器交换链路状态；BDR 作为备份</text>
</svg>
