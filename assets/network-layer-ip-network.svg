<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">异构网络经 IP 层互联</title>
  <desc id="desc">多个底层实现不同的网络通过路由器互联，网络层用统一 IP 地址和转发规则屏蔽链路差异。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    .bg { fill: #f8fafc; }
    .iparea { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; stroke-dasharray: 9 7; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .router { fill: #fff7ed; stroke: #f97316; stroke-width: 2.3; }
    .host { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; }
    .link { stroke: #475569; stroke-width: 3; fill: none; stroke-linecap: round; }
    .wan { stroke: #64748b; stroke-width: 3; fill: none; stroke-dasharray: 7 6; }
    .text { fill: #0f172a; font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-size: 18px; }
    .small { fill: #334155; font-size: 15px; }
    .title { fill: #0f172a; font-size: 26px; font-weight: 700; }
    .label { fill: #0369a1; font-size: 19px; font-weight: 700; }
    .note { fill: #0e7490; font-size: 16px; font-weight: 700; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #020617; }
      .iparea { fill: #083344; stroke: #22d3ee; }
      .panel { fill: #0f172a; stroke: #334155; }
      .router { fill: #431407; stroke: #fb923c; }
      .host { fill: #1e1b4b; stroke: #818cf8; }
      .link { stroke: #94a3b8; }
      .wan { stroke: #94a3b8; }
      .text { fill: #e5e7eb; }
      .small { fill: #cbd5e1; }
      .title { fill: #f8fafc; }
      .label { fill: #67e8f9; }
      .note { fill: #67e8f9; }
    }
  </style>
  <rect class="bg" width="980" height="540"/>
  <text class="title" x="490" y="42" text-anchor="middle">网络层把异构网络连成一个 IP 网</text>

  <rect class="iparea" x="70" y="80" width="840" height="390" rx="26"/>
  <text class="note" x="490" y="500" text-anchor="middle">IP 层统一使用 IP 地址和分组转发规则；链路层差异留在各段网络内部处理</text>

  <rect class="panel" x="105" y="128" width="205" height="128" rx="10"/>
  <text class="label" x="207" y="158" text-anchor="middle">以太网</text>
  <text class="small" x="207" y="184" text-anchor="middle">MAC 地址、以太网帧</text>
  <rect class="host" x="135" y="205" width="58" height="36" rx="7"/>
  <text class="text small" x="164" y="228" text-anchor="middle">H1</text>
  <rect class="host" x="222" y="205" width="58" height="36" rx="7"/>
  <text class="text small" x="251" y="228" text-anchor="middle">H2</text>
  <line class="link" x1="193" y1="223" x2="222" y2="223"/>

  <rect class="panel" x="670" y="128" width="205" height="128" rx="10"/>
  <text class="label" x="772" y="158" text-anchor="middle">无线局域网</text>
  <text class="small" x="772" y="184" text-anchor="middle">无线帧、接入点</text>
  <rect class="host" x="700" y="205" width="58" height="36" rx="7"/>
  <text class="text small" x="729" y="228" text-anchor="middle">H3</text>
  <rect class="host" x="787" y="205" width="58" height="36" rx="7"/>
  <text class="text small" x="816" y="228" text-anchor="middle">H4</text>
  <line class="link" x1="758" y1="223" x2="787" y2="223"/>

  <rect class="panel" x="388" y="330" width="205" height="106" rx="10"/>
  <text class="label" x="490" y="360" text-anchor="middle">点对点 / WAN 链路</text>
  <text class="small" x="490" y="392" text-anchor="middle">另一种链路层协议</text>

  <rect class="router" x="370" y="165" width="88" height="60" rx="12"/>
  <text class="text" x="414" y="202" text-anchor="middle">R1</text>
  <rect class="router" x="522" y="165" width="88" height="60" rx="12"/>
  <text class="text" x="566" y="202" text-anchor="middle">R2</text>
  <rect class="router" x="446" y="274" width="88" height="60" rx="12"/>
  <text class="text" x="490" y="311" text-anchor="middle">R3</text>

  <line class="link" x1="310" y1="194" x2="370" y2="194"/>
  <line class="link" x1="458" y1="194" x2="522" y2="194"/>
  <line class="link" x1="610" y1="194" x2="670" y2="194"/>
  <line class="wan" x1="414" y1="225" x2="458" y2="274"/>
  <line class="wan" x1="566" y1="225" x2="522" y2="274"/>
  <line class="wan" x1="490" y1="334" x2="490" y2="330"/>

  <text class="small" x="490" y="96" text-anchor="middle">对 IP 层而言，它们都只是可达的网络；路由器负责在网络之间转发 IP 分组</text>
</svg>
