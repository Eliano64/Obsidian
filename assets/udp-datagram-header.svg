<svg xmlns="http://www.w3.org/2000/svg" width="980" height="330" viewBox="0 0 980 330" role="img" aria-labelledby="title desc">
  <title id="title">UDP datagram header</title>
  <desc id="desc">UDP header has four 16-bit fields: source port, destination port, length, and checksum.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2}.head{fill:#dbeafe}.data{fill:#dcfce7}
    .label{font-size:22px;font-weight:700}.small{font-size:15px}.mid{font-size:18px;font-weight:700}.code{font-family:Consolas,monospace;font-size:15px}
    @media(prefers-color-scheme:dark){text{fill:#e5e7eb}.box{fill:#111827;stroke:#94a3b8}.head{fill:#10213f}.data{fill:#0f2b1d}}
  </style>
  <text x="490" y="38" text-anchor="middle" class="label">UDP 用户数据报格式</text>
  <text x="150" y="86" class="small">每行 32 bit</text>
  <rect x="170" y="105" width="320" height="62" class="box head"/>
  <rect x="490" y="105" width="320" height="62" class="box head"/>
  <rect x="170" y="167" width="320" height="62" class="box head"/>
  <rect x="490" y="167" width="320" height="62" class="box head"/>
  <text x="330" y="141" text-anchor="middle" class="mid">源端口</text>
  <text x="650" y="141" text-anchor="middle" class="mid">目的端口</text>
  <text x="330" y="203" text-anchor="middle" class="mid">长度</text>
  <text x="650" y="203" text-anchor="middle" class="mid">检验和</text>
  <text x="330" y="158" text-anchor="middle" class="code">16 bit</text>
  <text x="650" y="158" text-anchor="middle" class="code">16 bit</text>
  <text x="330" y="220" text-anchor="middle" class="code">16 bit</text>
  <text x="650" y="220" text-anchor="middle" class="code">16 bit</text>
  <rect x="170" y="250" width="640" height="42" rx="8" class="box data"/>
  <text x="490" y="277" text-anchor="middle" class="small">数据载荷：应用报文内容</text>
  <text x="490" y="318" text-anchor="middle" class="small">UDP 首部固定 8 B；长度字段 = 首部 8 B + 数据载荷长度</text>
</svg>
