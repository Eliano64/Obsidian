<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc"><title id="title">ARP 逐链路使用</title><desc id="desc">跨多个网络时，每一段链路分别使用 ARP 获取下一跳 MAC 地址。</desc><style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}
:root{color-scheme:light dark}.bg{fill:#f8fafc}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:18px}.small{fill:#334155;font-size:15px}.host{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.router{fill:#fed7aa;stroke:#f97316;stroke-width:2}.seg{fill:#fff;stroke:#cbd5e1;stroke-width:2}.line{stroke:#64748b;stroke-width:3}.label{fill:#0369a1;font-weight:700}@media(prefers-color-scheme:dark){.bg{fill:#020617}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.host{fill:#172554;stroke:#60a5fa}.router{fill:#431407;stroke:#fb923c}.seg{fill:#0f172a;stroke:#334155}.line{stroke:#94a3b8}.label{fill:#67e8f9}}</style><rect class="bg" width="1100" height="360"/><text class="text" x="550" y="42" text-anchor="middle" font-size="25" font-weight="700">ARP 不能跨网络，只在每一段链路上解析下一跳 MAC</text><g transform="translate(80,120)"><rect class="host" x="0" y="20" width="85" height="52" rx="8"/><text class="text" x="42" y="53" text-anchor="middle">H1</text><rect class="router" x="270" y="20" width="85" height="52" rx="8"/><text class="text" x="312" y="53" text-anchor="middle">R1</text><rect class="router" x="580" y="20" width="85" height="52" rx="8"/><text class="text" x="622" y="53" text-anchor="middle">R2</text><rect class="host" x="890" y="20" width="85" height="52" rx="8"/><text class="text" x="932" y="53" text-anchor="middle">H2</text><line class="line" x1="85" y1="46" x2="270" y2="46"/><line class="line" x1="355" y1="46" x2="580" y2="46"/><line class="line" x1="665" y1="46" x2="890" y2="46"/><rect class="seg" x="95" y="110" width="165" height="70" rx="8"/><text class="small" x="177" y="140" text-anchor="middle">H1 查 R1 接口 MAC</text><text class="label" x="177" y="165" text-anchor="middle">第 1 次 ARP</text><rect class="seg" x="385" y="110" width="165" height="70" rx="8"/><text class="small" x="467" y="140" text-anchor="middle">R1 查 R2 接口 MAC</text><text class="label" x="467" y="165" text-anchor="middle">第 2 次 ARP</text><rect class="seg" x="695" y="110" width="165" height="70" rx="8"/><text class="small" x="777" y="140" text-anchor="middle">R2 查 H2 的 MAC</text><text class="label" x="777" y="165" text-anchor="middle">第 3 次 ARP</text></g></svg>
