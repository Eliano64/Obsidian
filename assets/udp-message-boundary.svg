<svg xmlns="http://www.w3.org/2000/svg" width="980" height="380" viewBox="0 0 980 380" role="img" aria-labelledby="title desc">
  <title id="title">UDP message boundary</title>
  <desc id="desc">UDP preserves application message boundaries: each application message maps to one UDP datagram.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2}.msg{fill:#fef3c7;stroke:#d97706}.udp{fill:#dcfce7;stroke:#16a34a}.line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arr)}
    .label{font-size:22px;font-weight:700}.small{font-size:15px}.mid{font-size:17px;font-weight:700}
    @media(prefers-color-scheme:dark){text{fill:#e5e7eb}.box{fill:#111827;stroke:#94a3b8}.msg{fill:#3b2506;stroke:#fbbf24}.udp{fill:#0f2b1d;stroke:#4ade80}.line{stroke:#94a3b8}}
  </style>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <text x="490" y="38" text-anchor="middle" class="label">UDP 保留应用报文边界</text>
  <text x="140" y="95" class="mid">发送方应用</text>
  <rect x="110" y="120" width="110" height="48" rx="8" class="msg"/><text x="165" y="150" text-anchor="middle" class="small">报文 1</text>
  <rect x="110" y="185" width="150" height="48" rx="8" class="msg"/><text x="185" y="215" text-anchor="middle" class="small">报文 2</text>
  <rect x="110" y="250" width="90" height="48" rx="8" class="msg"/><text x="155" y="280" text-anchor="middle" class="small">报文 3</text>
  <text x="410" y="95" class="mid">UDP 封装</text>
  <rect x="360" y="120" width="185" height="48" rx="8" class="udp"/><text x="452" y="150" text-anchor="middle" class="small">UDP 数据报 1</text>
  <rect x="360" y="185" width="225" height="48" rx="8" class="udp"/><text x="472" y="215" text-anchor="middle" class="small">UDP 数据报 2</text>
  <rect x="360" y="250" width="165" height="48" rx="8" class="udp"/><text x="442" y="280" text-anchor="middle" class="small">UDP 数据报 3</text>
  <text x="705" y="95" class="mid">接收方应用</text>
  <rect x="690" y="120" width="110" height="48" rx="8" class="msg"/><text x="745" y="150" text-anchor="middle" class="small">报文 1</text>
  <rect x="690" y="185" width="150" height="48" rx="8" class="msg"/><text x="765" y="215" text-anchor="middle" class="small">报文 2</text>
  <rect x="690" y="250" width="90" height="48" rx="8" class="msg"/><text x="735" y="280" text-anchor="middle" class="small">报文 3</text>
  <path d="M220 144 L360 144 M260 209 L360 209 M200 274 L360 274 M545 144 L690 144 M585 209 L690 209 M525 274 L690 274" class="line"/>
  <text x="490" y="345" text-anchor="middle" class="small">一份应用报文对应一个 UDP 用户数据报；接收端按数据报边界向上交付</text>
</svg>
