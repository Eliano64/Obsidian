<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Packet Store Forward Delay</title><style>
:root{--bg:#fff;--panel:#f8fafc;--line:#cbd5e1;--text:#172033;--muted:#64748b;--blue:#dbeafe;--bl:#2563eb;--green:#dcfce7;--gl:#16a34a;--amber:#fef3c7;--al:#d97706;--red:#fee2e2;--rl:#dc2626}@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#1e3a8a;--bl:#60a5fa;--green:#14532d;--gl:#4ade80;--amber:#713f12;--al:#fbbf24;--red:#7f1d1d;--rl:#f87171}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.deck{min-height:760px;padding:28px 34px 24px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}header{display:flex;justify-content:space-between;align-items:end}h1{margin:0;font-size:30px}.step{color:var(--muted);font-size:18px}.stage{display:grid;grid-template-columns:1.25fr .85fr;gap:22px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;min-height:540px}svg{width:100%;height:535px}.grid{stroke:var(--line);stroke-width:1}.axis{stroke:var(--muted);stroke-width:2}.send{fill:var(--green);stroke:var(--gl);stroke-width:2}.prop{fill:var(--amber);stroke:var(--al);stroke-width:2}.hi{stroke-width:4}.faded{opacity:.18}text{fill:var(--text);font-family:inherit}.label{font-size:16px;font-weight:700}.small{font-size:13px;fill:var(--muted)}h2{margin:0 0 14px;font-size:25px}p{margin:0 0 13px;font-size:20px;line-height:1.55}.formula{font-family:Consolas,"Courier New",monospace;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:10px;font-size:17px;line-height:1.55;white-space:pre-wrap}.controls{display:flex;justify-content:center;gap:10px}button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:9px 14px;font-size:16px;cursor:pointer}</style></head><body><div class="deck"><header><h1>多跳存储转发时延</h1><div id="stepLabel" class="step"></div></header><main class="stage"><section class="panel"><svg viewBox="0 0 720 535">
<line x1="90" y1="70" x2="680" y2="70" class="axis"/><line x1="90" y1="170" x2="680" y2="170" class="axis"/><line x1="90" y1="270" x2="680" y2="270" class="axis"/><line x1="90" y1="370" x2="680" y2="370" class="axis"/>
<text x="30" y="76" class="label">源主机</text><text x="35" y="176" class="label">R1</text><text x="35" y="276" class="label">R2</text><text x="22" y="376" class="label">目的主机</text>
<text x="90" y="35" class="small">时间向右</text>
<g id="p1"><rect x="110" y="58" width="90" height="24" rx="5" class="send"/><polygon points="110,82 200,82 250,170 160,170" class="prop"/><rect x="250" y="158" width="90" height="24" rx="5" class="send"/><polygon points="250,182 340,182 390,270 300,270" class="prop"/><rect x="390" y="258" width="90" height="24" rx="5" class="send"/><polygon points="390,282 480,282 530,370 440,370" class="prop"/><text x="135" y="55" class="small">P1</text></g>
<g id="p2"><rect x="200" y="58" width="90" height="24" rx="5" class="send"/><polygon points="200,82 290,82 340,170 250,170" class="prop"/><rect x="340" y="158" width="90" height="24" rx="5" class="send"/><polygon points="340,182 430,182 480,270 390,270" class="prop"/><rect x="480" y="258" width="90" height="24" rx="5" class="send"/><polygon points="480,282 570,282 620,370 530,370" class="prop"/><text x="225" y="55" class="small">P2</text></g>
<g id="p3"><rect x="290" y="58" width="90" height="24" rx="5" class="send"/><polygon points="290,82 380,82 430,170 340,170" class="prop"/><rect x="430" y="158" width="90" height="24" rx="5" class="send"/><polygon points="430,182 520,182 570,270 480,270" class="prop"/><rect x="570" y="258" width="90" height="24" rx="5" class="send"/><polygon points="570,282 660,282 710,370 620,370" class="prop"/><text x="315" y="55" class="small">P3</text></g>
<rect x="110" y="420" width="90" height="24" rx="5" class="send"/><text x="155" y="464" class="small">发送时延 dt：把整个分组推上链路</text>
<polygon points="420,420 510,420 560,480 470,480" class="prop"/><line x1="420" y1="496" x2="470" y2="496" class="axis"/><text x="494" y="520" class="small">传播时延 dp：对应比特从一端到另一端</text>
</svg></section><section class="panel"><h2 id="title"></h2><p id="body1"></p><p id="body2"></p><div id="formula" class="formula"></div></section></main><nav class="controls"><button id="prev">上一步</button><button id="next">下一步</button></nav></div><script>
const groups=["p1","p2","p3"];
const steps=[
{t:"源主机连续发送多个分组",b1:"每个绿色矩形表示一个分组的发送时延。源主机发送完 P1 后，可以立刻发送 P2。",b2:"分组越小，流水线越容易形成。",f:"源主机发送 m 个分组：m * dt",hi:["p1","p2","p3"]},
{t:"路由器必须存储转发",b1:"路由器收到完整分组后，才能开始向下一跳发送该分组。",b2:"因此，每经过一个路由器，就会额外补上一段发送时延。",f:"经过 n 个路由器：额外 n * dt",hi:["p1"]},
{t:"传播时延按链路段计算",b1:"黄色斜块表示一个完整分组在链路上传播；它的横向宽度仍对应这个分组的发送时延。",b2:"传播时延看对应比特从链路一端到另一端要多久，源主机到第一个路由器、路由器之间、最后一个路由器到目的主机都要计算。",f:"经过 n 个路由器，共 n + 1 段链路： (n + 1) * dp",hi:["p2"]},
{t:"总时延公式",b1:"不考虑排队时延和处理时延，且各段发送时延、传播时延相同。",b2:"源主机发送 m 个分组，加上 n 个路由器转发补上的发送时延，再加上 n+1 段传播时延。",f:"D = (m + n) * dt + (n + 1) * dp",hi:["p1","p2","p3"]},
{t:"不要重复计算流水线中的发送",b1:"中间路由器转发 P1 时，源主机可能已经在发送 P2。",b2:"所以不能简单把“每个路由器转发 m 个分组”全部串行相加。",f:"关键：看最后一个分组最后一个比特何时到达。",hi:["p3"]}
];
let i=Math.min(Math.max((Number(new URLSearchParams(location.search).get("step"))||1)-1,0),steps.length-1);
function render(){const s=steps[i];stepLabel.textContent=`${i+1} / ${steps.length}`;title.textContent=s.t;body1.textContent=s.b1;body2.textContent=s.b2;formula.textContent=s.f;groups.forEach(id=>{const el=document.getElementById(id);el.classList.remove("faded","hi");if(!s.hi.includes(id))el.classList.add("faded");else el.classList.add("hi")})}prev.onclick=()=>{i=Math.max(0,i-1);render()};next.onclick=()=>{i=Math.min(steps.length-1,i+1);render()};render();
</script></body></html>
