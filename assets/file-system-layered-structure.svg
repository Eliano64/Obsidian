<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580" role="img" aria-labelledby="title desc">
  <title id="title">File System Layered Structure</title>
  <desc id="desc">Layered file system structure from user interface to device management.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706;--purple:#7c3aed}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24;--purple:#c084fc}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--blue);stroke-width:3;fill:none;marker-end:url(#arrow)}.chip{fill:var(--blue);opacity:.12;stroke:var(--blue);stroke-width:1.5}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"/></marker></defs>
  <rect class="bg" width="980" height="580"/>
  <text class="t" x="490" y="38" text-anchor="middle" font-size="24" font-weight="700">文件系统的层次结构</text>
  <text class="m" x="490" y="66" text-anchor="middle" font-size="15">路径名、权限、逻辑地址、物理地址和磁盘 I/O 分层处理</text>
  <g transform="translate(180,98)">
    <rect class="box" x="0" y="0" width="660" height="54" rx="8"/><text class="t" x="220" y="34" text-anchor="middle" font-size="17" font-weight="700">用户接口</text><text class="m" x="440" y="34" text-anchor="middle" font-size="14">read / write / open / close</text>
    <rect class="box" x="0" y="68" width="660" height="54" rx="8"/><text class="t" x="220" y="102" text-anchor="middle" font-size="17" font-weight="700">文件目录系统</text><text class="m" x="440" y="102" text-anchor="middle" font-size="14">按路径查找 FCB / inode</text>
    <rect class="box" x="0" y="136" width="660" height="54" rx="8"/><text class="t" x="220" y="170" text-anchor="middle" font-size="17" font-weight="700">存取控制模块</text><text class="m" x="440" y="170" text-anchor="middle" font-size="14">验证访问权限</text>
    <rect class="box" x="0" y="204" width="660" height="54" rx="8"/><text class="t" x="220" y="238" text-anchor="middle" font-size="17" font-weight="700">逻辑文件系统与文件信息缓冲区</text><text class="m" x="440" y="238" text-anchor="middle" font-size="14">记录号 -> 逻辑地址</text>
    <rect class="box" x="0" y="272" width="660" height="54" rx="8"/><text class="t" x="220" y="306" text-anchor="middle" font-size="17" font-weight="700">物理文件系统</text><text class="m" x="440" y="306" text-anchor="middle" font-size="14">逻辑块号 -> 物理块号</text>
    <rect class="box" x="0" y="340" width="660" height="54" rx="8"/><text class="t" x="220" y="374" text-anchor="middle" font-size="17" font-weight="700">设备管理模块</text><text class="m" x="440" y="374" text-anchor="middle" font-size="14">磁盘调度、启动设备</text>
    <rect class="box" x="0" y="408" width="660" height="54" rx="8"/><text class="t" x="220" y="442" text-anchor="middle" font-size="17" font-weight="700">辅助分配模块</text><text class="m" x="440" y="442" text-anchor="middle" font-size="14">分配/回收磁盘块</text>
    <path class="a" d="M330 54 V68"/><path class="a" d="M330 122 V136"/><path class="a" d="M330 190 V204"/><path class="a" d="M330 258 V272"/><path class="a" d="M330 326 V340"/><path class="a" d="M330 394 V408"/>
  </g>
  <rect class="chip" x="50" y="112" width="110" height="70" rx="10"/><text class="t" x="105" y="143" text-anchor="middle" font-size="16">用户进程</text><text class="m" x="105" y="166" text-anchor="middle" font-size="13">路径 + 操作</text>
  <path class="a" d="M160 147 H178"/>
  <rect class="chip" x="855" y="440" width="90" height="66" rx="10"/><text class="t" x="900" y="468" text-anchor="middle" font-size="15">磁盘设备</text><text class="m" x="900" y="490" text-anchor="middle" font-size="12">块读写</text>
  <path class="a" d="M840 462 H855"/>
</svg>
