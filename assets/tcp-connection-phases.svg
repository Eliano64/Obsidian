<svg xmlns="http://www.w3.org/2000/svg" width="980" height="240" viewBox="0 0 980 240" role="img" aria-labelledby="title desc">
  <title id="title">TCP connection phases</title>
  <desc id="desc">TCP connection has establishment, data transfer and release phases.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.a{fill:#dbeafe}.b{fill:#dcfce7}.c{fill:#fee2e2}.line{stroke:#64748b;stroke-width:3;marker-end:url(#arr)}.label{font-size:22px;font-weight:700}.small{font-size:15px}.mid{font-size:18px;font-weight:700}
    @media(prefers-color-scheme:dark){text{fill:#e5e7eb}.box{fill:#111827;stroke:#94a3b8}.a{fill:#10213f}.b{fill:#0f2b1d}.c{fill:#3b0d0d}.line{stroke:#94a3b8}}
  </style>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <text x="490" y="38" text-anchor="middle" class="label">TCP 连接的三个阶段</text>
  <rect x="115" y="95" width="190" height="70" rx="10" class="box a"/><text x="210" y="123" text-anchor="middle" class="mid">建立连接</text><text x="210" y="148" text-anchor="middle" class="small">三报文握手</text>
  <line x1="315" y1="130" x2="405" y2="130" class="line"/>
  <rect x="415" y="95" width="190" height="70" rx="10" class="box b"/><text x="510" y="123" text-anchor="middle" class="mid">数据传输</text><text x="510" y="148" text-anchor="middle" class="small">全双工字节流</text>
  <line x1="615" y1="130" x2="705" y2="130" class="line"/>
  <rect x="715" y="95" width="190" height="70" rx="10" class="box c"/><text x="810" y="123" text-anchor="middle" class="mid">释放连接</text><text x="810" y="148" text-anchor="middle" class="small">四报文挥手</text>
</svg>
