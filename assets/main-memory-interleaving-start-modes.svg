<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="610" viewBox="0 0 1080 610" role="img" aria-labelledby="title desc">
  <title id="title">Low-order interleaving start modes</title><desc id="desc">Low-order interleaved memory can start modules simultaneously or start them in a staggered pipeline every bus cycle.</desc>
  <defs><style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}
.bg{fill:#fbfcff}.title{font:700 26px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.h{font:700 17px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.t{font:400 13px "Microsoft YaHei",Arial,sans-serif;fill:#40506a}.panel{fill:#fff;stroke:#9aa9bd;stroke-width:1.7;rx:10}.m0{fill:#eef6ff;stroke:#5f92d6}.m1{fill:#effaf3;stroke:#62a87c}.m2{fill:#fff7e8;stroke:#d49a3a}.m3{fill:#fff1f1;stroke:#c77777}.bar{stroke-width:1.4;rx:5}.axis{stroke:#27354f;stroke-width:2}@media(prefers-color-scheme:dark){.bg{fill:#111827}.title,.h{fill:#f3f4f6}.t{fill:#cbd5e1}.panel{fill:#1f2937;stroke:#64748b}.m0{fill:#172554;stroke:#60a5fa}.m1{fill:#143525;stroke:#4ade80}.m2{fill:#3b2a12;stroke:#f59e0b}.m3{fill:#3b1d1d;stroke:#f87171}.axis{stroke:#d1d5db}}</style></defs>
  <rect class="bg" width="1080" height="610"/><text class="title" x="48" y="54">低位交叉编址的两种启动方式</text>
  <rect class="panel" x="60" y="100" width="460" height="400"/><text class="h" x="290" y="136" text-anchor="middle">同时启动</text><text class="t" x="290" y="165" text-anchor="middle">一次启动多个模块，并行准备连续数据</text>
  <g transform="translate(130 220)"><line class="axis" x1="0" y1="0" x2="330" y2="0"/><rect class="bar m0" x="0" y="25" width="170" height="32"/><rect class="bar m1" x="0" y="68" width="170" height="32"/><rect class="bar m2" x="0" y="111" width="170" height="32"/><rect class="bar m3" x="0" y="154" width="170" height="32"/><text class="t" x="-25" y="47">M0</text><text class="t" x="-25" y="90">M1</text><text class="t" x="-25" y="133">M2</text><text class="t" x="-25" y="176">M3</text><text class="t" x="85" y="242" text-anchor="middle">同时开始</text></g>
  <rect class="panel" x="560" y="100" width="460" height="400"/><text class="h" x="790" y="136" text-anchor="middle">分时启动</text><text class="t" x="790" y="165" text-anchor="middle">每隔 r 启动下一个模块，形成流水</text>
  <g transform="translate(630 220)"><line class="axis" x1="0" y1="0" x2="330" y2="0"/><rect class="bar m0" x="0" y="25" width="170" height="32"/><rect class="bar m1" x="45" y="68" width="170" height="32"/><rect class="bar m2" x="90" y="111" width="170" height="32"/><rect class="bar m3" x="135" y="154" width="170" height="32"/><text class="t" x="-25" y="47">M0</text><text class="t" x="-25" y="90">M1</text><text class="t" x="-25" y="133">M2</text><text class="t" x="-25" y="176">M3</text><text class="t" x="70" y="242" text-anchor="middle">间隔 r 启动</text></g>
  <text class="h" x="540" y="555" text-anchor="middle">连续地址按低位分散到 M0, M1, M2, M3；模块数 m ≥ T/r 时流水更容易不断流。</text>
</svg>
