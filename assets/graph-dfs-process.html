<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DFS Call Stack Process</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --panel: #f6f8fb;
    --text: #152033;
    --muted: #5f6b7d;
    --edge: #9aa4b2;
    --tree: #16a34a;
    --active: #f59e0b;
    --seen: #3b82f6;
    --node: #ffffff;
    --line: #d8dee9;
    --code: #f3f4f6;
    --stack: #eef2ff;
    --stack-border: #6366f1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0f14;
      --panel: #121923;
      --text: #e7edf6;
      --muted: #a7b2c3;
      --edge: #626f82;
      --tree: #4ade80;
      --active: #fbbf24;
      --seen: #60a5fa;
      --node: #172033;
      --line: #2a3444;
      --code: #111827;
      --stack: #1e1b4b;
      --stack-border: #a5b4fc;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", Arial, sans-serif; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 18px; }
  .top { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 12px; }
  h1 { font-size: 22px; margin: 0; }
  .hint { color: var(--muted); font-size: 14px; }
  .grid { display: grid; grid-template-columns: 1.35fr 1fr; gap: 14px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
  svg { width: 100%; height: 420px; display: block; }
  .edge { stroke: var(--edge); stroke-width: 3; fill: none; }
  .tree { stroke: var(--tree); stroke-width: 5; fill: none; }
  .node { fill: var(--node); stroke: var(--edge); stroke-width: 3; }
  .seen { stroke: var(--seen); }
  .active { fill: var(--active); stroke: var(--active); }
  text { fill: var(--text); font-weight: 700; text-anchor: middle; dominant-baseline: central; }
  .stack { display: flex; flex-direction: column-reverse; gap: 8px; min-height: 190px; padding: 8px; border: 1px dashed var(--line); border-radius: 8px; }
  .frame { height: 34px; display: grid; place-items: center; border-radius: 7px; background: var(--stack); border: 1px solid var(--stack-border); font-family: Consolas, monospace; font-weight: 700; }
  .visited { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-top: 10px; }
  .v { padding: 7px 0; border: 1px solid var(--line); border-radius: 7px; text-align: center; font-family: Consolas, monospace; }
  .v.on { border-color: var(--seen); background: color-mix(in srgb, var(--seen), transparent 82%); }
  .explain { line-height: 1.65; font-size: 15px; }
  pre { margin: 10px 0 0; padding: 12px; overflow: auto; border-radius: 8px; background: var(--code); border: 1px solid var(--line); font-size: 13px; line-height: 1.5; }
  .controls { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 12px; }
  button { border: 1px solid var(--line); background: var(--panel); color: var(--text); border-radius: 8px; padding: 8px 12px; cursor: pointer; }
  button:hover { border-color: var(--seen); }
  .counter { color: var(--muted); font-family: Consolas, monospace; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } svg { height: 350px; } }
</style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>DFS 递归调用栈过程</h1>
      <div class="hint">点击卡片或按钮翻页；示例从顶点 2 出发，邻接点按链表顺序访问。</div>
    </div>
    <div class="counter" id="counter"></div>
  </div>
  <section class="grid">
    <div class="panel" id="stage"></div>
    <div class="panel">
      <div class="explain" id="explain"></div>
      <h2 style="font-size:16px;margin:16px 0 8px;">函数调用栈</h2>
      <div class="stack" id="stack"></div>
      <h2 style="font-size:16px;margin:16px 0 8px;">visited</h2>
      <div class="visited" id="visited"></div>
      <pre id="code"></pre>
    </div>
  </section>
  <div class="controls">
    <button id="prev" type="button">上一页</button>
    <button id="next" type="button">下一页</button>
  </div>
</main>
<script>
const nodes = {
  1: [205, 145], 2: [90, 215], 3: [360, 170], 4: [500, 170],
  5: [205, 300], 6: [335, 270], 7: [500, 270], 8: [620, 270]
};
const edges = [[1,2],[1,5],[2,6],[6,3],[6,7],[3,4],[3,7],[4,7],[4,8],[7,8]];
const slides = [
  {title:"进入 DFS(2)", active:2, seen:[2], tree:[], stack:[2], explain:"访问 2 并标记。DFS 不把同层邻接点都先放进队列，而是立刻沿第一个未访问邻接点继续递归。", code:"DFS(G, 2);\nvisited[2] = true;"},
  {title:"2 发现 1，递归进入 DFS(1)", active:1, seen:[1,2], tree:[[2,1]], stack:[2,1], explain:"2 的第一个未访问邻接点是 1，于是调用 DFS(1)。当前路径变成 2 -> 1。", code:"if (!visited[1]) {\n    DFS(G, 1);\n}"},
  {title:"1 发现 5，递归进入 DFS(5)", active:5, seen:[1,2,5], tree:[[2,1],[1,5]], stack:[2,1,5], explain:"1 的邻接点 2 已访问，跳过；5 未访问，继续深入到 5。", code:"// 2 已访问：跳过\nDFS(G, 5);"},
  {title:"5 无新邻接点，回退到 1", active:1, seen:[1,2,5], tree:[[2,1],[1,5]], stack:[2,1], explain:"5 的邻接点都已经访问，DFS(5) 返回。递归栈弹出 5，控制权回到 DFS(1)。", code:"// DFS(5) 扫描完毕\nreturn;"},
  {title:"1 扫描完，回退到 2", active:2, seen:[1,2,5], tree:[[2,1],[1,5]], stack:[2], explain:"1 没有其他未访问邻接点，DFS(1) 返回。此时 DFS(2) 继续检查 1 后面的邻接点。", code:"// DFS(1) 返回\n// DFS(2) 继续扫描下一个邻接点"},
  {title:"2 发现 6，递归进入 DFS(6)", active:6, seen:[1,2,5,6], tree:[[2,1],[1,5],[2,6]], stack:[2,6], explain:"2 的下一个未访问邻接点是 6，于是进入 DFS(6)。", code:"DFS(G, 6);"},
  {title:"沿 6 -> 3 -> 4 -> 7 -> 8 深入", active:8, seen:[1,2,3,4,5,6,7,8], tree:[[2,1],[1,5],[2,6],[6,3],[3,4],[4,7],[7,8]], stack:[2,6,3,4,7,8], explain:"DFS 会一直优先深入，直到当前路径末端没有未访问邻接点。示例序列最终为 2, 1, 5, 6, 3, 4, 7, 8。", code:"DFS(6);\nDFS(3);\nDFS(4);\nDFS(7);\nDFS(8);"},
  {title:"逐层返回，遍历完成", active:null, seen:[1,2,3,4,5,6,7,8], tree:[[2,1],[1,5],[2,6],[6,3],[3,4],[4,7],[7,8]], stack:[], explain:"所有递归调用依次返回，调用栈清空。若这是完整遍历，还要由外层循环检查是否存在未访问顶点。", code:"// DFS(8), DFS(7), DFS(4), DFS(3), DFS(6), DFS(2) 依次返回"}
];
let index = 0;
function hasEdge(list, a, b) {
  return list.some(([x, y]) => (x === a && y === b) || (x === b && y === a));
}
function render() {
  const s = slides[index];
  const edgeMarkup = edges.map(([a,b]) => {
    const [x1,y1] = nodes[a], [x2,y2] = nodes[b];
    return `<line class="${hasEdge(s.tree,a,b) ? "tree" : "edge"}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
  }).join("");
  const nodeMarkup = Object.entries(nodes).map(([id,pos]) => {
    const v = Number(id);
    const cls = ["node", s.seen.includes(v) ? "seen" : "", s.active === v ? "active" : ""].join(" ");
    return `<circle class="${cls}" cx="${pos[0]}" cy="${pos[1]}" r="24"/><text x="${pos[0]}" y="${pos[1]}">${id}</text>`;
  }).join("");
  document.getElementById("stage").innerHTML = `<svg viewBox="0 0 700 420" aria-label="${s.title}">${edgeMarkup}${nodeMarkup}</svg>`;
  document.getElementById("explain").innerHTML = `<strong>${s.title}</strong><br>${s.explain}`;
  document.getElementById("stack").innerHTML = s.stack.length ? s.stack.map(v => `<div class="frame">DFS(${v})</div>`).join("") : `<span class="hint">empty</span>`;
  document.getElementById("visited").innerHTML = [1,2,3,4,5,6,7,8].map(v => `<div class="v ${s.seen.includes(v) ? "on" : ""}">${v}</div>`).join("");
  document.getElementById("code").textContent = s.code;
  document.getElementById("counter").textContent = `${index + 1} / ${slides.length}`;
}
function step(delta) { index = (index + delta + slides.length) % slides.length; render(); }
document.getElementById("prev").addEventListener("click", event => { event.stopPropagation(); step(-1); });
document.getElementById("next").addEventListener("click", event => { event.stopPropagation(); step(1); });
document.body.addEventListener("click", () => step(1));
document.addEventListener("keydown", event => {
  if (event.key === "ArrowLeft") step(-1);
  if (event.key === "ArrowRight" || event.key === " ") step(1);
});
render();
</script>
</body>
</html>
