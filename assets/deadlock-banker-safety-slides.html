<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Banker Safety</title><style>
:root{--bg:#fff;--panel:#f8fafc;--line:#cbd5e1;--text:#172033;--muted:#64748b;--ok:#dcfce7;--okl:#16a34a;--wait:#fee2e2;--waitl:#dc2626;--hi:#fef3c7;--hil:#d97706;--chip:#e0f2fe;--chipl:#0284c7}@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--ok:#14532d;--okl:#4ade80;--wait:#7f1d1d;--waitl:#f87171;--hi:#713f12;--hil:#fbbf24;--chip:#0c4a6e;--chipl:#38bdf8}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.deck{min-height:720px;padding:28px 34px 24px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}header{display:flex;justify-content:space-between;align-items:end}h1{margin:0;font-size:30px}.step{color:var(--muted);font-size:18px}.stage{display:grid;grid-template-columns:1.25fr .95fr;gap:22px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;min-height:505px}table{width:100%;border-collapse:collapse;font-size:16px}th,td{border:1px solid var(--line);padding:8px;text-align:center;white-space:nowrap}th{background:var(--bg)}tr.ok{background:var(--ok);outline:2px solid var(--okl)}tr.wait{background:var(--wait);outline:2px solid var(--waitl)}.available{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.tag{padding:8px 12px;border:1px solid var(--chipl);border-radius:999px;background:var(--chip);font-size:18px;font-weight:700}.seq{margin-top:14px}.seq span{display:inline-block;margin:6px 6px 0 0;padding:8px 12px;border-radius:8px;background:var(--hi);border:1px solid var(--hil);font-weight:700}.trial{margin-top:14px;border:1px solid var(--line);border-radius:10px;padding:10px;background:var(--bg);font-size:17px;line-height:1.55}h2{margin:0 0 14px;font-size:25px}p{margin:0 0 13px;font-size:19px;line-height:1.55}.formula{font-family:Consolas,"Courier New",monospace;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:10px;font-size:17px;line-height:1.55}.controls{display:flex;justify-content:center;gap:10px}button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:9px 14px;font-size:16px;cursor:pointer}</style></head><body><div class="deck"><header><h1>银行家算法：安全性检查</h1><div id="stepLabel" class="step"></div></header><main class="stage"><section class="panel"><div id="available" class="available"></div><table><thead><tr><th>进程</th><th>Max</th><th>Allocation</th><th>Need</th></tr></thead><tbody id="rows"></tbody></table><div class="seq" id="seq"></div><div class="trial" id="trial"></div></section><section class="panel"><h2 id="title"></h2><p id="body1"></p><p id="body2"></p><div class="formula" id="formula"></div></section></main><nav class="controls"><button id="prev">上一步</button><button id="next">下一步</button></nav></div><script>
const baseRows=[
["P0","(7,5,3)","(0,1,0)","(7,4,3)"],
["P1","(3,2,2)","(2,0,0)","(1,2,2)"],
["P2","(9,0,2)","(3,0,2)","(6,0,0)"],
["P3","(2,2,2)","(2,1,1)","(0,1,1)"],
["P4","(4,3,3)","(0,0,2)","(4,3,1)"]
];
const trialRows=[
["P0","(7,5,3)","(2,2,1)","(5,3,2)"],
["P1","(3,2,2)","(2,0,0)","(1,2,2)"],
["P2","(9,0,2)","(3,0,2)","(6,0,0)"],
["P3","(2,2,2)","(2,1,1)","(0,1,1)"],
["P4","(4,3,3)","(0,0,2)","(4,3,1)"]
];
const steps=[
{a:["Available=(3,3,2)"],data:baseRows,seq:[],ok:[],wait:[],trial:"",t:"从当前资源状态开始",b1:"安全性算法不是直接判断“会不会马上死锁”，而是尝试找出一个能让所有进程完成的顺序。",b2:"每轮只找 Need 小于等于 Available 的进程。找到后，假定它完成并归还 Allocation。",f:""},
{a:["Available=(3,3,2)"],data:baseRows,seq:["P1"],ok:[1],wait:[],trial:"",t:"P1 可以先完成",b1:"P1 的 Need=(1,2,2)，能被 (3,3,2) 满足。",b2:"P1 完成后归还 Allocation=(2,0,0)。",f:"Available = (3,3,2) + (2,0,0) = (5,3,2)"},
{a:["Available=(5,3,2)"],data:baseRows,seq:["P1","P3"],ok:[1,3],wait:[],trial:"",t:"P3 随后可以完成",b1:"P3 的 Need=(0,1,1)，能被 (5,3,2) 满足。",b2:"P3 完成后归还 Allocation=(2,1,1)。",f:"Available = (5,3,2) + (2,1,1) = (7,4,3)"},
{a:["Available=(7,4,3)"],data:baseRows,seq:["P1","P3","P0","P2","P4"],ok:[0,1,2,3,4],wait:[],trial:"",t:"找到安全序列",b1:"到这一步，剩余 P0、P2、P4 的 Need 都能在后续过程中被满足。",b2:"存在安全序列，说明这个时刻系统处于安全状态。",f:"安全序列：P1 -> P3 -> P0 -> P2 -> P4"},
{a:["Request0=(2,1,1)","Available=(3,3,2)"],data:baseRows,seq:[],ok:[0],wait:[],trial:"请求先通过 Need 与 Available 两道检查。",t:"处理一次资源请求",b1:"若 P0 请求 (2,1,1)，先检查它没有超过 Need0，也没有超过当前 Available。",b2:"这两步通过只能说明“可以试探”，还不能说明“可以正式分配”。",f:"Request0 <= Need0, Request0 <= Available"},
{a:["试探后 Available=(1,2,1)"],data:trialRows,seq:[],ok:[],wait:[0,1,2,4],trial:"这里只是修改数据结构做预判，尚未真正把资源交出去。",t:"试探分配后重新检查安全性",b1:"试探分配后，P0 的 Allocation 增加，Need 减少，Available 下降。",b2:"接下来仍要找安全序列；若找不到，必须撤销这次试探分配。",f:"Available=(1,2,1), Allocation0=(2,2,1), Need0=(5,3,2)"},
{a:["Available=(1,2,1)"],data:trialRows,seq:["P3"],ok:[3],wait:[0,1,2,4],trial:"只有 P3 的 Need=(0,1,1) 能被满足。",t:"安全性算法继续推进",b1:"P3 可以先完成，释放 (2,1,1)，Available 变为 (3,3,2)。",b2:"随后 P1 可以完成，再释放 (2,0,0)。",f:"(1,2,1)+(2,1,1)=(3,3,2)"},
{a:["Available=(5,3,2)"],data:trialRows,seq:["P3","P1","P0","P2","P4"],ok:[0,1,2,3,4],wait:[],trial:"P0 能被满足；P0 完成后，P2、P4 也能继续完成。",t:"试探分配可以正式生效",b1:"这次请求试探后仍能找到安全序列，因此系统可以正式分配资源。",b2:"如果某个例子在某一轮没有任何进程可选，就进入不安全状态，必须撤销试探分配。",f:"判断关键：不是看当前够不够一次请求，而是看试探后能否让所有进程完成。"}
];
let i=Math.min(Math.max((Number(new URLSearchParams(location.search).get("step"))||1)-1,0),steps.length-1);
function render(){const s=steps[i];stepLabel.textContent=`${i+1} / ${steps.length}`;available.innerHTML=s.a.map(x=>`<span class="tag">${x}</span>`).join("");document.getElementById("rows").innerHTML=s.data.map((r,idx)=>`<tr class="${s.ok.includes(idx)?"ok":s.wait.includes(idx)?"wait":""}"><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join("");seq.innerHTML=s.seq.length?"安全序列片段："+s.seq.map(x=>`<span>${x}</span>`).join(""):"";trial.textContent=s.trial;trial.style.display=s.trial?"block":"none";title.textContent=s.t;body1.textContent=s.b1;body2.textContent=s.b2;formula.textContent=s.f;formula.style.display=s.f?"block":"none"}prev.onclick=()=>{i=Math.max(0,i-1);render()};next.onclick=()=>{i=Math.min(steps.length-1,i+1);render()};render();
</script></body></html>
