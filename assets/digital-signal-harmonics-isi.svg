<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">数字信号、带宽受限与码间串扰</title>
  <desc id="desc">展示数字信号高频分量受限后边沿变缓导致码间串扰</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--grid:#cbd5e1;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#d97706}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--grid:#334155;--blue:#60a5fa;--green:#4ade80;--red:#f87171;--amber:#fbbf24}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.grid{stroke:var(--grid);stroke-width:1;stroke-dasharray:5 6}.ideal{fill:none;stroke:var(--blue);stroke-width:3}.soft{fill:none;stroke:var(--red);stroke-width:3}.sine{fill:none;stroke:var(--green);stroke-width:2.4}.sum{fill:none;stroke:var(--amber);stroke-width:2.4}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:20px;font-weight:700}.small{font-size:15px;fill:var(--muted)}
  </style>
  <rect class="bg" width="980" height="560"/>
  <text x="50" y="58" class="title">带宽受限会造成码间串扰</text>
  <rect x="60" y="95" width="410" height="360" rx="10" class="panel"/>
  <text x="265" y="135" text-anchor="middle" class="label">数字方波需要高频分量</text>
  <path d="M100 270 C130 210 160 210 190 270 S250 330 280 270 S340 210 370 270 S430 330 450 285" class="sine"/>
  <path d="M100 270 C116 210 132 210 148 270 S180 330 196 270 S228 210 244 270 S276 330 292 270 S324 210 340 270 S372 330 388 270 S420 210 436 270" class="sum"/>
  <path d="M100 320 H160 V220 H260 V320 H360 V220 H450" class="ideal"/>
  <text x="265" y="400" text-anchor="middle" class="small">高频分量越多，波形越接近理想方波</text>
  <rect x="510" y="95" width="410" height="360" rx="10" class="panel"/>
  <text x="715" y="135" text-anchor="middle" class="label">高频分量被衰减后</text>
  <g>
    <line x1="560" y1="200" x2="560" y2="350" class="grid"/><line x1="640" y1="200" x2="640" y2="350" class="grid"/><line x1="720" y1="200" x2="720" y2="350" class="grid"/><line x1="800" y1="200" x2="800" y2="350" class="grid"/><line x1="880" y1="200" x2="880" y2="350" class="grid"/>
  </g>
  <path d="M550 320 H600 C625 320 625 220 650 220 H700 C725 220 725 320 750 320 H800 C825 320 825 220 850 220 H895" class="soft"/>
  <text x="715" y="390" text-anchor="middle" class="small">边沿变缓，码元边界不清楚</text>
  <text x="715" y="420" text-anchor="middle" class="small">相邻码元互相拖尾，形成码间串扰</text>
</svg>
