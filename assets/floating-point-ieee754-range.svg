<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 680" role="img" aria-labelledby="title desc">
  <title id="title">IEEE 754 single precision range</title>
  <desc id="desc">A clear single-axis range diagram for IEEE 754 single precision floating-point numbers.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    .bg { fill: #f7f8f6; }
    .axis { stroke: #20242a; stroke-width: 3.2; fill: none; }
    .tick { stroke: #20242a; stroke-width: 3; }
    .leader { stroke: #20242a; stroke-width: 2.4; stroke-dasharray: 8 8; fill: none; }
    .seg-normal { stroke: #8f938d; stroke-width: 44; }
    .seg-sub { stroke: #bfc8d6; stroke-width: 36; }
    .note-line { stroke: #c47a00; stroke-width: 2.4; fill: none; }
    .label { fill: #20242a; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; font-weight: 700; }
    .small { fill: #5b6570; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #151719; }
      .axis, .tick, .leader { stroke: #edf0f2; }
      .seg-normal { stroke: #555a57; }
      .seg-sub { stroke: #355a74; }
      .note-line { stroke: #ffb84d; }
      .label { fill: #edf0f2; }
      .small { fill: #aeb7c0; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="1800" height="680"/>
  <text class="label" x="64" y="62" font-size="30">IEEE 754 单精度浮点数表示范围</text>

  <line class="axis" x1="90" y1="330" x2="1710" y2="330"/>
  <path class="axis" d="M90 330 l22 -12 v24 z"/>
  <path class="axis" d="M1710 330 l-22 -12 v24 z"/>

  <line class="seg-normal" x1="310" y1="330" x2="760" y2="330"/>
  <line class="seg-sub" x1="760" y1="330" x2="920" y2="330"/>
  <line class="seg-sub" x1="1040" y1="330" x2="1200" y2="330"/>
  <line class="seg-normal" x1="1200" y1="330" x2="1650" y2="330"/>

  <line class="tick" x1="310" y1="232" x2="310" y2="386"/>
  <line class="tick" x1="760" y1="176" x2="760" y2="430"/>
  <line class="tick" x1="920" y1="330" x2="920" y2="452"/>
  <line class="tick" x1="980" y1="238" x2="980" y2="422"/>
  <line class="tick" x1="1040" y1="330" x2="1040" y2="452"/>
  <line class="tick" x1="1200" y1="176" x2="1200" y2="430"/>
  <line class="tick" x1="1650" y1="232" x2="1650" y2="386"/>

  <path class="leader" d="M310 108 V232"/>
  <path class="leader" d="M760 108 V176"/>
  <path class="leader" d="M920 520 V452"/>
  <path class="leader" d="M1040 520 V452"/>
  <path class="leader" d="M1200 108 V176"/>
  <path class="leader" d="M1650 108 V232"/>

  <text class="label" x="136" y="106" font-size="28">−(2 − 2⁻²³) × 2¹²⁷</text>
  <text class="label" x="650" y="106" font-size="28">−1.0 × 2⁻¹²⁶</text>
  <text class="label" x="824" y="570" font-size="28">−1.0 × 2⁻¹⁴⁹</text>
  <text class="label" x="1010" y="570" font-size="28">+1.0 × 2⁻¹⁴⁹</text>
  <text class="label" x="1092" y="106" font-size="28">+1.0 × 2⁻¹²⁶</text>
  <text class="label" x="1470" y="106" font-size="28">+(2 − 2⁻²³) × 2¹²⁷</text>

  <text class="label" x="96" y="318" font-size="30">负上溢</text>
  <text class="label" x="440" y="306" font-size="34">可表示的负数</text>
  <text class="label" x="456" y="360" font-size="30">规格化浮点数</text>
  <text class="label" x="780" y="380" font-size="28">非规格化负数</text>
  <text class="label" x="760" y="250" font-size="24">负下溢结果</text>
  <path class="note-line" d="M842 260 C820 292 790 310 760 324"/>
  <path class="note-line" d="M878 260 C912 292 948 312 978 324"/>
  <text class="label" x="963" y="228" font-size="34">零</text>
  <text class="label" x="1068" y="250" font-size="24">正下溢结果</text>
  <path class="note-line" d="M1112 260 C1142 292 1172 310 1200 324"/>
  <path class="note-line" d="M1080 260 C1046 292 1012 312 982 324"/>
  <text class="label" x="1054" y="380" font-size="28">非规格化正数</text>
  <text class="label" x="1326" y="306" font-size="34">可表示的正数</text>
  <text class="label" x="1342" y="360" font-size="30">规格化浮点数</text>
  <text class="label" x="1642" y="318" font-size="30">正上溢</text>

  <text class="small" x="282" y="424" font-size="17">最大负有限数</text>
  <text class="small" x="704" y="466" font-size="17">最小负规格化数</text>
  <text class="small" x="856" y="494" font-size="17">最小负非零数</text>
  <text class="small" x="960" y="466" font-size="17">−0 / +0</text>
  <text class="small" x="1014" y="494" font-size="17">最小正非零数</text>
  <text class="small" x="1132" y="466" font-size="17">最小正规格化数</text>
  <text class="small" x="1580" y="424" font-size="17">最大正有限数</text>

  <text class="small" x="64" y="624" font-size="18">注：边界值以单精度 float 为例。横向距离用于讲清区间顺序，不表示真实数值密度。</text>
  <text class="small" x="64" y="652" font-size="18">下溢不是独立的可表示数区间；它表示结果绝对值过小，可能成为非规格化数，也可能舍入为 ±0。</text>
</svg>
