<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">I/O Controller Position</title>
  <desc id="desc">CPU communicates with I/O controller, and the controller drives external devices.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.bus{stroke:var(--blue);stroke-width:8;stroke-linecap:round}.line{stroke:var(--line);stroke-width:3;fill:none}.a{stroke:var(--green);stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--green)"/></marker></defs>
  <rect class="bg" width="980" height="360"/>
  <text class="t" x="490" y="42" text-anchor="middle" font-size="24" font-weight="700">CPU 通过 I/O 控制器访问外设</text>
  <line class="bus" x1="110" y1="175" x2="810" y2="175"/>
  <text class="m" x="460" y="205" text-anchor="middle" font-size="15">系统总线：地址线 / 数据线 / 控制线</text>
  <rect class="box" x="70" y="78" width="150" height="78" rx="8"/>
  <text class="t" x="145" y="112" text-anchor="middle" font-size="18" font-weight="700">CPU</text>
  <text class="m" x="145" y="138" text-anchor="middle" font-size="13">执行 I/O 指令</text>
  <rect class="box" x="370" y="78" width="190" height="112" rx="8"/>
  <text class="t" x="465" y="112" text-anchor="middle" font-size="18" font-weight="700">I/O 控制器</text>
  <text class="m" x="465" y="138" text-anchor="middle" font-size="13">寄存器 / 状态 / 控制逻辑</text>
  <text class="m" x="465" y="162" text-anchor="middle" font-size="13">把设备细节变成端口</text>
  <rect class="box" x="720" y="62" width="160" height="70" rx="8"/>
  <text class="t" x="800" y="93" text-anchor="middle" font-size="17" font-weight="700">设备 1</text>
  <text class="m" x="800" y="116" text-anchor="middle" font-size="13">键盘 / 鼠标</text>
  <rect class="box" x="720" y="155" width="160" height="70" rx="8"/>
  <text class="t" x="800" y="186" text-anchor="middle" font-size="17" font-weight="700">设备 2</text>
  <text class="m" x="800" y="209" text-anchor="middle" font-size="13">磁盘 / SSD</text>
  <rect class="box" x="720" y="248" width="160" height="70" rx="8"/>
  <text class="t" x="800" y="279" text-anchor="middle" font-size="17" font-weight="700">设备 n</text>
  <text class="m" x="800" y="302" text-anchor="middle" font-size="13">显示器 / 网卡</text>
  <path class="a" d="M560 116 H720"/>
  <path class="a" d="M560 150 C620 150 650 190 720 190"/>
  <path class="a" d="M560 178 C630 210 650 282 720 282"/>
</svg>
