<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-label="802.11 WLAN BSS ESS DS relationship">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    svg { background: transparent; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    .text { fill: #172033; font-size: 24px; font-weight: 650; }
    .small { fill: #334155; font-size: 18px; }
    .tiny { fill: #475569; font-size: 15px; }
    .bss { fill: #eaf4ff; stroke: #2563eb; stroke-width: 3; stroke-dasharray: 12 9; }
    .bss2 { fill: #ecfdf5; stroke: #059669; stroke-width: 3; stroke-dasharray: 12 9; }
    .ds { fill: #fff7ed; stroke: #ea580c; stroke-width: 3; }
    .ap { fill: #1d4ed8; stroke: #0f172a; stroke-width: 2; }
    .ap2 { fill: #047857; stroke: #0f172a; stroke-width: 2; }
    .sta { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
    .link { stroke: #64748b; stroke-width: 2.4; fill: none; }
    .dslink { stroke: #ea580c; stroke-width: 5; fill: none; }
    .arrow { marker-end: url(#arrow); }
    .caption { fill: #0f172a; font-size: 20px; font-weight: 650; }
    @media (prefers-color-scheme: dark) {
      .text { fill: #e5e7eb; }
      .small { fill: #cbd5e1; }
      .tiny { fill: #94a3b8; }
      .bss { fill: #082f49; stroke: #60a5fa; }
      .bss2 { fill: #052e1b; stroke: #34d399; }
      .ds { fill: #431407; stroke: #fb923c; }
      .ap { fill: #3b82f6; stroke: #bfdbfe; }
      .ap2 { fill: #10b981; stroke: #bbf7d0; }
      .sta { fill: #111827; stroke: #94a3b8; }
      .link { stroke: #94a3b8; }
      .dslink { stroke: #fb923c; }
      .caption { fill: #f8fafc; }
    }
    /* contrast-audit-fix */
  @media(prefers-color-scheme:dark){.ap2-label{fill:#052e16}}
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <text x="550" y="46" text-anchor="middle" class="text">802.11 基础结构模式：BSS 通过 DS 组成 ESS</text>

  <rect x="70" y="100" width="420" height="370" rx="24" class="bss"/>
  <rect x="610" y="100" width="420" height="370" rx="24" class="bss2"/>
  <text x="280" y="138" text-anchor="middle" class="caption">BSS1 / BSA1</text>
  <text x="820" y="138" text-anchor="middle" class="caption">BSS2 / BSA2</text>

  <rect x="420" y="515" width="260" height="68" rx="12" class="ds"/>
  <text x="550" y="546" text-anchor="middle" class="caption">DS 分配系统</text>
  <text x="550" y="572" text-anchor="middle" class="tiny">常见实现：以太网</text>

  <circle cx="280" cy="265" r="42" class="ap"/>
  <text x="280" y="258" text-anchor="middle" fill="#fff" font-size="19" font-weight="700">AP1</text>
  <text x="280" y="284" text-anchor="middle" fill="#fff" font-size="14">BSSID1</text>
  <circle cx="820" cy="265" r="42" class="ap2"/>
  <text x="820" y="258" text-anchor="middle" fill="#fff" font-size="19" font-weight="700" class="ap2-label">AP2</text>
  <text x="820" y="284" text-anchor="middle" fill="#fff" font-size="14" class="ap2-label">BSSID2</text>

  <circle cx="155" cy="215" r="30" class="sta"/>
  <text x="155" y="222" text-anchor="middle" class="small">A</text>
  <circle cx="180" cy="360" r="30" class="sta"/>
  <text x="180" y="367" text-anchor="middle" class="small">C</text>
  <circle cx="405" cy="345" r="30" class="sta"/>
  <text x="405" y="352" text-anchor="middle" class="small">D</text>

  <circle cx="700" cy="210" r="30" class="sta"/>
  <text x="700" y="217" text-anchor="middle" class="small">E</text>
  <circle cx="945" cy="235" r="30" class="sta"/>
  <text x="945" y="242" text-anchor="middle" class="small">B</text>
  <circle cx="880" cy="375" r="30" class="sta"/>
  <text x="880" y="382" text-anchor="middle" class="small">F</text>

  <path d="M185 225 L240 250" class="link"/>
  <path d="M205 345 L242 290" class="link"/>
  <path d="M380 325 L318 286" class="link"/>
  <path d="M725 225 L782 250" class="link"/>
  <path d="M916 243 L860 260" class="link"/>
  <path d="M860 350 L830 306" class="link"/>

  <path d="M280 307 C315 400 410 450 490 515" class="dslink"/>
  <path d="M820 307 C785 400 690 450 610 515" class="dslink"/>

  <path d="M155 215 C350 65 750 65 945 235" class="link arrow" stroke-dasharray="9 8"/>
  <text x="550" y="88" text-anchor="middle" class="small">A 与 B 通信路径：A -> AP1 -> DS -> AP2 -> B</text>

  <rect x="115" y="492" width="870" height="52" rx="10" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <text x="550" y="526" text-anchor="middle" class="small">ESS：多个 BSS 通过 DS 连接后，对上层表现为一个局域网；多个 BSS 的覆盖范围可以重叠</text>
</svg>
