<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRC 模 2 除法</title>
<style>
:root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--grid:#cbd5e1;--blue:#2563eb;--green:#16a34a;--hot:#dc2626;--amber:#d97706}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--grid:#334155;--blue:#60a5fa;--green:#4ade80;--hot:#f87171;--amber:#fbbf24}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.wrap{max-width:1040px;margin:0 auto;padding:24px}.top{display:flex;justify-content:space-between;gap:16px}.title{font-size:28px;font-weight:800}.sub{color:var(--muted);font-size:15px;margin-top:8px}.controls{display:flex;gap:8px;flex-wrap:wrap}.controls button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:7px;padding:8px 12px;font-weight:700;cursor:pointer}.controls button.active{background:var(--blue);border-color:var(--blue);color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px}.card{border:2px solid var(--line);border-radius:10px;background:var(--panel);padding:18px;min-height:370px}.mono{font-family:Consolas,monospace}.bits{font-size:30px;letter-spacing:4px;line-height:1.7}.hi{color:var(--hot);font-weight:900}.ok{color:var(--green);font-weight:900}.note{border-left:4px solid var(--hot);padding:12px 14px;background:color-mix(in srgb,var(--hot) 10%,transparent);line-height:1.75;margin-top:16px}.formula{font-family:Consolas,monospace;font-size:18px;line-height:1.8}.muted{color:var(--muted)}
@media(max-width:820px){.top{display:block}.controls{margin-top:14px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div><div class="title">CRC：用模 2 除法生成 FCS</div><div class="sub">示例：数据 101001，生成多项式 G(x)=x³+x²+1，对应除数 1101。</div></div>
    <div class="controls"><button data-step="0" class="active">构造</button><button data-step="1">相除</button><button data-step="2">发送</button><button data-step="3">接收校验</button></div>
  </div>
  <section class="grid">
    <article class="card"><div id="main" class="bits mono"></div><div id="note" class="note"></div></article>
    <article class="card"><div id="side" class="formula"></div></article>
  </section>
</main>
<script>
const steps=[
 {main:'101001<span class="hi">000</span>', note:'生成多项式最高次数为 3，所以在数据后面追加 3 个 0。', side:'数据：101001<br>G(x)=x³+x²+1<br>除数：1101<br>被除数：101001000'},
 {main:'101001000 ÷ 1101<br><span class="hi">余数 = 001</span>', note:'模 2 除法不借位、不进位；对应位做异或。余数长度为 3。', side:'1 xor 1 = 0<br>1 xor 0 = 1<br>0 xor 1 = 1<br><br>关键是异或，不是十进制减法。'},
 {main:'101001<span class="ok">001</span>', note:'把余数 001 作为 FCS 加到原数据后面一起发送。', side:'发送帧中的检测字段不是随便填的，而是让整个序列能被生成多项式整除。'},
 {main:'101001001 ÷ 1101<br><span class="ok">余数 = 000</span>', note:'接收方用同一个除数再除一次。余数为 0，认为没有检测到差错；余数非 0，判定出错。', side:'CRC 能发现绝大多数传输差错，但它只能检错，不能指出哪一位错了。'}
];
const buttons=[...document.querySelectorAll("button")];
function render(i){const s=steps[i];main.innerHTML=s.main;note.innerHTML=s.note;side.innerHTML=s.side;buttons.forEach((b,k)=>b.classList.toggle("active",k===i));}
buttons.forEach((b,i)=>b.addEventListener("click",()=>render(i)));
render(0);
</script>
</body>
</html>
