<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DAG Expression Construction</title>
<style>
:root{--bg:#fff;--panel:#f8fafc;--text:#0f172a;--muted:#475569;--line:#94a3b8;--edge:#64748b;--hot:#2563eb;--done:#059669;--warn:#d97706}
@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--panel:#111827;--text:#f8fafc;--muted:#cbd5e1;--line:#64748b;--edge:#94a3b8;--hot:#60a5fa;--done:#34d399;--warn:#fbbf24}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,sans-serif}.wrap{padding:18px;max-width:1120px;margin:auto}.top{display:flex;justify-content:space-between;gap:12px}.title{font-size:22px;font-weight:750}.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:7px 12px;border-radius:6px;cursor:pointer}.stage{display:grid;grid-template-columns:1fr .9fr;gap:16px;margin-top:14px}.card{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:14px}.note{color:var(--muted);line-height:1.65}.edge{stroke:var(--edge);stroke-width:3;marker-end:url(#arr)}.hotEdge{stroke:var(--hot);stroke-width:5;marker-end:url(#arrHot)}.level{stroke:var(--line);stroke-width:1;stroke-dasharray:4 8;opacity:.55}.node{fill:var(--bg);stroke:var(--edge);stroke-width:2}.hot{stroke:var(--hot);stroke-width:4}.reuse{fill:color-mix(in srgb,var(--done) 20%,var(--bg));stroke:var(--done);stroke-width:3}.label{fill:var(--text);font-weight:750;font-size:17px}.noteLabel,.nodeLevel{fill:var(--muted);font-size:12px;font-weight:700}.expr{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--text);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:10px}.pills{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:var(--bg)}@media(max-width:760px){.stage{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
 <div class="top"><div><div class="title">表达式 DAG：手算分层构造</div><div class="note">例：((a+b)*(b*(c+d))+(c+d)*e)*((c+d)*e)</div></div><div><button class="btn" id="prev">上一页</button> <button class="btn" id="next">下一页</button></div></div>
 <div class="stage"><div class="card" id="graph"></div><div class="card"><div class="expr">((a+b)*(b*(c+d))+(c+d)*e)*((c+d)*e)</div><h3 id="cap"></h3><div class="note" id="txt"></div><h3>当前层级</h3><div class="pills" id="nodes"></div></div></div>
</div>
<script>
const allNodes={
 a:[55,610,"a","L0"],b:[145,610,"b","L0"],c:[360,610,"c","L0"],d:[450,610,"d","L0"],e:[610,610,"e","L0"],
 n1:[100,500,"+","L1"],n2:[405,500,"+","L1"],
 n3:[255,390,"*","L2"],n4:[520,390,"*","L2"],
 n5:[250,280,"*","L3"],
 n6:[380,170,"+","L4"],
 n7:[455,60,"*","L5"]
};
const allEdges=[
 ["n1","a"],["n1","b"],
 ["n2","c"],["n2","d"],
 ["n3","b"],["n3","n2"],
 ["n4","n2"],["n4","e"],
 ["n5","n1"],["n5","n3"],
 ["n6","n5"],["n6","n4"],
 ["n7","n6"],["n7","n4"]
];
const steps=[
{cap:"L0：写出所有不同运算数",show:["a","b","c","d","e"],hot:["a","b","c","d","e"],edges:[],txt:"运算数在最底层，且不重复。这个例子底层只有 a、b、c、d、e 五个叶结点。"},
{cap:"L1：形成最靠近运算数的加法",show:["a","b","c","d","e","n1","n2"],hot:["n1","n2"],edges:[["n1","a"],["n1","b"],["n2","c"],["n2","d"]],txt:"a+b 和 c+d 的两个操作对象都在 L0，所以它们的 + 结点位于 L1。"},
{cap:"L2：形成依赖 L1 的乘法",show:["a","b","c","d","e","n1","n2","n3","n4"],hot:["n3","n4"],edges:[["n1","a"],["n1","b"],["n2","c"],["n2","d"],["n3","b"],["n3","n2"],["n4","n2"],["n4","e"]],txt:"b*(c+d) 依赖 b 和 L1 的 c+d，所以在 L2；(c+d)*e 也在 L2。c+d 只保留一个 + 结点，被两个乘法复用。"},
{cap:"L3：形成 (a+b)*(b*(c+d))",show:["a","b","c","d","e","n1","n2","n3","n4","n5"],hot:["n5"],edges:[["n1","a"],["n1","b"],["n2","c"],["n2","d"],["n3","b"],["n3","n2"],["n4","n2"],["n4","e"],["n5","n1"],["n5","n3"]],txt:"这个乘法依赖 L1 的 a+b 和 L2 的 b*(c+d)，因此必须放在 L3，不能和 b*(c+d) 同层。"},
{cap:"L4：形成左侧整体加法",show:["a","b","c","d","e","n1","n2","n3","n4","n5","n6"],hot:["n6"],edges:[["n1","a"],["n1","b"],["n2","c"],["n2","d"],["n3","b"],["n3","n2"],["n4","n2"],["n4","e"],["n5","n1"],["n5","n3"],["n6","n5"],["n6","n4"]],txt:"左侧加法的两个操作对象是 L3 的乘法结果和 L2 的 (c+d)*e，所以这个 + 在 L4。"},
{cap:"L5：形成最终乘法",show:["a","b","c","d","e","n1","n2","n3","n4","n5","n6","n7"],hot:["n7"],edges:allEdges,txt:"最终乘法的左操作对象是 L4 的 +，右操作对象复用 L2 的 (c+d)*e。重复子表达式不再新建。"}
];
let i=0;
function hasEdge(s,e){return s.edges.some(x=>x[0]===e[0]&&x[1]===e[1])}
function render(){
 const s=steps[i];document.getElementById("cap").textContent=s.cap;document.getElementById("txt").textContent=s.txt;
 const edges=allEdges.filter(e=>hasEdge(s,e)).map(e=>{
   const p=allNodes[e[0]], q=allNodes[e[1]], hot=s.hot.includes(e[0]);
   return `<line class="${hot?'hotEdge':'edge'}" x1="${p[0]}" y1="${p[1]+24}" x2="${q[0]}" y2="${q[1]-24}"/>`;
 }).join("");
 const levelLines=[0,1,2,3,4,5].map(level=>`<text class="noteLabel" x="18" y="${610-level*110+5}">L${level}</text><line class="level" x1="45" y1="${610-level*110}" x2="650" y2="${610-level*110}"/>`).join("");
 const nodes=s.show.map(id=>{const n=allNodes[id];const reused=(id==="n2"&&i>=2)||(id==="n4"&&i>=5);return `<g><circle class="node ${s.hot.includes(id)?'hot':''} ${reused?'reuse':''}" cx="${n[0]}" cy="${n[1]}" r="25"/><text class="label" x="${n[0]}" y="${n[1]+6}" text-anchor="middle">${n[2]}</text><text class="nodeLevel" x="${n[0]}" y="${n[1]+42}" text-anchor="middle">${n[3]}</text></g>`}).join("");
 document.getElementById("graph").innerHTML=`<svg viewBox="0 0 680 680"><defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--edge)"/></marker><marker id="arrHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--hot)"/></marker></defs>${levelLines}${edges}${nodes}</svg>`;
 document.getElementById("nodes").innerHTML=s.show.map(id=>`<span class="pill">${allNodes[id][3]} ${allNodes[id][2]}</span>`).join("");
}
document.getElementById("prev").onclick=()=>{i=(i+steps.length-1)%steps.length;render()};document.getElementById("next").onclick=()=>{i=(i+1)%steps.length;render()};render();
</script>
</body>
</html>
