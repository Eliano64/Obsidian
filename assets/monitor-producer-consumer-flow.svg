<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-labelledby="title desc">
  <title id="title">管程版生产者消费者</title>
  <desc id="desc">展示生产者消费者通过管程入口访问缓冲区，并在条件变量上等待或唤醒</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#ffffff;--panel:#f8fafc;--line:#334155;--text:#172033;--muted:#64748b;--blue:#dbeafe;--blue-line:#2563eb;--green:#dcfce7;--green-line:#16a34a;--amber:#fef3c7;--amber-line:#d97706;--red:#fee2e2;--red-line:#dc2626}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--line:#94a3b8;--text:#e5e7eb;--muted:#94a3b8;--blue:#1e3a8a;--blue-line:#60a5fa;--green:#14532d;--green-line:#4ade80;--amber:#713f12;--amber-line:#fbbf24;--red:#7f1d1d;--red-line:#f87171}}
    .bg{fill:var(--bg)}.outer{fill:none;stroke:var(--blue-line);stroke-width:3}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.entry{fill:var(--blue);stroke:var(--blue-line);stroke-width:2}.data{fill:var(--green);stroke:var(--green-line);stroke-width:2}.cond{fill:var(--amber);stroke:var(--amber-line);stroke-width:2}.wait{fill:var(--red);stroke:var(--red-line);stroke-width:2}.arrow{fill:none;stroke:var(--line);stroke-width:2.5;marker-end:url(#arrow)}.dash{stroke-dasharray:8 7}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:20px;font-weight:700}.small{font-size:16px;fill:var(--muted)}.tiny{font-size:14px;fill:var(--muted)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker>
  </defs>
  <rect class="bg" width="1040" height="600"/>
  <text x="50" y="54" class="title">管程版生产者-消费者：入口、条件、缓冲区</text>
  <rect x="250" y="92" width="610" height="430" rx="18" class="outer"/>
  <text x="555" y="128" text-anchor="middle" class="label">monitor ProducerConsumer</text>
  <rect x="390" y="174" width="330" height="95" rx="12" class="data"/>
  <text x="555" y="210" text-anchor="middle" class="label">共享缓冲区 buffer[n]</text>
  <text x="555" y="242" text-anchor="middle" class="small">count 只能由管程入口过程修改</text>
  <rect x="300" y="330" width="170" height="82" rx="12" class="entry"/>
  <text x="385" y="363" text-anchor="middle" class="label">insert(item)</text>
  <text x="385" y="390" text-anchor="middle" class="small">满则 wait(notFull)</text>
  <rect x="640" y="330" width="170" height="82" rx="12" class="entry"/>
  <text x="725" y="363" text-anchor="middle" class="label">remove()</text>
  <text x="725" y="390" text-anchor="middle" class="small">空则 wait(notEmpty)</text>
  <rect x="300" y="455" width="170" height="46" rx="10" class="cond"/>
  <text x="385" y="484" text-anchor="middle" class="label">notFull</text>
  <rect x="640" y="455" width="170" height="46" rx="10" class="cond"/>
  <text x="725" y="484" text-anchor="middle" class="label">notEmpty</text>
  <rect x="70" y="330" width="125" height="64" rx="10" class="box"/>
  <text x="132" y="368" text-anchor="middle" class="label">生产者</text>
  <path d="M195 362 H300" class="arrow"/>
  <rect x="890" y="330" width="125" height="64" rx="10" class="box"/>
  <text x="953" y="368" text-anchor="middle" class="label">消费者</text>
  <path d="M890 362 H810" class="arrow"/>
  <path d="M385 330 C410 290 455 268 500 252" class="arrow"/>
  <path d="M725 330 C700 290 655 268 610 252" class="arrow"/>
  <path d="M385 412 V455" class="arrow dash"/>
  <path d="M725 412 V455" class="arrow dash"/>
  <path d="M470 478 C540 520 630 520 690 501" class="arrow dash"/>
  <text x="580" y="545" text-anchor="middle" class="tiny">signal(notEmpty) 唤醒消费者；signal(notFull) 唤醒生产者</text>
  <text x="555" y="568" text-anchor="middle" class="tiny">同一时刻只有一个进程在管程内执行 insert 或 remove</text>
</svg>
