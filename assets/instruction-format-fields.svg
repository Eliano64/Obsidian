<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Instruction fields</title>
  <desc id="desc">An instruction is split into operation code and address fields.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { --bg:#ffffff; --text:#111827; --muted:#4b5563; --line:#111827; --op:#dbeafe; --addr:#dcfce7; --note:#fef3c7; }
    @media (prefers-color-scheme: dark) { :root { --bg:#111827; --text:#e5e7eb; --muted:#cbd5e1; --line:#e5e7eb; --op:#1e3a8a; --addr:#14532d; --note:#713f12; } }
    .bg{fill:var(--bg)} .text{fill:var(--text);font-family:"Segoe UI",Arial,sans-serif} .muted{fill:var(--muted);font-family:"Segoe UI",Arial,sans-serif}
    .box{stroke:var(--line);stroke-width:2;rx:8} .op{fill:var(--op)} .addr{fill:var(--addr)} .note{fill:var(--note)}
    .line{stroke:var(--line);stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="960" height="300"/>
  <text class="text" x="40" y="44" font-size="28" font-weight="700">机器指令的基本字段</text>
  <text class="muted" x="40" y="76" font-size="18">操作码说明动作，地址码说明操作对象或结果位置。</text>

  <rect class="box op" x="80" y="118" width="220" height="82"/>
  <rect class="box addr" x="300" y="118" width="180" height="82"/>
  <rect class="box addr" x="480" y="118" width="180" height="82"/>
  <rect class="box addr" x="660" y="118" width="220" height="82"/>
  <text class="text" x="190" y="153" font-size="25" text-anchor="middle" font-weight="700">OP</text>
  <text class="muted" x="190" y="181" font-size="17" text-anchor="middle">做什么</text>
  <text class="text" x="390" y="153" font-size="24" text-anchor="middle" font-weight="700">A1</text>
  <text class="muted" x="390" y="181" font-size="17" text-anchor="middle">源或目的</text>
  <text class="text" x="570" y="153" font-size="24" text-anchor="middle" font-weight="700">A2</text>
  <text class="muted" x="570" y="181" font-size="17" text-anchor="middle">源操作数</text>
  <text class="text" x="770" y="153" font-size="24" text-anchor="middle" font-weight="700">A3 / 下址</text>
  <text class="muted" x="770" y="181" font-size="17" text-anchor="middle">结果或下一条地址</text>

  <path class="line" d="M190 207 V235 H285"/>
  <path class="line" d="M570 207 V235 H475"/>
  <rect class="box note" x="302" y="224" width="336" height="52"/>
  <text class="text" x="470" y="256" font-size="19" text-anchor="middle">地址码个数由指令格式决定，可为 0 到多个</text>
</svg>
