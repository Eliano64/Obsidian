<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img">
  <title>Zero window and persistent timer</title>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}
    .t{font-size:22px;font-weight:700;fill:#111827}
    .sh{font-size:16px;font-weight:700;fill:#111827}
    .ss{font-size:12px;fill:#4b5563}
    .sm{font-size:14px;font-weight:700;fill:#111827}
    .sw{font-size:13px;font-weight:700;fill:#fff}
    .box{fill:#fff;stroke:#d1d5db;stroke-width:1.5}
    .f-blue{fill:#eff6ff;stroke:#3b82f6;stroke-width:2}
    .f-green{fill:#ecfdf5;stroke:#059669;stroke-width:2}
    .f-red{fill:#fef2f2;stroke:#dc2626;stroke-width:2}
    .f-amber{fill:#fff7ed;stroke:#d97706;stroke-width:2}
    @media(prefers-color-scheme:dark){
      .t,.sh,.sm{fill:#e5e7eb}
      .ss{fill:#9ca3af}
      .box{fill:#111827;stroke:#374151}
      .f-blue{fill:#0f1d33;stroke:#1e40af}
      .f-green{fill:#0a1e14;stroke:#047857}
      .f-red{fill:#2e0a0a;stroke:#991b1b}
      .f-amber{fill:#2a1f06;stroke:#92400e}
    }
  </style>

  <text x="480" y="36" text-anchor="middle" class="t">零窗口与持续计时器 — 打破死锁</text>

  <!-- Deadlock scenario -->
  <text x="480" y="72" text-anchor="middle" class="sh" fill="#dc2626">零窗口死锁的形成</text>

  <rect x="40" y="88" width="880" height="170" rx="6" class="box"/>

  <!-- Timeline-like layout -->
  <line x1="120" y1="118" x2="880" y2="118" stroke="#9ca3af" stroke-width="1"/><text x="60" y="122" class="ss">发送方 A</text>
  <line x1="120" y1="240" x2="880" y2="240" stroke="#9ca3af" stroke-width="1"/><text x="60" y="244" class="ss">接收方 B</text>

  <!-- Step 1: B sends rwnd=0 -->
  <line x1="150" y1="114" x2="150" y2="236" stroke="#059669" stroke-width="2"/>
  <rect x="138" y="192" width="24" height="16" rx="3" fill="#059669"/><text x="150" y="204" text-anchor="middle" class="sw" style="font-size:10px;">ACK</text>
  <text x="150" y="260" text-anchor="middle" class="ss">rwnd=0</text>
  <text x="150" y="112" text-anchor="middle" class="ss" fill="#dc2626">停止发送</text>

  <!-- Step 2: A stops -->
  <text x="330" y="130" text-anchor="middle" class="sm" fill="#dc2626">A 停止发送，等待 B 通知 rwnd &gt; 0</text>

  <!-- Step 3: B later has space, sends ACK with rwnd>0 -->
  <line x1="570" y1="236" x2="570" y2="114" stroke="#059669" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="555" y="194" width="30" height="16" rx="3" fill="#059669"/><text x="570" y="206" text-anchor="middle" class="sw" style="font-size:10px;">ACK</text>
  <text x="570" y="260" text-anchor="middle" class="ss" fill="#dc2626">rwnd=200</text>

  <!-- X mark for lost ACK -->
  <text x="570" y="150" text-anchor="middle" class="sm" fill="#dc2626">× 丢失!</text>

  <!-- Deadlock -->
  <rect x="690" y="110" width="210" height="110" rx="6" class="f-red"/>
  <text x="795" y="138" text-anchor="middle" class="sh" fill="#991b1b">死锁</text>
  <text x="795" y="162" text-anchor="middle" class="sm" fill="#991b1b">A 等 B 通知窗口打开</text>
  <text x="795" y="182" text-anchor="middle" class="sm" fill="#991b1b">B 等 A 发送数据</text>
  <text x="795" y="204" text-anchor="middle" class="ss">两边互相等待 → 僵住</text>

  <!-- Solution -->
  <text x="480" y="290" text-anchor="middle" class="t">持续计时器 — 打破零窗口死锁</text>

  <rect x="40" y="310" width="880" height="210" rx="6" class="box"/>

  <!-- Solution steps -->
  <rect x="60" y="328" width="180" height="85" rx="4" class="f-amber"/>
  <text x="150" y="354" text-anchor="middle" class="sh" fill="#92400e">① 启动计时器</text>
  <text x="150" y="376" text-anchor="middle" class="sm">收到 rwnd=0 后</text>
  <text x="150" y="396" text-anchor="middle" class="ss">启动持续计时器</text>

  <path d="M 240,370 L 290,370" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="295" y="328" width="180" height="85" rx="4" class="tag-b" fill="#2563eb"/><rect x="295" y="328" width="180" height="85" rx="4" fill="#2563eb"/>
  <text x="385" y="354" text-anchor="middle" class="sw">② 发送探测</text>
  <text x="385" y="376" text-anchor="middle" class="sw">超时 → A 发送</text>
  <text x="385" y="396" text-anchor="middle" class="sw">零窗口探测报文段</text>

  <path d="M 475,370 L 525,370" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="530" y="328" width="180" height="85" rx="4" class="f-green"/>
  <text x="620" y="354" text-anchor="middle" class="sh" fill="#065f46">③ B 回复 ACK</text>
  <text x="620" y="376" text-anchor="middle" class="sm">B 收到探测 →</text>
  <text x="620" y="396" text-anchor="middle" class="ss">回复当前 rwnd 值</text>

  <path d="M 710,370 L 760,370" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="765" y="328" width="135" height="85" rx="4" class="f-blue"/>
  <text x="832" y="354" text-anchor="middle" class="sh" fill="#1e40af">④ 判断</text>
  <text x="832" y="376" text-anchor="middle" class="sm">rwnd = 0?</text>
  <text x="832" y="396" text-anchor="middle" class="ss">是→回到①</text>
  <text x="832" y="412" text-anchor="middle" class="ss">否→恢复发送</text>

  <defs>
    <marker id="ah" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 7 3, 0 6" fill="#6b7280"/></marker>
  </defs>

  <!-- Loop arrow -->
  <path d="M 832,420 L 832,452 L 150,452 L 150,415" stroke="#d97706" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#ah)"/>
  <text x="490" y="468" text-anchor="middle" class="ss" fill="#d97706">rwnd 仍为 0：重新启动持续计时器，再次探测（循环直到窗口打开或连接超时）</text>

  <text x="480" y="510" text-anchor="middle" class="sm">持续计时器防止双方互相等待 · 零窗口探测报文段携带 1 字节数据</text>
</svg>