<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">吸烟者问题模型</title>
  <desc id="desc">展示供应者、桌子、三种材料组合和三个吸烟者之间的同步关系</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--line:#334155;--text:#172033;--muted:#64748b;--blue:#dbeafe;--blue-line:#2563eb;--green:#dcfce7;--green-line:#16a34a;--amber:#fef3c7;--amber-line:#d97706;--red:#fee2e2;--red-line:#dc2626}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--line:#94a3b8;--text:#e5e7eb;--muted:#94a3b8;--blue:#1e3a8a;--blue-line:#60a5fa;--green:#14532d;--green-line:#4ade80;--amber:#713f12;--amber-line:#fbbf24;--red:#7f1d1d;--red-line:#f87171}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.provider{fill:var(--blue);stroke:var(--blue-line);stroke-width:2.5}.table{fill:var(--amber);stroke:var(--amber-line);stroke-width:2.5}.smoker{fill:var(--green);stroke:var(--green-line);stroke-width:2.5}.finish{fill:var(--red);stroke:var(--red-line);stroke-width:2.5}.arrow{fill:none;stroke:var(--line);stroke-width:2.5;marker-end:url(#arrow)}.dash{stroke-dasharray:8 7}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:20px;font-weight:700}.small{font-size:16px;fill:var(--muted)}.tiny{font-size:14px;fill:var(--muted)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="560"/>
  <text x="50" y="54" class="title">吸烟者问题：单生产者，多种产品，多消费者</text>
  <rect x="70" y="218" width="150" height="74" rx="12" class="provider"/>
  <text x="145" y="250" text-anchor="middle" class="label">供应者</text>
  <text x="145" y="276" text-anchor="middle" class="small">每次放两种材料</text>
  <rect x="390" y="188" width="190" height="134" rx="16" class="table"/>
  <text x="485" y="228" text-anchor="middle" class="label">桌子</text>
  <text x="485" y="258" text-anchor="middle" class="small">容量为 1</text>
  <text x="485" y="286" text-anchor="middle" class="small">只放一种组合</text>
  <path d="M220 255 H390" class="arrow"/>
  <rect x="730" y="105" width="170" height="78" rx="12" class="smoker"/>
  <text x="815" y="135" text-anchor="middle" class="label">吸烟者 1</text>
  <text x="815" y="162" text-anchor="middle" class="small">有烟草，等纸+胶水</text>
  <rect x="730" y="240" width="170" height="78" rx="12" class="smoker"/>
  <text x="815" y="270" text-anchor="middle" class="label">吸烟者 2</text>
  <text x="815" y="297" text-anchor="middle" class="small">有纸，等烟草+胶水</text>
  <rect x="730" y="375" width="170" height="78" rx="12" class="smoker"/>
  <text x="815" y="405" text-anchor="middle" class="label">吸烟者 3</text>
  <text x="815" y="432" text-anchor="middle" class="small">有胶水，等烟草+纸</text>
  <path d="M580 220 C635 170 670 145 730 144" class="arrow"/>
  <path d="M580 255 H730" class="arrow"/>
  <path d="M580 292 C635 350 670 410 730 414" class="arrow"/>
  <rect x="387" y="405" width="196" height="56" rx="12" class="finish"/>
  <text x="485" y="439" text-anchor="middle" class="label">finish：吸烟完成</text>
  <path d="M730 183 C660 210 610 390 583 420" class="arrow dash"/>
  <path d="M730 318 C660 330 610 395 583 430" class="arrow dash"/>
  <path d="M730 414 H583" class="arrow dash"/>
  <path d="M387 433 C285 430 220 340 170 292" class="arrow dash"/>
  <text x="485" y="515" text-anchor="middle" class="tiny">供应者 V(offerX) 唤醒对应吸烟者；吸烟者 V(finish) 允许供应者进入下一轮。</text>
</svg>
