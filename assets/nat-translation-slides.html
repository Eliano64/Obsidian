<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>NAT 转换过程</title><style>:root{color-scheme:light dark;--bg:#f8fafc;--fg:#0f172a;--muted:#475569;--border:#cbd5e1;--a:#dcfce7;--b:#fed7aa;--c:#dbeafe;--accent:#0369a1}@media(prefers-color-scheme:dark){:root{--bg:#020617;--fg:#e5e7eb;--muted:#cbd5e1;--border:#334155;--a:#052e16;--b:#431407;--c:#172554;--accent:#67e8f9}}body{margin:0;background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif}.wrap{max-width:980px;margin:auto;padding:28px}.title{text-align:center;font-size:26px;font-weight:700}.grid{display:grid;grid-template-columns:1fr 280px;gap:20px;margin-top:22px}.box{border:1px solid var(--border);border-radius:10px;padding:18px}.pkt{padding:12px;border-radius:8px;margin:10px 0;background:var(--a)}.nat{background:var(--b)}.pub{background:var(--c)}table{width:100%;border-collapse:collapse}td,th{border:1px solid var(--border);padding:8px;text-align:left}.accent{color:var(--accent);font-weight:700}.controls{text-align:center;margin-top:16px}button{background:transparent;color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:8px 16px;margin:0 6px;font:inherit}</style></head><body><div class="wrap"><div class="title">NAT：边界路由器改写地址并维护转换表</div><div class="grid"><div id="view" class="box"></div><div class="box"><b>转换表</b><table><tr><th>内部</th><th>外部</th></tr><tbody id="tab"></tbody></table></div></div><div class="controls"><button id="prev">上一步</button><button id="next">下一步</button></div></div><script>
const rows=[["192.168.0.2","203.0.113.8"]];const data=[
`<div class="pkt">内网主机发出：源 192.168.0.2，目的 198.51.100.7</div><p>源地址是私有地址，不能直接在公网路由。</p>`,
`<div class="pkt nat">NAT 路由器改写：源 203.0.113.8，目的 198.51.100.7</div><p>边界路由器把内部地址映射为自己的公网地址，并记录转换表。</p>`,
`<div class="pkt pub">服务器响应：源 198.51.100.7，目的 203.0.113.8</div><p>公网服务器只看见 NAT 路由器的公网地址。</p>`,
`<div class="pkt nat">NAT 查表还原：目的 192.168.0.2</div><p>响应回到边界路由器后，根据转换表还原为内部主机地址。</p>`];
let i=0;function r(){view.innerHTML=data[i];tab.innerHTML=i>=1?rows.map(x=>`<tr><td>${x[0]}</td><td>${x[1]}</td></tr>`).join(""):""}prev.onclick=()=>{i=Math.max(0,i-1);r()};next.onclick=()=>{i=Math.min(data.length-1,i+1);r()};r();
</script></body></html>
