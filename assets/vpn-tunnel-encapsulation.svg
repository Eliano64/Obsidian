<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="460" viewBox="0 0 1080 460" role="img" aria-labelledby="title desc"><title id="title">VPN 隧道封装</title><desc id="desc">内部 IP 数据报加密后封装进外部 IP 数据报，在公网中作为普通数据报传输。</desc><style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}
:root{color-scheme:light dark}.bg{fill:#f8fafc}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:18px}.small{fill:#334155;font-size:15px}.site{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.gw{fill:#fed7aa;stroke:#f97316;stroke-width:2}.net{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.pkt{fill:#fff;stroke:#64748b;stroke-width:2}.inner{fill:#ede9fe}.outer{fill:#dbeafe}.line{stroke:#64748b;stroke-width:3;stroke-dasharray:8 6}.label{fill:#0369a1;font-weight:700}@media(prefers-color-scheme:dark){.bg{fill:#020617}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.site{fill:#052e16;stroke:#4ade80}.gw{fill:#431407;stroke:#fb923c}.net{fill:#172554;stroke:#60a5fa}.pkt{fill:#0f172a;stroke:#94a3b8}.inner{fill:#2e1065}.outer{fill:#172554}.line{stroke:#94a3b8}.label{fill:#67e8f9}}</style><rect class="bg" width="1080" height="460"/><text class="text" x="540" y="42" text-anchor="middle" font-size="25" font-weight="700">VPN：在公共因特网上构造逻辑专用网络</text><rect class="site" x="70" y="115" width="230" height="150" rx="12"/><text class="label" x="185" y="150" text-anchor="middle">站点 A 私有网</text><text class="small" x="185" y="200" text-anchor="middle">10.1.0.0/16</text><rect class="gw" x="335" y="140" width="100" height="100" rx="12"/><text class="text" x="385" y="198" text-anchor="middle">网关A</text><rect class="net" x="475" y="115" width="180" height="150" rx="60"/><text class="text" x="565" y="197" text-anchor="middle">公网</text><rect class="gw" x="695" y="140" width="100" height="100" rx="12"/><text class="text" x="745" y="198" text-anchor="middle">网关B</text><rect class="site" x="830" y="115" width="230" height="150" rx="12"/><text class="label" x="945" y="150" text-anchor="middle">站点 B 私有网</text><text class="small" x="945" y="200" text-anchor="middle">10.2.0.0/16</text><line class="line" x1="435" y1="190" x2="695" y2="190"/><text class="label" x="565" y="300" text-anchor="middle">隧道：外层 IP 负责穿过公网，内层 IP 保留私有通信语义</text><g transform="translate(195,335)"><rect class="pkt outer" x="0" y="0" width="690" height="70" rx="8"/><rect class="pkt inner" x="250" y="14" width="420" height="42" rx="6"/><text class="small" x="125" y="42" text-anchor="middle">外层 IP：公网网关A → 公网网关B</text><text class="small" x="460" y="42" text-anchor="middle">加密后的内部 IP：10.1.x.x → 10.2.x.x</text></g></svg>
