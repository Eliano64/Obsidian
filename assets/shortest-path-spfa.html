<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPFA</title>
<style>
:root{--bg:#fff;--panel:#f8fafc;--text:#0f172a;--muted:#475569;--line:#94a3b8;--edge:#64748b;--hot:#2563eb;--done:#059669;--warn:#d97706}
@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--panel:#111827;--text:#f8fafc;--muted:#cbd5e1;--line:#64748b;--edge:#94a3b8;--hot:#60a5fa;--done:#34d399;--warn:#fbbf24}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,sans-serif}.wrap{padding:18px;max-width:1120px;margin:auto}.top{display:flex;justify-content:space-between;gap:12px}.title{font-size:22px;font-weight:750}.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:7px 12px;border-radius:6px;cursor:pointer}.stage{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}.card{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:14px}.note{color:var(--muted);line-height:1.6}.edge{stroke:var(--edge);stroke-width:3;marker-end:url(#arr)}.hot{stroke:var(--hot);stroke-width:5;marker-end:url(#arrHot)}.node{fill:var(--bg);stroke:var(--edge);stroke-width:2}.cur{stroke:var(--hot);stroke-width:4}.label{fill:var(--text);font-weight:700;font-size:18px}.w{fill:var(--text);font-size:14px;font-weight:700}.tbl{width:100%;border-collapse:collapse;font-size:14px}.tbl td,.tbl th{border:1px solid var(--line);padding:7px;text-align:center}.queue{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:var(--bg)}@media(max-width:760px){.stage{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
 <div class="top"><div><div class="title">SPFA：只让变短的顶点继续扩展</div><div class="note" id="cap"></div></div><div><button class="btn" id="prev">上一页</button> <button class="btn" id="next">下一页</button></div></div>
 <div class="stage"><div class="card" id="graph"></div><div class="card"><div class="note" id="txt"></div><h3>队列</h3><div class="queue" id="queue"></div><h3>数组</h3><div id="table"></div></div></div>
</div>
<script>
const pos={0:[70,190],1:[235,90],2:[420,190],3:[235,300]};
const edges=[[0,1,4],[0,3,5],[1,2,-2],[3,2,3],[2,3,1]];
const steps=[
{cap:"初始化：源点 V0 入队。",cur:0,hot:[],q:[0],dist:[0,"INF","INF","INF"],prev:["-1","-1","-1","-1"],cnt:[1,0,0,0],txt:"SPFA 从源点开始。只有队列里的顶点才会拿出来扫描出边。"},
{cap:"弹出 V0：松弛 V1 和 V3。",cur:0,hot:[[0,1],[0,3]],q:[1,3],dist:[0,4,"INF",5],prev:["-1",0,"-1",0],cnt:[1,1,0,1],txt:"dist[1] 和 dist[3] 变短，因此 V1、V3 入队，等待继续扩展。"},
{cap:"弹出 V1：负权边使 V2 变短。",cur:1,hot:[[1,2]],q:[3,2],dist:[0,4,2,5],prev:["-1",0,1,0],cnt:[1,1,1,1],txt:"V1 -> V2 的权值为 -2，得到 dist[2]=4-2=2。负权边本身不必然有问题，负权回路才会让最短路径失去定义。"},
{cap:"弹出 V3：不能改短 V2。",cur:3,hot:[[3,2]],q:[2],dist:[0,4,2,5],prev:["-1",0,1,0],cnt:[1,1,1,1],txt:"经过 V3 到 V2 的距离是 5+3=8，不小于当前 dist[2]=2，所以不更新。"},
{cap:"弹出 V2：尝试改短 V3。",cur:2,hot:[[2,3]],q:[],dist:[0,4,2,3],prev:["-1",0,1,2],cnt:[1,1,1,1],txt:"V2 -> V3 使 dist[3] 从 5 改成 3。若 V3 已不在队列，则重新入队；这里演示到关键松弛过程即可。"}
];
let i=0;
function isHot(s,a,b){return s.hot.some(e=>e[0]===a&&e[1]===b)}
function render(){
 const s=steps[i];document.getElementById("cap").textContent=s.cap;document.getElementById("txt").textContent=s.txt;
 const lines=edges.map(e=>`<line class="${isHot(s,e[0],e[1])?'hot':'edge'}" x1="${pos[e[0]][0]}" y1="${pos[e[0]][1]}" x2="${pos[e[1]][0]}" y2="${pos[e[1]][1]}"/><text class="w" x="${(pos[e[0]][0]+pos[e[1]][0])/2}" y="${(pos[e[0]][1]+pos[e[1]][1])/2-10}" text-anchor="middle">${e[2]}</text>`).join("");
 const nodes=[0,1,2,3].map(v=>`<g><circle class="node ${s.cur===v?'cur':''}" cx="${pos[v][0]}" cy="${pos[v][1]}" r="25"/><text class="label" x="${pos[v][0]}" y="${pos[v][1]+6}" text-anchor="middle">V${v}</text></g>`).join("");
 document.getElementById("graph").innerHTML=`<svg viewBox="0 0 500 390"><defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--edge)"/></marker><marker id="arrHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--hot)"/></marker></defs>${lines}${nodes}</svg>`;
 document.getElementById("queue").innerHTML=s.q.map(v=>`<span class="pill">V${v}</span>`).join("")||"<span class='pill'>empty</span>";
 const vs=[0,1,2,3];
 document.getElementById("table").innerHTML=`<table class="tbl"><tr><th>v</th>${vs.map(v=>`<th>V${v}</th>`).join("")}</tr><tr><td>dist</td>${s.dist.map(x=>`<td>${x}</td>`).join("")}</tr><tr><td>prev</td>${s.prev.map(x=>`<td>${x}</td>`).join("")}</tr><tr><td>count</td>${s.cnt.map(x=>`<td>${x}</td>`).join("")}</tr></table>`;
}
document.getElementById("prev").onclick=()=>{i=(i+steps.length-1)%steps.length;render()};document.getElementById("next").onclick=()=>{i=(i+1)%steps.length;render()};render();
</script>
</body>
</html>
