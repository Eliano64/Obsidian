<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 560" role="img" aria-labelledby="title desc">
  <title id="title">File System Disk Layout</title>
  <desc id="desc">A disk contains the MBR, partition table, and partitions. A partition contains boot block, super block, free-space management, inode area, root directory, and file and directory data.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#64748b;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706;--purple:#7c3aed}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24;--purple:#c084fc}}
    .bg{fill:var(--bg)}.bar{fill:var(--panel);stroke:var(--line);stroke-width:2}.part{fill:var(--blue);opacity:.1}.sel{fill:var(--orange);opacity:.18}.blk{fill:var(--panel);stroke:var(--line);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--line);stroke-width:2.5;fill:none;marker-end:url(#arrow)}.thin{stroke:var(--line);stroke-width:1.8;fill:none}.brace{stroke:var(--blue);stroke-width:2.5;fill:none}.zoom{stroke:var(--orange);stroke-width:2.5;fill:none}.dash{stroke-dasharray:8 7}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--line)"/></marker>
  </defs>
  <rect class="bg" width="1160" height="560"/>
  <text class="t" x="580" y="38" text-anchor="middle" font-size="25" font-weight="700">文件系统在磁盘中的结构</text>
  <text class="m" x="580" y="66" text-anchor="middle" font-size="15">整个磁盘先由 MBR 和分区表描述；每个分区再被逻辑格式化为具体文件系统</text>

  <path class="brace" d="M98 98 H1062"/>
  <path class="brace" d="M98 98 l20 -10"/>
  <path class="brace" d="M98 98 l20 10"/>
  <path class="brace" d="M1062 98 l-20 -10"/>
  <path class="brace" d="M1062 98 l-20 10"/>
  <text class="t" x="580" y="88" text-anchor="middle" font-size="17" font-weight="700">整个磁盘</text>

  <rect class="bar" x="80" y="150" width="1000" height="64" rx="2"/>
  <rect class="sel" x="80" y="150" width="116" height="64"/>
  <rect class="part" x="196" y="150" width="268" height="64"/>
  <rect class="part" x="464" y="150" width="292" height="64"/>
  <rect class="part" x="756" y="150" width="224" height="64"/>
  <rect class="part" x="980" y="150" width="100" height="64"/>
  <path class="thin" d="M196 150 V214 M464 150 V214 M756 150 V214 M980 150 V214"/>
  <text class="t" x="124" y="188" text-anchor="middle" font-size="17" font-weight="700">MBR</text>
  <text class="m" x="176" y="234" text-anchor="middle" font-size="14">分区表</text>
  <g stroke="var(--line)" stroke-width="2">
    <path d="M162 150 V214 M169 150 V214 M176 150 V214 M183 150 V214 M190 150 V214"/>
  </g>
  <text class="t" x="330" y="188" text-anchor="middle" font-size="16" font-weight="700">磁盘分区 1</text>
  <text class="t" x="610" y="188" text-anchor="middle" font-size="16" font-weight="700">磁盘分区 2</text>
  <text class="t" x="868" y="188" text-anchor="middle" font-size="16" font-weight="700">磁盘分区 3</text>
  <text class="t" x="1030" y="188" text-anchor="middle" font-size="16" font-weight="700">...</text>

  <path class="a" d="M178 145 C178 116 178 118 178 112"/>
  <text class="m" x="178" y="130" text-anchor="middle" font-size="14">分区表记录各分区范围</text>
  <path class="a" d="M610 145 C610 118 610 118 610 112"/>
  <text class="m" x="740" y="130" text-anchor="middle" font-size="14">每个分区可建立一个文件系统</text>

  <path class="zoom" d="M464 214 L180 334"/>
  <path class="zoom" d="M756 214 L980 334"/>

  <rect class="bar" x="180" y="334" width="800" height="76" rx="2"/>
  <rect class="sel" x="180" y="334" width="112" height="76"/>
  <rect class="part" x="292" y="334" width="124" height="76"/>
  <rect class="part" x="416" y="334" width="176" height="76"/>
  <rect class="part" x="592" y="334" width="120" height="76"/>
  <rect class="part" x="712" y="334" width="130" height="76"/>
  <rect class="part" x="842" y="334" width="138" height="76"/>
  <path class="thin" d="M292 334 V410 M416 334 V410 M592 334 V410 M712 334 V410 M842 334 V410"/>
  <text class="t" x="236" y="378" text-anchor="middle" font-size="16" font-weight="700">引导块</text>
  <text class="t" x="354" y="378" text-anchor="middle" font-size="16" font-weight="700">超级块</text>
  <text class="t" x="504" y="369" text-anchor="middle" font-size="16" font-weight="700">空闲空间管理</text>
  <text class="m" x="504" y="392" text-anchor="middle" font-size="13">位示图 / 链表</text>
  <text class="t" x="652" y="378" text-anchor="middle" font-size="16" font-weight="700">inode 区</text>
  <text class="t" x="777" y="378" text-anchor="middle" font-size="16" font-weight="700">根目录</text>
  <text class="t" x="911" y="369" text-anchor="middle" font-size="16" font-weight="700">文件和目录</text>
  <text class="m" x="911" y="392" text-anchor="middle" font-size="13">数据块</text>

  <text class="t" x="580" y="318" text-anchor="middle" font-size="18" font-weight="700">某个分区内部</text>
  <text class="m" x="580" y="462" text-anchor="middle" font-size="14">逻辑格式化会在分区内建立超级块、空闲空间管理结构、inode 或 FCB、目录和数据区</text>
</svg>
