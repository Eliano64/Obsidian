<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-label="VLAN划分广播域示意图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}
    .sw{fill:#eef6ff;stroke:#2f73c8;stroke-width:2.5;rx:10}.host{fill:#fff;stroke:#7d8aa0;stroke-width:2;rx:8}.line{stroke:#8a98aa;stroke-width:3}.v10{fill:none;stroke:#2d8a4d;stroke-width:2.5;stroke-dasharray:10 8;rx:18}.v20{fill:none;stroke:#bf7a18;stroke-width:2.5;stroke-dasharray:10 8;rx:18}.title{font-size:28px;font-weight:700}.label{font-size:18px;font-weight:700}.small{font-size:15px}.muted{fill:#5d6b7e}
    @media(prefers-color-scheme:dark){text{fill:#e7edf7}.muted{fill:#b6c2d2}.sw{fill:#10243d;stroke:#63a3ff}.host{fill:#111827;stroke:#718096}.line{stroke:#a8b4c5}.v10{stroke:#67d493}.v20{stroke:#ffd166}}
  </style>
  <text x="480" y="42" text-anchor="middle" class="title">VLAN：在同一物理交换网络中划分多个广播域</text>
  <rect x="385" y="210" width="190" height="72" class="sw"/><text x="480" y="253" text-anchor="middle" class="label">Switch</text>
  <g>
    <rect x="120" y="130" width="90" height="48" class="host"/><text x="165" y="160" text-anchor="middle">A</text>
    <rect x="750" y="130" width="90" height="48" class="host"/><text x="795" y="160" text-anchor="middle">B</text>
    <rect x="120" y="330" width="90" height="48" class="host"/><text x="165" y="360" text-anchor="middle">C</text>
    <rect x="750" y="330" width="90" height="48" class="host"/><text x="795" y="360" text-anchor="middle">D</text>
    <path d="M210 154 L385 230 M750 154 L575 230 M210 354 L385 262 M750 354 L575 262" class="line"/>
  </g>
  <rect x="90" y="95" width="780" height="112" class="v10"/><text x="480" y="88" text-anchor="middle" class="label">VLAN 10：A、B 同一广播域</text>
  <rect x="90" y="305" width="780" height="112" class="v20"/><text x="480" y="440" text-anchor="middle" class="label">VLAN 20：C、D 同一广播域</text>
  <text x="480" y="475" text-anchor="middle" class="small muted">广播帧只在所属 VLAN 内泛洪，不跨 VLAN 传播。</text>
</svg>
