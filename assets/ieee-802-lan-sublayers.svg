<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" role="img" aria-label="IEEE 802局域网数据链路层子层图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill:#172033; }
    .box { fill:#fff; stroke:#7d8aa0; stroke-width:2; rx:10; }
    .net { fill:#eef6ff; stroke:#2f73c8; }
    .llc { fill:#f3f8ff; stroke:#4c8ed9; }
    .mac { fill:#fff7e8; stroke:#bf7a18; }
    .phy { fill:#f1fbf3; stroke:#2d8a4d; }
    .title { font-size:28px; font-weight:700; }
    .label { font-size:20px; font-weight:700; }
    .small { font-size:16px; }
    @media (prefers-color-scheme: dark) {
      text { fill:#e7edf7; }
      .box { fill:#111827; stroke:#718096; }
      .net { fill:#10243d; stroke:#63a3ff; }
      .llc { fill:#10243d; stroke:#63a3ff; }
      .mac { fill:#2b2111; stroke:#e4a548; }
      .phy { fill:#10281a; stroke:#5ec67d; }
    }
  </style>
  <text x="430" y="42" text-anchor="middle" class="title">IEEE 802：局域网数据链路层分成 LLC 和 MAC</text>
  <rect x="170" y="80" width="520" height="64" class="box net"/>
  <text x="430" y="119" text-anchor="middle" class="label">网络层</text>
  <rect x="170" y="160" width="520" height="78" class="box llc"/>
  <text x="430" y="192" text-anchor="middle" class="label">LLC 子层</text>
  <text x="430" y="219" text-anchor="middle" class="small">向网络层提供统一接口</text>
  <rect x="170" y="254" width="520" height="86" class="box mac"/>
  <text x="430" y="288" text-anchor="middle" class="label">MAC 子层</text>
  <text x="430" y="315" text-anchor="middle" class="small">成帧、MAC 地址、介质访问控制、差错检测</text>
  <rect x="170" y="356" width="520" height="42" class="box phy"/>
  <text x="430" y="383" text-anchor="middle" class="label">物理层</text>
</svg>
