<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Segmentation Address Translation</title>
  <desc id="desc">A segment number and segment offset are checked with segment table length and segment length, then base plus offset gives physical address.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--bg:#fff;--panel:#f8fafc;--panel2:#eff6ff;--text:#111827;--muted:#4b5563;--line:#64748b;--accent:#2563eb;--danger:#dc2626;--ok:#15803d}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#1e293b;--panel2:#172554;--text:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--accent:#93c5fd;--danger:#fca5a5;--ok:#86efac}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:1.5;rx:8}.box2{fill:var(--panel2);stroke:var(--accent);stroke-width:1.7;rx:8}.cell{fill:var(--panel);stroke:var(--line);stroke-width:1}.hit{fill:var(--panel2);stroke:var(--accent);stroke-width:2}
    .title{fill:var(--text);font:700 19px "Segoe UI",Arial,sans-serif}.text{fill:var(--text);font:15px "Segoe UI",Arial,sans-serif}.small{fill:var(--muted);font:13px "Segoe UI",Arial,sans-serif}.danger{fill:var(--danger);font-weight:700}.ok{fill:var(--ok);font-weight:700}.arrow{stroke:var(--line);stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="430"/>
  <text class="title" x="40" y="38">分段地址转换</text>
  <text class="small" x="40" y="62">逻辑地址由段号和段内地址组成；段表项给出段长和基址。</text>

  <rect class="box2" x="56" y="102" width="302" height="76"/>
  <text class="text" x="78" y="130">逻辑地址</text>
  <rect class="cell" x="80" y="144" width="112" height="24"/><text class="small" x="112" y="161">段号 S</text>
  <rect class="cell" x="192" y="144" width="140" height="24"/><text class="small" x="228" y="161">段内地址 W</text>

  <rect class="box" x="406" y="92" width="220" height="230"/>
  <text class="text" x="478" y="120">段表</text>
  <rect class="cell" x="438" y="142" width="46" height="28"/><text class="small" x="455" y="160">段</text>
  <rect class="cell" x="484" y="142" width="62" height="28"/><text class="small" x="500" y="160">段长</text>
  <rect class="cell" x="546" y="142" width="58" height="28"/><text class="small" x="560" y="160">基址</text>
  <rect class="cell" x="438" y="170" width="46" height="28"/><text class="small" x="456" y="188">0</text>
  <rect class="cell" x="484" y="170" width="62" height="28"/><text class="small" x="500" y="188">7K</text>
  <rect class="cell" x="546" y="170" width="58" height="28"/><text class="small" x="558" y="188">80K</text>
  <rect class="hit" x="438" y="198" width="46" height="28"/><text class="small" x="456" y="216">1</text>
  <rect class="hit" x="484" y="198" width="62" height="28"/><text class="small" x="500" y="216">3K</text>
  <rect class="hit" x="546" y="198" width="58" height="28"/><text class="small" x="554" y="216">120K</text>
  <text class="small" x="438" y="260">先查段表，得到段长 C 和基址 b</text>

  <path class="arrow" d="M192 178v74h214"/>
  <text class="small" x="248" y="236">S 索引段表</text>

  <rect class="box2" x="680" y="102" width="240" height="84"/>
  <text class="text" x="704" y="130">越界检查</text>
  <text class="small" x="704" y="154">若 W ≥ C：越界异常</text>
  <text class="small" x="704" y="174">若 W &lt; C：继续转换</text>
  <path class="arrow" d="M626 212h54v-62"/>

  <rect class="box2" x="680" y="260" width="240" height="78"/>
  <text class="text" x="704" y="288">物理地址</text>
  <text class="small" x="704" y="314">E = 段基址 b + 段内地址 W</text>
  <path class="arrow" d="M800 186v74"/>
</svg>
