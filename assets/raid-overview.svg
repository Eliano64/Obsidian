<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">RAID Overview</title>
  <desc id="desc">RAID 0, RAID 1 and parity RAID comparison.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706;--red:#dc2626;--purple:#7c3aed}
    @media (prefers-color-scheme: dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24;--red:#f87171;--purple:#c084fc}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.disk{fill:var(--bg);stroke:var(--line);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.b{fill:var(--blue)}.g{fill:var(--green)}.o{fill:var(--orange)}.r{fill:var(--red)}.p{fill:var(--purple)}
    /* contrast-audit-fix */
  @media(prefers-color-scheme:dark){.b{fill:#1d4ed8}.g{fill:#047857}.o{fill:#92400e}.r{fill:#b91c1c}.p{fill:#7e22ce}}
  </style>
  <rect class="bg" width="1040" height="520"/>
  <text class="t" x="520" y="34" text-anchor="middle" font-size="24" font-weight="700">RAID 的核心思想</text>
  <text class="m" x="520" y="62" text-anchor="middle" font-size="15">多个物理磁盘组合成一个逻辑磁盘：条带化提高并行访问，冗余/校验提高可靠性</text>

  <rect class="panel" x="40" y="92" width="300" height="360" rx="12"/>
  <text class="t" x="190" y="124" text-anchor="middle" font-size="20" font-weight="700">RAID 0：条带化</text>
  <text class="m" x="190" y="150" text-anchor="middle" font-size="14">无冗余，无校验</text>
  <rect class="disk" x="72" y="188" width="64" height="180" rx="8"/>
  <rect class="disk" x="158" y="188" width="64" height="180" rx="8"/>
  <rect class="disk" x="244" y="188" width="64" height="180" rx="8"/>
  <text class="m" x="104" y="178" text-anchor="middle" font-size="13">盘 0</text><text class="m" x="190" y="178" text-anchor="middle" font-size="13">盘 1</text><text class="m" x="276" y="178" text-anchor="middle" font-size="13">盘 2</text>
  <rect class="b" x="84" y="208" width="40" height="28" rx="4"/><text class="t" x="104" y="227" text-anchor="middle" font-size="13">A0</text>
  <rect class="g" x="170" y="208" width="40" height="28" rx="4"/><text class="t" x="190" y="227" text-anchor="middle" font-size="13">A1</text>
  <rect class="o" x="256" y="208" width="40" height="28" rx="4"/><text class="t" x="276" y="227" text-anchor="middle" font-size="13">A2</text>
  <rect class="p" x="84" y="252" width="40" height="28" rx="4"/><text class="t" x="104" y="271" text-anchor="middle" font-size="13">A3</text>
  <rect class="r" x="170" y="252" width="40" height="28" rx="4"/><text class="t" x="190" y="271" text-anchor="middle" font-size="13">A4</text>
  <rect class="b" x="256" y="252" width="40" height="28" rx="4"/><text class="t" x="276" y="271" text-anchor="middle" font-size="13">A5</text>
  <text class="t" x="190" y="410" text-anchor="middle" font-size="15">容量和速度提高</text>
  <text class="m" x="190" y="432" text-anchor="middle" font-size="13">任一磁盘故障都可能丢数据</text>

  <rect class="panel" x="370" y="92" width="300" height="360" rx="12"/>
  <text class="t" x="520" y="124" text-anchor="middle" font-size="20" font-weight="700">RAID 1：镜像</text>
  <text class="m" x="520" y="150" text-anchor="middle" font-size="14">同一份数据写两份</text>
  <rect class="disk" x="420" y="188" width="90" height="180" rx="8"/>
  <rect class="disk" x="530" y="188" width="90" height="180" rx="8"/>
  <text class="m" x="465" y="178" text-anchor="middle" font-size="13">盘 0</text><text class="m" x="575" y="178" text-anchor="middle" font-size="13">盘 1</text>
  <rect class="b" x="437" y="208" width="56" height="28" rx="4"/><text class="t" x="465" y="227" text-anchor="middle" font-size="13">A0</text>
  <rect class="b" x="547" y="208" width="56" height="28" rx="4"/><text class="t" x="575" y="227" text-anchor="middle" font-size="13">A0</text>
  <rect class="g" x="437" y="252" width="56" height="28" rx="4"/><text class="t" x="465" y="271" text-anchor="middle" font-size="13">A1</text>
  <rect class="g" x="547" y="252" width="56" height="28" rx="4"/><text class="t" x="575" y="271" text-anchor="middle" font-size="13">A1</text>
  <text class="t" x="520" y="410" text-anchor="middle" font-size="15">可靠性提高</text>
  <text class="m" x="520" y="432" text-anchor="middle" font-size="13">有效容量约为物理容量的一半</text>

  <rect class="panel" x="700" y="92" width="300" height="360" rx="12"/>
  <text class="t" x="850" y="124" text-anchor="middle" font-size="20" font-weight="700">RAID 3/4/5：校验</text>
  <text class="m" x="850" y="150" text-anchor="middle" font-size="14">数据 + 校验信息</text>
  <rect class="disk" x="730" y="188" width="70" height="180" rx="8"/>
  <rect class="disk" x="815" y="188" width="70" height="180" rx="8"/>
  <rect class="disk" x="900" y="188" width="70" height="180" rx="8"/>
  <text class="m" x="765" y="178" text-anchor="middle" font-size="13">盘 0</text><text class="m" x="850" y="178" text-anchor="middle" font-size="13">盘 1</text><text class="m" x="935" y="178" text-anchor="middle" font-size="13">盘 2</text>
  <rect class="b" x="742" y="208" width="46" height="28" rx="4"/><text class="t" x="765" y="227" text-anchor="middle" font-size="13">D0</text>
  <rect class="g" x="827" y="208" width="46" height="28" rx="4"/><text class="t" x="850" y="227" text-anchor="middle" font-size="13">D1</text>
  <rect class="o" x="912" y="208" width="46" height="28" rx="4"/><text class="t" x="935" y="227" text-anchor="middle" font-size="13">P</text>
  <rect class="p" x="742" y="252" width="46" height="28" rx="4"/><text class="t" x="765" y="271" text-anchor="middle" font-size="13">D2</text>
  <rect class="o" x="827" y="252" width="46" height="28" rx="4"/><text class="t" x="850" y="271" text-anchor="middle" font-size="13">P</text>
  <rect class="r" x="912" y="252" width="46" height="28" rx="4"/><text class="t" x="935" y="271" text-anchor="middle" font-size="13">D3</text>
  <text class="t" x="850" y="410" text-anchor="middle" font-size="15">兼顾容量和容错</text>
  <text class="m" x="850" y="432" text-anchor="middle" font-size="13">可由校验信息恢复部分故障数据</text>
</svg>
