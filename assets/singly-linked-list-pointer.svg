<svg xmlns="http://www.w3.org/2000/svg" width="960" height="330" viewBox="0 0 960 330" role="img" aria-labelledby="title desc">
  <title id="title">Singly linked list pointers</title>
  <desc id="desc">A headed singly linked list and the pointer changes for inserting a node after p.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334e68"/>
    </marker>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      .node{fill:#f8fbff;stroke:#334e68;stroke-width:2}
      .head{fill:#fff7e6;stroke:#ad6800;stroke-width:2}
      .new{fill:#e6fffb;stroke:#0f766e;stroke-width:2}
      .txt{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#102a43}
      .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:14px;fill:#52616b}
      .code{font-family:Consolas,monospace;font-size:16px;fill:#1f2933}
      .ptr{stroke:#334e68;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .newptr{stroke:#0f766e;stroke-width:2.8;fill:none;marker-end:url(#arrow)}
      @media (prefers-color-scheme: dark){
        svg{background:#0f1720}
        .node{fill:#16212c;stroke:#9ccfd8}
        .head{fill:#2a2113;stroke:#f6c177}
        .new{fill:#102620;stroke:#5eead4}
        .txt,.code{fill:#e6edf3}
        .small{fill:#b8c4cf}
        .ptr{stroke:#9ccfd8}
        .newptr{stroke:#5eead4}
      }
    </style>
  </defs>
  <text class="txt" x="36" y="38">带头结点单链表：结点由 data 和 next 组成</text>
  <text class="small" x="36" y="64">插入时先让新结点接上后继，再让前驱指向新结点，避免丢失原链。</text>
  <g transform="translate(58 105)">
    <rect class="head" x="0" y="0" width="105" height="66" rx="8"/>
    <line x1="55" y1="0" x2="55" y2="66" stroke="#ad6800" stroke-width="2"/>
    <text class="txt" x="12" y="39">头</text>
    <text class="small" x="66" y="39">next</text>
    <rect class="node" x="170" y="0" width="105" height="66" rx="8"/>
    <line x1="225" y1="0" x2="225" y2="66" stroke="#334e68" stroke-width="2"/>
    <text class="txt" x="188" y="39">a1</text>
    <text class="small" x="236" y="39">next</text>
    <rect class="node" x="340" y="0" width="105" height="66" rx="8"/>
    <line x1="395" y1="0" x2="395" y2="66" stroke="#334e68" stroke-width="2"/>
    <text class="txt" x="358" y="39">a2</text>
    <text class="small" x="406" y="39">next</text>
    <rect class="node" x="510" y="0" width="105" height="66" rx="8"/>
    <line x1="565" y1="0" x2="565" y2="66" stroke="#334e68" stroke-width="2"/>
    <text class="txt" x="528" y="39">a3</text>
    <text class="small" x="576" y="39">NULL</text>
    <path class="ptr" d="M 105 33 C 132 33 142 33 165 33"/>
    <path class="ptr" d="M 275 33 C 302 33 312 33 335 33"/>
    <path class="ptr" d="M 445 33 C 472 33 482 33 505 33"/>
    <text class="small" x="343" y="-14">p</text>
    <rect class="new" x="340" y="145" width="105" height="66" rx="8"/>
    <line x1="395" y1="145" x2="395" y2="211" stroke="#0f766e" stroke-width="2"/>
    <text class="txt" x="361" y="184">e</text>
    <text class="small" x="406" y="184">next</text>
    <text class="small" x="374" y="232">s</text>
    <path class="newptr" d="M 445 178 C 515 175 520 76 510 42"/>
    <path class="newptr" d="M 395 66 C 400 98 398 123 394 143"/>
  </g>
  <text class="code" x="650" y="130">s->next = p->next;</text>
  <text class="code" x="650" y="160">p->next = s;</text>
  <text class="small" x="650" y="198">若先执行 p->next = s，原来的后继地址会丢失。</text>
</svg>
