<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">路由聚合</title>
  <desc id="desc">连续地址块如果共享更短的共同前缀，可以聚合为一条更短的路由。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}.bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:18px}.small{fill:#334155;font-size:15px}.item{fill:#dbeafe;stroke:#2563eb}.agg{fill:#fef3c7;stroke:#f59e0b}.arrow{stroke:#475569;stroke-width:3;fill:none;marker-end:url(#arr)}
    @media(prefers-color-scheme:dark){.bg{fill:#020617}.panel{fill:#0f172a;stroke:#334155}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.item{fill:#172554;stroke:#60a5fa}.agg{fill:#422006;stroke:#fbbf24}.arrow{stroke:#cbd5e1}}
  </style>
  <defs><marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="currentColor"/></marker></defs>
  <rect class="bg" width="980" height="420"/>
  <text class="text" x="490" y="42" text-anchor="middle" font-size="26" font-weight="700">路由聚合：多条连续前缀合成一条更短前缀</text>
  <rect class="panel" x="70" y="86" width="340" height="260" rx="12"/>
  <text class="text" x="240" y="124" text-anchor="middle">聚合前</text>
  <g transform="translate(125,150)">
    <rect class="item" x="0" y="0" width="230" height="38" rx="7"/><text class="small" x="115" y="25" text-anchor="middle">192.168.0.0/24</text>
    <rect class="item" x="0" y="52" width="230" height="38" rx="7"/><text class="small" x="115" y="77" text-anchor="middle">192.168.1.0/24</text>
    <rect class="item" x="0" y="104" width="230" height="38" rx="7"/><text class="small" x="115" y="129" text-anchor="middle">192.168.2.0/24</text>
    <rect class="item" x="0" y="156" width="230" height="38" rx="7"/><text class="small" x="115" y="181" text-anchor="middle">192.168.3.0/24</text>
  </g>
  <path class="arrow" d="M430 216 H550"/>
  <rect class="panel" x="570" y="86" width="340" height="260" rx="12"/>
  <text class="text" x="740" y="124" text-anchor="middle">聚合后</text>
  <rect class="agg" x="625" y="194" width="230" height="54" rx="8"/>
  <text class="text" x="740" y="228" text-anchor="middle">192.168.0.0/22</text>
  <text class="small" x="490" y="388" text-anchor="middle">前 22 bit 相同且地址块连续时，路由器可以只发布一条聚合路由。</text>
</svg>
