<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Connectivity and strong connectivity</title>
  <desc id="desc">Connected graph, disconnected graph, and strongly connected directed cycle.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    .edge{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}
    .arc{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    .node{fill:#ffffff;stroke:#2563eb;stroke-width:3}
    .node2{fill:#ffffff;stroke:#16a34a;stroke-width:3}
    .text{fill:#0f172a;font-size:21px;font-weight:650}
    .small{fill:#334155;font-size:17px}
    .formula{fill:#7c2d12;font-size:18px;font-weight:650}
    @media (prefers-color-scheme: dark){
      .panel{fill:#111827;stroke:#334155}
      .edge,.arc{stroke:#cbd5e1}
      .node,.node2{fill:#0b1220}
      .text{fill:#f8fafc}
      .small{fill:#cbd5e1}
      .formula{fill:#fdba74}
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="panel" x="28" y="28" width="285" height="424" rx="10"/>
  <rect class="panel" x="348" y="28" width="285" height="424" rx="10"/>
  <rect class="panel" x="668" y="28" width="285" height="424" rx="10"/>

  <text class="text" x="70" y="72">连通图</text>
  <line class="edge" x1="112" y1="150" x2="220" y2="130"/>
  <line class="edge" x1="112" y1="150" x2="150" y2="260"/>
  <line class="edge" x1="220" y1="130" x2="252" y2="250"/>
  <line class="edge" x1="150" y1="260" x2="252" y2="250"/>
  <circle class="node" cx="112" cy="150" r="24"/><text class="text" x="104" y="158">A</text>
  <circle class="node" cx="220" cy="130" r="24"/><text class="text" x="212" y="138">B</text>
  <circle class="node" cx="150" cy="260" r="24"/><text class="text" x="142" y="268">C</text>
  <circle class="node" cx="252" cy="250" r="24"/><text class="text" x="244" y="258">D</text>
  <text class="small" x="65" y="360">任意两点之间都有路径</text>
  <text class="formula" x="65" y="392">最少边数：n - 1</text>

  <text class="text" x="390" y="72">非连通图</text>
  <line class="edge" x1="432" y1="150" x2="530" y2="135"/>
  <line class="edge" x1="432" y1="150" x2="465" y2="245"/>
  <line class="edge" x1="530" y1="135" x2="465" y2="245"/>
  <line class="edge" x1="555" y1="270" x2="590" y2="210"/>
  <circle class="node" cx="432" cy="150" r="24"/><text class="text" x="424" y="158">A</text>
  <circle class="node" cx="530" cy="135" r="24"/><text class="text" x="522" y="143">B</text>
  <circle class="node" cx="465" cy="245" r="24"/><text class="text" x="457" y="253">C</text>
  <circle class="node" cx="555" cy="270" r="24"/><text class="text" x="547" y="278">D</text>
  <circle class="node" cx="590" cy="210" r="24"/><text class="text" x="582" y="218">E</text>
  <text class="small" x="385" y="360">至少存在一对顶点不可达</text>
  <text class="formula" x="385" y="392">最多边数：C²ₙ₋₁</text>

  <text class="text" x="704" y="72">强连通图</text>
  <path class="arc" d="M765 145 C810 105, 855 105, 890 145"/>
  <path class="arc" d="M895 170 C920 230, 880 292, 812 300"/>
  <path class="arc" d="M792 292 C730 265, 720 198, 750 165"/>
  <circle class="node2" cx="760" cy="155" r="24"/><text class="text" x="752" y="163">A</text>
  <circle class="node2" cx="900" cy="155" r="24"/><text class="text" x="892" y="163">B</text>
  <circle class="node2" cx="805" cy="305" r="24"/><text class="text" x="797" y="313">C</text>
  <text class="small" x="704" y="360">任意两点双向可达</text>
  <text class="formula" x="704" y="392">最少弧数：n</text>
</svg>
