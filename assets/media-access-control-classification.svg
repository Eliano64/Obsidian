<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-label="介质访问控制分类图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .muted { fill: #526174; }
    .box { fill: #ffffff; stroke: #8a98ac; stroke-width: 2; rx: 12; }
    .root { fill: #eef6ff; stroke: #2f73c8; }
    .method-a { fill: #f1fbf3; stroke: #2d8a4d; }
    .method-b { fill: #fff7e8; stroke: #c27a16; }
    .method-c { fill: #f5efff; stroke: #7b55c7; }
    .line { stroke: #66758a; stroke-width: 2.5; fill: none; }
    .tag { font-size: 18px; font-weight: 700; }
    .small { font-size: 16px; }
    .title { font-size: 28px; font-weight: 700; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e7edf7; }
      .muted { fill: #b6c2d2; }
      .box { fill: #111827; stroke: #718096; }
      .root { fill: #10243d; stroke: #63a3ff; }
      .method-a { fill: #10281a; stroke: #5ec67d; }
      .method-b { fill: #2b2111; stroke: #e4a548; }
      .method-c { fill: #211938; stroke: #a78bfa; }
      .line { stroke: #9aa8ba; }
    }
  </style>
  <text x="480" y="44" text-anchor="middle" class="title">介质访问控制：决定共享信道的发送权</text>

  <rect x="315" y="78" width="330" height="70" class="box root"/>
  <text x="480" y="108" text-anchor="middle" class="tag">多个站点共享同一信道</text>
  <text x="480" y="133" text-anchor="middle" class="small muted">谁可以在什么时候发送？</text>

  <path d="M480 148 L480 188 M210 188 L750 188 M210 188 L210 218 M480 188 L480 218 M750 188 L750 218" class="line"/>

  <rect x="70" y="218" width="280" height="210" class="box method-a"/>
  <text x="210" y="255" text-anchor="middle" class="tag">信道划分</text>
  <text x="210" y="288" text-anchor="middle" class="small">先把资源切开</text>
  <text x="210" y="323" text-anchor="middle" class="small muted">频率 / 时间 / 波长 / 码片</text>
  <text x="210" y="358" text-anchor="middle" class="small">FDM、TDM、WDM、CDM</text>
  <text x="210" y="393" text-anchor="middle" class="small muted">冲突少，空闲资源可能浪费</text>

  <rect x="360" y="218" width="240" height="210" class="box method-b"/>
  <text x="480" y="255" text-anchor="middle" class="tag">随机访问</text>
  <text x="480" y="288" text-anchor="middle" class="small">有数据就争用</text>
  <text x="480" y="323" text-anchor="middle" class="small muted">冲突后等待并重发</text>
  <text x="480" y="358" text-anchor="middle" class="small">ALOHA、CSMA</text>
  <text x="480" y="393" text-anchor="middle" class="small muted">适合突发流量</text>

  <rect x="610" y="218" width="280" height="210" class="box method-c"/>
  <text x="750" y="255" text-anchor="middle" class="tag">轮询访问</text>
  <text x="750" y="288" text-anchor="middle" class="small">控制过程分配发送权</text>
  <text x="750" y="323" text-anchor="middle" class="small muted">被轮询或拿到令牌才能发</text>
  <text x="750" y="358" text-anchor="middle" class="small">轮询、令牌传递</text>
  <text x="750" y="393" text-anchor="middle" class="small muted">顺序明确，控制开销较高</text>
</svg>
