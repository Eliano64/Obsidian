<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">IPv4 and IPv6 header comparison</title>
  <desc id="desc">IPv6 simplifies base header and moves options to extension headers.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.panel{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.ok{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:8}.gone{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:8}.new{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:8}.label{font-size:20px;font-weight:700}.small{font-size:15px}@media(prefers-color-scheme:dark){text{fill:#e5e7eb}.panel{fill:#111827;stroke:#94a3b8}.ok{fill:#10213f;stroke:#60a5fa}.gone{fill:#3b0d0d;stroke:#f87171}.new{fill:#0f2b1d;stroke:#4ade80}}</style>
  <text x="490" y="38" text-anchor="middle" class="label">IPv4 首部到 IPv6 基本首部的变化</text>
  <rect x="55" y="75" width="400" height="285" class="panel"/><text x="255" y="112" text-anchor="middle" class="label">IPv4</text>
  <rect x="525" y="75" width="400" height="285" class="panel"/><text x="725" y="112" text-anchor="middle" class="label">IPv6</text>
  <rect x="90" y="140" width="330" height="38" class="gone"/><text x="255" y="164" text-anchor="middle" class="small">首部长度、总长度、首部检验和</text>
  <rect x="90" y="190" width="330" height="38" class="gone"/><text x="255" y="214" text-anchor="middle" class="small">标识、标志、片偏移</text>
  <rect x="90" y="240" width="330" height="38" class="ok"/><text x="255" y="264" text-anchor="middle" class="small">TTL、协议、源/目的地址</text>
  <rect x="560" y="140" width="330" height="38" class="new"/><text x="725" y="164" text-anchor="middle" class="small">固定 40 字节基本首部</text>
  <rect x="560" y="190" width="330" height="38" class="new"/><text x="725" y="214" text-anchor="middle" class="small">下一个首部串联扩展首部</text>
  <rect x="560" y="240" width="330" height="38" class="new"/><text x="725" y="264" text-anchor="middle" class="small">128 bit 地址、流标号、跳数限制</text>
  <text x="490" y="392" text-anchor="middle" class="small">IPv6 不是只把地址变长；它同时简化转发路径上的基本首部处理</text>
</svg>
