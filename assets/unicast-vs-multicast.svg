<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
  <title id="title">Unicast and multicast traffic comparison</title>
  <desc id="desc">Unicast sends separate copies while multicast sends one copy and routers replicate where paths branch.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.panel{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.node{fill:#fff;stroke:#475569;stroke-width:2}.line{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}.m{stroke:#16a34a}.label{font-size:20px;font-weight:700}.small{font-size:14px}@media(prefers-color-scheme:dark){text{fill:#e5e7eb}.panel{fill:#111827;stroke:#94a3b8}.node{fill:#0b1220;stroke:#cbd5e1}.line{stroke:#60a5fa}.m{stroke:#4ade80}}</style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs>
  <text x="480" y="36" text-anchor="middle" class="label">单播与多播</text>
  <rect x="50" y="65" width="405" height="270" class="panel"/><text x="252" y="100" text-anchor="middle" class="label">单播</text>
  <rect x="505" y="65" width="405" height="270" class="panel"/><text x="707" y="100" text-anchor="middle" class="label">多播</text>
  <circle cx="130" cy="210" r="28" class="node"/><text x="130" y="216" text-anchor="middle" class="small">S</text><circle cx="345" cy="145" r="24" class="node"/><text x="345" y="151" text-anchor="middle" class="small">A</text><circle cx="345" cy="210" r="24" class="node"/><text x="345" y="216" text-anchor="middle" class="small">B</text><circle cx="345" cy="275" r="24" class="node"/><text x="345" y="281" text-anchor="middle" class="small">C</text>
  <path d="M158 210 C220 120, 280 130, 322 145" class="line"/><path d="M158 210 H321" class="line"/><path d="M158 210 C220 300, 280 290, 322 275" class="line"/>
  <text x="252" y="315" text-anchor="middle" class="small">源点发送多份副本</text>
  <circle cx="585" cy="210" r="28" class="node"/><text x="585" y="216" text-anchor="middle" class="small">S</text><circle cx="700" cy="210" r="25" class="node"/><text x="700" y="216" text-anchor="middle" class="small">R</text><circle cx="825" cy="145" r="24" class="node"/><text x="825" y="151" text-anchor="middle" class="small">A</text><circle cx="825" cy="210" r="24" class="node"/><text x="825" y="216" text-anchor="middle" class="small">B</text><circle cx="825" cy="275" r="24" class="node"/><text x="825" y="281" text-anchor="middle" class="small">C</text>
  <path d="M613 210 H675" class="line m"/><path d="M725 210 C765 150, 790 145, 801 145" class="line m"/><path d="M725 210 H801" class="line m"/><path d="M725 210 C765 270, 790 275, 801 275" class="line m"/>
  <text x="707" y="315" text-anchor="middle" class="small">源点发送一份，分叉处复制</text>
</svg>
