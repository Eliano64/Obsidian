<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">DMA 控制器与共享主存通路</title>
  <desc id="desc">CPU 和 DMA 控制器接入同一条系统总线访问主存，因此同时访存时需要仲裁。块设备只与 DMA 控制器交换数据。</desc>
  <style>
    svg{background:#f8fafc}
    @media(prefers-color-scheme:dark){svg{background:#0b1020}}
    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#94a3b8;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706;--red:#dc2626;--soft-red:#fef2f2}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#64748b;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24;--red:#f87171;--soft-red:#291418}}
    .bg{fill:var(--bg)}
    .box{fill:var(--panel);stroke:var(--line);stroke-width:2}
    .dma{fill:var(--panel);stroke:var(--green);stroke-width:2.5}
    .reg{fill:var(--bg);stroke:var(--blue);stroke-width:1.8}
    .t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}
    .m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}
    .link{stroke:var(--line);stroke-width:4;fill:none;stroke-linejoin:round}
    .bus{stroke:var(--line);stroke-width:10;stroke-linecap:round}
    .cpu-access{stroke:var(--blue);stroke-width:3.5;fill:none;marker-end:url(#blue-arrow)}
    .dma-access{stroke:var(--green);stroke-width:3.5;fill:none;marker-end:url(#green-arrow)}
    .io{stroke:var(--orange);stroke-width:3.5;fill:none;marker-start:url(#orange-back);marker-end:url(#orange-arrow)}
    .control{stroke:var(--blue);stroke-width:2.5;fill:none;marker-start:url(#blue-back);marker-end:url(#blue-arrow)}
    .notice{fill:var(--soft-red);stroke:var(--red);stroke-width:1.8}
  </style>
  <defs>
    <marker id="blue-arrow" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="var(--blue)"/></marker>
    <marker id="blue-back" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto"><path d="M9 0 L0 4.5 L9 9 Z" fill="var(--blue)"/></marker>
    <marker id="green-arrow" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="var(--green)"/></marker>
    <marker id="orange-arrow" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="var(--orange)"/></marker>
    <marker id="orange-back" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto"><path d="M9 0 L0 4.5 L9 9 Z" fill="var(--orange)"/></marker>
  </defs>

  <rect class="bg" width="1000" height="560"/>
  <text class="t" x="500" y="38" text-anchor="middle" font-size="24" font-weight="700">DMA 控制器与共享主存通路</text>

  <rect class="box" x="45" y="82" width="175" height="104" rx="10"/>
  <text class="t" x="132" y="122" text-anchor="middle" font-size="20" font-weight="700">CPU</text>
  <text class="m" x="132" y="151" text-anchor="middle" font-size="15">设置参数、处理中断</text>

  <rect class="box" x="45" y="274" width="175" height="104" rx="10"/>
  <text class="t" x="132" y="314" text-anchor="middle" font-size="20" font-weight="700">块设备</text>
  <text class="m" x="132" y="343" text-anchor="middle" font-size="15">磁盘 / SSD</text>

  <rect class="dma" x="325" y="66" width="370" height="288" rx="12"/>
  <text class="t" x="510" y="101" text-anchor="middle" font-size="21" font-weight="700">DMA 控制器</text>
  <rect class="reg" x="360" y="128" width="130" height="54" rx="7"/>
  <text class="t" x="425" y="151" text-anchor="middle" font-size="15" font-weight="700">DR</text>
  <text class="m" x="425" y="171" text-anchor="middle" font-size="13">数据缓冲</text>
  <rect class="reg" x="530" y="128" width="130" height="54" rx="7"/>
  <text class="t" x="595" y="151" text-anchor="middle" font-size="15" font-weight="700">MAR / AR</text>
  <text class="m" x="595" y="171" text-anchor="middle" font-size="13">主存地址</text>
  <rect class="reg" x="360" y="204" width="130" height="54" rx="7"/>
  <text class="t" x="425" y="227" text-anchor="middle" font-size="15" font-weight="700">DC / WC</text>
  <text class="m" x="425" y="247" text-anchor="middle" font-size="13">剩余计数</text>
  <rect class="reg" x="530" y="204" width="130" height="54" rx="7"/>
  <text class="t" x="595" y="227" text-anchor="middle" font-size="15" font-weight="700">CR</text>
  <text class="m" x="595" y="247" text-anchor="middle" font-size="13">命令 / 状态</text>
  <rect class="box" x="385" y="282" width="250" height="43" rx="7"/>
  <text class="m" x="510" y="309" text-anchor="middle" font-size="14">控制与时序：请求、仲裁、读写控制</text>

  <rect class="box" x="790" y="82" width="175" height="104" rx="10"/>
  <text class="t" x="877" y="122" text-anchor="middle" font-size="20" font-weight="700">主存</text>
  <text class="m" x="877" y="151" text-anchor="middle" font-size="15">程序与数据缓冲区</text>

  <path class="control" d="M220 133 H325"/>
  <text class="m" x="272" y="110" text-anchor="middle" font-size="13">初始化 / 完成中断</text>
  <path class="io" d="M220 326 H325"/>
  <text class="m" x="272" y="301" text-anchor="middle" font-size="13">设备数据 / DMA 请求</text>

  <path class="link" d="M92 186 V226 H24 V416"/>
  <path class="link" d="M510 354 V416"/>
  <path class="link" d="M877 186 V416"/>
  <line class="bus" x1="20" y1="416" x2="887" y2="416"/>
  <path class="cpu-access" d="M24 369 V408"/>
  <path class="dma-access" d="M510 369 V408"/>
  <text class="t" x="92" y="400" text-anchor="middle" font-size="14" font-weight="700">CPU 访存</text>
  <text class="t" x="510" y="360" text-anchor="middle" font-size="14" font-weight="700">DMA 访存</text>
  <text class="t" x="500" y="452" text-anchor="middle" font-size="17" font-weight="700">同一条共享系统总线 / 主存通路</text>
  <text class="m" x="500" y="475" text-anchor="middle" font-size="14">地址线、数据线和控制线由当前获得总线使用权的一方驱动</text>

  <rect class="notice" x="190" y="496" width="620" height="45" rx="9"/>
  <text class="t" x="500" y="524" text-anchor="middle" font-size="16" font-weight="700">CPU 与 DMA 同时访问主存时会争用这条通路，必须经过总线仲裁</text>
</svg>
