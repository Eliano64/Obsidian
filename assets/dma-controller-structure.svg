<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">DMA Controller Structure</title>
  <desc id="desc">DMA controller transfers data between I/O device and main memory, with address, count, command and data registers.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706;--red:#dc2626}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24;--red:#f87171}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.reg{fill:var(--bg);stroke:var(--blue);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.data{stroke:var(--blue);stroke-width:4;fill:none;marker-end:url(#ba)}.ctrl{stroke:var(--orange);stroke-width:3;fill:none;marker-end:url(#oa)}.irq{stroke:var(--red);stroke-width:3;fill:none;marker-end:url(#ra);stroke-dasharray:8 6}.bus{stroke:var(--line);stroke-width:8;stroke-linecap:round}
  </style>
  <defs>
    <marker id="ba" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"/></marker>
    <marker id="oa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--orange)"/></marker>
    <marker id="ra" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--red)"/></marker>
  </defs>
  <rect class="bg" width="1120" height="520"/>
  <text class="t" x="560" y="42" text-anchor="middle" font-size="24" font-weight="700">DMA 控制器结构</text>
  <line class="bus" x1="120" y1="268" x2="1000" y2="268"/>
  <text class="m" x="560" y="296" text-anchor="middle" font-size="14">系统总线 / 主存总线</text>
  <rect class="box" x="65" y="150" width="135" height="90" rx="8"/>
  <text class="t" x="132" y="186" text-anchor="middle" font-size="18" font-weight="700">CPU</text>
  <text class="m" x="132" y="214" text-anchor="middle" font-size="13">设置 DMA 参数</text>
  <rect class="box" x="250" y="118" width="450" height="270" rx="10"/>
  <text class="t" x="475" y="150" text-anchor="middle" font-size="20" font-weight="700">DMA 控制器</text>
  <rect class="reg" x="285" y="176" width="150" height="54" rx="6"/>
  <text class="t" x="360" y="199" text-anchor="middle" font-size="15" font-weight="700">DR</text>
  <text class="m" x="360" y="218" text-anchor="middle" font-size="12">数据缓冲</text>
  <rect class="reg" x="515" y="176" width="150" height="54" rx="6"/>
  <text class="t" x="590" y="199" text-anchor="middle" font-size="15" font-weight="700">MAR / AR</text>
  <text class="m" x="590" y="218" text-anchor="middle" font-size="12">主存地址</text>
  <rect class="reg" x="285" y="262" width="150" height="54" rx="6"/>
  <text class="t" x="360" y="285" text-anchor="middle" font-size="15" font-weight="700">DC / WC</text>
  <text class="m" x="360" y="304" text-anchor="middle" font-size="12">剩余计数</text>
  <rect class="reg" x="515" y="262" width="150" height="54" rx="6"/>
  <text class="t" x="590" y="285" text-anchor="middle" font-size="15" font-weight="700">CR</text>
  <text class="m" x="590" y="304" text-anchor="middle" font-size="12">命令 / 状态</text>
  <rect class="box" x="365" y="332" width="220" height="38" rx="6"/>
  <text class="m" x="475" y="356" text-anchor="middle" font-size="13">控制与时序逻辑：请求 / 仲裁 / 读写控制</text>
  <rect class="box" x="780" y="120" width="150" height="90" rx="8"/>
  <text class="t" x="855" y="156" text-anchor="middle" font-size="18" font-weight="700">主存</text>
  <text class="m" x="855" y="184" text-anchor="middle" font-size="13">DMA 直接读写</text>
  <rect class="box" x="780" y="330" width="150" height="90" rx="8"/>
  <text class="t" x="855" y="366" text-anchor="middle" font-size="18" font-weight="700">块设备</text>
  <text class="m" x="855" y="394" text-anchor="middle" font-size="13">磁盘 / SSD</text>
  <path class="ctrl" d="M200 195 C230 195 230 226 250 226"/>
  <text class="m" x="232" y="184" text-anchor="middle" font-size="12">初始化</text>
  <path class="data" d="M700 203 C740 190 745 166 780 166"/>
  <path class="data" d="M780 375 C745 375 740 289 700 289"/>
  <path class="irq" d="M475 118 C400 76 220 82 165 150"/>
  <text class="m" x="340" y="84" text-anchor="middle" font-size="13">块传送完成后中断 CPU</text>
</svg>
