<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Process resource container and threads</title>
  <desc id="desc">A process owns resources while threads are CPU execution flows.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; --bg:#fff; --fg:#111827; --muted:#64748b; --line:#94a3b8; --blue:#dbeafe; --green:#dcfce7; --amber:#fef3c7; --accent:#2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg:#0f172a; --fg:#e5e7eb; --muted:#94a3b8; --line:#64748b; --blue:#1e3a8a; --green:#14532d; --amber:#713f12; --accent:#60a5fa; } }
    .bg{fill:var(--bg)} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:var(--fg)} .h{font-weight:700;font-size:22px}.t{font-size:16px}.small{font-size:14px;fill:var(--muted)}.box{stroke:var(--line);stroke-width:2;rx:10}.arrow{fill:none;stroke:var(--accent);stroke-width:3;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="var(--accent)"/></marker></defs>
  <rect class="bg" width="980" height="420"/>
  <rect class="box" x="70" y="60" width="560" height="295" fill="var(--blue)"/>
  <text class="h" x="350" y="100" text-anchor="middle">进程：资源容器</text>
  <rect class="box" x="110" y="132" width="140" height="58" fill="var(--bg)"/><text class="t" x="180" y="166" text-anchor="middle">地址空间</text>
  <rect class="box" x="270" y="132" width="140" height="58" fill="var(--bg)"/><text class="t" x="340" y="166" text-anchor="middle">打开文件</text>
  <rect class="box" x="430" y="132" width="140" height="58" fill="var(--bg)"/><text class="t" x="500" y="166" text-anchor="middle">I/O 资源</text>
  <g>
    <rect class="box" x="118" y="245" width="120" height="60" fill="var(--green)"/><text class="t" x="178" y="270" text-anchor="middle">线程 T1</text><text class="small" x="178" y="292" text-anchor="middle">PC / 栈 / 寄存器</text>
    <rect class="box" x="270" y="245" width="120" height="60" fill="var(--green)"/><text class="t" x="330" y="270" text-anchor="middle">线程 T2</text><text class="small" x="330" y="292" text-anchor="middle">PC / 栈 / 寄存器</text>
    <rect class="box" x="422" y="245" width="120" height="60" fill="var(--green)"/><text class="t" x="482" y="270" text-anchor="middle">线程 T3</text><text class="small" x="482" y="292" text-anchor="middle">PC / 栈 / 寄存器</text>
  </g>
  <rect class="box" x="730" y="125" width="160" height="105" fill="var(--amber)"/>
  <text class="h" x="810" y="166" text-anchor="middle">CPU</text>
  <text class="small" x="810" y="195" text-anchor="middle">调度执行线程</text>
  <path class="arrow" d="M542 275 C640 265 685 220 730 180"/>
  <text class="small" x="350" y="382" text-anchor="middle">进程负责资源归属；线程负责执行流和处理机分配。</text>
</svg>
