<svg xmlns="http://www.w3.org/2000/svg" width="980" height="660" viewBox="0 0 980 660" role="img" aria-labelledby="title desc">
  <title id="title">x86 stack frame layout</title>
  <desc id="desc">A 32-bit x86 stack frame showing arguments, return address, saved ebp, local variables, ebp and esp offsets.</desc>
  <defs>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      :root {
        --bg: #ffffff;
        --fg: #17212b;
        --muted: #5b6773;
        --line: #26323d;
        --soft: #f4f7fb;
        --accent: #2563eb;
        --orange: #c2410c;
        --green: #15803d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1720;
          --fg: #e8edf2;
          --muted: #aab5c0;
          --line: #d7dee6;
          --soft: #1b2632;
          --accent: #7cb7ff;
          --orange: #ffb07c;
          --green: #7bdc91;
        }
      }
      .bg { fill: var(--bg); }
      .cell { fill: var(--soft); stroke: var(--line); stroke-width: 1.7; }
      .focus { fill: none; stroke: var(--accent); stroke-width: 2.7; }
      .label { font: 22px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: var(--fg); }
      .small { font: 17px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: var(--muted); }
      .code { font: 19px Consolas, "Courier New", monospace; fill: var(--fg); }
      .addr { font: 17px Consolas, "Courier New", monospace; fill: var(--muted); }
      .blue { fill: var(--accent); }
      .orange { fill: var(--orange); }
      .green { fill: var(--green); }
      .arrow { stroke: var(--line); stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrowBlue { stroke: var(--accent); stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
      .dash { stroke-dasharray: 7 6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--line)"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent)"/>
    </marker>
  </defs>
  <rect class="bg" width="980" height="660"/>
  <text x="490" y="48" text-anchor="middle" class="label">32 位 x86 栈帧的典型布局</text>
  <text x="490" y="78" text-anchor="middle" class="small">栈向低地址增长；ebp 稳定定位当前栈帧，esp 指向当前栈顶</text>

  <line x1="120" y1="115" x2="120" y2="570" class="arrow"/>
  <text x="86" y="125" class="small">高地址</text>
  <text x="86" y="575" class="small">低地址</text>

  <g transform="translate(250 115)">
    <rect x="0" y="0" width="430" height="54" class="cell"/>
    <rect x="0" y="54" width="430" height="54" class="cell"/>
    <rect x="0" y="108" width="430" height="54" class="cell"/>
    <rect x="0" y="162" width="430" height="54" class="cell"/>
    <rect x="0" y="216" width="430" height="54" class="cell"/>
    <rect x="0" y="270" width="430" height="54" class="cell"/>
    <rect x="0" y="324" width="430" height="54" class="cell"/>
    <rect x="0" y="378" width="430" height="54" class="cell"/>
    <rect x="0" y="162" width="430" height="216" class="focus"/>

    <text x="24" y="35" class="code">[ebp+12]</text><text x="182" y="35" class="label">第 2 个参数 y</text>
    <text x="24" y="89" class="code">[ebp+8]</text><text x="182" y="89" class="label">第 1 个参数 x</text>
    <text x="24" y="143" class="code">[ebp+4]</text><text x="182" y="143" class="label">返回地址</text>
    <text x="24" y="197" class="code">[ebp]</text><text x="182" y="197" class="label">保存的上一层 ebp</text>
    <text x="24" y="251" class="code">[ebp-4]</text><text x="182" y="251" class="label">局部变量 1</text>
    <text x="24" y="305" class="code">[ebp-8]</text><text x="182" y="305" class="label">局部变量 2</text>
    <text x="24" y="359" class="code">[ebp-12]</text><text x="182" y="359" class="label">局部变量 3</text>
    <text x="24" y="413" class="code">...</text><text x="182" y="413" class="label">更低地址的栈内容</text>
  </g>

  <path d="M 735 304 L 690 304" class="arrowBlue"/>
  <text x="748" y="298" class="code blue">ebp</text>
  <text x="748" y="323" class="small">当前栈帧基准点</text>

  <path d="M 735 466 L 690 466" class="arrow"/>
  <text x="748" y="460" class="code">esp</text>
  <text x="748" y="485" class="small">分配局部变量后常在更低处</text>

  <path d="M 178 330 L 178 438" class="arrowBlue"/>
  <text x="150" y="386" class="small blue" transform="rotate(-90 150 386)">push / call 方向</text>

  <rect x="70" y="600" width="840" height="38" rx="6" fill="none" stroke="var(--line)" stroke-width="1.4"/>
  <text x="490" y="625" text-anchor="middle" class="small">返回地址在 call 后先位于 [esp]；执行 push ebp / mov ebp, esp 后，它变成 [ebp+4]。</text>
</svg>
