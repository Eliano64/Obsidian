<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 520" role="img" aria-labelledby="title desc">
  <title id="title">Five basic binary tree forms</title>
  <desc id="desc">The five basic states of a binary tree: empty, root only, only left subtree, only right subtree, and both subtrees.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--fg:#111827;--muted:#475569;--line:#334155;--node:#fff;--accent:#2563eb;--fill:#dbeafe}
    @media(prefers-color-scheme:dark){:root{--fg:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--node:#0f172a;--accent:#60a5fa;--fill:#172554}}
    text{fill:var(--fg);font-family:"Segoe UI",Arial,sans-serif}.title{font-size:26px;font-weight:700}.label{font-size:20px;font-weight:700;text-anchor:middle}.small{font-size:16px;fill:var(--muted);text-anchor:middle}.node{fill:var(--node);stroke:var(--line);stroke-width:2}.root{fill:var(--fill);stroke:var(--accent);stroke-width:3}.edge{stroke:var(--line);stroke-width:2.5}.box{fill:transparent;stroke:var(--line);stroke-width:1.5;stroke-dasharray:7 6;rx:12}
  </style>
  <text class="title" x="38" y="48">二叉树的五种基本形态</text>
  <text x="38" y="80" font-size="17" fill="var(--muted)">二叉树允许为空；左右孩子的位置有含义，只有一个孩子时也必须区分左、右。</text>

  <g transform="translate(35 130)">
    <rect class="box" x="0" y="0" width="180" height="270"/>
    <text class="label" x="90" y="38">空二叉树</text>
    <text class="label" x="90" y="145">∅</text>
  </g>

  <g transform="translate(230 130)">
    <rect class="box" x="0" y="0" width="180" height="270"/>
    <text class="label" x="90" y="38">只有根</text>
    <circle class="root" cx="90" cy="135" r="28"/><text class="label" x="90" y="143">A</text>
  </g>

  <g transform="translate(425 130)">
    <rect class="box" x="0" y="0" width="180" height="270"/>
    <text class="label" x="90" y="38">只有左子树</text>
    <line class="edge" x1="90" y1="100" x2="55" y2="165"/>
    <circle class="root" cx="90" cy="100" r="25"/><text class="label" x="90" y="108">A</text>
    <circle class="node" cx="55" cy="165" r="24"/><text class="label" x="55" y="173">B</text>
    <text class="small" x="123" y="173">右空</text>
  </g>

  <g transform="translate(620 130)">
    <rect class="box" x="0" y="0" width="180" height="270"/>
    <text class="label" x="90" y="38">只有右子树</text>
    <line class="edge" x1="90" y1="100" x2="125" y2="165"/>
    <circle class="root" cx="90" cy="100" r="25"/><text class="label" x="90" y="108">A</text>
    <circle class="node" cx="125" cy="165" r="24"/><text class="label" x="125" y="173">C</text>
    <text class="small" x="57" y="173">左空</text>
  </g>

  <g transform="translate(815 130)">
    <rect class="box" x="0" y="0" width="210" height="270"/>
    <text class="label" x="105" y="38">左右子树都有</text>
    <line class="edge" x1="105" y1="95" x2="65" y2="165"/><line class="edge" x1="105" y1="95" x2="145" y2="165"/>
    <circle class="root" cx="105" cy="95" r="25"/><text class="label" x="105" y="103">A</text>
    <circle class="node" cx="65" cy="165" r="24"/><text class="label" x="65" y="173">B</text>
    <circle class="node" cx="145" cy="165" r="24"/><text class="label" x="145" y="173">C</text>
  </g>
</svg>
