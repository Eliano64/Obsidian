<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img">
  <title>RTO selection and RTT measurement</title>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}
    .t{font-size:22px;font-weight:700;fill:#111827}
    .sh{font-size:16px;font-weight:700;fill:#111827}
    .ss{font-size:12px;fill:#4b5563}
    .sm{font-size:14px;font-weight:700;fill:#111827}
    .sw{font-size:14px;font-weight:700;fill:#fff}
    .box{fill:#fff;stroke:#d1d5db;stroke-width:1.5}
    .fb{fill:#eff6ff;stroke:#3b82f6;stroke-width:2}
    .fo{fill:#fff7ed;stroke:#d97706;stroke-width:2}
    .fg{fill:#ecfdf5;stroke:#059669;stroke-width:2}
    .tag-r{fill:#dc2626}
    .tag-y{fill:#d97706}
    .tag-g{fill:#059669}
    .badge-r{fill:#fef2f2;stroke:#dc2626;stroke-width:1}
    .badge-g{fill:#d1fae5;stroke:#059669;stroke-width:1}
    @media(prefers-color-scheme:dark){
      .t,.sh,.sm{fill:#e5e7eb}
      .ss{fill:#9ca3af}
      .box{fill:#111827;stroke:#374151}
      .fb{fill:#0f1d33;stroke:#1e40af}
      .fo{fill:#2a1f06;stroke:#92400e}
      .fg{fill:#0a1e14;stroke:#047857}
      .tag-r{fill:#b91c1c}
      .tag-y{fill:#b45309}
      .tag-g{fill:#047857}
      .badge-r{fill:#3b1010;stroke:#991b1b}
      .badge-g{fill:#0a3320;stroke:#047857}
    }
  </style>

  <text x="480" y="36" text-anchor="middle" class="t">RTO 选择与 RTT 测量</text>

  <!-- RTO too small -->
  <rect x="20" y="60" width="300" height="36" rx="6" class="tag-r"/><text x="170" y="83" text-anchor="middle" class="sw">RTO 过小 → 不必要重传</text>
  <rect x="20" y="104" width="300" height="155" rx="6" class="box"/>
  <line x1="36" y1="124" x2="304" y2="124" stroke="#9ca3af" stroke-width="1"/><text x="36" y="122" class="ss">发送方</text>
  <line x1="36" y1="244" x2="304" y2="244" stroke="#9ca3af" stroke-width="1"/><text x="36" y="256" class="ss">接收方</text>
  <line x1="90" y1="128" x2="90" y2="240" stroke="#dc2626" stroke-width="2"/><text x="90" y="120" text-anchor="middle" class="ss" fill="#dc2626">发送</text>
  <line x1="90" y1="152" x2="130" y2="152" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/><text x="110" y="150" text-anchor="middle" class="ss" fill="#dc2626">RTO</text>
  <line x1="130" y1="128" x2="130" y2="240" stroke="#dc2626" stroke-width="2"/><text x="130" y="120" text-anchor="middle" class="ss" fill="#dc2626">重传!</text>
  <line x1="180" y1="240" x2="180" y2="128" stroke="#9ca3af" stroke-width="1.5"/><text x="180" y="260" text-anchor="middle" class="ss">ACK 正常到达</text>
  <rect x="200" y="145" width="105" height="32" rx="4" class="badge-r"/><text x="252" y="165" text-anchor="middle" class="sm" fill="#dc2626">不必要重传</text>

  <!-- RTO too large -->
  <rect x="340" y="60" width="300" height="36" rx="6" class="tag-y"/><text x="490" y="83" text-anchor="middle" class="sw">RTO 过大 → 浪费空闲时间</text>
  <rect x="340" y="104" width="300" height="155" rx="6" class="box"/>
  <line x1="356" y1="124" x2="624" y2="124" stroke="#9ca3af" stroke-width="1"/><text x="356" y="122" class="ss">发送方</text>
  <line x1="356" y1="244" x2="624" y2="244" stroke="#9ca3af" stroke-width="1"/><text x="356" y="256" class="ss">接收方</text>
  <line x1="400" y1="128" x2="400" y2="240" stroke="#d97706" stroke-width="2"/><text x="400" y="120" text-anchor="middle" class="ss" fill="#d97706">发送</text>
  <text x="400" y="268" text-anchor="middle" class="ss" fill="#dc2626">× 丢失</text>
  <line x1="400" y1="152" x2="550" y2="152" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3"/><text x="475" y="150" text-anchor="middle" class="ss" fill="#d97706">RTO 过长 …</text>
  <line x1="550" y1="128" x2="550" y2="240" stroke="#d97706" stroke-width="2"/><text x="550" y="120" text-anchor="middle" class="ss" fill="#d97706">终于重传</text>
  <line x1="590" y1="240" x2="590" y2="128" stroke="#9ca3af" stroke-width="1.5"/><text x="590" y="260" text-anchor="middle" class="ss">ACK</text>

  <!-- RTO just right -->
  <rect x="660" y="60" width="280" height="36" rx="6" class="tag-g"/><text x="800" y="83" text-anchor="middle" class="sw">RTO 略大于 RTT ✓</text>
  <rect x="660" y="104" width="280" height="155" rx="6" class="box"/>
  <line x1="676" y1="124" x2="924" y2="124" stroke="#9ca3af" stroke-width="1"/><text x="676" y="122" class="ss">发送方</text>
  <line x1="676" y1="244" x2="924" y2="244" stroke="#9ca3af" stroke-width="1"/><text x="676" y="256" class="ss">接收方</text>
  <line x1="720" y1="128" x2="720" y2="240" stroke="#059669" stroke-width="2"/><text x="720" y="120" text-anchor="middle" class="ss" fill="#059669">发送</text>
  <line x1="720" y1="152" x2="770" y2="152" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3"/><text x="745" y="150" text-anchor="middle" class="ss" fill="#059669">RTO</text>
  <line x1="760" y1="240" x2="760" y2="128" stroke="#059669" stroke-width="2"/><text x="760" y="260" text-anchor="middle" class="ss" fill="#059669">ACK</text>
  <rect x="800" y="145" width="125" height="32" rx="4" class="badge-g"/><text x="862" y="165" text-anchor="middle" class="sm" fill="#059669">不误判 · 不浪费</text>

  <!-- RTT formulas -->
  <text x="480" y="305" text-anchor="middle" class="t">RTT 平滑与 RTO 计算 (RFC 6298)</text>

  <rect x="20" y="325" width="920" height="65" rx="6" class="fb"/>
  <text x="480" y="350" text-anchor="middle" class="sm" fill="#1e40af">加权平均 RTT：RTTₛⁿᵉʷ = (1 − ⅛) × RTTₛᵒˡᵈ + ⅛ × RTT_sample</text>
  <text x="480" y="375" text-anchor="middle" class="ss" fill="#2563eb">α = 1/8 ≈ 0.125 · 新样本权重小 · 结果比单次测量更平滑</text>

  <rect x="20" y="403" width="920" height="65" rx="6" class="fo"/>
  <text x="480" y="428" text-anchor="middle" class="sm" fill="#92400e">RTT 偏差：RTTᴅⁿᵉʷ = (1 − ¼) × RTTᴅᵒˡᵈ + ¼ × |RTTₛⁿᵉʷ − RTT_sample|</text>
  <text x="480" y="453" text-anchor="middle" class="ss" fill="#d97706">β = 1/4 = 0.25 · 反映 RTT 波动幅度 · 初始值 = RTT_sample / 2</text>

  <rect x="20" y="481" width="920" height="65" rx="6" class="fg"/>
  <text x="480" y="506" text-anchor="middle" class="sm" fill="#065f46" style="font-size:18px">最终 RTO = RTTₛ + 4 × RTTᴅ</text>
  <text x="480" y="531" text-anchor="middle" class="ss" fill="#059669">RTT 波动越大 → RTTᴅ 越大 → RTO 自适应增长余量</text>

  <text x="480" y="580" text-anchor="middle" class="ss">核心思想：不直接用单次 RTT → 平滑随机波动（RTTₛ）+ 为波动留余量（4×RTTᴅ）→ 自适应网络状态</text>
</svg>