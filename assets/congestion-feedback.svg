<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">Implicit and explicit congestion feedback</title>
  <desc id="desc">Implicit feedback infers congestion from symptoms while explicit feedback sends congestion information from routers.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
    .host { fill: #fff; stroke: #475569; stroke-width: 2; rx: 8; }
    .router { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
    .line { stroke: #475569; stroke-width: 3; marker-end: url(#arrow); }
    .fb { stroke: #dc2626; stroke-width: 3; stroke-dasharray: 8 6; marker-end: url(#redArrow); }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .box { fill: #111827; stroke: #94a3b8; }
      .host { fill: #0b1220; stroke: #cbd5e1; }
      .router { fill: #10213f; stroke: #60a5fa; }
      .line { stroke: #cbd5e1; }
      .fb { stroke: #f87171; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
  </defs>
  <text x="480" y="38" text-anchor="middle" class="label">隐式反馈与显式反馈</text>
  <rect x="55" y="75" width="850" height="115" class="box"/>
  <text x="105" y="107" class="label">隐式反馈</text>
  <rect x="205" y="105" width="105" height="48" class="host"/><text x="258" y="135" text-anchor="middle" class="small">发送方</text>
  <circle cx="455" cy="130" r="30" class="router"/><text x="455" y="136" text-anchor="middle" class="small">路由器</text>
  <rect x="650" y="105" width="105" height="48" class="host"/><text x="703" y="135" text-anchor="middle" class="small">接收方</text>
  <line x1="310" y1="130" x2="425" y2="130" class="line"/>
  <line x1="485" y1="130" x2="650" y2="130" class="line"/>
  <text x="480" y="172" text-anchor="middle" class="small">发送方从丢包、超时、RTT 增大等现象推断拥塞</text>
  <rect x="55" y="220" width="850" height="115" class="box"/>
  <text x="105" y="252" class="label">显式反馈</text>
  <rect x="205" y="250" width="105" height="48" class="host"/><text x="258" y="280" text-anchor="middle" class="small">发送方</text>
  <circle cx="455" cy="275" r="30" class="router"/><text x="455" y="281" text-anchor="middle" class="small">路由器</text>
  <rect x="650" y="250" width="105" height="48" class="host"/><text x="703" y="280" text-anchor="middle" class="small">接收方</text>
  <line x1="310" y1="275" x2="425" y2="275" class="line"/>
  <line x1="485" y1="275" x2="650" y2="275" class="line"/>
  <path d="M455 245 C420 205, 295 205, 258 250" class="fb"/>
  <text x="515" y="318" text-anchor="middle" class="small">路由器直接反馈拥塞信息，如历史上的 ICMP 源点抑制</text>
</svg>
