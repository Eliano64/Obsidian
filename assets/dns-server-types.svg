<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      text { font-family: Arial, "Microsoft YaHei", sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 13px; }
      .small { font-size: 11px; }
      .box-root { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.8; }
      .box-tld { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.8; }
      .box-auth { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; }
      .box-local { fill: #f0fdf4; stroke: #059669; stroke-width: 1.8; }
      .edge { stroke: #64748b; stroke-width: 1.2; fill: none; marker-end: url(#arr); }
      @media (prefers-color-scheme: dark) {
        .title { fill: #e6edf3; }
        .box-root { fill: #2a1a1a; stroke: #f87171; }
        .box-tld { fill: #2a2410; stroke: #fbbf24; }
        .box-auth { fill: #1e293b; stroke: #3b82f6; }
        .box-local { fill: #1a2e1f; stroke: #10b981; }
        .edge { stroke: #52616b; }
        text { fill: #e6edf3; }
      }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="450" y="24" text-anchor="middle" class="title">DNS 四类域名服务器</text>

  <!-- Root DNS Servers -->
  <rect x="275" y="55" width="350" height="65" rx="8" class="box-root"/>
  <text x="450" y="78" text-anchor="middle" class="label" font-weight="700" fill="#dc2626">根域名服务器</text>
  <text x="450" y="96" text-anchor="middle" class="small" fill="#64748b">13 个不同 IP 地址（a.root-servers.net ~ m.root-servers.net）</text>
  <text x="450" y="112" text-anchor="middle" class="small" fill="#64748b">每个实际上是全球分布的服务器群集</text>

  <!-- Root note -->
  <rect x="660" y="55" width="220" height="65" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <style>
    @media (prefers-color-scheme: dark) { rect[fill="#f8fafc"] { fill: #16212c; stroke: #334155; } }
  </style>
  <text x="770" y="78" text-anchor="middle" class="small" fill="#334155">最高层次</text>
  <text x="770" y="96" text-anchor="middle" class="small" fill="#334155">不直接解析域名</text>
  <text x="770" y="112" text-anchor="middle" class="small" fill="#334155">返回 TLD 服务器 IP</text>

  <!-- Edges -->
  <path d="M370,120 L200,170" class="edge"/>
  <path d="M530,120 L700,170" class="edge"/>

  <!-- TLD Servers -->
  <rect x="100" y="170" width="280" height="55" rx="8" class="box-tld"/>
  <text x="240" y="193" text-anchor="middle" class="label" font-weight="700" fill="#a16207">顶级域名服务器</text>
  <text x="240" y="211" text-anchor="middle" class="small" fill="#64748b">管理在其下注册的所有二级域名</text>

  <rect x="520" y="170" width="280" height="55" rx="8" class="box-tld"/>
  <text x="660" y="193" text-anchor="middle" class="label" font-weight="700" fill="#a16207">顶级域名服务器</text>
  <text x="660" y="211" text-anchor="middle" class="small" fill="#64748b">例：com 的 TLD 服务器管理 cctv.com、ibm.com</text>

  <!-- Edges -->
  <path d="M200,225 L160,290" class="edge"/>
  <path d="M280,225 L340,290" class="edge"/>
  <path d="M620,225 L580,290" class="edge"/>

  <!-- Authoritative DNS Servers -->
  <rect x="80" y="290" width="200" height="55" rx="8" class="box-auth"/>
  <text x="180" y="313" text-anchor="middle" class="label" font-weight="700" fill="#2563eb">权限域名服务器</text>
  <text x="180" y="331" text-anchor="middle" class="small" fill="#64748b">保存主机域名→IP 映射</text>

  <rect x="310" y="290" width="200" height="55" rx="8" class="box-auth"/>
  <text x="410" y="313" text-anchor="middle" class="label" font-weight="700" fill="#2563eb">权限域名服务器</text>
  <text x="410" y="331" text-anchor="middle" class="small" fill="#64748b">例：tsinghua.edu.cn 的 IP</text>

  <rect x="540" y="290" width="200" height="55" rx="8" class="box-auth"/>
  <text x="640" y="313" text-anchor="middle" class="label" font-weight="700" fill="#2563eb">权限域名服务器</text>
  <text x="640" y="331" text-anchor="middle" class="small" fill="#64748b">例：cctv.com 的 IP</text>

  <!-- Local DNS Server - bottom -->
  <rect x="250" y="365" width="400" height="45" rx="8" class="box-local"/>
  <text x="450" y="385" text-anchor="middle" class="label" font-weight="700" fill="#059669">本地域名服务器</text>
  <text x="450" y="402" text-anchor="middle" class="small" fill="#64748b">用户主机 DNS 查询的首先询问对象，通常由 ISP 提供</text>

  <!-- User host -->
  <rect x="30" y="370" width="120" height="40" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1.2"/>
  <style>
    @media (prefers-color-scheme: dark) { rect[fill="#fff"] { fill: #16212c; stroke: #52616b; } }
  </style>
  <text x="90" y="394" text-anchor="middle" class="label" fill="#334155">用户主机</text>

  <path d="M150,390 L250,390" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="200" y="382" text-anchor="middle" class="small" fill="#059669">递归查询</text>
</svg>
