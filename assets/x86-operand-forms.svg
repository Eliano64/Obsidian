<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" role="img" aria-labelledby="title desc">
  <title id="title">x86 operand forms</title>
  <desc id="desc">x86 operands can be registers, memory operands or immediate values.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--text:#111827;--muted:#4b5563;--line:#111827;--inst:#dbeafe;--reg:#dcfce7;--mem:#fef3c7;--imm:#fee2e2;--panel:#f8fafc}
    @media(prefers-color-scheme:dark){:root{--bg:#111827;--text:#e5e7eb;--muted:#cbd5e1;--line:#e5e7eb;--inst:#1e3a8a;--reg:#14532d;--mem:#713f12;--imm:#7f1d1d;--panel:#1f2937}}
    .bg{fill:var(--bg)}.text{fill:var(--text);font-family:"Segoe UI",Arial,sans-serif}.muted{fill:var(--muted);font-family:"Segoe UI",Arial,sans-serif}
    .box{stroke:var(--line);stroke-width:1.7;rx:9}.inst{fill:var(--inst)}.reg{fill:var(--reg)}.mem{fill:var(--mem)}.imm{fill:var(--imm)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:1.4;rx:10}
    .line{stroke:var(--line);stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="1080" height="540"/>
  <text class="text" x="42" y="44" font-size="28" font-weight="700">x86 指令中的操作数写法</text>
  <text class="muted" x="42" y="76" font-size="18">先判断操作数来自寄存器、主存还是指令中的立即数。</text>

  <rect class="box inst" x="385" y="130" width="310" height="86"/>
  <text class="text" x="540" y="164" font-size="23" font-weight="700" text-anchor="middle">mov destination, source</text>
  <text class="muted" x="540" y="194" font-size="17" text-anchor="middle">目的在左，源在右</text>

  <rect class="panel" x="70" y="300" width="270" height="132"/>
  <rect class="box reg" x="95" y="326" width="220" height="44"/>
  <text class="text" x="205" y="354" font-size="20" font-weight="700" text-anchor="middle">寄存器</text>
  <text class="text" x="205" y="397" font-size="18" text-anchor="middle">eax, ebx, ecx, edx</text>

  <rect class="panel" x="405" y="300" width="270" height="132"/>
  <rect class="box mem" x="430" y="326" width="220" height="44"/>
  <text class="text" x="540" y="354" font-size="20" font-weight="700" text-anchor="middle">主存</text>
  <text class="text" x="540" y="397" font-size="18" text-anchor="middle">dword ptr [ebx+8]</text>

  <rect class="panel" x="740" y="300" width="270" height="132"/>
  <rect class="box imm" x="765" y="326" width="220" height="44"/>
  <text class="text" x="875" y="354" font-size="20" font-weight="700" text-anchor="middle">立即数</text>
  <text class="text" x="875" y="397" font-size="18" text-anchor="middle">5, 10, af996h</text>

  <path class="line" d="M450 216 C350 245 250 270 205 300"/>
  <path class="line" d="M540 216 V295"/>
  <path class="line" d="M630 216 C730 245 830 270 875 300"/>

  <text class="muted" x="540" y="485" font-size="18" text-anchor="middle">主存操作数要特别关注读写长度：byte ptr / word ptr / dword ptr。</text>
</svg>
