<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="460" viewBox="0 0 1040 460">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    .bg { fill: #f8fafc; }
    .panel { fill: #fff; stroke: #cbd5e1; stroke-width: 2; }
    .edge { stroke: #64748b; stroke-width: 2; }
    .black { fill: #111827; stroke: #020617; stroke-width: 2; }
    .red { fill: #dc2626; stroke: #7f1d1d; stroke-width: 2; }
    .nil { fill: #e2e8f0; stroke: #64748b; stroke-width: 2; }
    .text { fill: #0f172a; font-family: Arial, "Microsoft YaHei", sans-serif; }
    .white { fill: #fff; font-family: Arial, "Microsoft YaHei", sans-serif; font-weight: 700; font-size: 16px; text-anchor: middle; }
    .dark { fill: #0f172a; font-family: Arial, "Microsoft YaHei", sans-serif; font-weight: 700; font-size: 13px; text-anchor: middle; }
    .title { font-size: 24px; font-weight: 700; }
    .item { font-size: 18px; }
    .small { font-size: 15px; fill: #475569; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0b1020; }
      .panel { fill: #111827; stroke: #334155; }
      .edge { stroke: #94a3b8; }
      .nil { fill: #1f2937; stroke: #94a3b8; }
      .text { fill: #e5e7eb; }
      .dark { fill: #e5e7eb; }
      .small { fill: #cbd5e1; }
    }
  </style>
  <rect class="bg" width="1040" height="460"/>
  <rect class="panel" x="28" y="28" width="984" height="404" rx="8"/>
  <text class="text title" x="62" y="74">红黑树合法性检查：左根右，根叶黑，不红红，黑路同</text>

  <line class="edge" x1="300" y1="100" x2="205" y2="180"/>
  <line class="edge" x1="300" y1="100" x2="395" y2="180"/>
  <line class="edge" x1="205" y1="180" x2="145" y2="260"/>
  <line class="edge" x1="205" y1="180" x2="260" y2="260"/>
  <line class="edge" x1="395" y1="180" x2="345" y2="260"/>
  <line class="edge" x1="395" y1="180" x2="455" y2="260"/>
  <line class="edge" x1="145" y1="260" x2="115" y2="330"/>
  <line class="edge" x1="145" y1="260" x2="175" y2="330"/>
  <line class="edge" x1="455" y1="260" x2="425" y2="330"/>
  <line class="edge" x1="455" y1="260" x2="485" y2="330"/>

  <circle class="black" cx="300" cy="100" r="26"/><text class="white" x="300" y="106">20</text>
  <circle class="red" cx="205" cy="180" r="26"/><text class="white" x="205" y="186">10</text>
  <circle class="black" cx="395" cy="180" r="26"/><text class="white" x="395" y="186">30</text>
  <circle class="black" cx="145" cy="260" r="24"/><text class="white" x="145" y="266">5</text>
  <circle class="black" cx="260" cy="260" r="24"/><text class="white" x="260" y="266">15</text>
  <circle class="red" cx="345" cy="260" r="24"/><text class="white" x="345" y="266">25</text>
  <circle class="red" cx="455" cy="260" r="24"/><text class="white" x="455" y="266">40</text>
  <rect class="nil" x="96" y="314" width="38" height="28" rx="5"/><text class="dark" x="115" y="333">NIL</text>
  <rect class="nil" x="156" y="314" width="38" height="28" rx="5"/><text class="dark" x="175" y="333">NIL</text>
  <rect class="nil" x="406" y="314" width="38" height="28" rx="5"/><text class="dark" x="425" y="333">NIL</text>
  <rect class="nil" x="466" y="314" width="38" height="28" rx="5"/><text class="dark" x="485" y="333">NIL</text>

  <text class="text item" x="575" y="130">1. 它首先是一棵二叉排序树。</text>
  <text class="text item" x="575" y="168">2. 每个结点非红即黑；根结点为黑。</text>
  <text class="text item" x="575" y="206">3. 外部空叶结点 NIL 也视为黑结点。</text>
  <text class="text item" x="575" y="244">4. 红结点不能有红父亲或红孩子。</text>
  <text class="text item" x="575" y="282">5. 从任一结点到 NIL 的黑结点数相同。</text>
  <text class="text small" x="575" y="336">黑高 bh(x)：从 x 出发，不含 x，到任一 NIL 路径上的黑结点数。</text>
  <text class="text small" x="575" y="366">最长路径最多在黑结点之间插入红结点，因此不超过最短路径的 2 倍。</text>
</svg>
