<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">死锁四个必要条件</title>
  <desc id="desc">死锁必须同时满足互斥、不剥夺、请求并保持、循环等待四个必要条件。</desc>
  <defs>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      :root { --bg:#fff; --panel:#f8fafc; --line:#cbd5e1; --text:#172033; --muted:#64748b; --a:#dbeafe; --al:#2563eb; --b:#fee2e2; --bl:#dc2626; --c:#fef3c7; --cl:#d97706; --d:#dcfce7; --dl:#16a34a; }
      @media (prefers-color-scheme: dark) { :root { --bg:#0f172a; --panel:#111827; --line:#334155; --text:#e5e7eb; --muted:#94a3b8; --a:#1e3a8a; --al:#60a5fa; --b:#7f1d1d; --bl:#f87171; --c:#713f12; --cl:#fbbf24; --d:#14532d; --dl:#4ade80; } }
      text { font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill:var(--text); }
      .title{font-size:34px;font-weight:700}.muted{font-size:20px;fill:var(--muted)}.head{font-size:25px;font-weight:700}.body{font-size:20px}.small{font-size:18px;fill:var(--muted)}
      .card{fill:var(--panel);stroke:var(--line);stroke-width:2;rx:18}.tag{stroke-width:2;rx:14}.a{fill:var(--a);stroke:var(--al)}.b{fill:var(--b);stroke:var(--bl)}.c{fill:var(--c);stroke:var(--cl)}.d{fill:var(--d);stroke:var(--dl)}
    </style>
  </defs>
  <rect width="980" height="620" fill="var(--bg)"/>
  <text x="52" y="58" class="title">死锁产生的四个必要条件</text>
  <text x="52" y="94" class="muted">四个条件必须同时成立；任意一个条件不成立，死锁就不会发生。</text>
  <rect x="60" y="132" width="410" height="180" class="card"/><rect x="88" y="160" width="128" height="46" class="tag a"/><text x="111" y="190" class="head">互斥</text><text x="88" y="244" class="body">资源必须互斥使用。</text><text x="88" y="276" class="small">如打印机、筷子；可共享资源不会使进程阻塞等待。</text>
  <rect x="510" y="132" width="410" height="180" class="card"/><rect x="538" y="160" width="128" height="46" class="tag b"/><text x="561" y="190" class="head">不剥夺</text><text x="538" y="244" class="body">资源只能由持有者主动释放。</text><text x="538" y="276" class="small">系统不能在使用完之前强行夺走该资源。</text>
  <rect x="60" y="342" width="410" height="180" class="card"/><rect x="88" y="370" width="168" height="46" class="tag c"/><text x="111" y="400" class="head">请求并保持</text><text x="88" y="454" class="body">进程已持有资源，又请求新资源。</text><text x="88" y="486" class="small">请求失败时阻塞，但不释放已有资源。</text>
  <rect x="510" y="342" width="410" height="180" class="card"/><rect x="538" y="370" width="168" height="46" class="tag d"/><text x="561" y="400" class="head">循环等待</text><text x="538" y="454" class="body">存在进程-资源等待环。</text><text x="538" y="486" class="small">链中每个进程持有的资源，正被下一个进程请求。</text>
  <text x="60" y="572" class="muted">循环等待是死锁的必要条件；当每类资源只有一个实例时，它也是充分条件。</text>
</svg>
