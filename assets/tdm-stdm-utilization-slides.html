<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TDM 与 STDM 时隙利用</title>
<style>
:root{--bg:#ffffff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--grid:#cbd5e1;--a:#2563eb;--b:#16a34a;--c:#d97706;--d:#7c3aed;--idle:#e2e8f0;--hot:#dc2626}
@media (prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--grid:#334155;--a:#60a5fa;--b:#4ade80;--c:#fbbf24;--d:#c4b5fd;--idle:#334155;--hot:#f87171}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.wrap{width:100%;max-width:1040px;margin:0 auto;padding:26px 28px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.title{font-size:28px;font-weight:800}.sub{margin-top:8px;color:var(--muted);font-size:15px}.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.controls button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:7px;padding:8px 12px;font-weight:700;cursor:pointer}.controls button.active{background:var(--a);border-color:var(--a);color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:24px}.card{border:2px solid var(--line);background:var(--panel);border-radius:10px;padding:18px;min-height:420px}.card h2{font-size:20px;margin:0 0 12px}.note{color:var(--muted);font-size:14px;line-height:1.65}.frame{margin-top:18px}.row{display:grid;grid-template-columns:72px repeat(8,1fr);align-items:center;margin-bottom:10px;gap:3px}.cell{height:42px;border:1px solid var(--grid);display:flex;align-items:center;justify-content:center;font-weight:800;border-radius:4px;color:#fff}.name{color:var(--text);font-weight:700}.idle{background:var(--idle);color:var(--muted);font-weight:600}.A{background:var(--a)}.B{background:var(--b)}.C{background:var(--c)}.D{background:var(--d)}.addr{font-size:11px;opacity:.9;display:block;font-weight:600}.summary{margin-top:18px;border-left:4px solid var(--hot);padding:10px 12px;background:color-mix(in srgb,var(--hot) 10%,transparent);line-height:1.7}.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;color:var(--muted);font-size:13px}.sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-1px}.calc{font-family:Consolas,monospace;font-size:15px;color:var(--text)}
@media(max-width:820px){.grid{grid-template-columns:1fr}.top{display:block}.controls{justify-content:flex-start;margin-top:14px}.row{grid-template-columns:58px repeat(8,1fr)}}
</style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <div class="title">固定时隙与按需时隙</div>
      <div class="sub">观察同一组用户请求：A、C、A、D 有数据，B 暂时无数据。</div>
    </div>
    <div class="controls">
      <button data-step="0" class="active">固定分配</button>
      <button data-step="1">空时隙浪费</button>
      <button data-step="2">按需装入</button>
      <button data-step="3">地址开销</button>
    </div>
  </div>
  <section class="grid">
    <article class="card">
      <h2>TDM：每个用户拿固定位置</h2>
      <div class="note">每个 TDM 帧是一段固定长度时间。即使某用户没有数据，它对应的时隙也不能自动让给别人。</div>
      <div class="frame" id="tdm"></div>
      <div class="summary" id="tdmText"></div>
    </article>
    <article class="card">
      <h2>STDM：集中器按需放入数据</h2>
      <div class="note">有数据的用户先进入缓存，集中器扫描缓存并把数据放入 STDM 帧；空用户被跳过。</div>
      <div class="frame" id="stdm"></div>
      <div class="summary" id="stdmText"></div>
    </article>
  </section>
  <div class="legend">
    <span><i class="sw A"></i>A</span><span><i class="sw B"></i>B</span><span><i class="sw C"></i>C</span><span><i class="sw D"></i>D</span><span><i class="sw idle"></i>空时隙</span>
  </div>
</main>
<script>
const steps=[
  {
    tdm:["A","B","C","D","A","B","C","D"], stdm:["A","C","A","D","","","",""],
    t:"TDM 的时隙顺序固定：A、B、C、D 循环出现。", s:"STDM 不预先把位置绑定给用户，而是等待缓存中真正有数据。"
  },
  {
    tdm:["A","","C","D","A","","",""], stdm:["A","C","A","D","","","",""],
    t:"B 和第二个 C 没有数据时，TDM 对应时隙仍被占住，不能被 A 或 D 使用。", s:"STDM 会跳过没有数据的用户，避免固定时隙空转。"
  },
  {
    tdm:["A","","C","D","A","","",""], stdm:["A","C","A","D","","","",""],
    t:"固定时隙下，本帧 8 个位置只有 4 个真正传输数据，利用率为 4/8。", s:"STDM 把 4 个有效数据连续装入帧，用户突发数据越明显，优势越明显。"
  },
  {
    tdm:["A","","C","D","A","","",""], stdm:["A*","C*","A*","D*","","","",""],
    t:"TDM 接收端知道第几个时隙属于哪个用户，因此时隙本身通常不需要携带用户地址。", s:"STDM 的位置不固定，每个有效时隙要带地址字段，星号表示地址开销。"
  }
];
const buttons=[...document.querySelectorAll("button")];
function cls(x){return x ? x[0] : "idle"}
function label(x){return x ? x.replace("*","") : "空"}
function drawRow(title,arr){
  return `<div class="row"><div class="name">${title}</div>${arr.map(x=>`<div class="cell ${cls(x)}">${label(x)}${x&&x.includes("*")?'<span class="addr">addr</span>':''}</div>`).join("")}</div>`;
}
function render(i){
  const s=steps[i];
  document.getElementById("tdm").innerHTML=drawRow("帧1",s.tdm.slice(0,4))+drawRow("帧2",s.tdm.slice(4,8));
  document.getElementById("stdm").innerHTML=drawRow("STDM帧",s.stdm);
  document.getElementById("tdmText").innerHTML=`<div class="calc">${s.t}</div>`;
  document.getElementById("stdmText").innerHTML=`<div class="calc">${s.s}</div>`;
  buttons.forEach((b,k)=>b.classList.toggle("active",k===i));
}
buttons.forEach((b,i)=>b.addEventListener("click",()=>render(i)));
render(0);
</script>
</body>
</html>
