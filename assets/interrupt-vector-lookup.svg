<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">Interrupt Vector Lookup</title>
  <desc id="desc">Interrupt type number maps to vector address, which contains the kernel interrupt service routine entry address.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.hit{fill:var(--orange);opacity:.2;stroke:var(--orange);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--blue);stroke-width:3;fill:none;marker-end:url(#arrow)}.ga{stroke:var(--green);stroke-width:3;fill:none;marker-end:url(#garrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"/></marker>
    <marker id="garrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--green)"/></marker>
  </defs>
  <rect class="bg" width="1040" height="420"/>
  <text class="t" x="520" y="40" text-anchor="middle" font-size="24" font-weight="700">中断向量查找</text>
  <text class="m" x="520" y="68" text-anchor="middle" font-size="15">CPU 根据中断类型号找到内核处理程序入口，并把入口地址送入 PC</text>

  <rect class="box" x="70" y="150" width="190" height="92" rx="8"/>
  <text class="t" x="165" y="184" text-anchor="middle" font-size="17" font-weight="700">中断源</text>
  <text class="m" x="165" y="212" text-anchor="middle" font-size="14">给出中断类型号</text>

  <rect class="box" x="350" y="105" width="230" height="210" rx="8"/>
  <text class="t" x="465" y="136" text-anchor="middle" font-size="17" font-weight="700">中断向量表</text>
  <rect class="box" x="380" y="162" width="170" height="32" rx="4"/><text class="m" x="465" y="184" text-anchor="middle" font-size="13">类型 0 -> 入口 A</text>
  <rect class="hit" x="380" y="202" width="170" height="34" rx="4"/><text class="t" x="465" y="224" text-anchor="middle" font-size="13" font-weight="700">类型 n -> 入口 X</text>
  <rect class="box" x="380" y="244" width="170" height="32" rx="4"/><text class="m" x="465" y="266" text-anchor="middle" font-size="13">类型 n+1 -> 入口 Y</text>

  <rect class="box" x="690" y="150" width="250" height="92" rx="8"/>
  <text class="t" x="815" y="184" text-anchor="middle" font-size="17" font-weight="700">内核服务程序入口</text>
  <text class="m" x="815" y="212" text-anchor="middle" font-size="14">入口地址装入 PC</text>

  <path class="a" d="M260 196 H350"/>
  <path class="ga" d="M580 219 H690"/>
  <text class="m" x="305" y="184" text-anchor="middle" font-size="13">类型号</text>
  <text class="m" x="635" y="207" text-anchor="middle" font-size="13">入口地址</text>
</svg>
