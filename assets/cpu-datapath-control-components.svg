<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="560" viewBox="0 0 1160 560" role="img" aria-labelledby="title desc">
  <title id="title">CPU datapath and control components</title>
  <desc id="desc">CPU consists of datapath and control unit. Datapath consists of combinational operation elements and sequential state elements.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--bg:#fff;--ink:#172033;--muted:#5d6980;--line:#526174;--dp:#e8f1ff;--ctl:#fff2d8;--op:#eef7ee;--st:#f6eafe;--chip:#fff}
    @media (prefers-color-scheme:dark){:root{--bg:#0f1420;--ink:#e7edf7;--muted:#aab6c8;--line:#91a0b5;--dp:#17243a;--ctl:#302417;--op:#18291d;--st:#2b1c35;--chip:#151c2a}}
    svg{background:var(--bg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif} text{fill:var(--ink)}
    .title{font-size:30px;font-weight:700}.h{font-size:24px;font-weight:700}.label{font-size:20px;font-weight:700}.note{font-size:16px;fill:var(--muted)}
    .panel{stroke:var(--line);stroke-width:2.2;rx:18}.box{fill:var(--chip);stroke:var(--line);stroke-width:2;rx:12}
    .dp{fill:var(--dp)}.ctl{fill:var(--ctl)}.op{fill:var(--op)}.st{fill:var(--st)}
    .arrow{stroke:var(--line);stroke-width:2.4;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:8 7}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="var(--line)"/></marker></defs>
  <text x="580" y="46" text-anchor="middle" class="title">CPU = 数据通路 + 控制部件</text>

  <rect x="60" y="92" width="680" height="386" class="panel dp"/>
  <text x="400" y="132" text-anchor="middle" class="h">数据通路 Datapath</text>
  <text x="400" y="162" text-anchor="middle" class="note">保存、传送、加工数据；控制信号决定哪条路径被建立</text>

  <rect x="100" y="208" width="270" height="210" class="panel op"/>
  <text x="235" y="246" text-anchor="middle" class="h">组合逻辑单元</text>
  <text x="235" y="274" text-anchor="middle" class="note">操作元件，没有记忆能力</text>
  <rect x="130" y="306" width="210" height="42" class="box"/><text x="235" y="333" text-anchor="middle" class="label">ALU / 加法器</text>
  <rect x="130" y="360" width="210" height="42" class="box"/><text x="235" y="387" text-anchor="middle" class="label">MUX / 译码器 / 三态门</text>

  <rect x="430" y="208" width="270" height="210" class="panel st"/>
  <text x="565" y="246" text-anchor="middle" class="h">时序逻辑单元</text>
  <text x="565" y="274" text-anchor="middle" class="note">状态元件，有记忆能力</text>
  <rect x="460" y="306" width="210" height="42" class="box"/><text x="565" y="333" text-anchor="middle" class="label">寄存器 / 锁存器</text>
  <rect x="460" y="360" width="210" height="42" class="box"/><text x="565" y="387" text-anchor="middle" class="label">PC / IR / MAR / MDR</text>

  <rect x="810" y="138" width="290" height="292" class="panel ctl"/>
  <text x="955" y="178" text-anchor="middle" class="h">控制部件</text>
  <text x="955" y="208" text-anchor="middle" class="note">产生控制信号</text>
  <rect x="842" y="248" width="226" height="44" class="box"/><text x="955" y="276" text-anchor="middle" class="label">指令译码</text>
  <rect x="842" y="310" width="226" height="44" class="box"/><text x="955" y="338" text-anchor="middle" class="label">时序系统</text>
  <rect x="842" y="372" width="226" height="44" class="box"/><text x="955" y="400" text-anchor="middle" class="label">微操作信号发生器</text>

  <path d="M810 282 C770 282 760 270 718 270" class="arrow dash"/>
  <path d="M810 354 C760 354 748 378 704 378" class="arrow dash"/>
  <text x="758" y="250" text-anchor="middle" class="note">控制信号</text>
  <text x="580" y="522" text-anchor="middle" class="note">分析数据通路时，看数据从哪个状态元件出发，经过哪些操作元件，最后写入哪个状态元件。</text>
</svg>
