<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 480" role="img" aria-labelledby="title desc">
  <title id="title">Device Allocation Tables</title>
  <desc id="desc">SDT points to DCT, DCT points to COCT, and COCT points to CHCT.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--blue);stroke-width:3;fill:none;marker-end:url(#ba)}
  </style>
  <defs><marker id="ba" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"/></marker></defs>
  <rect class="bg" width="1120" height="480"/>
  <text class="t" x="560" y="42" text-anchor="middle" font-size="24" font-weight="700">设备分配管理中的数据结构</text>
  <rect class="box" x="50" y="105" width="220" height="250" rx="8"/>
  <text class="t" x="160" y="138" text-anchor="middle" font-size="18" font-weight="700">SDT</text>
  <text class="m" x="160" y="162" text-anchor="middle" font-size="13">系统设备表</text>
  <text class="m" x="80" y="205" font-size="13">设备类型</text>
  <text class="m" x="80" y="235" font-size="13">设备标识符</text>
  <text class="m" x="80" y="265" font-size="13">DCT 指针</text>
  <text class="m" x="80" y="295" font-size="13">驱动入口</text>
  <rect class="box" x="330" y="105" width="220" height="250" rx="8"/>
  <text class="t" x="440" y="138" text-anchor="middle" font-size="18" font-weight="700">DCT</text>
  <text class="m" x="440" y="162" text-anchor="middle" font-size="13">设备控制表</text>
  <text class="m" x="360" y="205" font-size="13">设备状态</text>
  <text class="m" x="360" y="235" font-size="13">COCT 指针</text>
  <text class="m" x="360" y="265" font-size="13">等待队列首尾</text>
  <text class="m" x="360" y="295" font-size="13">重复次数 / 时间</text>
  <rect class="box" x="610" y="105" width="220" height="250" rx="8"/>
  <text class="t" x="720" y="138" text-anchor="middle" font-size="18" font-weight="700">COCT</text>
  <text class="m" x="720" y="162" text-anchor="middle" font-size="13">控制器控制表</text>
  <text class="m" x="640" y="205" font-size="13">控制器状态</text>
  <text class="m" x="640" y="235" font-size="13">CHCT 指针</text>
  <text class="m" x="640" y="265" font-size="13">控制器等待队列</text>
  <rect class="box" x="890" y="105" width="220" height="250" rx="8"/>
  <text class="t" x="1000" y="138" text-anchor="middle" font-size="18" font-weight="700">CHCT</text>
  <text class="m" x="1000" y="162" text-anchor="middle" font-size="13">通道控制表</text>
  <text class="m" x="920" y="205" font-size="13">通道状态</text>
  <text class="m" x="920" y="235" font-size="13">所连控制器信息</text>
  <text class="m" x="920" y="265" font-size="13">通道等待队列</text>
  <path class="a" d="M270 265 H330"/>
  <path class="a" d="M550 235 H610"/>
  <path class="a" d="M830 235 H890"/>
  <text class="m" x="580" y="410" text-anchor="middle" font-size="15">一次分配要沿着设备、控制器、通道逐层检查；任一层忙碌，都可能把进程挂到对应等待队列。</text>
</svg>
