<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">时延带宽积</title>
  <desc id="desc">展示时延带宽积表示链路中正在传播的比特数量</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--line:#334155;--text:#172033;--muted:#64748b;--blue:#dbeafe;--blue-line:#2563eb;--green:#dcfce7;--green-line:#16a34a;--amber:#fef3c7;--amber-line:#d97706}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--line:#94a3b8;--text:#e5e7eb;--muted:#94a3b8;--blue:#1e3a8a;--blue-line:#60a5fa;--green:#14532d;--green-line:#4ade80;--amber:#713f12;--amber-line:#fbbf24}}
    .bg{fill:var(--bg)}.pipe{fill:var(--blue);stroke:var(--blue-line);stroke-width:3}.bit{fill:var(--green);stroke:var(--green-line);stroke-width:1.5}.cap{fill:var(--amber);stroke:var(--amber-line);stroke-width:2}.arrow{fill:none;stroke:var(--line);stroke-width:2.5;marker-end:url(#arrow)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:20px;font-weight:700}.small{font-size:16px;fill:var(--muted)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="500"/>
  <text x="50" y="58" class="title">时延带宽积 = 传播时延 × 带宽</text>
  <rect x="120" y="170" width="720" height="110" rx="55" class="pipe"/>
  <ellipse cx="120" cy="225" rx="28" ry="55" class="cap"/>
  <ellipse cx="840" cy="225" rx="28" ry="55" class="cap"/>
  <g>
    <circle cx="180" cy="225" r="10" class="bit"/><circle cx="225" cy="225" r="10" class="bit"/><circle cx="270" cy="225" r="10" class="bit"/><circle cx="315" cy="225" r="10" class="bit"/><circle cx="360" cy="225" r="10" class="bit"/><circle cx="405" cy="225" r="10" class="bit"/><circle cx="450" cy="225" r="10" class="bit"/><circle cx="495" cy="225" r="10" class="bit"/><circle cx="540" cy="225" r="10" class="bit"/><circle cx="585" cy="225" r="10" class="bit"/><circle cx="630" cy="225" r="10" class="bit"/><circle cx="675" cy="225" r="10" class="bit"/><circle cx="720" cy="225" r="10" class="bit"/><circle cx="765" cy="225" r="10" class="bit"/>
  </g>
  <path d="M120 330 H840" class="arrow"/><text x="480" y="360" text-anchor="middle" class="label">传播时延：链路“长度”</text>
  <path d="M880 275 V175" class="arrow"/><text x="900" y="230" class="label">带宽</text>
  <text x="480" y="410" text-anchor="middle" class="small">含义：发送端连续发送时，链路中同时正在传播的比特数量。</text>
</svg>
