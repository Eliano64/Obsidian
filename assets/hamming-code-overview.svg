<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">海明码校验位覆盖关系</title>
  <desc id="desc">展示海明码中校验位放在 1、2、4、8 等位置，并按二进制位覆盖数据位</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--green:#16a34a;--amber:#d97706;--purple:#7c3aed;--red:#dc2626}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--green:#4ade80;--amber:#fbbf24;--purple:#c4b5fd;--red:#f87171}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.cell{stroke:var(--line);stroke-width:1.3}.p1{fill:color-mix(in srgb,var(--blue) 25%,transparent)}.p2{fill:color-mix(in srgb,var(--green) 25%,transparent)}.p4{fill:color-mix(in srgb,var(--amber) 30%,transparent)}.p8{fill:color-mix(in srgb,var(--purple) 28%,transparent)}.d{fill:var(--panel)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.head{font-size:18px;font-weight:700}.small{font-size:15px;fill:var(--muted)}.mark{font-size:17px;font-weight:800}
  </style>
  <rect class="bg" width="980" height="520"/>
  <text x="50" y="56" class="title">海明码：用多个校验位定位 1 位错误</text>
  <text x="50" y="84" class="small">校验位放在 1、2、4、8 等 2 的幂次位置。每个校验位检查编号二进制中对应位为 1 的位置。</text>
  <rect x="70" y="125" width="840" height="110" rx="10" class="panel"/>
  <g transform="translate(110,158)">
    <rect x="0" y="0" width="58" height="48" class="cell p1"/><text x="29" y="30" text-anchor="middle" class="mark">P1</text>
    <rect x="58" y="0" width="58" height="48" class="cell p2"/><text x="87" y="30" text-anchor="middle" class="mark">P2</text>
    <rect x="116" y="0" width="58" height="48" class="cell d"/><text x="145" y="30" text-anchor="middle" class="mark">D3</text>
    <rect x="174" y="0" width="58" height="48" class="cell p4"/><text x="203" y="30" text-anchor="middle" class="mark">P4</text>
    <rect x="232" y="0" width="58" height="48" class="cell d"/><text x="261" y="30" text-anchor="middle" class="mark">D5</text>
    <rect x="290" y="0" width="58" height="48" class="cell d"/><text x="319" y="30" text-anchor="middle" class="mark">D6</text>
    <rect x="348" y="0" width="58" height="48" class="cell d"/><text x="377" y="30" text-anchor="middle" class="mark">D7</text>
    <rect x="406" y="0" width="58" height="48" class="cell p8"/><text x="435" y="30" text-anchor="middle" class="mark">P8</text>
    <rect x="464" y="0" width="58" height="48" class="cell d"/><text x="493" y="30" text-anchor="middle" class="mark">D9</text>
    <rect x="522" y="0" width="58" height="48" class="cell d"/><text x="551" y="30" text-anchor="middle" class="mark">D10</text>
    <rect x="580" y="0" width="58" height="48" class="cell d"/><text x="609" y="30" text-anchor="middle" class="mark">D11</text>
    <rect x="638" y="0" width="58" height="48" class="cell d"/><text x="667" y="30" text-anchor="middle" class="mark">D12</text>
  </g>
  <rect x="70" y="275" width="405" height="150" rx="10" class="panel"/>
  <text x="96" y="314" class="head">覆盖规则</text>
  <text x="96" y="348" class="small">P1 检查位置编号最低位为 1 的位置。</text>
  <text x="96" y="376" class="small">P2 检查位置编号第 2 位为 1 的位置。</text>
  <text x="96" y="404" class="small">P4 检查位置编号第 3 位为 1 的位置。</text>
  <rect x="505" y="275" width="405" height="150" rx="10" class="panel"/>
  <text x="532" y="314" class="head">定位错误</text>
  <text x="532" y="348" class="small">接收端重新计算各组校验结果。</text>
  <text x="532" y="376" class="small">出错校验位组合成二进制数。</text>
  <text x="532" y="404" class="small">该数就是错误位的位置。</text>
  <text x="490" y="480" text-anchor="middle" class="small">海明码开销比检错码大，但能在一定条件下直接定位并纠正 1 位错误。</text>
</svg>
