<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Multicast forwarding tree prune and graft</title>
  <desc id="desc">Multicast forwarding tree prunes leaf branches without members and grafts them back when members appear.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.node{fill:#fff;stroke:#475569;stroke-width:2}.member{fill:#dcfce7;stroke:#16a34a}.core{fill:#dbeafe;stroke:#2563eb}.link{stroke:#16a34a;stroke-width:4;fill:none}.cut{stroke:#dc2626;stroke-width:4;stroke-dasharray:8 6}.label{font-size:20px;font-weight:700}.small{font-size:14px}@media(prefers-color-scheme:dark){text{fill:#e5e7eb}.node{fill:#0b1220;stroke:#cbd5e1}.member{fill:#0f2b1d;stroke:#4ade80}.core{fill:#10213f;stroke:#60a5fa}.link{stroke:#4ade80}.cut{stroke:#f87171}}</style>
  <text x="480" y="38" text-anchor="middle" class="label">多播转发树：剪枝与嫁接</text>
  <circle cx="480" cy="95" r="28" class="core"/><text x="480" y="101" text-anchor="middle" class="small">源/核心</text>
  <circle cx="300" cy="190" r="25" class="node"/><text x="300" y="196" text-anchor="middle" class="small">R1</text>
  <circle cx="660" cy="190" r="25" class="node"/><text x="660" y="196" text-anchor="middle" class="small">R2</text>
  <circle cx="210" cy="300" r="25" class="member"/><text x="210" y="306" text-anchor="middle" class="small">成员</text>
  <circle cx="390" cy="300" r="25" class="node"/><text x="390" y="306" text-anchor="middle" class="small">无成员</text>
  <circle cx="570" cy="300" r="25" class="member"/><text x="570" y="306" text-anchor="middle" class="small">成员</text>
  <circle cx="750" cy="300" r="25" class="node"/><text x="750" y="306" text-anchor="middle" class="small">新成员</text>
  <path d="M456 110 L322 177 M504 110 L638 177 M285 210 L225 280 M315 210 L375 280 M645 210 L585 280 M675 210 L735 280" class="link"/>
  <path d="M315 210 L375 280" class="cut"/>
  <text x="390" y="350" text-anchor="middle" class="small">叶节点无成员：向上游发送剪枝</text>
  <text x="750" y="350" text-anchor="middle" class="small">出现成员：发送嫁接重新加入</text>
</svg>
