<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="svg-title svg-desc">
<title id="svg-title">函数凹凸性：弧与弦的位置关系</title>
<desc id="svg-desc">左图展示凹函数的弧位于弦下方，右图展示凸函数的弧位于弦上方。</desc>
<style>
  :root { color-scheme: light dark; }
  .background { fill: #f1f5f9; }
  .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
  .title { fill: #0f172a; font: 700 24px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
  .subtitle, .formula, .relation, .axis-label, .curve-label, .chord-label { fill: #334155; font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; }
  .subtitle { font-size: 17px; }
  .formula { font-size: 16px; }
  .relation { font-size: 18px; font-weight: 700; }
  .axis-label, .curve-label, .chord-label { font-size: 15px; }
  .axis { stroke: #94a3b8; stroke-width: 1.4; }
  .curve-blue, .curve-orange { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
  .curve-blue { stroke: #2563eb; }
  .curve-orange { stroke: #ea580c; }
  .chord { stroke: #dc2626; stroke-width: 3; }
  .point { fill: #dc2626; }
  .shade-blue { fill: #60a5fa; fill-opacity: 0.20; }
  .shade-orange { fill: #fb923c; fill-opacity: 0.22; }
  @media (prefers-color-scheme: dark) {
    .background { fill: #0f172a; }
    .panel { fill: #111827; stroke: #334155; }
    .title { fill: #f8fafc; }
    .subtitle, .formula, .relation, .axis-label, .curve-label, .chord-label { fill: #cbd5e1; }
    .axis { stroke: #64748b; }
    .curve-blue { stroke: #60a5fa; }
    .curve-orange { stroke: #fb923c; }
    .chord { stroke: #f87171; }
    .point { fill: #f87171; }
  }
</style>
