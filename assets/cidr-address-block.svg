<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">CIDR 地址块</title>
  <desc id="desc">CIDR 使用网络前缀长度表示地址块，块大小由主机号位数决定。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}.bg{fill:#f8fafc}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:18px}.small{fill:#334155;font-size:15px}.block{fill:#fff;stroke:#cbd5e1;stroke-width:2}.net{fill:#dbeafe;stroke:#2563eb}.host{fill:#dcfce7;stroke:#16a34a}.range{stroke:#f97316;stroke-width:8;stroke-linecap:round}.tick{stroke:#64748b;stroke-width:2}
    @media(prefers-color-scheme:dark){.bg{fill:#020617}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.block{fill:#0f172a;stroke:#334155}.net{fill:#172554;stroke:#60a5fa}.host{fill:#052e16;stroke:#4ade80}.tick{stroke:#94a3b8}}
  </style>
  <rect class="bg" width="980" height="430"/>
  <text class="text" x="490" y="42" text-anchor="middle" font-size="26" font-weight="700">CIDR：用前缀长度定义一个地址块</text>
  <text class="text" x="490" y="92" text-anchor="middle">例：192.168.1.128/25</text>
  <g transform="translate(110,125)">
    <rect class="net" x="0" y="0" width="600" height="62" rx="8"/><text class="text" x="300" y="38" text-anchor="middle">网络前缀 25 bit</text>
    <rect class="host" x="600" y="0" width="180" height="62" rx="8"/><text class="text" x="690" y="38" text-anchor="middle">主机号 7 bit</text>
  </g>
  <text class="small" x="490" y="222" text-anchor="middle">主机号 7 bit，所以地址块大小是 $2^7=128$ 个地址</text>
  <line class="range" x1="160" y1="300" x2="820" y2="300"/>
  <line class="tick" x1="160" y1="278" x2="160" y2="326"/><line class="tick" x1="820" y1="278" x2="820" y2="326"/>
  <line class="tick" x1="168" y1="300" x2="210" y2="300"/><line class="tick" x1="770" y1="300" x2="812" y2="300"/>
  <text class="text" x="160" y="356" text-anchor="middle">192.168.1.128</text>
  <text class="small" x="160" y="382" text-anchor="middle">网络地址</text>
  <text class="text" x="820" y="356" text-anchor="middle">192.168.1.255</text>
  <text class="small" x="820" y="382" text-anchor="middle">广播地址</text>
  <text class="small" x="490" y="275" text-anchor="middle">可分配主机地址：192.168.1.129 - 192.168.1.254</text>
</svg>
