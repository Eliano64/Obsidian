<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cigarette Smokers Flow</title><style>
:root{--bg:#fff;--panel:#f8fafc;--line:#cbd5e1;--text:#172033;--muted:#64748b;--blue:#dbeafe;--bl:#2563eb;--green:#dcfce7;--gl:#16a34a;--amber:#fef3c7;--al:#d97706;--red:#fee2e2;--rl:#dc2626;--arrow:#475569}@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#1e3a8a;--bl:#60a5fa;--green:#14532d;--gl:#4ade80;--amber:#713f12;--al:#fbbf24;--red:#7f1d1d;--rl:#f87171;--arrow:#cbd5e1}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.deck{min-height:720px;padding:28px 34px 24px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}header{display:flex;justify-content:space-between;align-items:end}h1{margin:0;font-size:30px}.step{color:var(--muted);font-size:18px}.stage{display:grid;grid-template-columns:1.15fr .95fr;gap:22px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;min-height:505px}svg{width:100%;height:500px}.node{fill:var(--blue);stroke:var(--bl);stroke-width:2.5}.table{fill:var(--amber);stroke:var(--al);stroke-width:2.5}.smoker{fill:var(--green);stroke:var(--gl);stroke-width:2.5}.finish{fill:var(--red);stroke:var(--rl);stroke-width:2.5}.edge{fill:none;stroke:var(--arrow);stroke-width:2.8;marker-end:url(#arrow)}.faded{opacity:.18}.hi{stroke-width:5}text{fill:var(--text);font-family:inherit}.label{text-anchor:middle;dominant-baseline:middle;font-size:18px;font-weight:700}.small{text-anchor:middle;font-size:14px;fill:var(--muted)}h2{margin:0 0 14px;font-size:25px}p{margin:0 0 13px;font-size:20px;line-height:1.55}.code{font-family:Consolas,"Courier New",monospace;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:10px;font-size:17px;line-height:1.55;white-space:pre-wrap}.controls{display:flex;justify-content:center;gap:10px}button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:9px 14px;font-size:16px;cursor:pointer}</style></head><body><div class="deck"><header><h1>吸烟者问题：一次同步循环</h1><div id="stepLabel" class="step"></div></header><main class="stage"><section class="panel"><svg viewBox="0 0 650 500"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--arrow)"/></marker></defs>
<rect id="provider" x="40" y="205" width="125" height="70" rx="12" class="node"/><text x="102" y="240" class="label">供应者</text>
<rect id="table" x="265" y="180" width="130" height="120" rx="14" class="table"/><text x="330" y="222" class="label">桌子</text><text x="330" y="256" class="small">容量 1</text>
<rect id="s1" x="485" y="82" width="130" height="62" rx="10" class="smoker"/><text x="550" y="113" class="label">吸烟者1</text>
<rect id="s2" x="485" y="219" width="130" height="62" rx="10" class="smoker"/><text x="550" y="250" class="label">吸烟者2</text>
<rect id="s3" x="485" y="356" width="130" height="62" rx="10" class="smoker"/><text x="550" y="387" class="label">吸烟者3</text>
<rect id="finish" x="255" y="388" width="150" height="56" rx="10" class="finish"/><text x="330" y="416" class="label">finish</text>
<path id="e1" d="M165 240 H265" class="edge"/>
<path id="e2" d="M395 205 C430 155 450 120 485 113" class="edge"/>
<path id="e3" d="M395 240 H485" class="edge"/>
<path id="e4" d="M395 278 C430 335 450 380 485 387" class="edge"/>
<path id="e5" d="M485 144 C410 165 365 340 342 388" class="edge"/>
<path id="e6" d="M485 281 C420 310 375 360 345 388" class="edge"/>
<path id="e7" d="M485 387 H405" class="edge"/>
<path id="e8" d="M255 416 C140 410 105 330 103 275" class="edge"/>
</svg></section><section class="panel"><h2 id="title"></h2><p id="body1"></p><p id="body2"></p><div id="code" class="code"></div></section></main><nav class="controls"><button id="prev">上一步</button><button id="next">下一步</button></nav></div><script>
const ids=["provider","table","s1","s2","s3","finish","e1","e2","e3","e4","e5","e6","e7","e8"];
const steps=[
{t:"供应者放一种组合",b1:"供应者每轮只放两种材料。这里以组合一：纸 + 胶水为例。",b2:"桌子容量为 1，供应者放完后不能马上继续放下一组。",c:"把纸和胶水放到桌上;\nV(offer1);",hi:["provider","table","e1"],fade:["s1","s2","s3","finish","e2","e3","e4","e5","e6","e7","e8"]},
{t:"对应吸烟者被唤醒",b1:"纸 + 胶水只能被自带烟草的吸烟者 1 使用。",b2:"所以供应者执行 V(offer1)，吸烟者 1 的 P(offer1) 才能通过。",c:"smoker1:\nP(offer1);",hi:["table","s1","e2"],fade:["provider","s2","s3","finish","e1","e3","e4","e5","e6","e7","e8"]},
{t:"吸烟者取走材料并吸烟",b1:"吸烟者 1 取走桌上的材料，卷烟并抽掉。",b2:"这一轮中其他两个吸烟者仍等待在 offer2、offer3 上。",c:"从桌上取走纸和胶水;\n卷烟并抽掉;",hi:["s1","table"],fade:["provider","s2","s3","finish","e1","e2","e3","e4","e5","e6","e7","e8"]},
{t:"完成后通知供应者",b1:"吸烟者完成后执行 V(finish)。",b2:"finish 不是材料组合，而是供应者进入下一轮的同步条件。",c:"V(finish);",hi:["s1","finish","e5"],fade:["provider","table","s2","s3","e1","e2","e3","e4","e6","e7","e8"]},
{t:"供应者等待完成信号",b1:"供应者执行 P(finish)，确认上一轮已经结束。",b2:"随后 i=(i+1) mod 3，进入下一轮，放另一种组合。",c:"P(finish);\ni = (i + 1) mod 3;",hi:["provider","finish","e8"],fade:["table","s1","s2","s3","e1","e2","e3","e4","e5","e6","e7"]}
];
let i=Math.min(Math.max((Number(new URLSearchParams(location.search).get("step"))||1)-1,0),steps.length-1);
function render(){const s=steps[i];stepLabel.textContent=`${i+1} / ${steps.length}`;title.textContent=s.t;body1.textContent=s.b1;body2.textContent=s.b2;code.textContent=s.c;ids.forEach(id=>{const el=document.getElementById(id);el.classList.remove("faded","hi");if(s.fade.includes(id))el.classList.add("faded");if(s.hi.includes(id))el.classList.add("hi")})}prev.onclick=()=>{i=Math.max(0,i-1);render()};next.onclick=()=>{i=Math.min(steps.length-1,i+1);render()};render();
</script></body></html>
