<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Resource Graph Reduction</title><style>
:root{--bg:#fff;--panel:#f8fafc;--line:#cbd5e1;--text:#172033;--muted:#64748b;--p:#dbeafe;--pl:#2563eb;--r:#fef3c7;--rl:#d97706;--ok:#dcfce7;--okl:#16a34a;--bad:#fee2e2;--badl:#dc2626;--free:#bbf7d0;--arrow:#475569}@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--p:#1e3a8a;--pl:#60a5fa;--r:#713f12;--rl:#fbbf24;--ok:#14532d;--okl:#4ade80;--bad:#7f1d1d;--badl:#f87171;--free:#166534;--arrow:#cbd5e1}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.deck{min-height:700px;padding:28px 34px 24px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}header{display:flex;justify-content:space-between;align-items:end}h1{margin:0;font-size:30px}.step{color:var(--muted);font-size:18px}.stage{display:grid;grid-template-columns:1.25fr .9fr;gap:22px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;min-height:490px}svg{width:100%;height:490px}.proc{fill:var(--p);stroke:var(--pl);stroke-width:2.5}.res{fill:var(--r);stroke:var(--rl);stroke-width:2.5}.inst{fill:var(--panel);stroke:var(--rl);stroke-width:2}.inst.free{fill:var(--free);stroke:var(--okl)}.edge{fill:none;stroke:var(--arrow);stroke-width:2.8;marker-end:url(#arrow)}.gone{opacity:.14}.chosen .proc,.chosen .res{stroke:var(--okl);stroke-width:5}.dead .proc,.dead .res{stroke:var(--badl);stroke-width:5}.dead.edge{stroke:var(--badl)}text{fill:var(--text);font-family:inherit}.label{text-anchor:middle;dominant-baseline:middle;font-size:18px;font-weight:700}.small{text-anchor:middle;font-size:13px;fill:var(--muted)}h2{margin:0 0 14px;font-size:25px}p{margin:0 0 13px;font-size:20px;line-height:1.55}.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.pill{border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:var(--bg);font-size:15px}.controls{display:flex;justify-content:center;gap:10px}button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:9px 14px;font-size:16px;cursor:pointer}</style></head><body><div class="deck"><header><h1>资源分配图化简</h1><div id="stepLabel" class="step"></div></header><main class="stage"><section class="panel"><svg viewBox="0 0 680 500"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--arrow)"/></marker></defs>
<g id="p1" class="node"><circle cx="125" cy="115" r="34" class="proc"/><text x="125" y="115" class="label">P1</text></g>
<g id="p2" class="node"><circle cx="125" cy="250" r="34" class="proc"/><text x="125" y="250" class="label">P2</text></g>
<g id="p3" class="node"><circle cx="125" cy="385" r="34" class="proc"/><text x="125" y="385" class="label">P3</text></g>
<g id="r1" class="node"><rect x="305" y="82" width="94" height="66" rx="10" class="res"/><circle cx="335" cy="115" r="8" class="inst"/><circle cx="369" cy="115" r="8" class="inst"/><text x="352" y="70" class="small">R1: 2个实例</text></g>
<g id="r2" class="node"><rect x="305" y="217" width="94" height="66" rx="10" class="res"/><circle cx="352" cy="250" r="8" class="inst"/><text x="352" y="205" class="small">R2: 1个实例</text></g>
<g id="r3" class="node"><rect x="305" y="352" width="94" height="66" rx="10" class="res"/><circle cx="335" cy="385" r="8" class="inst"/><circle cx="369" cy="385" r="8" class="inst free"/><text x="352" y="340" class="small">R3: 有1个空闲</text></g>
<g id="p4" class="node"><circle cx="545" cy="165" r="34" class="proc"/><text x="545" y="165" class="label">P4</text></g>
<g id="p5" class="node"><circle cx="545" cy="335" r="34" class="proc"/><text x="545" y="335" class="label">P5</text></g>
<g id="r4" class="node"><rect x="485" y="80" width="56" height="48" rx="8" class="res"/><circle cx="513" cy="104" r="7" class="inst"/><text x="513" y="66" class="small">R4</text></g>
<g id="r5" class="node"><rect x="550" y="372" width="56" height="48" rx="8" class="res"/><circle cx="578" cy="396" r="7" class="inst"/><text x="578" y="456" class="small">R5</text></g>

<path id="e-p1-r1" d="M158 110 C205 95 246 98 305 108" class="edge"/>

<path id="e-p2-r2" d="M159 250 L305 250" class="edge"/>
<path id="e-r2-p3" d="M305 270 C238 300 205 355 158 378" class="edge"/>
<path id="e-p3-r3" d="M159 385 L305 385" class="edge"/>
<path id="e-r4-p5" d="M513 128 C500 210 500 285 524 309" class="edge"/>
<path id="e-p5-r5" d="M567 362 C570 368 573 372 578 372" class="edge"/>

</svg><div class="legend"><span class="pill">圆形：进程</span><span class="pill">矩形：资源类</span><span class="pill">资源内圆点：资源实例</span><span class="pill">绿色圆点：空闲实例</span></div></section><section class="panel"><h2 id="title"></h2><p id="body1"></p><p id="body2"></p></section></main><nav class="controls"><button id="prev">上一步</button><button id="next">下一步</button></nav></div><script>
const all=["p1","p2","p3","p4","p5","r1","r2","r3","r4","r5","e-r3-p1","e-p1-r1","e-r1-p2","e-p2-r2","e-r2-p3","e-p3-r3","e-r4-p5","e-p5-r5","e-r5-p4","e-p4-r4"];
const steps=[
{t:"先看图中保存了什么",b1:"资源到进程的边表示已经分配；进程到资源的边表示正在请求。R3 还有一个空闲实例，因此某些请求可能先得到满足。",b2:"检测算法要不断找“当前不阻塞”的进程，假定它完成并释放资源。",gone:[],chosen:[],dead:[]},
{t:"P3 可以先完成",b1:"P3 请求 R3，而 R3 有一个空闲实例，所以 P3 不是阻塞进程。",b2:"假定 P3 获得 R3 后执行完毕，删除 P3 的请求边和分配边，并回收它占有的 R2。",gone:["p3","e-r2-p3","e-p3-r3"],chosen:["p3","r3"],dead:[]},
{t:"P2 被唤醒",b1:"P3 释放 R2 后，P2 对 R2 的请求可以得到满足。",b2:"假定 P2 完成，删除 P2 的相关边，并回收它占有的 R1。",gone:["p3","e-r2-p3","e-p3-r3","p2","e-r1-p2","e-p2-r2"],chosen:["p2","r2"],dead:[]},
{t:"P1 继续完成",b1:"P2 释放 R1 后，P1 对 R1 的请求可以得到满足。",b2:"P1 完成后也能被化简掉。这一支上的边全部删除，说明这些进程不在死锁中。",gone:["p3","e-r2-p3","e-p3-r3","p2","e-r1-p2","e-p2-r2","p1","e-r3-p1","e-p1-r1"],chosen:["p1","r1"],dead:[]},
{t:"剩余部分不可完全简化",b1:"P4 占有 R5 并请求 R4，P5 占有 R4 并请求 R5。R4、R5 都没有空闲实例。",b2:"再也找不到可完成进程，图不可完全简化；剩余连边的 P4、P5 是死锁进程。",gone:["p3","e-r2-p3","e-p3-r3","p2","e-r1-p2","e-p2-r2","p1","e-r3-p1","e-p1-r1"],chosen:[],dead:["p4","p5","r4","r5","e-r4-p5","e-p5-r5","e-r5-p4","e-p4-r4"]}
];
let i=Math.min(Math.max((Number(new URLSearchParams(location.search).get("step"))||1)-1,0),steps.length-1);
function render(){const s=steps[i];stepLabel.textContent=`${i+1} / ${steps.length}`;title.textContent=s.t;body1.textContent=s.b1;body2.textContent=s.b2;all.forEach(id=>{const el=document.getElementById(id);el.classList.remove("gone","chosen","dead");if(s.gone.includes(id))el.classList.add("gone");if(s.chosen.includes(id))el.classList.add("chosen");if(s.dead.includes(id))el.classList.add("dead")})}prev.onclick=()=>{i=Math.max(0,i-1);render()};next.onclick=()=>{i=Math.min(steps.length-1,i+1);render()};render();
</script></body></html>
