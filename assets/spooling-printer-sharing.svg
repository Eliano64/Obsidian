<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">SPOOLing Printer Sharing</title>
  <desc id="desc">Printer sharing through SPOOLing output well and request queue.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.queue{fill:color-mix(in srgb,var(--blue) 12%,var(--bg));stroke:var(--blue);stroke-width:2}.disk{fill:color-mix(in srgb,var(--orange) 16%,var(--bg));stroke:var(--orange);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--green);stroke-width:3;fill:none;marker-end:url(#ga)}
  </style>
  <defs><marker id="ga" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--green)"/></marker></defs>
  <rect class="bg" width="1120" height="520"/>
  <text class="t" x="560" y="42" text-anchor="middle" font-size="24" font-weight="700">SPOOLing 共享打印机</text>
  <rect class="box" x="55" y="95" width="170" height="70" rx="8"/><text class="t" x="140" y="136" text-anchor="middle" font-size="16" font-weight="700">用户进程 A</text>
  <rect class="box" x="55" y="205" width="170" height="70" rx="8"/><text class="t" x="140" y="246" text-anchor="middle" font-size="16" font-weight="700">用户进程 B</text>
  <rect class="box" x="55" y="315" width="170" height="70" rx="8"/><text class="t" x="140" y="356" text-anchor="middle" font-size="16" font-weight="700">用户进程 C</text>
  <rect class="box" x="315" y="150" width="190" height="110" rx="8"/><text class="t" x="410" y="188" text-anchor="middle" font-size="17" font-weight="700">假脱机管理进程</text><text class="m" x="410" y="216" text-anchor="middle" font-size="13">建立输出文件</text><text class="m" x="410" y="238" text-anchor="middle" font-size="13">填写打印请求表</text>
  <rect class="disk" x="595" y="92" width="190" height="95" rx="8"/><text class="t" x="690" y="130" text-anchor="middle" font-size="17" font-weight="700">输出井</text><text class="m" x="690" y="158" text-anchor="middle" font-size="13">磁盘中的打印数据</text>
  <rect class="queue" x="585" y="250" width="210" height="108" rx="8"/><text class="t" x="690" y="284" text-anchor="middle" font-size="17" font-weight="700">假脱机文件队列</text><text class="m" x="690" y="312" text-anchor="middle" font-size="13">打印请求表 1 -> 2 -> 3</text>
  <rect class="box" x="870" y="160" width="170" height="82" rx="8"/><text class="t" x="955" y="194" text-anchor="middle" font-size="17" font-weight="700">输出进程</text><text class="m" x="955" y="220" text-anchor="middle" font-size="13">按队列取任务</text>
  <rect class="box" x="870" y="315" width="170" height="82" rx="8"/><text class="t" x="955" y="350" text-anchor="middle" font-size="17" font-weight="700">物理打印机</text><text class="m" x="955" y="374" text-anchor="middle" font-size="13">实际串行打印</text>
  <path class="a" d="M225 130 C270 130 275 185 315 185"/>
  <path class="a" d="M225 240 H315"/>
  <path class="a" d="M225 350 C270 350 275 235 315 235"/>
  <path class="a" d="M505 190 C548 160 555 140 595 140"/>
  <path class="a" d="M505 230 C545 255 550 304 585 304"/>
  <path class="a" d="M795 304 C845 290 835 202 870 202"/>
  <path class="a" d="M955 242 V315"/>
  <text class="m" x="560" y="462" text-anchor="middle" font-size="14">每个进程得到的是逻辑上的打印任务；物理打印机仍由输出进程按队列逐个使用。</text>
</svg>
