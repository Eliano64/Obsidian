<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">计算机网络分类</title>
  <desc id="desc">按覆盖范围、使用者、传输介质、拓扑、交换方式和传输技术分类</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--line:#334155;--text:#172033;--muted:#64748b;--blue:#dbeafe;--blue-line:#2563eb;--green:#dcfce7;--green-line:#16a34a;--amber:#fef3c7;--amber-line:#d97706}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--line:#94a3b8;--text:#e5e7eb;--muted:#94a3b8;--blue:#1e3a8a;--blue-line:#60a5fa;--green:#14532d;--green-line:#4ade80;--amber:#713f12;--amber-line:#fbbf24}}
    .bg{fill:var(--bg)}.root{fill:var(--amber);stroke:var(--amber-line);stroke-width:2.5}.cat{fill:var(--blue);stroke:var(--blue-line);stroke-width:2}.item{fill:var(--green);stroke:var(--green-line);stroke-width:1.8}.line{stroke:var(--line);stroke-width:2;fill:none}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:18px;font-weight:700}.small{font-size:15px;fill:var(--muted)}
  </style>
  <rect class="bg" width="980" height="620"/>
  <text x="50" y="54" class="title">计算机网络的分类</text>
  <rect x="390" y="84" width="200" height="56" rx="14" class="root"/><text x="490" y="119" text-anchor="middle" class="label">计算机网络</text>
  <g>
    <path d="M490 140 V174 H170" class="line"/><path d="M490 174 H490" class="line"/><path d="M490 174 H810" class="line"/>
    <rect x="70" y="185" width="200" height="48" rx="10" class="cat"/><text x="170" y="215" text-anchor="middle" class="label">按覆盖范围</text>
    <rect x="390" y="185" width="200" height="48" rx="10" class="cat"/><text x="490" y="215" text-anchor="middle" class="label">按使用者</text>
    <rect x="710" y="185" width="200" height="48" rx="10" class="cat"/><text x="810" y="215" text-anchor="middle" class="label">其他角度</text>
  </g>
  <g>
    <rect x="72" y="260" width="92" height="42" rx="9" class="item"/><text x="118" y="286" text-anchor="middle" class="label">PAN</text><text x="118" y="320" text-anchor="middle" class="small">约10m</text>
    <rect x="176" y="260" width="92" height="42" rx="9" class="item"/><text x="222" y="286" text-anchor="middle" class="label">LAN</text><text x="222" y="320" text-anchor="middle" class="small">约1km</text>
    <rect x="72" y="348" width="92" height="42" rx="9" class="item"/><text x="118" y="374" text-anchor="middle" class="label">MAN</text><text x="118" y="408" text-anchor="middle" class="small">5-50km</text>
    <rect x="176" y="348" width="92" height="42" rx="9" class="item"/><text x="222" y="374" text-anchor="middle" class="label">WAN</text><text x="222" y="408" text-anchor="middle" class="small">跨地区</text>
  </g>
  <g>
    <rect x="394" y="270" width="88" height="48" rx="9" class="item"/><text x="438" y="300" text-anchor="middle" class="label">公用网</text>
    <rect x="498" y="270" width="88" height="48" rx="9" class="item"/><text x="542" y="300" text-anchor="middle" class="label">专用网</text>
    <text x="490" y="355" text-anchor="middle" class="small">按服务对象和管理边界划分</text>
  </g>
  <g>
    <rect x="692" y="260" width="92" height="42" rx="9" class="item"/><text x="738" y="286" text-anchor="middle" class="label">介质</text>
    <rect x="796" y="260" width="92" height="42" rx="9" class="item"/><text x="842" y="286" text-anchor="middle" class="label">拓扑</text>
    <rect x="692" y="338" width="92" height="42" rx="9" class="item"/><text x="738" y="364" text-anchor="middle" class="label">交换</text>
    <rect x="796" y="338" width="92" height="42" rx="9" class="item"/><text x="842" y="364" text-anchor="middle" class="label">传输</text>
    <text x="738" y="410" text-anchor="middle" class="small">有线/无线</text>
    <text x="842" y="410" text-anchor="middle" class="small">星/环/网状</text>
    <text x="738" y="438" text-anchor="middle" class="small">电路/报文/分组</text>
    <text x="842" y="438" text-anchor="middle" class="small">点对点/广播</text>
  </g>
  <text x="490" y="560" text-anchor="middle" class="small">同一个网络可以同时落入多个分类；分类角度不同，答案不同。</text>
</svg>
