<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" role="img" aria-labelledby="title desc">
  <title id="title">停止等待协议窗口</title>
  <desc id="desc">发送窗口和接收窗口都为1。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--green:#16a34a;--panel:#f8fafc}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--green:#4ade80;--panel:#111827}}
    .bg{fill:var(--bg)}.t{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-size:18px}.h{font-size:24px;font-weight:800}.cell{fill:var(--panel);stroke:var(--line);stroke-width:2}.send{fill:color-mix(in srgb,var(--blue) 16%,transparent);stroke:var(--blue);stroke-width:3}.recv{fill:color-mix(in srgb,var(--green) 16%,transparent);stroke:var(--green);stroke-width:3}
  </style>
  <rect class="bg" width="900" height="250"/>
  <text x="80" y="66" class="t h">发送方</text>
  <text x="80" y="166" class="t h">接收方</text>
  <g transform="translate(190 38)">
    <rect x="0" y="0" width="78" height="54" class="send"/><text x="39" y="34" text-anchor="middle" class="t h">0</text>
    <rect x="78" y="0" width="78" height="54" class="cell"/><text x="117" y="34" text-anchor="middle" class="t m">1</text>
    <rect x="156" y="0" width="78" height="54" class="cell"/><text x="195" y="34" text-anchor="middle" class="t m">0</text>
    <rect x="234" y="0" width="78" height="54" class="cell"/><text x="273" y="34" text-anchor="middle" class="t m">1</text>
    <text x="39" y="-12" text-anchor="middle" class="t m">W_T=1</text>
  </g>
  <g transform="translate(190 138)">
    <rect x="0" y="0" width="78" height="54" class="recv"/><text x="39" y="34" text-anchor="middle" class="t h">0</text>
    <rect x="78" y="0" width="78" height="54" class="cell"/><text x="117" y="34" text-anchor="middle" class="t m">1</text>
    <rect x="156" y="0" width="78" height="54" class="cell"/><text x="195" y="34" text-anchor="middle" class="t m">0</text>
    <rect x="234" y="0" width="78" height="54" class="cell"/><text x="273" y="34" text-anchor="middle" class="t m">1</text>
    <text x="39" y="-12" text-anchor="middle" class="t m">W_R=1</text>
  </g>
  <text x="610" y="70" class="t m">发送一个，等待确认</text>
  <text x="610" y="112" class="t m">收到 ACK 后，窗口才滑到下一个序号</text>
  <text x="610" y="168" class="t m">接收方只期待当前序号</text>
  <text x="610" y="210" class="t m">重复序号会被识别并丢弃</text>
</svg>
