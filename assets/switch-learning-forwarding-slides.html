<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Switch Learning And Forwarding</title>
<style>
:root{color-scheme:light dark;--bg:#f8fafc;--fg:#172033;--muted:#5d6b7e;--line:#8a98aa;--blue:#3478d4;--green:#2f9b5f;--amber:#bf7a18;--red:#d14343;--card:#fff}
@media(prefers-color-scheme:dark){:root{--bg:#0b0f14;--fg:#e7edf7;--muted:#b6c2d2;--line:#718096;--blue:#7ab0ff;--green:#67d493;--amber:#ffd166;--red:#ff8585;--card:#111827}}
body{margin:0;background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.wrap{max-width:980px;margin:0 auto;padding:22px}h1{text-align:center;font-size:26px;margin:0 0 14px}.grid{display:grid;grid-template-columns:1fr 300px;gap:18px}.card{background:var(--card);border:1.6px solid var(--line);border-radius:10px;padding:12px}svg{width:100%;height:auto;background:var(--card);border:1.6px solid var(--line);border-radius:10px}text{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.muted{fill:var(--muted)}.host{fill:var(--card);stroke:var(--line);stroke-width:2}.sw{fill:color-mix(in srgb,var(--blue) 14%,var(--card));stroke:var(--blue);stroke-width:2.5}.link{stroke:var(--line);stroke-width:3}.frame{stroke:var(--amber);stroke-width:5;fill:none;marker-end:url(#arrow)}table{width:100%;border-collapse:collapse;font-size:15px}td,th{border:1px solid var(--line);padding:6px;text-align:center}.controls{margin-top:12px;text-align:center}button{font:inherit;border:1.5px solid var(--line);background:var(--card);color:var(--fg);border-radius:8px;padding:8px 14px;margin:0 5px}
</style>
</head>
<body>
<div class="wrap"><h1>交换机自学习与转发</h1>
<div class="grid">
<svg viewBox="0 0 620 480">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--amber)"/></marker></defs>
<rect x="260" y="190" width="100" height="74" rx="10" class="sw"/><text x="310" y="233" text-anchor="middle" font-size="20" font-weight="700">SW</text>
<g id="hosts"></g><g id="links"></g><g id="flow"></g><text id="captionSvg" x="310" y="438" text-anchor="middle" font-size="18"></text>
</svg>
<div class="card"><div id="caption"></div><h3>交换表</h3><table><thead><tr><th>MAC</th><th>端口</th></tr></thead><tbody id="tbody"></tbody></table></div>
</div>
<div class="controls"><button id="prev">上一步</button><button id="next">下一步</button></div>
</div>
<script>
const pos={A:[95,95],B:[525,95],C:[95,355],D:[525,355]};
const port={A:1,B:2,C:3,D:4};
const steps=[
{cap:"初始时交换表为空。A 向 D 发送帧。",table:[],flow:[["A","SW"]]},
{cap:"交换机先学习源地址：A 来自端口 1，记录 A→1。目的 D 未知，因此除端口 1 外泛洪。",table:[["A","1"]],flow:[["SW","B"],["SW","C"],["SW","D"]]},
{cap:"D 回复 A。交换机学习源地址 D→4；查表知道 A 在端口 1，于是只转发到端口 1。",table:[["A","1"],["D","4"]],flow:[["D","SW"],["SW","A"]]},
{cap:"C 向 A 发送。交换机学习 C→3；查表知道 A→1，于是从端口 1 转发。",table:[["A","1"],["D","4"],["C","3"]],flow:[["C","SW"],["SW","A"]]},
{cap:"若目的主机与入端口在同一方向，交换机会过滤该帧，不再转发。",table:[["A","1"],["D","4"],["C","3"]],flow:[["A","SW"]]}
];
function drawBase(){
hosts.innerHTML=Object.entries(pos).map(([k,[x,y]])=>`<rect x="${x-34}" y="${y-24}" width="68" height="48" rx="8" class="host"/><text x="${x}" y="${y+7}" text-anchor="middle" font-size="18" font-weight="700">${k}</text><text x="${x}" y="${y+45}" text-anchor="middle" class="muted" font-size="14">端口 ${port[k]}</text>`).join("");
links.innerHTML=Object.entries(pos).map(([k,[x,y]])=>`<line x1="${x}" y1="${y}" x2="310" y2="227" class="link"/>`).join("");
}
function point(name, other){
  if(name!=="SW"){
    const [x,y]=pos[name];
    if(other==="SW"){
      if(name==="A") return [126,113];
      if(name==="B") return [494,113];
      if(name==="C") return [126,337];
      if(name==="D") return [494,337];
    }
    return [x,y];
  }
  if(other==="A") return [275,202];
  if(other==="B") return [345,202];
  if(other==="C") return [275,252];
  if(other==="D") return [345,252];
  return [310,227];
}
function path(a,b){const [x1,y1]=point(a,b);const [x2,y2]=point(b,a);return `<path d="M${x1} ${y1} L${x2} ${y2}" class="frame"/>`;}
let i=0;function render(){drawBase();flow.innerHTML=steps[i].flow.map(([a,b])=>path(a,b)).join("");caption.textContent=steps[i].cap;captionSvg.textContent=steps[i].cap;tbody.innerHTML=steps[i].table.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join("")||'<tr><td colspan="2">空</td></tr>'}
prev.onclick=()=>{i=(i+steps.length-1)%steps.length;render()};next.onclick=()=>{i=(i+1)%steps.length;render()};render();
</script>
</body>
</html>
