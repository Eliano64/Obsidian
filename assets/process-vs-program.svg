<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Program and process</title>
  <desc id="desc">A static program file can correspond to multiple dynamic process executions.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--bg:#fff;--fg:#111827;--muted:#64748b;--line:#94a3b8;--blue:#dbeafe;--green:#dcfce7;--accent:#2563eb}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--fg:#e5e7eb;--muted:#94a3b8;--line:#64748b;--blue:#1e3a8a;--green:#14532d;--accent:#60a5fa}}
    .bg{fill:var(--bg)} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:var(--fg)} .h{font-size:24px;font-weight:700}.t{font-size:16px}.small{font-size:14px;fill:var(--muted)}.box{stroke:var(--line);stroke-width:2;rx:12}.arrow{fill:none;stroke:var(--accent);stroke-width:3;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="var(--accent)"/></marker></defs>
  <rect class="bg" width="980" height="360"/>
  <rect class="box" x="70" y="95" width="230" height="150" fill="var(--blue)"/>
  <text class="h" x="185" y="145" text-anchor="middle">程序</text>
  <text class="t" x="185" y="180" text-anchor="middle">磁盘上的静态文件</text>
  <text class="small" x="185" y="210" text-anchor="middle">例如：QQ.exe / a.out</text>
  <path class="arrow" d="M300 170 C405 115 470 105 560 115"/>
  <path class="arrow" d="M300 170 C405 170 470 170 560 170"/>
  <path class="arrow" d="M300 170 C405 225 470 235 560 225"/>
  <rect class="box" x="560" y="70" width="300" height="70" fill="var(--green)"/>
  <text class="h" x="710" y="112" text-anchor="middle">进程 1</text>
  <rect class="box" x="560" y="155" width="300" height="70" fill="var(--green)"/>
  <text class="h" x="710" y="197" text-anchor="middle">进程 2</text>
  <rect class="box" x="560" y="240" width="300" height="70" fill="var(--green)"/>
  <text class="h" x="710" y="282" text-anchor="middle">进程 3</text>
  <text class="small" x="485" y="45" text-anchor="middle">同一个程序多次执行，可以对应多个进程</text>
</svg>
