<svg xmlns="http://www.w3.org/2000/svg" width="940" height="420" viewBox="0 0 940 420" role="img" aria-labelledby="title desc">
  <title id="title">OpenFlow controller switch flow table</title>
  <desc id="desc">SDN controller manages flow tables in OpenFlow switches through OpenFlow over a secure channel.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
    .controller { fill: #fff7ed; stroke: #ea580c; }
    .switch { fill: #eff6ff; stroke: #2563eb; }
    .table { fill: #fff; stroke: #475569; stroke-width: 1.6; }
    .ctl { stroke: #dc2626; stroke-width: 3; marker-end: url(#arrow); }
    .data { stroke: #475569; stroke-width: 3; marker-end: url(#grayArrow); }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; }
    .tiny { font-size: 13px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .box { fill: #111827; stroke: #94a3b8; }
      .controller { fill: #2b1708; stroke: #fb923c; }
      .switch { fill: #10213f; stroke: #60a5fa; }
      .table { fill: #0b1220; stroke: #cbd5e1; }
      .ctl { stroke: #f87171; }
      .data { stroke: #cbd5e1; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
    <marker id="grayArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
  </defs>
  <text x="470" y="38" text-anchor="middle" class="label">OpenFlow 控制器、交换机和流表</text>
  <rect x="320" y="70" width="300" height="80" class="box controller"/>
  <text x="470" y="105" text-anchor="middle" class="label">SDN 控制器</text>
  <text x="470" y="130" text-anchor="middle" class="small">计算、管理、安装流表项</text>
  <rect x="210" y="245" width="520" height="120" class="box switch"/>
  <text x="470" y="275" text-anchor="middle" class="label">OpenFlow 交换机</text>
  <rect x="255" y="295" width="430" height="45" class="table"/>
  <line x1="398" y1="295" x2="398" y2="340" stroke="#64748b"/>
  <line x1="540" y1="295" x2="540" y2="340" stroke="#64748b"/>
  <text x="326" y="323" text-anchor="middle" class="tiny">匹配字段</text>
  <text x="469" y="323" text-anchor="middle" class="tiny">计数器</text>
  <text x="612" y="323" text-anchor="middle" class="tiny">动作</text>
  <path d="M470 150 V240" class="ctl"/>
  <text x="493" y="205" class="small">OpenFlow / 安全信道</text>
  <path d="M80 305 H210" class="data"/>
  <path d="M730 305 H860" class="data"/>
  <text x="145" y="285" text-anchor="middle" class="small">分组进入</text>
  <text x="795" y="285" text-anchor="middle" class="small">匹配后执行动作</text>
</svg>
