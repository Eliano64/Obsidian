<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Topological Sorting</title>
<style>
:root{--bg:#fff;--panel:#f8fafc;--text:#0f172a;--muted:#475569;--line:#94a3b8;--edge:#64748b;--hot:#2563eb;--done:#059669;--warn:#d97706}
@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--panel:#111827;--text:#f8fafc;--muted:#cbd5e1;--line:#64748b;--edge:#94a3b8;--hot:#60a5fa;--done:#34d399;--warn:#fbbf24}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,sans-serif}.wrap{padding:18px;max-width:1120px;margin:auto}.top{display:flex;justify-content:space-between;gap:12px}.title{font-size:22px;font-weight:750}.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:7px 12px;border-radius:6px;cursor:pointer}.stage{display:grid;grid-template-columns:1fr .95fr;gap:16px;margin-top:14px}.card{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:14px}.note{color:var(--muted);line-height:1.6}.edge{stroke:var(--edge);stroke-width:3;marker-end:url(#arr)}.removed{stroke:var(--line);stroke-width:2;stroke-dasharray:6 6;opacity:.35;marker-end:url(#arr)}.node{fill:var(--bg);stroke:var(--edge);stroke-width:2}.ready{stroke:var(--hot);stroke-width:4}.out{fill:color-mix(in srgb,var(--done) 22%,var(--bg));stroke:var(--done);stroke-width:3}.label{fill:var(--text);font-weight:700;font-size:17px}.small{fill:var(--muted);font-size:12px}.tbl{width:100%;border-collapse:collapse;font-size:14px}.tbl td,.tbl th{border:1px solid var(--line);padding:7px;text-align:center}.pills{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:var(--bg)}@media(max-width:780px){.stage{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
 <div class="top"><div><div class="title">Kahn 拓扑排序：入度为 0 才能输出</div><div class="note" id="cap"></div></div><div><button class="btn" id="prev">上一页</button> <button class="btn" id="next">下一页</button></div></div>
 <div class="stage"><div class="card" id="graph"></div><div class="card"><div class="note" id="txt"></div><h3>零入度集合</h3><div class="pills" id="ready"></div><h3>输出序列</h3><div class="pills" id="order"></div><h3>入度</h3><div id="table"></div></div></div>
</div>
<script>
const pos={0:[80,190],1:[230,95],2:[230,285],3:[390,120],4:[390,270]};
const edges=[[0,1],[0,2],[1,3],[2,3],[2,4],[3,4]];
const names=["0","1","2","3","4"];
const steps=[
{cap:"初始化：计算所有顶点入度。",out:[],ready:[0],deg:[0,1,1,2,2],txt:"只有顶点 0 的入度为 0，所以它可以第一个输出。"},
{cap:"输出 0，删除 0 的出边。",out:[0],ready:[1,2],deg:[0,0,0,2,2],txt:"删除 0->1 和 0->2 后，顶点 1、2 的入度都变为 0。"},
{cap:"输出 2，删除 2 的出边。",out:[0,2],ready:[1],deg:[0,0,0,1,1],txt:"这里用栈时可能先弹出 2。删除 2->3、2->4 后，3 和 4 的入度各减 1，但还不能输出。"},
{cap:"输出 1，删除 1 的出边。",out:[0,2,1],ready:[3],deg:[0,0,0,0,1],txt:"删除 1->3 后，顶点 3 入度变为 0，可以输出。"},
{cap:"输出 3，删除 3 的出边。",out:[0,2,1,3],ready:[4],deg:[0,0,0,0,0],txt:"删除 3->4 后，顶点 4 入度变为 0。"},
{cap:"输出 4，图为空。",out:[0,2,1,3,4],ready:[],deg:[0,0,0,0,0],txt:"输出顶点数等于顶点总数，说明拓扑排序成功。"}
];
let i=0;
function removed(s,a,b){return s.out.includes(a)}
function render(){
 const s=steps[i];document.getElementById("cap").textContent=s.cap;document.getElementById("txt").textContent=s.txt;
 const lines=edges.map(e=>`<line class="${removed(s,e[0],e[1])?'removed':'edge'}" x1="${pos[e[0]][0]}" y1="${pos[e[0]][1]}" x2="${pos[e[1]][0]}" y2="${pos[e[1]][1]}"/>`).join("");
 const nodes=Object.keys(pos).map(v=>`<g><circle class="node ${s.ready.includes(+v)?'ready':''} ${s.out.includes(+v)?'out':''}" cx="${pos[v][0]}" cy="${pos[v][1]}" r="25"/><text class="label" x="${pos[v][0]}" y="${pos[v][1]+6}" text-anchor="middle">${v}</text><text class="small" x="${pos[v][0]}" y="${pos[v][1]+43}" text-anchor="middle">in=${s.deg[v]}</text></g>`).join("");
 document.getElementById("graph").innerHTML=`<svg viewBox="0 0 500 380"><defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--edge)"/></marker></defs>${lines}${nodes}</svg>`;
 document.getElementById("ready").innerHTML=s.ready.map(v=>`<span class="pill">${v}</span>`).join("")||"<span class='pill'>empty</span>";
 document.getElementById("order").innerHTML=s.out.map(v=>`<span class="pill">${v}</span>`).join("")||"<span class='pill'>empty</span>";
 document.getElementById("table").innerHTML=`<table class="tbl"><tr>${names.map(v=>`<th>${v}</th>`).join("")}</tr><tr>${s.deg.map(d=>`<td>${d}</td>`).join("")}</tr></table>`;
}
document.getElementById("prev").onclick=()=>{i=(i+steps.length-1)%steps.length;render()};document.getElementById("next").onclick=()=>{i=(i+1)%steps.length;render()};render();
</script>
</body>
</html>
