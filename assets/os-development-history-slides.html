<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>操作系统发展历程</title>
  <style>
    :root{--bg:#fff;--panel:#f8fafc;--panel2:#eef2f7;--text:#172033;--muted:#59677a;--line:#cbd5e1;--blue:#2563eb;--green:#059669;--amber:#d97706;--red:#dc2626;--purple:#7c3aed}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1220;--panel:#111c2d;--panel2:#172337;--text:#eef2f7;--muted:#aeb9c8;--line:#3a4b63;--blue:#60a5fa;--green:#34d399;--amber:#fbbf24;--red:#fb7185;--purple:#a78bfa}}
    *{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif}
    .deck{height:610px;padding:16px 20px 14px;display:grid;grid-template-rows:auto 1fr;gap:10px;overflow:hidden}
    header{display:flex;align-items:center;gap:12px}h1{font-size:25px;line-height:1.2;margin:0;margin-right:auto}.counter{font-weight:700;min-width:40px;text-align:center}
    button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:7px 12px;font-size:15px;cursor:pointer}button:disabled{opacity:.35;cursor:default}
    .stage{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:12px;display:grid;grid-template-columns:1.12fr .88fr;gap:12px;min-height:0}
    .visual,.explain{border:1px solid var(--line);border-radius:11px;background:var(--bg);min-width:0}.visual{padding:14px;display:flex;flex-direction:column;gap:12px}.explain{padding:16px}
    h2{font-size:23px;margin:0 0 8px}.goal{font-size:15px;color:var(--muted);margin:0 0 15px}.eyebrow{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:5px}.section{margin:0 0 13px}.section h3{font-size:15px;margin:0 0 5px}.section p{font-size:15px;line-height:1.55;margin:0;color:var(--text)}
    .flow{display:flex;align-items:center;justify-content:center;gap:7px;min-height:74px}.flow .box{border:2px solid var(--accent);border-radius:9px;background:var(--panel);padding:10px 9px;text-align:center;font-size:14px;font-weight:700;min-width:76px}.arrow{color:var(--accent);font-weight:900;font-size:22px}
    .machine{border:2px solid var(--accent);border-radius:12px;padding:12px;background:var(--panel)}.cpu{height:42px;border-radius:8px;background:color-mix(in srgb,var(--accent) 18%,var(--panel));border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;margin-bottom:9px}
    .jobs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.job{height:58px;border:1px solid var(--line);border-radius:7px;padding:7px;font-size:12px;color:var(--muted);position:relative;overflow:hidden}.job strong{display:block;color:var(--text);margin-bottom:6px}.bar{height:7px;border-radius:4px;background:var(--panel2);overflow:hidden}.bar i{display:block;height:100%;background:var(--accent)}
    .metric{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.metric div{border:1px solid var(--line);border-radius:8px;padding:8px 5px;text-align:center}.metric strong{display:block;color:var(--accent);font-size:16px}.metric span{font-size:11px;color:var(--muted)}
    .compare{margin-top:auto;border-radius:9px;padding:10px 12px;background:color-mix(in srgb,var(--accent) 10%,var(--bg));border-left:4px solid var(--accent);font-size:14px;line-height:1.5}
    .tagrow{display:flex;flex-wrap:wrap;gap:6px}.tag{border:1px solid var(--accent);color:var(--accent);border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700}
    @media(max-width:680px){.deck{height:auto;min-height:610px}.stage{grid-template-columns:1fr}.visual{min-height:280px}.explain{min-height:260px}}
  </style>
</head>
<body>
  <div class="deck">
    <header>
      <h1>操作系统发展历程</h1>
      <button id="prev" type="button">上一步</button>
      <span id="counter" class="counter"></span>
      <button id="next" type="button">下一步</button>
    </header>
    <main class="stage">
      <section class="visual" id="visual"></section>
      <section class="explain">
        <div id="eyebrow" class="eyebrow"></div>
        <h2 id="title"></h2>
        <p id="goal" class="goal"></p>
        <div class="section"><h3>核心机制</h3><p id="mechanism"></p></div>
        <div class="section"><h3>解决的问题</h3><p id="gain"></p></div>
        <div class="section"><h3>仍然存在的限制</h3><p id="limit"></p></div>
        <div id="tags" class="tagrow"></div>
      </section>
    </main>
  </div>
  <script>
    const steps=[
      {
        name:"单道批处理系统",period:"从人工操作走向自动成批执行",goal:"目标：减少人工装入和作业切换造成的停机时间",accent:"var(--blue)",
        mechanism:"作业按批提交，由监督程序自动装入并依次运行；内存中通常只有一道用户作业。",gain:"上一作业结束后能自动转入下一作业，不再要求操作员频繁干预。",limit:"当前作业等待 I/O 时，CPU 仍然无事可做；没有人机交互，作业周转时间较长。",tags:["自动连续运行","单道作业","顺序执行"],
        visual:`<div class="flow"><div class="box">作业 1</div><span class="arrow">→</span><div class="box">作业 2</div><span class="arrow">→</span><div class="box">作业 3</div></div><div class="machine"><div class="cpu">CPU：同一时刻只处理一道作业</div><div class="jobs"><div class="job"><strong>计算</strong><div class="bar"><i style="width:85%"></i></div></div><div class="job"><strong>I/O 等待</strong><div class="bar"><i style="width:15%"></i></div></div><div class="job"><strong>CPU 空闲</strong><div class="bar"><i style="width:5%"></i></div></div></div></div><div class="compare">改进的是作业之间的自动衔接；尚未解决 CPU 与 I/O 速度不匹配。</div>`
      },
      {
        name:"多道批处理系统",period:"用并发提高资源利用率和吞吐量",goal:"目标：当一道作业等待 I/O 时，让 CPU 转去运行另一道作业",accent:"var(--green)",
        mechanism:"多道作业同时驻留内存，操作系统进行作业调度、进程调度、内存保护和资源分配。",gain:"让 CPU 与外设并行工作，显著提高处理机利用率和单位时间完成的作业数。",limit:"用户提交作业后不能及时交互；调度和资源竞争使系统管理更加复杂。",tags:["多道程序","并发","高吞吐量"],
        visual:`<div class="machine"><div class="cpu">CPU 正在运行：作业 B</div><div class="jobs"><div class="job"><strong>作业 A</strong>I/O 等待<div class="bar"><i style="width:35%"></i></div></div><div class="job"><strong>作业 B</strong>使用 CPU<div class="bar"><i style="width:82%"></i></div></div><div class="job"><strong>作业 C</strong>就绪等待<div class="bar"><i style="width:55%"></i></div></div></div></div><div class="metric"><div><strong>↑</strong><span>CPU 利用率</span></div><div><strong>↑</strong><span>系统吞吐量</span></div><div><strong>↓</strong><span>空闲等待</span></div></div><div class="compare">单核上的多道程序通常是交替执行的并发，不等于同一时刻并行执行。</div>`
      },
      {
        name:"分时操作系统",period:"从“成批完成”转向“及时交互”",goal:"目标：让多个终端用户都感觉自己在独占计算机",accent:"var(--purple)",
        mechanism:"把 CPU 时间划分为很短的时间片，按一定策略在多个用户进程之间快速切换。",gain:"用户可以边输入边获得结果，系统具有同时性、独立性、及时性和交互性。",limit:"响应及时不等于保证截止时间；负载过高时，响应时间仍可能明显变长。",tags:["时间片","多用户","交互响应"],
        visual:`<div class="flow"><div class="box">终端 A</div><div class="box">终端 B</div><div class="box">终端 C</div></div><div class="machine"><div class="cpu">CPU 时间片：A → B → C → A → …</div><div class="jobs"><div class="job"><strong>A</strong><div class="bar"><i style="width:72%"></i></div></div><div class="job"><strong>B</strong><div class="bar"><i style="width:48%"></i></div></div><div class="job"><strong>C</strong><div class="bar"><i style="width:63%"></i></div></div></div></div><div class="compare">分时关注“多久能回应用户”，多道批处理更关注“单位时间能完成多少作业”。</div>`
      },
      {
        name:"实时操作系统",period:"从平均性能转向截止时间与可预测性",goal:"目标：在外部事件规定的时间界限内作出正确响应",accent:"var(--red)",
        mechanism:"按优先级和截止时间调度任务，限制关键路径延迟，并分析最坏情况下的响应时间。",gain:"系统行为具有可预测性，适合工业控制、航空航天、医疗设备和多媒体等场景。",limit:"资源配置和调度约束更严格；追求的不是平均速度最快，而是关键任务不超时。",tags:["截止时间","可预测性","事件驱动"],
        visual:`<div class="flow"><div class="box">外部事件</div><span class="arrow">→</span><div class="box">实时任务</div><span class="arrow">→</span><div class="box">截止时间</div></div><div class="machine"><div class="cpu">响应时间必须落在允许区间内</div><div class="jobs"><div class="job"><strong>硬实时</strong>错过即失败<div class="bar"><i style="width:90%"></i></div></div><div class="job"><strong>软实时</strong>偶尔超时降质<div class="bar"><i style="width:72%"></i></div></div><div class="job"><strong>普通系统</strong>看平均响应<div class="bar"><i style="width:52%"></i></div></div></div></div><div class="compare">实时 ≠ 运行得特别快；实时的核心是在可知的时间上界内完成。</div>`
      },
      {
        name:"网络与分布式操作系统",period:"多台计算机协作形成的新方向",goal:"网络 OS 强调连通和共享；分布式 OS 强调统一管理与透明性",accent:"var(--blue)",
        mechanism:"网络操作系统在各自治计算机上提供远程登录、文件和打印等服务；分布式操作系统进一步统一调度多机资源。",gain:"突破单机边界，支持通信、资源共享、负载分配和容错。",limit:"网络 OS 的机器边界通常对用户可见；分布式 OS 要隐藏这些边界，设计与一致性处理更复杂。",tags:["网络共享","机器自治","分布透明"],
        visual:`<div class="flow"><div class="box">主机 A</div><span class="arrow">↔</span><div class="box">网络</div><span class="arrow">↔</span><div class="box">主机 B</div></div><div class="metric"><div><strong>网络 OS</strong><span>多台独立机器</span></div><div><strong>可见</strong><span>用户知道远程资源</span></div><div><strong>分布式 OS</strong><span>力图呈现统一系统</span></div></div><div class="compare">这是横向扩展方向，并不是在时间线上简单取代分时或实时系统。</div>`
      },
      {
        name:"微机操作系统",period:"操作系统进入个人计算环境",goal:"目标：在成本和资源受限的微型计算机上提供易用的通用环境",accent:"var(--amber)",
        mechanism:"经历单用户单任务、单用户多任务，再逐步吸收多用户、网络、安全和图形界面能力。",gain:"个人用户可以在一台微机上同时运行多种应用，并通过图形界面和网络使用系统资源。",limit:"“微机操作系统”按机器与使用场景分类，不代表一种独立的调度原理；现代桌面系统已融合多道、分时和网络机制。",tags:["个人计算","图形界面","通用系统"],
        visual:`<div class="flow"><div class="box">单用户<br>单任务</div><span class="arrow">→</span><div class="box">单用户<br>多任务</div><span class="arrow">→</span><div class="box">现代通用<br>系统</div></div><div class="machine"><div class="cpu">一台个人计算机上的综合操作系统</div><div class="jobs"><div class="job"><strong>应用</strong>并发运行</div><div class="job"><strong>网络</strong>共享服务</div><div class="job"><strong>界面</strong>图形交互</div></div></div><div class="compare">它描述的是应用平台的演进，而不是与批处理、分时、实时互斥的类别。</div>`
      }
    ];
    const qs=id=>document.getElementById(id);let index=Math.min(Math.max((Number(new URLSearchParams(location.search).get("step"))||1)-1,0),steps.length-1);
    function render(){const s=steps[index];document.documentElement.style.setProperty("--accent",s.accent);qs("counter").textContent=`${index+1} / ${steps.length}`;qs("eyebrow").textContent=s.period;qs("title").textContent=s.name;qs("goal").textContent=s.goal;qs("mechanism").textContent=s.mechanism;qs("gain").textContent=s.gain;qs("limit").textContent=s.limit;qs("tags").innerHTML=s.tags.map(x=>`<span class="tag">${x}</span>`).join("");qs("visual").innerHTML=s.visual;qs("prev").disabled=index===0;qs("next").disabled=index===steps.length-1}
    qs("prev").onclick=()=>{if(index>0){index--;render()}};qs("next").onclick=()=>{if(index<steps.length-1){index++;render()}};render();
  </script>
</body>
</html>
