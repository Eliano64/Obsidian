<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">传输媒体分类</title>
  <desc id="desc">展示导引型和非导引型传输媒体分类</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--blue-bg:#dbeafe;--green:#16a34a;--green-bg:#dcfce7;--amber:#d97706;--amber-bg:#fef3c7;--purple:#7c3aed;--purple-bg:#ede9fe}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--blue-bg:#1e3a8a;--green:#4ade80;--green-bg:#14532d;--amber:#fbbf24;--amber-bg:#713f12;--purple:#c4b5fd;--purple-bg:#4c1d95}}
    .bg{fill:var(--bg)}.root{fill:var(--panel);stroke:var(--line);stroke-width:2.4}.guide{fill:var(--blue-bg);stroke:var(--blue);stroke-width:2.2}.free{fill:var(--green-bg);stroke:var(--green);stroke-width:2.2}.leaf{fill:var(--panel);stroke:var(--line);stroke-width:1.8}.line{stroke:var(--line);stroke-width:2.2;fill:none}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:21px;font-weight:700}.small{font-size:16px;fill:var(--muted)}
  </style>
  <rect class="bg" width="980" height="500"/>
  <text x="50" y="58" class="title">传输媒体分类</text>
  <rect x="390" y="86" width="200" height="66" rx="10" class="root"/>
  <text x="490" y="127" text-anchor="middle" class="label">传输媒体</text>
  <path d="M490 152 V205 M260 205 H720" class="line"/>
  <path d="M260 205 V238 M720 205 V238" class="line"/>
  <rect x="130" y="238" width="260" height="70" rx="10" class="guide"/>
  <text x="260" y="268" text-anchor="middle" class="label">导引型</text>
  <text x="260" y="294" text-anchor="middle" class="small">信号沿固体媒体传播</text>
  <rect x="590" y="238" width="260" height="70" rx="10" class="free"/>
  <text x="720" y="268" text-anchor="middle" class="label">非导引型</text>
  <text x="720" y="294" text-anchor="middle" class="small">信号在自由空间传播</text>
  <path d="M260 308 V346 M160 346 H360" class="line"/>
  <path d="M160 346 V370 M260 346 V370 M360 346 V370" class="line"/>
  <rect x="80" y="370" width="150" height="58" rx="8" class="leaf"/><text x="155" y="406" text-anchor="middle" class="small">同轴电缆</text>
  <rect x="245" y="370" width="150" height="58" rx="8" class="leaf"/><text x="320" y="406" text-anchor="middle" class="small">双绞线</text>
  <rect x="410" y="370" width="150" height="58" rx="8" class="leaf"/><text x="485" y="406" text-anchor="middle" class="small">光纤</text>
  <path d="M720 308 V346 M620 346 H820" class="line"/>
  <path d="M620 346 V370 M720 346 V370 M820 346 V370" class="line"/>
  <rect x="575" y="370" width="125" height="58" rx="8" class="leaf"/><text x="637" y="406" text-anchor="middle" class="small">无线电波</text>
  <rect x="715" y="370" width="125" height="58" rx="8" class="leaf"/><text x="777" y="406" text-anchor="middle" class="small">微波</text>
  <rect x="855" y="370" width="90" height="58" rx="8" class="leaf"/><text x="900" y="406" text-anchor="middle" class="small">红外/激光</text>
</svg>
