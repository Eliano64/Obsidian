<svg xmlns="http://www.w3.org/2000/svg" width="980" height="330" viewBox="0 0 980 330" role="img" aria-labelledby="title desc">
  <title id="title">TCP MSS MTU relation</title>
  <desc id="desc">MSS is TCP payload length, MTU contains IP header, TCP header and TCP payload.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.ip{fill:#fee2e2}.tcp{fill:#dbeafe}.mss{fill:#dcfce7}.label{font-size:22px;font-weight:700}.small{font-size:15px}.mid{font-size:17px;font-weight:700}.code{font-family:Consolas,monospace;font-size:15px}
    @media(prefers-color-scheme:dark){text{fill:#e5e7eb}.box{fill:#111827;stroke:#94a3b8}.ip{fill:#3b0d0d}.tcp{fill:#10213f}.mss{fill:#0f2b1d}}
  </style>
  <text x="490" y="38" text-anchor="middle" class="label">MSS、TCP 首部、IP 首部与 MTU</text>
  <rect x="90" y="95" width="800" height="74" rx="10" class="box"/>
  <rect x="90" y="95" width="140" height="74" class="box ip"/><text x="160" y="137" text-anchor="middle" class="mid">IP 首部</text>
  <rect x="230" y="95" width="140" height="74" class="box tcp"/><text x="300" y="137" text-anchor="middle" class="mid">TCP 首部</text>
  <rect x="370" y="95" width="520" height="74" class="box mss"/><text x="630" y="137" text-anchor="middle" class="mid">TCP 数据载荷 = MSS</text>
  <text x="490" y="195" text-anchor="middle" class="code">MTU = IP 首部 + TCP 首部 + MSS</text>
  <text x="490" y="232" text-anchor="middle" class="small">以太网常见 MTU 1500 B；无选项时 IP 首部 20 B，TCP 首部 20 B</text>
  <text x="490" y="265" text-anchor="middle" class="code">MSS = 1500 - 20 - 20 = 1460 B</text>
  <text x="490" y="300" text-anchor="middle" class="small">MSS 指 TCP 数据载荷最大长度，不包括 TCP 首部和 IP 首部</text>
</svg>
