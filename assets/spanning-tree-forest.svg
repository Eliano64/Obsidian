<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Spanning tree and spanning forest</title>
  <desc id="desc">A connected graph with a spanning tree and a disconnected graph with a spanning forest.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.edge{stroke:#94a3b8;stroke-width:3;fill:none;stroke-linecap:round}.tree{stroke:#16a34a;stroke-width:5;fill:none;stroke-linecap:round}
    .node{fill:#fff;stroke:#2563eb;stroke-width:3}.text{fill:#0f172a;font-size:21px;font-weight:650}.small{fill:#334155;font-size:16px}.formula{fill:#7c2d12;font-size:19px;font-weight:700}
    @media (prefers-color-scheme:dark){.panel{fill:#111827;stroke:#334155}.edge{stroke:#64748b}.tree{stroke:#4ade80}.node{fill:#0b1220}.text{fill:#f8fafc}.small{fill:#cbd5e1}.formula{fill:#fdba74}}
  </style>
  <rect class="panel" x="28" y="30" width="440" height="420" rx="10"/>
  <rect class="panel" x="512" y="30" width="440" height="420" rx="10"/>
  <text class="text" x="70" y="76">连通图的生成树</text>
  <text class="text" x="552" y="76">非连通图的生成森林</text>
  <g>
    <line class="edge" x1="130" y1="150" x2="245" y2="135"/><line class="edge" x1="130" y1="150" x2="170" y2="285"/><line class="edge" x1="245" y1="135" x2="330" y2="230"/><line class="edge" x1="170" y1="285" x2="330" y2="230"/><line class="edge" x1="245" y1="135" x2="170" y2="285"/>
    <line class="tree" x1="130" y1="150" x2="245" y2="135"/><line class="tree" x1="130" y1="150" x2="170" y2="285"/><line class="tree" x1="245" y1="135" x2="330" y2="230"/>
    <circle class="node" cx="130" cy="150" r="24"/><text class="text" x="122" y="158">A</text><circle class="node" cx="245" cy="135" r="24"/><text class="text" x="237" y="143">B</text><circle class="node" cx="170" cy="285" r="24"/><text class="text" x="162" y="293">C</text><circle class="node" cx="330" cy="230" r="24"/><text class="text" x="322" y="238">D</text>
    <text class="small" x="72" y="365">绿色边保留全部顶点且连通</text><text class="formula" x="72" y="400">n 个顶点，生成树有 n - 1 条边</text>
  </g>
  <g>
    <line class="tree" x1="610" y1="150" x2="700" y2="145"/><line class="tree" x1="610" y1="150" x2="650" y2="260"/><line class="tree" x1="790" y1="175" x2="865" y2="260"/>
    <circle class="node" cx="610" cy="150" r="24"/><text class="text" x="602" y="158">A</text><circle class="node" cx="700" cy="145" r="24"/><text class="text" x="692" y="153">B</text><circle class="node" cx="650" cy="260" r="24"/><text class="text" x="642" y="268">C</text><circle class="node" cx="790" cy="175" r="24"/><text class="text" x="782" y="183">D</text><circle class="node" cx="865" cy="260" r="24"/><text class="text" x="857" y="268">E</text>
    <text class="small" x="552" y="365">每个连通分量各取一棵生成树</text><text class="formula" x="552" y="400">n 个顶点，k 个分量，森林有 n - k 条边</text>
  </g>
</svg>
