<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-label="PPP components">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    svg { background: transparent; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    .title { fill: #111827; font-size: 26px; font-weight: 700; }
    .text { fill: #334155; font-size: 18px; }
    .small { fill: #475569; font-size: 15px; }
    .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
    .lcp { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
    .enc { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
    .ncp { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
    .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    @media (prefers-color-scheme: dark) {
      .title { fill: #f8fafc; }
      .text { fill: #d1d5db; }
      .small { fill: #94a3b8; }
      .box { fill: #0f172a; stroke: #475569; }
      .lcp { fill: #172554; stroke: #60a5fa; }
      .enc { fill: #052e1b; stroke: #34d399; }
      .ncp { fill: #431407; stroke: #fb923c; }
      .arrow { stroke: #94a3b8; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="490" y="44" text-anchor="middle" class="title">PPP 的三部分</text>
  <rect x="80" y="90" width="820" height="320" rx="20" class="box"/>

  <rect x="130" y="145" width="220" height="150" rx="14" class="lcp"/>
  <text x="240" y="188" text-anchor="middle" class="text" font-weight="700">LCP</text>
  <text x="240" y="222" text-anchor="middle" class="small">建立、配置、测试</text>
  <text x="240" y="248" text-anchor="middle" class="small">终止数据链路连接</text>

  <rect x="380" y="145" width="220" height="150" rx="14" class="enc"/>
  <text x="490" y="188" text-anchor="middle" class="text" font-weight="700">封装方法</text>
  <text x="490" y="222" text-anchor="middle" class="small">把网络层 PDU</text>
  <text x="490" y="248" text-anchor="middle" class="small">封装进 PPP 帧</text>

  <rect x="630" y="145" width="220" height="150" rx="14" class="ncp"/>
  <text x="740" y="188" text-anchor="middle" class="text" font-weight="700">NCP</text>
  <text x="740" y="222" text-anchor="middle" class="small">为不同网络层协议</text>
  <text x="740" y="248" text-anchor="middle" class="small">分别进行配置</text>

  <path d="M240 320 L240 360 L490 360" class="arrow"/>
  <path d="M740 320 L740 360 L490 360" class="arrow"/>
  <text x="490" y="383" text-anchor="middle" class="small">共同服务于一条点对点 PPP 链路</text>
</svg>
