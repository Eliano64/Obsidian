<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Stack LIFO Structure</title>
  <desc id="desc">A stack with push and pop at the top only.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { --bg: transparent; --ink: #17212b; --muted: #5b6876; --line: #334e68; --accent: #0f766e; --cell: #eef6ff; --base: #fff7e6; }
    @media (prefers-color-scheme: dark) {
      :root { --ink: #e6edf3; --muted: #b8c4cf; --line: #9ccfd8; --accent: #5eead4; --cell: #16212c; --base: #2a2113; }
    }
    text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: var(--ink); }
    .muted { fill: var(--muted); font-size: 16px; }
    .label { font-weight: 700; font-size: 20px; }
    .cell { fill: var(--cell); stroke: var(--line); stroke-width: 2; rx: 8; }
    .base { fill: var(--base); stroke: #ad6800; stroke-width: 2; rx: 8; }
    .arrow { stroke: var(--accent); stroke-width: 3; fill: none; marker-end: url(#arrow); }
    /* contrast-audit-fix */
  .muted{paint-order:stroke fill;stroke:#f8fafc;stroke-width:3px}@media(prefers-color-scheme:dark){.muted{stroke:#0b1020}}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--accent)"/>
    </marker>
  </defs>
  <rect class="cell" x="300" y="48" width="160" height="54"/>
  <rect class="cell" x="300" y="108" width="160" height="54"/>
  <rect class="cell" x="300" y="168" width="160" height="54"/>
  <rect class="base" x="300" y="228" width="160" height="54"/>
  <text class="label" x="352" y="82">a4</text>
  <text class="label" x="352" y="142">a3</text>
  <text class="label" x="352" y="202">a2</text>
  <text class="label" x="352" y="262">a1</text>
  <text class="muted" x="482" y="80">top</text>
  <text class="muted" x="482" y="260">bottom</text>
  <path class="arrow" d="M164 78 H288"/>
  <path class="arrow" d="M596 78 H472"/>
  <text class="label" x="72" y="84">Push</text>
  <text class="label" x="612" y="84">Pop</text>
  <text class="muted" x="260" y="324">Only the top end is allowed to insert or delete.</text>
</svg>
