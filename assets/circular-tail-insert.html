<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>循环单链表尾插</title><style>
:root {
  --ink: #17212b;
  --muted: #5b6876;
  --line: #334e68;
  --accent: #0f766e;
  --warn: #b45309;
  --bg: #f8fafc;
  --panel: #fff;
  --node: #eef6ff;
  --head: #fff7e6;
  --new: #e6fffb;
  --code: #111827;
  --codeText: #e5e7eb;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: Arial, "Microsoft YaHei", sans-serif;
}
main { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }
header, footer { padding: 18px 28px; background: var(--panel); border-bottom: 1px solid #dbe3ea; }
footer { border-top: 1px solid #dbe3ea; border-bottom: 0; display: flex; justify-content: space-between; align-items: center; }
h1 { font-size: 24px; margin: 0; }
h2 { font-size: 27px; margin: 0 0 12px; }
p, li { font-size: 18px; line-height: 1.65; }
.slide { display: none; padding: 28px; gap: 24px; grid-template-columns: 1fr 1fr; align-items: start; }
.slide.active { display: grid; }
.panel { background: var(--panel); border: 1px solid #d8e1e8; border-radius: 8px; padding: 20px; }
pre { margin: 0; background: var(--code); color: var(--codeText); border-radius: 8px; padding: 18px; overflow: auto; font-size: 16px; line-height: 1.55; }
code { font-family: Consolas, monospace; }
button { border: 1px solid #a7b4c2; background: var(--panel); color: var(--ink); border-radius: 6px; padding: 9px 14px; font-size: 15px; cursor: pointer; }
.count, .label { color: var(--muted); }

.array { display: flex; align-items: stretch; margin: 18px 0 8px; }
.cell { width: 76px; height: 64px; border: 2px solid var(--line); display: grid; place-items: center; background: #eef7f2; font-size: 20px; font-weight: 700; }
.cell.empty { background: #f4f6f8; color: #8a96a3; border-style: dashed; }
.cell.mark, .node.mark { outline: 4px solid var(--warn); outline-offset: -4px; }
.cell.move { background: #fef3c7; }
.idx { display: flex; }
.idx span { width: 76px; text-align: center; color: var(--muted); font-size: 14px; }

.list { position: relative; height: 250px; margin-top: 16px; overflow: visible; }
.node { position: absolute; top: 84px; width: 112px; height: 64px; border: 2px solid var(--line); border-radius: 8px; background: var(--node); display: grid; grid-template-columns: 1fr 1fr; align-items: center; text-align: center; font-weight: 700; }
.node.triple { grid-template-columns: 1fr 1fr 1fr; width: 138px; }
.head { background: var(--head); border-color: #ad6800; }
.new { background: var(--new); border-color: var(--accent); }
.muted { opacity: .42; }
.label { position: absolute; font-size: 15px; font-weight: 700; }
.arrow { position: absolute; height: 2px; background: var(--line); }
.arrow::after { content: ""; position: absolute; right: -2px; top: -5px; border-left: 10px solid var(--line); border-top: 6px solid transparent; border-bottom: 6px solid transparent; }
.back::after { right: auto; left: -2px; border-left: 0; border-right: 10px solid var(--line); }
.green { background: var(--accent); }
.green::after { border-left-color: var(--accent); }
.green.back::after { border-right-color: var(--accent); border-left: 0; }
.dashed { background: transparent; border-top: 2px dashed var(--warn); }
.dashed::after { border-left-color: var(--warn); }

svg.diagram { width: 100%; height: auto; display: block; margin-top: 18px; overflow: visible; }
.svg-node { fill: var(--node); stroke: var(--line); stroke-width: 2; }
.svg-head { fill: var(--head); stroke: #ad6800; stroke-width: 2; }
.svg-new { fill: var(--new); stroke: var(--accent); stroke-width: 2; }
.svg-text { fill: var(--ink); font: 700 17px Arial, "Microsoft YaHei", sans-serif; }
.svg-small { fill: var(--muted); font: 14px Arial, "Microsoft YaHei", sans-serif; }
.svg-line { stroke: var(--line); stroke-width: 2.4; fill: none; }
.svg-accent { stroke: var(--accent); stroke-width: 3; fill: none; }

@media (prefers-color-scheme: dark) {
  :root {
    --ink: #e6edf3;
    --muted: #b8c4cf;
    --line: #9ccfd8;
    --accent: #5eead4;
    --warn: #f6c177;
    --bg: #0f1720;
    --panel: #16212c;
    --node: #16212c;
    --head: #2a2113;
    --new: #102620;
    --code: #080d13;
    --codeText: #e6edf3;
  }
  header, footer, .panel { border-color: #2c3a47; }
  .cell { background: #13251e; color: #e6edf3; border-color: var(--line); }
  .cell.empty { background: #1b2430; color: var(--muted); }
  .cell.move { background: #3a2a12; }
  button { border-color: #52616b; }
}

@media (max-width: 760px) {
  .slide { grid-template-columns: 1fr; }
}

</style></head>
<body><main>
  <header><h1>循环单链表尾插</h1></header>
  <section class="slide active">
    <div class="panel"><h2>1. newNode 先指向头结点</h2><p><code>tail->next</code> 就是头结点。新结点先接住它，环不会断。</p>
      <svg class="diagram" viewBox="0 0 760 260" role="img" aria-label="循环单链表尾插第一步">
        <defs><marker id="b1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--line)"/></marker><marker id="b2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--accent)"/></marker></defs>
        <rect class="svg-head" x="35" y="82" width="96" height="58" rx="8"/><text class="svg-text" x="55" y="118">head</text>
        <rect class="svg-node" x="190" y="82" width="96" height="58" rx="8"/><text class="svg-text" x="224" y="118">a1</text>
        <rect class="svg-node" x="345" y="82" width="96" height="58" rx="8"/><text class="svg-text" x="376" y="118">tail</text>
        <rect class="svg-new" x="345" y="174" width="116" height="58" rx="8"/><text class="svg-text" x="368" y="210">new</text>
        <path class="svg-line" marker-end="url(#b1)" d="M131 111 H184"/><path class="svg-line" marker-end="url(#b1)" d="M286 111 H339"/>
        <path class="svg-accent" marker-end="url(#b2)" d="M461 203 C650 203 650 42 82 42 C38 42 40 72 55 82"/>
      </svg>
    </div>
    <pre><code>newNode->next = tail->next;</code></pre>
  </section>
  <section class="slide">
    <div class="panel"><h2>2. 旧尾指向 newNode</h2><p>旧尾的 <code>next</code> 改到新结点后，链表中已经包含新结点。</p>
      <svg class="diagram" viewBox="0 0 760 260" role="img" aria-label="循环单链表尾插第二步">
        <defs><marker id="b3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--accent)"/></marker></defs>
        <rect class="svg-head" x="35" y="82" width="96" height="58" rx="8"/><text class="svg-text" x="55" y="118">head</text><rect class="svg-node" x="190" y="82" width="96" height="58" rx="8"/><text class="svg-text" x="224" y="118">a1</text><rect class="svg-node" x="345" y="82" width="96" height="58" rx="8"/><text class="svg-text" x="370" y="118">old</text><rect class="svg-new" x="500" y="82" width="116" height="58" rx="8"/><text class="svg-text" x="526" y="118">new</text>
        <path class="svg-accent" marker-end="url(#b3)" d="M441 111 H494"/><path class="svg-accent" marker-end="url(#b3)" d="M616 111 C720 111 720 228 320 228 C74 228 55 166 75 140"/>
      </svg>
    </div>
    <pre><code>tail->next = newNode;</code></pre>
  </section>
  <section class="slide">
    <div class="panel"><h2>3. tail 更新为 newNode</h2><p>尾指针要指向新的最后一个结点，下一次尾插才能从正确位置开始。</p>
      <svg class="diagram" viewBox="0 0 760 260" role="img" aria-label="循环单链表尾插第三步">
        <defs><marker id="b4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--accent)"/></marker></defs>
        <rect class="svg-head" x="35" y="82" width="96" height="58" rx="8"/><text class="svg-text" x="55" y="118">head</text><rect class="svg-node" x="190" y="82" width="96" height="58" rx="8"/><text class="svg-text" x="224" y="118">a1</text><rect class="svg-node" x="345" y="82" width="96" height="58" rx="8"/><text class="svg-text" x="370" y="118">old</text><rect class="svg-new" x="500" y="82" width="116" height="58" rx="8"/><text class="svg-text" x="530" y="118">tail</text>
        <path class="svg-accent" marker-end="url(#b4)" d="M616 111 C720 111 720 228 320 228 C74 228 55 166 75 140"/>
      </svg>
    </div>
    <pre><code>tail = newNode;</code></pre>
  </section>
  <footer><button id="prev">上一页</button><span class="count" id="count"></span><button id="next">下一页</button></footer>
</main><script>
const slides = [...document.querySelectorAll(".slide")];
let index = 0;
const count = document.getElementById("count");

function show(nextIndex) {
  index = (nextIndex + slides.length) % slides.length;
  slides.forEach((slide, slideIndex) => slide.classList.toggle("active", slideIndex === index));
  count.textContent = `${index + 1} / ${slides.length}`;
}

document.getElementById("prev").onclick = () => show(index - 1);
document.getElementById("next").onclick = () => show(index + 1);
addEventListener("keydown", (event) => {
  if (event.key === "ArrowRight") show(index + 1);
  if (event.key === "ArrowLeft") show(index - 1);
});
show(0);

</script></body></html>
