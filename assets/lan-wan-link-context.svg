<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="LAN WAN and point to point link context">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    svg { background: transparent; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    .title { fill: #111827; font-size: 26px; font-weight: 700; }
    .text { fill: #334155; font-size: 18px; }
    .small { fill: #475569; font-size: 15px; }
    .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
    .lan { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2.5; }
    .wan { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; }
    .router { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
    .link { stroke: #64748b; stroke-width: 3; fill: none; }
    .ppp { stroke: #ea580c; stroke-width: 5; fill: none; }
    @media (prefers-color-scheme: dark) {
      .title { fill: #f8fafc; }
      .text { fill: #cbd5e1; }
      .small { fill: #94a3b8; }
      .panel { fill: #0f172a; stroke: #475569; }
      .lan { fill: #082f49; stroke: #38bdf8; }
      .wan { fill: #431407; stroke: #fb923c; }
      .router { fill: #111827; stroke: #94a3b8; }
      .link { stroke: #94a3b8; }
      .ppp { stroke: #fb923c; }
    }
  </style>
  <text x="550" y="44" text-anchor="middle" class="title">局域网、广域网与点对点链路</text>

  <rect x="55" y="86" width="300" height="320" rx="18" class="lan"/>
  <text x="205" y="126" text-anchor="middle" class="text" font-weight="700">LAN 1</text>
  <circle cx="130" cy="210" r="25" class="router"/>
  <circle cx="205" cy="210" r="25" class="router"/>
  <circle cx="280" cy="210" r="25" class="router"/>
  <text x="130" y="216" text-anchor="middle" class="small">H1</text>
  <text x="205" y="216" text-anchor="middle" class="small">H2</text>
  <text x="280" y="216" text-anchor="middle" class="small">H3</text>
  <rect x="165" y="305" width="80" height="48" rx="10" class="router"/>
  <text x="205" y="335" text-anchor="middle" class="small">R1</text>
  <path d="M130 235 L185 305 M205 235 L205 305 M280 235 L225 305" class="link"/>

  <rect x="745" y="86" width="300" height="320" rx="18" class="lan"/>
  <text x="895" y="126" text-anchor="middle" class="text" font-weight="700">LAN 2</text>
  <circle cx="820" cy="210" r="25" class="router"/>
  <circle cx="895" cy="210" r="25" class="router"/>
  <circle cx="970" cy="210" r="25" class="router"/>
  <text x="820" y="216" text-anchor="middle" class="small">H4</text>
  <text x="895" y="216" text-anchor="middle" class="small">H5</text>
  <text x="970" y="216" text-anchor="middle" class="small">H6</text>
  <rect x="855" y="305" width="80" height="48" rx="10" class="router"/>
  <text x="895" y="335" text-anchor="middle" class="small">R2</text>
  <path d="M820 235 L875 305 M895 235 L895 305 M970 235 L915 305" class="link"/>

  <rect x="420" y="150" width="260" height="185" rx="26" class="wan"/>
  <text x="550" y="188" text-anchor="middle" class="text" font-weight="700">WAN / 通信子网</text>
  <path d="M470 260 C515 215 590 215 635 260" stroke="#ea580c" stroke-width="3" fill="none" stroke-dasharray="8 7"/>
  <text x="550" y="275" text-anchor="middle" class="small">远距离承载网络</text>
  <text x="550" y="302" text-anchor="middle" class="small">常见：点对点链路、专线、运营商网络</text>

  <path d="M245 329 C330 330 360 246 420 246" class="ppp"/>
  <path d="M680 246 C740 246 770 330 855 329" class="ppp"/>
  <text x="330" y="290" text-anchor="middle" class="small">PPP 可用于路由器专线</text>
  <text x="770" y="290" text-anchor="middle" class="small">点对点数据链路</text>

  <rect x="165" y="450" width="770" height="54" rx="10" class="panel"/>
  <text x="550" y="484" text-anchor="middle" class="text">PPP 关注两端明确的一段链路，不负责多站点共享信道的发送权竞争。</text>
</svg>
