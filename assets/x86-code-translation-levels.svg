<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">C to machine code levels</title>
  <desc id="desc">High-level code is compiled to assembly and assembled to machine code.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--text:#111827;--muted:#4b5563;--line:#111827;--c:#dcfce7;--asm:#dbeafe;--bin:#fee2e2;--tool:#fef3c7}
    @media(prefers-color-scheme:dark){:root{--bg:#111827;--text:#e5e7eb;--muted:#cbd5e1;--line:#e5e7eb;--c:#14532d;--asm:#1e3a8a;--bin:#7f1d1d;--tool:#713f12}}
    .bg{fill:var(--bg)}.text{fill:var(--text);font-family:"Segoe UI",Arial,sans-serif}.muted{fill:var(--muted);font-family:"Segoe UI",Arial,sans-serif}
    .box{stroke:var(--line);stroke-width:1.8;rx:10}.c{fill:var(--c)}.asm{fill:var(--asm)}.bin{fill:var(--bin)}.tool{fill:var(--tool)}
    .line{stroke:var(--line);stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="960" height="360"/>
  <text class="text" x="42" y="44" font-size="28" font-weight="700">高级语言、汇编语言、机器语言</text>
  <text class="muted" x="42" y="76" font-size="18">汇编语言是机器指令的助记符表示，便于人阅读。</text>

  <rect class="box c" x="70" y="145" width="220" height="95"/>
  <text class="text" x="180" y="180" font-size="22" font-weight="700" text-anchor="middle">高级语言</text>
  <text class="text" x="180" y="212" font-size="18" text-anchor="middle">y = a * b + c</text>

  <rect class="box tool" x="340" y="110" width="120" height="52"/>
  <text class="text" x="400" y="142" font-size="18" text-anchor="middle">编译</text>
  <rect class="box asm" x="520" y="145" width="180" height="95"/>
  <text class="text" x="610" y="180" font-size="22" font-weight="700" text-anchor="middle">汇编语言</text>
  <text class="text" x="610" y="212" font-size="18" text-anchor="middle">mov / add / jmp</text>

  <rect class="box tool" x="740" y="110" width="120" height="52"/>
  <text class="text" x="800" y="142" font-size="18" text-anchor="middle">汇编</text>
  <rect class="box bin" x="760" y="220" width="150" height="70"/>
  <text class="text" x="835" y="250" font-size="20" font-weight="700" text-anchor="middle">机器语言</text>
  <text class="text" x="835" y="276" font-size="16" text-anchor="middle">0101...</text>

  <path class="line" d="M290 192 H515"/>
  <path class="line" d="M700 192 C740 194 765 207 795 220"/>
</svg>
