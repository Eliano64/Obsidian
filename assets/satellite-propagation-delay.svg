<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">卫星通信传播时延</title>
  <desc id="desc">展示同步卫星通信的传播路径和时延</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--green:#16a34a;--amber:#d97706;--earth:#dbeafe;--sat:#fef3c7}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--green:#4ade80;--amber:#fbbf24;--earth:#1e3a8a;--sat:#713f12}}
    .bg{fill:var(--bg)}.earth{fill:var(--earth);stroke:var(--blue);stroke-width:3}.station{fill:var(--panel);stroke:var(--line);stroke-width:2}.sat{fill:var(--sat);stroke:var(--amber);stroke-width:2.4}.path{fill:none;stroke:var(--green);stroke-width:3;stroke-dasharray:8 6;marker-end:url(#arrow)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:21px;font-weight:700}.small{font-size:16px;fill:var(--muted)}.time{font-size:24px;font-weight:700;fill:var(--amber)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--green)"/></marker></defs>
  <rect class="bg" width="980" height="500"/>
  <text x="50" y="58" class="title">同步卫星通信的传播时延</text>
  <path d="M130 405 Q490 265 850 405" class="earth"/>
  <rect x="188" y="360" width="90" height="52" rx="8" class="station"/><text x="233" y="392" text-anchor="middle" class="small">地球站 A</text>
  <rect x="702" y="360" width="90" height="52" rx="8" class="station"/><text x="747" y="392" text-anchor="middle" class="small">地球站 B</text>
  <rect x="432" y="102" width="116" height="58" rx="8" class="sat"/><text x="490" y="138" text-anchor="middle" class="label">同步卫星</text>
  <path d="M260 360 L455 160" class="path"/>
  <path d="M525 160 L720 360" class="path"/>
  <text x="490" y="214" text-anchor="middle" class="small">高度约 36000 km</text>
  <text x="490" y="260" text-anchor="middle" class="time">单程约 250~300 ms，常取 270 ms</text>
  <text x="490" y="300" text-anchor="middle" class="small">通信距离远、覆盖面广，但交互时延明显</text>
</svg>
