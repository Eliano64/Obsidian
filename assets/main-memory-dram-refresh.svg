<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" role="img" aria-labelledby="title desc">
  <title id="title">DRAM refresh</title><desc id="desc">DRAM refresh by rows and common refresh schedules: concentrated, distributed, and asynchronous.</desc>
  <defs><style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}
.bg{fill:#fbfcff}.title{font:700 26px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.h{font:700 17px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.t{font:400 13px "Microsoft YaHei",Arial,sans-serif;fill:#40506a}.box{fill:#fff;stroke:#9aa9bd;stroke-width:1.6;rx:8}.row{fill:#fff7e8;stroke:#d49a3a}.r{fill:#effaf3;stroke:#62a87c}.dead{fill:#fff1f1;stroke:#c77777}@media(prefers-color-scheme:dark){.bg{fill:#111827}.title,.h{fill:#f3f4f6}.t{fill:#cbd5e1}.box{fill:#1f2937;stroke:#64748b}.row{fill:#3b2a12;stroke:#f59e0b}.r{fill:#143525;stroke:#4ade80}.dead{fill:#3b1d1d;stroke:#f87171}}</style></defs>
  <rect class="bg" width="1080" height="600"/><text class="title" x="48" y="54">DRAM 刷新：按行读出再重写</text>
  <rect class="box" x="70" y="110" width="360" height="300"/><text class="h" x="250" y="145" text-anchor="middle">二维阵列按行刷新</text>
  <g transform="translate(130 180)"><rect class="row" x="0" y="0" width="240" height="32"/><rect class="row" x="0" y="42" width="240" height="32"/><rect class="row" x="0" y="84" width="240" height="32"/><rect class="row" x="0" y="126" width="240" height="32"/><rect class="row" x="0" y="168" width="240" height="32"/><text class="t" x="120" y="21" text-anchor="middle">第 0 行</text><text class="t" x="120" y="63" text-anchor="middle">第 1 行</text><text class="t" x="120" y="105" text-anchor="middle">第 2 行</text><text class="t" x="120" y="147" text-anchor="middle">...</text><text class="t" x="120" y="189" text-anchor="middle">第 n 行</text></g>
  <text class="t" x="250" y="455" text-anchor="middle">刷新周期内，每一行至少刷新一次</text>
  <rect class="box" x="500" y="110" width="500" height="95"/><text class="h" x="545" y="145">集中刷新</text><rect class="r" x="650" y="160" width="220" height="22"/><text class="t" x="760" y="177" text-anchor="middle">集中刷新死区</text>
  <rect class="box" x="500" y="245" width="500" height="95"/><text class="h" x="545" y="280">分散刷新</text><g transform="translate(650 285)"><rect class="r" x="0" y="0" width="40" height="22"/><rect class="dead" x="44" y="0" width="18" height="22"/><rect class="r" x="70" y="0" width="40" height="22"/><rect class="dead" x="114" y="0" width="18" height="22"/><rect class="r" x="140" y="0" width="40" height="22"/><rect class="dead" x="184" y="0" width="18" height="22"/></g><text class="t" x="845" y="305">每次读写后插入刷新</text>
  <rect class="box" x="500" y="380" width="500" height="95"/><text class="h" x="545" y="415">异步刷新</text><g transform="translate(650 420)"><rect class="r" x="0" y="0" width="45" height="22"/><rect class="dead" x="70" y="0" width="18" height="22"/><rect class="r" x="110" y="0" width="45" height="22"/><rect class="dead" x="185" y="0" width="18" height="22"/><rect class="r" x="225" y="0" width="45" height="22"/></g><text class="t" x="850" y="440">刷新请求分散到周期内</text>
</svg>
