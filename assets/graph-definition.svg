<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">Graph definition</title>
  <desc id="desc">A graph consists of a nonempty vertex set and an edge set, with examples of valid and invalid graphs.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--fg:#111827;--muted:#475569;--line:#334155;--node:#fff;--ok:#16a34a;--bad:#dc2626;--fill:#dbeafe;--accent:#2563eb}
    @media(prefers-color-scheme:dark){:root{--fg:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--node:#0f172a;--ok:#86efac;--bad:#f87171;--fill:#172554;--accent:#60a5fa}}
    text{fill:var(--fg);font-family:"Segoe UI",Arial,sans-serif}.title{font-size:28px;font-weight:700}.small{font-size:17px;fill:var(--muted)}.label{font-size:20px;font-weight:700;text-anchor:middle}.node{fill:var(--node);stroke:var(--line);stroke-width:2.2}.main{fill:var(--fill);stroke:var(--accent);stroke-width:3}.edge{stroke:var(--line);stroke-width:2.5}.ok{fill:var(--ok);font-weight:700}.bad{fill:var(--bad);font-weight:700}.box{fill:transparent;stroke:var(--line);stroke-width:1.5;rx:12}
  </style>
  <text class="title" x="38" y="50">图：顶点集与边集组成的结构</text>
  <text class="small" x="38" y="82">G = (V, E)，V 是有限非空顶点集，E 是顶点之间关系的集合。</text>

  <rect class="box" x="45" y="125" width="245" height="285"/>
  <text class="label" x="168" y="160">有效图：V 非空</text>
  <line class="edge" x1="115" y1="245" x2="210" y2="205"/>
  <line class="edge" x1="115" y1="245" x2="205" y2="310"/>
  <circle class="main" cx="115" cy="245" r="25"/><text class="label" x="115" y="253">A</text>
  <circle class="node" cx="210" cy="205" r="23"/><text class="label" x="210" y="213">B</text>
  <circle class="node" cx="205" cy="310" r="23"/><text class="label" x="205" y="318">C</text>
  <text class="ok" x="85" y="380">V={A,B,C}, E≠∅</text>

  <rect class="box" x="330" y="125" width="245" height="285"/>
  <text class="label" x="452" y="160">有效图：E 可为空</text>
  <circle class="main" cx="385" cy="245" r="25"/><text class="label" x="385" y="253">A</text>
  <circle class="node" cx="455" cy="205" r="23"/><text class="label" x="455" y="213">B</text>
  <circle class="node" cx="505" cy="310" r="23"/><text class="label" x="505" y="318">C</text>
  <text class="ok" x="372" y="380">V={A,B,C}, E=∅</text>

  <rect class="box" x="615" y="125" width="245" height="285"/>
  <text class="label" x="738" y="160">不是图：V 为空</text>
  <text class="bad" x="695" y="260" font-size="62">∅</text>
  <text class="bad" x="660" y="380">V=∅ 不允许</text>
</svg>
