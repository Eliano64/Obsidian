<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DMA Transfer Process</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #111827;
      --muted: #475569;
      --line: #94a3b8;
      --panel: #f8fafc;
      --blue: #2563eb;
      --green: #059669;
      --orange: #d97706;
      --red: #dc2626;
      --soft-red: #fef2f2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1020;
        --fg: #e5e7eb;
        --muted: #cbd5e1;
        --line: #64748b;
        --panel: #111827;
        --blue: #60a5fa;
        --green: #34d399;
        --orange: #fbbf24;
        --red: #f87171;
        --soft-red: #291418;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
    }
    .wrap { max-width: 1060px; margin: 0 auto; padding: 18px 22px 22px; }
    header { display: flex; justify-content: space-between; gap: 14px; align-items: center; margin-bottom: 12px; }
    h1 { margin: 0; font-size: 24px; }
    .controls { display: flex; gap: 8px; align-items: center; flex: 0 0 auto; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--fg);
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { border-color: var(--blue); }
    .stage {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      padding: 12px 14px 14px;
      min-height: 610px;
    }
    svg { display: block; width: 100%; height: 500px; }
    .caption { margin: 8px 4px 0; color: var(--muted); font-size: 15px; line-height: 1.55; }
    .progress { color: var(--muted); min-width: 54px; text-align: center; font-size: 14px; }
    .box { fill: var(--bg); stroke: var(--line); stroke-width: 2; }
    .dma-box { fill: var(--bg); stroke: var(--green); stroke-width: 2.5; }
    .active { fill: color-mix(in srgb, var(--blue) 17%, var(--bg)); stroke: var(--blue); stroke-width: 3; }
    .mem { fill: color-mix(in srgb, var(--green) 14%, var(--bg)); stroke: var(--green); stroke-width: 2; }
    .device { fill: color-mix(in srgb, var(--orange) 16%, var(--bg)); stroke: var(--orange); stroke-width: 2; }
    .txt { fill: var(--fg); }
    .muted { fill: var(--muted); }
    .physical { stroke: var(--line); stroke-width: 4; fill: none; stroke-linejoin: round; }
    .bus { stroke: var(--line); stroke-width: 10; stroke-linecap: round; }
    .blue { stroke: var(--blue); stroke-width: 4; fill: none; marker-end: url(#blueArrow); }
    .green { stroke: var(--green); stroke-width: 4; fill: none; marker-end: url(#greenArrow); }
    .orange { stroke: var(--orange); stroke-width: 3.5; fill: none; marker-end: url(#orangeArrow); }
    .red { stroke: var(--red); stroke-width: 3.5; fill: none; marker-end: url(#redArrow); stroke-dasharray: 8 6; }
    .notice { fill: var(--soft-red); stroke: var(--red); stroke-width: 1.6; }
    .dim { opacity: .24; }
    .hidden { display: none; }
    @media (max-width: 700px) {
      .wrap { padding: 12px; }
      header { align-items: flex-start; flex-wrap: wrap; }
      h1 { font-size: 20px; }
      .stage { padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>DMA 数据输入过程</h1>
      <div class="controls">
        <button id="prev" type="button">上一步</button>
        <span class="progress" id="progress"></span>
        <button id="next" type="button">下一步</button>
      </div>
    </header>
    <section class="stage">
      <svg viewBox="0 0 1000 500" role="img" aria-label="DMA 通过共享系统总线把设备数据写入主存">
        <defs>
          <marker id="blueArrow" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="var(--blue)"></path></marker>
          <marker id="greenArrow" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="var(--green)"></path></marker>
          <marker id="orangeArrow" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="var(--orange)"></path></marker>
          <marker id="redArrow" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="var(--red)"></path></marker>
        </defs>

        <g id="cpu" class="node">
          <rect class="box" x="35" y="70" width="165" height="94" rx="9"></rect>
          <text class="txt" x="117" y="107" text-anchor="middle" font-size="19" font-weight="700">CPU</text>
          <text class="muted" x="117" y="136" text-anchor="middle" font-size="14">设置参数、处理中断</text>
        </g>
        <g id="dev" class="node">
          <rect class="device" x="35" y="250" width="165" height="94" rx="9"></rect>
          <text class="txt" x="117" y="287" text-anchor="middle" font-size="19" font-weight="700">块设备</text>
          <text class="muted" x="117" y="316" text-anchor="middle" font-size="14">准备一个传送单位</text>
        </g>
        <g id="dma" class="node">
          <rect class="dma-box" x="315" y="48" width="370" height="276" rx="11"></rect>
          <text class="txt" x="500" y="82" text-anchor="middle" font-size="20" font-weight="700">DMA 控制器</text>
          <rect class="box" x="350" y="108" width="130" height="48" rx="6"></rect>
          <text class="txt" x="415" y="138" text-anchor="middle" font-size="14">DR · 数据缓冲</text>
          <rect class="box" x="520" y="108" width="130" height="48" rx="6"></rect>
          <text class="txt" x="585" y="138" text-anchor="middle" font-size="14">MAR · 主存地址</text>
          <rect class="box" x="350" y="180" width="130" height="48" rx="6"></rect>
          <text class="txt" x="415" y="210" text-anchor="middle" font-size="14">DC · 剩余计数</text>
          <rect class="box" x="520" y="180" width="130" height="48" rx="6"></rect>
          <text class="txt" x="585" y="210" text-anchor="middle" font-size="14">CR · 命令状态</text>
          <rect class="box" x="375" y="252" width="250" height="43" rx="6"></rect>
          <text class="muted" x="500" y="279" text-anchor="middle" font-size="14">控制与时序：请求、仲裁、读写</text>
        </g>
        <g id="mem" class="node">
          <rect class="mem" x="805" y="70" width="170" height="94" rx="9"></rect>
          <text class="txt" x="890" y="107" text-anchor="middle" font-size="19" font-weight="700">主存缓冲区</text>
          <text class="muted" x="890" y="136" text-anchor="middle" font-size="14">接收输入数据块</text>
        </g>

        <path class="physical" d="M117 164 V205 H250 V382"></path>
        <path class="physical" d="M500 324 V382"></path>
        <path class="physical" d="M890 164 V382"></path>
        <line class="bus" x1="105" y1="382" x2="900" y2="382"></line>
        <text class="txt" x="500" y="417" text-anchor="middle" font-size="17" font-weight="700">共享系统总线 / 主存通路</text>
        <text class="muted" x="500" y="440" text-anchor="middle" font-size="14">CPU 与 DMA 都从这里访问主存，不存在两条彼此独立的主存通路</text>
        <rect class="notice" x="230" y="454" width="540" height="35" rx="8"></rect>
        <text class="txt" x="500" y="477" text-anchor="middle" font-size="15" font-weight="700">同时访存时争用同一资源：DMA 先申请，仲裁后才能传送</text>

        <path id="p-setup" class="orange hidden" d="M200 116 H315"></path>
        <text id="t-setup" class="muted hidden" x="257" y="99" text-anchor="middle" font-size="13">方向 / 地址 / 长度</text>

        <path id="p-dev" class="orange hidden" d="M200 297 H315"></path>
        <text id="t-dev" class="muted hidden" x="257" y="280" text-anchor="middle" font-size="13">数据就绪，提出请求</text>

        <path id="p-bus" class="red hidden" d="M500 324 V375"></path>
        <text id="t-bus" class="muted hidden" x="575" y="353" text-anchor="middle" font-size="13">申请共享总线</text>

        <path id="p-data1" class="green hidden" d="M200 297 H315"></path>
        <path id="p-data2" class="green hidden" d="M500 324 V382 H890 V164"></path>
        <text id="t-data" class="muted hidden" x="716" y="365" text-anchor="middle" font-size="13">沿共享通路写入主存</text>

        <path id="p-update1" class="blue hidden" d="M415 228 V252"></path>
        <path id="p-update2" class="blue hidden" d="M585 156 V180"></path>
        <text id="t-update" class="muted hidden" x="500" y="344" text-anchor="middle" font-size="13">地址自动修改，计数器递减</text>

        <path id="p-irq" class="red hidden" d="M315 78 C270 37 220 43 200 89"></path>
        <text id="t-irq" class="muted hidden" x="250" y="39" text-anchor="middle" font-size="13">整块完成后中断 CPU</text>
      </svg>
      <p class="caption" id="caption"></p>
    </section>
  </div>

  <script>
    const steps = [
      {
        node: "cpu",
        show: ["p-setup", "t-setup"],
        text: "CPU 做传送前预处理：把传输方向、主存起始地址、设备地址或端口、传送长度写入 DMA 控制器，然后启动 DMA。"
      },
      {
        node: "dev",
        show: ["p-dev", "t-dev"],
        text: "设备准备好一个传送单位后，先把数据送到接口缓冲寄存器，并向 DMA 控制器提出 DMA 请求。"
      },
      {
        node: "dma",
        show: ["p-bus", "t-bus"],
        text: "DMA 控制器必须申请 CPU 也在使用的共享系统总线或主存通路。获得仲裁授权后，它才临时成为总线主设备。"
      },
      {
        node: "mem",
        show: ["p-data1", "p-data2", "t-data"],
        text: "以输入为例，数据从设备进入 DMA 控制器，再沿共享系统总线写入主存。数据不经过 CPU 寄存器，但并没有绕开总线和主存端口。"
      },
      {
        node: "dma",
        show: ["p-update1", "p-update2", "t-update"],
        text: "每完成一次传送，DMA 控制器自动修改主存地址寄存器并更新数据计数器。计数未结束时，继续等待下一次设备请求。"
      },
      {
        node: "cpu",
        show: ["p-irq", "t-irq"],
        text: "整块数据传送完成后，DMA 控制器向 CPU 发中断。CPU 再检查状态、处理缓冲区并唤醒等待进程。"
      }
    ];
    let index = 0;
    const nodes = Array.from(document.querySelectorAll(".node"));
    const flowIds = ["p-setup","t-setup","p-dev","t-dev","p-bus","t-bus","p-data1","p-data2","t-data","p-update1","p-update2","t-update","p-irq","t-irq"];
    const caption = document.getElementById("caption");
    const progress = document.getElementById("progress");
    function render() {
      const step = steps[index];
      nodes.forEach(group => {
        const rect = group.querySelector("rect");
        group.classList.toggle("dim", group.id !== step.node);
        if (rect) {
          rect.classList.remove("active");
          if (group.id === step.node) rect.classList.add("active");
        }
      });
      flowIds.forEach(id => document.getElementById(id).classList.add("hidden"));
      step.show.forEach(id => document.getElementById(id).classList.remove("hidden"));
      caption.textContent = step.text;
      progress.textContent = `${index + 1} / ${steps.length}`;
    }
    document.getElementById("prev").addEventListener("click", () => {
      index = (index + steps.length - 1) % steps.length;
      render();
    });
    document.getElementById("next").addEventListener("click", () => {
      index = (index + 1) % steps.length;
      render();
    });
    render();
  </script>
</body>
</html>
