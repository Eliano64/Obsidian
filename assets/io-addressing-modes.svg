<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" role="img" aria-labelledby="title desc">
  <title id="title">I/O Addressing Modes</title>
  <desc id="desc">Memory-mapped I/O and isolated I/O addressing comparison.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.mem{fill:color-mix(in srgb,var(--blue) 14%,var(--bg));stroke:var(--blue);stroke-width:2}.io{fill:color-mix(in srgb,var(--orange) 18%,var(--bg));stroke:var(--orange);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.line{stroke:var(--line);stroke-width:2;fill:none}
  </style>
  <rect class="bg" width="1080" height="460"/>
  <text class="t" x="540" y="42" text-anchor="middle" font-size="24" font-weight="700">I/O 端口编址方式</text>
  <rect class="box" x="55" y="78" width="455" height="330" rx="10"/>
  <text class="t" x="282" y="112" text-anchor="middle" font-size="20" font-weight="700">统一编址：内存映射 I/O</text>
  <rect class="mem" x="140" y="150" width="140" height="200" rx="6"/>
  <text class="t" x="210" y="178" text-anchor="middle" font-size="16" font-weight="700">统一地址空间</text>
  <rect class="mem" x="160" y="202" width="100" height="74" rx="4"/>
  <text class="m" x="210" y="234" text-anchor="middle" font-size="13">主存单元</text>
  <rect class="io" x="160" y="286" width="100" height="42" rx="4"/>
  <text class="t" x="210" y="312" text-anchor="middle" font-size="13" font-weight="700">I/O 端口</text>
  <text class="m" x="355" y="206" text-anchor="middle" font-size="14">普通访存指令</text>
  <text class="m" x="355" y="232" text-anchor="middle" font-size="14">也能访问端口</text>
  <text class="m" x="355" y="282" text-anchor="middle" font-size="14">端口占用一部分</text>
  <text class="m" x="355" y="308" text-anchor="middle" font-size="14">主存地址范围</text>
  <rect class="box" x="570" y="78" width="455" height="330" rx="10"/>
  <text class="t" x="797" y="112" text-anchor="middle" font-size="20" font-weight="700">独立编址：I/O 映射 I/O</text>
  <rect class="mem" x="650" y="155" width="120" height="170" rx="6"/>
  <text class="t" x="710" y="183" text-anchor="middle" font-size="16" font-weight="700">主存地址</text>
  <text class="m" x="710" y="244" text-anchor="middle" font-size="13">只对应主存</text>
  <rect class="io" x="835" y="155" width="120" height="170" rx="6"/>
  <text class="t" x="895" y="183" text-anchor="middle" font-size="16" font-weight="700">I/O 地址</text>
  <rect class="io" x="855" y="220" width="80" height="34" rx="4"/>
  <text class="t" x="895" y="242" text-anchor="middle" font-size="13" font-weight="700">端口</text>
  <text class="m" x="710" y="354" text-anchor="middle" font-size="14">访存指令</text>
  <text class="m" x="895" y="354" text-anchor="middle" font-size="14">专门 I/O 指令</text>
</svg>
