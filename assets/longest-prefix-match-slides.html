<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>最长前缀匹配</title>
<style>:root{color-scheme:light dark;--bg:#f8fafc;--fg:#0f172a;--muted:#475569;--border:#cbd5e1;--a:#dbeafe;--b:#dcfce7;--bad:#fee2e2;--accent:#0369a1}@media(prefers-color-scheme:dark){:root{--bg:#020617;--fg:#e5e7eb;--muted:#cbd5e1;--border:#334155;--a:#172554;--b:#052e16;--bad:#450a0a;--accent:#67e8f9}}body{margin:0;background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif}.wrap{max-width:980px;margin:0 auto;padding:28px}.title{text-align:center;font-size:26px;font-weight:700}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:24px}.card{border:1px solid var(--border);border-radius:10px;padding:18px}.row{display:grid;grid-template-columns:160px 90px 1fr;gap:10px;align-items:center;padding:10px;border-radius:8px;margin:8px 0;background:var(--a)}.row.hit{background:var(--b);outline:2px solid var(--accent)}.row.miss{background:var(--bad)}.small{color:var(--muted);font-size:15px}.result{color:var(--accent);font-weight:700;margin-top:18px}.controls{text-align:center;margin-top:18px}button{background:transparent;color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:8px 16px;margin:0 6px;font:inherit}</style></head>
<body><div class="wrap"><div class="title">路由表查找：匹配的路由里选前缀最长者</div><div class="grid"><div class="card"><b>目的 IP</b><p id="dst" class="result"></p><p class="small">逐条比较：目的 IP 与路由项掩码相与，看结果是否等于路由项目的网络。</p></div><div class="card" id="table"></div></div><div class="controls"><button id="prev">上一步</button><button id="next">下一步</button></div></div>
<script>
const steps=[
{dst:"192.168.1.130",rows:[["192.168.0.0/16","匹配","范围较大"],["192.168.1.0/24","匹配","更具体"],["192.168.1.128/25","匹配","最具体"],["0.0.0.0/0","匹配","默认路由"]],res:"选择 /25，因为它是所有匹配项中前缀最长的。"},
{dst:"203.0.113.7",rows:[["192.168.0.0/16","不匹配","目的网络不同"],["192.168.1.0/24","不匹配","目的网络不同"],["192.168.1.128/25","不匹配","目的网络不同"],["0.0.0.0/0","匹配","默认路由"]],res:"没有更具体路由时，使用默认路由。"},
{dst:"192.168.1.64",rows:[["192.168.0.0/16","匹配","范围较大"],["192.168.1.0/24","匹配","更具体"],["192.168.1.128/25","不匹配","不在 .128/25 内"],["0.0.0.0/0","匹配","默认路由"]],res:"选择 /24，不选默认路由，也不选不匹配的 /25。"}
];let i=0;function render(){const s=steps[i];dst.textContent=s.dst;table.innerHTML=s.rows.map(r=>`<div class="row ${r[1]==='匹配'?'hit':'miss'}"><b>${r[0]}</b><span>${r[1]}</span><span class="small">${r[2]}</span></div>`).join("")+`<div class="result">${s.res}</div>`}prev.onclick=()=>{i=Math.max(0,i-1);render()};next.onclick=()=>{i=Math.min(steps.length-1,i+1);render()};render();
</script></body></html>
