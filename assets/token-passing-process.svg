<svg xmlns="http://www.w3.org/2000/svg" width="860" height="440" viewBox="0 0 860 440" role="img" aria-label="令牌传递过程图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .muted { fill: #5d6b7e; }
    .ring { stroke: #6f7f94; stroke-width: 3; fill: none; stroke-dasharray: 10 8; }
    .node { fill: #ffffff; stroke: #7d8aa0; stroke-width: 2; }
    .active { fill: #e8f6ee; stroke: #2e8a4f; stroke-width: 3; }
    .token { fill: #ffd166; stroke: #a86a00; stroke-width: 2; }
    .arrow { stroke: #2f73c8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .title { font-size: 28px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e7edf7; }
      .muted { fill: #b6c2d2; }
      .ring { stroke: #9aa8ba; }
      .node { fill: #111827; stroke: #718096; }
      .active { fill: #123422; stroke: #67d493; }
      .token { fill: #8a5a12; stroke: #ffd166; }
      .arrow { stroke: #7ab0ff; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f73c8"/>
    </marker>
  </defs>
  <text x="430" y="42" text-anchor="middle" class="title">令牌传递：拿到令牌才有发送权</text>
  <ellipse cx="430" cy="230" rx="285" ry="120" class="ring"/>

  <circle cx="190" cy="230" r="48" class="node"/>
  <text x="190" y="237" text-anchor="middle" class="label">A</text>
  <circle cx="330" cy="120" r="48" class="node"/>
  <text x="330" y="127" text-anchor="middle" class="label">B</text>
  <circle cx="530" cy="120" r="48" class="active"/>
  <text x="530" y="127" text-anchor="middle" class="label">C</text>
  <circle cx="670" cy="230" r="48" class="node"/>
  <text x="670" y="237" text-anchor="middle" class="label">D</text>
  <circle cx="430" cy="340" r="48" class="node"/>
  <text x="430" y="347" text-anchor="middle" class="label">E</text>

  <circle cx="532" cy="73" r="25" class="token"/>
  <text x="532" y="79" text-anchor="middle" class="small">令牌</text>
  <path d="M575 127 C620 145 653 174 667 211" class="arrow"/>
  <path d="M645 262 C600 315 520 345 479 344" class="arrow"/>
  <path d="M381 344 C294 333 218 289 199 247" class="arrow"/>
  <path d="M209 203 C235 160 276 132 310 122" class="arrow"/>
  <path d="M378 113 C420 96 474 97 498 109" class="arrow"/>

  <text x="430" y="396" text-anchor="middle" class="small muted">站点 C 持有令牌时可以发送；发送完成或无数据可发后，把令牌交给下一个站点。</text>
</svg>
