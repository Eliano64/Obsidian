<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">ALU interface</title>
  <desc id="desc">The arithmetic logic unit as an interface: operands, control signals, carry input, result, carry output, and flags.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    .bg { fill: #f7f8f6; }
    .title { fill: #20242a; font: 700 30px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .text { fill: #303842; font: 18px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .small { fill: #55606b; font: 15px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .box { fill: #ffffff; stroke: #c8d1da; stroke-width: 2; }
    .alu { fill: #eaf3fb; stroke: #2d6f9f; stroke-width: 3; }
    .ctrl { fill: #fff3df; stroke: #bd7a20; stroke-width: 2; }
    .flag { fill: #eff7ed; stroke: #4e8555; stroke-width: 2; }
    .wire { stroke: #56616d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .wire2 { stroke: #bd7a20; stroke-width: 3; fill: none; marker-end: url(#arrow2); }
    .wire3 { stroke: #4e8555; stroke-width: 3; fill: none; marker-end: url(#arrow3); }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #151719; }
      .title { fill: #edf0f2; }
      .text { fill: #d7dde3; }
      .small { fill: #aeb7c0; }
      .box { fill: #20252a; stroke: #3a424b; }
      .alu { fill: #1d3342; stroke: #82bee8; }
      .ctrl { fill: #3a2b18; stroke: #efb463; }
      .flag { fill: #203522; stroke: #94ca8e; }
      .wire { stroke: #b6c0ca; }
      .wire2 { stroke: #efb463; }
      .wire3 { stroke: #94ca8e; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#56616d"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#bd7a20"/>
    </marker>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#4e8555"/>
    </marker>
  </defs>

  <rect class="bg" width="980" height="620"/>
  <text class="title" x="50" y="58">ALU 只按接口理解</text>
  <text class="small" x="50" y="88">不关心内部门电路结构，只关心输入、控制、输出和标志位。</text>

  <rect class="box" x="62" y="160" width="180" height="70" rx="8"/>
  <text class="text" x="96" y="190">操作数 A</text>
  <text class="small" x="112" y="216">n bit</text>

  <rect class="box" x="62" y="300" width="180" height="70" rx="8"/>
  <text class="text" x="96" y="330">操作数 B</text>
  <text class="small" x="112" y="356">n bit</text>

  <rect class="ctrl" x="348" y="108" width="260" height="78" rx="8"/>
  <text class="text" x="388" y="140">操作控制信号</text>
  <text class="small" x="382" y="166">m bit，选择加/减/与/或等功能</text>

  <rect class="ctrl" x="348" y="430" width="260" height="70" rx="8"/>
  <text class="text" x="408" y="460">进位输入 Cin</text>
  <text class="small" x="382" y="486">加减运算时参与控制</text>

  <path class="alu" d="M350 230 L610 230 L560 382 L400 382 Z"/>
  <text class="title" x="445" y="300">ALU</text>
  <text class="small" x="408" y="332">算术逻辑单元</text>

  <rect class="box" x="738" y="202" width="180" height="70" rx="8"/>
  <text class="text" x="774" y="232">结果 F</text>
  <text class="small" x="792" y="258">n bit</text>

  <rect class="box" x="738" y="338" width="180" height="70" rx="8"/>
  <text class="text" x="775" y="368">进位输出</text>
  <text class="small" x="805" y="394">Cout</text>

  <rect class="flag" x="710" y="480" width="230" height="82" rx="8"/>
  <text class="text" x="746" y="512">运算标志</text>
  <text class="small" x="736" y="538">ZF / SF / CF / OF</text>

  <path class="wire" d="M242 195 H348"/>
  <path class="wire" d="M242 335 H348"/>
  <path class="wire2" d="M478 186 V226"/>
  <path class="wire2" d="M478 430 V386"/>
  <path class="wire" d="M602 258 H738"/>
  <path class="wire" d="M578 356 H738"/>
  <path class="wire3" d="M560 382 C620 452 660 506 710 520"/>
</svg>
