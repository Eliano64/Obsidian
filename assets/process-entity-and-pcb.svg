<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" role="img" aria-labelledby="title desc">
  <title id="title">Process entity and PCB</title>
  <desc id="desc">A process entity consists of PCB, program segment, and data segment.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--bg:#fff;--fg:#111827;--muted:#64748b;--line:#94a3b8;--blue:#dbeafe;--green:#dcfce7;--amber:#fef3c7;--red:#fee2e2;--accent:#2563eb}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--fg:#e5e7eb;--muted:#94a3b8;--line:#64748b;--blue:#1e3a8a;--green:#14532d;--amber:#713f12;--red:#7f1d1d;--accent:#60a5fa}}
    .bg{fill:var(--bg)} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:var(--fg)} .h{font-weight:700;font-size:22px}.t{font-size:16px}.small{font-size:14px;fill:var(--muted)}.box{stroke:var(--line);stroke-width:2;rx:10}.arrow{fill:none;stroke:var(--accent);stroke-width:3;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="var(--accent)"/></marker></defs>
  <rect class="bg" width="980" height="440"/>
  <rect class="box" x="45" y="150" width="190" height="96" fill="var(--blue)"/>
  <text class="h" x="140" y="188" text-anchor="middle">可执行文件</text>
  <text class="small" x="140" y="216" text-anchor="middle">磁盘中的静态程序</text>
  <path class="arrow" d="M235 198 L335 198"/>
  <text class="small" x="285" y="178" text-anchor="middle">装入主存</text>
  <rect class="box" x="335" y="52" width="560" height="322" fill="none"/>
  <text class="h" x="615" y="86" text-anchor="middle">进程实体 / 进程映像</text>
  <rect class="box" x="375" y="120" width="150" height="200" fill="var(--red)"/>
  <text class="h" x="450" y="154" text-anchor="middle">PCB</text>
  <text class="t" x="450" y="190" text-anchor="middle">标识</text>
  <text class="t" x="450" y="222" text-anchor="middle">状态 / 队列</text>
  <text class="t" x="450" y="254" text-anchor="middle">资源信息</text>
  <text class="t" x="450" y="286" text-anchor="middle">运行现场</text>
  <rect class="box" x="565" y="120" width="135" height="200" fill="var(--green)"/>
  <text class="h" x="632" y="154" text-anchor="middle">程序段</text>
  <text class="t" x="632" y="202" text-anchor="middle">机器指令</text>
  <rect class="box" x="740" y="120" width="115" height="200" fill="var(--amber)"/>
  <text class="h" x="798" y="154" text-anchor="middle">数据段</text>
  <text class="t" x="798" y="202" text-anchor="middle">变量</text>
  <text class="t" x="798" y="232" text-anchor="middle">运行数据</text>
  <text class="small" x="450" y="352" text-anchor="middle">给操作系统用</text>
  <text class="small" x="714" y="352" text-anchor="middle">给进程自身运行逻辑用</text>
</svg>
