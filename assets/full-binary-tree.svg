<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Full binary tree</title>
  <desc id="desc">A full binary tree of height 4 with level order numbering.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--fg:#111827;--muted:#475569;--line:#334155;--node:#fff;--accent:#2563eb;--fill:#dbeafe}
    @media(prefers-color-scheme:dark){:root{--fg:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--node:#0f172a;--accent:#60a5fa;--fill:#172554}}
    text{fill:var(--fg);font-family:"Segoe UI",Arial,sans-serif}.title{font-size:26px;font-weight:700}.small{font-size:17px;fill:var(--muted)}.node{fill:var(--node);stroke:var(--line);stroke-width:2}.root{fill:var(--fill);stroke:var(--accent);stroke-width:3}.edge{stroke:var(--line);stroke-width:2.2}.num{font-size:18px;font-weight:700;text-anchor:middle}
  </style>
  <text class="title" x="38" y="48">满二叉树：每层都达到最大结点数</text>
  <text class="small" x="38" y="80">高度 h=4，结点数 2^4 - 1 = 15；所有分支结点都有两个孩子。</text>
  <g transform="translate(80 120)">
    <line class="edge" x1="370" y1="30" x2="220" y2="105"/><line class="edge" x1="370" y1="30" x2="520" y2="105"/>
    <line class="edge" x1="220" y1="105" x2="120" y2="185"/><line class="edge" x1="220" y1="105" x2="320" y2="185"/>
    <line class="edge" x1="520" y1="105" x2="420" y2="185"/><line class="edge" x1="520" y1="105" x2="620" y2="185"/>
    <line class="edge" x1="120" y1="185" x2="60" y2="275"/><line class="edge" x1="120" y1="185" x2="180" y2="275"/>
    <line class="edge" x1="320" y1="185" x2="260" y2="275"/><line class="edge" x1="320" y1="185" x2="380" y2="275"/>
    <line class="edge" x1="420" y1="185" x2="460" y2="275"/><line class="edge" x1="420" y1="185" x2="520" y2="275"/>
    <line class="edge" x1="620" y1="185" x2="600" y2="275"/><line class="edge" x1="620" y1="185" x2="700" y2="275"/>
    <circle class="root" cx="370" cy="30" r="25"/><text class="num" x="370" y="37">1</text>
    <circle class="node" cx="220" cy="105" r="23"/><text class="num" x="220" y="112">2</text><circle class="node" cx="520" cy="105" r="23"/><text class="num" x="520" y="112">3</text>
    <circle class="node" cx="120" cy="185" r="22"/><text class="num" x="120" y="192">4</text><circle class="node" cx="320" cy="185" r="22"/><text class="num" x="320" y="192">5</text><circle class="node" cx="420" cy="185" r="22"/><text class="num" x="420" y="192">6</text><circle class="node" cx="620" cy="185" r="22"/><text class="num" x="620" y="192">7</text>
    <circle class="node" cx="60" cy="275" r="21"/><text class="num" x="60" y="282">8</text><circle class="node" cx="180" cy="275" r="21"/><text class="num" x="180" y="282">9</text><circle class="node" cx="260" cy="275" r="21"/><text class="num" x="260" y="282">10</text><circle class="node" cx="380" cy="275" r="21"/><text class="num" x="380" y="282">11</text><circle class="node" cx="460" cy="275" r="21"/><text class="num" x="460" y="282">12</text><circle class="node" cx="520" cy="275" r="21"/><text class="num" x="520" y="282">13</text><circle class="node" cx="600" cy="275" r="21"/><text class="num" x="600" y="282">14</text><circle class="node" cx="700" cy="275" r="21"/><text class="num" x="700" y="282">15</text>
  </g>
</svg>
