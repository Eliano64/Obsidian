<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">协议、服务和接口的关系</title>
  <desc id="desc">协议发生在对等实体之间，服务由下层提供给上层，接口位于同一系统相邻层之间。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#cbd5e1;--blue:#dbeafe;--bl:#2563eb;--green:#dcfce7;--gl:#16a34a;--amber:#fef3c7;--al:#d97706;--arrow:#475569}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#334155;--blue:#1e3a8a;--bl:#60a5fa;--green:#14532d;--gl:#4ade80;--amber:#713f12;--al:#fbbf24;--arrow:#cbd5e1}}
    .bg{fill:var(--bg)}.card{fill:var(--panel);stroke:var(--line);stroke-width:1.5}.box{fill:var(--blue);stroke:var(--bl);stroke-width:2}.low{fill:var(--green);stroke:var(--gl);stroke-width:2}.sap{fill:var(--amber);stroke:var(--al);stroke-width:2}.proto{stroke:var(--bl);stroke-width:3;stroke-dasharray:8 6;fill:none;marker-end:url(#arrow)}.svc{stroke:var(--gl);stroke-width:3;fill:none;marker-end:url(#arrow)}.iface{stroke:var(--al);stroke-width:3;fill:none}
    text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:26px;font-weight:700}.label{font-size:17px;font-weight:700;text-anchor:middle}.small{font-size:14px;fill:var(--muted);text-anchor:middle}.note{font-size:15px;text-anchor:middle}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 Z" fill="var(--arrow)"/></marker></defs>
  <rect class="bg" width="980" height="520"/><rect class="card" x="30" y="28" width="920" height="430" rx="16"/>
  <text class="title" x="60" y="72">协议、服务、接口：三个方向不要混</text>
  <g transform="translate(120,116)">
    <text class="label" x="160" y="0">系统 A</text><rect class="box" x="40" y="30" width="240" height="82" rx="12"/><text class="label" x="160" y="72">第 n 层实体</text><rect class="sap" x="118" y="132" width="84" height="34" rx="8"/><text class="label" x="160" y="154">SAP</text><rect class="low" x="40" y="186" width="240" height="82" rx="12"/><text class="label" x="160" y="228">第 n-1 层实体</text>
  </g>
  <g transform="translate(620,116)">
    <text class="label" x="160" y="0">系统 B</text><rect class="box" x="40" y="30" width="240" height="82" rx="12"/><text class="label" x="160" y="72">第 n 层实体</text><rect class="sap" x="118" y="132" width="84" height="34" rx="8"/><text class="label" x="160" y="154">SAP</text><rect class="low" x="40" y="186" width="240" height="82" rx="12"/><text class="label" x="160" y="228">第 n-1 层实体</text>
  </g>
  <path class="proto" d="M400 188 H660"/><text class="small" x="530" y="174">协议：对等实体之间的通信规则</text>
  <path class="svc" d="M280 302 V252"/><path class="svc" d="M780 302 V252"/>
  <line class="iface" x1="160" y1="282" x2="400" y2="282"/><line class="iface" x1="660" y1="282" x2="900" y2="282"/><text class="small" x="280" y="316">接口在相邻层之间</text><text class="small" x="780" y="316">接口</text>
  <text class="note" x="190" y="406">协议：横向，同层规则</text>
  <text class="note" x="490" y="406">服务：纵向，下层给上层</text>
  <text class="note" x="790" y="406">接口：本机内部，通过 SAP 访问</text>
</svg>
