<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Complete binary tree</title>
  <desc id="desc">A complete binary tree and a counterexample where a right child exists without the left child.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--fg:#111827;--muted:#475569;--line:#334155;--bad:#dc2626;--node:#fff;--accent:#2563eb;--fill:#dbeafe}
    @media(prefers-color-scheme:dark){:root{--fg:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--bad:#f87171;--node:#0f172a;--accent:#60a5fa;--fill:#172554}}
    text{fill:var(--fg);font-family:"Segoe UI",Arial,sans-serif}.title{font-size:25px;font-weight:700}.small{font-size:16px;fill:var(--muted)}.node{fill:var(--node);stroke:var(--line);stroke-width:2}.root{fill:var(--fill);stroke:var(--accent);stroke-width:3}.edge{stroke:var(--line);stroke-width:2.2}.bad{stroke:var(--bad)}.badtext{fill:var(--bad);font-weight:700}.num{font-size:17px;font-weight:700;text-anchor:middle}.label{font-size:20px;font-weight:700}
  </style>
  <text class="title" x="38" y="46">完全二叉树：层序编号必须连续填充</text>
  <text class="small" x="38" y="76">结点与同高度满二叉树的编号 1..n 一一对应；最后一层从左到右连续出现。</text>
  <text class="label" x="80" y="122">是完全二叉树</text>
  <g transform="translate(75 155)">
    <line class="edge" x1="185" y1="20" x2="95" y2="95"/><line class="edge" x1="185" y1="20" x2="275" y2="95"/>
    <line class="edge" x1="95" y1="95" x2="45" y2="170"/><line class="edge" x1="95" y1="95" x2="145" y2="170"/><line class="edge" x1="275" y1="95" x2="225" y2="170"/>
    <circle class="root" cx="185" cy="20" r="24"/><text class="num" x="185" y="26">1</text>
    <circle class="node" cx="95" cy="95" r="22"/><text class="num" x="95" y="101">2</text><circle class="node" cx="275" cy="95" r="22"/><text class="num" x="275" y="101">3</text>
    <circle class="node" cx="45" cy="170" r="21"/><text class="num" x="45" y="176">4</text><circle class="node" cx="145" cy="170" r="21"/><text class="num" x="145" y="176">5</text><circle class="node" cx="225" cy="170" r="21"/><text class="num" x="225" y="176">6</text>
  </g>

  <text class="label" x="530" y="122">不是完全二叉树</text>
  <g transform="translate(520 155)">
    <line class="edge" x1="185" y1="20" x2="95" y2="95"/><line class="edge" x1="185" y1="20" x2="275" y2="95"/>
    <line class="edge" x1="95" y1="95" x2="45" y2="170"/><line class="edge" x1="95" y1="95" x2="145" y2="170"/><line class="edge bad" x1="275" y1="95" x2="325" y2="170"/>
    <circle class="root" cx="185" cy="20" r="24"/><text class="num" x="185" y="26">1</text>
    <circle class="node" cx="95" cy="95" r="22"/><text class="num" x="95" y="101">2</text><circle class="node" cx="275" cy="95" r="22"/><text class="num" x="275" y="101">3</text>
    <circle class="node" cx="45" cy="170" r="21"/><text class="num" x="45" y="176">4</text><circle class="node" cx="145" cy="170" r="21"/><text class="num" x="145" y="176">5</text><circle class="node" cx="325" cy="170" r="21"/><text class="num" x="325" y="176">7</text>
    <text class="badtext" x="215" y="230">缺少 6，却出现 7</text>
  </g>
  <text class="small" x="54" y="482">判断口诀：层序扫描时，一旦出现空位置，后面不能再出现非空结点；若只有一个孩子，只能是左孩子。</text>
</svg>
