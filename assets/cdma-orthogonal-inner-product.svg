<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">CDMA 规格化内积规则</title>
  <desc id="desc">展示 CDMA 正交码片序列的规格化内积计算及 1、0、无本站数据的判定</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--grid:#cbd5e1}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--green:#4ade80;--red:#f87171;--grid:#334155}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.ok{fill:none;stroke:var(--green);stroke-width:3}.bad{fill:none;stroke:var(--red);stroke-width:3}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.head{font-size:20px;font-weight:700}.math{font-size:22px;font-family:Consolas,"Microsoft YaHei",monospace}.small{font-size:15px;fill:var(--muted)}.num{font-size:24px;font-weight:800;fill:var(--blue)}
  </style>
  <rect class="bg" width="980" height="560"/>
  <text x="50" y="56" class="title">用规格化内积分离同频同时间信号</text>
  <text x="50" y="84" class="small">把码片向量看作由 +1 和 -1 组成的向量。长度为 m 时，规格化内积要除以 m。</text>
  <rect x="70" y="120" width="840" height="92" rx="10" class="panel"/>
  <text x="105" y="158" class="head">规格化内积</text>
  <text x="330" y="162" class="math">S·R / m = (s₁r₁ + s₂r₂ + ... + sₘrₘ) / m</text>
  <text x="105" y="190" class="small">S 是本站码片向量，R 是接收到的叠加向量或某个站点向量。</text>
  <rect x="70" y="248" width="255" height="210" rx="10" class="panel"/>
  <text x="198" y="290" text-anchor="middle" class="head">S 与 S</text>
  <text x="198" y="340" text-anchor="middle" class="math">S·S / m = 1</text>
  <text x="198" y="382" text-anchor="middle" class="num">收到 1</text>
  <text x="198" y="420" text-anchor="middle" class="small">本站信号同方向出现</text>
  <rect x="362" y="248" width="255" height="210" rx="10" class="panel"/>
  <text x="490" y="290" text-anchor="middle" class="head">S 与 -S</text>
  <text x="490" y="340" text-anchor="middle" class="math">S·(-S) / m = -1</text>
  <text x="490" y="382" text-anchor="middle" class="num">收到 0</text>
  <text x="490" y="420" text-anchor="middle" class="small">本站信号反方向出现</text>
  <rect x="655" y="248" width="255" height="210" rx="10" class="panel"/>
  <text x="782" y="290" text-anchor="middle" class="head">S 与 B</text>
  <text x="782" y="340" text-anchor="middle" class="math">S·B / m = 0</text>
  <text x="782" y="382" text-anchor="middle" class="num">无本站数据</text>
  <text x="782" y="420" text-anchor="middle" class="small">其他站点码片与本站正交</text>
</svg>
