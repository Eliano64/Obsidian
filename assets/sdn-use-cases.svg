<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">SDN use cases</title>
  <desc id="desc">SDN flow tables can implement forwarding, load balancing and firewall behavior by changing match and action rules.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .card { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
    .rule { fill: #fff; stroke: #475569; stroke-width: 1.6; rx: 6; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; }
    .tiny { font-size: 13px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .card { fill: #111827; stroke: #94a3b8; }
      .rule { fill: #0b1220; stroke: #cbd5e1; }
    }
  </style>
  <text x="480" y="38" text-anchor="middle" class="label">SDN 广义转发的典型用法</text>
  <rect x="55" y="75" width="260" height="230" class="card"/>
  <text x="185" y="112" text-anchor="middle" class="label">简单转发</text>
  <rect x="85" y="140" width="200" height="52" class="rule"/>
  <text x="185" y="162" text-anchor="middle" class="tiny">匹配：目的 IP 前缀</text>
  <text x="185" y="183" text-anchor="middle" class="tiny">动作：转发到端口 3</text>
  <text x="185" y="240" text-anchor="middle" class="small">类似传统路由转发</text>
  <text x="185" y="265" text-anchor="middle" class="small">但规则由控制器安装</text>
  <rect x="350" y="75" width="260" height="230" class="card"/>
  <text x="480" y="112" text-anchor="middle" class="label">负载均衡</text>
  <rect x="380" y="140" width="200" height="52" class="rule"/>
  <text x="480" y="162" text-anchor="middle" class="tiny">匹配：源/目的/入端口</text>
  <text x="480" y="183" text-anchor="middle" class="tiny">动作：分配到不同端口</text>
  <text x="480" y="240" text-anchor="middle" class="small">不只看目的网络</text>
  <text x="480" y="265" text-anchor="middle" class="small">可按流灵活分流</text>
  <rect x="645" y="75" width="260" height="230" class="card"/>
  <text x="775" y="112" text-anchor="middle" class="label">防火墙</text>
  <rect x="675" y="140" width="200" height="52" class="rule"/>
  <text x="775" y="162" text-anchor="middle" class="tiny">匹配：入端口/地址/端口号</text>
  <text x="775" y="183" text-anchor="middle" class="tiny">动作：允许或丢弃</text>
  <text x="775" y="240" text-anchor="middle" class="small">安全策略写成流表规则</text>
  <text x="775" y="265" text-anchor="middle" class="small">数据层设备直接执行</text>
</svg>
