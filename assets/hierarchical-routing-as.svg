<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">Hierarchical routing with autonomous systems</title>
  <desc id="desc">Autonomous systems use internal routing protocols inside each AS and external routing protocol between ASes.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    svg { background: transparent; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 14; }
    .as1 { fill: #eef6ff; stroke: #2563eb; }
    .as2 { fill: #f7f2ff; stroke: #7c3aed; }
    .as3 { fill: #effaf3; stroke: #16a34a; }
    .router { fill: #ffffff; stroke: #475569; stroke-width: 2; }
    .edge { stroke: #475569; stroke-width: 2.4; fill: none; }
    .egp { stroke: #dc2626; stroke-width: 3; fill: none; stroke-dasharray: 9 7; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; }
    .tag { font-size: 16px; font-weight: 700; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .box { fill: #111827; stroke: #94a3b8; }
      .as1 { fill: #0f223c; stroke: #60a5fa; }
      .as2 { fill: #24143f; stroke: #a78bfa; }
      .as3 { fill: #0f2b1d; stroke: #4ade80; }
      .router { fill: #0b1220; stroke: #cbd5e1; }
      .edge { stroke: #cbd5e1; }
      .egp { stroke: #f87171; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>
  <text x="490" y="40" text-anchor="middle" class="label">因特网采用分层次的路由选择</text>
  <rect x="45" y="80" width="270" height="280" class="box as1"/>
  <rect x="355" y="80" width="270" height="280" class="box as2"/>
  <rect x="665" y="80" width="270" height="280" class="box as3"/>
  <text x="180" y="115" text-anchor="middle" class="tag">AS1</text>
  <text x="490" y="115" text-anchor="middle" class="tag">AS2</text>
  <text x="800" y="115" text-anchor="middle" class="tag">AS3</text>
  <text x="180" y="337" text-anchor="middle" class="small">域内路由：IGP，如 RIP</text>
  <text x="490" y="337" text-anchor="middle" class="small">域内路由：IGP，如 OSPF</text>
  <text x="800" y="337" text-anchor="middle" class="small">域内路由：IGP，自主选择</text>
  <circle cx="120" cy="170" r="27" class="router"/><text x="120" y="176" text-anchor="middle" class="small">R1</text>
  <circle cx="240" cy="170" r="27" class="router"/><text x="240" y="176" text-anchor="middle" class="small">R2</text>
  <circle cx="180" cy="260" r="27" class="router"/><text x="180" y="266" text-anchor="middle" class="small">R3</text>
  <path d="M147 170 H213 M134 192 L166 238 M226 192 L194 238" class="edge"/>
  <circle cx="430" cy="170" r="27" class="router"/><text x="430" y="176" text-anchor="middle" class="small">R4</text>
  <circle cx="550" cy="170" r="27" class="router"/><text x="550" y="176" text-anchor="middle" class="small">R5</text>
  <circle cx="490" cy="260" r="27" class="router"/><text x="490" y="266" text-anchor="middle" class="small">R6</text>
  <path d="M457 170 H523 M444 192 L476 238 M536 192 L504 238" class="edge"/>
  <circle cx="740" cy="170" r="27" class="router"/><text x="740" y="176" text-anchor="middle" class="small">R7</text>
  <circle cx="860" cy="170" r="27" class="router"/><text x="860" y="176" text-anchor="middle" class="small">R8</text>
  <circle cx="800" cy="260" r="27" class="router"/><text x="800" y="266" text-anchor="middle" class="small">R9</text>
  <path d="M767 170 H833 M754 192 L786 238 M846 192 L814 238" class="edge"/>
  <path d="M267 170 C310 140, 353 140, 403 170" class="egp"/>
  <path d="M577 170 C620 140, 663 140, 713 170" class="egp"/>
  <text x="335" y="135" text-anchor="middle" class="small">域间路由：EGP/BGP</text>
  <text x="645" y="135" text-anchor="middle" class="small">域间路由：EGP/BGP</text>
  <rect x="170" y="395" width="640" height="45" class="box"/>
  <text x="490" y="423" text-anchor="middle" class="small">AS 内部可各自选择 IGP；AS 之间用 BGP 交换可达性和策略信息</text>
</svg>
