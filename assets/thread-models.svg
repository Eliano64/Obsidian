<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Thread mapping models</title>
  <desc id="desc">Many-to-one, one-to-one, and many-to-many mappings between user-level and kernel-level threads.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; --bg:#fff; --fg:#111827; --muted:#64748b; --line:#94a3b8; --blue:#dbeafe; --green:#dcfce7; --amber:#fef3c7; --accent:#2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg:#0f172a; --fg:#e5e7eb; --muted:#94a3b8; --line:#64748b; --blue:#1e3a8a; --green:#14532d; --amber:#713f12; --accent:#60a5fa; } }
    .bg{fill:var(--bg)} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:var(--fg)} .h{font-weight:700;font-size:21px}.t{font-size:15px}.small{font-size:13px;fill:var(--muted)}.box{stroke:var(--line);stroke-width:2;rx:10}.link{fill:none;stroke:var(--accent);stroke-width:2.4}
  </style>
  <rect class="bg" width="980" height="430"/>
  <g transform="translate(35 45)">
    <rect class="box" width="285" height="310" fill="var(--blue)"/><text class="h" x="142" y="38" text-anchor="middle">多对一</text>
    <text class="small" x="142" y="70" text-anchor="middle">多个 ULT 映射到一个 KLT</text>
    <circle cx="75" cy="120" r="21" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/><text class="t" x="75" y="125" text-anchor="middle">U</text>
    <circle cx="142" cy="120" r="21" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/><text class="t" x="142" y="125" text-anchor="middle">U</text>
    <circle cx="209" cy="120" r="21" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/><text class="t" x="209" y="125" text-anchor="middle">U</text>
    <circle cx="142" cy="225" r="24" fill="var(--green)" stroke="var(--line)" stroke-width="2"/><text class="t" x="142" y="230" text-anchor="middle">K</text>
    <path class="link" d="M75 141 L142 201"/><path class="link" d="M142 141 L142 201"/><path class="link" d="M209 141 L142 201"/>
    <text class="small" x="142" y="285" text-anchor="middle">开销小，但并发度受限</text>
  </g>
  <g transform="translate(348 45)">
    <rect class="box" width="285" height="310" fill="var(--amber)"/><text class="h" x="142" y="38" text-anchor="middle">一对一</text>
    <text class="small" x="142" y="70" text-anchor="middle">每个 ULT 映射到一个 KLT</text>
    <circle cx="75" cy="120" r="21" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/><text class="t" x="75" y="125" text-anchor="middle">U</text>
    <circle cx="142" cy="120" r="21" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/><text class="t" x="142" y="125" text-anchor="middle">U</text>
    <circle cx="209" cy="120" r="21" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/><text class="t" x="209" y="125" text-anchor="middle">U</text>
    <circle cx="75" cy="225" r="24" fill="var(--green)" stroke="var(--line)" stroke-width="2"/><text class="t" x="75" y="230" text-anchor="middle">K</text>
    <circle cx="142" cy="225" r="24" fill="var(--green)" stroke="var(--line)" stroke-width="2"/><text class="t" x="142" y="230" text-anchor="middle">K</text>
    <circle cx="209" cy="225" r="24" fill="var(--green)" stroke="var(--line)" stroke-width="2"/><text class="t" x="209" y="230" text-anchor="middle">K</text>
    <path class="link" d="M75 141 L75 201"/><path class="link" d="M142 141 L142 201"/><path class="link" d="M209 141 L209 201"/>
    <text class="small" x="142" y="285" text-anchor="middle">并发强，但内核开销大</text>
  </g>
  <g transform="translate(661 45)">
    <rect class="box" width="285" height="310" fill="var(--green)"/><text class="h" x="142" y="38" text-anchor="middle">多对多</text>
    <text class="small" x="142" y="70" text-anchor="middle">n 个 ULT 映射到 m 个 KLT</text>
    <circle cx="65" cy="120" r="21" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/><text class="t" x="65" y="125" text-anchor="middle">U</text>
    <circle cx="120" cy="120" r="21" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/><text class="t" x="120" y="125" text-anchor="middle">U</text>
    <circle cx="175" cy="120" r="21" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/><text class="t" x="175" y="125" text-anchor="middle">U</text>
    <circle cx="230" cy="120" r="21" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/><text class="t" x="230" y="125" text-anchor="middle">U</text>
    <circle cx="105" cy="225" r="24" fill="var(--amber)" stroke="var(--line)" stroke-width="2"/><text class="t" x="105" y="230" text-anchor="middle">K</text>
    <circle cx="185" cy="225" r="24" fill="var(--amber)" stroke="var(--line)" stroke-width="2"/><text class="t" x="185" y="230" text-anchor="middle">K</text>
    <path class="link" d="M65 141 L105 201"/><path class="link" d="M120 141 L105 201"/><path class="link" d="M175 141 L185 201"/><path class="link" d="M230 141 L185 201"/>
    <text class="small" x="142" y="285" text-anchor="middle">折中并发能力和管理开销</text>
  </g>
  <text class="small" x="490" y="395" text-anchor="middle">U 表示用户级线程，K 表示内核级线程；内核能调度的是 K。</text>
</svg>
