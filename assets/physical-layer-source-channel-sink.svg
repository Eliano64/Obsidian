<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">信源 信道 信宿</title>
  <desc id="desc">展示信源、信道、信宿和噪声的关系</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--panel2:#eef6ff;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--blue-bg:#dbeafe;--green:#16a34a;--green-bg:#dcfce7;--amber:#d97706;--amber-bg:#fef3c7;--red:#dc2626;--red-bg:#fee2e2}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--panel2:#172554;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--blue-bg:#1e3a8a;--green:#4ade80;--green-bg:#14532d;--amber:#fbbf24;--amber-bg:#713f12;--red:#f87171;--red-bg:#7f1d1d}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2.2}.source{fill:var(--blue-bg);stroke:var(--blue)}.sink{fill:var(--green-bg);stroke:var(--green)}.noise{fill:var(--red-bg);stroke:var(--red)}.channel{fill:var(--panel2);stroke:var(--line);stroke-width:2.4}.arrow{fill:none;stroke:var(--line);stroke-width:2.6;marker-end:url(#arrow)}.wave{fill:none;stroke:var(--blue);stroke-width:3}.noiseLine{stroke:var(--red);stroke-width:2.6;stroke-dasharray:8 8;marker-end:url(#redArrow)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:22px;font-weight:700}.small{font-size:16px;fill:var(--muted)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--red)"/></marker>
  </defs>
  <rect class="bg" width="980" height="420"/>
  <text x="50" y="58" class="title">通信系统的基本关系</text>
  <rect x="70" y="155" width="155" height="95" rx="8" class="box source"/>
  <text x="147" y="198" text-anchor="middle" class="label">信源</text>
  <text x="147" y="226" text-anchor="middle" class="small">产生消息/数据</text>
  <rect x="340" y="135" width="300" height="135" rx="12" class="channel"/>
  <text x="490" y="168" text-anchor="middle" class="label">信道</text>
  <path d="M385 215 C405 185 435 185 455 215 S505 245 525 215 S575 185 595 215" class="wave"/>
  <text x="490" y="250" text-anchor="middle" class="small">信号传播的通路</text>
  <rect x="755" y="155" width="155" height="95" rx="8" class="box sink"/>
  <text x="832" y="198" text-anchor="middle" class="label">信宿</text>
  <text x="832" y="226" text-anchor="middle" class="small">接收消息/数据</text>
  <path d="M230 202 H330" class="arrow"/>
  <path d="M650 202 H745" class="arrow"/>
  <rect x="405" y="320" width="170" height="58" rx="8" class="noise"/>
  <text x="490" y="356" text-anchor="middle" class="label">噪声/干扰</text>
  <path d="M490 320 V278" class="noiseLine"/>
  <text x="50" y="340" class="small">物理层关心的是：比特如何变成信号，信号如何通过信道，再被还原为比特。</text>
</svg>
