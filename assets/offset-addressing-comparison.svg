<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Offset addressing comparison</title>
  <desc id="desc">Base, indexed and relative addressing all use base plus offset but differ in the source of the base value.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--text:#111827;--muted:#4b5563;--line:#111827;--reg:#dbeafe;--a:#dcfce7;--ea:#fee2e2;--pc:#fef3c7;--panel:#f8fafc}
    @media(prefers-color-scheme:dark){:root{--bg:#111827;--text:#e5e7eb;--muted:#cbd5e1;--line:#e5e7eb;--reg:#1e3a8a;--a:#14532d;--ea:#7f1d1d;--pc:#713f12;--panel:#1f2937}}
    .bg{fill:var(--bg)}.text{fill:var(--text);font-family:"Segoe UI",Arial,sans-serif}.muted{fill:var(--muted);font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:var(--panel);stroke:var(--line);stroke-width:1.4;rx:10}.box{stroke:var(--line);stroke-width:1.6;rx:6}.reg{fill:var(--reg)}.a{fill:var(--a)}.ea{fill:var(--ea)}.pc{fill:var(--pc)}
    .plus{fill:var(--text);font-family:"Segoe UI",Arial,sans-serif;font-size:28px;font-weight:700}
    .line{stroke:var(--line);stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="text" x="42" y="44" font-size="28" font-weight="700">偏移寻址：同样是相加，含义不同</text>
  <text class="muted" x="42" y="76" font-size="18">基址、变址、相对寻址都形如“基准值 + A”，区别在于基准值是谁、A 表示什么。</text>

  <g transform="translate(55,125)">
    <rect class="panel" width="315" height="360"/>
    <text class="text" x="158" y="38" font-size="23" font-weight="700" text-anchor="middle">基址寻址</text>
    <rect class="box reg" x="35" y="80" width="95" height="54"/><text class="text" x="82" y="113" font-size="18" text-anchor="middle">BR</text>
    <text class="plus" x="147" y="116">+</text>
    <rect class="box a" x="190" y="80" width="90" height="54"/><text class="text" x="235" y="113" font-size="18" text-anchor="middle">A</text>
    <path class="line" d="M158 140 V185"/>
    <rect class="box ea" x="80" y="190" width="155" height="54"/><text class="text" x="158" y="223" font-size="18" text-anchor="middle">EA=(BR)+A</text>
    <text class="muted" x="158" y="285" font-size="17" text-anchor="middle">BR：程序装入起点</text>
    <text class="muted" x="158" y="315" font-size="17" text-anchor="middle">A：指令中的偏移</text>
    <text class="text" x="158" y="348" font-size="18" font-weight="700" text-anchor="middle">用于程序重定位</text>
  </g>

  <g transform="translate(402,125)">
    <rect class="panel" width="315" height="360"/>
    <text class="text" x="158" y="38" font-size="23" font-weight="700" text-anchor="middle">变址寻址</text>
    <rect class="box reg" x="35" y="80" width="95" height="54"/><text class="text" x="82" y="113" font-size="18" text-anchor="middle">IX</text>
    <text class="plus" x="147" y="116">+</text>
    <rect class="box a" x="190" y="80" width="90" height="54"/><text class="text" x="235" y="113" font-size="18" text-anchor="middle">A</text>
    <path class="line" d="M158 140 V185"/>
    <rect class="box ea" x="80" y="190" width="155" height="54"/><text class="text" x="158" y="223" font-size="18" text-anchor="middle">EA=(IX)+A</text>
    <text class="muted" x="158" y="285" font-size="17" text-anchor="middle">A：数组首地址</text>
    <text class="muted" x="158" y="315" font-size="17" text-anchor="middle">IX：变化的下标</text>
    <text class="text" x="158" y="348" font-size="18" font-weight="700" text-anchor="middle">用于数组和循环</text>
  </g>

  <g transform="translate(749,125)">
    <rect class="panel" width="315" height="360"/>
    <text class="text" x="158" y="38" font-size="23" font-weight="700" text-anchor="middle">相对寻址</text>
    <rect class="box pc" x="35" y="80" width="95" height="54"/><text class="text" x="82" y="113" font-size="18" text-anchor="middle">PC</text>
    <text class="plus" x="147" y="116">+</text>
    <rect class="box a" x="190" y="80" width="90" height="54"/><text class="text" x="235" y="113" font-size="18" text-anchor="middle">A</text>
    <path class="line" d="M158 140 V185"/>
    <rect class="box ea" x="80" y="190" width="155" height="54"/><text class="text" x="158" y="223" font-size="18" text-anchor="middle">EA=(PC)+A</text>
    <text class="muted" x="158" y="285" font-size="17" text-anchor="middle">PC：下一条指令地址</text>
    <text class="muted" x="158" y="315" font-size="17" text-anchor="middle">A：相对位移</text>
    <text class="text" x="158" y="348" font-size="18" font-weight="700" text-anchor="middle">用于转移指令</text>
  </g>

  <text class="muted" x="560" y="560" font-size="18" text-anchor="middle">记忆方式：基址寻址让“程序位置”变；变址寻址让“下标”变；相对寻址让“转移目标随 PC 变”。</text>
</svg>
