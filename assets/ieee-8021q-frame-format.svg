<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="IEEE 802.1Q帧格式图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.field{fill:#fff;stroke:#7d8aa0;stroke-width:2}.tag{fill:#fff7e8;stroke:#bf7a18;stroke-width:2.5}.title{font-size:28px;font-weight:700}.label{font-size:16px;font-weight:700}.small{font-size:14px}.muted{fill:#5d6b7e}
    @media(prefers-color-scheme:dark){text{fill:#e7edf7}.muted{fill:#b6c2d2}.field{fill:#111827;stroke:#718096}.tag{fill:#2b2111;stroke:#e4a548}}
  </style>
  <text x="480" y="42" text-anchor="middle" class="title">802.1Q：在源 MAC 和类型字段之间插入 4 B 标签</text>
  <g transform="translate(50 110)">
    <rect x="0" y="0" width="130" height="80" class="field"/><text x="65" y="36" text-anchor="middle" class="label">目的 MAC</text><text x="65" y="61" text-anchor="middle" class="small">6 B</text>
    <rect x="130" y="0" width="130" height="80" class="field"/><text x="195" y="36" text-anchor="middle" class="label">源 MAC</text><text x="195" y="61" text-anchor="middle" class="small">6 B</text>
    <rect x="260" y="0" width="210" height="80" class="tag"/><text x="365" y="32" text-anchor="middle" class="label">802.1Q Tag</text><text x="365" y="58" text-anchor="middle" class="small">4 B</text>
    <rect x="470" y="0" width="110" height="80" class="field"/><text x="525" y="36" text-anchor="middle" class="label">类型</text><text x="525" y="61" text-anchor="middle" class="small">2 B</text>
    <rect x="580" y="0" width="180" height="80" class="field"/><text x="670" y="36" text-anchor="middle" class="label">数据</text><text x="670" y="61" text-anchor="middle" class="small">46-1500 B</text>
    <rect x="760" y="0" width="100" height="80" class="field"/><text x="810" y="36" text-anchor="middle" class="label">FCS</text><text x="810" y="61" text-anchor="middle" class="small">4 B</text>
  </g>
  <g transform="translate(230 245)">
    <rect x="0" y="0" width="160" height="70" class="tag"/><text x="80" y="30" text-anchor="middle" class="label">TPID</text><text x="80" y="54" text-anchor="middle" class="small">0x8100</text>
    <rect x="160" y="0" width="90" height="70" class="tag"/><text x="205" y="42" text-anchor="middle" class="label">PCP</text>
    <rect x="250" y="0" width="80" height="70" class="tag"/><text x="290" y="42" text-anchor="middle" class="label">DEI</text>
    <rect x="330" y="0" width="190" height="70" class="tag"/><text x="425" y="30" text-anchor="middle" class="label">VID</text><text x="425" y="54" text-anchor="middle" class="small">12 bit，VLAN 编号</text>
  </g>
  <text x="480" y="370" text-anchor="middle" class="small muted">TPID 标明这是带标签帧；VID 标明帧属于哪个 VLAN。</text>
</svg>
