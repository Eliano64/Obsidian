<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="600" viewBox="0 0 1080 600" role="img" aria-labelledby="title desc">
  <title id="title">DRAM address multiplexing</title><desc id="desc">DRAM sends row and column addresses in two phases to reduce address pins and support matrix decoding.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z"/></marker><style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}
.bg{fill:#fbfcff}.title{font:700 26px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.h{font:700 17px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.t{font:400 13px "Microsoft YaHei",Arial,sans-serif;fill:#40506a}.box{fill:#fff;stroke:#9aa9bd;stroke-width:1.6;rx:8}.row{fill:#eef6ff;stroke:#5f92d6}.col{fill:#effaf3;stroke:#62a87c}.cell{fill:#fff7e8;stroke:#d49a3a;stroke-width:1.2}.line{stroke:#27354f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}#arrow path{fill:#27354f}@media(prefers-color-scheme:dark){.bg{fill:#111827}.title,.h{fill:#f3f4f6}.t{fill:#cbd5e1}.box{fill:#1f2937;stroke:#64748b}.row{fill:#172554;stroke:#60a5fa}.col{fill:#143525;stroke:#4ade80}.cell{fill:#3b2a12;stroke:#f59e0b}.line{stroke:#d1d5db}#arrow path{fill:#d1d5db}}</style></defs>
  <rect class="bg" width="1080" height="600"/><text class="title" x="48" y="54">DRAM 地址复用：行地址、列地址分两次送</text>
  <rect class="box" x="70" y="170" width="180" height="110"/><text class="h" x="160" y="210" text-anchor="middle">地址引脚</text><text class="t" x="160" y="240" text-anchor="middle">同一组引脚复用</text>
  <rect class="box row" x="340" y="110" width="160" height="75"/><text class="h" x="420" y="142" text-anchor="middle">行地址缓冲</text><text class="t" x="420" y="166" text-anchor="middle">RAS 有效</text>
  <rect class="box col" x="340" y="255" width="160" height="75"/><text class="h" x="420" y="287" text-anchor="middle">列地址缓冲</text><text class="t" x="420" y="311" text-anchor="middle">CAS 有效</text>
  <path class="line" d="M250 205 C290 150 305 145 334 145"/><path class="line" d="M250 240 C290 295 305 295 334 295"/>
  <rect class="box" x="610" y="105" width="105" height="360"/><text class="h" x="662" y="145" text-anchor="middle">行译码</text><text class="h" x="662" y="300" text-anchor="middle">选中一行</text>
  <rect class="box" x="760" y="465" width="230" height="70"/><text class="h" x="875" y="507" text-anchor="middle">列译码：选中列</text>
  <g transform="translate(760 105)"><rect class="cell" x="0" y="0" width="55" height="45"/><rect class="cell" x="60" y="0" width="55" height="45"/><rect class="cell" x="120" y="0" width="55" height="45"/><rect class="cell" x="180" y="0" width="55" height="45"/><rect class="cell" x="0" y="55" width="55" height="45"/><rect class="cell" x="60" y="55" width="55" height="45"/><rect class="cell" x="120" y="55" width="55" height="45"/><rect class="cell" x="180" y="55" width="55" height="45"/><rect class="cell" x="0" y="110" width="55" height="45"/><rect class="cell" x="60" y="110" width="55" height="45"/><rect class="cell" x="120" y="110" width="55" height="45"/><rect class="cell" x="180" y="110" width="55" height="45"/><rect class="cell" x="0" y="165" width="55" height="45"/><rect class="cell" x="60" y="165" width="55" height="45"/><rect class="cell" x="120" y="165" width="55" height="45"/><rect class="cell" x="180" y="165" width="55" height="45"/></g>
  <path class="line" d="M500 145 L604 145"/><path class="line" d="M500 295 C620 470 680 500 754 500"/><text class="t" x="540" y="410">少引脚；适合二维阵列译码</text>
</svg>
