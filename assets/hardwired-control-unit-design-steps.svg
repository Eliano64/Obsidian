<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">硬布线控制器设计步骤</title>
  <desc id="desc">硬布线控制器从微操作序列分析到选择控制方式、安排时序、设计组合逻辑电路。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    .bg { fill: #ffffff; }
    .step { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
    .num { fill: #2563eb; font: 700 24px Arial, sans-serif; }
    .text { fill: #0f172a; font: 23px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    .small { fill: #475569; font: 17px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    .wire { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .arrowhead { fill: #64748b; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f172a; }
      .step { fill: #111827; stroke: #94a3b8; }
      .num { fill: #93c5fd; }
      .text { fill: #e5e7eb; }
      .small { fill: #cbd5e1; }
      .wire { stroke: #cbd5e1; }
      .arrowhead { fill: #cbd5e1; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path class="arrowhead" d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="360"/>
  <rect class="step" x="45" y="100" width="230" height="150"/>
  <text class="num" x="70" y="135">1</text>
  <text class="text" x="160" y="145" text-anchor="middle">分析微操作序列</text>
  <text class="small" x="160" y="185" text-anchor="middle">取指 / 间址 / 执行 / 中断</text>
  <text class="small" x="160" y="215" text-anchor="middle">分别需要哪些动作</text>
  <rect class="step" x="315" y="100" width="230" height="150"/>
  <text class="num" x="340" y="135">2</text>
  <text class="text" x="430" y="145" text-anchor="middle">选择控制方式</text>
  <text class="small" x="430" y="185" text-anchor="middle">定长 / 不定长机器周期</text>
  <text class="small" x="430" y="215" text-anchor="middle">每周期几个节拍</text>
  <rect class="step" x="585" y="100" width="230" height="150"/>
  <text class="num" x="610" y="135">3</text>
  <text class="text" x="700" y="145" text-anchor="middle">安排微操作时序</text>
  <text class="small" x="700" y="185" text-anchor="middle">把动作放入 T0/T1/T2</text>
  <text class="small" x="700" y="215" text-anchor="middle">检查依赖与冲突</text>
  <rect class="step" x="855" y="100" width="230" height="150"/>
  <text class="num" x="880" y="135">4</text>
  <text class="text" x="970" y="145" text-anchor="middle">组合逻辑设计</text>
  <text class="small" x="970" y="185" text-anchor="middle">操作时间表</text>
  <text class="small" x="970" y="215" text-anchor="middle">表达式与逻辑图</text>
  <path class="wire" d="M275 175 L315 175"/>
  <path class="wire" d="M545 175 L585 175"/>
  <path class="wire" d="M815 175 L855 175"/>
</svg>
