<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">网络、互联网、因特网关系</title>
  <desc id="desc">展示网络、互联网和因特网从小到大的关系</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--line:#334155;--text:#172033;--muted:#64748b;--blue:#dbeafe;--blue-line:#2563eb;--green:#dcfce7;--green-line:#16a34a;--amber:#fef3c7;--amber-line:#d97706}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--line:#94a3b8;--text:#e5e7eb;--muted:#94a3b8;--blue:#1e3a8a;--blue-line:#60a5fa;--green:#14532d;--green-line:#4ade80;--amber:#713f12;--amber-line:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.network{fill:var(--blue);stroke:var(--blue-line);stroke-width:2.5}.internet{fill:var(--green);stroke:var(--green-line);stroke-width:3}.global{fill:none;stroke:var(--amber-line);stroke-width:4;stroke-dasharray:10 8}.arrow{fill:none;stroke:var(--line);stroke-width:2.4;marker-end:url(#arrow)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:20px;font-weight:700}.small{font-size:16px;fill:var(--muted)}.tiny{font-size:14px;fill:var(--muted)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="520"/>
  <text x="50" y="58" class="title">网络、互联网、因特网</text>
  <rect x="70" y="120" width="220" height="150" rx="18" class="network"/>
  <text x="180" y="158" text-anchor="middle" class="label">网络</text>
  <circle cx="125" cy="215" r="18" class="box"/><circle cx="235" cy="215" r="18" class="box"/>
  <path d="M143 215 H217" class="arrow"/>
  <text x="180" y="252" text-anchor="middle" class="small">结点 + 链路</text>
  <rect x="380" y="100" width="250" height="190" rx="22" class="internet"/>
  <text x="505" y="138" text-anchor="middle" class="label">互联网</text>
  <rect x="415" y="170" width="68" height="50" rx="10" class="network"/><text x="449" y="200" text-anchor="middle" class="tiny">网络A</text>
  <rect x="530" y="170" width="68" height="50" rx="10" class="network"/><text x="564" y="200" text-anchor="middle" class="tiny">网络B</text>
  <circle cx="506" cy="245" r="18" class="box"/><text x="506" y="251" text-anchor="middle" class="tiny">R</text>
  <path d="M483 195 C500 200 500 222 506 227" class="arrow"/><path d="M530 195 C515 204 512 222 506 227" class="arrow"/>
  <text x="505" y="276" text-anchor="middle" class="small">多个网络通过路由器互连</text>
  <ellipse cx="770" cy="205" rx="140" ry="110" class="global"/>
  <text x="770" y="150" text-anchor="middle" class="label">因特网</text>
  <text x="770" y="190" text-anchor="middle" class="small">全球最大的互联网</text>
  <text x="770" y="222" text-anchor="middle" class="small">Internet</text>
  <path d="M290 195 H380" class="arrow"/><path d="M630 195 H675" class="arrow"/>
  <text x="335" y="175" text-anchor="middle" class="tiny">互连多个网络</text>
  <text x="653" y="175" text-anchor="middle" class="tiny">特指全球网络</text>
  <text x="80" y="430" class="small">若干结点和链路形成网络；若干网络互连形成互联网；因特网是一个具体的、全球性的互联网。</text>
</svg>
