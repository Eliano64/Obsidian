<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" role="img" aria-labelledby="title desc">
  <title id="title">Binary search tree concept</title>
  <desc id="desc">A binary search tree with left subtree values less than root and right subtree values greater than root.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--fg:#111827;--muted:#475569;--line:#334155;--node:#fff;--accent:#2563eb;--fill:#dbeafe;--left:#16a34a;--right:#dc2626}
    @media(prefers-color-scheme:dark){:root{--fg:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--node:#0f172a;--accent:#60a5fa;--fill:#172554;--left:#86efac;--right:#fca5a5}}
    text{fill:var(--fg);font-family:"Segoe UI",Arial,sans-serif}.title{font-size:25px;font-weight:700}.small{font-size:16px;fill:var(--muted)}.node{fill:var(--node);stroke:var(--line);stroke-width:2}.root{fill:var(--fill);stroke:var(--accent);stroke-width:3}.edge{stroke:var(--line);stroke-width:2.2}.num{font-size:18px;font-weight:700;text-anchor:middle}.left{fill:var(--left);font-weight:700}.right{fill:var(--right);font-weight:700}
  </style>
  <text class="title" x="38" y="48">二叉排序树：左小，根中，右大</text>
  <text class="small" x="38" y="78">这个性质必须递归成立：左子树和右子树也分别是二叉排序树。</text>
  <g transform="translate(90 115)">
    <line class="edge" x1="330" y1="35" x2="190" y2="115"/><line class="edge" x1="330" y1="35" x2="480" y2="115"/>
    <line class="edge" x1="190" y1="115" x2="105" y2="200"/><line class="edge" x1="190" y1="115" x2="280" y2="200"/>
    <line class="edge" x1="480" y1="115" x2="410" y2="200"/><line class="edge" x1="480" y1="115" x2="570" y2="200"/>
    <line class="edge" x1="570" y1="200" x2="535" y2="285"/>
    <circle class="root" cx="330" cy="35" r="28"/><text class="num" x="330" y="42">50</text>
    <circle class="node" cx="190" cy="115" r="25"/><text class="num" x="190" y="122">26</text>
    <circle class="node" cx="480" cy="115" r="25"/><text class="num" x="480" y="122">66</text>
    <circle class="node" cx="105" cy="200" r="24"/><text class="num" x="105" y="207">21</text>
    <circle class="node" cx="280" cy="200" r="24"/><text class="num" x="280" y="207">30</text>
    <circle class="node" cx="410" cy="200" r="24"/><text class="num" x="410" y="207">60</text>
    <circle class="node" cx="570" cy="200" r="24"/><text class="num" x="570" y="207">70</text>
    <circle class="node" cx="535" cy="285" r="23"/><text class="num" x="535" y="292">68</text>
  </g>
  <text class="left" x="105" y="438">左子树所有关键字 &lt; 根关键字</text>
  <text class="right" x="485" y="438">右子树所有关键字 &gt; 根关键字</text>
</svg>
