<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" role="img" aria-labelledby="title desc">
  <title id="title">Queue FIFO Structure</title>
  <desc id="desc">A queue inserts at rear and deletes at front.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { --ink: #17212b; --muted: #5b6876; --line: #334e68; --accent: #0f766e; --cell: #eef6ff; --head: #fff7e6; }
    @media (prefers-color-scheme: dark) {
      :root { --ink: #e6edf3; --muted: #b8c4cf; --line: #9ccfd8; --accent: #5eead4; --cell: #16212c; --head: #2a2113; }
    }
    text { font-family: Arial, "Microsoft YaHei", sans-serif; fill: var(--ink); }
    .muted { fill: var(--muted); font-size: 16px; }
    .label { font-weight: 700; font-size: 20px; }
    .cell { fill: var(--cell); stroke: var(--line); stroke-width: 2; rx: 8; }
    .end { fill: var(--head); stroke: #ad6800; stroke-width: 2; rx: 8; }
    .arrow { stroke: var(--accent); stroke-width: 3; fill: none; marker-end: url(#arrow); }
    /* contrast-audit-fix */
  .label{paint-order:stroke fill;stroke:#f8fafc;stroke-width:3px}@media(prefers-color-scheme:dark){.label{stroke:#0b1020}}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="var(--accent)"/>
    </marker>
  </defs>
  <path class="arrow" d="M88 132 H180"/>
  <rect class="end" x="190" y="96" width="110" height="72"/>
  <rect class="cell" x="306" y="96" width="110" height="72"/>
  <rect class="cell" x="422" y="96" width="110" height="72"/>
  <rect class="end" x="538" y="96" width="110" height="72"/>
  <path class="arrow" d="M658 132 H752"/>
  <text class="label" x="214" y="139">a1</text>
  <text class="label" x="330" y="139">a2</text>
  <text class="label" x="446" y="139">a3</text>
  <text class="label" x="562" y="139">a4</text>
  <text class="label" x="32" y="139">DeQueue</text>
  <text class="label" x="672" y="92">EnQueue</text>
  <text class="muted" x="222" y="76">front</text>
  <text class="muted" x="574" y="76">rear</text>
  <text class="muted" x="246" y="230">First in, first out: a1 leaves before a2, a3, and a4.</text>
</svg>
