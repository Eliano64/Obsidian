<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="520" viewBox="0 0 1020 520" role="img" aria-labelledby="title desc">
  <title id="title">Router architecture</title>
  <desc id="desc">Router consists of input ports, switching fabric, output ports and routing processor with data plane and control plane.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .plane { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 14; }
    .control { fill: #fff7ed; stroke: #ea580c; }
    .box { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 10; }
    .fabric { fill: #eff6ff; stroke: #2563eb; }
    .line { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .ctl { stroke: #dc2626; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; marker-end: url(#redArrow); }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; }
    .tiny { font-size: 13px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .plane { fill: #111827; stroke: #94a3b8; }
      .control { fill: #2b1708; stroke: #fb923c; }
      .box { fill: #0b1220; stroke: #cbd5e1; }
      .fabric { fill: #10213f; stroke: #60a5fa; }
      .line { stroke: #cbd5e1; }
      .ctl { stroke: #f87171; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker>
  </defs>
  <text x="510" y="38" text-anchor="middle" class="label">典型路由器结构</text>
  <rect x="60" y="80" width="900" height="130" class="plane control"/>
  <text x="110" y="112" class="label">控制层面</text>
  <rect x="335" y="110" width="350" height="70" class="box"/>
  <text x="510" y="138" text-anchor="middle" class="small">路由选择处理机</text>
  <text x="510" y="164" text-anchor="middle" class="tiny">运行 RIP/OSPF/BGP，生成路由表，派生转发表</text>
  <rect x="60" y="250" width="900" height="210" class="plane"/>
  <text x="110" y="282" class="label">数据层面</text>
  <rect x="105" y="315" width="190" height="90" class="box"/>
  <text x="200" y="345" text-anchor="middle" class="small">输入端口</text>
  <text x="200" y="370" text-anchor="middle" class="tiny">收比特、解帧、查表</text>
  <rect x="415" y="315" width="190" height="90" class="box fabric"/>
  <text x="510" y="345" text-anchor="middle" class="small">交换结构</text>
  <text x="510" y="370" text-anchor="middle" class="tiny">输入端口转到输出端口</text>
  <rect x="725" y="315" width="190" height="90" class="box"/>
  <text x="820" y="345" text-anchor="middle" class="small">输出端口</text>
  <text x="820" y="370" text-anchor="middle" class="tiny">排队、成帧、发送</text>
  <path d="M40 360 H105" class="line"/>
  <path d="M295 360 H415" class="line"/>
  <path d="M605 360 H725" class="line"/>
  <path d="M915 360 H980" class="line"/>
  <path d="M510 180 V310" class="ctl"/>
  <text x="535" y="245" class="small">下发转发表</text>
</svg>
