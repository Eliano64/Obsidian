<svg xmlns="http://www.w3.org/2000/svg" width="980" height="450" viewBox="0 0 980 450" role="img" aria-labelledby="title desc">
  <title id="title">子网掩码逐位与运算</title>
  <desc id="desc">IPv4 地址与子网掩码逐位与，保留网络前缀并清零主机号，得到网络地址。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}.bg{fill:#f8fafc}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:18px}.small{fill:#334155;font-size:15px}.bit{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.net{fill:#dbeafe}.host{fill:#dcfce7}.result{fill:#fef3c7}.op{fill:#f1f5f9;stroke:#94a3b8;stroke-width:2}
    @media(prefers-color-scheme:dark){.bg{fill:#020617}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.bit{fill:#0f172a;stroke:#334155}.net{fill:#172554}.host{fill:#052e16}.result{fill:#422006}.op{fill:#111827;stroke:#64748b}}
  </style>
  <rect class="bg" width="980" height="450"/>
  <text class="text" x="490" y="42" text-anchor="middle" font-size="26" font-weight="700">子网掩码：保留网络前缀，清零主机号</text>
  <text class="text" x="105" y="118">IP 地址</text>
  <text class="small" x="215" y="90">192</text><text class="small" x="375" y="90">168</text><text class="small" x="535" y="90">1</text><text class="small" x="695" y="90">130</text>
  <g transform="translate(190,105)" id="ip">
    <rect class="net bit" x="0" y="0" width="150" height="42" rx="6"/><text class="text" x="75" y="27" text-anchor="middle">11000000</text>
    <rect class="net bit" x="160" y="0" width="150" height="42" rx="6"/><text class="text" x="235" y="27" text-anchor="middle">10101000</text>
    <rect class="net bit" x="320" y="0" width="150" height="42" rx="6"/><text class="text" x="395" y="27" text-anchor="middle">00000001</text>
    <rect class="host bit" x="480" y="0" width="150" height="42" rx="6"/><text class="text" x="555" y="27" text-anchor="middle">10000010</text>
  </g>
  <text class="text" x="105" y="198">子网掩码</text>
  <g transform="translate(190,185)">
    <rect class="net bit" x="0" y="0" width="150" height="42" rx="6"/><text class="text" x="75" y="27" text-anchor="middle">11111111</text>
    <rect class="net bit" x="160" y="0" width="150" height="42" rx="6"/><text class="text" x="235" y="27" text-anchor="middle">11111111</text>
    <rect class="net bit" x="320" y="0" width="150" height="42" rx="6"/><text class="text" x="395" y="27" text-anchor="middle">11111111</text>
    <rect class="host bit" x="480" y="0" width="150" height="42" rx="6"/><text class="text" x="555" y="27" text-anchor="middle">10000000</text>
  </g>
  <rect class="op" x="470" y="258" width="74" height="44" rx="8"/><text class="text" x="507" y="287" text-anchor="middle">AND</text>
  <text class="text" x="105" y="360">网络地址</text>
  <g transform="translate(190,332)">
    <rect class="result bit" x="0" y="0" width="150" height="42" rx="6"/><text class="text" x="75" y="27" text-anchor="middle">11000000</text>
    <rect class="result bit" x="160" y="0" width="150" height="42" rx="6"/><text class="text" x="235" y="27" text-anchor="middle">10101000</text>
    <rect class="result bit" x="320" y="0" width="150" height="42" rx="6"/><text class="text" x="395" y="27" text-anchor="middle">00000001</text>
    <rect class="result bit" x="480" y="0" width="150" height="42" rx="6"/><text class="text" x="555" y="27" text-anchor="middle">10000000</text>
  </g>
  <text class="small" x="505" y="412" text-anchor="middle">192.168.1.130/25 所在网络是 192.168.1.128，主机号部分用于区分该子网内的接口。</text>
</svg>
