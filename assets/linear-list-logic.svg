<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250" role="img" aria-labelledby="title desc">
  <title id="title">Linear list logical structure</title>
  <desc id="desc">Five data elements arranged in a finite sequence with predecessor and successor relations.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#335c67"/>
    </marker>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      .box{fill:#f7fafc;stroke:#335c67;stroke-width:2}
      .head{fill:#fff3cd;stroke:#b08900;stroke-width:2}
      .tail{fill:#e8f5e9;stroke:#2f7d32;stroke-width:2}
      .txt{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;fill:#102a43}
      .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;fill:#486581}
      .line{stroke:#335c67;stroke-width:2.5;marker-end:url(#arrow)}
      @media (prefers-color-scheme: dark){
        svg{background:#0f1720}
        .box{fill:#16212c;stroke:#9ccfd8}
        .head{fill:#2a2113;stroke:#f6c177}
        .tail{fill:#12261f;stroke:#95d5b2}
        .txt{fill:#e6edf3}
        .small{fill:#b8c4cf}
        .line{stroke:#9ccfd8}
      }
    </style>
  </defs>
  <text class="txt" x="40" y="42">线性表 L = (a1, a2, a3, a4, a5)</text>
  <text class="small" x="40" y="70">有限序列；位序从 1 开始；除首尾外，每个元素有唯一直接前驱和唯一直接后继。</text>
  <rect class="head" x="70" y="115" width="105" height="62" rx="8"/>
  <rect class="box" x="225" y="115" width="105" height="62" rx="8"/>
  <rect class="box" x="380" y="115" width="105" height="62" rx="8"/>
  <rect class="box" x="535" y="115" width="105" height="62" rx="8"/>
  <rect class="tail" x="690" y="115" width="105" height="62" rx="8"/>
  <text class="txt" x="108" y="153">a1</text>
  <text class="txt" x="263" y="153">a2</text>
  <text class="txt" x="418" y="153">a3</text>
  <text class="txt" x="573" y="153">a4</text>
  <text class="txt" x="728" y="153">a5</text>
  <text class="small" x="88" y="205">表头元素</text>
  <text class="small" x="708" y="205">表尾元素</text>
  <line class="line" x1="175" y1="146" x2="218" y2="146"/>
  <line class="line" x1="330" y1="146" x2="373" y2="146"/>
  <line class="line" x1="485" y1="146" x2="528" y2="146"/>
  <line class="line" x1="640" y1="146" x2="683" y2="146"/>
</svg>
