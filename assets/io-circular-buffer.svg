<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
  <title id="title">Circular Buffer</title>
  <desc id="desc">Circular buffer with in pointer and out pointer.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--green:#059669;--orange:#d97706;--blue:#2563eb}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--green:#34d399;--orange:#fbbf24;--blue:#60a5fa}}
    .bg{fill:var(--bg)}.empty{fill:color-mix(in srgb,var(--green) 14%,var(--bg));stroke:var(--green);stroke-width:2}.full{fill:color-mix(in srgb,var(--orange) 18%,var(--bg));stroke:var(--orange);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--blue);stroke-width:3;fill:none;marker-end:url(#ba)}
  </style>
  <defs><marker id="ba" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"/></marker></defs>
  <rect class="bg" width="820" height="520"/>
  <text class="t" x="410" y="42" text-anchor="middle" font-size="24" font-weight="700">循环缓冲</text>
  <g transform="translate(410 260)">
    <circle class="full" cx="0" cy="-130" r="46"/><text class="t" x="0" y="-124" text-anchor="middle" font-size="16">1 满</text>
    <circle class="full" cx="113" cy="-65" r="46"/><text class="t" x="113" y="-59" text-anchor="middle" font-size="16">2 满</text>
    <circle class="empty" cx="113" cy="65" r="46"/><text class="t" x="113" y="71" text-anchor="middle" font-size="16">3 空</text>
    <circle class="empty" cx="0" cy="130" r="46"/><text class="t" x="0" y="136" text-anchor="middle" font-size="16">4 空</text>
    <circle class="empty" cx="-113" cy="65" r="46"/><text class="t" x="-113" y="71" text-anchor="middle" font-size="16">5 空</text>
    <circle class="full" cx="-113" cy="-65" r="46"/><text class="t" x="-113" y="-59" text-anchor="middle" font-size="16">6 满</text>
  </g>
  <path class="a" d="M608 344 C690 360 690 232 528 314"/>
  <text class="t" x="688" y="300" font-size="16" font-weight="700">in</text>
  <text class="m" x="688" y="324" font-size="13">下一个空缓冲区</text>
  <path class="a" d="M208 164 C138 138 134 248 297 195"/>
  <text class="t" x="112" y="174" font-size="16" font-weight="700">out</text>
  <text class="m" x="112" y="198" font-size="13">下一个满缓冲区</text>
</svg>
