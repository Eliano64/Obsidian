<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">AOE network and critical path overview</title>
  <desc id="desc">AOE example with critical path highlighted.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#0f172a;--muted:#475569;--line:#94a3b8;--edge:#64748b;--hot:#dc2626;--blue:#2563eb}
    @media (prefers-color-scheme: dark){:root{--bg:#0b1020;--panel:#111827;--text:#f8fafc;--muted:#cbd5e1;--line:#64748b;--edge:#94a3b8;--hot:#f87171;--blue:#60a5fa}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:1.4}.title{fill:var(--text);font:700 25px system-ui,Segoe UI,sans-serif}.t{fill:var(--muted);font:14px system-ui,Segoe UI,sans-serif}.edge{stroke:var(--edge);stroke-width:3;fill:none;marker-end:url(#arr)}.critical{stroke:var(--hot);stroke-width:5;marker-end:url(#arrHot)}.node{fill:var(--bg);stroke:var(--edge);stroke-width:2}.label{fill:var(--text);font:700 15px system-ui,Segoe UI,sans-serif}.w{fill:var(--text);font:700 13px system-ui,Segoe UI,sans-serif}.hotText{fill:var(--hot);font:700 16px system-ui,Segoe UI,sans-serif}
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--edge)"/></marker>
    <marker id="arrHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--hot)"/></marker>
  </defs>
  <rect class="bg" width="980" height="520"/>
  <text class="title" x="40" y="52">AOE Network And Critical Path</text>
  <text class="t" x="40" y="82">Events are vertices; activities are weighted directed edges.</text>
  <rect class="panel" x="40" y="110" width="900" height="350" rx="8"/>
  <path class="edge" d="M145 245 L300 165"/><text class="w" x="212" y="185">a1=3</text>
  <path class="critical" d="M145 255 L300 335"/><text class="w" x="210" y="332">a2=2</text>
  <path class="edge" d="M330 170 L480 245"/><text class="w" x="388" y="190">a3=2</text>
  <path class="edge" d="M330 155 L620 155"/><text class="w" x="465" y="137">a4=3</text>
  <path class="critical" d="M330 330 L480 255"/><text class="w" x="388" y="330">a5=4</text>
  <path class="edge" d="M340 330 C475 430 660 390 785 275"/><text class="w" x="520" y="395">a6=3</text>
  <path class="critical" d="M520 245 L780 245"/><text class="w" x="628" y="232">a7=2</text>
  <path class="edge" d="M650 165 L790 230"/><text class="w" x="700" y="177">a8=1</text>
  <circle class="node" cx="120" cy="250" r="28"/><text class="label" x="120" y="256" text-anchor="middle">V1</text>
  <circle class="node" cx="320" cy="155" r="28"/><text class="label" x="320" y="161" text-anchor="middle">V2</text>
  <circle class="node" cx="320" cy="345" r="28"/><text class="label" x="320" y="351" text-anchor="middle">V3</text>
  <circle class="node" cx="500" cy="250" r="28"/><text class="label" x="500" y="256" text-anchor="middle">V4</text>
  <circle class="node" cx="650" cy="155" r="28"/><text class="label" x="650" y="161" text-anchor="middle">V5</text>
  <circle class="node" cx="810" cy="250" r="28"/><text class="label" x="810" y="256" text-anchor="middle">V6</text>
  <text class="hotText" x="310" y="420">Critical path: V1 -> V3 -> V4 -> V6</text>
</svg>
