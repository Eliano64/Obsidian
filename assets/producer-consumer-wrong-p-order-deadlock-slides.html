<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Producer Consumer Wrong P Order Deadlock</title>
  <style>
    :root { color-scheme: light dark; --bg:#f8fafc; --panel:#fff; --text:#172033; --muted:#64748b; --line:#cbd5e1; --accent:#dc2626; --soft:#fee2e2; --ok:#16a34a; --warn:#f59e0b; --shadow:rgba(15,23,42,.12); }
    @media (prefers-color-scheme: dark) { :root { --bg:#0b1120; --panel:#111827; --text:#e5e7eb; --muted:#9ca3af; --line:#374151; --accent:#fb7185; --soft:#3f121b; --ok:#34d399; --warn:#fbbf24; --shadow:rgba(0,0,0,.35); } }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:16px/1.55 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .deck { width:min(1160px,100vw); margin:0 auto; padding:22px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:16px; }
    h1 { margin:0; font-size:22px; letter-spacing:0; }
    .controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    button { border:1px solid var(--line); background:var(--panel); color:var(--text); border-radius:6px; padding:7px 12px; cursor:pointer; box-shadow:0 1px 3px var(--shadow); }
    button:hover { border-color:var(--accent); }
    .counter { color:var(--muted); min-width:56px; text-align:center; }
    .grid { display:grid; grid-template-columns:1fr 1fr .92fr; gap:16px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px; min-height:470px; box-shadow:0 8px 20px var(--shadow); }
    .panel h2 { margin:0 0 12px; font-size:17px; }
    .code { display:grid; gap:8px; font-family:Consolas,"SFMono-Regular",monospace; font-size:15px; }
    .line { border:1px solid transparent; border-radius:6px; padding:7px 9px; white-space:nowrap; }
    .line.active { border-color:var(--accent); background:var(--soft); box-shadow:inset 4px 0 0 var(--accent); }
    .state { display:grid; gap:12px; }
    .sig { border:1px solid var(--line); border-radius:8px; padding:12px; }
    .sig b { display:block; font:700 25px/1 Consolas,monospace; margin-top:6px; color:var(--accent); }
    .blocked { border:2px solid var(--accent); background:var(--soft); color:var(--accent); font-weight:700; }
    .desc { margin-top:14px; }
    .muted { color:var(--muted); }
    @media (max-width:900px) { .grid { grid-template-columns:1fr; } header { flex-direction:column; align-items:flex-start; } .panel { min-height:auto; } }
  </style>
</head>
<body>
  <main class="deck">
    <header>
      <h1>错误顺序：先 P(mutex) 再 P(empty/full) 会怎样</h1>
      <div class="controls"><button id="prev">上一步</button><span class="counter" id="counter"></span><button id="next">下一步</button><button id="reset">重置</button></div>
    </header>
    <section class="grid">
      <div class="panel">
        <h2>生产者错误写法</h2>
        <div class="code">
          <div class="line" data-line="p1">produce item;</div>
          <div class="line" data-line="p2">P(mutex);</div>
          <div class="line" data-line="p3">P(empty);</div>
          <div class="line" data-line="p4">put item into buffer;</div>
          <div class="line" data-line="p5">V(mutex);</div>
          <div class="line" data-line="p6">V(full);</div>
        </div>
      </div>
      <div class="panel">
        <h2>消费者错误写法</h2>
        <div class="code">
          <div class="line" data-line="c1">P(mutex);</div>
          <div class="line" data-line="c2">P(full);</div>
          <div class="line" data-line="c3">remove item from buffer;</div>
          <div class="line" data-line="c4">V(mutex);</div>
          <div class="line" data-line="c5">V(empty);</div>
          <div class="line" data-line="c6">consume item;</div>
        </div>
      </div>
      <div class="panel">
        <h2>状态</h2>
        <div class="state">
          <div class="sig">empty<b id="empty">0</b></div>
          <div class="sig">full<b id="full">n</b></div>
          <div class="sig">mutex<b id="mutex">1</b></div>
          <div class="sig" id="producer">生产者：可运行</div>
          <div class="sig" id="consumer">消费者：可运行</div>
        </div>
        <p class="desc" id="desc"></p>
        <p class="muted">场景：缓冲区已满，生产者先运行。</p>
      </div>
    </section>
  </main>
  <script>
    const steps = [
      { line:"", empty:"0", full:"n", mutex:"1", p:"生产者：可运行", c:"消费者：可运行", desc:"初始设定：缓冲区已满，empty=0，full=n。正确情况下消费者应能取走产品。" },
      { line:"p2", empty:"0", full:"n", mutex:"0", p:"生产者：持有 mutex", c:"消费者：可运行", desc:"生产者先执行 P(mutex)，占有缓冲区访问权。" },
      { line:"p3", empty:"0", full:"n", mutex:"0", p:"生产者：等待 empty", c:"消费者：可运行", desc:"生产者再执行 P(empty)。由于没有空位，生产者阻塞，但它已经持有 mutex。" },
      { line:"c1", empty:"0", full:"n", mutex:"0", p:"生产者：等待 empty", c:"消费者：等待 mutex", desc:"切换到消费者。消费者先执行 P(mutex)，但 mutex 被生产者占着，因此消费者也阻塞。" },
      { line:"", empty:"0", full:"n", mutex:"0", p:"生产者：等消费者释放空位", c:"消费者：等生产者释放 mutex", desc:"死锁形成：生产者等 empty，empty 只能由消费者 V(empty)；消费者等 mutex，mutex 又在生产者手里。" }
    ];
    let index = 0;
    const ids = ["empty","full","mutex","producer","consumer","desc","counter"];
    const els = Object.fromEntries(ids.map(id => [id, document.getElementById(id)]));
    function render() {
      const s = steps[index];
      document.querySelectorAll(".line").forEach(el => el.classList.toggle("active", el.dataset.line === s.line));
      els.empty.textContent = s.empty; els.full.textContent = s.full; els.mutex.textContent = s.mutex;
      els.producer.textContent = s.p; els.consumer.textContent = s.c;
      els.producer.classList.toggle("blocked", s.p.includes("等待"));
      els.consumer.classList.toggle("blocked", s.c.includes("等待"));
      els.desc.textContent = s.desc; els.counter.textContent = `${index + 1}/${steps.length}`;
    }
    document.getElementById("prev").onclick = () => { index = Math.max(0, index - 1); render(); };
    document.getElementById("next").onclick = () => { index = Math.min(steps.length - 1, index + 1); render(); };
    document.getElementById("reset").onclick = () => { index = 0; render(); };
    render();
  </script>
</body>
</html>
