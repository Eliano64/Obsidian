<svg xmlns="http://www.w3.org/2000/svg" width="860" height="620" viewBox="0 0 860 620" role="img" aria-labelledby="title desc">
  <title id="title">C arithmetic conversion rank</title>
  <desc id="desc">A simple vertical rank diagram for C arithmetic conversions. Low-rank types convert upward to high-rank types, and small integer types promote to int first.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    .bg { fill: #ffffff; }
    .title { fill: #1f2328; font: 700 28px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .hint { fill: #cf222e; font: 700 20px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .axis { stroke: #f0442e; stroke-width: 6; marker-end: url(#arrow); }
    .label { fill: #1f2328; font: 700 24px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .type { fill: #1f2328; font: 24px "Consolas", "Segoe UI", "Microsoft YaHei", monospace; }
    .minor { fill: #1f2328; font: 22px "Consolas", "Segoe UI", "Microsoft YaHei", monospace; }
    .red { fill: #cf222e; font: 22px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .line { stroke: #cf222e; stroke-width: 2.5; marker-end: url(#smallArrow); }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #151719; }
      .title, .label, .type, .minor { fill: #f0f3f6; }
      .hint, .red { fill: #ff6b57; }
      .axis { stroke: #ff5d45; }
      .line { stroke: #ff6b57; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#f0442e"/>
    </marker>
    <marker id="smallArrow" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#cf222e"/>
    </marker>
  </defs>

  <rect class="bg" width="860" height="620"/>
  <text class="title" x="56" y="58">C 语言算术转换等级</text>

  <line class="axis" x1="92" y1="540" x2="92" y2="116"/>
  <text class="label" x="48" y="128">高</text>
  <text class="label" x="48" y="552">低</text>

  <text class="type" x="140" y="126">long double</text>
  <text class="type" x="140" y="174">double</text>
  <text class="type" x="140" y="222">float</text>
  <text class="type" x="140" y="286">unsigned long long</text>
  <text class="type" x="140" y="334">long long</text>
  <text class="type" x="140" y="382">unsigned long</text>
  <text class="type" x="140" y="430">long</text>
  <text class="type" x="140" y="478">unsigned int</text>
  <text class="type" x="140" y="526">int</text>

  <line class="line" x1="255" y1="528" x2="208" y2="528"/>
  <text class="minor" x="270" y="526">char, unsigned char, short, unsigned short</text>

  <text class="red" x="116" y="584">低等级类型向高等级类型转换</text>
  <text class="hint" x="270" y="560">小整数类型先整型提升到 int</text>
</svg>
