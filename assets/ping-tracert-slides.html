<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>PING 与 tracert</title><style>:root{color-scheme:light dark;--bg:#f8fafc;--fg:#0f172a;--muted:#475569;--border:#cbd5e1;--node:#dbeafe;--accent:#0369a1}@media(prefers-color-scheme:dark){:root{--bg:#020617;--fg:#e5e7eb;--muted:#cbd5e1;--border:#334155;--node:#172554;--accent:#67e8f9}}body{margin:0;background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif}.wrap{max-width:980px;margin:auto;padding:28px}.title{text-align:center;font-size:26px;font-weight:700}.nodes{display:flex;align-items:center;justify-content:space-between;margin:40px 20px}.node{background:var(--node);border:2px solid var(--accent);border-radius:8px;padding:14px 22px}.line{height:3px;background:var(--muted);flex:1}.card{border:1px solid var(--border);border-radius:10px;padding:18px}.accent{color:var(--accent);font-weight:700}.controls{text-align:center;margin-top:16px}button{background:transparent;color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:8px 16px;margin:0 6px;font:inherit}</style></head><body><div class="wrap"><div class="title">ICMP 支撑诊断：PING 与 tracert</div><div class="nodes"><div class="node">源主机</div><div class="line"></div><div class="node">R1</div><div class="line"></div><div class="node">R2</div><div class="line"></div><div class="node">目的主机</div></div><div id="card" class="card"></div><div class="controls"><button id="prev">上一步</button><button id="next">下一步</button></div></div><script>
const data=[`<p><span class="accent">PING</span>：源主机发送 ICMP 回送请求，目的主机返回 ICMP 回送回答。能收到回答，说明 IP 层可达且对方愿意响应。</p>`,`<p><span class="accent">tracert 第 1 轮</span>：发送 TTL=1 的探测报文。R1 转发前把 TTL 减到 0，丢弃报文，并返回 ICMP 时间超过。</p>`,`<p><span class="accent">tracert 第 2 轮</span>：发送 TTL=2。报文到 R2 时 TTL 变为 0，R2 返回 ICMP 时间超过。</p>`,`<p><span class="accent">到达目的</span>：逐步增大 TTL，直到目的主机返回最终响应，就能得到沿途路由器序列。</p>`];let i=0;function r(){card.innerHTML=data[i]}prev.onclick=()=>{i=Math.max(0,i-1);r()};next.onclick=()=>{i=Math.min(data.length-1,i+1);r()};r();
</script></body></html>
