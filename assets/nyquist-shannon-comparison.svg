<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">奈奎斯特定理与香农定理对比</title>
  <desc id="desc">对比奈奎斯特定理和香农定理的条件、限制和公式</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--blue-bg:#dbeafe;--green:#16a34a;--green-bg:#dcfce7}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--blue-bg:#1e3a8a;--green:#4ade80;--green-bg:#14532d}}
    .bg{fill:var(--bg)}.card{stroke-width:2.2}.n{fill:var(--blue-bg);stroke:var(--blue)}.s{fill:var(--green-bg);stroke:var(--green)}.divider{stroke:var(--line);stroke-width:2}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:23px;font-weight:700}.formula{font-size:24px;font-weight:700}.small{font-size:16px;fill:var(--text)}.muted{font-size:15px;fill:var(--muted)}
  </style>
  <rect class="bg" width="980" height="500"/>
  <text x="50" y="58" class="title">奈奎斯特定理 vs 香农定理</text>
  <rect x="70" y="105" width="390" height="315" rx="12" class="card n"/>
  <text x="265" y="150" text-anchor="middle" class="label">奈奎斯特定理</text>
  <text x="265" y="200" text-anchor="middle" class="formula">Bmax = 2W Baud</text>
  <text x="265" y="235" text-anchor="middle" class="formula">Rmax = 2W log₂M</text>
  <line x1="110" y1="260" x2="420" y2="260" class="divider"/>
  <text x="115" y="300" class="small">条件：理想低通信道，无噪声</text>
  <text x="115" y="335" class="small">限制：码间串扰</text>
  <text x="115" y="370" class="small">参数：带宽 W，码元状态数 M</text>
  <rect x="520" y="105" width="390" height="315" rx="12" class="card s"/>
  <text x="715" y="150" text-anchor="middle" class="label">香农定理</text>
  <text x="715" y="215" text-anchor="middle" class="formula">C = W log₂(1 + S/N)</text>
  <line x1="560" y1="260" x2="870" y2="260" class="divider"/>
  <text x="565" y="300" class="small">条件：带宽受限，有高斯白噪声</text>
  <text x="565" y="335" class="small">限制：噪声</text>
  <text x="565" y="370" class="small">参数：带宽 W，信噪比 S/N</text>
</svg>
