<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">DRAM row buffer burst and SDRAM</title><desc id="desc">DRAM row buffer enables burst transfer, and SDRAM synchronizes commands and data with clock.</desc>
  <defs><style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}
.bg{fill:#fbfcff}.title{font:700 26px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.h{font:700 17px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.t{font:400 13px "Microsoft YaHei",Arial,sans-serif;fill:#40506a}.box{fill:#fff;stroke:#9aa9bd;stroke-width:1.6;rx:8}.row{fill:#fff7e8;stroke:#d49a3a}.buf{fill:#eef6ff;stroke:#5f92d6}.out{fill:#effaf3;stroke:#62a87c}.clk{stroke:#27354f;stroke-width:2;fill:none}@media(prefers-color-scheme:dark){.bg{fill:#111827}.title,.h{fill:#f3f4f6}.t{fill:#cbd5e1}.box{fill:#1f2937;stroke:#64748b}.row{fill:#3b2a12;stroke:#f59e0b}.buf{fill:#172554;stroke:#60a5fa}.out{fill:#143525;stroke:#4ade80}.clk{stroke:#d1d5db}}</style></defs>
  <rect class="bg" width="1080" height="560"/><text class="title" x="48" y="54">DRAM 行缓冲、突发传输与 SDRAM</text>
  <rect class="box" x="80" y="120" width="420" height="300"/><text class="h" x="290" y="155" text-anchor="middle">打开一行</text>
  <rect class="row" x="135" y="210" width="310" height="45"/><text class="t" x="290" y="238" text-anchor="middle">DRAM 某一整行</text>
  <rect class="buf" x="135" y="300" width="310" height="45"/><text class="t" x="290" y="328" text-anchor="middle">行缓冲区 Row Buffer</text>
  <text class="t" x="290" y="382" text-anchor="middle">同一行内连续列访问更快</text>
  <rect class="box" x="580" y="120" width="420" height="300"/><text class="h" x="790" y="155" text-anchor="middle">突发传输 + 同步时钟</text>
  <path class="clk" d="M635 230 L665 230 L665 200 L695 200 L695 230 L725 230 L725 200 L755 200 L755 230 L785 230 L785 200 L815 200 L815 230 L845 230 L845 200 L875 200 L875 230 L905 230"/>
  <rect class="out" x="640" y="290" width="60" height="38"/><text class="t" x="670" y="314" text-anchor="middle">D0</text><rect class="out" x="710" y="290" width="60" height="38"/><text class="t" x="740" y="314" text-anchor="middle">D1</text><rect class="out" x="780" y="290" width="60" height="38"/><text class="t" x="810" y="314" text-anchor="middle">D2</text><rect class="out" x="850" y="290" width="60" height="38"/><text class="t" x="880" y="314" text-anchor="middle">D3</text>
  <text class="t" x="790" y="370" text-anchor="middle">给出起始列地址后，按时钟连续输出</text><text class="h" x="790" y="405" text-anchor="middle">SDRAM：命令、地址、数据与系统时钟同步</text>
</svg>
