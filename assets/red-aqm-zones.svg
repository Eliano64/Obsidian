<svg xmlns="http://www.w3.org/2000/svg" width="940" height="320" viewBox="0 0 940 320" role="img" aria-labelledby="title desc">
  <title id="title">RED active queue management zones</title>
  <desc id="desc">RED uses average queue length thresholds to decide no drop, probabilistic drop, or forced drop.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .axis { stroke: #475569; stroke-width: 2.5; marker-end: url(#arrow); }
    .zone1 { fill: #dcfce7; }
    .zone2 { fill: #fef3c7; }
    .zone3 { fill: #fee2e2; }
    .mark { stroke: #334155; stroke-width: 2; stroke-dasharray: 6 5; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .axis { stroke: #cbd5e1; }
      .zone1 { fill: #14532d; }
      .zone2 { fill: #713f12; }
      .zone3 { fill: #7f1d1d; }
      .mark { stroke: #94a3b8; }
    }
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
  <text x="470" y="40" text-anchor="middle" class="label">RED：按平均队列长度提前丢弃</text>
  <rect x="115" y="100" width="260" height="105" class="zone1"/>
  <rect x="375" y="100" width="280" height="105" class="zone2"/>
  <rect x="655" y="100" width="190" height="105" class="zone3"/>
  <line x1="115" y1="220" x2="870" y2="220" class="axis"/>
  <line x1="375" y1="85" x2="375" y2="235" class="mark"/>
  <line x1="655" y1="85" x2="655" y2="235" class="mark"/>
  <text x="245" y="140" text-anchor="middle" class="small">低于最小门限</text>
  <text x="245" y="170" text-anchor="middle" class="small">正常入队</text>
  <text x="515" y="135" text-anchor="middle" class="small">介于两门限之间</text>
  <text x="515" y="165" text-anchor="middle" class="small">按概率提前丢弃或标记</text>
  <text x="750" y="140" text-anchor="middle" class="small">高于最大门限</text>
  <text x="750" y="170" text-anchor="middle" class="small">强制丢弃</text>
  <text x="375" y="260" text-anchor="middle" class="small">minth</text>
  <text x="655" y="260" text-anchor="middle" class="small">maxth</text>
  <text x="500" y="292" text-anchor="middle" class="small">平均队列长度</text>
</svg>
