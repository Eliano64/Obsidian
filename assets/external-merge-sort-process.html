<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>External Merge Sort Process</title><style>
:root{color-scheme:light dark;--bg:#fff;--ink:#142033;--muted:#64748b;--line:#cbd5e1;--card:#f8fafc;--accent:#2563eb;--good:#16a34a;--warn:#ea580c}
@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--ink:#e5e7eb;--muted:#94a3b8;--line:#475569;--card:#111827;--accent:#60a5fa;--good:#4ade80;--warn:#fb923c}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1040px;margin:0 auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.title{font-size:24px;font-weight:760}.sub{color:var(--muted);font-size:14px;margin-top:4px}.btns{display:flex;gap:8px}button{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:7px;padding:8px 12px;cursor:pointer}.grid{display:grid;grid-template-columns:1.2fr .9fr;gap:16px;margin-top:16px}.panel{border:1px solid var(--line);border-radius:8px;background:var(--card);padding:14px}.disk{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.block,.buf,.run{border:1px solid var(--line);border-radius:7px;padding:8px;min-height:40px;background:var(--bg);font:700 14px ui-monospace,Menlo,monospace}.block.on,.buf.on{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent),transparent 75%)}.run{background:color-mix(in srgb,var(--good),transparent 88%)}.label{font-size:13px;color:var(--muted);margin:12px 0 6px}.arrow{font-size:22px;color:var(--accent);text-align:center;margin:8px}.explain{line-height:1.7;color:var(--muted);font-size:15px}.formula{margin-top:10px;border-left:3px solid var(--accent);padding:8px 10px;background:color-mix(in srgb,var(--accent),transparent 90%);font-family:ui-monospace,Menlo,monospace;white-space:pre-wrap}.step{margin-top:8px;color:var(--muted);font-size:13px}@media(max-width:820px){.grid,.top{display:block}.btns{margin-top:10px}}
</style></head><body><main class="wrap"><div class="top"><div><div class="title">外部归并排序过程</div><div class="sub">先生成初始归并段，再逐趟归并为一个有序文件</div></div><div class="btns"><button id="prev">上一步</button><button id="next">下一步</button></div></div><section class="grid"><div class="panel"><div class="label">外存块</div><div class="disk" id="disk"></div><div class="arrow" id="arrow">↓</div><div class="label">内存缓冲区</div><div class="disk" id="buf"></div><div class="label">归并段</div><div id="runs"></div></div><div class="panel"><div class="explain" id="text"></div><div class="formula" id="formula"></div><div class="step" id="step"></div></div></section></main><script>
const blocks=['36 8 26','42 9 48','1 37 25','45 27 28','41 2 40','19 7 39','18 38 13','14 29 44'];
const steps=[
{on:[],buf:[],runs:[],a:'文件太大，不能一次全部装入内存。外部排序只能分块读入。',f:'磁盘 I/O 是主要时间开销'},
{on:[0,1],buf:['36 8 26','42 9 48'],runs:[],a:'读入内存能容纳的一批块，在内存中进行内部排序。',f:'读入：2 个磁盘块'},
{on:[0,1],buf:['8 9 26','36 42 48'],runs:['R1: 8 9 26 36 42 48'],a:'内部排序后写回外存，形成第一个初始归并段。',f:'生成初始归并段：读一次，写一次'},
{on:[2,3],buf:['1 37 25','45 27 28'],runs:['R1: 8 9 26 36 42 48'],a:'继续读入下一批块，重复内部排序。',f:'每批生成一个有序归并段'},
{on:[2,3],buf:['1 25 27','28 37 45'],runs:['R1: 8 9 26 36 42 48','R2: 1 25 27 28 37 45'],a:'得到多个初始归并段后，开始逐趟归并。',f:'初始归并段数量 r 决定归并趟数'},
{on:[],buf:['R1 当前块','R2 当前块','输出块'],runs:['R1 + R2 -> R1_new'],a:'二路归并至少需要两个输入缓冲区和一个输出缓冲区。每次比较两个输入缓冲区当前记录，较小者进入输出缓冲区。',f:'输入缓冲区空：读下一块\\n输出缓冲区满：写回外存'},
{on:[],buf:[],runs:['R1_new: 1 8 9 25 26 27 28 36 37 42 45 48'],a:'一趟归并会把短归并段合成更长的归并段。反复归并，直到只剩一个有序文件。',f:'若有 B 个块、S 趟归并：总 I/O = 2B(S+1)'}
];let cur=0;
function cell(t,c){return `<div class="${c}">${t}</div>`}
function render(){const s=steps[cur];document.getElementById('disk').innerHTML=blocks.map((b,i)=>cell(b,'block '+(s.on.includes(i)?'on':''))).join('');document.getElementById('buf').innerHTML=s.buf.map(b=>cell(b,'buf on')).join('');document.getElementById('runs').innerHTML=s.runs.map(r=>cell(r,'run')).join('');document.getElementById('text').textContent=s.a;document.getElementById('formula').textContent=s.f;document.getElementById('step').textContent=(cur+1)+' / '+steps.length}
document.getElementById('prev').onclick=()=>{cur=(cur+steps.length-1)%steps.length;render()};document.getElementById('next').onclick=()=>{cur=(cur+1)%steps.length;render()};render();
</script></body></html>
