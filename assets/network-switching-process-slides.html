<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Network Switching Process</title><style>
:root{--bg:#fff;--panel:#f8fafc;--line:#cbd5e1;--text:#172033;--muted:#64748b;--blue:#dbeafe;--bl:#2563eb;--green:#dcfce7;--gl:#16a34a;--amber:#fef3c7;--al:#d97706;--red:#fee2e2;--rl:#dc2626;--arrow:#475569}@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#1e3a8a;--bl:#60a5fa;--green:#14532d;--gl:#4ade80;--amber:#713f12;--al:#fbbf24;--red:#7f1d1d;--rl:#f87171;--arrow:#cbd5e1}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.deck{min-height:720px;padding:28px 34px 24px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}header{display:flex;justify-content:space-between;align-items:end}h1{margin:0;font-size:30px}.step{color:var(--muted);font-size:18px}.stage{display:grid;grid-template-columns:1.15fr .95fr;gap:22px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;min-height:505px}svg{width:100%;height:500px}.host{fill:var(--blue);stroke:var(--bl);stroke-width:2.5}.router{fill:var(--amber);stroke:var(--al);stroke-width:2.5}.packet{fill:var(--green);stroke:var(--gl);stroke-width:2.5}.path{stroke:var(--arrow);stroke-width:4;fill:none;marker-end:url(#arrow)}.reserve{stroke:var(--rl);stroke-width:6;fill:none}.faded{opacity:.18}.hi{stroke-width:5}text{fill:var(--text);font-family:inherit}.label{text-anchor:middle;dominant-baseline:middle;font-size:18px;font-weight:700}.small{text-anchor:middle;font-size:14px;fill:var(--muted)}h2{margin:0 0 14px;font-size:25px}p{margin:0 0 13px;font-size:20px;line-height:1.55}.code{font-family:Consolas,"Courier New",monospace;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:10px;font-size:17px;line-height:1.55;white-space:pre-wrap}.controls{display:flex;justify-content:center;gap:10px}button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:9px 14px;font-size:16px;cursor:pointer}</style></head><body><div class="deck"><header><h1>交换方式：资源如何被占用</h1><div id="stepLabel" class="step"></div></header><main class="stage"><section class="panel"><svg viewBox="0 0 650 500"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--arrow)"/></marker></defs>
<rect id="src" x="42" y="210" width="90" height="62" rx="12" class="host"/><text x="87" y="241" class="label">源主机</text>
<circle id="r1" cx="245" cy="240" r="38" class="router"/><text x="245" y="240" class="label">R1</text>
<circle id="r2" cx="405" cy="240" r="38" class="router"/><text x="405" y="240" class="label">R2</text>
<rect id="dst" x="520" y="210" width="90" height="62" rx="12" class="host"/><text x="565" y="241" class="label">目的主机</text>
<path id="l1" d="M132 240 H207" class="path"/><path id="l2" d="M283 240 H367" class="path"/><path id="l3" d="M443 240 H520" class="path"/>
<path id="circuit" d="M132 300 C220 350 430 350 520 300" class="reserve"/>
<rect id="pkt1" x="165" y="205" width="50" height="30" rx="6" class="packet"/><text x="190" y="225" class="small">P1</text>
<rect id="pkt2" x="225" y="205" width="50" height="30" rx="6" class="packet"/><text x="250" y="225" class="small">P2</text>
<rect id="pkt3" x="285" y="205" width="50" height="30" rx="6" class="packet"/><text x="310" y="225" class="small">P3</text>
</svg></section><section class="panel"><h2 id="title"></h2><p id="body1"></p><p id="body2"></p><div id="code" class="code"></div></section></main><nav class="controls"><button id="prev">上一步</button><button id="next">下一步</button></nav></div><script>
const ids=["src","r1","r2","dst","l1","l2","l3","circuit","pkt1","pkt2","pkt3"];
const steps=[
{t:"电路交换：先建立专用通路",b1:"通信前先建立连接，沿途通信资源被预先分配。",b2:"通话期间即使暂时没有数据，也继续占用这条通路。",c:"建立连接 -> 通信 -> 释放连接",hi:["src","r1","r2","dst","circuit"],fade:["pkt1","pkt2","pkt3","l1","l2","l3"]},
{t:"分组交换：先拆成分组",b1:"较长报文被拆成多个较小分组，每个分组带有首部。",b2:"首部中包含转发所需的信息，例如目的地址。",c:"报文 -> P1, P2, P3 ...",hi:["src","pkt1","pkt2","pkt3"],fade:["circuit"]},
{t:"路由器存储转发",b1:"路由器收到一个完整分组后，暂存、查表，再转发到下一跳。",b2:"分组在哪段链路上传输，才占用哪段链路资源。",c:"接收分组\n读取首部\n查转发表\n转发",hi:["r1","pkt2","l2"],fade:["circuit","pkt1","pkt3"]},
{t:"分组可以流水线推进",b1:"R1 转发 P1 时，源主机可以继续发送 P2；R2 转发 P1 时，R1 可以转发 P2。",b2:"这就是分组交换适合突发数据的重要原因。",c:"多段链路可以并行工作",hi:["pkt1","pkt2","pkt3","l1","l2","l3"],fade:["circuit"]},
{t:"代价：首部、排队、失序、丢包",b1:"分组交换不保证每个分组都走同一路径，也不保证网络资源总是够用。",b2:"拥塞时分组可能排队甚至被丢弃。",c:"灵活性更高，但需要处理额外问题。",hi:["r1","r2","pkt1","pkt2","pkt3"],fade:["circuit"]}
];
let i=Math.min(Math.max((Number(new URLSearchParams(location.search).get("step"))||1)-1,0),steps.length-1);
function render(){const s=steps[i];stepLabel.textContent=`${i+1} / ${steps.length}`;title.textContent=s.t;body1.textContent=s.b1;body2.textContent=s.b2;code.textContent=s.c;ids.forEach(id=>{const el=document.getElementById(id);el.classList.remove("faded","hi");if(s.fade.includes(id))el.classList.add("faded");if(s.hi.includes(id))el.classList.add("hi")})}prev.onclick=()=>{i=Math.max(0,i-1);render()};next.onclick=()=>{i=Math.min(steps.length-1,i+1);render()};render();
</script></body></html>
