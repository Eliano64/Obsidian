<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">IPv4 首部长度、总长度和载荷长度</title>
  <desc id="desc">根据首部长度字段和总长度字段计算载荷长度。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}.bg{fill:#f8fafc}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:18px}.small{fill:#334155;font-size:15px}.hdr{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.payload{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.line{stroke:#64748b;stroke-width:2}.note{fill:#0369a1;font-weight:700}@media(prefers-color-scheme:dark){.bg{fill:#020617}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.hdr{fill:#172554;stroke:#60a5fa}.payload{fill:#052e16;stroke:#4ade80}.line{stroke:#94a3b8}.note{fill:#67e8f9}}
  </style>
  <rect class="bg" width="1000" height="360"/>
  <text class="text" x="500" y="42" text-anchor="middle" font-size="25" font-weight="700">IPv4 长度字段的计算关系</text>
  <g transform="translate(110,105)">
    <rect class="hdr" x="0" y="0" width="180" height="70" rx="6"/><text class="text" x="90" y="42" text-anchor="middle">首部</text>
    <rect class="payload" x="180" y="0" width="620" height="70" rx="6"/><text class="text" x="490" y="42" text-anchor="middle">数据载荷</text>
    <line class="line" x1="0" y1="100" x2="800" y2="100"/>
    <line class="line" x1="0" y1="90" x2="0" y2="110"/><line class="line" x1="180" y1="90" x2="180" y2="110"/><line class="line" x1="800" y1="90" x2="800" y2="110"/>
    <text class="small" x="90" y="132" text-anchor="middle">首部长度字段 × 4 B</text>
    <text class="small" x="400" y="132" text-anchor="middle">总长度字段</text>
  </g>
  <text class="note" x="500" y="270" text-anchor="middle">载荷长度 = 总长度 - 首部长度</text>
  <text class="small" x="500" y="306" text-anchor="middle">例：首部长度字段 0101 = 5，所以首部 20 B；总长度 1020 B；载荷 1000 B。</text>
</svg>
