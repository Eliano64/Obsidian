<line class="axis" x1="571" y1="195" x2="571" y2="450"/>
<line class="axis" x1="571" y1="450" x2="937" y2="450"/>
<text class="tick" x="754.0" y="493" text-anchor="middle">问题规模 n</text>
<line x1="537" y1="150" x2="557" y2="150" stroke="var(--c3)" stroke-width="3"/>
<text class="legend" x="564" y="154">O(2ⁿ)</text>
<polyline class="curve" points="571.0,442.3 611.7,434.6 652.3,427.0 693.0,419.3 733.7,411.6 774.3,403.9 815.0,396.3 855.7,388.6 896.3,380.9 937.0,373.2" stroke="var(--c3)"/>
<line x1="675" y1="150" x2="695" y2="150" stroke="var(--c5)" stroke-width="3"/>
<text class="legend" x="702" y="154">O(n!)</text>
<polyline class="curve" points="571.0,450.0 611.7,442.3 652.3,430.2 693.0,414.8 733.7,397.0 774.3,377.1 815.0,355.6 855.7,332.6 896.3,308.2 937.0,282.7" stroke="var(--c5)"/>
<line x1="813" y1="150" x2="833" y2="150" stroke="var(--c6)" stroke-width="3"/>
<text class="legend" x="840" y="154">O(nⁿ)</text>
<polyline class="curve" points="571.0,450.0 611.7,434.6 652.3,413.5 693.0,388.6 733.7,360.9 774.3,330.9 815.0,299.1 855.7,265.8 896.3,231.0 937.0,195.0" stroke="var(--c6)"/>
<text class="sub" x="500" y="550" text-anchor="middle">曲线只表示增长阶的代表函数；大 O 比较关注 n 足够大时的趋势，不表示实际运行时间必然相同</text>
</svg>
