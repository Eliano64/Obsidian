<polyline class="curve" points="91.0,450.0 102.8,434.6 114.6,415.5 126.4,403.9 138.2,395.7 150.0,389.3 161.8,384.0 173.6,379.6 185.5,375.8 197.3,372.4 209.1,369.4 220.9,366.7 232.7,364.2 244.5,361.9 256.3,359.8 268.1,357.9 279.9,356.1 291.7,354.4 303.5,352.7 315.3,351.2 327.1,349.8 338.9,348.4 350.7,347.1 362.5,345.9 374.4,344.7 386.2,343.6 398.0,342.5 409.8,341.4 421.6,340.4 433.4,339.4 445.2,338.5 457.0,337.6" stroke="var(--c4)"/>
<line x1="195" y1="172" x2="215" y2="172" stroke="var(--c5)" stroke-width="3"/>
