<polyline class="curve" points="91.0,450.0 102.8,419.3 114.6,401.3 126.4,388.6 138.2,378.7 150.0,370.6 161.8,363.8 173.6,357.9 185.5,352.7 197.3,348.0 209.1,343.8 220.9,339.9 232.7,336.4 244.5,333.1 256.3,330.0 268.1,327.2 279.9,324.5 291.7,322.0 303.5,319.6 315.3,317.3 327.1,315.1 338.9,313.1 350.7,311.1 362.5,309.2 374.4,307.4 386.2,305.7 398.0,304.0 409.8,302.4 421.6,300.8 433.4,299.3 445.2,297.9 457.0,296.5" stroke="var(--c5)"/>
