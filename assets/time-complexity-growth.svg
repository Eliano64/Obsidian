<polyline class="curve" points="91.0,450.0 102.8,450.0 114.6,439.8 126.4,434.6 138.2,431.3 150.0,429.0 161.8,427.1 173.6,425.7 185.5,424.4 197.3,423.4 209.1,422.5 220.9,421.7 232.7,421.0 244.5,420.4 256.3,419.8 268.1,419.3 279.9,418.8 291.7,418.4 303.5,418.0 315.3,417.6 327.1,417.2 338.9,416.9 350.7,416.6 362.5,416.3 374.4,416.0 386.2,415.7 398.0,415.5 409.8,415.2 421.6,415.0 433.4,414.8 445.2,414.6 457.0,414.4" stroke="var(--c2)"/>
