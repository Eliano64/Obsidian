<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 570" role="img" aria-labelledby="title desc">
<title id="title">常见时间复杂度函数增长曲线</title>
<desc id="desc">Python 计算的常数、对数、线性、多项式、指数、阶乘和自幂函数增长曲线，纵轴使用对数刻度。</desc>
<style>
:root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#5f6f82;--grid:#d7dee8;--axis:#64748b;--c1:#64748b;--c2:#0f766e;--c3:#2563eb;--c4:#7c3aed;--c5:#d97706;--c6:#dc2626}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#162131;--text:#eef2f7;--muted:#b5c0cf;--grid:#34445a;--axis:#94a3b8;--c1:#94a3b8;--c2:#34d399;--c3:#60a5fa;--c4:#a78bfa;--c5:#fbbf24;--c6:#fb7185}}
text{font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;fill:var(--text)}.bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--grid);stroke-width:1.5}.grid{stroke:var(--grid);stroke-width:1}.axis{stroke:var(--axis);stroke-width:1.5}.curve{fill:none;stroke-width:3}.title{font-size:27px;font-weight:700}.sub{font-size:14px;fill:var(--muted)}.panel-title{font-size:18px;font-weight:700}.tick{font-size:12px;fill:var(--muted)}.legend{font-size:13px;font-weight:700}
</style>
<rect class="bg" width="1000" height="570" rx="18"/>
<text class="title" x="40" y="45">常见时间复杂度的增长速度</text>
<text class="sub" x="40" y="71">由 Python 计算代表函数；纵轴使用 log₁₀ 刻度，否则指数、阶乘和 nⁿ 会把低阶曲线全部压在横轴附近</text>

<rect class="panel" x="35" y="95" width="450" height="420" rx="14"/>
<text class="panel-title" x="57" y="127">低阶与多项式：n = 1…32</text>
