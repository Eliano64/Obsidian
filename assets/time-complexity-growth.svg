<text class="tick" x="562" y="326.5" text-anchor="end">10^5</text>
<line class="grid" x1="571" y1="297.0" x2="937" y2="297.0"/>
<text class="tick" x="562" y="301.0" text-anchor="end">10^6</text>
<line class="grid" x1="571" y1="271.5" x2="937" y2="271.5"/>
