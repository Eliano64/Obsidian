<polyline class="curve" points="91.0,450.0 102.8,434.6 114.6,425.7 126.4,419.3 138.2,414.4 150.0,410.3 161.8,406.9 173.6,403.9 185.5,401.3 197.3,399.0 209.1,396.9 220.9,395.0 232.7,393.2 244.5,391.5 256.3,390.0 268.1,388.6 279.9,387.2 291.7,386.0 303.5,384.8 315.3,383.6 327.1,382.6 338.9,381.5 350.7,380.6 362.5,379.6 374.4,378.7 386.2,377.8 398.0,377.0 409.8,376.2 421.6,375.4 433.4,374.7 445.2,373.9 457.0,373.2" stroke="var(--c3)"/>
