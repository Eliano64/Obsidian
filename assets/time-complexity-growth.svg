<polyline class="curve" points="91.0,450.0 102.8,403.9 114.6,377.0 126.4,357.9 138.2,343.1 150.0,330.9 161.8,320.7 173.6,311.8 185.5,304.0 197.3,297.0 209.1,290.7 220.9,284.9 232.7,279.6 244.5,274.6 256.3,270.1 268.1,265.8 279.9,261.7 291.7,257.9 303.5,254.4 315.3,250.9 327.1,247.7 338.9,244.6 350.7,241.7 362.5,238.8 374.4,236.1 386.2,233.5 398.0,231.0 409.8,228.6 421.6,226.3 433.4,224.0 445.2,221.8 457.0,219.7" stroke="var(--c6)"/>
<rect class="panel" x="515" y="95" width="450" height="420" rx="14"/>
<text class="panel-title" x="537" y="127">指数、阶乘与自幂：n = 1…10</text>
<line class="grid" x1="571" y1="450.0" x2="937" y2="450.0"/>
<text class="tick" x="562" y="454.0" text-anchor="end">1</text>
<line class="grid" x1="571" y1="424.5" x2="937" y2="424.5"/>
<text class="tick" x="562" y="428.5" text-anchor="end">10^1</text>
<line class="grid" x1="571" y1="399.0" x2="937" y2="399.0"/>
<text class="tick" x="562" y="403.0" text-anchor="end">10^2</text>
<line class="grid" x1="571" y1="373.5" x2="937" y2="373.5"/>
<text class="tick" x="562" y="377.5" text-anchor="end">10^3</text>
<line class="grid" x1="571" y1="348.0" x2="937" y2="348.0"/>
