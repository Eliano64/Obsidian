<text class="tick" x="82" y="454.0" text-anchor="end">1</text>
<line class="grid" x1="91" y1="399.0" x2="457" y2="399.0"/>
<text class="tick" x="82" y="403.0" text-anchor="end">10^1</text>
<line class="grid" x1="91" y1="348.0" x2="457" y2="348.0"/>
<text class="tick" x="82" y="352.0" text-anchor="end">10^2</text>
<line class="grid" x1="91" y1="297.0" x2="457" y2="297.0"/>
<text class="tick" x="82" y="301.0" text-anchor="end">10^3</text>
<line class="grid" x1="91" y1="246.0" x2="457" y2="246.0"/>
<text class="tick" x="82" y="250.0" text-anchor="end">10^4</text>
<line class="grid" x1="91" y1="195.0" x2="457" y2="195.0"/>
<text class="tick" x="82" y="199.0" text-anchor="end">10^5</text>
<line class="grid" x1="91.0" y1="195" x2="91.0" y2="450"/>
<text class="tick" x="91.0" y="470" text-anchor="middle">1</text>
<line class="grid" x1="268.1" y1="195" x2="268.1" y2="450"/>
<text class="tick" x="268.1" y="470" text-anchor="middle">16</text>
<line class="grid" x1="457.0" y1="195" x2="457.0" y2="450"/>
<text class="tick" x="457.0" y="470" text-anchor="middle">32</text>
<line class="axis" x1="91" y1="195" x2="91" y2="450"/>
<line class="axis" x1="91" y1="450" x2="457" y2="450"/>
<text class="tick" x="274.0" y="493" text-anchor="middle">问题规模 n</text>
<line x1="57" y1="150" x2="77" y2="150" stroke="var(--c1)" stroke-width="3"/>
<text class="legend" x="84" y="154">O(1)</text>
