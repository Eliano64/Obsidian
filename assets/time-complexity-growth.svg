<line class="grid" x1="571" y1="246.0" x2="937" y2="246.0"/>
<text class="tick" x="562" y="250.0" text-anchor="end">10^8</text>
<line class="grid" x1="571" y1="220.5" x2="937" y2="220.5"/>
<text class="tick" x="562" y="224.5" text-anchor="end">10^9</text>
<line class="grid" x1="571" y1="195.0" x2="937" y2="195.0"/>
<text class="tick" x="562" y="199.0" text-anchor="end">10^10</text>
<line class="grid" x1="571.0" y1="195" x2="571.0" y2="450"/>
<text class="tick" x="571.0" y="470" text-anchor="middle">1</text>
