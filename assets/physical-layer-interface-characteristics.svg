<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">物理层接口特性</title>
  <desc id="desc">展示机械、电气、功能、过程四种接口特性</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--blue-bg:#dbeafe;--green:#16a34a;--green-bg:#dcfce7;--amber:#d97706;--amber-bg:#fef3c7;--purple:#7c3aed;--purple-bg:#ede9fe}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--blue-bg:#1e3a8a;--green:#4ade80;--green-bg:#14532d;--amber:#fbbf24;--amber-bg:#713f12;--purple:#c4b5fd;--purple-bg:#4c1d95}}
    .bg{fill:var(--bg)}.hub{fill:var(--panel);stroke:var(--line);stroke-width:2.4}.card{stroke-width:2.2}.b{fill:var(--blue-bg);stroke:var(--blue)}.g{fill:var(--green-bg);stroke:var(--green)}.a{fill:var(--amber-bg);stroke:var(--amber)}.p{fill:var(--purple-bg);stroke:var(--purple)}.line{stroke:var(--line);stroke-width:2.2}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:22px;font-weight:700}.small{font-size:16px;fill:var(--muted)}
  </style>
  <rect class="bg" width="980" height="470"/>
  <text x="50" y="58" class="title">物理层接口的四类特性</text>
  <rect x="390" y="170" width="200" height="100" rx="12" class="hub"/>
  <text x="490" y="213" text-anchor="middle" class="label">接口</text>
  <text x="490" y="242" text-anchor="middle" class="small">设备连接到媒体</text>
  <line x1="390" y1="190" x2="250" y2="130" class="line"/>
  <line x1="590" y1="190" x2="730" y2="130" class="line"/>
  <line x1="390" y1="250" x2="250" y2="330" class="line"/>
  <line x1="590" y1="250" x2="730" y2="330" class="line"/>
  <rect x="80" y="90" width="250" height="90" rx="10" class="card b"/>
  <text x="205" y="125" text-anchor="middle" class="label">机械特性</text>
  <text x="205" y="153" text-anchor="middle" class="small">形状、尺寸、引脚数、排列</text>
  <rect x="650" y="90" width="250" height="90" rx="10" class="card g"/>
  <text x="775" y="125" text-anchor="middle" class="label">电气特性</text>
  <text x="775" y="153" text-anchor="middle" class="small">电压、阻抗、速率、距离</text>
  <rect x="80" y="300" width="250" height="90" rx="10" class="card a"/>
  <text x="205" y="335" text-anchor="middle" class="label">功能特性</text>
  <text x="205" y="363" text-anchor="middle" class="small">数据线、控制线、时钟线</text>
  <rect x="650" y="300" width="250" height="90" rx="10" class="card p"/>
  <text x="775" y="335" text-anchor="middle" class="label">过程特性</text>
  <text x="775" y="363" text-anchor="middle" class="small">信号线动作的先后顺序</text>
</svg>
