<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">TCP segment header</title>
  <desc id="desc">TCP header format with fixed 20 bytes and optional fields.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.box{fill:#f8fafc;stroke:#334155;stroke-width:2}.fixed{fill:#dbeafe}.ctl{fill:#fef3c7}.opt{fill:#dcfce7}.label{font-size:22px;font-weight:700}.small{font-size:14px}.mid{font-size:16px;font-weight:700}.code{font-family:Consolas,monospace;font-size:13px}
    @media(prefers-color-scheme:dark){text{fill:#e5e7eb}.box{fill:#111827;stroke:#94a3b8}.fixed{fill:#10213f}.ctl{fill:#3b2506}.opt{fill:#0f2b1d}}
  </style>
  <text x="520" y="38" text-anchor="middle" class="label">TCP 首部格式</text>
  <text x="160" y="80" class="small">每行 32 bit</text>
  <g transform="translate(160,100)">
    <rect x="0" y="0" width="360" height="54" class="box fixed"/><rect x="360" y="0" width="360" height="54" class="box fixed"/>
    <text x="180" y="33" text-anchor="middle" class="mid">源端口 16 bit</text><text x="540" y="33" text-anchor="middle" class="mid">目的端口 16 bit</text>
    <rect x="0" y="54" width="720" height="54" class="box fixed"/><text x="360" y="87" text-anchor="middle" class="mid">序号 seq 32 bit</text>
    <rect x="0" y="108" width="720" height="54" class="box fixed"/><text x="360" y="141" text-anchor="middle" class="mid">确认号 ack 32 bit</text>
    <rect x="0" y="162" width="90" height="54" class="box fixed"/><rect x="90" y="162" width="135" height="54" class="box fixed"/><rect x="225" y="162" width="135" height="54" class="box ctl"/><rect x="360" y="162" width="360" height="54" class="box fixed"/>
    <text x="45" y="186" text-anchor="middle" class="small">数据</text><text x="45" y="204" text-anchor="middle" class="small">偏移</text>
    <text x="157" y="195" text-anchor="middle" class="small">保留</text>
    <text x="292" y="187" text-anchor="middle" class="small">URG ACK PSH</text><text x="292" y="205" text-anchor="middle" class="small">RST SYN FIN</text>
    <text x="540" y="195" text-anchor="middle" class="mid">窗口 16 bit</text>
    <rect x="0" y="216" width="360" height="54" class="box fixed"/><rect x="360" y="216" width="360" height="54" class="box fixed"/>
    <text x="180" y="249" text-anchor="middle" class="mid">检验和 16 bit</text><text x="540" y="249" text-anchor="middle" class="mid">紧急指针 16 bit</text>
    <rect x="0" y="270" width="720" height="54" class="box opt"/><text x="360" y="303" text-anchor="middle" class="mid">选项 + 填充：0-40 B</text>
  </g>
  <text x="520" y="475" text-anchor="middle" class="small">固定首部 20 B；数据偏移字段指出首部长度，单位为 4 B</text>
</svg>
