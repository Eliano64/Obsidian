<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>vl calculation</title>
<style>
:root{--bg:#fff;--panel:#f8fafc;--text:#0f172a;--muted:#475569;--line:#94a3b8;--edge:#64748b;--hot:#2563eb;--done:#059669}@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--panel:#111827;--text:#f8fafc;--muted:#cbd5e1;--line:#64748b;--edge:#94a3b8;--hot:#60a5fa;--done:#34d399}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,sans-serif}.wrap{padding:18px;max-width:1120px;margin:auto}.top{display:flex;justify-content:space-between;gap:12px}.title{font-size:22px;font-weight:750}.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:7px 12px;border-radius:6px;cursor:pointer}.stage{display:grid;grid-template-columns:1fr .95fr;gap:16px;margin-top:14px}.card{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:14px}.note{color:var(--muted);line-height:1.65}.edge{stroke:var(--edge);stroke-width:3;marker-end:url(#arr)}.hotEdge{stroke:var(--hot);stroke-width:5;marker-end:url(#arrHot)}.node{fill:var(--bg);stroke:var(--edge);stroke-width:2}.done{fill:color-mix(in srgb,var(--done) 20%,var(--bg));stroke:var(--done);stroke-width:3}.hot{stroke:var(--hot);stroke-width:4}.label{fill:var(--text);font-weight:750;font-size:16px}.w{fill:var(--text);font-size:13px;font-weight:700}.tbl{width:100%;border-collapse:collapse;font-size:14px}.tbl td,.tbl th{border:1px solid var(--line);padding:7px;text-align:center}@media(max-width:760px){.stage{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><div class="top"><div><div class="title">按逆拓扑序列求 vl[]</div><div class="note" id="cap"></div></div><div><button class="btn" id="prev">上一页</button> <button class="btn" id="next">下一页</button></div></div><div class="stage"><div class="card" id="graph"></div><div class="card"><div class="note" id="txt"></div><h3>vl[]</h3><div id="table"></div></div></div></div>
<script>
const pos={1:[80,250],2:[250,140],3:[250,360],4:[440,250],5:[610,140],6:[780,250]};
const edges=[["a1",1,2,3],["a2",1,3,2],["a3",2,4,2],["a4",2,5,3],["a5",3,4,4],["a6",3,6,3],["a7",4,6,2],["a8",5,6,1]];
const steps=[
{cap:"逆拓扑序列：V6, V5, V4, V2, V3, V1",done:[],hot:[],vl:["-","-","-","-","-","-"],txt:"求 vl 必须从汇点向前推。"},
{cap:"V6 是汇点",done:[6],hot:[],vl:["-","-","-","-","-",8],txt:"vl(6)=ve(6)=8。"},
{cap:"计算 V5",done:[6,5],hot:["a8"],vl:["-","-","-","-",7,8],txt:"V5 的后继只有 V6：vl(5)=vl(6)-1=7。"},
{cap:"计算 V4",done:[6,5,4],hot:["a7"],vl:["-","-","-",6,7,8],txt:"V4 的后继是 V6：vl(4)=vl(6)-2=6。"},
{cap:"计算 V2",done:[6,5,4,2],hot:["a3","a4"],vl:["-",4,"-",6,7,8],txt:"V2 的后继是 V4、V5：min{vl(4)-2, vl(5)-3}=min{4,4}=4。"},
{cap:"计算 V3",done:[6,5,4,2,3],hot:["a5","a6"],vl:["-",4,2,6,7,8],txt:"V3 的后继是 V4、V6：min{vl(4)-4, vl(6)-3}=min{2,5}=2。"},
{cap:"计算 V1",done:[6,5,4,2,3,1],hot:["a1","a2"],vl:[0,4,2,6,7,8],txt:"V1 的后继是 V2、V3：min{vl(2)-3, vl(3)-2}=min{1,0}=0。"}
];
let i=0;function path(e){const a=pos[e[1]],b=pos[e[2]]; if(e[0]==="a6")return `M${a[0]+20} ${a[1]+20} C430 455 650 400 ${b[0]-24} ${b[1]+24}`; return `M${a[0]+25} ${a[1]} L${b[0]-25} ${b[1]}`}function mid(e){if(e[0]==="a6")return [540,410];const a=pos[e[1]],b=pos[e[2]];return [(a[0]+b[0])/2,(a[1]+b[1])/2-10]}
function render(){const s=steps[i];document.getElementById("cap").textContent=s.cap;document.getElementById("txt").textContent=s.txt;const lines=edges.map(e=>`<path class="${s.hot.includes(e[0])?'hotEdge':'edge'}" d="${path(e)}"/><text class="w" x="${mid(e)[0]}" y="${mid(e)[1]}">${e[0]}=${e[3]}</text>`).join("");const nodes=[1,2,3,4,5,6].map(v=>`<g><circle class="node ${s.done.includes(v)?'done':''} ${s.done[s.done.length-1]===v?'hot':''}" cx="${pos[v][0]}" cy="${pos[v][1]}" r="27"/><text class="label" x="${pos[v][0]}" y="${pos[v][1]+5}" text-anchor="middle">V${v}</text></g>`).join("");document.getElementById("graph").innerHTML=`<svg viewBox="0 0 860 500"><defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--edge)"/></marker><marker id="arrHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--hot)"/></marker></defs>${lines}${nodes}</svg>`;document.getElementById("table").innerHTML=`<table class="tbl"><tr>${[1,2,3,4,5,6].map(v=>`<th>V${v}</th>`).join("")}</tr><tr>${s.vl.map(x=>`<td>${x}</td>`).join("")}</tr></table>`}
document.getElementById("prev").onclick=()=>{i=(i+steps.length-1)%steps.length;render()};document.getElementById("next").onclick=()=>{i=(i+1)%steps.length;render()};render();
</script></body></html>
