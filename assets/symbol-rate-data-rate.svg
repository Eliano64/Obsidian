<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">码元速率与数据速率</title>
  <desc id="desc">展示波特率、每码元比特数和数据传输速率的关系</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--blue-bg:#dbeafe;--green:#16a34a;--green-bg:#dcfce7;--amber:#d97706;--amber-bg:#fef3c7}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--blue-bg:#1e3a8a;--green:#4ade80;--green-bg:#14532d;--amber:#fbbf24;--amber-bg:#713f12}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2.2}.blue{fill:var(--blue-bg);stroke:var(--blue)}.green{fill:var(--green-bg);stroke:var(--green)}.amber{fill:var(--amber-bg);stroke:var(--amber)}.arrow{fill:none;stroke:var(--line);stroke-width:2.4;marker-end:url(#arrow)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:21px;font-weight:700}.small{font-size:16px;fill:var(--muted)}.formula{font-size:25px;font-weight:700}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="430"/>
  <text x="50" y="58" class="title">码元速率和数据速率不是一回事</text>
  <rect x="70" y="118" width="235" height="110" rx="10" class="box blue"/>
  <text x="187" y="160" text-anchor="middle" class="label">码元速率 B</text>
  <text x="187" y="192" text-anchor="middle" class="small">每秒传输多少个码元</text>
  <text x="187" y="216" text-anchor="middle" class="small">单位：Baud</text>
  <path d="M320 173 H415" class="arrow"/>
  <rect x="435" y="118" width="215" height="110" rx="10" class="box amber"/>
  <text x="542" y="160" text-anchor="middle" class="label">每码元信息量</text>
  <text x="542" y="195" text-anchor="middle" class="formula">log₂M bit</text>
  <path d="M668 173 H755" class="arrow"/>
  <rect x="775" y="118" width="145" height="110" rx="10" class="box green"/>
  <text x="847" y="160" text-anchor="middle" class="label">速率 R</text>
  <text x="847" y="192" text-anchor="middle" class="small">每秒多少 bit</text>
  <text x="847" y="216" text-anchor="middle" class="small">单位：b/s</text>
  <rect x="260" y="292" width="460" height="72" rx="10" class="box"/>
  <text x="490" y="338" text-anchor="middle" class="formula">R = B × log₂M</text>
  <text x="490" y="390" text-anchor="middle" class="small">M 是可区分的码元状态数。二进制码元 M=2，因此 1 Baud = 1 b/s；四进制码元 M=4，因此 1 Baud = 2 b/s。</text>
</svg>
