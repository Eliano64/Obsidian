<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-label="CSMA CD争用期时空图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill:#172033; }
    .axis { stroke:#5f6d80; stroke-width:2.2; }
    .dataA { stroke:#3978d8; stroke-width:10; stroke-linecap:round; fill:none; }
    .dataB { stroke:#bf7a18; stroke-width:8; stroke-linecap:round; fill:none; }
    .jam { stroke:#d14343; stroke-width:10; stroke-linecap:round; fill:none; }
    .mark { stroke:#8a98aa; stroke-width:2; stroke-dasharray:8 7; }
    .dot { fill:#d14343; stroke:#fff; stroke-width:2; }
    .title { font-size:28px; font-weight:700; }
    .label { font-size:18px; font-weight:700; }
    .small { font-size:15px; }
    .muted { fill:#5d6b7e; }
    @media (prefers-color-scheme: dark) {
      text { fill:#e7edf7; }
      .muted { fill:#b6c2d2; }
      .axis { stroke:#a8b4c5; }
      .dataA { stroke:#7ab0ff; }
      .dataB { stroke:#ffd166; }
      .jam { stroke:#ff8585; }
      .mark { stroke:#90a0b6; }
      .dot { fill:#ff8585; stroke:#0b0f14; }
    }
  </style>
  <text x="520" y="42" text-anchor="middle" class="title">争用期：最坏情况下发送端约在 2τ 后检测到碰撞</text>
  <line x1="150" y1="130" x2="930" y2="130" class="axis"/>
  <line x1="150" y1="390" x2="930" y2="390" class="axis"/>
  <text x="104" y="136" text-anchor="end" class="label">站点 A</text>
  <text x="104" y="396" text-anchor="end" class="label">站点 B</text>
  <text x="944" y="136" class="small">t</text>
  <text x="944" y="396" class="small">t</text>
  <line x1="190" y1="95" x2="190" y2="430" class="mark"/>
  <line x1="560" y1="95" x2="560" y2="430" class="mark"/>
  <line x1="900" y1="95" x2="900" y2="430" class="mark"/>
  <path d="M190 130 L560 390" class="dataA"/>
  <path d="M545 390 L560 390" class="dataB"/>
  <path d="M560 390 L900 130" class="jam"/>
  <circle cx="560" cy="390" r="9" class="dot"/>
  <text x="190" y="80" text-anchor="middle" class="small">A 开始发送</text>
  <text x="560" y="80" text-anchor="middle" class="small">B 刚发送即碰撞</text>
  <text x="900" y="80" text-anchor="middle" class="small">A 检测到碰撞</text>
  <text x="346" y="282" text-anchor="middle" class="small">A 的信号传播到 B</text>
  <text x="620" y="424" class="small">碰撞点</text>
  <text x="744" y="282" text-anchor="middle" class="small">碰撞影响返回 A</text>
  <path d="M190 485 H900" stroke="#bf7a18" stroke-width="3"/>
  <path d="M190 485 l18 -8 v16 z" fill="#bf7a18"/>
  <path d="M900 485 l-18 -8 v16 z" fill="#bf7a18"/>
  <text x="545" y="518" text-anchor="middle" class="label">争用期 2τ</text>
  <text x="520" y="455" text-anchor="middle" class="small muted">红线表示“碰撞造成的异常信号/影响”返回发送端，不表示数据帧反向传输。</text>
</svg>
