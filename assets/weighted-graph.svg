<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Weighted graph</title>
  <desc id="desc">Examples of weighted graphs for distance and cost.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.edge{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.node{fill:#fff;stroke:#2563eb;stroke-width:3}.node2{fill:#fff;stroke:#16a34a;stroke-width:3}
    .text{fill:#0f172a;font-size:21px;font-weight:650}.small{fill:#334155;font-size:16px}.w{fill:#7c2d12;font-size:17px;font-weight:700}
    @media(prefers-color-scheme:dark){.panel{fill:#111827;stroke:#334155}.edge{stroke:#cbd5e1}.node,.node2{fill:#0b1220}.text{fill:#f8fafc}.small{fill:#cbd5e1}.w{fill:#fdba74}}
  </style>
  <rect class="panel" x="32" y="32" width="430" height="420" rx="10"/>
  <rect class="panel" x="518" y="32" width="430" height="420" rx="10"/>
  <text class="text" x="72" y="82">权值表示实际距离</text>
  <line class="edge" x1="130" y1="160" x2="265" y2="140"/><text class="w" x="190" y="132">50km</text>
  <line class="edge" x1="130" y1="160" x2="165" y2="310"/><text class="w" x="105" y="245">40km</text>
  <line class="edge" x1="265" y1="140" x2="350" y2="275"/><text class="w" x="318" y="195">70km</text>
  <line class="edge" x1="165" y1="310" x2="350" y2="275"/><text class="w" x="250" y="330">40km</text>
  <circle class="node" cx="130" cy="160" r="28"/><text class="text" x="119" y="168">P</text>
  <circle class="node" cx="265" cy="140" r="28"/><text class="text" x="253" y="148">G</text>
  <circle class="node" cx="165" cy="310" r="28"/><text class="text" x="154" y="318">R</text>
  <circle class="node" cx="350" cy="275" r="28"/><text class="text" x="339" y="283">Y</text>
  <text class="small" x="76" y="395">带权路径长度：路径上权值求和</text>

  <text class="text" x="558" y="82">权值表示高速费</text>
  <line class="edge" x1="615" y1="160" x2="750" y2="140"/><text class="w" x="675" y="132">30</text>
  <line class="edge" x1="615" y1="160" x2="650" y2="310"/><text class="w" x="594" y="245">20</text>
  <line class="edge" x1="750" y1="140" x2="835" y2="275"/><text class="w" x="802" y="195">40</text>
  <line class="edge" x1="650" y1="310" x2="835" y2="275"/><text class="w" x="735" y="330">0</text>
  <circle class="node2" cx="615" cy="160" r="28"/><text class="text" x="604" y="168">P</text>
  <circle class="node2" cx="750" cy="140" r="28"/><text class="text" x="738" y="148">G</text>
  <circle class="node2" cx="650" cy="310" r="28"/><text class="text" x="639" y="318">R</text>
  <circle class="node2" cx="835" cy="275" r="28"/><text class="text" x="824" y="283">Y</text>
  <text class="small" x="562" y="395">同一图结构，权值含义不同</text>
</svg>
