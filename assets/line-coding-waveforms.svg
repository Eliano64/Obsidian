<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="760" viewBox="0 0 1040 760" role="img" aria-labelledby="title desc">
  <title id="title">常用线路编码波形</title>
  <desc id="desc">展示 NRZ、NRZI、RZ、曼彻斯特、差分曼彻斯特编码波形，并标出码元边界和零电平</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{
      --bg:#ffffff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;
      --grid:#94a3b8;--zero:#64748b;--blue:#2563eb;--cyan:#0891b2;--green:#16a34a;
      --amber:#d97706;--purple:#7c3aed;--bit-bg:#eef2ff;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;
        --grid:#64748b;--zero:#cbd5e1;--blue:#60a5fa;--cyan:#22d3ee;--green:#4ade80;
        --amber:#fbbf24;--purple:#c4b5fd;--bit-bg:#1e1b4b;
      }
    }
    .bg{fill:var(--bg)}
    .panel{fill:var(--panel);stroke:var(--line);stroke-width:2}
    .boundary{stroke:var(--grid);stroke-width:1.6;stroke-dasharray:4 5;opacity:.9}
    .zero{stroke:var(--zero);stroke-width:1.8;stroke-dasharray:5 4;opacity:.95}
    .axis-label{font-size:12px;fill:var(--muted)}
    .nrz{fill:none;stroke:var(--blue);stroke-width:3.4;stroke-linejoin:round;stroke-linecap:round}
    .nrzi{fill:none;stroke:var(--cyan);stroke-width:3.4;stroke-linejoin:round;stroke-linecap:round}
    .rz{fill:none;stroke:var(--green);stroke-width:3.4;stroke-linejoin:round;stroke-linecap:round}
    .man{fill:none;stroke:var(--amber);stroke-width:3.4;stroke-linejoin:round;stroke-linecap:round}
    .diff{fill:none;stroke:var(--purple);stroke-width:3.4;stroke-linejoin:round;stroke-linecap:round}
    .bitbox{fill:var(--bit-bg);stroke:var(--grid);stroke-width:1}
    text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}
    .title{font-size:28px;font-weight:700}
    .label{font-size:18px;font-weight:700}
    .small{font-size:14px;fill:var(--muted)}
    .bit{font-size:20px;font-weight:700}
  </style>
  <rect class="bg" width="1040" height="760"/>
  <text x="48" y="54" class="title">常用编码方式波形示意</text>
  <text x="48" y="82" class="small">示例比特串：1 0 1 1 0 0 1 0。竖向虚线表示码元边界，横向虚线表示该行的零电平。</text>
  <rect x="52" y="108" width="936" height="590" rx="10" class="panel"/>

  <g transform="translate(330,130)">
    <g>
      <rect x="0" y="0" width="70" height="34" class="bitbox"/>
      <rect x="70" y="0" width="70" height="34" class="bitbox"/>
      <rect x="140" y="0" width="70" height="34" class="bitbox"/>
      <rect x="210" y="0" width="70" height="34" class="bitbox"/>
      <rect x="280" y="0" width="70" height="34" class="bitbox"/>
      <rect x="350" y="0" width="70" height="34" class="bitbox"/>
      <rect x="420" y="0" width="70" height="34" class="bitbox"/>
      <rect x="490" y="0" width="70" height="34" class="bitbox"/>
      <text x="-112" y="24" class="small">比特</text>
      <text x="35" y="24" text-anchor="middle" class="bit">1</text>
      <text x="105" y="24" text-anchor="middle" class="bit">0</text>
      <text x="175" y="24" text-anchor="middle" class="bit">1</text>
      <text x="245" y="24" text-anchor="middle" class="bit">1</text>
      <text x="315" y="24" text-anchor="middle" class="bit">0</text>
      <text x="385" y="24" text-anchor="middle" class="bit">0</text>
      <text x="455" y="24" text-anchor="middle" class="bit">1</text>
      <text x="525" y="24" text-anchor="middle" class="bit">0</text>
    </g>

    <g>
      <line x1="0" y1="42" x2="0" y2="500" class="boundary"/>
      <line x1="70" y1="42" x2="70" y2="500" class="boundary"/>
      <line x1="140" y1="42" x2="140" y2="500" class="boundary"/>
      <line x1="210" y1="42" x2="210" y2="500" class="boundary"/>
      <line x1="280" y1="42" x2="280" y2="500" class="boundary"/>
      <line x1="350" y1="42" x2="350" y2="500" class="boundary"/>
      <line x1="420" y1="42" x2="420" y2="500" class="boundary"/>
      <line x1="490" y1="42" x2="490" y2="500" class="boundary"/>
      <line x1="560" y1="42" x2="560" y2="500" class="boundary"/>
    </g>

    <g>
      <text x="-220" y="96" class="label">不归零 NRZ</text>
      <text x="-28" y="72" class="axis-label">高</text>
      <text x="-28" y="100" class="axis-label">0</text>
      <text x="-28" y="128" class="axis-label">低</text>
      <line x1="0" y1="100" x2="560" y2="100" class="zero"/>
      <polyline class="nrz" points="0,72 70,72 70,128 140,128 140,72 280,72 280,128 420,128 420,72 490,72 490,128 560,128"/>
    </g>

    <g>
      <text x="-250" y="196" class="label">反向不归零 NRZI</text>
      <text x="-28" y="172" class="axis-label">高</text>
      <text x="-28" y="200" class="axis-label">0</text>
      <text x="-28" y="228" class="axis-label">低</text>
      <line x1="0" y1="200" x2="560" y2="200" class="zero"/>
      <polyline class="nrzi" points="0,228 0,172 70,172 140,172 140,228 210,228 210,172 280,172 350,172 420,172 420,228 490,228 560,228"/>
    </g>

    <g>
      <text x="-220" y="296" class="label">归零 RZ</text>
      <text x="-28" y="272" class="axis-label">高</text>
      <text x="-28" y="300" class="axis-label">0</text>
      <text x="-28" y="328" class="axis-label">低</text>
      <line x1="0" y1="300" x2="560" y2="300" class="zero"/>
      <polyline class="rz" points="0,272 35,272 35,300 70,300 70,300 140,300 140,272 175,272 175,300 210,300 210,272 245,272 245,300 280,300 280,300 420,300 420,272 455,272 455,300 490,300 490,300 560,300"/>
    </g>

    <g>
      <text x="-220" y="396" class="label">曼彻斯特</text>
      <text x="-28" y="372" class="axis-label">高</text>
      <text x="-28" y="400" class="axis-label">0</text>
      <text x="-28" y="428" class="axis-label">低</text>
      <line x1="0" y1="400" x2="560" y2="400" class="zero"/>
      <polyline class="man" points="0,428 35,428 35,372 70,372 70,372 105,372 105,428 140,428 140,428 175,428 175,372 210,372 210,428 245,428 245,372 280,372 280,372 315,372 315,428 350,428 350,372 385,372 385,428 420,428 420,428 455,428 455,372 490,372 490,372 525,372 525,428 560,428"/>
    </g>

    <g>
      <text x="-250" y="496" class="label">差分曼彻斯特</text>
      <text x="-28" y="472" class="axis-label">高</text>
      <text x="-28" y="500" class="axis-label">0</text>
      <text x="-28" y="528" class="axis-label">低</text>
      <line x1="0" y1="500" x2="560" y2="500" class="zero"/>
      <polyline class="diff" points="0,472 35,472 35,528 70,528 70,472 105,472 105,528 140,528 140,528 175,528 175,472 210,472 210,472 245,472 245,528 280,528 280,472 315,472 315,528 350,528 350,472 385,472 385,528 420,528 420,528 455,528 455,472 490,472 490,472 525,472 525,528 560,528"/>
    </g>
  </g>

  <text x="520" y="730" text-anchor="middle" class="small">NRZI 与差分曼彻斯特都用“是否跳变”表达信息；具体 0/1 约定以题目或具体标准为准。</text>
</svg>
