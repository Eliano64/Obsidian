<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Optimal Merge Tree Process</title><style>
:root{color-scheme:light dark;--bg:#fff;--ink:#142033;--muted:#64748b;--line:#cbd5e1;--card:#f8fafc;--accent:#2563eb;--good:#16a34a}
@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--ink:#e5e7eb;--muted:#94a3b8;--line:#475569;--card:#111827;--accent:#60a5fa;--good:#4ade80}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1040px;margin:0 auto;padding:20px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.title{font-size:24px;font-weight:760}.sub{color:var(--muted);font-size:14px}.btns{display:flex;gap:8px}button{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:7px;padding:8px 12px;cursor:pointer}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-top:16px}.panel{border:1px solid var(--line);border-radius:8px;background:var(--card);padding:14px}.pool{display:flex;gap:8px;flex-wrap:wrap;min-height:46px}.node{min-width:48px;height:40px;border:1px solid var(--line);border-radius:7px;background:var(--bg);display:flex;align-items:center;justify-content:center;font:700 15px ui-monospace,Menlo,monospace}.pick{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent),transparent 75%)}.new{background:color-mix(in srgb,var(--good),transparent 84%)}.label{font-size:13px;color:var(--muted);margin:12px 0 6px}.explain{line-height:1.7;color:var(--muted);font-size:15px}.formula{margin-top:10px;border-left:3px solid var(--accent);padding:8px 10px;background:color-mix(in srgb,var(--accent),transparent 90%);font-family:ui-monospace,Menlo,monospace;white-space:pre-wrap}.step{margin-top:8px;color:var(--muted);font-size:13px}@media(max-width:840px){.grid,.top{display:block}.btns{margin-top:10px}}
</style></head><body><main class="wrap"><div class="top"><div><div class="title">最佳归并树：每次合并最小权值</div><div class="sub">权值表示归并段长度，目标是最小化带权路径长度</div></div><div class="btns"><button id="prev">上一步</button><button id="next">下一步</button></div></div><section class="grid"><div class="panel"><div class="label">当前归并段权值</div><div class="pool" id="pool"></div><div class="label">已进行的归并</div><div id="merges"></div></div><div class="panel"><div class="explain" id="text"></div><div class="formula" id="formula"></div><div class="step" id="step"></div></div></section></main><script>
const steps=[
{pool:[[2,'pick'],[3,'pick'],[6,''],[9,'']],merges:[],t:'二路最佳归并树每次选两个最小权值的归并段先归并。',f:'初始权值：2, 3, 6, 9'},
{pool:[[5,'new'],[6,'pick'],[9,'']],merges:['2 + 3 = 5'],t:'2 和 3 先归并，得到新权值 5。下一步从 5、6、9 中继续选最小的两个。',f:'WPL 累加：5'},
{pool:[[9,'pick'],[11,'new']],merges:['2 + 3 = 5','5 + 6 = 11'],t:'5 和 6 归并，得到 11。剩下 9 和 11。',f:'WPL 累加：5 + 11'},
{pool:[[20,'new']],merges:['2 + 3 = 5','5 + 6 = 11','9 + 11 = 20'],t:'最后 9 和 11 归并，得到最终有序文件。',f:'WPL = 5 + 11 + 20 = 36\\n读次数=36，写次数=36，总 I/O=72'},
{pool:[[0,'pick'],[4,'pick'],[5,'pick'],[6,''],[9,''],[12,'']],merges:['三路归并若叶子数不合适，需要补权值为 0 的虚段'],t:'k 路最佳归并树必须是严格 k 叉树。若 (r-1) mod (k-1) 不为 0，需要补虚段。',f:'r=5,k=3: (5-1) mod 2 = 0，不补\\nr=6,k=3: (6-1) mod 2 = 1，补 1 个虚段'}
];let cur=0;
function render(){const s=steps[cur];document.getElementById('pool').innerHTML=s.pool.map(([v,c])=>`<div class="node ${c}">${v}</div>`).join('');document.getElementById('merges').innerHTML=s.merges.map(m=>`<div class="node new" style="width:max-content;padding:0 12px;margin:6px 0">${m}</div>`).join('');document.getElementById('text').textContent=s.t;document.getElementById('formula').textContent=s.f;document.getElementById('step').textContent=(cur+1)+' / '+steps.length}
document.getElementById('prev').onclick=()=>{cur=(cur+steps.length-1)%steps.length;render()};document.getElementById('next').onclick=()=>{cur=(cur+1)%steps.length;render()};render();
</script></body></html>
