<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="CSMA CD and CSMA CA comparison">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    svg { background: transparent; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    .title { fill: #111827; font-size: 26px; font-weight: 700; }
    .h { fill: #0f172a; font-size: 22px; font-weight: 700; }
    .txt { fill: #334155; font-size: 18px; }
    .small { fill: #475569; font-size: 15px; }
    .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
    .wire { stroke: #2563eb; stroke-width: 8; stroke-linecap: round; }
    .radio { stroke: #ef4444; stroke-width: 3; fill: none; }
    .node { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
    .warn { fill: #fff7ed; stroke: #f97316; stroke-width: 2; }
    .ok { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; }
    @media (prefers-color-scheme: dark) {
      .title,.h { fill: #f8fafc; }
      .txt { fill: #cbd5e1; }
      .small { fill: #94a3b8; }
      .panel { fill: #0f172a; stroke: #475569; }
      .wire { stroke: #60a5fa; }
      .radio { stroke: #f87171; }
      .node { fill: #111827; stroke: #94a3b8; }
      .warn { fill: #431407; stroke: #fb923c; }
      .ok { fill: #052e1b; stroke: #34d399; }
    }
  </style>

  <text x="550" y="44" text-anchor="middle" class="title">为什么 802.11 使用 CSMA/CA，而不是 CSMA/CD</text>

  <rect x="55" y="82" width="480" height="390" rx="18" class="panel"/>
  <text x="295" y="124" text-anchor="middle" class="h">共享式有线以太网：检测碰撞</text>
  <line x1="115" y1="250" x2="475" y2="250" class="wire"/>
  <circle cx="165" cy="250" r="30" class="node"/>
  <circle cx="425" cy="250" r="30" class="node"/>
  <text x="165" y="257" text-anchor="middle" class="txt">A</text>
  <text x="425" y="257" text-anchor="middle" class="txt">B</text>
  <path d="M188 238 C255 205 335 205 402 238" stroke="#16a34a" stroke-width="4" fill="none"/>
  <path d="M188 262 C255 295 335 295 402 262" stroke="#f97316" stroke-width="4" fill="none"/>
  <rect x="112" y="325" width="365" height="86" rx="12" class="ok"/>
  <text x="294" y="354" text-anchor="middle" class="txt">站点边发送边监听介质</text>
  <text x="294" y="383" text-anchor="middle" class="txt">检测到碰撞后停止发送并退避</text>

  <rect x="565" y="82" width="480" height="390" rx="18" class="panel"/>
  <text x="805" y="124" text-anchor="middle" class="h">802.11 无线局域网：避免碰撞</text>
  <circle cx="680" cy="255" r="31" class="node"/>
  <circle cx="925" cy="255" r="31" class="node"/>
  <circle cx="805" cy="210" r="36" fill="#2563eb" stroke="#0f172a" stroke-width="2"/>
  <text x="680" y="262" text-anchor="middle" class="txt">A</text>
  <text x="925" y="262" text-anchor="middle" class="txt">B</text>
  <text x="805" y="217" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">AP</text>
  <path d="M714 246 Q805 170 891 246" class="radio"/>
  <path d="M705 270 Q805 330 905 270" class="radio" stroke-dasharray="8 7"/>
  <rect x="622" y="325" width="365" height="86" rx="12" class="warn"/>
  <text x="805" y="354" text-anchor="middle" class="txt">发送中很难可靠检测碰撞</text>
  <text x="805" y="383" text-anchor="middle" class="txt">用 DIFS、退避、ACK、NAV、RTS/CTS 降低碰撞概率</text>

  <text x="550" y="525" text-anchor="middle" class="small">CD：Collision Detection，碰撞检测；CA：Collision Avoidance，碰撞避免。</text>
</svg>
