<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Huffman coding example tree</title>
  <desc id="desc">A Huffman tree for C 80, A 10, B 8, and D 2, with branch labels and resulting codes.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root {
      color-scheme: light dark;
      --bg: transparent;
      --fg: #111827;
      --muted: #475569;
      --line: #334155;
      --node: #ffffff;
      --leaf: #e0f2fe;
      --accent: #2563eb;
      --code: #166534;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e5e7eb;
        --muted: #cbd5e1;
        --line: #94a3b8;
        --node: #0f172a;
        --leaf: #123247;
        --accent: #60a5fa;
        --code: #86efac;
      }
    }
    text {
      fill: var(--fg);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .muted { fill: var(--muted); font-size: 18px; }
    .edge { stroke: var(--line); stroke-width: 3; fill: none; }
    .node { fill: var(--node); stroke: var(--line); stroke-width: 3; }
    .leaf { fill: var(--leaf); stroke: var(--accent); stroke-width: 3; }
    .weight { font-size: 24px; font-weight: 700; text-anchor: middle; }
    .label { font-size: 19px; text-anchor: middle; }
    .bit { fill: var(--accent); font-size: 20px; font-weight: 700; text-anchor: middle; }
    .code { fill: var(--code); font-size: 20px; font-weight: 700; }
    .box { fill: var(--node); stroke: var(--line); stroke-width: 2; rx: 10; }
  </style>

  <text x="40" y="42" font-size="26" font-weight="700">哈夫曼编码例题：字符频度  C=80, A=10, B=8, D=2</text>
  <text x="40" y="74" class="muted">约定：左分支记 0，右分支记 1；从根到叶子的路径就是该字符编码。</text>

  <line class="edge" x1="410" y1="120" x2="230" y2="220"/>
  <line class="edge" x1="410" y1="120" x2="585" y2="220"/>
  <text class="bit" x="302" y="164">0</text>
  <text class="bit" x="507" y="164">1</text>

  <line class="edge" x1="585" y1="220" x2="475" y2="325"/>
  <line class="edge" x1="585" y1="220" x2="710" y2="325"/>
  <text class="bit" x="525" y="270">0</text>
  <text class="bit" x="654" y="270">1</text>

  <line class="edge" x1="710" y1="325" x2="635" y2="425"/>
  <line class="edge" x1="710" y1="325" x2="790" y2="425"/>
  <text class="bit" x="666" y="377">0</text>
  <text class="bit" x="755" y="377">1</text>

  <circle class="node" cx="410" cy="120" r="38"/>
  <text class="weight" x="410" y="128">100</text>

  <circle class="leaf" cx="230" cy="220" r="42"/>
  <text class="weight" x="230" y="214">C</text>
  <text class="label" x="230" y="241">80</text>

  <circle class="node" cx="585" cy="220" r="36"/>
  <text class="weight" x="585" y="228">20</text>

  <circle class="leaf" cx="475" cy="325" r="40"/>
  <text class="weight" x="475" y="319">A</text>
  <text class="label" x="475" y="344">10</text>

  <circle class="node" cx="710" cy="325" r="34"/>
  <text class="weight" x="710" y="333">10</text>

  <circle class="leaf" cx="635" cy="425" r="38"/>
  <text class="weight" x="635" y="419">D</text>
  <text class="label" x="635" y="443">2</text>

  <circle class="leaf" cx="790" cy="425" r="38"/>
  <text class="weight" x="790" y="419">B</text>
  <text class="label" x="790" y="443">8</text>

  <rect class="box" x="40" y="325" width="300" height="150"/>
  <text x="64" y="360" font-size="21" font-weight="700">编码对应关系</text>
  <text x="64" y="395" class="code">C: 0</text>
  <text x="64" y="425" class="code">A: 10</text>
  <text x="64" y="455" class="code">D: 110</text>
  <text x="190" y="455" class="code">B: 111</text>
</svg>
