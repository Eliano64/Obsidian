<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Mobile IP terms</title>
  <desc id="desc">Mobile IP home network, home agent, foreign network, foreign agent, care-of address, and correspondent host.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.net{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12}.home{fill:#eff6ff}.foreign{fill:#f0fdf4}.node{fill:#fff;stroke:#475569;stroke-width:2;rx:8}.line{stroke:#64748b;stroke-width:2.5}.label{font-size:20px;font-weight:700}.small{font-size:15px}@media(prefers-color-scheme:dark){text{fill:#e5e7eb}.net{fill:#111827;stroke:#94a3b8}.home{fill:#10213f}.foreign{fill:#0f2b1d}.node{fill:#0b1220;stroke:#cbd5e1}.line{stroke:#94a3b8}}</style>
  <text x="490" y="38" text-anchor="middle" class="label">移动 IP 术语关系</text>
  <rect x="65" y="85" width="370" height="245" class="net home"/><text x="250" y="120" text-anchor="middle" class="label">归属网络</text>
  <rect x="115" y="170" width="130" height="60" class="node"/><text x="180" y="195" text-anchor="middle" class="small">归属代理</text><text x="180" y="216" text-anchor="middle" class="small">Home Agent</text>
  <rect x="275" y="170" width="120" height="60" class="node"/><text x="335" y="195" text-anchor="middle" class="small">归属地址</text><text x="335" y="216" text-anchor="middle" class="small">永久地址</text>
  <rect x="545" y="85" width="370" height="245" class="net foreign"/><text x="730" y="120" text-anchor="middle" class="label">外地网络</text>
  <rect x="585" y="170" width="130" height="60" class="node"/><text x="650" y="195" text-anchor="middle" class="small">外地代理</text><text x="650" y="216" text-anchor="middle" class="small">Foreign Agent</text>
  <rect x="750" y="170" width="120" height="60" class="node"/><text x="810" y="195" text-anchor="middle" class="small">移动主机</text><text x="810" y="216" text-anchor="middle" class="small">仍用归属地址</text>
  <line x1="245" y1="200" x2="275" y2="200" class="line"/><line x1="715" y1="200" x2="750" y2="200" class="line"/>
  <text x="730" y="275" text-anchor="middle" class="small">转交地址通常是外地代理地址，用作隧道终点</text>
  <text x="250" y="275" text-anchor="middle" class="small">发往永久地址的分组先路由到归属网络</text>
</svg>
