<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">Connected components and strongly connected components</title>
  <desc id="desc">Examples of maximal connected subgraphs and maximal strongly connected subgraphs.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    .group1{fill:#dbeafe;stroke:#60a5fa;stroke-width:2;opacity:.45}
    .group2{fill:#dcfce7;stroke:#4ade80;stroke-width:2;opacity:.45}
    .group3{fill:#fee2e2;stroke:#f87171;stroke-width:2;opacity:.45}
    .edge{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}
    .arc{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    .node{fill:#ffffff;stroke:#2563eb;stroke-width:3}
    .text{fill:#0f172a;font-size:21px;font-weight:650}
    .small{fill:#334155;font-size:17px}
    .label{fill:#0f172a;font-size:17px;font-weight:650}
    @media (prefers-color-scheme: dark){
      .panel{fill:#111827;stroke:#334155}
      .group1{fill:#1d4ed8;stroke:#60a5fa;opacity:.25}
      .group2{fill:#15803d;stroke:#4ade80;opacity:.25}
      .group3{fill:#b91c1c;stroke:#f87171;opacity:.25}
      .edge,.arc{stroke:#cbd5e1}
      .node{fill:#0b1220}
      .text{fill:#f8fafc}
      .small{fill:#cbd5e1}
      .label{fill:#f8fafc}
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="panel" x="28" y="28" width="445" height="484" rx="10"/>
  <rect class="panel" x="508" y="28" width="445" height="484" rx="10"/>

  <text class="text" x="64" y="76">无向图：连通分量</text>
  <ellipse class="group1" cx="175" cy="220" rx="105" ry="115"/>
  <ellipse class="group2" cx="350" cy="260" rx="70" ry="85"/>
  <line class="edge" x1="125" y1="170" x2="205" y2="145"/>
  <line class="edge" x1="125" y1="170" x2="165" y2="265"/>
  <line class="edge" x1="205" y1="145" x2="235" y2="250"/>
  <line class="edge" x1="165" y1="265" x2="235" y2="250"/>
  <line class="edge" x1="330" y1="225" x2="380" y2="285"/>
  <circle class="node" cx="125" cy="170" r="23"/><text class="label" x="118" y="176">A</text>
  <circle class="node" cx="205" cy="145" r="23"/><text class="label" x="198" y="151">B</text>
  <circle class="node" cx="165" cy="265" r="23"/><text class="label" x="158" y="271">C</text>
  <circle class="node" cx="235" cy="250" r="23"/><text class="label" x="228" y="256">D</text>
  <circle class="node" cx="330" cy="225" r="23"/><text class="label" x="323" y="231">E</text>
  <circle class="node" cx="380" cy="285" r="23"/><text class="label" x="373" y="291">F</text>
  <text class="small" x="70" y="405">每个阴影块是一个极大连通子图</text>
  <text class="small" x="70" y="438">不能再加入块外顶点而保持连通</text>

  <text class="text" x="544" y="76">有向图：强连通分量</text>
  <ellipse class="group1" cx="650" cy="210" rx="90" ry="95"/>
  <ellipse class="group2" cx="815" cy="285" rx="92" ry="90"/>
  <ellipse class="group3" cx="820" cy="145" rx="42" ry="40"/>
  <path class="arc" d="M610 170 C640 132, 690 132, 712 172"/>
  <path class="arc" d="M712 198 C700 250, 640 270, 608 220"/>
  <path class="arc" d="M605 214 C590 188, 592 178, 608 170"/>
  <path class="arc" d="M780 255 C810 220, 860 230, 875 270"/>
  <path class="arc" d="M872 305 C842 342, 790 330, 765 292"/>
  <path class="arc" d="M742 210 C770 220, 788 230, 800 250"/>
  <path class="arc" d="M820 170 C824 205, 823 226, 818 245"/>
  <circle class="node" cx="615" cy="170" r="23"/><text class="label" x="608" y="176">A</text>
  <circle class="node" cx="715" cy="185" r="23"/><text class="label" x="708" y="191">B</text>
  <circle class="node" cx="610" cy="225" r="23"/><text class="label" x="603" y="231">C</text>
  <circle class="node" cx="765" cy="285" r="23"/><text class="label" x="758" y="291">D</text>
  <circle class="node" cx="880" cy="290" r="23"/><text class="label" x="873" y="296">E</text>
  <circle class="node" cx="815" cy="250" r="23"/><text class="label" x="808" y="256">F</text>
  <circle class="node" cx="820" cy="145" r="23"/><text class="label" x="813" y="151">G</text>
  <text class="small" x="548" y="405">强连通分量内部任意两点双向可达</text>
  <text class="small" x="548" y="438">单向可达关系不能把两个分量合并</text>
</svg>
