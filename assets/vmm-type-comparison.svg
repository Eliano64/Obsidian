<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">第一类与第二类 VMM 架构对比</title>
  <desc id="desc">第一类 VMM 直接位于硬件之上，第二类 VMM 依赖宿主操作系统。两种结构的客户操作系统都运行在虚拟机中。</desc>
  <style>
    svg{background:#f8fafc}
    @media(prefers-color-scheme:dark){svg{background:#0b1020}}
    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#94a3b8;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--purple:#7c3aed;--orange:#d97706;--cyan:#0891b2;--soft-blue:#eff6ff;--soft-green:#ecfdf5;--soft-purple:#f5f3ff;--soft-orange:#fff7ed;--soft-gray:#f1f5f9}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#64748b;--panel:#111827;--blue:#60a5fa;--green:#34d399;--purple:#a78bfa;--orange:#fbbf24;--cyan:#22d3ee;--soft-blue:#13233d;--soft-green:#102c26;--soft-purple:#241b3d;--soft-orange:#332411;--soft-gray:#172033}}
    .bg{fill:var(--bg)}
    .panel{fill:var(--panel);stroke:var(--line);stroke-width:2}
    .vm{fill:var(--bg);stroke:var(--blue);stroke-width:2}
    .vm2{fill:var(--bg);stroke:var(--green);stroke-width:2}
    .apps{fill:var(--soft-blue);stroke:var(--blue);stroke-width:1.4}
    .guest{fill:var(--soft-purple);stroke:var(--purple);stroke-width:1.4}
    .virtual{fill:var(--soft-green);stroke:var(--green);stroke-width:1.4}
    .vmm{fill:var(--soft-green);stroke:var(--green);stroke-width:2.5}
    .hosted{fill:var(--soft-blue);stroke:var(--blue);stroke-width:2.2}
    .hostapps{fill:var(--soft-orange);stroke:var(--orange);stroke-width:2}
    .hostos{fill:var(--soft-purple);stroke:var(--purple);stroke-width:2.5}
    .hardware{fill:var(--soft-gray);stroke:var(--line);stroke-width:2.2}
    .t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}
    .m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}
    .connector{stroke:var(--line);stroke-width:3;fill:none;marker-end:url(#arrow)}
    .direct{stroke:var(--green);stroke-width:4;fill:none;marker-end:url(#green-arrow)}
    .host-path{stroke:var(--blue);stroke-width:4;fill:none;marker-end:url(#blue-arrow)}
    .badge1{fill:var(--green)}
    .badge2{fill:var(--blue)}
  </style>
  <defs>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="var(--line)"/></marker>
    <marker id="green-arrow" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="var(--green)"/></marker>
    <marker id="blue-arrow" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="var(--blue)"/></marker>
  </defs>

  <rect class="bg" width="1000" height="620"/>
  <text class="t" x="500" y="34" text-anchor="middle" font-size="25" font-weight="700">第一类与第二类 VMM：区别在于是否依赖 Host OS</text>

  <rect class="panel" x="24" y="56" width="462" height="545" rx="14"/>
  <circle class="badge1" cx="57" cy="88" r="17"/>
  <text x="57" y="94" text-anchor="middle" font-size="17" font-weight="700" fill="#fff" font-family="Arial">1</text>
  <text class="t" x="84" y="95" font-size="21" font-weight="700">第一类 VMM</text>
  <text class="m" x="457" y="93" text-anchor="end" font-size="14">Bare-metal</text>

  <rect class="vm" x="52" y="119" width="195" height="190" rx="10"/>
  <text class="t" x="149" y="143" text-anchor="middle" font-size="16" font-weight="700">虚拟机 VM1</text>
  <rect class="apps" x="66" y="154" width="167" height="39" rx="6"/>
  <text class="t" x="149" y="179" text-anchor="middle" font-size="14">应用进程</text>
  <rect class="guest" x="66" y="200" width="167" height="48" rx="6"/>
  <text class="t" x="149" y="221" text-anchor="middle" font-size="15" font-weight="700">Guest OS</text>
  <text class="m" x="149" y="240" text-anchor="middle" font-size="12">客户内核与用户空间</text>
  <rect class="virtual" x="66" y="255" width="167" height="39" rx="6"/>
  <text class="t" x="149" y="280" text-anchor="middle" font-size="13">vCPU · vMem · vI/O</text>

  <rect class="vm2" x="263" y="119" width="195" height="190" rx="10"/>
  <text class="t" x="360" y="143" text-anchor="middle" font-size="16" font-weight="700">虚拟机 VM2</text>
  <rect class="apps" x="277" y="154" width="167" height="39" rx="6"/>
  <text class="t" x="360" y="179" text-anchor="middle" font-size="14">应用进程</text>
  <rect class="guest" x="277" y="200" width="167" height="48" rx="6"/>
  <text class="t" x="360" y="221" text-anchor="middle" font-size="15" font-weight="700">Guest OS</text>
  <text class="m" x="360" y="240" text-anchor="middle" font-size="12">可与 VM1 不同</text>
  <rect class="virtual" x="277" y="255" width="167" height="39" rx="6"/>
  <text class="t" x="360" y="280" text-anchor="middle" font-size="13">vCPU · vMem · vI/O</text>

  <path class="connector" d="M149 309 V330"/>
  <path class="connector" d="M360 309 V330"/>
  <rect class="vmm" x="52" y="337" width="406" height="86" rx="10"/>
  <text class="t" x="255" y="370" text-anchor="middle" font-size="18" font-weight="700">第一类 VMM / Hypervisor</text>
  <text class="m" x="255" y="397" text-anchor="middle" font-size="14">直接调度 vCPU、映射内存、仲裁 I/O</text>
  <path class="direct" d="M255 423 V449"/>
  <rect class="hardware" x="52" y="456" width="406" height="61" rx="9"/>
  <text class="t" x="255" y="482" text-anchor="middle" font-size="17" font-weight="700">物理硬件</text>
  <text class="m" x="255" y="504" text-anchor="middle" font-size="13">CPU · 主存 · 磁盘 · 网卡</text>
  <text class="t" x="255" y="548" text-anchor="middle" font-size="15" font-weight="700">VMM 直接拥有物理资源的最终控制权</text>
  <text class="m" x="255" y="573" text-anchor="middle" font-size="13">常用于服务器、云平台和数据中心</text>

  <rect class="panel" x="514" y="56" width="462" height="545" rx="14"/>
  <circle class="badge2" cx="547" cy="88" r="17"/>
  <text x="547" y="94" text-anchor="middle" font-size="17" font-weight="700" fill="#fff" font-family="Arial">2</text>
  <text class="t" x="574" y="95" font-size="21" font-weight="700">第二类 VMM</text>
  <text class="m" x="947" y="93" text-anchor="end" font-size="14">Hosted</text>

  <rect class="vm" x="542" y="119" width="195" height="190" rx="10"/>
  <text class="t" x="639" y="143" text-anchor="middle" font-size="16" font-weight="700">虚拟机 VM1</text>
  <rect class="apps" x="556" y="154" width="167" height="39" rx="6"/>
  <text class="t" x="639" y="179" text-anchor="middle" font-size="14">应用进程</text>
  <rect class="guest" x="556" y="200" width="167" height="48" rx="6"/>
  <text class="t" x="639" y="221" text-anchor="middle" font-size="15" font-weight="700">Guest OS</text>
  <text class="m" x="639" y="240" text-anchor="middle" font-size="12">运行在虚拟硬件上</text>
  <rect class="virtual" x="556" y="255" width="167" height="39" rx="6"/>
  <text class="t" x="639" y="280" text-anchor="middle" font-size="13">vCPU · vMem · vI/O</text>

  <rect class="vm2" x="753" y="119" width="195" height="190" rx="10"/>
  <text class="t" x="850" y="143" text-anchor="middle" font-size="16" font-weight="700">虚拟机 VM2</text>
  <rect class="apps" x="767" y="154" width="167" height="39" rx="6"/>
  <text class="t" x="850" y="179" text-anchor="middle" font-size="14">应用进程</text>
  <rect class="guest" x="767" y="200" width="167" height="48" rx="6"/>
  <text class="t" x="850" y="221" text-anchor="middle" font-size="15" font-weight="700">Guest OS</text>
  <text class="m" x="850" y="240" text-anchor="middle" font-size="12">运行在虚拟硬件上</text>
  <rect class="virtual" x="767" y="255" width="167" height="39" rx="6"/>
  <text class="t" x="850" y="280" text-anchor="middle" font-size="13">vCPU · vMem · vI/O</text>

  <path class="connector" d="M639 309 V330"/>
  <path class="connector" d="M850 309 V330"/>
  <rect class="hosted" x="542" y="337" width="195" height="72" rx="9"/>
  <text class="t" x="639" y="365" text-anchor="middle" font-size="16" font-weight="700">VMM 用户态组件</text>
  <text class="m" x="639" y="390" text-anchor="middle" font-size="13">管理与设备模拟</text>
  <rect class="hostapps" x="753" y="337" width="195" height="72" rx="9"/>
  <text class="t" x="850" y="365" text-anchor="middle" font-size="16" font-weight="700">宿主应用进程</text>
  <text class="m" x="850" y="390" text-anchor="middle" font-size="13">与 VMM 竞争资源</text>
  <path class="host-path" d="M639 409 V424"/>
  <path class="connector" d="M850 409 V424"/>
  <rect class="hostos" x="542" y="431" width="406" height="70" rx="9"/>
  <text class="t" x="745" y="459" text-anchor="middle" font-size="17" font-weight="700">宿主操作系统 Host OS</text>
  <text class="m" x="745" y="484" text-anchor="middle" font-size="13">内核 · 设备驱动 · VMM 内核模块</text>
  <path class="host-path" d="M745 501 V516"/>
  <rect class="hardware" x="542" y="517" width="406" height="54" rx="9"/>
  <text class="t" x="745" y="541" text-anchor="middle" font-size="17" font-weight="700">物理硬件</text>
  <text class="m" x="745" y="562" text-anchor="middle" font-size="13">CPU · 主存 · 磁盘 · 网卡</text>
  <text class="m" x="745" y="590" text-anchor="middle" font-size="13">VMM 依赖 Host OS 的资源管理和设备驱动</text>
</svg>
