<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">调幅 调频 调相</title>
  <desc id="desc">展示三种基本带通调制方式</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--green:#16a34a;--amber:#d97706}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--green:#4ade80;--amber:#fbbf24}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.axis{stroke:var(--line);stroke-width:1.4}.am{fill:none;stroke:var(--blue);stroke-width:3}.fm{fill:none;stroke:var(--green);stroke-width:3}.pm{fill:none;stroke:var(--amber);stroke-width:3}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:22px;font-weight:700}.small{font-size:16px;fill:var(--muted)}
  </style>
  <rect class="bg" width="980" height="500"/>
  <text x="50" y="58" class="title">基本带通调制</text>
  <rect x="55" y="100" width="270" height="310" rx="10" class="panel"/>
  <text x="190" y="138" text-anchor="middle" class="label">调幅 AM</text>
  <line x1="90" y1="250" x2="290" y2="250" class="axis"/>
  <path class="am" d="M90 250 C100 205 110 205 120 250 S140 295 150 250 S170 218 180 250 S200 282 210 250 S230 198 240 250 S260 302 270 250 S288 220 295 250"/>
  <text x="190" y="350" text-anchor="middle" class="small">改变载波振幅</text>
  <rect x="355" y="100" width="270" height="310" rx="10" class="panel"/>
  <text x="490" y="138" text-anchor="middle" class="label">调频 FM</text>
  <line x1="390" y1="250" x2="590" y2="250" class="axis"/>
  <path class="fm" d="M390 250 C400 220 410 220 420 250 S440 280 450 250 S470 220 480 250 S493 280 500 250 S513 220 520 250 S533 280 540 250 S553 220 560 250 S580 280 590 250"/>
  <text x="490" y="350" text-anchor="middle" class="small">改变载波频率</text>
  <rect x="655" y="100" width="270" height="310" rx="10" class="panel"/>
  <text x="790" y="138" text-anchor="middle" class="label">调相 PM</text>
  <line x1="690" y1="250" x2="890" y2="250" class="axis"/>
  <path class="pm" d="M690 250 C700 220 710 220 720 250 S740 280 750 250 S770 220 780 250 M780 250 C790 280 800 280 810 250 S830 220 840 250 S860 280 870 250 S885 224 890 250"/>
  <text x="790" y="350" text-anchor="middle" class="small">改变载波相位</text>
</svg>
