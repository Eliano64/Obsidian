<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">导引型传输媒体结构对比</title>
  <desc id="desc">展示双绞线、同轴电缆和光纤的结构特点</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--copper:#b45309;--copper2:#16a34a;--shield:#64748b;--fiber:#2563eb;--fiber-bg:#dbeafe;--cladding:#bfdbfe;--light:#f59e0b;--green:#16a34a}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--copper:#f59e0b;--copper2:#4ade80;--shield:#94a3b8;--fiber:#60a5fa;--fiber-bg:#1e3a8a;--cladding:#1d4ed8;--light:#fbbf24;--green:#4ade80}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.wireA{fill:none;stroke:var(--copper);stroke-width:7;stroke-linecap:round}.wireB{fill:none;stroke:var(--copper2);stroke-width:7;stroke-linecap:round}.jacket{fill:none;stroke:var(--line);stroke-width:1.6;stroke-dasharray:6 7;opacity:.65}.shield{fill:none;stroke:var(--shield);stroke-width:12}.clad{fill:var(--cladding);stroke:var(--fiber);stroke-width:2.5}.core{fill:var(--fiber-bg);stroke:var(--fiber);stroke-width:2}.ray{fill:none;stroke:var(--light);stroke-width:3.2;stroke-linejoin:round;marker-end:url(#lightArrow)}.labelLine{stroke:var(--line);stroke-width:1.8;marker-end:url(#arrow)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:21px;font-weight:700}.small{font-size:15px;fill:var(--muted)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker>
    <marker id="lightArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--light)"/></marker>
  </defs>
  <rect class="bg" width="980" height="520"/>
  <text x="50" y="58" class="title">导引型传输媒体结构对比</text>
  <rect x="55" y="105" width="270" height="340" rx="10" class="panel"/>
  <text x="190" y="140" text-anchor="middle" class="label">双绞线</text>
  <ellipse cx="190" cy="258" rx="102" ry="58" class="jacket"/>
  <path d="M100 258 C122 210 148 210 170 258 S218 306 240 258 S274 210 286 244" class="wireA"/>
  <path d="M100 258 C122 306 148 306 170 258 S218 210 240 258 S274 306 286 272" class="wireB"/>
  <circle cx="170" cy="258" r="7" fill="var(--panel)" stroke="var(--line)" stroke-width="1.2"/>
  <circle cx="240" cy="258" r="7" fill="var(--panel)" stroke="var(--line)" stroke-width="1.2"/>
  <text x="190" y="352" text-anchor="middle" class="small">两根绝缘铜线按一定密度绞合</text>
  <text x="190" y="379" text-anchor="middle" class="small">让外界干扰尽量相互抵消</text>
  <rect x="355" y="105" width="270" height="340" rx="10" class="panel"/>
  <text x="490" y="140" text-anchor="middle" class="label">同轴电缆</text>
  <circle cx="490" cy="255" r="78" fill="none" stroke="var(--shield)" stroke-width="14"/>
  <circle cx="490" cy="255" r="40" fill="none" stroke="var(--line)" stroke-width="18" opacity=".35"/>
  <circle cx="490" cy="255" r="10" fill="var(--copper)"/>
  <text x="490" y="365" text-anchor="middle" class="small">共轴结构，抗干扰较强</text>
  <text x="490" y="392" text-anchor="middle" class="small">中心为内导体，外层为屏蔽层</text>
  <rect x="655" y="105" width="270" height="340" rx="10" class="panel"/>
  <text x="790" y="140" text-anchor="middle" class="label">光纤</text>
  <rect x="695" y="210" width="190" height="88" rx="44" class="clad"/>
  <rect x="712" y="237" width="156" height="34" rx="17" class="core"/>
  <path d="M720 254 L750 238 L790 270 L830 238 L860 254" class="ray"/>
  <text x="790" y="326" text-anchor="middle" class="small">外层包层折射率较低</text>
  <text x="790" y="353" text-anchor="middle" class="small">光在纤芯边界发生全反射</text>
  <text x="790" y="380" text-anchor="middle" class="small">容量大，抗电磁干扰强</text>
</svg>
