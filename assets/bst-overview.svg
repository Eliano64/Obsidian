<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">Binary Search Tree Overview</title>
  <desc id="desc">Binary search tree example with left subtree keys less than root and right subtree keys greater than root.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.node{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.8}.sub{fill:#f1f5f9;stroke:#94a3b8;stroke-dasharray:6 5;stroke-width:1.5}.line{stroke:#64748b;stroke-width:1.8;fill:none}.text{fill:#0f172a;font-family:Arial,"Microsoft YaHei",sans-serif}.muted{fill:#475569;font-family:Arial,"Microsoft YaHei",sans-serif}.accent{fill:#2563eb}
    @media(prefers-color-scheme:dark){.bg{fill:#0b1020}.panel{fill:#111827;stroke:#334155}.node{fill:#172554;stroke:#38bdf8}.sub{fill:#0f172a;stroke:#64748b}.line{stroke:#94a3b8}.text{fill:#e5e7eb}.muted{fill:#cbd5e1}.accent{fill:#60a5fa}}
  </style>
  <rect class="bg" width="1080" height="620"/>
  <rect class="panel" x="24" y="24" width="1032" height="572" rx="10"/>
  <text class="text" x="52" y="66" font-size="26" font-weight="700">二叉排序树：左 &lt; 根 &lt; 右</text>
  <text class="muted" x="52" y="98" font-size="16">任一结点都满足：左子树所有关键字小于该结点，右子树所有关键字大于该结点；左右子树也分别是 BST。</text>

  <rect class="sub" x="90" y="170" width="360" height="330" rx="18"/>
  <rect class="sub" x="630" y="170" width="360" height="330" rx="18"/>
  <text class="accent" x="190" y="532" font-size="18" font-weight="700">left subtree: all keys &lt; 50</text>
  <text class="accent" x="714" y="532" font-size="18" font-weight="700">right subtree: all keys &gt; 50</text>

  <path class="line" d="M540 150 L330 250 M540 150 L750 250"/>
  <path class="line" d="M330 250 L230 350 M330 250 L420 350"/>
  <path class="line" d="M750 250 L660 350 M750 250 L850 350"/>
  <path class="line" d="M420 350 L370 450 M420 350 L470 450"/>
  <path class="line" d="M850 350 L800 450 M850 350 L900 450"/>

  <circle class="node" cx="540" cy="150" r="30"/><text class="text" x="524" y="157" font-size="19" font-weight="700">50</text>
  <circle class="node" cx="330" cy="250" r="30"/><text class="text" x="314" y="257" font-size="19" font-weight="700">26</text>
  <circle class="node" cx="750" cy="250" r="30"/><text class="text" x="734" y="257" font-size="19" font-weight="700">66</text>
  <circle class="node" cx="230" cy="350" r="28"/><text class="text" x="214" y="357" font-size="18" font-weight="700">21</text>
  <circle class="node" cx="420" cy="350" r="28"/><text class="text" x="404" y="357" font-size="18" font-weight="700">30</text>
  <circle class="node" cx="660" cy="350" r="28"/><text class="text" x="644" y="357" font-size="18" font-weight="700">60</text>
  <circle class="node" cx="850" cy="350" r="28"/><text class="text" x="834" y="357" font-size="18" font-weight="700">70</text>
  <circle class="node" cx="370" cy="450" r="26"/><text class="text" x="354" y="457" font-size="17" font-weight="700">28</text>
  <circle class="node" cx="470" cy="450" r="26"/><text class="text" x="454" y="457" font-size="17" font-weight="700">35</text>
  <circle class="node" cx="800" cy="450" r="26"/><text class="text" x="784" y="457" font-size="17" font-weight="700">68</text>
  <circle class="node" cx="900" cy="450" r="26"/><text class="text" x="884" y="457" font-size="17" font-weight="700">75</text>

  <text class="muted" x="382" y="574" font-size="17">中序遍历：21, 26, 28, 30, 35, 50, 60, 66, 68, 70, 75</text>
</svg>
