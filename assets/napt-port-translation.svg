<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="430" viewBox="0 0 1050 430" role="img" aria-labelledby="title desc"><title id="title">NAPT 端口号转换</title><desc id="desc">NAPT 同时改写 IP 地址和运输层端口号，让多台内部主机共享一个公网地址。</desc><style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}
:root{color-scheme:light dark}.bg{fill:#f8fafc}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:18px}.small{fill:#334155;font-size:15px}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.in{fill:#dcfce7}.out{fill:#dbeafe}.nat{fill:#fed7aa}.line{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}.label{fill:#0369a1;font-weight:700}@media(prefers-color-scheme:dark){.bg{fill:#020617}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.box{fill:#0f172a;stroke:#334155}.in{fill:#052e16}.out{fill:#172554}.nat{fill:#431407}.line{stroke:#94a3b8}.label{fill:#67e8f9}}</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker></defs><rect class="bg" width="1050" height="430"/><text class="text" x="525" y="42" text-anchor="middle" font-size="25" font-weight="700">NAPT：用端口号区分共享同一公网地址的内部连接</text><rect class="box in" x="80" y="115" width="270" height="72" rx="8"/><text class="small" x="215" y="145" text-anchor="middle">192.168.0.2:5001</text><text class="small" x="215" y="170" text-anchor="middle">→ 198.51.100.7:80</text><rect class="box in" x="80" y="230" width="270" height="72" rx="8"/><text class="small" x="215" y="260" text-anchor="middle">192.168.0.3:5001</text><text class="small" x="215" y="285" text-anchor="middle">→ 198.51.100.7:80</text><rect class="box nat" x="445" y="150" width="160" height="120" rx="12"/><text class="text" x="525" y="218" text-anchor="middle">NAPT</text><rect class="box out" x="700" y="115" width="270" height="72" rx="8"/><text class="small" x="835" y="145" text-anchor="middle">203.0.113.8:40001</text><text class="small" x="835" y="170" text-anchor="middle">→ 198.51.100.7:80</text><rect class="box out" x="700" y="230" width="270" height="72" rx="8"/><text class="small" x="835" y="260" text-anchor="middle">203.0.113.8:40002</text><text class="small" x="835" y="285" text-anchor="middle">→ 198.51.100.7:80</text><line class="line" x1="350" y1="151" x2="445" y2="185"/><line class="line" x1="350" y1="266" x2="445" y2="235"/><line class="line" x1="605" y1="185" x2="700" y2="151"/><line class="line" x1="605" y1="235" x2="700" y2="266"/><text class="label" x="525" y="365" text-anchor="middle">同一个公网 IP 可通过不同外部端口映射到不同内部连接</text></svg>
