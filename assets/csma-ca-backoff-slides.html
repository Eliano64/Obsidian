<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSMA CA Backoff Timer</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #94a3b8;
      --border: #cbd5e1;
      --blue: #2563eb;
      --green: #059669;
      --orange: #ea580c;
      --red: #dc2626;
      --violet: #7c3aed;
      --busy: #f87171;
      --idle: #34d399;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --panel: #0f172a;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --line: #64748b;
        --border: #475569;
        --blue: #60a5fa;
        --green: #34d399;
        --orange: #fb923c;
        --red: #f87171;
        --violet: #a78bfa;
        --busy: #f87171;
        --idle: #34d399;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
    }
    .wrap {
      width: min(1100px, 100vw);
      margin: 0 auto;
      padding: 18px 24px 14px;
    }
    h1 {
      margin: 0 0 14px;
      text-align: center;
      font-size: 28px;
      letter-spacing: 0;
    }
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 18px;
      align-items: stretch;
    }
    .steps {
      display: grid;
      gap: 9px;
    }
    .step {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 92%, var(--blue));
      padding: 10px 12px;
      min-height: 62px;
    }
    .step.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--blue) 28%, transparent);
    }
    .step b {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }
    .step span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .stage {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 10px;
      min-height: 455px;
    }
    svg {
      display: block;
      width: 100%;
      height: 345px;
    }
    .caption {
      margin: 8px auto 0;
      max-width: 790px;
      min-height: 42px;
      text-align: center;
      color: var(--text);
      font-size: 18px;
      line-height: 1.55;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 12px;
    }
    button {
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { border-color: var(--blue); }
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .steps { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CSMA/CA 退避计时器</h1>
    <div class="layout">
      <div class="steps" id="steps"></div>
      <div class="stage">
        <svg viewBox="0 0 760 345" aria-label="CSMA CA backoff process">
          <defs>
            <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
              <path d="M2,2 L10,6 L2,10 Z" fill="var(--blue)"></path>
            </marker>
          </defs>

          <line x1="70" y1="92" x2="700" y2="92" stroke="var(--line)" stroke-width="2"/>
          <line x1="70" y1="212" x2="700" y2="212" stroke="var(--line)" stroke-width="2"/>
          <text x="30" y="99" fill="var(--text)" font-size="17" font-weight="700">信道</text>
          <text x="18" y="219" fill="var(--text)" font-size="17" font-weight="700">计时器</text>
          <text x="714" y="97" fill="var(--text)" font-size="16">t</text>
          <text x="714" y="217" fill="var(--text)" font-size="16">t</text>

          <g id="busy1" opacity="0">
            <rect x="95" y="66" width="132" height="52" rx="8" fill="var(--busy)" opacity=".28" stroke="var(--busy)" stroke-width="2"/>
            <text x="161" y="98" text-anchor="middle" fill="var(--red)" font-size="16" font-weight="700">忙</text>
          </g>
          <g id="difs1" opacity="0">
            <rect x="228" y="66" width="78" height="52" rx="8" fill="var(--orange)" opacity=".22" stroke="var(--orange)" stroke-width="2"/>
            <text x="267" y="98" text-anchor="middle" fill="var(--orange)" font-size="15" font-weight="700">DIFS</text>
          </g>
          <g id="slots1" opacity="0">
            <rect x="307" y="66" width="64" height="52" rx="8" fill="var(--idle)" opacity=".18" stroke="var(--idle)" stroke-width="2"/>
            <rect x="372" y="66" width="64" height="52" rx="8" fill="var(--idle)" opacity=".18" stroke="var(--idle)" stroke-width="2"/>
            <text x="339" y="98" text-anchor="middle" fill="var(--green)" font-size="15" font-weight="700">slot</text>
            <text x="404" y="98" text-anchor="middle" fill="var(--green)" font-size="15" font-weight="700">slot</text>
          </g>
          <g id="busy2" opacity="0">
            <rect x="437" y="66" width="94" height="52" rx="8" fill="var(--busy)" opacity=".28" stroke="var(--busy)" stroke-width="2"/>
            <text x="484" y="98" text-anchor="middle" fill="var(--red)" font-size="16" font-weight="700">忙</text>
          </g>
          <g id="difs2" opacity="0">
            <rect x="532" y="66" width="78" height="52" rx="8" fill="var(--orange)" opacity=".22" stroke="var(--orange)" stroke-width="2"/>
            <text x="571" y="98" text-anchor="middle" fill="var(--orange)" font-size="15" font-weight="700">DIFS</text>
          </g>
          <g id="slot2" opacity="0">
            <rect x="611" y="66" width="64" height="52" rx="8" fill="var(--idle)" opacity=".18" stroke="var(--idle)" stroke-width="2"/>
            <text x="643" y="98" text-anchor="middle" fill="var(--green)" font-size="15" font-weight="700">slot</text>
          </g>
          <g id="send" opacity="0">
            <path d="M676 92 L710 92" stroke="var(--blue)" stroke-width="5" marker-end="url(#arrow)"/>
            <text x="692" y="68" text-anchor="middle" fill="var(--blue)" font-size="15" font-weight="700">发送</text>
          </g>

          <g id="choose" opacity="0">
            <rect x="96" y="160" width="190" height="44" rx="8" fill="var(--violet)" opacity=".18" stroke="var(--violet)" stroke-width="2"/>
            <text x="191" y="188" text-anchor="middle" fill="var(--violet)" font-size="16" font-weight="700">随机选择 r = 3 个时隙</text>
          </g>
          <g id="count2" opacity="0">
            <rect x="307" y="188" width="64" height="48" rx="8" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
            <rect x="372" y="188" width="64" height="48" rx="8" fill="var(--panel)" stroke="var(--border)" stroke-width="2"/>
            <text x="339" y="218" text-anchor="middle" fill="var(--text)" font-size="18" font-weight="700">2</text>
            <text x="404" y="218" text-anchor="middle" fill="var(--text)" font-size="18" font-weight="700">1</text>
          </g>
          <g id="freeze" opacity="0">
            <rect x="437" y="188" width="94" height="48" rx="8" fill="var(--busy)" opacity=".18" stroke="var(--busy)" stroke-width="2"/>
            <text x="484" y="218" text-anchor="middle" fill="var(--red)" font-size="16" font-weight="700">冻结 1</text>
          </g>
          <g id="resume" opacity="0">
            <rect x="532" y="188" width="78" height="48" rx="8" fill="var(--orange)" opacity=".18" stroke="var(--orange)" stroke-width="2"/>
            <text x="571" y="218" text-anchor="middle" fill="var(--orange)" font-size="15" font-weight="700">等 DIFS</text>
          </g>
          <g id="zero" opacity="0">
            <rect x="611" y="188" width="64" height="48" rx="8" fill="var(--green)" opacity=".18" stroke="var(--green)" stroke-width="2"/>
            <text x="643" y="218" text-anchor="middle" fill="var(--green)" font-size="18" font-weight="700">0</text>
          </g>

          <g id="window" opacity="0">
            <rect x="150" y="274" width="470" height="44" rx="9" fill="none" stroke="var(--border)" stroke-width="2"/>
            <text x="385" y="302" text-anchor="middle" fill="var(--muted)" font-size="16">示例：CW 中随机抽到 r=3；只在空闲 slot 中倒计时，忙态不倒计时</text>
          </g>
        </svg>
        <div class="caption" id="caption"></div>
      </div>
    </div>
    <div class="controls">
      <button id="prev" type="button">上一步</button>
      <button id="next" type="button">下一步</button>
    </div>
  </div>
  <script>
    const slides = [
      {
        title: "1. 信道忙",
        nav: "先等信道从忙变空闲。",
        body: "站点有帧要发，但检测到信道忙。此时不能发送，也不启动退避倒计时，只等待信道变为空闲。",
        show: ["busy1"]
      },
      {
        title: "2. 等待 DIFS",
        nav: "空闲后先等 DIFS。",
        body: "信道变为空闲后，站点必须连续等待一个 DIFS。若 DIFS 期间又变忙，就重新等待。",
        show: ["busy1", "difs1"]
      },
      {
        title: "3. 选择随机值",
        nav: "从 CW 中抽 r=3。",
        body: "DIFS 结束后，站点从争用窗口 CW 中随机选择一个整数。这里示例抽到 r=3，表示还要等 3 个空闲时隙。",
        show: ["busy1", "difs1", "choose", "window"]
      },
      {
        title: "4. 空闲时倒计时",
        nav: "每个空闲 slot 减 1。",
        body: "信道保持空闲时，退避计时器按时隙倒计时。经过两个空闲时隙后，计数从 3 减到 1。",
        show: ["busy1", "difs1", "slots1", "choose", "count2", "window"]
      },
      {
        title: "5. 信道忙则冻结",
        nav: "忙态期间保持剩余值。",
        body: "如果倒计时过程中其他站点开始发送，信道变忙，退避计时器冻结。这里剩余值 1 不清零，也不继续减少。",
        show: ["busy1", "difs1", "slots1", "busy2", "choose", "count2", "freeze", "window"]
      },
      {
        title: "6. 重新等待 DIFS",
        nav: "再次空闲后先等 DIFS。",
        body: "信道再次空闲后，站点不能马上继续倒计时，而是先重新等待 DIFS，然后从冻结的剩余值继续。",
        show: ["busy1", "difs1", "slots1", "busy2", "difs2", "choose", "count2", "freeze", "resume", "window"]
      },
      {
        title: "7. 归零发送",
        nav: "剩余 slot 倒完后发送。",
        body: "重新等待 DIFS 后，再经过一个空闲时隙，计时器从 1 减到 0。站点获得发送机会，开始发送数据帧。",
        show: ["busy1", "difs1", "slots1", "busy2", "difs2", "slot2", "send", "choose", "count2", "freeze", "resume", "zero", "window"]
      }
    ];

    const params = new URLSearchParams(location.search);
    let index = Number(params.get("step") || 0);
    if (!Number.isInteger(index) || index < 0 || index >= slides.length) index = 0;
    const steps = document.getElementById("steps");
    slides.forEach((s, i) => {
      const div = document.createElement("div");
      div.className = "step";
      div.innerHTML = `<b>${s.title}</b><span>${s.nav}</span>`;
      div.addEventListener("click", () => { index = i; render(); });
      steps.appendChild(div);
    });

    function render() {
      const ids = ["busy1", "difs1", "slots1", "busy2", "difs2", "slot2", "send", "choose", "count2", "freeze", "resume", "zero", "window"];
      for (const id of ids) {
        document.getElementById(id).style.opacity = slides[index].show.includes(id) ? "1" : "0";
      }
      document.getElementById("caption").textContent = slides[index].body;
      document.querySelectorAll(".step").forEach((el, i) => el.classList.toggle("active", i === index));
    }
    document.getElementById("prev").addEventListener("click", () => {
      index = (index + slides.length - 1) % slides.length;
      render();
    });
    document.getElementById("next").addEventListener("click", () => {
      index = (index + 1) % slides.length;
      render();
    });
    render();
  </script>
</body>
</html>
