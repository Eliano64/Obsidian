<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="720" viewBox="0 0 1040 720" role="img">
  <title>TCP fast retransmit and fast recovery — Reno vs Tahoe</title>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}
    .t{font-size:22px;font-weight:700;fill:#111827}
    .sh{font-size:16px;font-weight:700;fill:#111827}
    .ss{font-size:12px;fill:#4b5563}
    .sm{font-size:14px;font-weight:700;fill:#111827}
    .sw{font-size:13px;font-weight:700;fill:#fff}
    .box{fill:#fff;stroke:#d1d5db;stroke-width:1.5}
    .axis{stroke:#9ca3af;stroke-width:1.5}
    .grid{stroke:#e5e7eb;stroke-width:0.8;stroke-dasharray:4,4}
    .f-blue{fill:#eff6ff;stroke:#2563eb;stroke-width:1.5}
    .f-green{fill:#ecfdf5;stroke:#059669;stroke-width:1.5}
    .f-red{fill:#fef2f2;stroke:#dc2626;stroke-width:1.5}
    .f-amber{fill:#fff7ed;stroke:#d97706;stroke-width:1.5}
    .tag-b{fill:#2563eb}
    .tag-g{fill:#059669}
    .tag-r{fill:#dc2626}
    .tag-a{fill:#d97706}
    .tag-p{fill:#7c3aed}
    @media(prefers-color-scheme:dark){
      .t,.sh,.sm{fill:#e5e7eb}
      .ss{fill:#9ca3af}
      .box{fill:#111827;stroke:#374151}
      .axis{stroke:#4b5563}
      .grid{stroke:#1f2937}
      .f-blue{fill:#0f1d33;stroke:#1e40af}
      .f-green{fill:#0a1e14;stroke:#047857}
      .f-red{fill:#2e0a0a;stroke:#991b1b}
      .f-amber{fill:#2a1f06;stroke:#92400e}
      .tag-b{fill:#1d4ed8}
      .tag-g{fill:#047857}
      .tag-r{fill:#b91c1c}
      .tag-a{fill:#b45309}
      .tag-p{fill:#6d28d9}
    }
  </style>

  <text x="520" y="34" text-anchor="middle" class="t">TCP 快重传与快恢复 — Reno 版本 vs Tahoe 版本（cwnd 变化对比）</text>

  <!-- ===== TOP: Fast Retransmit mechanism ===== -->
  <text x="520" y="68" text-anchor="middle" class="sh" fill="#dc2626">快重传机制：3 个重复 ACK → 立即重传</text>

  <!-- Sender side -->
  <rect x="20" y="82" width="480" height="100" rx="5" class="box"/>
  <text x="260" y="104" text-anchor="middle" class="sh" fill="#2563eb">发送方 A</text>
  <text x="260" y="124" text-anchor="middle" class="ss">连续发送 M1, M2, M3, M4, M5, M6...</text>
  <text x="260" y="144" text-anchor="middle" class="ss">收到 ACK(M1), ACK(M2)</text>
  <text x="260" y="164" text-anchor="middle" class="ss">然后连续收到 3 个 ACK(M2) → <tspan fill="#dc2626" font-weight="700">立即重传 M3！</tspan></text>

  <!-- Receiver side -->
  <rect x="540" y="82" width="480" height="100" rx="5" class="box"/>
  <text x="780" y="104" text-anchor="middle" class="sh" fill="#059669">接收方 B</text>
  <text x="780" y="124" text-anchor="middle" class="ss">收到 M1 → ACK(M2)</text>
  <text x="780" y="144" text-anchor="middle" class="ss">收到 M2 → ACK(M3)</text>
  <text x="780" y="164" text-anchor="middle" class="ss">M3 丢失！收到 M4 → 重复 ACK(M3)  ·  收到 M5 → 重复 ACK(M3)  ·  收到 M6 → 重复 ACK(M3)</text>

  <!-- Dup ACK counter -->
  <rect x="410" y="108" width="72" height="62" rx="4" class="f-red" stroke-width="1"/>
  <text x="446" y="127" text-anchor="middle" class="ss">重复 ACK</text>
  <text x="446" y="149" text-anchor="middle" class="sh" style="font-size:18px;fill:#dc2626;">×3</text>
  <text x="446" y="164" text-anchor="middle" class="ss">立即重传</text>

  <!-- ===== BOTTOM: cwnd curve comparison ===== -->
  <text x="520" y="212" text-anchor="middle" class="t">cwnd 变化对比：Tahoe（超时重传） vs Reno（快重传 + 快恢复）</text>

  <!-- Plot area -->
  <rect x="80" y="230" width="880" height="340" rx="4" fill="none" stroke="#d1d5db" stroke-width="1"/>
  <line x1="80" y1="550" x2="940" y2="550" class="axis"/>
  <line x1="80" y1="250" x2="80" y2="550" class="axis"/>

  <!-- Y labels -->
  <text x="72" y="554" text-anchor="end" class="ss">0</text>
  <text x="72" y="518" text-anchor="end" class="ss">4</text>
  <text x="72" y="482" text-anchor="end" class="ss">8</text>
  <text x="72" y="446" text-anchor="end" class="ss">12</text>
  <text x="72" y="410" text-anchor="end" class="ss">16</text>
  <text x="72" y="374" text-anchor="end" class="ss">20</text>
  <text x="72" y="338" text-anchor="end" class="ss">24</text>

  <line x1="82" y1="518" x2="940" y2="518" class="grid"/>
  <line x1="82" y1="482" x2="940" y2="482" class="grid"/>
  <line x1="82" y1="446" x2="940" y2="446" class="grid"/>
  <line x1="82" y1="410" x2="940" y2="410" class="grid"/>
  <line x1="82" y1="374" x2="940" y2="374" class="grid"/>
  <line x1="82" y1="338" x2="940" y2="338" class="grid"/>

  <!-- X labels for key events -->
  <text x="150" y="568" text-anchor="middle" class="ss">慢开始</text>
  <text x="300" y="568" text-anchor="middle" class="ss">拥塞避免</text>
  <text x="520" y="568" text-anchor="middle" class="ss">3 dup ACK</text>
  <text x="720" y="568" text-anchor="middle" class="ss">拥塞避免（续）</text>

  <!-- === LEGEND === -->
  <rect x="600" y="250" width="330" height="62" rx="5" class="box"/>
  <line x1="620" y1="270" x2="650" y2="270" stroke="#dc2626" stroke-width="3"/><text x="658" y="274" class="ss">Tahoe 版本 (cwnd→1)</text>
  <line x1="620" y1="296" x2="650" y2="296" stroke="#7c3aed" stroke-width="3"/><text x="658" y="300" class="ss">Reno 版本 (cwnd→ssthresh/2+3)</text>

  <!-- === Common path: slow start + congestion avoidance === -->
  <!-- y(cwnd) = 550 - cwnd * (300/24) = 550 - cwnd*12.5 -->
  <!-- x slightly different spacing. Let me use typical coordinates. -->
  <!-- Slow start: cwnd 1→2→4→8→16 (ssthresh=16) -->
  <!-- r0: cwnd=1 → (110,538), r1: cwnd=2 → (138,525), r2: cwnd=4 → (166,500), r3: cwnd=8 → (194,450), r4: cwnd=16 → (222,350) -->

  <polyline points="110,538 138,525 166,500 194,450 222,350" stroke="#059669" stroke-width="3" fill="none"/>
  <circle cx="110" cy="538" r="3" fill="#059669"/><circle cx="138" cy="525" r="3" fill="#059669"/><circle cx="166" cy="500" r="3" fill="#059669"/><circle cx="194" cy="450" r="3" fill="#059669"/><circle cx="222" cy="350" r="4" fill="#059669"/>

  <!-- Congestion avoidance: 16→17→18→19→20→21→22→23→24 -->
  <!-- r5:cwnd=17→(250,338), r6:18→(278,325), r7:19→(306,313), r8:20→(334,300), r9:21→(362,288), r10:22→(390,275), r11:23→(418,263), r12:24→(446,250) -->

  <polyline points="222,350 250,338 278,325 306,313 334,300 362,288 390,275 418,263 446,250" stroke="#2563eb" stroke-width="3" fill="none"/>
  <circle cx="250" cy="338" r="3" fill="#2563eb"/><circle cx="278" cy="325" r="3" fill="#2563eb"/><circle cx="306" cy="313" r="3" fill="#2563eb"/><circle cx="334" cy="300" r="3" fill="#2563eb"/><circle cx="362" cy="288" r="3" fill="#2563eb"/><circle cx="390" cy="275" r="3" fill="#2563eb"/><circle cx="418" cy="263" r="3" fill="#2563eb"/><circle cx="446" cy="250" r="4" fill="#2563eb"/>

  <text x="222" y="340" text-anchor="middle" class="ss" fill="#d97706">ssthresh=16</text>

  <!-- 3 dup ACK event marker -->
  <line x1="448" y1="235" x2="448" y2="560" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="403" y="235" width="90" height="22" rx="3" class="tag-r"/>
  <text x="448" y="250" text-anchor="middle" class="sw" style="font-size:10px;">3 dup ACK</text>

  <!-- === Tahoe path (RED): cwnd drops to 1, slow start again === -->
  <line x1="446" y1="250" x2="480" y2="538" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,3" fill="none"/>
  <circle cx="480" cy="538" r="4" fill="#dc2626"/>
  <text x="480" y="558" text-anchor="middle" class="ss" fill="#dc2626">Tahoe: cwnd→1</text>

  <!-- Tahoe: slow start 1→2→4→8→12(=ssthresh) -->
  <polyline points="480,538 508,525 536,500 564,450 592,400" stroke="#dc2626" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <circle cx="508" cy="525" r="3" fill="#dc2626"/><circle cx="536" cy="500" r="3" fill="#dc2626"/><circle cx="564" cy="450" r="3" fill="#dc2626"/><circle cx="592" cy="400" r="4" fill="#dc2626"/>
  <!-- then congestion avoidance -->
  <polyline points="592,400 620,388 648,375 676,363" stroke="#dc2626" stroke-width="2" fill="none" stroke-dasharray="6,3"/>

  <rect x="500" y="425" width="112" height="40" rx="4" class="f-red"/>
  <text x="556" y="441" text-anchor="middle" class="ss" style="font-size:10px;">重新慢开始</text>
  <text x="556" y="457" text-anchor="middle" class="ss" style="font-size:10px;">效率大幅下降</text>

  <!-- ssthresh line -->
  <line x1="82" y1="400" x2="750" y2="400" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="300" y="393" class="ss" fill="#d97706">新 ssthresh = 12</text>

  <!-- === Reno path (PURPLE): fast recovery === -->
  <!-- ssthresh = cwnd/2 = 12, cwnd = ssthresh + 3 = 15 (for 3 dup ACKs) → 450 -->
  <line x1="446" y1="250" x2="490" y2="362" stroke="#7c3aed" stroke-width="3" fill="none"/>

  <rect x="455" y="290" width="120" height="52" rx="4" class="f-blue"/>
  <text x="515" y="308" text-anchor="middle" class="sh" fill="#7c3aed" style="font-size:12px;">快恢复</text>
  <text x="515" y="326" text-anchor="middle" class="ss" style="font-size:10px;">ssthresh ← 12</text>
  <text x="515" y="340" text-anchor="middle" class="ss" style="font-size:10px;">cwnd ← ssthresh + 3</text>

  <circle cx="490" cy="362" r="4" fill="#7c3aed"/>

  <!-- Fast recovery: each dup ACK → cwnd += 1, until new ACK arrives -->
  <!-- Then cwnd = ssthresh, enter congestion avoidance -->
  <line x1="490" y1="362" x2="520" y2="400" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>

  <!-- After new ACK: cwnd = ssthresh = 12, congestion avoidance -->
  <text x="528" y="420" class="ss" fill="#7c3aed" style="font-size:10px;">新 ACK → cwnd=ssthresh</text>

  <polyline points="520,400 560,388 600,375 640,363 680,350" stroke="#7c3aed" stroke-width="2" fill="none"/>
  <circle cx="520" cy="400" r="3" fill="#7c3aed"/><circle cx="560" cy="388" r="3" fill="#7c3aed"/><circle cx="600" cy="375" r="3" fill="#7c3aed"/><circle cx="640" cy="363" r="3" fill="#7c3aed"/><circle cx="680" cy="350" r="3" fill="#7c3aed"/>

  <rect x="590" y="340" width="105" height="28" rx="4" class="tag-p"/>
  <text x="642" y="359" text-anchor="middle" class="sw" style="font-size:10px;">直接拥塞避免</text>

  <!-- === Key takeaway at bottom === -->
  <rect x="80" y="590" width="880" height="56" rx="5" class="f-green"/>
  <text x="520" y="612" text-anchor="middle" class="sh" fill="#065f46">Tahoe vs Reno 对比</text>
  <text x="520" y="630" text-anchor="middle" class="ss">Tahoe：超时或 3 dup ACK → cwnd 降为 1，重新慢开始</text>
  <text x="520" y="643" text-anchor="middle" class="ss">Reno：3 dup ACK → 快恢复并进入拥塞避免，不必把 cwnd 降到 1</text>

  <rect x="80" y="655" width="880" height="52" rx="5" class="f-amber"/>
  <text x="520" y="677" text-anchor="middle" class="sh" fill="#92400e">为什么 Reno 更快？</text>
  <text x="520" y="697" text-anchor="middle" class="sm">3 个重复 ACK 意味着"后续数据已到，只是中间丢了一个"→ 网络并未拥塞 → 不需要把 cwnd 砍到 1</text>
</svg>
