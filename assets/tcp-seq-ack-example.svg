<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390" role="img" aria-labelledby="title desc">
  <title id="title">TCP sequence and acknowledgment example</title>
  <desc id="desc">Sequence number marks the first byte in payload, acknowledgment number marks the next expected byte.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.axis{stroke:#64748b;stroke-width:3}.seg{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.ack{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.label{font-size:22px;font-weight:700}.small{font-size:15px}.mid{font-size:17px;font-weight:700}.code{font-family:Consolas,monospace;font-size:15px}
    @media(prefers-color-scheme:dark){text{fill:#e5e7eb}.axis{stroke:#94a3b8}.seg{fill:#10213f;stroke:#60a5fa}.ack{fill:#0f2b1d;stroke:#4ade80}}
  </style>
  <text x="490" y="38" text-anchor="middle" class="label">TCP 序号与确认号</text>
  <line x1="120" y1="115" x2="860" y2="115" class="axis"/><text x="95" y="120" text-anchor="end" class="mid">客户端字节流</text>
  <rect x="230" y="86" width="220" height="58" rx="8" class="seg"/><text x="340" y="111" text-anchor="middle" class="code">seq=201, len=100</text><text x="340" y="132" text-anchor="middle" class="small">覆盖 201-300</text>
  <text x="230" y="168" text-anchor="middle" class="code">201</text><text x="450" y="168" text-anchor="middle" class="code">300</text><text x="475" y="168" text-anchor="middle" class="code">301</text>
  <rect x="545" y="86" width="150" height="58" rx="8" class="ack"/><text x="620" y="121" text-anchor="middle" class="code">ack=301</text>
  <line x1="120" y1="245" x2="860" y2="245" class="axis"/><text x="95" y="250" text-anchor="end" class="mid">服务器字节流</text>
  <rect x="390" y="216" width="260" height="58" rx="8" class="seg"/><text x="520" y="241" text-anchor="middle" class="code">seq=800, len=200</text><text x="520" y="262" text-anchor="middle" class="small">覆盖 800-999</text>
  <text x="390" y="298" text-anchor="middle" class="code">800</text><text x="650" y="298" text-anchor="middle" class="code">999</text><text x="682" y="298" text-anchor="middle" class="code">1000</text>
  <rect x="725" y="216" width="150" height="58" rx="8" class="ack"/><text x="800" y="251" text-anchor="middle" class="code">ack=1000</text>
  <text x="490" y="355" text-anchor="middle" class="small">ack=n 表示 n-1 及以前的字节已收到，下一字节期望从 n 开始</text>
</svg>
