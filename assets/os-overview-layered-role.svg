<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Operating system position in a computer system</title>
  <desc id="desc">A layered diagram showing users, applications, operating system services, and hardware resources.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #1f2937;
      --muted: #64748b;
      --line: #94a3b8;
      --app: #dbeafe;
      --os: #dcfce7;
      --hw: #fee2e2;
      --accent: #2563eb;
      --accent2: #16a34a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --fg: #e5e7eb;
        --muted: #94a3b8;
        --line: #64748b;
        --app: #1e3a8a;
        --os: #14532d;
        --hw: #7f1d1d;
        --accent: #60a5fa;
        --accent2: #4ade80;
      }
    }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: var(--fg); }
    .bg { fill: var(--bg); }
    .box { stroke: var(--line); stroke-width: 2; rx: 10; }
    .label { font-size: 24px; font-weight: 700; }
    .small { font-size: 17px; fill: var(--muted); }
    .arrow { fill: none; stroke: var(--accent); stroke-width: 3; marker-end: url(#arrow); }
    .arrow2 { fill: none; stroke: var(--accent2); stroke-width: 3; marker-end: url(#arrow2); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent)"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent2)"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="430"/>
  <rect class="box" x="90" y="42" width="800" height="58" fill="transparent"/>
  <text class="label" x="490" y="78" text-anchor="middle">用户</text>
  <rect class="box" x="90" y="132" width="800" height="66" fill="var(--app)"/>
  <text class="label" x="490" y="160" text-anchor="middle">应用程序</text>
  <text class="small" x="490" y="184" text-anchor="middle">通过命令接口、GUI、库函数或系统调用使用服务</text>
  <rect class="box" x="90" y="230" width="800" height="82" fill="var(--os)"/>
  <text class="label" x="490" y="260" text-anchor="middle">操作系统</text>
  <text class="small" x="490" y="286" text-anchor="middle">管理 CPU、内存、文件、设备；向上提供统一接口；向下协调硬件</text>
  <rect class="box" x="90" y="344" width="800" height="58" fill="var(--hw)"/>
  <text class="label" x="490" y="380" text-anchor="middle">硬件资源：CPU / 主存 / 磁盘 / I/O 设备</text>
  <path class="arrow" d="M 490 100 L 490 132"/>
  <path class="arrow" d="M 490 198 L 490 230"/>
  <path class="arrow2" d="M 490 312 L 490 344"/>
  <text class="small" x="620" y="220">请求服务</text>
  <text class="small" x="620" y="335">控制与分配资源</text>
</svg>
