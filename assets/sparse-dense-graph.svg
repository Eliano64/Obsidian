<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-labelledby="title desc">
  <title id="title">Sparse graph and dense graph</title>
  <desc id="desc">Comparison of sparse and dense graphs.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.edge{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.node{fill:#fff;stroke:#2563eb;stroke-width:3}
    .text{fill:#0f172a;font-size:22px;font-weight:650}.small{fill:#334155;font-size:17px}.formula{fill:#7c2d12;font-size:20px;font-weight:700}
    @media(prefers-color-scheme:dark){.panel{fill:#111827;stroke:#334155}.edge{stroke:#cbd5e1}.node{fill:#0b1220}.text{fill:#f8fafc}.small{fill:#cbd5e1}.formula{fill:#fdba74}}
  </style>
  <rect class="panel" x="34" y="34" width="420" height="380" rx="10"/>
  <rect class="panel" x="526" y="34" width="420" height="380" rx="10"/>
  <text class="text" x="78" y="84">稀疏图</text>
  <line class="edge" x1="150" y1="150" x2="300" y2="135"/><line class="edge" x1="150" y1="150" x2="185" y2="285"/><line class="edge" x1="300" y1="135" x2="340" y2="280"/>
  <circle class="node" cx="150" cy="150" r="26"/><text class="text" x="141" y="158">A</text><circle class="node" cx="300" cy="135" r="26"/><text class="text" x="291" y="143">B</text><circle class="node" cx="185" cy="285" r="26"/><text class="text" x="176" y="293">C</text><circle class="node" cx="340" cy="280" r="26"/><text class="text" x="331" y="288">D</text><circle class="node" cx="250" cy="230" r="26"/><text class="text" x="241" y="238">E</text>
  <text class="formula" x="78" y="350">常用经验：|E| &lt; |V| log |V|</text>
  <text class="text" x="570" y="84">稠密图</text>
  <line class="edge" x1="640" y1="150" x2="790" y2="135"/><line class="edge" x1="640" y1="150" x2="675" y2="285"/><line class="edge" x1="640" y1="150" x2="830" y2="280"/><line class="edge" x1="640" y1="150" x2="750" y2="230"/>
  <line class="edge" x1="790" y1="135" x2="675" y2="285"/><line class="edge" x1="790" y1="135" x2="830" y2="280"/><line class="edge" x1="790" y1="135" x2="750" y2="230"/><line class="edge" x1="675" y1="285" x2="830" y2="280"/><line class="edge" x1="675" y1="285" x2="750" y2="230"/><line class="edge" x1="750" y1="230" x2="830" y2="280"/>
  <circle class="node" cx="640" cy="150" r="26"/><text class="text" x="631" y="158">A</text><circle class="node" cx="790" cy="135" r="26"/><text class="text" x="781" y="143">B</text><circle class="node" cx="675" cy="285" r="26"/><text class="text" x="666" y="293">C</text><circle class="node" cx="830" cy="280" r="26"/><text class="text" x="821" y="288">D</text><circle class="node" cx="750" cy="230" r="26"/><text class="text" x="741" y="238">E</text>
  <text class="small" x="570" y="350">边数接近完全图上界时常视为稠密</text>
</svg>
