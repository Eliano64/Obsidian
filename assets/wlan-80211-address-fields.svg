<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="620" viewBox="0 0 1150 620" role="img" aria-label="802.11 address fields by To DS and From DS">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    svg { background: transparent; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    .title { fill: #111827; font-size: 25px; font-weight: 700; }
    .text { fill: #334155; font-size: 17px; }
    .head { fill: #0f172a; font-size: 18px; font-weight: 700; }
    .small { fill: #475569; font-size: 14px; }
    .outer { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
    .cell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    .flag { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.5; }
    .common { fill: #ecfdf5; stroke: #34d399; stroke-width: 1.5; }
    .rare { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; }
    @media (prefers-color-scheme: dark) {
      .title,.head { fill: #f8fafc; }
      .text { fill: #d1d5db; }
      .small { fill: #94a3b8; }
      .outer { fill: #0f172a; stroke: #475569; }
      .cell { fill: #111827; stroke: #475569; }
      .flag { fill: #172554; stroke: #60a5fa; }
      .common { fill: #052e1b; stroke: #34d399; }
      .rare { fill: #431407; stroke: #fb923c; }
    }
  </style>

  <text x="575" y="40" text-anchor="middle" class="title">802.11 数据帧地址字段由 To DS / From DS 决定</text>

  <rect x="45" y="70" width="1060" height="455" rx="18" class="outer"/>
  <g transform="translate(75,105)">
    <rect x="0" y="0" width="90" height="58" class="flag"/>
    <rect x="90" y="0" width="105" height="58" class="flag"/>
    <rect x="195" y="0" width="130" height="58" class="cell"/>
    <rect x="325" y="0" width="130" height="58" class="cell"/>
    <rect x="455" y="0" width="130" height="58" class="cell"/>
    <rect x="585" y="0" width="130" height="58" class="cell"/>
    <rect x="715" y="0" width="310" height="58" class="cell"/>
    <text x="45" y="35" text-anchor="middle" class="head">To DS</text>
    <text x="142" y="35" text-anchor="middle" class="head">From DS</text>
    <text x="260" y="35" text-anchor="middle" class="head">地址 1</text>
    <text x="390" y="35" text-anchor="middle" class="head">地址 2</text>
    <text x="520" y="35" text-anchor="middle" class="head">地址 3</text>
    <text x="650" y="35" text-anchor="middle" class="head">地址 4</text>
    <text x="870" y="35" text-anchor="middle" class="head">典型场景</text>

    <g transform="translate(0,58)">
      <rect x="0" y="0" width="90" height="82" class="rare"/>
      <rect x="90" y="0" width="105" height="82" class="rare"/>
      <rect x="195" y="0" width="130" height="82" class="cell"/>
      <rect x="325" y="0" width="130" height="82" class="cell"/>
      <rect x="455" y="0" width="130" height="82" class="cell"/>
      <rect x="585" y="0" width="130" height="82" class="cell"/>
      <rect x="715" y="0" width="310" height="82" class="cell"/>
      <text x="45" y="49" text-anchor="middle" class="text">0</text>
      <text x="142" y="49" text-anchor="middle" class="text">0</text>
      <text x="260" y="49" text-anchor="middle" class="text">目的站</text>
      <text x="390" y="49" text-anchor="middle" class="text">源站</text>
      <text x="520" y="49" text-anchor="middle" class="text">BSSID</text>
      <text x="650" y="49" text-anchor="middle" class="text">未用</text>
      <text x="870" y="36" text-anchor="middle" class="text">ad hoc 或不经过 DS</text>
      <text x="870" y="62" text-anchor="middle" class="small">站点直接通信</text>
    </g>

    <g transform="translate(0,140)">
      <rect x="0" y="0" width="90" height="82" class="common"/>
      <rect x="90" y="0" width="105" height="82" class="common"/>
      <rect x="195" y="0" width="130" height="82" class="cell"/>
      <rect x="325" y="0" width="130" height="82" class="cell"/>
      <rect x="455" y="0" width="130" height="82" class="cell"/>
      <rect x="585" y="0" width="130" height="82" class="cell"/>
      <rect x="715" y="0" width="310" height="82" class="cell"/>
      <text x="45" y="49" text-anchor="middle" class="text">1</text>
      <text x="142" y="49" text-anchor="middle" class="text">0</text>
      <text x="260" y="49" text-anchor="middle" class="text">接收 AP</text>
      <text x="390" y="49" text-anchor="middle" class="text">源站</text>
      <text x="520" y="49" text-anchor="middle" class="text">目的站</text>
      <text x="650" y="49" text-anchor="middle" class="text">未用</text>
      <text x="870" y="36" text-anchor="middle" class="text">站点发往 AP</text>
      <text x="870" y="62" text-anchor="middle" class="small">进入 DS</text>
    </g>

    <g transform="translate(0,222)">
      <rect x="0" y="0" width="90" height="82" class="common"/>
      <rect x="90" y="0" width="105" height="82" class="common"/>
      <rect x="195" y="0" width="130" height="82" class="cell"/>
      <rect x="325" y="0" width="130" height="82" class="cell"/>
      <rect x="455" y="0" width="130" height="82" class="cell"/>
      <rect x="585" y="0" width="130" height="82" class="cell"/>
      <rect x="715" y="0" width="310" height="82" class="cell"/>
      <text x="45" y="49" text-anchor="middle" class="text">0</text>
      <text x="142" y="49" text-anchor="middle" class="text">1</text>
      <text x="260" y="49" text-anchor="middle" class="text">目的站</text>
      <text x="390" y="49" text-anchor="middle" class="text">发送 AP</text>
      <text x="520" y="49" text-anchor="middle" class="text">源站</text>
      <text x="650" y="49" text-anchor="middle" class="text">未用</text>
      <text x="870" y="36" text-anchor="middle" class="text">AP 转发给站点</text>
      <text x="870" y="62" text-anchor="middle" class="small">来自 DS</text>
    </g>

    <g transform="translate(0,304)">
      <rect x="0" y="0" width="90" height="82" class="rare"/>
      <rect x="90" y="0" width="105" height="82" class="rare"/>
      <rect x="195" y="0" width="130" height="82" class="cell"/>
      <rect x="325" y="0" width="130" height="82" class="cell"/>
      <rect x="455" y="0" width="130" height="82" class="cell"/>
      <rect x="585" y="0" width="130" height="82" class="cell"/>
      <rect x="715" y="0" width="310" height="82" class="cell"/>
      <text x="45" y="49" text-anchor="middle" class="text">1</text>
      <text x="142" y="49" text-anchor="middle" class="text">1</text>
      <text x="260" y="49" text-anchor="middle" class="text">接收 AP</text>
      <text x="390" y="49" text-anchor="middle" class="text">发送 AP</text>
      <text x="520" y="49" text-anchor="middle" class="text">目的站</text>
      <text x="650" y="49" text-anchor="middle" class="text">源站</text>
      <text x="870" y="36" text-anchor="middle" class="text">无线 DS 中 AP 到 AP</text>
      <text x="870" y="62" text-anchor="middle" class="small">四地址都使用</text>
    </g>
  </g>

  <text x="575" y="570" text-anchor="middle" class="small">记忆方法：To DS=1 表示往 AP/DS 方向走；From DS=1 表示从 AP/DS 出来。中间两行最常见。</text>
</svg>
