<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ve calculation</title>
<style>
:root{--bg:#fff;--panel:#f8fafc;--text:#0f172a;--muted:#475569;--line:#94a3b8;--edge:#64748b;--hot:#2563eb;--done:#059669}
@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--panel:#111827;--text:#f8fafc;--muted:#cbd5e1;--line:#64748b;--edge:#94a3b8;--hot:#60a5fa;--done:#34d399}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,sans-serif}.wrap{padding:18px;max-width:1120px;margin:auto}.top{display:flex;justify-content:space-between;gap:12px}.title{font-size:22px;font-weight:750}.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:7px 12px;border-radius:6px;cursor:pointer}.stage{display:grid;grid-template-columns:1fr .95fr;gap:16px;margin-top:14px}.card{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:14px}.note{color:var(--muted);line-height:1.65}.edge{stroke:var(--edge);stroke-width:3;marker-end:url(#arr)}.hotEdge{stroke:var(--hot);stroke-width:5;marker-end:url(#arrHot)}.node{fill:var(--bg);stroke:var(--edge);stroke-width:2}.hot{stroke:var(--hot);stroke-width:4}.done{fill:color-mix(in srgb,var(--done) 20%,var(--bg));stroke:var(--done);stroke-width:3}.label{fill:var(--text);font-weight:750;font-size:16px}.w{fill:var(--text);font-size:13px;font-weight:700}.tbl{width:100%;border-collapse:collapse;font-size:14px}.tbl td,.tbl th{border:1px solid var(--line);padding:7px;text-align:center}@media(max-width:760px){.stage{grid-template-columns:1fr}}
</style></head>
<body><div class="wrap"><div class="top"><div><div class="title">按拓扑序列求 ve[]</div><div class="note" id="cap"></div></div><div><button class="btn" id="prev">上一页</button> <button class="btn" id="next">下一页</button></div></div><div class="stage"><div class="card" id="graph"></div><div class="card"><div class="note" id="txt"></div><h3>ve[]</h3><div id="table"></div></div></div></div>
<script>
const pos={1:[80,250],2:[250,140],3:[250,360],4:[440,250],5:[610,140],6:[780,250]};
const edges=[["a1",1,2,3],["a2",1,3,2],["a3",2,4,2],["a4",2,5,3],["a5",3,4,4],["a6",3,6,3],["a7",4,6,2],["a8",5,6,1]];
const steps=[
{cap:"拓扑序列：V1, V3, V2, V5, V4, V6",done:[],hot:[],ve:["-","-","-","-","-","-"],txt:"求 ve 必须按拓扑序列从前往后。"},
{cap:"V1 是源点",done:[1],hot:[],ve:[0,"-","-","-","-","-"],txt:"ve(1)=0。源点表示工程开始事件。"},
{cap:"计算 V3",done:[1,3],hot:["a2"],ve:[0,"-",2,"-","-","-"],txt:"V3 的前驱只有 V1：ve(3)=ve(1)+2=2。"},
{cap:"计算 V2",done:[1,3,2],hot:["a1"],ve:[0,3,2,"-","-","-"],txt:"V2 的前驱只有 V1：ve(2)=ve(1)+3=3。"},
{cap:"计算 V5",done:[1,3,2,5],hot:["a4"],ve:[0,3,2,"-",6,"-"],txt:"V5 的前驱只有 V2：ve(5)=ve(2)+3=6。"},
{cap:"计算 V4",done:[1,3,2,5,4],hot:["a3","a5"],ve:[0,3,2,6,6,"-"],txt:"V4 有两个前驱：max{ve(2)+2, ve(3)+4}=max{5,6}=6。"},
{cap:"计算 V6",done:[1,3,2,5,4,6],hot:["a6","a7","a8"],ve:[0,3,2,6,6,8],txt:"V6 有三个进入活动：max{ve(5)+1, ve(4)+2, ve(3)+3}=max{7,8,5}=8。"}
];
let i=0;
function render(){const s=steps[i];document.getElementById("cap").textContent=s.cap;document.getElementById("txt").textContent=s.txt;const lines=edges.map(e=>`<path class="${s.hot.includes(e[0])?'hotEdge':'edge'}" d="${path(e)}"/><text class="w" x="${mid(e)[0]}" y="${mid(e)[1]}">${e[0]}=${e[3]}</text>`).join("");const nodes=[1,2,3,4,5,6].map(v=>`<g><circle class="node ${s.done.includes(v)?'done':''} ${s.done[s.done.length-1]===v?'hot':''}" cx="${pos[v][0]}" cy="${pos[v][1]}" r="27"/><text class="label" x="${pos[v][0]}" y="${pos[v][1]+5}" text-anchor="middle">V${v}</text></g>`).join("");document.getElementById("graph").innerHTML=`<svg viewBox="0 0 860 500"><defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--edge)"/></marker><marker id="arrHot" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="var(--hot)"/></marker></defs>${lines}${nodes}</svg>`;document.getElementById("table").innerHTML=`<table class="tbl"><tr>${[1,2,3,4,5,6].map(v=>`<th>V${v}</th>`).join("")}</tr><tr>${s.ve.map(x=>`<td>${x}</td>`).join("")}</tr></table>`}
function path(e){const a=pos[e[1]],b=pos[e[2]]; if(e[0]==="a6")return `M${a[0]+20} ${a[1]+20} C430 455 650 400 ${b[0]-24} ${b[1]+24}`; return `M${a[0]+25} ${a[1]} L${b[0]-25} ${b[1]}`}
function mid(e){if(e[0]==="a6")return [540,410];const a=pos[e[1]],b=pos[e[2]];return [(a[0]+b[0])/2,(a[1]+b[1])/2-10]}
document.getElementById("prev").onclick=()=>{i=(i+steps.length-1)%steps.length;render()};document.getElementById("next").onclick=()=>{i=(i+1)%steps.length;render()};render();
</script></body></html>
