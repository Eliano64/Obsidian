<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-label="共享式以太网碰撞域示意图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill:#172033; }
    .muted { fill:#5d6b7e; }
    .wire { stroke:#657386; stroke-width:5; fill:none; stroke-linecap:round; }
    .drop { stroke:#657386; stroke-width:2.5; fill:none; }
    .host { fill:#fff; stroke:#7d8aa0; stroke-width:2; rx:8; }
    .hub { fill:#fff7e8; stroke:#bf7a18; stroke-width:2.5; rx:10; }
    .domain { fill:#ffe8e8; stroke:#d24b4b; stroke-width:2.5; stroke-dasharray:10 8; rx:18; }
    .title { font-size:28px; font-weight:700; }
    .label { font-size:18px; font-weight:700; }
    .small { font-size:15px; }
    @media (prefers-color-scheme: dark) {
      text { fill:#e7edf7; }
      .muted { fill:#b6c2d2; }
      .wire,.drop { stroke:#a8b4c5; }
      .host { fill:#111827; stroke:#718096; }
      .hub { fill:#2b2111; stroke:#e4a548; }
      .domain { fill:#331717; stroke:#ff8585; }
    }
  </style>
  <text x="480" y="42" text-anchor="middle" class="title">集线器星型结构，本质仍是共享式以太网</text>
  <rect x="80" y="84" width="800" height="330" class="domain"/>
  <text x="480" y="118" text-anchor="middle" class="label">一个碰撞域：同一时刻只能一个站点成功发送</text>
  <rect x="390" y="220" width="180" height="70" class="hub"/>
  <text x="480" y="262" text-anchor="middle" class="label">Hub</text>
  <g>
    <rect x="140" y="155" width="110" height="54" class="host"/>
    <text x="195" y="188" text-anchor="middle" class="label">A</text>
    <rect x="140" y="315" width="110" height="54" class="host"/>
    <text x="195" y="348" text-anchor="middle" class="label">B</text>
    <rect x="710" y="155" width="110" height="54" class="host"/>
    <text x="765" y="188" text-anchor="middle" class="label">C</text>
    <rect x="710" y="315" width="110" height="54" class="host"/>
    <text x="765" y="348" text-anchor="middle" class="label">D</text>
  </g>
  <path d="M250 182 L390 245" class="drop"/>
  <path d="M250 342 L390 265" class="drop"/>
  <path d="M570 245 L710 182" class="drop"/>
  <path d="M570 265 L710 342" class="drop"/>
  <text x="480" y="445" text-anchor="middle" class="small muted">Hub 只转发比特信号，不识别帧和 MAC 地址，也不能隔离碰撞域。</text>
</svg>
