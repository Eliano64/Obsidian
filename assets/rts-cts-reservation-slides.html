<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RTS CTS Reservation Process</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #94a3b8;
      --border: #cbd5e1;
      --blue: #2563eb;
      --green: #059669;
      --orange: #ea580c;
      --red: #dc2626;
      --nav: #f59e0b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --panel: #0f172a;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --line: #64748b;
        --border: #475569;
        --blue: #60a5fa;
        --green: #34d399;
        --orange: #fb923c;
        --red: #f87171;
        --nav: #fbbf24;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
    }
    .wrap {
      width: min(1100px, 100vw);
      margin: 0 auto;
      padding: 18px 24px 14px;
    }
    h1 {
      margin: 0 0 14px;
      text-align: center;
      font-size: 28px;
      letter-spacing: 0;
    }
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 18px;
      align-items: stretch;
    }
    .steps {
      display: grid;
      gap: 9px;
    }
    .step {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 92%, var(--blue));
      padding: 10px 12px;
      min-height: 62px;
    }
    .step.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--blue) 28%, transparent);
    }
    .step b {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }
    .step span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .stage {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 10px;
      min-height: 455px;
    }
    svg {
      display: block;
      width: 100%;
      height: 345px;
    }
    .caption {
      margin: 8px auto 0;
      max-width: 780px;
      min-height: 42px;
      text-align: center;
      color: var(--text);
      font-size: 18px;
      line-height: 1.55;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 12px;
    }
    button {
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { border-color: var(--blue); }
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
      .steps { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>RTS/CTS 信道预约过程</h1>
    <div class="layout">
      <div class="steps" id="steps"></div>
      <div class="stage">
        <svg viewBox="0 0 760 345" aria-label="RTS CTS time sequence">
          <defs>
            <marker id="arrowBlue" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
              <path d="M1,1 L11,6.5 L1,12 Z" fill="var(--blue)"></path>
            </marker>
            <marker id="arrowGreen" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
              <path d="M1,1 L11,6.5 L1,12 Z" fill="var(--green)"></path>
            </marker>
            <marker id="arrowOrange" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
              <path d="M1,1 L11,6.5 L1,12 Z" fill="var(--orange)"></path>
            </marker>
          </defs>

          <line x1="120" y1="68" x2="700" y2="68" stroke="var(--line)" stroke-width="2"/>
          <line x1="120" y1="178" x2="700" y2="178" stroke="var(--line)" stroke-width="2"/>
          <line x1="120" y1="288" x2="700" y2="288" stroke="var(--line)" stroke-width="2"/>
          <text x="42" y="75" fill="var(--text)" font-size="18" font-weight="700">源站 A</text>
          <text x="42" y="185" fill="var(--text)" font-size="18" font-weight="700">目的站 B</text>
          <text x="38" y="295" fill="var(--text)" font-size="18" font-weight="700">隐藏站 C</text>
          <text x="716" y="73" fill="var(--text)" font-size="17">t</text>
          <text x="716" y="183" fill="var(--text)" font-size="17">t</text>
          <text x="716" y="293" fill="var(--text)" font-size="17">t</text>

          <g id="difs" opacity="0">
            <rect x="142" y="42" width="66" height="26" rx="5" fill="var(--orange)" opacity=".20" stroke="var(--orange)"/>
            <text x="175" y="61" text-anchor="middle" fill="var(--orange)" font-size="14" font-weight="700">DIFS</text>
          </g>
          <g id="rts" opacity="0">
            <path d="M210 68 L310 178" stroke="var(--blue)" stroke-width="8" opacity=".9" marker-end="url(#arrowBlue)"/>
            <text x="273" y="120" fill="var(--blue)" font-size="15" font-weight="700" transform="rotate(48 273 120)">RTS</text>
          </g>
          <g id="cts" opacity="0">
            <path d="M335 178 L438 68" stroke="var(--orange)" stroke-width="8" opacity=".9" marker-end="url(#arrowOrange)"/>
            <path d="M335 178 L438 288" stroke="var(--orange)" stroke-width="8" opacity=".45" stroke-dasharray="9 7" marker-end="url(#arrowOrange)"/>
            <text x="392" y="125" fill="var(--orange)" font-size="15" font-weight="700" transform="rotate(-47 392 125)">CTS</text>
            <text x="402" y="244" fill="var(--orange)" font-size="15" font-weight="700" transform="rotate(47 402 244)">CTS</text>
          </g>
          <g id="data" opacity="0">
            <path d="M458 68 L575 178" stroke="var(--blue)" stroke-width="11" opacity=".86" marker-end="url(#arrowBlue)"/>
            <text x="524" y="118" fill="var(--blue)" font-size="16" font-weight="700" transform="rotate(43 524 118)">DATA</text>
          </g>
          <g id="ack" opacity="0">
            <path d="M595 178 L660 68" stroke="var(--green)" stroke-width="8" opacity=".9" marker-end="url(#arrowGreen)"/>
            <text x="642" y="127" fill="var(--green)" font-size="15" font-weight="700" transform="rotate(-60 642 127)">ACK</text>
          </g>
          <g id="sifs" opacity="0">
            <rect x="314" y="154" width="45" height="24" rx="5" fill="var(--orange)" opacity=".20" stroke="var(--orange)"/>
            <rect x="438" y="42" width="45" height="24" rx="5" fill="var(--orange)" opacity=".20" stroke="var(--orange)"/>
            <rect x="575" y="154" width="45" height="24" rx="5" fill="var(--orange)" opacity=".20" stroke="var(--orange)"/>
            <text x="337" y="171" text-anchor="middle" fill="var(--orange)" font-size="12" font-weight="700">SIFS</text>
            <text x="461" y="59" text-anchor="middle" fill="var(--orange)" font-size="12" font-weight="700">SIFS</text>
            <text x="598" y="171" text-anchor="middle" fill="var(--orange)" font-size="12" font-weight="700">SIFS</text>
          </g>
          <g id="nav" opacity="0">
            <rect x="438" y="268" width="222" height="34" rx="7" fill="var(--nav)" opacity=".20" stroke="var(--nav)" stroke-width="2"/>
            <text x="549" y="290" text-anchor="middle" fill="var(--nav)" font-size="15" font-weight="700">NAV：C 推迟发送</text>
          </g>
        </svg>
        <div class="caption" id="caption"></div>
      </div>
    </div>
    <div class="controls">
      <button id="prev" type="button">上一步</button>
      <button id="next" type="button">下一步</button>
    </div>
  </div>
  <script>
    const slides = [
      { title: "1. 等待 DIFS", nav: "A 先监听并等待 DIFS。", body: "源站 A 要发送长数据帧，先监听信道。信道空闲后，A 等待 DIFS，准备发出预约请求。", show: ["difs"] },
      { title: "2. 发送 RTS", nav: "A 用短控制帧预约。", body: "A 发送 RTS 给 B。RTS 很短，其中包含本次通信预计占用信道的持续时间。", show: ["difs", "rts"] },
      { title: "3. 返回 CTS", nav: "B 用 CTS 回复预约。", body: "B 正确收到 RTS 后，等待 SIFS，返回 CTS。隐藏站 C 虽然听不到 A 的 RTS，但可以听到 B 的 CTS。", show: ["difs", "rts", "sifs", "cts"] },
      { title: "4. 设置 NAV", nav: "C 听到 CTS 后沉默。", body: "C 根据 CTS 中的持续时间设置 NAV。在 NAV 结束前，C 不争用信道，因此不会干扰 B 接收 A 的数据。", show: ["difs", "rts", "sifs", "cts", "nav"] },
      { title: "5. 发送 DATA", nav: "A 等 SIFS 后发数据。", body: "A 收到 CTS 后，等待 SIFS，发送 DATA。RTS/CTS 的意义就是先用短帧预约，再发送较长的数据帧。", show: ["difs", "rts", "sifs", "cts", "nav", "data"] },
      { title: "6. 返回 ACK", nav: "B 等 SIFS 后确认。", body: "B 正确收到 DATA 后，等待 SIFS，返回 ACK。若 A 没收到 ACK，就会退避后重传。", show: ["difs", "rts", "sifs", "cts", "nav", "data", "ack"] }
    ];

    const params = new URLSearchParams(location.search);
    let index = Number(params.get("step") || 0);
    if (!Number.isInteger(index) || index < 0 || index >= slides.length) index = 0;
    const steps = document.getElementById("steps");
    slides.forEach((s, i) => {
      const div = document.createElement("div");
      div.className = "step";
      div.innerHTML = `<b>${s.title}</b><span>${s.nav}</span>`;
      div.addEventListener("click", () => { index = i; render(); });
      steps.appendChild(div);
    });

    function render() {
      const slide = slides[index];
      for (const id of ["difs", "rts", "sifs", "cts", "nav", "data", "ack"]) {
        document.getElementById(id).style.opacity = slide.show.includes(id) ? "1" : "0";
      }
      document.querySelectorAll(".step").forEach((el, i) => el.classList.toggle("active", i === index));
      document.getElementById("caption").textContent = slide.body;
    }
    document.getElementById("prev").addEventListener("click", () => {
      index = (index + slides.length - 1) % slides.length;
      render();
    });
    document.getElementById("next").addEventListener("click", () => {
      index = (index + 1) % slides.length;
      render();
    });
    render();
  </script>
</body>
</html>
