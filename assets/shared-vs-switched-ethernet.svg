<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-label="共享式以太网与交换式以太网对比图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}
    .panel{fill:#fff;stroke:#8a98aa;stroke-width:2;rx:14}
    .hub{fill:#fff7e8;stroke:#bf7a18;stroke-width:2.5;rx:10}
    .sw{fill:#eef6ff;stroke:#2f73c8;stroke-width:2.5;rx:10}
    .host{fill:#fff;stroke:#7d8aa0;stroke-width:2;rx:8}
    .line{stroke:#7d8aa0;stroke-width:3;fill:none}
    .domain{fill:none;stroke:#d14343;stroke-width:2.5;stroke-dasharray:10 8;rx:16}
    .port{fill:none;stroke:#2d8a4d;stroke-width:2.5;stroke-dasharray:8 7;rx:12}
    .title{font-size:28px;font-weight:700}.label{font-size:18px;font-weight:700}.small{font-size:15px}.muted{fill:#5d6b7e}
    @media(prefers-color-scheme:dark){text{fill:#e7edf7}.muted{fill:#b6c2d2}.panel,.host{fill:#111827;stroke:#718096}.hub{fill:#2b2111;stroke:#e4a548}.sw{fill:#10243d;stroke:#63a3ff}.line{stroke:#a8b4c5}.domain{stroke:#ff8585}.port{stroke:#67d493}}
  </style>
  <text x="480" y="42" text-anchor="middle" class="title">共享式以太网与交换式以太网</text>
  <rect x="45" y="80" width="410" height="360" class="panel"/>
  <rect x="505" y="80" width="410" height="360" class="panel"/>
  <text x="250" y="115" text-anchor="middle" class="label">共享式：Hub</text>
  <text x="710" y="115" text-anchor="middle" class="label">交换式：Switch</text>
  <rect x="175" y="230" width="150" height="58" class="hub"/><text x="250" y="265" text-anchor="middle" class="label">Hub</text>
  <rect x="635" y="230" width="150" height="58" class="sw"/><text x="710" y="265" text-anchor="middle" class="label">Switch</text>
  <g>
    <rect x="95" y="160" width="80" height="44" class="host"/><text x="135" y="188" text-anchor="middle">A</text>
    <rect x="325" y="160" width="80" height="44" class="host"/><text x="365" y="188" text-anchor="middle">B</text>
    <rect x="95" y="325" width="80" height="44" class="host"/><text x="135" y="353" text-anchor="middle">C</text>
    <rect x="325" y="325" width="80" height="44" class="host"/><text x="365" y="353" text-anchor="middle">D</text>
    <path d="M175 182 L225 230 M325 182 L275 230 M175 347 L225 288 M325 347 L275 288" class="line"/>
    <rect x="75" y="140" width="350" height="250" class="domain"/>
    <text x="250" y="413" text-anchor="middle" class="small muted">一个大碰撞域</text>
  </g>
  <g>
    <rect x="555" y="160" width="80" height="44" class="host"/><text x="595" y="188" text-anchor="middle">A</text>
    <rect x="785" y="160" width="80" height="44" class="host"/><text x="825" y="188" text-anchor="middle">B</text>
    <rect x="555" y="325" width="80" height="44" class="host"/><text x="595" y="353" text-anchor="middle">C</text>
    <rect x="785" y="325" width="80" height="44" class="host"/><text x="825" y="353" text-anchor="middle">D</text>
    <path d="M635 182 L675 230 M785 182 L745 230 M635 347 L675 288 M785 347 L745 288" class="line"/>
    <rect x="540" y="145" width="110" height="75" class="port"/><rect x="770" y="145" width="110" height="75" class="port"/>
    <rect x="540" y="310" width="110" height="75" class="port"/><rect x="770" y="310" width="110" height="75" class="port"/>
    <text x="710" y="413" text-anchor="middle" class="small muted">每个端口方向独立碰撞域，可全双工</text>
  </g>
</svg>
