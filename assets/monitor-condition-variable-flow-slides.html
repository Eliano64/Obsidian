<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Monitor Condition Variable Flow</title><style>
:root{--bg:#fff;--panel:#f8fafc;--line:#cbd5e1;--text:#172033;--muted:#64748b;--blue:#dbeafe;--bl:#2563eb;--green:#dcfce7;--gl:#16a34a;--amber:#fef3c7;--al:#d97706;--red:#fee2e2;--rl:#dc2626;--arrow:#475569}@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--blue:#1e3a8a;--bl:#60a5fa;--green:#14532d;--gl:#4ade80;--amber:#713f12;--al:#fbbf24;--red:#7f1d1d;--rl:#f87171;--arrow:#cbd5e1}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.deck{min-height:720px;padding:28px 34px 24px;display:grid;grid-template-rows:auto 1fr auto;gap:18px}header{display:flex;justify-content:space-between;align-items:end}h1{margin:0;font-size:30px}.step{color:var(--muted);font-size:18px}.stage{display:grid;grid-template-columns:1.15fr .95fr;gap:22px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;min-height:505px}svg{width:100%;height:500px}.monitor{fill:none;stroke:var(--bl);stroke-width:3}.box{fill:var(--blue);stroke:var(--bl);stroke-width:2.5}.queue{fill:var(--amber);stroke:var(--al);stroke-width:2.5}.run{fill:var(--green);stroke:var(--gl);stroke-width:2.5}.blocked{fill:var(--red);stroke:var(--rl);stroke-width:2.5}.edge{fill:none;stroke:var(--arrow);stroke-width:2.8;marker-end:url(#arrow)}.faded{opacity:.18}.hi{stroke-width:5}text{fill:var(--text);font-family:inherit}.label{text-anchor:middle;dominant-baseline:middle;font-size:18px;font-weight:700}.small{text-anchor:middle;font-size:14px;fill:var(--muted)}h2{margin:0 0 14px;font-size:25px}p{margin:0 0 13px;font-size:20px;line-height:1.55}.code{font-family:Consolas,"Courier New",monospace;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:10px;font-size:17px;line-height:1.55;white-space:pre-wrap}.controls{display:flex;justify-content:center;gap:10px}button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:9px 14px;font-size:16px;cursor:pointer}</style></head><body><div class="deck"><header><h1>条件变量：等待与唤醒</h1><div id="stepLabel" class="step"></div></header><main class="stage"><section class="panel"><svg viewBox="0 0 650 500"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--arrow)"/></marker></defs>
<rect x="210" y="65" width="335" height="345" rx="18" class="monitor"/><text x="378" y="102" class="label">管程</text>
<rect id="entryQ" x="35" y="92" width="120" height="64" rx="10" class="box"/><text x="95" y="124" class="label">入口队列</text>
<rect id="inside" x="280" y="145" width="190" height="78" rx="12" class="run"/><text x="375" y="184" class="label">进程在管程内</text>
<rect id="condQ" x="280" y="302" width="190" height="78" rx="12" class="queue"/><text x="375" y="332" class="label">条件变量队列</text><text x="375" y="358" class="small">等待条件满足</text>
<rect id="other" x="35" y="312" width="120" height="64" rx="10" class="box"/><text x="95" y="344" class="label">其他进程</text>
<path id="e1" d="M155 124 H210 C245 124 252 155 280 170" class="edge"/>
<path id="e2" d="M375 223 V302" class="edge"/>
<path id="e3" d="M155 344 C195 344 205 236 280 202" class="edge"/>
<path id="e4" d="M470 341 C560 340 585 215 470 184" class="edge"/>
</svg></section><section class="panel"><h2 id="title"></h2><p id="body1"></p><p id="body2"></p><div id="code" class="code"></div></section></main><nav class="controls"><button id="prev">上一步</button><button id="next">下一步</button></nav></div><script>
const ids=["entryQ","inside","condQ","other","e1","e2","e3","e4"];
const steps=[
{t:"进入管程",b1:"进程只能通过入口过程进入管程。若管程空闲，入口队列中的一个进程进入。",b2:"进入后，它独占管程内部执行权。",c:"调用 insert() 或 remove()",hi:["entryQ","inside","e1"],fade:["condQ","other","e2","e3","e4"]},
{t:"条件不满足，执行 wait",b1:"若进入后发现条件不满足，例如缓冲区空，进程调用 wait(notEmpty)。",b2:"wait 的关键动作是：阻塞当前进程，并释放管程使用权。",c:"if count == 0 then\n    wait(notEmpty);",hi:["inside","condQ","e2"],fade:["entryQ","other","e1","e3","e4"]},
{t:"释放管程后，别人才能进入",b1:"等待者不能继续占着管程，否则其他进程无法进入并改变条件。",b2:"释放管程后，其他进程可以进入，例如生产者放入产品。",c:"生产者进入管程\n放入产品\ncount = count + 1",hi:["other","inside","e3"],fade:["entryQ","condQ","e1","e2","e4"]},
{t:"条件改变，执行 signal",b1:"生产者放入产品后，notEmpty 条件可能成立，于是 signal(notEmpty)。",b2:"signal 唤醒一个等待在 notEmpty 上的进程。",c:"signal(notEmpty);",hi:["inside","condQ","e4"],fade:["entryQ","other","e1","e2","e3"]},
{t:"被唤醒进程重新竞争管程",b1:"被唤醒只表示它有机会继续，不表示可以和当前进程同时在管程内执行。",b2:"管程仍然保持同一时刻只有一个进程在内部执行。",c:"等待者被唤醒\n重新获得管程后继续执行",hi:["entryQ","inside","condQ","e1","e4"],fade:["other","e2","e3"]}
];
let i=Math.min(Math.max((Number(new URLSearchParams(location.search).get("step"))||1)-1,0),steps.length-1);
function render(){const s=steps[i];stepLabel.textContent=`${i+1} / ${steps.length}`;title.textContent=s.t;body1.textContent=s.b1;body2.textContent=s.b2;code.textContent=s.c;ids.forEach(id=>{const el=document.getElementById(id);el.classList.remove("faded","hi");if(s.fade.includes(id))el.classList.add("faded");if(s.hi.includes(id))el.classList.add("hi")})}prev.onclick=()=>{i=Math.max(0,i-1);render()};next.onclick=()=>{i=Math.min(steps.length-1,i+1);render()};render();
</script></body></html>
