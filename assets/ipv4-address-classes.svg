<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-labelledby="title desc">
  <title id="title">IPv4 分类编址</title>
  <desc id="desc">A、B、C 类 IPv4 地址中，类别前缀属于网络号的一部分，网络号与主机号共同组成 32 bit 地址。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    .bg { fill:#f8fafc; }
    .text { fill:#0f172a; font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif; font-size:18px; }
    .small { fill:#334155; font-size:15px; }
    .head { fill:#0f172a; font-size:15px; font-weight:700; }
    .net { fill:#dbeafe; stroke:#2563eb; stroke-width:2; }
    .fixed { fill:#bfdbfe; stroke:#2563eb; stroke-width:2; }
    .host { fill:#dcfce7; stroke:#16a34a; stroke-width:2; }
    .line { stroke:#64748b; stroke-width:1.5; }
    .brace { stroke:#2563eb; stroke-width:2; fill:none; }
    @media (prefers-color-scheme: dark) {
      .bg { fill:#020617; }
      .text { fill:#e5e7eb; }
      .small { fill:#cbd5e1; }
      .head { fill:#f8fafc; }
      .net { fill:#172554; stroke:#60a5fa; }
      .fixed { fill:#1e3a8a; stroke:#60a5fa; }
      .host { fill:#052e16; stroke:#4ade80; }
      .line { stroke:#94a3b8; }
      .brace { stroke:#60a5fa; }
    }
  </style>
  <rect class="bg" width="1100" height="500"/>
  <text class="text" x="550" y="42" text-anchor="middle" font-size="26" font-weight="700">分类 IPv4 地址：类别前缀也属于网络号</text>

  <text class="head" x="70" y="92">类别</text>
  <text class="head" x="152" y="92">32 bit 地址结构</text>
  <text class="head" x="805" y="92">前缀</text>
  <text class="head" x="890" y="92">首字节</text>
  <text class="head" x="1020" y="92" text-anchor="end">默认掩码</text>

  <g transform="translate(50,122)">
    <text class="text" x="28" y="38">A</text>
    <rect class="fixed" x="92" y="10" width="24" height="46" rx="4"/>
    <rect class="net" x="116" y="10" width="154" height="46" rx="4"/>
    <rect class="host" x="270" y="10" width="462" height="46" rx="4"/>
    <text class="small" x="104" y="39" text-anchor="middle">0</text>
    <text class="small" x="193" y="39" text-anchor="middle">网络号剩余 7 bit</text>
    <text class="small" x="501" y="39" text-anchor="middle">主机号 24 bit</text>
    <path class="brace" d="M92 68 H270"/>
    <text class="small" x="181" y="91" text-anchor="middle">网络号 8 bit</text>
    <text class="small" x="760" y="39">0</text>
    <text class="small" x="845" y="39">1-126</text>
    <text class="small" x="1030" y="39" text-anchor="end">255.0.0.0</text>
  </g>

  <g transform="translate(50,238)">
    <text class="text" x="28" y="38">B</text>
    <rect class="fixed" x="92" y="10" width="48" height="46" rx="4"/>
    <rect class="net" x="140" y="10" width="254" height="46" rx="4"/>
    <rect class="host" x="394" y="10" width="338" height="46" rx="4"/>
    <text class="small" x="116" y="39" text-anchor="middle">10</text>
    <text class="small" x="267" y="39" text-anchor="middle">网络号剩余 14 bit</text>
    <text class="small" x="563" y="39" text-anchor="middle">主机号 16 bit</text>
    <path class="brace" d="M92 68 H394"/>
    <text class="small" x="243" y="91" text-anchor="middle">网络号 16 bit</text>
    <text class="small" x="760" y="39">10</text>
    <text class="small" x="845" y="39">128-191</text>
    <text class="small" x="1030" y="39" text-anchor="end">255.255.0.0</text>
  </g>

  <g transform="translate(50,354)">
    <text class="text" x="28" y="38">C</text>
    <rect class="fixed" x="92" y="10" width="72" height="46" rx="4"/>
    <rect class="net" x="164" y="10" width="400" height="46" rx="4"/>
    <rect class="host" x="564" y="10" width="168" height="46" rx="4"/>
    <text class="small" x="128" y="39" text-anchor="middle">110</text>
    <text class="small" x="364" y="39" text-anchor="middle">网络号剩余 21 bit</text>
    <text class="small" x="648" y="39" text-anchor="middle">主机号 8 bit</text>
    <path class="brace" d="M92 68 H564"/>
    <text class="small" x="328" y="91" text-anchor="middle">网络号 24 bit</text>
    <text class="small" x="760" y="39">110</text>
    <text class="small" x="845" y="39">192-223</text>
    <text class="small" x="1030" y="39" text-anchor="end">255.255.255.0</text>
  </g>
</svg>
