<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">死锁处理策略总览</title>
  <desc id="desc">对比死锁预防、避免、检测与解除三类处理策略。</desc>
  <defs><style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--line:#cbd5e1;--text:#172033;--muted:#64748b;--a:#dbeafe;--al:#2563eb;--b:#fef3c7;--bl:#d97706;--c:#dcfce7;--cl:#16a34a}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--a:#1e3a8a;--al:#60a5fa;--b:#713f12;--bl:#fbbf24;--c:#14532d;--cl:#4ade80}}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:var(--text)}.title{font-size:34px;font-weight:700}.muted{font-size:19px;fill:var(--muted)}.card{fill:var(--panel);stroke:var(--line);stroke-width:2;rx:18}.head{font-size:25px;font-weight:700}.body{font-size:20px}.small{font-size:18px;fill:var(--muted)}.tag{stroke-width:2;rx:14}.a{fill:var(--a);stroke:var(--al)}.b{fill:var(--b);stroke:var(--bl)}.c{fill:var(--c);stroke:var(--cl)}
  </style></defs>
  <rect width="980" height="560" fill="var(--bg)"/><text x="50" y="58" class="title">死锁处理策略</text><text x="50" y="94" class="muted">处理死锁不是一个动作，而是三种不同态度：不让它出现、避免进入危险状态、允许出现后再处理。</text>
  <rect x="50" y="130" width="280" height="330" class="card"/><rect x="78" y="162" width="100" height="46" class="tag a"/><text x="101" y="192" class="head">预防</text><text x="78" y="250" class="body">破坏四个必要条件之一。</text><text x="78" y="292" class="small">规则保守，能保证不死锁；</text><text x="78" y="322" class="small">但可能牺牲资源利用率。</text>
  <rect x="350" y="130" width="280" height="330" class="card"/><rect x="378" y="162" width="100" height="46" class="tag b"/><text x="401" y="192" class="head">避免</text><text x="378" y="250" class="body">分配前判断是否安全。</text><text x="378" y="292" class="small">核心是安全序列；</text><text x="378" y="322" class="small">典型算法是银行家算法。</text>
  <rect x="650" y="130" width="280" height="330" class="card"/><rect x="678" y="162" width="150" height="46" class="tag c"/><text x="701" y="192" class="head">检测与解除</text><text x="678" y="250" class="body">允许死锁发生。</text><text x="678" y="292" class="small">用资源分配图检测；</text><text x="678" y="322" class="small">检测到后剥夺、撤销或回退。</text>
  <text x="50" y="520" class="muted">预防和避免发生在死锁之前；检测与解除发生在死锁之后。</text>
</svg>
