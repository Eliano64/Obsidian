<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">Directory Inode Lookup</title>
  <desc id="desc">Path lookup with FCB and inode.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706;--red:#dc2626}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24;--red:#f87171}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--blue);stroke-width:3;fill:none;marker-end:url(#arrow)}.node{fill:var(--blue);opacity:.13;stroke:var(--blue);stroke-width:1.5}.inode{fill:var(--green);opacity:.14;stroke:var(--green);stroke-width:1.5}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"/></marker></defs>
  <rect class="bg" width="980" height="470"/>
  <text class="t" x="490" y="36" text-anchor="middle" font-size="24" font-weight="700">按名存取：目录项与 inode</text>
  <text class="m" x="490" y="64" text-anchor="middle" font-size="15">目录项先用文件名定位目标；inode 再保存文件属性和外存位置</text>
  <text class="t" x="62" y="116" font-size="17" font-weight="700">路径：/照片/2015-08/自拍.jpg</text>
  <rect class="box" x="60" y="145" width="190" height="230" rx="10"/>
  <text class="t" x="155" y="176" text-anchor="middle" font-size="17" font-weight="700">根目录</text>
  <rect class="node" x="82" y="205" width="146" height="34" rx="6"/><text class="t" x="103" y="227" font-size="14">照片</text><text class="m" x="162" y="227" font-size="14">inode 7</text>
  <rect class="node" x="82" y="253" width="146" height="34" rx="6"/><text class="t" x="103" y="275" font-size="14">demo</text><text class="m" x="162" y="275" font-size="14">inode 8</text>
  <rect class="box" x="310" y="145" width="190" height="230" rx="10"/>
  <text class="t" x="405" y="176" text-anchor="middle" font-size="17" font-weight="700">照片目录</text>
  <rect class="node" x="332" y="205" width="146" height="34" rx="6"/><text class="t" x="353" y="227" font-size="14">2015-08</text><text class="m" x="426" y="227" font-size="14">inode 25</text>
  <rect class="node" x="332" y="253" width="146" height="34" rx="6"/><text class="t" x="353" y="275" font-size="14">2015-09</text><text class="m" x="426" y="275" font-size="14">inode 26</text>
  <rect class="box" x="560" y="145" width="190" height="230" rx="10"/>
  <text class="t" x="655" y="176" text-anchor="middle" font-size="17" font-weight="700">2015-08 目录</text>
  <rect class="node" x="582" y="205" width="146" height="34" rx="6"/><text class="t" x="603" y="227" font-size="14">自拍.jpg</text><text class="m" x="676" y="227" font-size="14">inode 91</text>
  <rect class="node" x="582" y="253" width="146" height="34" rx="6"/><text class="t" x="603" y="275" font-size="14">自拍2.png</text><text class="m" x="676" y="275" font-size="14">inode 92</text>
  <rect class="inode" x="805" y="176" width="130" height="120" rx="10"/>
  <text class="t" x="870" y="207" text-anchor="middle" font-size="17" font-weight="700">inode 91</text>
  <text class="m" x="870" y="234" text-anchor="middle" font-size="13">权限 / 大小</text>
  <text class="m" x="870" y="258" text-anchor="middle" font-size="13">时间 / 所有者</text>
  <text class="m" x="870" y="282" text-anchor="middle" font-size="13">外存块位置</text>
  <path class="a" d="M228 222 H310"/>
  <path class="a" d="M478 222 H560"/>
  <path class="a" d="M728 222 H805"/>
  <text class="m" x="490" y="420" text-anchor="middle" font-size="14">目录项瘦身后，目录中只保留文件名和 inode 指针；只有文件名匹配后才读取 inode。</text>
</svg>
