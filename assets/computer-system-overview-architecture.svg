<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820" role="img" aria-labelledby="title desc">
  <title id="title">Von Neumann And Modern Computer Organization</title>
  <desc id="desc">Side-by-side comparison showing early von Neumann organization centered on the arithmetic unit and modern computer organization centered on memory.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    .bg { fill: #f7f7f4; }
    .panel { fill: #fff; stroke: #ccd4dc; stroke-width: 2; }
    .title { fill: #1f252b; font: 700 30px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .h { fill: #1f252b; font: 700 20px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .sub { fill: #1f252b; font: 700 17px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .t { fill: #46505a; font: 15px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .small { fill: #5f6873; font: 13px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .io { fill: #eef6fc; stroke: #2f6f9f; stroke-width: 2.2; rx: 8; }
    .mem { fill: #f1f8ef; stroke: #4b7f52; stroke-width: 2.2; rx: 8; }
    .alu { fill: #fff5e8; stroke: #a86620; stroke-width: 3.2; rx: 8; }
    .cu { fill: #fff0ee; stroke: #a1473e; stroke-width: 2.2; rx: 8; }
    .cpu { fill: #f8f5ff; stroke: #715aa8; stroke-width: 2.2; rx: 8; }
    .focus { fill: none; stroke: #a86620; stroke-width: 4; stroke-dasharray: 10 7; rx: 14; }
    .focusMem { fill: none; stroke: #4b7f52; stroke-width: 4; stroke-dasharray: 10 7; rx: 14; }
    .data { stroke: #2f6f9f; stroke-width: 3; fill: none; marker-end: url(#dataArrow); }
    .dataBoth { stroke: #2f6f9f; stroke-width: 3; fill: none; marker-start: url(#dataStart); marker-end: url(#dataArrow); }
    .control { stroke: #a1473e; stroke-width: 2.3; stroke-dasharray: 7 6; fill: none; marker-end: url(#controlArrow); }
    .note { fill: #fff; stroke: #d7dde3; stroke-width: 1.5; rx: 8; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #151719; }
      .panel, .note { fill: #202428; stroke: #3a4149; }
      .title, .h, .sub { fill: #edf0f2; }
      .t { fill: #c6ccd3; }
      .small { fill: #aab2bc; }
      .io { fill: #1f3443; stroke: #7db7e8; }
      .mem { fill: #213522; stroke: #95c88f; }
      .alu { fill: #3b2d1c; stroke: #f0b86d; }
      .cu { fill: #3a2423; stroke: #dd8c84; }
      .cpu { fill: #302943; stroke: #b8a8ef; }
      .focus { stroke: #f0b86d; }
      .focusMem { stroke: #95c88f; }
      .data, .dataBoth { stroke: #7db7e8; }
      .control { stroke: #dd8c84; }
    }
  </style>
  <defs>
    <marker id="dataArrow" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#2f6f9f"/>
    </marker>
    <marker id="dataStart" markerWidth="11" markerHeight="11" refX="1" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M10,0 L10,7 L0,3.5 z" fill="#2f6f9f"/>
    </marker>
    <marker id="controlArrow" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#a1473e"/>
    </marker>
  </defs>

  <rect class="bg" width="1180" height="820"/>
  <text class="title" x="48" y="58">计算机组成结构：中心部件的变化</text>
  <text class="t" x="48" y="88">左图强调早期冯诺依曼结构“以运算器为中心”；右图强调现代计算机“以存储器为中心”。蓝色为数据流，红色虚线为控制信号。</text>

  <rect class="panel" x="48" y="122" width="524" height="560" rx="8"/>
  <text class="h" x="76" y="162">早期冯诺依曼结构</text>
  <text class="sub" x="76" y="192">以运算器为中心</text>

  <rect class="io" x="84" y="332" width="112" height="62"/>
  <text class="h" x="122" y="359">输入</text>
  <text class="small" x="108" y="379">数据 / 程序</text>

  <rect class="alu" x="262" y="302" width="132" height="118"/>
  <text class="h" x="291" y="350">运算器</text>
  <text class="small" x="286" y="376">数据交换枢纽</text>
  <rect class="focus" x="248" y="288" width="160" height="146"/>

  <rect class="mem" x="256" y="166" width="144" height="78"/>
  <text class="h" x="292" y="198">存储器</text>
  <text class="small" x="280" y="220">程序与数据</text>

  <rect class="cu" x="256" y="510" width="144" height="78"/>
  <text class="h" x="292" y="542">控制器</text>
  <text class="small" x="284" y="564">指挥运行</text>

  <rect class="io" x="460" y="332" width="82" height="62"/>
  <text class="h" x="482" y="359">输出</text>
  <text class="small" x="480" y="379">结果</text>

  <path class="data" d="M196 363 H252"/>
  <path class="dataBoth" d="M328 292 V254"/>
  <path class="data" d="M394 363 H450"/>
  <path class="control" d="M328 510 V430"/>
  <path class="control" d="M400 548 Q470 478 514 402"/>
  <path class="control" d="M256 548 Q160 478 140 402"/>
  <path class="control" d="M306 510 Q252 374 256 244"/>

  <rect class="note" x="84" y="620" width="430" height="38"/>
  <text class="small" x="104" y="644">输入、输出、存储器之间的数据传送主要围绕运算器展开。</text>

  <rect class="panel" x="608" y="122" width="524" height="560" rx="8"/>
  <text class="h" x="636" y="162">现代计算机结构</text>
  <text class="sub" x="636" y="192">以存储器为中心</text>

  <rect class="mem" x="794" y="276" width="156" height="118"/>
  <text class="h" x="836" y="324">主存</text>
  <text class="small" x="819" y="350">数据交换枢纽</text>
  <rect class="focusMem" x="780" y="262" width="184" height="146"/>

  <rect class="cpu" x="702" y="468" width="344" height="130"/>
  <text class="h" x="844" y="502">CPU</text>
  <rect class="alu" x="730" y="528" width="126" height="48"/>
  <text class="small" x="775" y="558">运算器</text>
  <rect class="cu" x="892" y="528" width="126" height="48"/>
  <text class="small" x="937" y="558">控制器</text>

  <rect class="io" x="646" y="300" width="92" height="62"/>
  <text class="h" x="676" y="327">输入</text>
  <text class="small" x="670" y="347">I/O</text>

  <rect class="io" x="1004" y="300" width="92" height="62"/>
  <text class="h" x="1034" y="327">输出</text>
  <text class="small" x="1028" y="347">I/O</text>

  <rect class="mem" x="808" y="166" width="128" height="66"/>
  <text class="h" x="846" y="194">辅存</text>
  <text class="small" x="836" y="214">长期保存</text>

  <path class="dataBoth" d="M738 331 H784"/>
  <path class="dataBoth" d="M950 331 H994"/>
  <path class="dataBoth" d="M872 394 V458"/>
  <path class="dataBoth" d="M872 266 V242"/>
  <path class="control" d="M955 528 Q978 438 950 394"/>
  <path class="control" d="M955 528 Q1038 450 1046 372"/>
  <path class="control" d="M955 528 Q768 448 738 362"/>

  <rect class="note" x="644" y="620" width="430" height="38"/>
  <text class="small" x="664" y="644">主存成为 CPU、I/O、辅存之间交换信息的中心。</text>

  <rect class="panel" x="48" y="710" width="1084" height="58" rx="8"/>
  <text class="h" x="76" y="746">共同基础：存储程序</text>
  <text class="t" x="250" y="746">指令和数据都以二进制形式存于存储器，控制器按指令序列取指、译码、控制执行。</text>
</svg>
