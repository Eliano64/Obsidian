<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">波分复用合路与分路</title>
  <desc id="desc">展示多个不同波长的光信号经过合波器进入同一根光纤，再由分波器分离</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--grid:#cbd5e1;--b:#2563eb;--g:#16a34a;--a:#d97706;--p:#7c3aed}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--grid:#334155;--b:#60a5fa;--g:#4ade80;--a:#fbbf24;--p:#c4b5fd}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.fiber{fill:none;stroke:var(--line);stroke-width:26;stroke-linecap:round}.w1{fill:none;stroke:var(--b);stroke-width:4}.w2{fill:none;stroke:var(--g);stroke-width:4}.w3{fill:none;stroke:var(--a);stroke-width:4}.w4{fill:none;stroke:var(--p);stroke-width:4}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.head{font-size:20px;font-weight:700}.small{font-size:15px;fill:var(--muted)}
  </style>
  <rect class="bg" width="980" height="420"/>
  <text x="50" y="56" class="title">波分复用 WDM：光纤中的频分复用</text>
  <rect x="250" y="130" width="120" height="150" rx="10" class="box"/>
  <text x="310" y="197" text-anchor="middle" class="head">合波器</text>
  <text x="310" y="224" text-anchor="middle" class="small">MUX</text>
  <rect x="610" y="130" width="120" height="150" rx="10" class="box"/>
  <text x="670" y="197" text-anchor="middle" class="head">分波器</text>
  <text x="670" y="224" text-anchor="middle" class="small">DEMUX</text>
  <path d="M380 205 H600" class="fiber"/>
  <path d="M390 183 C450 160 530 160 590 183" class="w1"/>
  <path d="M390 198 C450 176 530 176 590 198" class="w2"/>
  <path d="M390 213 C450 234 530 234 590 213" class="w3"/>
  <path d="M390 228 C450 252 530 252 590 228" class="w4"/>
  <text x="490" y="268" text-anchor="middle" class="small">同一根光纤同时承载多个波长</text>
  <g>
    <path d="M95 132 C150 105 198 105 248 150" class="w1"/><text x="70" y="136" class="small">λ1</text>
    <path d="M95 180 C150 155 198 155 248 190" class="w2"/><text x="70" y="184" class="small">λ2</text>
    <path d="M95 230 C150 258 198 258 248 220" class="w3"/><text x="70" y="234" class="small">λ3</text>
    <path d="M95 278 C150 306 198 306 248 250" class="w4"/><text x="70" y="282" class="small">λ4</text>
  </g>
  <g>
    <path d="M732 150 C780 105 835 105 890 132" class="w1"/><text x="902" y="136" class="small">λ1</text>
    <path d="M732 190 C780 155 835 155 890 180" class="w2"/><text x="902" y="184" class="small">λ2</text>
    <path d="M732 220 C780 258 835 258 890 230" class="w3"/><text x="902" y="234" class="small">λ3</text>
    <path d="M732 250 C780 306 835 306 890 278" class="w4"/><text x="902" y="282" class="small">λ4</text>
  </g>
</svg>
