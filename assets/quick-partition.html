<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quick Sort Partition</title>
<style>
:root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--pivot:#dc2626;--i:#2563eb;--j:#059669;--lt:#dbeafe;--ge:#dcfce7;--unk:#fff7ed;--swap:#d97706}
@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--pivot:#f87171;--i:#60a5fa;--j:#34d399;--lt:#172554;--ge:#064e3b;--unk:#431407;--swap:#fbbf24}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.wrap{padding:22px;max-width:1160px;margin:auto}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.title{font-weight:800;font-size:22px}.btns{display:flex;gap:8px}.btn{border:1px solid var(--line);background:var(--panel);color:var(--fg);border-radius:8px;padding:8px 12px;cursor:pointer}.grid{display:grid;grid-template-columns:1.16fr .84fr;gap:16px}.panel{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:16px}.array{display:flex;gap:7px;align-items:flex-start;min-height:160px;flex-wrap:wrap}.cell{width:58px;border:2px solid var(--line);background:var(--bg);border-radius:10px;text-align:center;padding:9px 2px;position:relative}.v{font-size:20px;font-weight:800}.idx{font-size:11px;color:var(--muted);margin-top:3px}.tag{position:absolute;left:50%;transform:translateX(-50%);bottom:-25px;font-size:12px;font-weight:800}.pivot{border-color:var(--pivot)}.ip{box-shadow:0 0 0 3px color-mix(in srgb,var(--i) 25%,transparent)}.jp{box-shadow:0 0 0 3px color-mix(in srgb,var(--j) 25%,transparent)}.lt{background:var(--lt)}.ge{background:var(--ge)}.unk{background:var(--unk)}.swap{border-color:var(--swap);transform:translateY(-8px)}.bands{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;font-size:13px;color:var(--muted)}.band{border:1px solid var(--line);border-radius:8px;padding:8px;background:var(--bg)}.note{font-size:16px;line-height:1.75}.code{white-space:pre-wrap;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;font-family:Consolas,monospace;font-size:13px;line-height:1.45}.progress{color:var(--muted);font-size:14px}
@media(max-width:820px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.cell{width:50px}.bands{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><div class="title">快速排序：循环不变量划分法</div><div id="progress" class="progress"></div></div>
    <div class="btns"><button id="prev" class="btn">上一步</button><button id="next" class="btn">下一步</button></div>
  </div>
  <div class="grid">
    <div class="panel">
      <div id="array" class="array"></div>
      <div class="bands">
        <div class="band">pivot: A[lo]</div>
        <div class="band">[lo+1, i] &lt; pivot</div>
        <div class="band">[i+1, j] 未确认</div>
        <div class="band">[j+1, hi) &gt;= pivot</div>
      </div>
    </div>
    <div class="panel"><div id="note" class="note"></div><div id="code" class="code"></div></div>
  </div>
</div>
<script>
const steps=[
{a:[49,38,65,97,76,13,27,49],i:0,j:7,pivot:0,lt:[],unk:[1,2,3,4,5,6,7],ge:[],n:"处理半开区间 [lo, hi)。取 A[lo]=49 为 pivot，i=lo，j=hi-1。此时小于区为空，未知区是 [i+1, j]。",c:"pivot = A[lo];\ni = lo;\nj = hi - 1;"},
{a:[49,38,65,97,76,13,27,49],i:1,j:6,pivot:0,lt:[1],unk:[2,3,4,5,6],ge:[7],n:"i 向右扩展小于区：38 < 49，所以 i 前进到 1。j 向左跳过 >=49 的元素，停在 27。",c:"while (i < j && A[i + 1] < pivot) i++;\nwhile (i < j && A[j] >= pivot) j--;"},
{a:[49,38,27,97,76,13,65,49],i:1,j:6,pivot:0,lt:[1],unk:[2,3,4,5,6],ge:[7],sw:[2,6],n:"A[i+1]=65 不该在左边，A[j]=27 应进入小于区，交换 A[i+1] 与 A[j]。",c:"swap_int(&A[i + 1], &A[j]);"},
{a:[49,38,27,97,76,13,65,49],i:2,j:5,pivot:0,lt:[1,2],unk:[3,4,5],ge:[6,7],n:"交换后，27 位于 i+1。下一轮先扩展 i：27 < 49，于是小于区变为 [lo+1, i]。j 跳过 65，停在 13。",c:"// invariant restored\n// A[lo+1..i] < pivot\n// A[j+1..hi-1] >= pivot"},
{a:[49,38,27,13,76,97,65,49],i:2,j:5,pivot:0,lt:[1,2],unk:[3,4,5],ge:[6,7],sw:[3,5],n:"A[i+1]=97 与 A[j]=13 交换。交换的目的不是把左右两边排好序，而是维持两个区间的语义。",c:"swap_int(&A[i + 1], &A[j]);"},
{a:[49,38,27,13,76,97,65,49],i:3,j:3,pivot:0,lt:[1,2,3],unk:[],ge:[4,5,6,7],n:"i 扩展到 13，j 向左跳过 97、76 后与 i 相遇。未知区为空。",c:"while (i < j && A[i + 1] < pivot) i++;\nwhile (i < j && A[j] >= pivot) j--;"},
{a:[13,38,27,49,76,97,65,49],i:3,j:3,pivot:3,lt:[0,1,2],ge:[4,5,6,7],sw:[0,3],n:"把 pivot 与 A[i] 交换。pivot 到达最终位置 i；左边都小于 pivot，右边都大于等于 pivot。",c:"swap_int(&A[lo], &A[i]);\nreturn i;"},
{a:[13,38,27,49,76,97,65,49],i:3,j:3,pivot:3,lt:[0,1,2],ge:[4,5,6,7],n:"一次划分后的合法性只要求左右区间满足大小关系，不要求左右区间内部有序。",c:"A[lo..i-1] < pivot\nA[i] == pivot\nA[i+1..hi-1] >= pivot"}
];
let k=0;
function render(){
 const s=steps[k], arr=document.getElementById('array');arr.innerHTML='';
 s.a.forEach((v,idx)=>{const d=document.createElement('div');d.className='cell';if(idx===s.pivot)d.classList.add('pivot');if(idx===s.i)d.classList.add('ip');if(idx===s.j)d.classList.add('jp');if(s.lt?.includes(idx))d.classList.add('lt');if(s.ge?.includes(idx))d.classList.add('ge');if(s.unk?.includes(idx))d.classList.add('unk');if(s.sw?.includes(idx))d.classList.add('swap');let tags=[];if(idx===s.i)tags.push('i');if(idx===s.j)tags.push('j');if(idx===s.pivot)tags.push('p');d.innerHTML=`<div class="v">${v}</div><div class="idx">${idx}</div><div class="tag">${tags.join('/')}</div>`;arr.appendChild(d)});
 note.textContent=s.n;code.textContent=s.c;progress.textContent=`${k+1} / ${steps.length}`;
}
prev.onclick=()=>{k=(k-1+steps.length)%steps.length;render()};
next.onclick=()=>{k=(k+1)%steps.length;render()};
render();
</script>
</body>
</html>
