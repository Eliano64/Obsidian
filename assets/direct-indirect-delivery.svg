<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="430" viewBox="0 0 1050 430" role="img" aria-labelledby="title desc">
  <title id="title">直接交付与间接交付</title>
  <desc id="desc">同一网络内直接交付，不同网络先交给默认网关或下一跳路由器。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}.bg{fill:#f8fafc}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:18px}.small{fill:#334155;font-size:15px}.net{fill:#fff;stroke:#cbd5e1;stroke-width:2}.host{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.router{fill:#fed7aa;stroke:#f97316;stroke-width:2}.line{stroke:#64748b;stroke-width:3}.arrow{stroke:#16a34a;stroke-width:4;fill:none;marker-end:url(#arrow)}.label{fill:#0369a1;font-weight:700}@media(prefers-color-scheme:dark){.bg{fill:#020617}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.net{fill:#0f172a;stroke:#334155}.host{fill:#172554;stroke:#60a5fa}.router{fill:#431407;stroke:#fb923c}.line{stroke:#94a3b8}.arrow{stroke:#4ade80}.label{fill:#67e8f9}}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/></marker></defs>
  <rect class="bg" width="1050" height="430"/>
  <text class="text" x="525" y="42" text-anchor="middle" font-size="25" font-weight="700">主机先判断目的地址是否在本网络</text>
  <rect class="net" x="70" y="95" width="400" height="250" rx="12"/>
  <text class="label" x="270" y="125" text-anchor="middle">网络 192.168.0.0/25</text>
  <rect class="host" x="120" y="185" width="95" height="55" rx="8"/><text class="text" x="167" y="219" text-anchor="middle">A</text>
  <rect class="host" x="330" y="185" width="95" height="55" rx="8"/><text class="text" x="377" y="219" text-anchor="middle">C</text>
  <line class="line" x1="215" y1="212" x2="330" y2="212"/>
  <path class="arrow" d="M220 180 C260 145,300 145,330 180"/>
  <text class="small" x="270" y="285" text-anchor="middle">同一网络：A 直接把帧发给 C</text>

  <rect class="net" x="580" y="95" width="400" height="250" rx="12"/>
  <text class="label" x="780" y="125" text-anchor="middle">两个网络经路由器互连</text>
  <rect class="host" x="625" y="185" width="85" height="55" rx="8"/><text class="text" x="667" y="219" text-anchor="middle">A</text>
  <rect class="router" x="745" y="180" width="80" height="65" rx="10"/><text class="text" x="785" y="219" text-anchor="middle">R</text>
  <rect class="host" x="865" y="185" width="85" height="55" rx="8"/><text class="text" x="907" y="219" text-anchor="middle">D</text>
  <line class="line" x1="710" y1="212" x2="745" y2="212"/><line class="line" x1="825" y1="212" x2="865" y2="212"/>
  <path class="arrow" d="M670 170 C700 140,745 140,785 170"/>
  <path class="arrow" d="M785 255 C820 290,860 290,900 255"/>
  <text class="small" x="780" y="285" text-anchor="middle">不同网络：A 先交给默认网关 R</text>
</svg>
