<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="430" viewBox="0 0 1050 430" role="img" aria-labelledby="title desc"><title id="title">私有网络与公网边界</title><desc id="desc">私有地址只在机构内部有效，穿越公网边界需要 NAT 或隧道等机制。</desc><style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}
:root{color-scheme:light dark}.bg{fill:#f8fafc}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:18px}.small{fill:#334155;font-size:15px}.priv{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.pub{fill:#dbeafe;stroke:#2563eb;stroke-width:2}.nat{fill:#fed7aa;stroke:#f97316;stroke-width:2}.line{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}.label{fill:#0369a1;font-weight:700}@media(prefers-color-scheme:dark){.bg{fill:#020617}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.priv{fill:#052e16;stroke:#4ade80}.pub{fill:#172554;stroke:#60a5fa}.nat{fill:#431407;stroke:#fb923c}.line{stroke:#94a3b8}.label{fill:#67e8f9}}</style><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/></marker></defs><rect class="bg" width="1050" height="430"/><text class="text" x="525" y="42" text-anchor="middle" font-size="25" font-weight="700">私有地址不能在公网直接路由</text><rect class="priv" x="70" y="100" width="360" height="230" rx="14"/><text class="label" x="250" y="135" text-anchor="middle">机构内部私有网络</text><text class="small" x="250" y="180" text-anchor="middle">10.0.0.0/8</text><text class="small" x="250" y="215" text-anchor="middle">172.16.0.0/12</text><text class="small" x="250" y="250" text-anchor="middle">192.168.0.0/16</text><rect class="nat" x="485" y="170" width="120" height="80" rx="12"/><text class="text" x="545" y="218" text-anchor="middle">NAT/VPN</text><rect class="pub" x="660" y="100" width="320" height="230" rx="14"/><text class="label" x="820" y="135" text-anchor="middle">公共因特网</text><text class="small" x="820" y="205" text-anchor="middle">公网路由器不转发</text><text class="small" x="820" y="235" text-anchor="middle">目的为私有地址的数据报</text><line class="line" x1="430" y1="210" x2="485" y2="210"/><line class="line" x1="605" y1="210" x2="660" y2="210"/><text class="small" x="525" y="370" text-anchor="middle">边界设备把内部地址转换、封装或加密后，才能让通信穿过公共网络。</text></svg>
