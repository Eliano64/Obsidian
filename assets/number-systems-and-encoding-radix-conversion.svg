<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc">
  <title id="title">Radix Conversion</title>
  <desc id="desc">A static study diagram for radix conversion among decimal, binary, octal, and hexadecimal numbers.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    .bg { fill: #f7f7f4; }
    .panel { fill: #fff; stroke: #ccd4dc; stroke-width: 2; }
    .title { fill: #20262d; font: 700 30px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .h { fill: #20262d; font: 700 20px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .t { fill: #46505a; font: 15px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .small { fill: #5f6873; font: 13px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .formula { fill: #2f6f9f; font: 700 20px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .blue { fill: #eef6fc; stroke: #2f6f9f; stroke-width: 2; rx: 8; }
    .green { fill: #f1f8ef; stroke: #4b7f52; stroke-width: 2; rx: 8; }
    .amber { fill: #fff5e8; stroke: #a86620; stroke-width: 2; rx: 8; }
    .arrow { stroke: #6f7b86; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #151719; }
      .panel { fill: #202428; stroke: #3a4149; }
      .title, .h { fill: #edf0f2; }
      .t { fill: #c6ccd3; }
      .small { fill: #aab2bc; }
      .formula { fill: #7db7e8; }
      .blue { fill: #1f3443; stroke: #7db7e8; }
      .green { fill: #213522; stroke: #95c88f; }
      .amber { fill: #3b2d1c; stroke: #f0b86d; }
      .arrow { stroke: #aab2bc; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#6f7b86"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="680"/>
  <text class="title" x="48" y="58">进位计数制与进制转换</text>
  <text class="t" x="48" y="88">所有转换都围绕“位权”和“基数”展开。</text>

  <rect class="panel" x="48" y="124" width="1024" height="160" rx="8"/>
  <text class="h" x="76" y="162">r 进制位权展开</text>
  <text class="formula" x="110" y="210">K_n K_{n-1} ... K_1 K_0 . K_{-1} K_{-2}</text>
  <text class="formula" x="110" y="250">= K_n r^n + K_{n-1} r^{n-1} + ... + K_0 r^0 + K_{-1} r^{-1} + K_{-2} r^{-2}</text>
  <text class="small" x="76" y="268">每一位的数码必须小于基数 r。</text>

  <rect class="blue" x="82" y="350" width="270" height="104"/>
  <text class="h" x="118" y="386">任意进制 -> 十进制</text>
  <text class="t" x="118" y="420">按位权展开后求和。</text>

  <rect class="green" x="424" y="350" width="270" height="104"/>
  <text class="h" x="460" y="386">十进制 -> 任意进制</text>
  <text class="t" x="460" y="420">整数除基取余，小数乘基取整。</text>

  <rect class="amber" x="766" y="350" width="270" height="104"/>
  <text class="h" x="802" y="386">2 / 8 / 16 互转</text>
  <text class="t" x="802" y="420">3 位二进制对应 1 位八进制；4 位二进制对应 1 位十六进制。</text>

  <path class="arrow" d="M352 402 H414"/>
  <path class="arrow" d="M694 402 H756"/>

  <rect class="panel" x="82" y="514" width="954" height="92" rx="8"/>
  <text class="h" x="116" y="550">速记</text>
  <text class="t" x="190" y="550">转十进制看位权；从十进制转出去看除基或乘基；二、八、十六进制互转先对齐二进制分组。</text>
</svg>
