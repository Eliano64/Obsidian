<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
  <title id="title">CPU register roles</title>
  <desc id="desc">Common CPU registers grouped by whether they hold addresses, instructions, data, or status.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --ink: #172033;
      --muted: #5c687a;
      --line: #516173;
      --addr: #e8f1ff;
      --inst: #fff2d8;
      --data: #eef7ee;
      --state: #f6eafe;
      --chip: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1420;
        --ink: #e7edf7;
        --muted: #aab6c8;
        --line: #91a0b5;
        --addr: #17243a;
        --inst: #302417;
        --data: #18291d;
        --state: #2b1c35;
        --chip: #151c2a;
      }
    }
    svg { background: var(--bg); font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    text { fill: var(--ink); }
    .title { font-size: 30px; font-weight: 700; }
    .groupTitle { font-size: 23px; font-weight: 700; }
    .reg { font-size: 24px; font-weight: 800; }
    .note { font-size: 17px; fill: var(--muted); }
    .small { font-size: 15px; fill: var(--muted); }
    .panel { stroke: var(--line); stroke-width: 2.2; rx: 16; }
    .box { fill: var(--chip); stroke: var(--line); stroke-width: 2; rx: 10; }
    .addr { fill: var(--addr); }
    .inst { fill: var(--inst); }
    .data { fill: var(--data); }
    .state { fill: var(--state); }
    .arrow { stroke: var(--line); stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="var(--line)"/>
    </marker>
  </defs>

  <text x="590" y="48" text-anchor="middle" class="title">关键寄存器：先看“它保存什么”</text>

  <rect x="52" y="92" width="250" height="392" class="panel addr"/>
  <text x="177" y="128" text-anchor="middle" class="groupTitle">地址类</text>
  <rect x="82" y="158" width="190" height="78" class="box"/>
  <text x="177" y="190" text-anchor="middle" class="reg">PC</text>
  <text x="177" y="216" text-anchor="middle" class="note">下一条指令地址</text>
  <rect x="82" y="280" width="190" height="78" class="box"/>
  <text x="177" y="312" text-anchor="middle" class="reg">MAR</text>
  <text x="177" y="338" text-anchor="middle" class="note">本次访存地址</text>
  <text x="177" y="420" text-anchor="middle" class="small">PC 是程序流位置</text>
  <text x="177" y="446" text-anchor="middle" class="small">MAR 是一次主存访问的地址口</text>

  <rect x="332" y="92" width="250" height="392" class="panel inst"/>
  <text x="457" y="128" text-anchor="middle" class="groupTitle">指令类</text>
  <rect x="362" y="158" width="190" height="78" class="box"/>
  <text x="457" y="190" text-anchor="middle" class="reg">IR</text>
  <text x="457" y="216" text-anchor="middle" class="note">当前正在执行的指令</text>
  <rect x="362" y="280" width="190" height="78" class="box"/>
  <text x="457" y="312" text-anchor="middle" class="reg">OP / Ad</text>
  <text x="457" y="338" text-anchor="middle" class="note">操作码 / 地址码字段</text>
  <text x="457" y="420" text-anchor="middle" class="small">CU 译码 OP</text>
  <text x="457" y="446" text-anchor="middle" class="small">寻址过程会使用 Ad 字段</text>

  <rect x="612" y="92" width="250" height="392" class="panel data"/>
  <text x="737" y="128" text-anchor="middle" class="groupTitle">数据类</text>
  <rect x="642" y="150" width="190" height="62" class="box"/>
  <text x="737" y="188" text-anchor="middle" class="reg">MDR</text>
  <rect x="642" y="232" width="190" height="62" class="box"/>
  <text x="737" y="270" text-anchor="middle" class="reg">ACC</text>
  <rect x="642" y="314" width="190" height="62" class="box"/>
  <text x="737" y="352" text-anchor="middle" class="reg">MQ / X</text>
  <text x="737" y="420" text-anchor="middle" class="small">MDR 是主存数据口</text>
  <text x="737" y="446" text-anchor="middle" class="small">ACC、MQ、X 参与具体运算</text>

  <rect x="892" y="92" width="236" height="392" class="panel state"/>
  <text x="1010" y="128" text-anchor="middle" class="groupTitle">状态类</text>
  <rect x="922" y="158" width="176" height="78" class="box"/>
  <text x="1010" y="190" text-anchor="middle" class="reg">PSW</text>
  <text x="1010" y="216" text-anchor="middle" class="note">程序状态字</text>
  <text x="1010" y="276" text-anchor="middle" class="note">ZF / SF / CF / OF</text>
  <text x="1010" y="420" text-anchor="middle" class="small">保存运算结果状态</text>
  <text x="1010" y="446" text-anchor="middle" class="small">会影响条件转移和控制判断</text>

  <path d="M272 197 H362" class="arrow"/>
  <text x="317" y="184" text-anchor="middle" class="small">取指后</text>
  <path d="M552 319 H642" class="arrow"/>
  <text x="597" y="306" text-anchor="middle" class="small">访存</text>
  <path d="M832 263 H922" class="arrow"/>
  <text x="877" y="250" text-anchor="middle" class="small">运算置位</text>

  <rect x="76" y="518" width="1028" height="54" class="box"/>
  <text x="590" y="552" text-anchor="middle" class="note">易混点：MAR/MDR 面向“这一次主存访问”，PC/IR 面向“这条指令”，PSW 面向“上一次相关运算的结果状态”。</text>
</svg>
