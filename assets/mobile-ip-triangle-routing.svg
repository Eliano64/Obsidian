<svg xmlns="http://www.w3.org/2000/svg" width="920" height="380" viewBox="0 0 920 380" role="img" aria-labelledby="title desc">
  <title id="title">Mobile IP triangle routing</title>
  <desc id="desc">Correspondent host sends through home agent to foreign agent, while mobile host can send directly back.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.node{fill:#fff;stroke:#475569;stroke-width:2;rx:10}.agent{fill:#eff6ff;stroke:#2563eb}.mobile{fill:#f0fdf4;stroke:#16a34a}.line{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}.return{stroke:#16a34a;stroke-width:3;fill:none;stroke-dasharray:8 6;marker-end:url(#greenArrow)}.label{font-size:20px;font-weight:700}.small{font-size:14px}@media(prefers-color-scheme:dark){text{fill:#e5e7eb}.node{fill:#0b1220;stroke:#cbd5e1}.agent{fill:#10213f;stroke:#60a5fa}.mobile{fill:#0f2b1d;stroke:#4ade80}.line{stroke:#60a5fa}.return{stroke:#4ade80}}</style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker><marker id="greenArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/></marker></defs>
  <text x="460" y="38" text-anchor="middle" class="label">移动 IP 的三角形路由</text>
  <rect x="80" y="155" width="130" height="65" class="node"/><text x="145" y="193" text-anchor="middle" class="small">固定主机</text>
  <rect x="395" y="80" width="130" height="65" class="node agent"/><text x="460" y="107" text-anchor="middle" class="small">归属代理</text><text x="460" y="128" text-anchor="middle" class="small">HA</text>
  <rect x="600" y="235" width="130" height="65" class="node agent"/><text x="665" y="262" text-anchor="middle" class="small">外地代理</text><text x="665" y="283" text-anchor="middle" class="small">FA/转交地址</text>
  <rect x="765" y="155" width="115" height="65" class="node mobile"/><text x="822" y="193" text-anchor="middle" class="small">移动主机</text>
  <path d="M210 170 C285 95, 335 88, 395 105" class="line"/><path d="M525 122 C585 150, 625 195, 653 235" class="line"/><path d="M730 260 C765 245, 790 225, 810 220" class="line"/>
  <path d="M765 190 C560 345, 300 315, 210 205" class="return"/>
  <text x="395" y="245" text-anchor="middle" class="small">固定主机 → 归属代理 → 外地代理 → 移动主机</text>
  <text x="450" y="335" text-anchor="middle" class="small">移动主机回送可直接发给固定主机，因此形成三角形路径</text>
</svg>
