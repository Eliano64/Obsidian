<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">IPC methods comparison</title>
  <desc id="desc">Shared memory, message passing, and pipe communication compared.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; --bg:#fff; --fg:#111827; --muted:#64748b; --line:#94a3b8; --blue:#dbeafe; --green:#dcfce7; --amber:#fef3c7; --accent:#2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg:#0f172a; --fg:#e5e7eb; --muted:#94a3b8; --line:#64748b; --blue:#1e3a8a; --green:#14532d; --amber:#713f12; --accent:#60a5fa; } }
    .bg{fill:var(--bg)} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:var(--fg)} .h{font-weight:700;font-size:21px}.t{font-size:15px}.small{font-size:13px;fill:var(--muted)}.box{stroke:var(--line);stroke-width:2;rx:10}.arrow{fill:none;stroke:var(--accent);stroke-width:3;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="var(--accent)"/></marker></defs>
  <rect class="bg" width="980" height="420"/>
  <g transform="translate(40 48)">
    <rect class="box" width="280" height="300" fill="var(--blue)"/>
    <text class="h" x="140" y="42" text-anchor="middle">共享存储</text>
    <rect class="box" x="35" y="82" width="80" height="58" fill="var(--bg)"/><text class="t" x="75" y="116" text-anchor="middle">进程 P</text>
    <rect class="box" x="165" y="82" width="80" height="58" fill="var(--bg)"/><text class="t" x="205" y="116" text-anchor="middle">进程 Q</text>
    <rect class="box" x="75" y="185" width="130" height="58" fill="var(--green)"/><text class="t" x="140" y="219" text-anchor="middle">共享区</text>
    <path class="arrow" d="M75 140 L115 185"/><path class="arrow" d="M205 140 L165 185"/>
    <text class="small" x="140" y="272" text-anchor="middle">快；必须处理同步互斥</text>
  </g>
  <g transform="translate(350 48)">
    <rect class="box" width="280" height="300" fill="var(--green)"/>
    <text class="h" x="140" y="42" text-anchor="middle">消息传递</text>
    <rect class="box" x="30" y="92" width="78" height="52" fill="var(--bg)"/><text class="t" x="69" y="124" text-anchor="middle">发送者</text>
    <rect class="box" x="172" y="92" width="78" height="52" fill="var(--bg)"/><text class="t" x="211" y="124" text-anchor="middle">接收者</text>
    <rect class="box" x="78" y="185" width="125" height="54" fill="var(--amber)"/><text class="t" x="140" y="218" text-anchor="middle">内核消息队列</text>
    <path class="arrow" d="M108 118 C145 125 175 145 140 185"/><path class="arrow" d="M140 185 C114 152 160 130 172 118"/>
    <text class="small" x="140" y="272" text-anchor="middle">send / receive 传递格式化消息</text>
  </g>
  <g transform="translate(660 48)">
    <rect class="box" width="280" height="300" fill="var(--amber)"/>
    <text class="h" x="140" y="42" text-anchor="middle">管道</text>
    <rect class="box" x="28" y="108" width="72" height="52" fill="var(--bg)"/><text class="t" x="64" y="140" text-anchor="middle">写进程</text>
    <rect class="box" x="180" y="108" width="72" height="52" fill="var(--bg)"/><text class="t" x="216" y="140" text-anchor="middle">读进程</text>
    <rect class="box" x="88" y="198" width="104" height="36" fill="var(--blue)"/><text class="t" x="140" y="222" text-anchor="middle">缓冲区</text>
    <path class="arrow" d="M100 134 C125 150 135 174 140 198"/><path class="arrow" d="M140 198 C145 174 155 150 180 134"/>
    <text class="small" x="140" y="272" text-anchor="middle">半双工；读空/写满会阻塞</text>
  </g>
</svg>
