<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booth Multiplier Logic Structure</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8f6;
      --panel: #fff;
      --text: #20242a;
      --muted: #5b6570;
      --line: #20242a;
      --soft: #cbd4dd;
      --active: #d98600;
      --data: #2d6f9f;
      --control: #7a4bb3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151719;
        --panel: #20252a;
        --text: #edf0f2;
        --muted: #aeb7c0;
        --line: #edf0f2;
        --soft: #3a424b;
        --active: #ffb84d;
        --data: #82bee8;
        --control: #c7a8ff;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
    main { max-width: 1120px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    .sub { margin: 0 0 16px; color: var(--muted); }
    .stage { background: var(--panel); border: 1px solid var(--soft); border-radius: 8px; padding: 14px; }
    svg { width: 100%; height: auto; display: block; }
    .box, .alu, .ctrl, .extra { fill: var(--panel); stroke: var(--line); stroke-width: 2.4; }
    .alu { stroke-width: 3; }
    .ctrl { rx: 24; }
    .label { fill: var(--text); font: 700 22px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .small { fill: var(--muted); font: 15px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .value { fill: var(--data); font: 700 20px Consolas, monospace; }
    .wire { stroke: var(--line); stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    .control { stroke: var(--control); stroke-width: 2.2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrowCtrl); }
    .active { stroke: var(--active) !important; stroke-width: 5 !important; }
    .node-active { stroke: var(--active) !important; stroke-width: 4 !important; }
    .caption { margin-top: 14px; display: grid; grid-template-columns: 1.1fr .9fr; gap: 14px; }
    .panel { background: var(--panel); border: 1px solid var(--soft); border-radius: 8px; padding: 14px; }
    .hint { color: var(--muted); font-size: 14px; margin-bottom: 8px; }
    .mono { font: 20px/1.6 Consolas, "Microsoft YaHei", monospace; white-space: pre-wrap; }
    .controls { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
    button { border: 1px solid var(--soft); background: var(--panel); color: var(--text); border-radius: 6px; padding: 8px 14px; font: inherit; cursor: pointer; }
    button:hover { border-color: var(--data); }
    .status { color: var(--muted); }
    @media (max-width: 760px) { main { padding: 14px; } .caption { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <h1>Booth 补码乘法运算器逻辑结构</h1>
  <p class="sub">例：5 × (-3)。`X` 保存被乘数，`P` 保存部分积，`Y` 保存乘数，`Y-1` 是附加位；控制逻辑根据 `Y0Y-1` 决定加、减或不操作。</p>
  <section class="stage">
    <svg viewBox="0 0 1080 585" role="img" aria-label="Booth 补码乘法运算器逻辑结构">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,7 L9,3.5 z" fill="currentColor"></path>
        </marker>
        <marker id="arrowCtrl" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,7 L9,3.5 z" fill="currentColor"></path>
        </marker>
      </defs>

      <rect id="node-x" class="box" x="360" y="26" width="260" height="62"></rect>
      <text class="label" x="405" y="65">被乘数寄存器 X</text>
      <text id="val-x" class="value" x="468" y="112">0101</text>

      <path id="node-alu" class="alu" d="M285 150 L470 150 L500 182 L530 150 L715 150 L660 252 L340 252 Z"></path>
      <text class="label" x="430" y="208">32 位 ALU</text>
      <text class="small" x="735" y="205">加 / 减</text>

      <rect id="node-p" class="box" x="230" y="330" width="292" height="72"></rect>
      <text class="label" x="292" y="370">乘积寄存器 P</text>
      <text id="val-p" class="value" x="346" y="428">0000</text>

      <rect id="node-y" class="box" x="522" y="330" width="292" height="72"></rect>
      <text class="label" x="590" y="370">乘数寄存器 Y</text>
      <text id="val-y" class="value" x="646" y="428">1101</text>

      <rect id="node-low" class="extra" x="814" y="330" width="58" height="72"></rect>
      <text class="label" x="823" y="370">Y-1</text>
      <text id="val-low" class="value" x="836" y="428">0</text>
      <text class="small" x="500" y="320">64 位 + 附加位</text>

      <rect id="node-ctrl" class="ctrl" x="810" y="190" width="230" height="108" rx="28"></rect>
      <text class="label" x="856" y="228">控制逻辑</text>
      <text class="label" x="870" y="260">计数器 Cn</text>
      <text id="val-pair" class="small" x="858" y="284">观察 Y0Y-1</text>

      <path id="w-x-alu" class="wire" d="M490 88 V150"></path>
      <text class="small" x="512" y="125">32</text>
      <path id="w-p-alu" class="wire" d="M376 330 V252"></path>
      <text class="small" x="394" y="300">32</text>
      <path id="w-alu-p" class="wire" d="M500 252 V330"></path>
      <text class="small" x="518" y="295">32</text>
      <path id="w-shift" class="wire" d="M300 318 H852"></path>
      <text class="label" x="645" y="310">算术右移</text>
      <path id="w-y-ctrl" class="wire" d="M696 402 V502 H925 V298"></path>
      <text class="small" x="710" y="502">Y0 与 Y-1 送控制逻辑</text>
      <path id="w-low-ctrl" class="wire" d="M844 402 V468 H908 V298"></path>
      <path id="w-ctrl-alu" class="control" d="M810 224 H715"></path>
      <text id="op-label" class="small" x="744" y="214">加/减</text>
      <path id="w-ctrl-shift" class="control" d="M810 260 H872 V330"></path>
      <text class="small" x="890" y="320">右移</text>
      <path id="w-ctrl-write" class="control" d="M810 292 H872 V394"></path>
      <text class="small" x="890" y="386">写使能</text>
    </svg>
  </section>

  <section class="caption">
    <div class="panel">
      <div class="hint">当前步骤</div>
      <div id="step" class="mono"></div>
    </div>
    <div class="panel">
      <div class="hint">寄存器观察</div>
      <div id="state" class="mono"></div>
    </div>
  </section>

  <div class="controls">
    <button id="prev">上一步</button>
    <button id="next">下一步</button>
    <span id="status" class="status"></span>
  </div>
</main>
<script>
  const steps = [
    { p:"0000", y:"1101", low:"0", pair:"准备", op:"加/减", active:["node-x","node-p","node-y","node-low"], step:"初始化：X=0101，Y=1101，P=0000，Y-1=0。这里计算 5 × (-3)。", state:"P|Y|Y-1 = 0000 1101 0\nCn=4" },
    { p:"0000", y:"1101", low:"0", pair:"Y0Y-1 = 10", op:"减", active:["node-y","node-low","node-ctrl","w-y-ctrl","w-low-ctrl"], step:"第 1 轮，观察 Y0Y-1 = 10。遇到一段 1 的结束，执行 P = P - X。", state:"10 -> P = P - X" },
    { p:"1011", y:"1101", low:"0", pair:"执行减法", op:"减", active:["node-x","node-p","node-alu","w-x-alu","w-p-alu","w-alu-p","w-ctrl-alu"], step:"第 1 轮，ALU 做减法。", state:"0000 - 0101 = 1011\nP = 1011" },
    { p:"1101", y:"1110", low:"1", pair:"算术右移", op:"右移", active:["node-p","node-y","node-low","w-shift","w-ctrl-shift","w-ctrl-write"], step:"第 1 轮，P|Y|Y-1 算术右移 1 位。", state:"1011 1101 0 >>> 1\n= 1101 1110 1\nCn=3" },
    { p:"1101", y:"1110", low:"1", pair:"Y0Y-1 = 01", op:"加", active:["node-y","node-low","node-ctrl","w-y-ctrl","w-low-ctrl"], step:"第 2 轮，观察 Y0Y-1 = 01。遇到一段 1 的开始，执行 P = P + X。", state:"01 -> P = P + X" },
    { p:"0010", y:"1110", low:"1", pair:"执行加法", op:"加", active:["node-x","node-p","node-alu","w-x-alu","w-p-alu","w-alu-p","w-ctrl-alu"], step:"第 2 轮，ALU 做加法。", state:"1101 + 0101 = 0010\nP = 0010" },
    { p:"0001", y:"0111", low:"0", pair:"算术右移", op:"右移", active:["node-p","node-y","node-low","w-shift","w-ctrl-shift","w-ctrl-write"], step:"第 2 轮，P|Y|Y-1 算术右移 1 位。", state:"0010 1110 1 >>> 1\n= 0001 0111 0\nCn=2" },
    { p:"0001", y:"0111", low:"0", pair:"Y0Y-1 = 10", op:"减", active:["node-y","node-low","node-ctrl","w-y-ctrl","w-low-ctrl"], step:"第 3 轮，观察 Y0Y-1 = 10，再次执行 P = P - X。", state:"10 -> P = P - X" },
    { p:"1100", y:"0111", low:"0", pair:"执行减法", op:"减", active:["node-x","node-p","node-alu","w-x-alu","w-p-alu","w-alu-p","w-ctrl-alu"], step:"第 3 轮，ALU 做减法。", state:"0001 - 0101 = 1100\nP = 1100" },
    { p:"1110", y:"0011", low:"1", pair:"算术右移", op:"右移", active:["node-p","node-y","node-low","w-shift","w-ctrl-shift","w-ctrl-write"], step:"第 3 轮，P|Y|Y-1 算术右移 1 位。", state:"1100 0111 0 >>> 1\n= 1110 0011 1\nCn=1" },
    { p:"1110", y:"0011", low:"1", pair:"Y0Y-1 = 11", op:"不操作", active:["node-y","node-low","node-ctrl","w-y-ctrl","w-low-ctrl"], step:"第 4 轮，观察 Y0Y-1 = 11。没有边界，P 不变。", state:"11 -> P 不变" },
    { p:"1111", y:"0001", low:"1", pair:"算术右移", op:"右移", active:["node-p","node-y","node-low","w-shift","w-ctrl-shift","w-ctrl-write"], step:"第 4 轮，P|Y|Y-1 算术右移 1 位。", state:"1110 0011 1 >>> 1\n= 1111 0001 1\nCn=0" },
    { p:"1111", y:"0001", low:"1", pair:"结束", op:"结束", active:["node-p","node-y"], step:"计数器为 0，运算结束。完整补码乘积保存在 P|Y 中。", state:"P|Y = 1111 0001₂ = -15\n5 × (-3) = -15" }
  ];
  const ids = ["node-x","node-alu","node-p","node-y","node-low","node-ctrl","w-x-alu","w-p-alu","w-alu-p","w-shift","w-y-ctrl","w-low-ctrl","w-ctrl-alu","w-ctrl-shift","w-ctrl-write"];
  let pos = 0;
  function render() {
    const s = steps[pos];
    document.getElementById("val-p").textContent = s.p;
    document.getElementById("val-y").textContent = s.y;
    document.getElementById("val-low").textContent = s.low;
    document.getElementById("val-pair").textContent = s.pair;
    document.getElementById("op-label").textContent = s.op;
    document.getElementById("step").textContent = s.step;
    document.getElementById("state").textContent = s.state;
    document.getElementById("status").textContent = `${pos + 1} / ${steps.length}`;
    ids.forEach(id => document.getElementById(id)?.classList.remove("active", "node-active"));
    s.active.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.add(id.startsWith("node") ? "node-active" : "active");
    });
  }
  document.getElementById("prev").addEventListener("click", () => { pos = Math.max(0, pos - 1); render(); });
  document.getElementById("next").addEventListener("click", () => { pos = Math.min(steps.length - 1, pos + 1); render(); });
  render();
</script>
</body>
</html>
