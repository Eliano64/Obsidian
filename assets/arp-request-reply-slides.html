<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>ARP 请求与响应</title><style>
:root{color-scheme:light dark;--bg:#f8fafc;--fg:#0f172a;--muted:#475569;--border:#cbd5e1;--host:#dbeafe;--frame:#dcfce7;--arp:#fed7aa;--accent:#0369a1}@media(prefers-color-scheme:dark){:root{--bg:#020617;--fg:#e5e7eb;--muted:#cbd5e1;--border:#334155;--host:#172554;--frame:#052e16;--arp:#431407;--accent:#67e8f9}}body{margin:0;background:var(--bg);color:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif}.wrap{max-width:980px;margin:auto;padding:28px}.title{text-align:center;font-size:26px;font-weight:700}.stage{display:grid;grid-template-columns:240px 1fr;gap:20px;margin-top:22px}.step{border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:10px;color:var(--muted)}.step.active{color:var(--fg);border-color:var(--accent)}.canvas{border:1px solid var(--border);border-radius:10px;padding:24px;min-height:330px}.lan{height:3px;background:var(--muted);margin:80px 40px}.nodes{display:flex;justify-content:space-around}.node{background:var(--host);border:2px solid var(--accent);border-radius:8px;padding:12px 24px;text-align:center}.msg{background:var(--arp);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:34px}.controls{text-align:center;margin-top:16px}button{background:transparent;color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:8px 16px;margin:0 6px;font:inherit}.accent{color:var(--accent);font-weight:700}</style></head><body><div class="wrap"><div class="title">ARP：已知同一链路上的 IP，求 MAC</div><div class="stage"><div id="steps"></div><div class="canvas"><div class="nodes"><div class="node">主机 B<br><span class="accent">IP_B / MAC_B</span></div><div class="node">主机 C<br><span class="accent">IP_C / MAC_C</span></div></div><div class="lan"></div><div id="msg" class="msg"></div></div></div><div class="controls"><button id="prev">上一步</button><button id="next">下一步</button></div></div><script>
const data=[["1. 查缓存","B 要给 IP_C 发帧，先查 ARP 高速缓存；若已有 IP_C → MAC_C，直接使用。"],["2. 广播请求","缓存没有时，B 发送广播帧：谁是 IP_C？请把 MAC 地址告诉 MAC_B。"],["3. 目标响应","C 发现请求中的目标 IP 是自己，于是单播返回：IP_C 对应 MAC_C。"],["4. 写入缓存","B 把 IP_C → MAC_C 写入 ARP 高速缓存，之后即可封装目的 MAC 为 MAC_C 的帧。"]];let i=0;function r(){steps.innerHTML=data.map((x,k)=>`<div class="step ${k===i?'active':''}"><b>${x[0]}</b></div>`).join("");msg.innerHTML=data[i][1]}prev.onclick=()=>{i=Math.max(0,i-1);r()};next.onclick=()=>{i=Math.min(data.length-1,i+1);r()};r();
</script></body></html>
