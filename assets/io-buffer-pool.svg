<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">Buffer Pool</title>
  <desc id="desc">Buffer pool with empty, input, and output queues plus four working buffers.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.buf{fill:var(--bg);stroke:var(--blue);stroke-width:2}.work{fill:color-mix(in srgb,var(--orange) 16%,var(--bg));stroke:var(--orange);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--green);stroke-width:3;fill:none;marker-end:url(#ga)}
  </style>
  <defs><marker id="ga" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--green)"/></marker></defs>
  <rect class="bg" width="1120" height="560"/>
  <text class="t" x="560" y="42" text-anchor="middle" font-size="24" font-weight="700">缓冲池</text>
  <rect class="box" x="55" y="95" width="290" height="340" rx="10"/>
  <text class="t" x="200" y="128" text-anchor="middle" font-size="18" font-weight="700">缓冲区队列</text>
  <text class="m" x="92" y="174" font-size="14">空缓冲队列</text>
  <rect class="buf" x="190" y="150" width="34" height="34" rx="4"/><rect class="buf" x="232" y="150" width="34" height="34" rx="4"/><rect class="buf" x="274" y="150" width="34" height="34" rx="4"/>
  <text class="m" x="92" y="254" font-size="14">输入队列</text>
  <rect class="buf" x="190" y="230" width="34" height="34" rx="4"/><rect class="buf" x="232" y="230" width="34" height="34" rx="4"/>
  <text class="m" x="92" y="334" font-size="14">输出队列</text>
  <rect class="buf" x="190" y="310" width="34" height="34" rx="4"/><rect class="buf" x="232" y="310" width="34" height="34" rx="4"/>
  <rect class="box" x="430" y="95" width="300" height="340" rx="10"/>
  <text class="t" x="580" y="128" text-anchor="middle" font-size="18" font-weight="700">四种工作缓冲区</text>
  <rect class="work" x="470" y="165" width="95" height="58" rx="6"/><text class="t" x="518" y="199" text-anchor="middle" font-size="16">hin</text>
  <rect class="work" x="595" y="165" width="95" height="58" rx="6"/><text class="t" x="643" y="199" text-anchor="middle" font-size="16">sin</text>
  <rect class="work" x="470" y="300" width="95" height="58" rx="6"/><text class="t" x="518" y="334" text-anchor="middle" font-size="16">hout</text>
  <rect class="work" x="595" y="300" width="95" height="58" rx="6"/><text class="t" x="643" y="334" text-anchor="middle" font-size="16">sout</text>
  <rect class="box" x="815" y="145" width="220" height="80" rx="8"/>
  <text class="t" x="925" y="178" text-anchor="middle" font-size="17" font-weight="700">输入设备 / 用户进程</text>
  <text class="m" x="925" y="204" text-anchor="middle" font-size="13">产生或消费输入数据</text>
  <rect class="box" x="815" y="310" width="220" height="80" rx="8"/>
  <text class="t" x="925" y="343" text-anchor="middle" font-size="17" font-weight="700">用户进程 / 输出设备</text>
  <text class="m" x="925" y="369" text-anchor="middle" font-size="13">产生或消费输出数据</text>
  <path class="a" d="M345 166 H470"/>
  <path class="a" d="M565 194 H595"/>
  <path class="a" d="M690 194 H815"/>
  <path class="a" d="M345 326 H470"/>
  <path class="a" d="M565 329 H595"/>
  <path class="a" d="M690 329 H815"/>
  <text class="m" x="560" y="500" text-anchor="middle" font-size="14">hin/hout 从空缓冲队列取空块；sin/sout 从输入队列或输出队列取满块，用完后归还空缓冲队列。</text>
</svg>
