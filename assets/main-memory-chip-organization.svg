<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Memory chip organization</title>
  <desc id="desc">A memory chip has address lines, data lines, chip select and read-write control. Capacity equals two to the n times m bits.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 z" fill="#27354f"/>
    </marker>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      .bg { fill: #fbfcff; }
      .title { font: 700 26px "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .label { font: 700 18px "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .small { font: 400 14px "Microsoft YaHei", Arial, sans-serif; fill: #46556f; }
      .formula { font: 700 22px "Microsoft YaHei", Arial, sans-serif; fill: #8a4b00; }
      .chip { fill: #fff7e8; stroke: #d49a3a; stroke-width: 2.2; rx: 10; }
      .inner { fill: #ffffff; stroke: #92a1b8; stroke-width: 1.6; rx: 7; }
      .line { stroke: #27354f; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .bus { stroke: #2f6f53; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .ctrl { stroke: #805ca8; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      #arrow path { fill: #27354f; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #111827; }
        .title, .label { fill: #f3f4f6; }
        .small { fill: #cbd5e1; }
        .formula { fill: #fbbf24; }
        .chip { fill: #3b2a12; stroke: #f59e0b; }
        .inner { fill: #1f2937; stroke: #64748b; }
        .line { stroke: #d1d5db; }
        .bus { stroke: #4ade80; }
        .ctrl { stroke: #c084fc; }
        #arrow path { fill: #d1d5db; }
      }
    </style>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="title" x="48" y="52">存储芯片的外部组织</text>

  <rect class="chip" x="330" y="115" width="320" height="300"/>
  <text class="label" x="490" y="150" text-anchor="middle">存储芯片</text>
  <rect class="inner" x="385" y="185" width="210" height="130"/>
  <text class="label" x="490" y="222" text-anchor="middle">存储阵列</text>
  <text class="small" x="490" y="252" text-anchor="middle">2^n 个存储单元</text>
  <text class="small" x="490" y="278" text-anchor="middle">每个单元 m bit</text>
  <rect class="inner" x="398" y="342" width="184" height="42"/>
  <text class="small" x="490" y="368" text-anchor="middle">译码与读写控制</text>

  <path class="line" d="M110 205 L324 205"/>
  <text class="label" x="120" y="190">n 根地址线</text>
  <text class="small" x="120" y="225">选择 2^n 个单元之一</text>

  <path class="bus" d="M650 250 L870 250"/>
  <text class="label" x="710" y="230">m 根数据线</text>
  <text class="small" x="710" y="280">一次读/写 m bit</text>

  <path class="ctrl" d="M215 345 L324 345"/>
  <text class="label" x="88" y="340">CS / CE</text>
  <text class="small" x="88" y="365">片选或使能</text>

  <path class="ctrl" d="M760 360 L656 360"/>
  <text class="label" x="775" y="354">WE / OE</text>
  <text class="small" x="775" y="379">写允许 / 读允许</text>

  <rect class="inner" x="230" y="455" width="520" height="58"/>
  <text class="formula" x="490" y="491" text-anchor="middle">芯片容量 = 2^n × m bit</text>
</svg>
