<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="460" viewBox="0 0 1040 460" role="img" aria-labelledby="title desc">
  <title id="title">ICMP 报文类型</title>
  <desc id="desc">ICMP 分为差错报告报文和询问报文，并列出常见类型。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    .bg{fill:#f8fafc}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:18px}.small{fill:#334155;font-size:15px}
    .box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.err{fill:#fee2e2;stroke:#ef4444;stroke-width:2}.ask{fill:#dbeafe;stroke:#2563eb;stroke-width:2}
    .line{stroke:#64748b;stroke-width:2}.label{fill:#0369a1;font-weight:700}
    @media(prefers-color-scheme:dark){.bg{fill:#020617}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.box{fill:#0f172a;stroke:#334155}.err{fill:#450a0a;stroke:#f87171}.ask{fill:#172554;stroke:#60a5fa}.line{stroke:#94a3b8}.label{fill:#67e8f9}}
  </style>
  <rect class="bg" width="1040" height="460"/>
  <text class="text" x="520" y="42" text-anchor="middle" font-size="25" font-weight="700">ICMP：封装在 IP 数据报中的控制报文</text>
  <rect class="box" x="410" y="82" width="220" height="56" rx="10"/>
  <text class="text" x="520" y="117" text-anchor="middle">ICMP</text>
  <line class="line" x1="520" y1="138" x2="520" y2="178"/>
  <line class="line" x1="260" y1="178" x2="780" y2="178"/>
  <line class="line" x1="260" y1="178" x2="260" y2="210"/>
  <line class="line" x1="780" y1="178" x2="780" y2="210"/>
  <rect class="err" x="80" y="210" width="360" height="178" rx="10"/>
  <text class="text" x="260" y="245" text-anchor="middle">差错报告报文</text>
  <text class="small" x="125" y="282">终点不可达</text>
  <text class="small" x="125" y="310">源点抑制</text>
  <text class="small" x="125" y="338">时间超过</text>
  <text class="small" x="125" y="366">参数问题、改变路由</text>
  <rect class="ask" x="600" y="210" width="360" height="178" rx="10"/>
  <text class="text" x="780" y="245" text-anchor="middle">询问报文</text>
  <text class="small" x="645" y="300">回送请求 / 回送回答</text>
  <text class="small" x="645" y="336">时间戳请求 / 时间戳回答</text>
  <text class="label" x="520" y="425" text-anchor="middle">PING 基于回送请求/回答；tracert 常利用 TTL 递增和时间超过报文</text>
</svg>
