<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" role="img" aria-labelledby="title desc">
  <title id="title">UDP and TCP service model comparison</title>
  <desc id="desc">UDP keeps a simple connectionless unreliable service, TCP adds connection management and reliable byte stream mechanisms.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}
    .panel{fill:#f8fafc;stroke:#334155;stroke-width:2}.udp{fill:#dcfce7;stroke:#16a34a}.tcp{fill:#dbeafe;stroke:#2563eb}.ip{fill:#fee2e2;stroke:#dc2626}
    .label{font-size:22px;font-weight:700}.mid{font-size:18px;font-weight:700}.small{font-size:15px}
    @media(prefers-color-scheme:dark){text{fill:#e5e7eb}.panel{fill:#111827;stroke:#94a3b8}.udp{fill:#0f2b1d;stroke:#4ade80}.tcp{fill:#10213f;stroke:#60a5fa}.ip{fill:#3b0d0d;stroke:#f87171}}
  </style>
  <text x="490" y="38" text-anchor="middle" class="label">UDP 与 TCP：在 IP 之上增加的能力不同</text>
  <rect x="70" y="82" width="390" height="285" rx="12" class="panel"/>
  <rect x="520" y="82" width="390" height="285" rx="12" class="panel"/>
  <text x="265" y="120" text-anchor="middle" class="mid">UDP</text>
  <text x="715" y="120" text-anchor="middle" class="mid">TCP</text>
  <rect x="125" y="150" width="280" height="48" rx="8" class="ip"/><text x="265" y="180" text-anchor="middle" class="small">IP：无连接、不可靠主机交付</text>
  <rect x="125" y="218" width="280" height="48" rx="8" class="udp"/><text x="265" y="248" text-anchor="middle" class="small">端口分用 + 检验和</text>
  <rect x="125" y="286" width="280" height="48" rx="8" class="udp"/><text x="265" y="316" text-anchor="middle" class="small">不确认、不重传、不排序</text>
  <rect x="575" y="150" width="280" height="48" rx="8" class="ip"/><text x="715" y="180" text-anchor="middle" class="small">IP：无连接、不可靠主机交付</text>
  <rect x="575" y="218" width="280" height="48" rx="8" class="tcp"/><text x="715" y="248" text-anchor="middle" class="small">连接管理 + 端口分用</text>
  <rect x="575" y="286" width="280" height="48" rx="8" class="tcp"/><text x="715" y="316" text-anchor="middle" class="small">确认、重传、排序、流量/拥塞控制</text>
  <text x="265" y="398" text-anchor="middle" class="small">更小开销，适合实时性和简单请求响应</text>
  <text x="715" y="398" text-anchor="middle" class="small">更强语义，适合可靠、有序的字节流</text>
</svg>
