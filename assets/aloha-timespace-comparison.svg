<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-label="纯ALOHA与时隙ALOHA时空图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .muted { fill: #5d6b7e; }
    .axis { stroke: #566274; stroke-width: 2; }
    .grid { stroke: #9aa8bb; stroke-width: 2.4; stroke-dasharray: 8 7; }
    .frame-a { fill: #79a7ff; stroke: #2453a6; stroke-width: 2; opacity: .9; }
    .frame-b { fill: #ffbf63; stroke: #a86200; stroke-width: 2; opacity: .9; }
    .bad { fill: #ffe1e1; stroke: #c03535; stroke-width: 2; }
    .good { fill: #e6f7ed; stroke: #26834d; stroke-width: 2; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    .title { font-size: 28px; font-weight: 700; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e7edf7; }
      .muted { fill: #b6c2d2; }
      .axis { stroke: #a8b4c5; }
      .grid { stroke: #8aa0bd; }
      .frame-a { fill: #315da8; stroke: #8bb7ff; }
      .frame-b { fill: #9a611b; stroke: #ffd28d; }
      .bad { fill: #3b1717; stroke: #ff8686; }
      .good { fill: #123422; stroke: #67d493; }
    }
  </style>
  <text x="480" y="42" text-anchor="middle" class="title">ALOHA：不监听信道，碰撞后随机重发</text>

  <text x="70" y="98" class="label">纯 ALOHA</text>
  <line x1="145" y1="140" x2="855" y2="140" class="axis"/>
  <polygon points="855,140 840,132 840,148" fill="currentColor"/>
  <text x="870" y="146" class="small">t</text>
  <text x="95" y="190" class="small">站点 A</text>
  <text x="95" y="260" class="small">站点 B</text>
  <rect x="205" y="170" width="230" height="36" class="frame-a"/>
  <rect x="342" y="240" width="230" height="36" class="frame-b"/>
  <rect x="318" y="126" width="96" height="172" class="bad" opacity=".5"/>
  <text x="366" y="322" text-anchor="middle" class="small">任意时刻开始发送</text>
  <text x="366" y="347" text-anchor="middle" class="small muted">时间重叠就碰撞</text>

  <text x="70" y="398" class="label">时隙 ALOHA</text>
  <line x1="145" y1="442" x2="855" y2="442" class="axis"/>
  <polygon points="855,442 840,434 840,450" fill="currentColor"/>
  <text x="870" y="448" class="small">t</text>
  <text x="95" y="506" class="small">站点 A</text>
  <text x="95" y="558" class="small">站点 B</text>
  <g>
    <line x1="190" y1="416" x2="190" y2="568" class="grid"/>
    <line x1="300" y1="416" x2="300" y2="568" class="grid"/>
    <line x1="410" y1="416" x2="410" y2="568" class="grid"/>
    <line x1="520" y1="416" x2="520" y2="568" class="grid"/>
    <line x1="630" y1="416" x2="630" y2="568" class="grid"/>
    <line x1="740" y1="416" x2="740" y2="568" class="grid"/>
  </g>
  <rect x="300" y="486" width="110" height="30" class="frame-a"/>
  <rect x="300" y="538" width="110" height="30" class="frame-b"/>
  <rect x="296" y="474" width="118" height="106" class="bad" opacity=".45"/>
  <rect x="520" y="486" width="110" height="30" class="frame-a"/>
  <rect x="740" y="538" width="110" height="30" class="frame-b"/>
  <text x="682" y="412" text-anchor="middle" class="small">只能在时隙边界开始</text>
  <text x="355" y="602" text-anchor="middle" class="small muted">同一时隙内多站发送仍会碰撞</text>
</svg>
