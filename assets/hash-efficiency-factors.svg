<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="420" viewBox="0 0 1040 420">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}.bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.box{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.warn{fill:#fee2e2;stroke:#dc2626;stroke-width:2}.ok{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.edge{stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}.text{fill:#0f172a;font-family:Arial,"Microsoft YaHei",sans-serif}.title{font-size:25px;font-weight:700}.h{font-size:19px;font-weight:700;text-anchor:middle}.small{font-size:15px;text-anchor:middle}.note{font-size:15px;fill:#475569}
    @media(prefers-color-scheme:dark){.bg{fill:#0b1020}.panel{fill:#111827;stroke:#334155}.box{fill:#172554;stroke:#38bdf8}.warn{fill:#3f1d1d;stroke:#f87171}.ok{fill:#12351f;stroke:#4ade80}.edge{stroke:#94a3b8}.text{fill:#e5e7eb}.note{fill:#cbd5e1}}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker></defs>
  <rect class="bg" width="1040" height="420"/>
  <rect class="panel" x="28" y="28" width="984" height="364" rx="8"/>
  <text class="text title" x="60" y="76">散列表查找效率主要由三类因素决定</text>
  <rect class="box" x="75" y="125" width="240" height="105" rx="8"/>
  <text class="text h" x="195" y="165">散列函数</text>
  <text class="text small" x="195" y="198">地址分布越均匀</text>
  <text class="text small" x="195" y="221">冲突越少</text>
  <rect class="box" x="400" y="125" width="240" height="105" rx="8"/>
  <text class="text h" x="520" y="165">冲突处理方法</text>
  <text class="text small" x="520" y="198">拉链法 / 开放定址</text>
  <text class="text small" x="520" y="221">影响探测路径</text>
  <rect class="box" x="725" y="125" width="240" height="105" rx="8"/>
  <text class="text h" x="845" y="165">装填因子 α</text>
  <text class="text small" x="845" y="198">α = 已存元素数 / 表长</text>
  <text class="text small" x="845" y="221">越大越容易冲突</text>
  <line class="edge" x1="195" y1="230" x2="420" y2="292"/>
  <line class="edge" x1="520" y1="230" x2="520" y2="292"/>
  <line class="edge" x1="845" y1="230" x2="620" y2="292"/>
  <rect class="warn" x="360" y="292" width="320" height="55" rx="8"/>
  <text class="text h" x="520" y="327">冲突次数与 ASL 增加</text>
  <text class="text note" x="80" y="370">聚集：若大量关键字或探测路径挤在连续区域，会形成越来越长的探测段，后续元素更容易继续冲突。</text>
</svg>
