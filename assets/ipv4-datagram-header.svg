<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">IPv4 数据报首部格式</title>
  <desc id="desc">IPv4 首部按 32 bit 为一行展示关键字段。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}.bg{fill:#f8fafc}.text{fill:#0f172a;font-family:"Microsoft YaHei","Noto Sans CJK SC",sans-serif;font-size:17px}.small{fill:#334155;font-size:14px}.cell{fill:#fff;stroke:#64748b;stroke-width:1.5}.key{fill:#dbeafe}.frag{fill:#fed7aa}.addr{fill:#dcfce7}.opt{fill:#ede9fe}.note{fill:#0369a1;font-weight:700}@media(prefers-color-scheme:dark){.bg{fill:#020617}.text{fill:#e5e7eb}.small{fill:#cbd5e1}.cell{fill:#0f172a;stroke:#94a3b8}.key{fill:#172554}.frag{fill:#431407}.addr{fill:#052e16}.opt{fill:#2e1065}.note{fill:#67e8f9}}
  </style>
  <rect class="bg" width="1100" height="520"/>
  <text class="text" x="550" y="42" text-anchor="middle" font-size="25" font-weight="700">IPv4 数据报首部：最小 20 B，最大 60 B</text>
  <g transform="translate(80,85)">
    <text class="small" x="0" y="-12">0</text><text class="small" x="235" y="-12">8</text><text class="small" x="470" y="-12">16</text><text class="small" x="705" y="-12">24</text><text class="small" x="940" y="-12">31</text>
    <rect class="cell key" x="0" y="0" width="117.5" height="52"/><text class="text" x="58.75" y="31" text-anchor="middle">版本</text>
    <rect class="cell key" x="117.5" y="0" width="117.5" height="52"/><text class="text" x="176.25" y="31" text-anchor="middle">首部长度</text>
    <rect class="cell" x="235" y="0" width="235" height="52"/><text class="text" x="352.5" y="31" text-anchor="middle">区分服务</text>
    <rect class="cell key" x="470" y="0" width="470" height="52"/><text class="text" x="705" y="31" text-anchor="middle">总长度</text>

    <rect class="cell frag" x="0" y="52" width="470" height="52"/><text class="text" x="235" y="83" text-anchor="middle">标识</text>
    <rect class="cell frag" x="470" y="52" width="88" height="52"/><text class="text" x="514" y="83" text-anchor="middle">标志</text>
    <rect class="cell frag" x="558" y="52" width="382" height="52"/><text class="text" x="749" y="83" text-anchor="middle">片偏移</text>

    <rect class="cell key" x="0" y="104" width="235" height="52"/><text class="text" x="117.5" y="135" text-anchor="middle">TTL</text>
    <rect class="cell key" x="235" y="104" width="235" height="52"/><text class="text" x="352.5" y="135" text-anchor="middle">协议</text>
    <rect class="cell key" x="470" y="104" width="470" height="52"/><text class="text" x="705" y="135" text-anchor="middle">首部检验和</text>

    <rect class="cell addr" x="0" y="156" width="940" height="52"/><text class="text" x="470" y="187" text-anchor="middle">源 IPv4 地址</text>
    <rect class="cell addr" x="0" y="208" width="940" height="52"/><text class="text" x="470" y="239" text-anchor="middle">目的 IPv4 地址</text>
    <rect class="cell opt" x="0" y="260" width="940" height="52"/><text class="text" x="470" y="291" text-anchor="middle">可选字段 + 填充（可没有）</text>
  </g>
  <text class="small" x="160" y="440">首部长度字段以 4 B 为单位；总长度字段以 1 B 为单位。</text>
  <text class="small" x="160" y="470">分片相关字段：标识、DF/MF、片偏移。TTL 和首部检验和会在路由器逐跳处理时变化。</text>
</svg>
