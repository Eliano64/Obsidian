<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">Network congestion load throughput curve</title>
  <desc id="desc">Throughput increases with offered load at first, then saturates and may collapse when congestion becomes severe.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .axis { stroke: #475569; stroke-width: 2.5; marker-end: url(#arrow); }
    .grid { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 5 6; }
    .curve { fill: none; stroke: #2563eb; stroke-width: 5; }
    .bad { fill: none; stroke: #dc2626; stroke-width: 5; }
    .zone1 { fill: #dcfce7; opacity: .55; }
    .zone2 { fill: #fef3c7; opacity: .6; }
    .zone3 { fill: #fee2e2; opacity: .6; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 15px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .axis { stroke: #cbd5e1; }
      .grid { stroke: #334155; }
      .curve { stroke: #60a5fa; }
      .bad { stroke: #f87171; }
      .zone1 { fill: #14532d; opacity: .38; }
      .zone2 { fill: #713f12; opacity: .38; }
      .zone3 { fill: #7f1d1d; opacity: .38; }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="460" y="38" text-anchor="middle" class="label">输入负载与吞吐量的关系</text>
  <rect x="120" y="78" width="215" height="260" class="zone1"/>
  <rect x="335" y="78" width="225" height="260" class="zone2"/>
  <rect x="560" y="78" width="230" height="260" class="zone3"/>
  <line x1="120" y1="338" x2="815" y2="338" class="axis"/>
  <line x1="120" y1="338" x2="120" y2="70" class="axis"/>
  <line x1="120" y1="140" x2="790" y2="140" class="grid"/>
  <line x1="120" y1="240" x2="790" y2="240" class="grid"/>
  <path d="M125 330 C215 275, 285 205, 350 150 C410 105, 495 100, 560 128" class="curve"/>
  <path d="M560 128 C635 165, 700 230, 775 306" class="bad"/>
  <text x="230" y="365" text-anchor="middle" class="small">轻载</text>
  <text x="450" y="365" text-anchor="middle" class="small">接近饱和</text>
  <text x="675" y="365" text-anchor="middle" class="small">拥塞恶化</text>
  <text x="460" y="404" text-anchor="middle" class="small">输入负载</text>
  <text x="60" y="210" text-anchor="middle" class="small" transform="rotate(-90 60 210)">有效吞吐量</text>
  <text x="250" y="105" text-anchor="middle" class="small">吞吐量随负载增加</text>
  <text x="450" y="126" text-anchor="middle" class="small">队列增长，时延变大</text>
  <text x="665" y="150" text-anchor="middle" class="small">丢包和重传增多</text>
  <text x="675" y="182" text-anchor="middle" class="small">有效吞吐量可能下降</text>
</svg>
