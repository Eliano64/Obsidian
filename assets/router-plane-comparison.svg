<svg xmlns="http://www.w3.org/2000/svg" width="940" height="300" viewBox="0 0 940 300" role="img" aria-labelledby="title desc">
  <title id="title">Router data plane and control plane</title>
  <desc id="desc">Data plane forwards individual packets quickly while control plane computes routing information.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
    .data { fill: #eff6ff; stroke: #2563eb; }
    .control { fill: #fff7ed; stroke: #ea580c; }
    .label { font-size: 22px; font-weight: 700; }
    .small { font-size: 16px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .box { fill: #111827; stroke: #94a3b8; }
      .data { fill: #10213f; stroke: #60a5fa; }
      .control { fill: #2b1708; stroke: #fb923c; }
    }
  </style>
  <rect x="60" y="65" width="380" height="180" class="box data"/>
  <rect x="500" y="65" width="380" height="180" class="box control"/>
  <text x="250" y="105" text-anchor="middle" class="label">数据层面</text>
  <text x="690" y="105" text-anchor="middle" class="label">控制层面</text>
  <text x="250" y="145" text-anchor="middle" class="small">对象：一个个待转发分组</text>
  <text x="250" y="175" text-anchor="middle" class="small">动作：查转发表、转发或丢弃</text>
  <text x="250" y="205" text-anchor="middle" class="small">要求：高速，常由硬件完成</text>
  <text x="690" y="145" text-anchor="middle" class="small">对象：网络拓扑和路由信息</text>
  <text x="690" y="175" text-anchor="middle" class="small">动作：运行路由协议、计算路由表</text>
  <text x="690" y="205" text-anchor="middle" class="small">要求：正确收敛，处理变化</text>
</svg>
