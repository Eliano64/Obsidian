<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Replacement Selection Process</title><style>
:root{color-scheme:light dark;--bg:#fff;--ink:#142033;--muted:#64748b;--line:#cbd5e1;--card:#f8fafc;--accent:#2563eb;--good:#16a34a;--bad:#dc2626;--freeze:#f59e0b}
@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--ink:#e5e7eb;--muted:#94a3b8;--line:#475569;--card:#111827;--accent:#60a5fa;--good:#4ade80;--bad:#f87171;--freeze:#fbbf24}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1060px;margin:0 auto;padding:20px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.title{font-size:24px;font-weight:760}.sub{color:var(--muted);font-size:14px}.btns{display:flex;gap:8px}button{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:7px;padding:8px 12px;cursor:pointer}.grid{display:grid;grid-template-columns:1.2fr .9fr;gap:16px;margin-top:16px}.panel{border:1px solid var(--line);border-radius:8px;background:var(--card);padding:14px}.label{font-size:13px;color:var(--muted);margin:10px 0 6px}.row{display:flex;gap:7px;flex-wrap:wrap;min-height:44px}.cell{min-width:42px;height:38px;border:1px solid var(--line);border-radius:7px;background:var(--bg);display:flex;align-items:center;justify-content:center;font:700 14px ui-monospace,Menlo,monospace}.wa{border-color:var(--accent)}.out{background:color-mix(in srgb,var(--good),transparent 84%)}.frozen{border-color:var(--freeze);box-shadow:0 0 0 2px color-mix(in srgb,var(--freeze),transparent 75%)}.pick{border-color:var(--bad);box-shadow:0 0 0 2px color-mix(in srgb,var(--bad),transparent 75%)}.explain{line-height:1.7;color:var(--muted);font-size:15px}.formula{margin-top:10px;border-left:3px solid var(--accent);padding:8px 10px;background:color-mix(in srgb,var(--accent),transparent 90%);font-family:ui-monospace,Menlo,monospace;white-space:pre-wrap}.step{margin-top:8px;color:var(--muted);font-size:13px}@media(max-width:840px){.grid,.top{display:block}.btns{margin-top:10px}}
</style></head><body><main class="wrap"><div class="top"><div><div class="title">置换-选择排序：生成更长初始归并段</div><div class="sub">内存工作区容量为 3，演示冻结与换段</div></div><div class="btns"><button id="prev">上一步</button><button id="next">下一步</button></div></div><section class="grid"><div class="panel"><div class="label">FI 剩余输入</div><div class="row" id="fi"></div><div class="label">WA 内存工作区</div><div class="row" id="wa"></div><div class="label">FO 初始归并段</div><div id="fo"></div></div><div class="panel"><div class="explain" id="text"></div><div class="formula" id="formula"></div><div class="step" id="step"></div></div></section></main><script>
const steps=[
{fi:[7,13,11,16,14,10,22,30,2,3,19,20,17,1,23,5,36,12,18,21,39],wa:[[4,'pick'],[6,''],[9,'']],runs:[[]],t:'先读入 3 个记录到 WA。当前 MINIMAX 为 -∞，选 WA 中最小的 4 输出。',f:'输出 4，MINIMAX=4'},
{fi:[13,11,16,14,10,22,30,2,3,19,20,17,1,23,5,36,12,18,21,39],wa:[[7,''],[6,'pick'],[9,'']],runs:[[4]],t:'读入 7 替换 4。因为 7 >= MINIMAX，可以继续参与当前归并段。选 6 输出。',f:'输出 6，MINIMAX=6'},
{fi:[16,14,10,22,30,2,3,19,20,17,1,23,5,36,12,18,21,39],wa:[[7,'pick'],[13,''],[9,'']],runs:[[4,6]],t:'读入 13。WA 中能接在 6 后面的最小记录是 7。',f:'输出 7，MINIMAX=7'},
{fi:[14,10,22,30,2,3,19,20,17,1,23,5,36,12,18,21,39],wa:[[11,''],[13,''],[9,'pick']],runs:[[4,6,7]],t:'读入 11。继续选择不小于 MINIMAX 的最小记录 9。',f:'输出 9，MINIMAX=9'},
{fi:[22,30,2,3,19,20,17,1,23,5,36,12,18,21,39],wa:[[11,'pick'],[13,''],[10,'']],runs:[[4,6,7,9]],t:'读入 10 后仍可接在当前段后面。选 11 输出。',f:'输出 11，MINIMAX=11'},
{fi:[2,3,19,20,17,1,23,5,36,12,18,21,39],wa:[[14,''],[13,'pick'],[22,'']],runs:[[4,6,7,9,11]],t:'连续读入 14、22，均可参与当前段。选 13 输出。',f:'输出 13，MINIMAX=13'},
{fi:[3,19,20,17,1,23,5,36,12,18,21,39],wa:[[14,'pick'],[2,'frozen'],[22,'']],runs:[[4,6,7,9,11,13]],t:'读入 2，但 2 < MINIMAX，不能放入当前归并段，冻结到下一段。当前仍选 14。',f:'2 被冻结；输出 14，MINIMAX=14'},
{fi:[1,23,5,36,12,18,21,39],wa:[[19,''],[2,'frozen'],[30,'pick']],runs:[[4,6,7,9,11,13,14,16,22]],t:'后续读入的小记录会被冻结。当前段继续输出可接上的记录，直到 30。',f:'输出到 30，第一段结束前 WA 中只剩小于 30 的记录'},
{fi:[23,5,36,12,18,21,39],wa:[[3,'frozen'],[2,'frozen'],[1,'frozen']],runs:[[4,6,7,9,11,13,14,16,22,30],[]],t:'WA 中所有记录都小于 MINIMAX，当前归并段结束。解冻 WA，开始第二个归并段。',f:'R1 = 4 6 7 9 11 13 14 16 22 30'},
{fi:[],wa:[[1,''],[5,''],[12,'']],runs:[[4,6,7,9,11,13,14,16,22,30],[2,3,10,17,19,20,23,36],[1,5,12,18,21,39]],t:'同样规则继续生成后续归并段。该例最终得到 3 个初始归并段。',f:'R2 = 2 3 10 17 19 20 23 36\\nR3 = 1 5 12 18 21 39'}
];let cur=0;
function cells(arr,cls=''){return arr.map(x=>Array.isArray(x)?`<div class="cell ${x[1]}">${x[0]}</div>`:`<div class="cell ${cls}">${x}</div>`).join('')}
function render(){const s=steps[cur];document.getElementById('fi').innerHTML=cells(s.fi);document.getElementById('wa').innerHTML=cells(s.wa,'wa');document.getElementById('fo').innerHTML=s.runs.map((r,i)=>`<div class="label">R${i+1}</div><div class="row">${cells(r,'out')}</div>`).join('');document.getElementById('text').textContent=s.t;document.getElementById('formula').textContent=s.f;document.getElementById('step').textContent=(cur+1)+' / '+steps.length}
document.getElementById('prev').onclick=()=>{cur=(cur+steps.length-1)%steps.length;render()};document.getElementById('next').onclick=()=>{cur=(cur+1)%steps.length;render()};render();
</script></body></html>
