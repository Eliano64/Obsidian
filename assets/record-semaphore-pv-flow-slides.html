<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Record Semaphore P V Flow</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #cbd5e1;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --ok: #16a34a;
      --wait: #f59e0b;
      --bad: #dc2626;
      --shadow: rgba(15, 23, 42, .12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1120;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --line: #374151;
        --accent: #60a5fa;
        --accent-soft: #172554;
        --ok: #34d399;
        --wait: #fbbf24;
        --bad: #fb7185;
        --shadow: rgba(0, 0, 0, .35);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .deck {
      width: min(1160px, 100vw);
      margin: 0 auto;
      padding: 22px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }
    .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      box-shadow: 0 1px 3px var(--shadow);
    }
    button:hover { border-color: var(--accent); }
    .counter { color: var(--muted); min-width: 56px; text-align: center; }
    .grid {
      display: grid;
      grid-template-columns: .95fr 1.2fr 1fr;
      gap: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-height: 470px;
      box-shadow: 0 8px 20px var(--shadow);
    }
    .panel h2 { margin: 0 0 12px; font-size: 17px; }
    .sem {
      border: 2px solid var(--accent);
      border-radius: 10px;
      padding: 16px;
      background: var(--accent-soft);
      display: grid;
      gap: 14px;
    }
    .value {
      font: 700 34px/1 Consolas, monospace;
      color: var(--accent);
    }
    .queue {
      min-height: 86px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .proc {
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      font-weight: 700;
    }
    .code {
      display: grid;
      gap: 8px;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 15px;
    }
    .line {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 7px 9px;
      white-space: nowrap;
    }
    .line.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 4px 0 0 var(--accent);
    }
    .status {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 110px;
      padding: 12px;
      display: grid;
      align-content: center;
      gap: 6px;
    }
    .ok { color: var(--ok); font-weight: 700; }
    .wait { color: var(--wait); font-weight: 700; }
    .bad { color: var(--bad); font-weight: 700; }
    .desc { margin: 14px 0 0; color: var(--text); }
    .muted { color: var(--muted); }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
      .panel { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="deck">
    <header>
      <h1>记录型信号量：P 申请资源，V 释放资源</h1>
      <div class="controls">
        <button id="prev">上一步</button>
        <span class="counter" id="counter"></span>
        <button id="next">下一步</button>
        <button id="reset">重置</button>
      </div>
    </header>
    <section class="grid">
      <div class="panel">
        <h2>信号量 S</h2>
        <div class="sem">
          <div>
            <div class="muted">S.value</div>
            <div class="value" id="value">1</div>
          </div>
          <div>
            <div class="muted">S.L 等待队列</div>
            <div class="queue" id="queue">空</div>
          </div>
        </div>
        <p class="desc" id="desc"></p>
      </div>
      <div class="panel">
        <h2>P(S) / wait(S)</h2>
        <div class="code">
          <div class="line" data-line="p1">S.value--;</div>
          <div class="line" data-line="p2">if (S.value &lt; 0)</div>
          <div class="line" data-line="p3">    block(S.L);</div>
        </div>
        <p class="muted">P 操作先扣资源，再判断是否需要阻塞。</p>
      </div>
      <div class="panel">
        <h2>V(S) / signal(S)</h2>
        <div class="code">
          <div class="line" data-line="v1">S.value++;</div>
          <div class="line" data-line="v2">if (S.value &lt;= 0)</div>
          <div class="line" data-line="v3">    wakeup(S.L);</div>
        </div>
        <div class="status" id="status">
          <div>当前动作：未开始</div>
        </div>
        <p class="muted">V 操作释放资源；若仍有人等待，就唤醒队首进程。</p>
      </div>
    </section>
  </main>
  <script>
    const steps = [
      { line: "", value: 1, queue: [], status: "初始：1 个资源可用。", desc: "S.value 为正，表示还有可用资源。" },
      { line: "p1", value: 0, queue: [], status: "<span class='ok'>P1 执行 P(S)，拿到资源。</span>", desc: "P1 申请资源后，S.value 从 1 变为 0，资源恰好分配完。" },
      { line: "p2", value: 0, queue: [], status: "<span class='ok'>S.value 不小于 0，P1 不阻塞。</span>", desc: "S.value == 0 不表示等待队列有人，只表示没有剩余资源。" },
      { line: "p1", value: -1, queue: [], status: "<span class='wait'>P2 执行 P(S)，资源不够。</span>", desc: "P2 再申请同类资源，S.value 从 0 变成 -1。" },
      { line: "p3", value: -1, queue: ["P2"], status: "<span class='wait'>P2 阻塞，进入 S.L。</span>", desc: "S.value < 0，表示有进程正在等待；绝对值是等待进程数。" },
      { line: "v1", value: 0, queue: ["P2"], status: "P1 执行 V(S)，释放资源。", desc: "释放资源后，S.value 从 -1 变为 0。" },
      { line: "v2", value: 0, queue: ["P2"], status: "<span class='wait'>S.value <= 0，说明释放前有人等待。</span>", desc: "V 后仍满足 S.value <= 0，要唤醒等待队列中的一个进程。" },
      { line: "v3", value: 0, queue: [], status: "<span class='ok'>wakeup(P2)，P2 从阻塞态变为就绪态。</span>", desc: "被唤醒的 P2 获得这次释放出来的资源；S.value 保持 0。" }
    ];
    let index = 0;
    const els = {
      value: document.getElementById("value"),
      queue: document.getElementById("queue"),
      status: document.getElementById("status"),
      desc: document.getElementById("desc"),
      counter: document.getElementById("counter")
    };
    function render() {
      const step = steps[index];
      document.querySelectorAll(".line").forEach(el => {
        el.classList.toggle("active", el.dataset.line === step.line);
      });
      els.value.textContent = step.value;
      els.queue.innerHTML = step.queue.length ? step.queue.map(p => `<span class="proc">${p}</span>`).join("") : "空";
      els.status.innerHTML = `<div>${step.status}</div>`;
      els.desc.textContent = step.desc;
      els.counter.textContent = `${index + 1}/${steps.length}`;
    }
    document.getElementById("prev").onclick = () => { index = Math.max(0, index - 1); render(); };
    document.getElementById("next").onclick = () => { index = Math.min(steps.length - 1, index + 1); render(); };
    document.getElementById("reset").onclick = () => { index = 0; render(); };
    render();
  </script>
</body>
</html>
