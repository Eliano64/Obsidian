<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="430" viewBox="0 0 1150 430" role="img" aria-label="PPP frame format">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    svg { background: transparent; font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    .title { fill: #111827; font-size: 26px; font-weight: 700; }
    .text { fill: #334155; font-size: 18px; }
    .small { fill: #475569; font-size: 15px; }
    .field { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .flag { fill: #fee2e2; stroke: #ef4444; }
    .fixed { fill: #dbeafe; stroke: #2563eb; }
    .proto { fill: #ecfdf5; stroke: #059669; }
    .info { fill: #fff7ed; stroke: #ea580c; }
    .fcs { fill: #ede9fe; stroke: #7c3aed; }
    @media (prefers-color-scheme: dark) {
      .title { fill: #f8fafc; }
      .text { fill: #d1d5db; }
      .small { fill: #94a3b8; }
      .field { fill: #111827; stroke: #475569; }
      .flag { fill: #450a0a; stroke: #f87171; }
      .fixed { fill: #172554; stroke: #60a5fa; }
      .proto { fill: #052e1b; stroke: #34d399; }
      .info { fill: #431407; stroke: #fb923c; }
      .fcs { fill: #2e1065; stroke: #a78bfa; }
    }
  </style>
  <text x="575" y="45" text-anchor="middle" class="title">PPP 帧格式</text>

  <g transform="translate(65,118)">
    <rect x="0" y="0" width="110" height="90" class="field flag"/>
    <rect x="110" y="0" width="120" height="90" class="field fixed"/>
    <rect x="230" y="0" width="120" height="90" class="field fixed"/>
    <rect x="350" y="0" width="140" height="90" class="field proto"/>
    <rect x="490" y="0" width="285" height="90" class="field info"/>
    <rect x="775" y="0" width="135" height="90" class="field fcs"/>
    <rect x="910" y="0" width="110" height="90" class="field flag"/>

    <text x="55" y="37" text-anchor="middle" class="text" font-weight="700">Flag</text>
    <text x="55" y="66" text-anchor="middle" class="small">0x7E</text>
    <text x="170" y="37" text-anchor="middle" class="text" font-weight="700">Address</text>
    <text x="170" y="66" text-anchor="middle" class="small">0xFF</text>
    <text x="290" y="37" text-anchor="middle" class="text" font-weight="700">Control</text>
    <text x="290" y="66" text-anchor="middle" class="small">0x03</text>
    <text x="420" y="37" text-anchor="middle" class="text" font-weight="700">Protocol</text>
    <text x="420" y="66" text-anchor="middle" class="small">载荷类型</text>
    <text x="632" y="37" text-anchor="middle" class="text" font-weight="700">Information</text>
    <text x="632" y="66" text-anchor="middle" class="small">网络层 PDU / LCP / NCP</text>
    <text x="842" y="37" text-anchor="middle" class="text" font-weight="700">FCS</text>
    <text x="842" y="66" text-anchor="middle" class="small">检错</text>
    <text x="965" y="37" text-anchor="middle" class="text" font-weight="700">Flag</text>
    <text x="965" y="66" text-anchor="middle" class="small">0x7E</text>

    <text x="55" y="122" text-anchor="middle" class="small">1 B</text>
    <text x="170" y="122" text-anchor="middle" class="small">1 B</text>
    <text x="290" y="122" text-anchor="middle" class="small">1 B</text>
    <text x="420" y="122" text-anchor="middle" class="small">2 B</text>
    <text x="632" y="122" text-anchor="middle" class="small">可变</text>
    <text x="842" y="122" text-anchor="middle" class="small">2 B 或 4 B</text>
    <text x="965" y="122" text-anchor="middle" class="small">1 B</text>
  </g>

  <text x="575" y="320" text-anchor="middle" class="text">PPP 是点对点链路协议，Address 和 Control 字段通常固定，不承担局域网 MAC 寻址功能。</text>
</svg>
