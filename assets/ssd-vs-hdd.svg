<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="420" viewBox="0 0 1080 420" role="img" aria-labelledby="title desc">
  <title id="title">HDD 与 SSD 对比</title>
  <desc id="desc">对比机械硬盘和固态硬盘的访问特点。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--bg:#fff;--text:#172033;--muted:#536171;--line:#8090a3;--b:#2563eb;--g:#059669;--soft1:#dbeafe;--soft2:#d1fae5}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--text:#e5e7eb;--muted:#aab4c3;--line:#687386;--b:#60a5fa;--g:#34d399;--soft1:#172554;--soft2:#064e3b}}
    .bg{fill:var(--bg)}.title{fill:var(--text);font:700 27px "Microsoft YaHei",sans-serif}.h{fill:var(--text);font:700 21px "Microsoft YaHei",sans-serif}.body{fill:var(--muted);font:16px "Microsoft YaHei",sans-serif}.box{rx:14;stroke-width:2}.disk{fill:none;stroke:var(--b);stroke-width:3}.chip{fill:var(--soft2);stroke:var(--g);stroke-width:2;rx:8}.line{stroke:var(--line);stroke-width:2}
  </style>
  <rect class="bg" width="1080" height="420"/>
  <text class="title" x="54" y="56">机械硬盘与固态硬盘的核心差异</text>
  <rect class="box" x="70" y="100" width="430" height="250" fill="var(--soft1)" stroke="var(--b)"/>
  <text class="h" x="285" y="138" text-anchor="middle">HDD：机械定位</text>
  <circle class="disk" cx="190" cy="230" r="72"/><circle class="disk" cx="190" cy="230" r="38"/>
  <line class="line" x1="310" y1="162" x2="218" y2="210"/>
  <text class="body" x="295" y="214">受寻道时间影响</text>
  <text class="body" x="295" y="244">受旋转延迟影响</text>
  <text class="body" x="295" y="274">连续访问更友好</text>
  <rect class="box" x="580" y="100" width="430" height="250" fill="var(--soft2)" stroke="var(--g)"/>
  <text class="h" x="795" y="138" text-anchor="middle">SSD：电子访问</text>
  <g transform="translate(660 180)">
    <rect class="chip" x="0" y="0" width="58" height="48"/><rect class="chip" x="78" y="0" width="58" height="48"/><rect class="chip" x="156" y="0" width="58" height="48"/>
    <rect class="chip" x="0" y="70" width="58" height="48"/><rect class="chip" x="78" y="70" width="58" height="48"/><rect class="chip" x="156" y="70" width="58" height="48"/>
  </g>
  <text class="body" x="850" y="214">无机械寻道</text>
  <text class="body" x="850" y="244">随机访问性能好</text>
  <text class="body" x="850" y="274">写入受擦除单位制约</text>
</svg>
