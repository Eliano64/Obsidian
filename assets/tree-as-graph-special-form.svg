<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">Tree and directed tree as graph forms</title>
  <desc id="desc">Undirected tree, forest, and directed tree.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}.edge{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}.arc{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    .node{fill:#fff;stroke:#2563eb;stroke-width:3}.node2{fill:#fff;stroke:#16a34a;stroke-width:3}.text{fill:#0f172a;font-size:21px;font-weight:650}.small{fill:#334155;font-size:16px}
    @media(prefers-color-scheme:dark){.panel{fill:#111827;stroke:#334155}.edge,.arc{stroke:#cbd5e1}.node,.node2{fill:#0b1220}.text{fill:#f8fafc}.small{fill:#cbd5e1}}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect class="panel" x="28" y="30" width="288" height="410" rx="10"/><rect class="panel" x="346" y="30" width="288" height="410" rx="10"/><rect class="panel" x="664" y="30" width="288" height="410" rx="10"/>
  <text class="text" x="70" y="78">树</text>
  <line class="edge" x1="170" y1="120" x2="115" y2="220"/><line class="edge" x1="170" y1="120" x2="225" y2="220"/><line class="edge" x1="115" y1="220" x2="90" y2="320"/><line class="edge" x1="115" y1="220" x2="145" y2="320"/>
  <circle class="node" cx="170" cy="120" r="23"/><text class="text" x="162" y="128">A</text><circle class="node" cx="115" cy="220" r="23"/><text class="text" x="107" y="228">B</text><circle class="node" cx="225" cy="220" r="23"/><text class="text" x="217" y="228">C</text><circle class="node" cx="90" cy="320" r="23"/><text class="text" x="82" y="328">D</text><circle class="node" cx="145" cy="320" r="23"/><text class="text" x="137" y="328">E</text>
  <text class="small" x="66" y="390">连通且无回路；n 个顶点有 n-1 条边</text>
  <text class="text" x="388" y="78">森林</text>
  <line class="edge" x1="430" y1="145" x2="395" y2="235"/><line class="edge" x1="430" y1="145" x2="470" y2="235"/><line class="edge" x1="540" y1="190" x2="585" y2="285"/>
  <circle class="node" cx="430" cy="145" r="23"/><text class="text" x="422" y="153">A</text><circle class="node" cx="395" cy="235" r="23"/><text class="text" x="387" y="243">B</text><circle class="node" cx="470" cy="235" r="23"/><text class="text" x="462" y="243">C</text><circle class="node" cx="540" cy="190" r="23"/><text class="text" x="532" y="198">D</text><circle class="node" cx="585" cy="285" r="23"/><text class="text" x="577" y="293">E</text>
  <text class="small" x="384" y="390">多个互不相交的树组成森林</text>
  <text class="text" x="706" y="78">有向树</text>
  <path class="arc" d="M805 125 L750 215"/><path class="arc" d="M805 125 L860 215"/><path class="arc" d="M750 215 L725 315"/><path class="arc" d="M750 215 L780 315"/>
  <circle class="node2" cx="805" cy="120" r="23"/><text class="text" x="797" y="128">A</text><circle class="node2" cx="750" cy="220" r="23"/><text class="text" x="742" y="228">B</text><circle class="node2" cx="860" cy="220" r="23"/><text class="text" x="852" y="228">C</text><circle class="node2" cx="725" cy="320" r="23"/><text class="text" x="717" y="328">D</text><circle class="node2" cx="780" cy="320" r="23"/><text class="text" x="772" y="328">E</text>
  <text class="small" x="702" y="390">一个顶点入度 0，其余顶点入度 1</text>
</svg>
