<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Double Flag Precheck Interleaving</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #cbd5e1;
      --accent: #2563eb;
      --bad: #dc2626;
      --ok: #16a34a;
      --code: #eff6ff;
      --shadow: rgba(15, 23, 42, .12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1120;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --line: #374151;
        --accent: #60a5fa;
        --bad: #fb7185;
        --ok: #34d399;
        --code: #172554;
        --shadow: rgba(0, 0, 0, .35);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .deck {
      width: min(1120px, 100vw);
      margin: 0 auto;
      padding: 22px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      box-shadow: 0 1px 3px var(--shadow);
    }
    button:hover { border-color: var(--accent); }
    .counter { color: var(--muted); min-width: 56px; text-align: center; }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 1.1fr .95fr;
      gap: 16px;
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 8px 20px var(--shadow);
      min-height: 420px;
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: 17px;
    }
    .code {
      display: grid;
      gap: 8px;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 15px;
    }
    .line {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 7px 9px;
      background: transparent;
      white-space: nowrap;
    }
    .line.active {
      border-color: var(--accent);
      background: var(--code);
      box-shadow: inset 4px 0 0 var(--accent);
    }
    .line.done { color: var(--muted); }
    .state {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }
    .flag {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      display: grid;
      gap: 6px;
    }
    .value {
      font: 700 26px/1 Consolas, monospace;
    }
    .false { color: var(--ok); }
    .true { color: var(--bad); }
    .critical {
      border: 2px solid var(--line);
      border-radius: 8px;
      min-height: 110px;
      padding: 12px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
    }
    .critical.danger {
      border-color: var(--bad);
      color: var(--bad);
      font-weight: 700;
      background: color-mix(in srgb, var(--bad) 12%, transparent);
    }
    .step-text {
      margin-top: 14px;
      color: var(--text);
    }
    .muted { color: var(--muted); }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
      .panel { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="deck">
    <header>
      <h1>双标志先检查法：检查与上锁之间被切换</h1>
      <div class="controls">
        <button id="prev">上一步</button>
        <span class="counter" id="counter"></span>
        <button id="next">下一步</button>
        <button id="reset">重置</button>
      </div>
    </header>
    <section class="grid">
      <div class="panel">
        <h2>P0</h2>
        <div class="code">
          <div class="line" data-line="p0-1">while (flag[1]);</div>
          <div class="line" data-line="p0-2">flag[0] = true;</div>
          <div class="line" data-line="p0-3">critical section;</div>
          <div class="line" data-line="p0-4">flag[0] = false;</div>
        </div>
      </div>
      <div class="panel">
        <h2>P1</h2>
        <div class="code">
          <div class="line" data-line="p1-1">while (flag[0]);</div>
          <div class="line" data-line="p1-2">flag[1] = true;</div>
          <div class="line" data-line="p1-3">critical section;</div>
          <div class="line" data-line="p1-4">flag[1] = false;</div>
        </div>
      </div>
      <div class="panel">
        <h2>共享状态</h2>
        <div class="state">
          <div class="flag">flag[0]<span class="value false" id="f0">false</span></div>
          <div class="flag">flag[1]<span class="value false" id="f1">false</span></div>
          <div class="critical" id="critical">临界区空闲</div>
        </div>
        <p class="step-text" id="desc"></p>
        <p class="muted">问题根源：先检查，再上锁；这两个动作不是原子操作。</p>
      </div>
    </section>
  </main>
  <script>
    const steps = [
      { line: "", f0: false, f1: false, inside: [], desc: "初始状态：两个进程都还没有表达进入临界区的意愿。" },
      { line: "p0-1", f0: false, f1: false, inside: [], desc: "P0 检查 flag[1]，发现 P1 没有进入意愿，因此通过检查。" },
      { line: "p1-1", f0: false, f1: false, inside: [], desc: "P0 尚未执行 flag[0] = true 就被切换。P1 也检查 flag[0]，同样通过检查。" },
      { line: "p0-2", f0: true, f1: false, inside: [], desc: "P0 设置 flag[0] = true，表示自己准备进入临界区。" },
      { line: "p1-2", f0: true, f1: true, inside: [], desc: "P1 设置 flag[1] = true。由于它已经通过过检查，不会再回头检查 flag[0]。" },
      { line: "p0-3", f0: true, f1: true, inside: ["P0"], desc: "P0 进入临界区。" },
      { line: "p1-3", f0: true, f1: true, inside: ["P0", "P1"], desc: "P1 也进入临界区。两个进程同时访问临界资源，违反忙则等待。" }
    ];
    let index = 0;
    const els = {
      f0: document.getElementById("f0"),
      f1: document.getElementById("f1"),
      critical: document.getElementById("critical"),
      desc: document.getElementById("desc"),
      counter: document.getElementById("counter")
    };
    function setBool(el, value) {
      el.textContent = value ? "true" : "false";
      el.className = "value " + (value ? "true" : "false");
    }
    function render() {
      const step = steps[index];
      document.querySelectorAll(".line").forEach(el => {
        el.classList.toggle("active", el.dataset.line === step.line);
      });
      setBool(els.f0, step.f0);
      setBool(els.f1, step.f1);
      els.critical.classList.toggle("danger", step.inside.length > 1);
      els.critical.textContent = step.inside.length ? `${step.inside.join("、")} 在临界区` : "临界区空闲";
      els.desc.textContent = step.desc;
      els.counter.textContent = `${index + 1}/${steps.length}`;
    }
    document.getElementById("prev").onclick = () => { index = Math.max(0, index - 1); render(); };
    document.getElementById("next").onclick = () => { index = Math.min(steps.length - 1, index + 1); render(); };
    document.getElementById("reset").onclick = () => { index = 0; render(); };
    render();
  </script>
</body>
</html>
