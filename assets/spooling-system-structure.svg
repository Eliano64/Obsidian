<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">SPOOLing System Structure</title>
  <desc id="desc">SPOOLing system contains input/output processes, memory buffers, and disk wells.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.mem{fill:color-mix(in srgb,var(--green) 14%,var(--bg));stroke:var(--green);stroke-width:2}.disk{fill:color-mix(in srgb,var(--orange) 16%,var(--bg));stroke:var(--orange);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--blue);stroke-width:3;fill:none;marker-end:url(#ba)}
  </style>
  <defs><marker id="ba" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"/></marker></defs>
  <rect class="bg" width="1120" height="560"/>
  <text class="t" x="560" y="42" text-anchor="middle" font-size="24" font-weight="700">SPOOLing 系统结构</text>
  <rect class="box" x="55" y="125" width="160" height="80" rx="8"/><text class="t" x="135" y="172" text-anchor="middle" font-size="17" font-weight="700">输入设备</text>
  <rect class="box" x="55" y="355" width="160" height="80" rx="8"/><text class="t" x="135" y="402" text-anchor="middle" font-size="17" font-weight="700">输出设备</text>
  <rect class="box" x="280" y="92" width="190" height="80" rx="8"/><text class="t" x="375" y="126" text-anchor="middle" font-size="17" font-weight="700">输入进程</text><text class="m" x="375" y="150" text-anchor="middle" font-size="13">模拟脱机输入控制机</text>
  <rect class="box" x="280" y="388" width="190" height="80" rx="8"/><text class="t" x="375" y="422" text-anchor="middle" font-size="17" font-weight="700">输出进程</text><text class="m" x="375" y="446" text-anchor="middle" font-size="13">模拟脱机输出控制机</text>
  <rect class="mem" x="540" y="120" width="180" height="72" rx="8"/><text class="t" x="630" y="152" text-anchor="middle" font-size="16" font-weight="700">输入缓冲区</text><text class="m" x="630" y="174" text-anchor="middle" font-size="12">内存</text>
  <rect class="mem" x="540" y="368" width="180" height="72" rx="8"/><text class="t" x="630" y="400" text-anchor="middle" font-size="16" font-weight="700">输出缓冲区</text><text class="m" x="630" y="422" text-anchor="middle" font-size="12">内存</text>
  <rect class="disk" x="805" y="105" width="210" height="96" rx="8"/><text class="t" x="910" y="143" text-anchor="middle" font-size="17" font-weight="700">输入井</text><text class="m" x="910" y="169" text-anchor="middle" font-size="13">磁盘区域，收容输入数据</text>
  <rect class="disk" x="805" y="355" width="210" height="96" rx="8"/><text class="t" x="910" y="393" text-anchor="middle" font-size="17" font-weight="700">输出井</text><text class="m" x="910" y="419" text-anchor="middle" font-size="13">磁盘区域，收容输出数据</text>
  <path class="a" d="M215 165 H280"/>
  <path class="a" d="M470 132 C500 132 505 156 540 156"/>
  <path class="a" d="M720 156 H805"/>
  <path class="a" d="M805 403 H720"/>
  <path class="a" d="M540 404 C505 404 500 428 470 428"/>
  <path class="a" d="M280 428 C250 428 245 395 215 395"/>
  <text class="m" x="560" y="515" text-anchor="middle" font-size="14">输入方向把设备数据收进磁盘输入井；输出方向把用户输出先排入磁盘输出井，再由输出进程慢慢送到设备。</text>
</svg>
