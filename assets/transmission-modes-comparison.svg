<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">单工 半双工 全双工</title>
  <desc id="desc">对比单工、半双工和全双工通信方向</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--blue-bg:#dbeafe;--green:#16a34a;--green-bg:#dcfce7;--amber:#d97706}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--blue-bg:#1e3a8a;--green:#4ade80;--green-bg:#14532d;--amber:#fbbf24}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.node{fill:var(--blue-bg);stroke:var(--blue);stroke-width:2}.arrow{fill:none;stroke:var(--green);stroke-width:4;marker-end:url(#arrow)}.back{fill:none;stroke:var(--amber);stroke-width:4;marker-end:url(#amberArrow)}.muted{stroke:var(--muted);stroke-width:3;stroke-dasharray:8 8}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:22px;font-weight:700}.small{font-size:16px;fill:var(--muted)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--green)"/></marker>
    <marker id="amberArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--amber)"/></marker>
  </defs>
  <rect class="bg" width="980" height="470"/>
  <text x="50" y="58" class="title">通信方向：单工、半双工、全双工</text>
  <rect x="55" y="95" width="270" height="300" rx="10" class="panel"/>
  <text x="190" y="135" text-anchor="middle" class="label">单工</text>
  <rect x="90" y="210" width="70" height="50" rx="8" class="node"/><text x="125" y="241" text-anchor="middle" class="small">A</text>
  <rect x="220" y="210" width="70" height="50" rx="8" class="node"/><text x="255" y="241" text-anchor="middle" class="small">B</text>
  <path d="M165 235 H212" class="arrow"/>
  <text x="190" y="320" text-anchor="middle" class="small">只能一个方向通信</text>
  <rect x="355" y="95" width="270" height="300" rx="10" class="panel"/>
  <text x="490" y="135" text-anchor="middle" class="label">半双工</text>
  <rect x="390" y="210" width="70" height="50" rx="8" class="node"/><text x="425" y="241" text-anchor="middle" class="small">A</text>
  <rect x="520" y="210" width="70" height="50" rx="8" class="node"/><text x="555" y="241" text-anchor="middle" class="small">B</text>
  <path d="M465 225 H512" class="arrow"/>
  <path d="M515 250 H468" class="back"/>
  <text x="490" y="320" text-anchor="middle" class="small">双向都能通信，但不能同时</text>
  <rect x="655" y="95" width="270" height="300" rx="10" class="panel"/>
  <text x="790" y="135" text-anchor="middle" class="label">全双工</text>
  <rect x="690" y="210" width="70" height="50" rx="8" class="node"/><text x="725" y="241" text-anchor="middle" class="small">A</text>
  <rect x="820" y="210" width="70" height="50" rx="8" class="node"/><text x="855" y="241" text-anchor="middle" class="small">B</text>
  <path d="M765 220 H812" class="arrow"/>
  <path d="M815 252 H768" class="back"/>
  <text x="790" y="320" text-anchor="middle" class="small">双向可以同时通信</text>
</svg>
