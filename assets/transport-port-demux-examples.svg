<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390" role="img" aria-labelledby="title desc">
  <title id="title">Transport layer demultiplexing examples</title>
  <desc id="desc">DNS over UDP port 53 and HTTP over TCP port 80 are demultiplexed by protocol and destination port.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}
    .box{fill:#f8fafc;stroke:#334155;stroke-width:2}.udp{fill:#dcfce7;stroke:#16a34a}.tcp{fill:#dbeafe;stroke:#2563eb}.app{fill:#fef3c7;stroke:#d97706}
    .line{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#arr)}
    .label{font-size:21px;font-weight:700}.small{font-size:15px}.mid{font-size:17px;font-weight:700}.code{font-family:Consolas,monospace;font-size:15px}
    @media(prefers-color-scheme:dark){text{fill:#e5e7eb}.box{fill:#111827;stroke:#94a3b8}.udp{fill:#0f2b1d;stroke:#4ade80}.tcp{fill:#10213f;stroke:#60a5fa}.app{fill:#3b2506;stroke:#fbbf24}.line{stroke:#94a3b8}}
  </style>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <text x="490" y="38" text-anchor="middle" class="label">分用：协议类型 + 目的端口号</text>
  <rect x="80" y="82" width="820" height="250" rx="12" class="box"/>
  <text x="490" y="116" text-anchor="middle" class="mid">接收主机运输层</text>
  <rect x="145" y="150" width="240" height="58" rx="8" class="udp"/>
  <text x="265" y="174" text-anchor="middle" class="code">UDP，目的端口 53</text>
  <text x="265" y="194" text-anchor="middle" class="small">DNS 查询/响应</text>
  <rect x="145" y="246" width="240" height="58" rx="8" class="tcp"/>
  <text x="265" y="270" text-anchor="middle" class="code">TCP，目的端口 80</text>
  <text x="265" y="290" text-anchor="middle" class="small">HTTP 请求/响应</text>
  <rect x="610" y="150" width="180" height="58" rx="8" class="app"/>
  <text x="700" y="184" text-anchor="middle" class="mid">DNS 服务器进程</text>
  <rect x="610" y="246" width="180" height="58" rx="8" class="app"/>
  <text x="700" y="280" text-anchor="middle" class="mid">HTTP 服务器进程</text>
  <path d="M385 179 L610 179" class="line"/>
  <path d="M385 275 L610 275" class="line"/>
  <text x="490" y="352" text-anchor="middle" class="small">只看端口号不够；TCP 和 UDP 的端口号空间相互独立</text>
</svg>
