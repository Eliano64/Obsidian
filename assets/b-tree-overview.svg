<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.node{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.leaf{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.fail{fill:#f1f5f9;stroke:#94a3b8;stroke-dasharray:6 5;stroke-width:2}.edge{stroke:#64748b;stroke-width:2}.text{fill:#0f172a;font-family:Arial,"Microsoft YaHei",sans-serif}.title{font-size:25px;font-weight:700}.label{font-size:17px;font-weight:700}.small{font-size:14px;fill:#475569}.key{font-size:18px;font-weight:700;text-anchor:middle}
    @media(prefers-color-scheme:dark){.bg{fill:#0b1020}.panel{fill:#111827;stroke:#334155}.node{fill:#172554;stroke:#38bdf8}.leaf{fill:#12351f;stroke:#4ade80}.fail{fill:#1f2937;stroke:#64748b}.edge{stroke:#94a3b8}.text{fill:#e5e7eb}.small{fill:#cbd5e1}}
  </style>
  <rect class="bg" width="1100" height="520"/>
  <rect class="panel" x="28" y="28" width="1044" height="464" rx="8"/>
  <text class="text title" x="60" y="75">5 阶 B 树示意：结点内有序，分支区间有序，所有失败结点同层</text>
  <line class="edge" x1="550" y1="120" x2="250" y2="225"/>
  <line class="edge" x1="550" y1="120" x2="550" y2="225"/>
  <line class="edge" x1="550" y1="120" x2="850" y2="225"/>
  <rect class="node" x="495" y="95" width="110" height="50" rx="8"/>
  <text class="text key" x="550" y="127">22</text>
  <rect class="node" x="175" y="205" width="150" height="50" rx="8"/>
  <text class="text key" x="250" y="237">5  11</text>
  <rect class="node" x="475" y="205" width="150" height="50" rx="8"/>
  <text class="text key" x="550" y="237">30  36</text>
  <rect class="node" x="775" y="205" width="150" height="50" rx="8"/>
  <text class="text key" x="850" y="237">45  56</text>
  <g>
    <line class="edge" x1="250" y1="255" x2="115" y2="340"/><line class="edge" x1="250" y1="255" x2="250" y2="340"/><line class="edge" x1="250" y1="255" x2="385" y2="340"/>
    <rect class="leaf" x="50" y="330" width="130" height="46" rx="8"/><text class="text key" x="115" y="360">1  3</text>
    <rect class="leaf" x="185" y="330" width="130" height="46" rx="8"/><text class="text key" x="250" y="360">6  8  9</text>
    <rect class="leaf" x="320" y="330" width="130" height="46" rx="8"/><text class="text key" x="385" y="360">13  15</text>
  </g>
  <g>
    <line class="edge" x1="550" y1="255" x2="500" y2="340"/><line class="edge" x1="550" y1="255" x2="610" y2="340"/>
    <rect class="leaf" x="455" y="330" width="90" height="46" rx="8"/><text class="text key" x="500" y="360">25</text>
    <rect class="leaf" x="565" y="330" width="90" height="46" rx="8"/><text class="text key" x="610" y="360">32 35</text>
  </g>
  <g>
    <line class="edge" x1="850" y1="255" x2="745" y2="340"/><line class="edge" x1="850" y1="255" x2="850" y2="340"/><line class="edge" x1="850" y1="255" x2="960" y2="340"/>
    <rect class="leaf" x="690" y="330" width="110" height="46" rx="8"/><text class="text key" x="745" y="360">40 42</text>
    <rect class="leaf" x="805" y="330" width="90" height="46" rx="8"/><text class="text key" x="850" y="360">47 48</text>
    <rect class="leaf" x="910" y="330" width="100" height="46" rx="8"/><text class="text key" x="960" y="360">60 66</text>
  </g>
  <text class="text label" x="70" y="430">m=5：</text>
  <text class="text small" x="130" y="430">每个结点最多 5 棵子树、4 个关键字；除根外至少 ceil(5/2)=3 棵子树、2 个关键字。</text>
  <text class="text small" x="130" y="460">非叶结点有 n 个关键字时有 n+1 棵子树；所有失败结点在同一层，通常画图时省略。</text>
</svg>
