<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">OSI TCP/IP 五层模型对比</title>
  <desc id="desc">对比 OSI 七层模型、TCP/IP 四层模型和五层原理模型。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#cbd5e1;--blue:#dbeafe;--bl:#2563eb;--green:#dcfce7;--gl:#16a34a;--amber:#fef3c7;--al:#d97706;--red:#fee2e2;--rl:#dc2626;--purple:#ede9fe;--pl:#7c3aed}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#334155;--blue:#1e3a8a;--bl:#60a5fa;--green:#14532d;--gl:#4ade80;--amber:#713f12;--al:#fbbf24;--red:#7f1d1d;--rl:#f87171;--purple:#4c1d95;--pl:#a78bfa}}
    .bg{fill:var(--bg)}.card{fill:var(--panel);stroke:var(--line);stroke-width:1.5}.b{stroke-width:2}.app{fill:var(--blue);stroke:var(--bl)}.tran{fill:var(--green);stroke:var(--gl)}.net{fill:var(--amber);stroke:var(--al)}.link{fill:var(--red);stroke:var(--rl)}.phy{fill:var(--purple);stroke:var(--pl)}.join{fill:none;stroke:var(--line);stroke-width:2;stroke-dasharray:5 5}
    text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:26px;font-weight:700}.head{font-size:20px;font-weight:700;text-anchor:middle}.txt{font-size:16px;font-weight:700;text-anchor:middle;dominant-baseline:middle}.small{font-size:14px;fill:var(--muted);text-anchor:middle}
  </style>
  <rect class="bg" width="980" height="620"/><rect class="card" x="30" y="26" width="920" height="540" rx="16"/>
  <text class="title" x="60" y="70">三种常见体系结构的对应关系</text>
  <text class="small" x="490" y="100">OSI 用于教学和标准化讨论；TCP/IP 是因特网实际采用的体系；五层模型便于学习原理。</text>
  <g transform="translate(90,132)">
    <text class="head" x="120" y="0">OSI 七层</text>
    <rect class="b app" x="20" y="24" width="200" height="44" rx="8"/><text class="txt" x="120" y="47">应用层</text>
    <rect class="b app" x="20" y="74" width="200" height="44" rx="8"/><text class="txt" x="120" y="97">表示层</text>
    <rect class="b app" x="20" y="124" width="200" height="44" rx="8"/><text class="txt" x="120" y="147">会话层</text>
    <rect class="b tran" x="20" y="174" width="200" height="44" rx="8"/><text class="txt" x="120" y="197">运输层</text>
    <rect class="b net" x="20" y="224" width="200" height="44" rx="8"/><text class="txt" x="120" y="247">网络层</text>
    <rect class="b link" x="20" y="274" width="200" height="44" rx="8"/><text class="txt" x="120" y="297">数据链路层</text>
    <rect class="b phy" x="20" y="324" width="200" height="44" rx="8"/><text class="txt" x="120" y="347">物理层</text>
  </g>
  <g transform="translate(390,132)">
    <text class="head" x="120" y="0">TCP/IP 四层</text>
    <rect class="b app" x="20" y="24" width="200" height="144" rx="8"/><text class="txt" x="120" y="97">应用层</text>
    <rect class="b tran" x="20" y="174" width="200" height="44" rx="8"/><text class="txt" x="120" y="197">运输层</text>
    <rect class="b net" x="20" y="224" width="200" height="44" rx="8"/><text class="txt" x="120" y="247">网际层</text>
    <rect class="b link" x="20" y="274" width="200" height="94" rx="8"/><text class="txt" x="120" y="322">网络接口层</text>
  </g>
  <g transform="translate(690,132)">
    <text class="head" x="120" y="0">五层原理模型</text>
    <rect class="b app" x="20" y="24" width="200" height="144" rx="8"/><text class="txt" x="120" y="97">应用层</text>
    <rect class="b tran" x="20" y="174" width="200" height="44" rx="8"/><text class="txt" x="120" y="197">运输层</text>
    <rect class="b net" x="20" y="224" width="200" height="44" rx="8"/><text class="txt" x="120" y="247">网络层</text>
    <rect class="b link" x="20" y="274" width="200" height="44" rx="8"/><text class="txt" x="120" y="297">数据链路层</text>
    <rect class="b phy" x="20" y="324" width="200" height="44" rx="8"/><text class="txt" x="120" y="347">物理层</text>
  </g>
</svg>
