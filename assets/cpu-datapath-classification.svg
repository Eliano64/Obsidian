<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="540" viewBox="0 0 1180 540" role="img" aria-labelledby="title desc">
  <title id="title">CPU datapath classification</title>
  <desc id="desc">Datapath can be classified by internal connection and by timing organization.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--bg:#fff;--ink:#172033;--muted:#5f6c80;--line:#526174;--a:#e8f1ff;--b:#eef7ee;--c:#fff2d8;--d:#f6eafe;--box:#fff}
    @media (prefers-color-scheme:dark){:root{--bg:#0f1420;--ink:#e7edf7;--muted:#aab6c8;--line:#91a0b5;--a:#17243a;--b:#18291d;--c:#302417;--d:#2b1c35;--box:#151c2a}}
    svg{background:var(--bg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}
    text{fill:var(--ink)} .title{font-size:30px;font-weight:700}.h{font-size:24px;font-weight:700}.label{font-size:20px;font-weight:700}.note{font-size:16px;fill:var(--muted)}
    .panel{stroke:var(--line);stroke-width:2.2;rx:18}.box{fill:var(--box);stroke:var(--line);stroke-width:2;rx:12}.a{fill:var(--a)}.b{fill:var(--b)}.c{fill:var(--c)}.d{fill:var(--d)}
    .arrow{stroke:var(--line);stroke-width:2.3;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="var(--line)"/></marker></defs>
  <text x="590" y="46" text-anchor="middle" class="title">数据通路的两种分类维度</text>
  <rect x="70" y="92" width="500" height="360" class="panel a"/>
  <text x="320" y="132" text-anchor="middle" class="h">按内部部件连接方式</text>
  <text x="320" y="162" text-anchor="middle" class="note">回答“部件之间怎么连，线路怎样被占用”</text>
  <rect x="130" y="208" width="380" height="66" class="box"/>
  <text x="320" y="249" text-anchor="middle" class="label">总线式数据通路</text>
  <path d="M320 274 L320 314" class="arrow"/>
  <rect x="110" y="324" width="190" height="58" class="box"/>
  <text x="205" y="360" text-anchor="middle" class="label">单总线结构</text>
  <rect x="340" y="324" width="190" height="58" class="box"/>
  <text x="435" y="360" text-anchor="middle" class="label">多总线结构</text>
  <rect x="130" y="404" width="380" height="58" class="box"/>
  <text x="320" y="440" text-anchor="middle" class="label">专用数据通路</text>

  <rect x="610" y="92" width="500" height="360" class="panel b"/>
  <text x="860" y="132" text-anchor="middle" class="h">按时序组织方式</text>
  <text x="860" y="162" text-anchor="middle" class="note">回答“一条指令怎样占用时钟周期”</text>
  <rect x="685" y="212" width="350" height="56" class="box"/>
  <text x="860" y="247" text-anchor="middle" class="label">单周期数据通路</text>
  <rect x="685" y="302" width="350" height="56" class="box"/>
  <text x="860" y="337" text-anchor="middle" class="label">多周期数据通路</text>
  <rect x="685" y="392" width="350" height="56" class="box"/>
  <text x="860" y="427" text-anchor="middle" class="label">流水线数据通路</text>

  <text x="590" y="508" text-anchor="middle" class="note">连接方式和时序组织是两个维度：例如单周期常配专用结构，多周期常复用总线，流水线常在专用通路之间加入流水线寄存器。</text>
</svg>
