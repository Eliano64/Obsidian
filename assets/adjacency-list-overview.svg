<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="650" viewBox="0 0 1180 650" role="img" aria-labelledby="title desc">
  <title id="title">Adjacency list overview</title>
  <desc id="desc">An undirected graph and a directed graph represented by adjacency lists.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    .node{fill:#fff;stroke:#2563eb;stroke-width:3}
    .node2{fill:#fff;stroke:#16a34a;stroke-width:3}
    .edge{stroke:#475569;stroke-width:3;fill:none;stroke-linecap:round}
    .arrow{stroke:#475569;stroke-width:3;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    .box{fill:#fff;stroke:#94a3b8;stroke-width:1.7}
    .head{fill:#eff6ff;stroke:#60a5fa}
    .arc{fill:#dcfce7;stroke:#22c55e}
    .text{fill:#0f172a;font-size:20px;font-weight:650}
    .title{fill:#0f172a;font-size:24px;font-weight:700}
    .small{fill:#334155;font-size:15px}
    .ptr{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#arrow2)}
    #arrow path{fill:#475569}#arrow2 path{fill:#64748b}
    @media(prefers-color-scheme:dark){
      .panel{fill:#111827;stroke:#334155}.node,.node2,.box{fill:#0b1220}.head{fill:#172554;stroke:#60a5fa}.arc{fill:#14532d;stroke:#22c55e}
      .edge,.arrow,.ptr{stroke:#cbd5e1}.text,.title{fill:#f8fafc}.small{fill:#cbd5e1}
      #arrow path,#arrow2 path{fill:#cbd5e1}
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z"/></marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L8,3 z"/></marker>
  </defs>
  <rect class="panel" x="30" y="34" width="540" height="570" rx="10"/>
  <rect class="panel" x="610" y="34" width="540" height="570" rx="10"/>
  <text class="title" x="62" y="78">无向图邻接表：每条边对应两个边结点</text>
  <line class="edge" x1="110" y1="160" x2="235" y2="130"/>
  <line class="edge" x1="110" y1="160" x2="205" y2="275"/>
  <line class="edge" x1="110" y1="160" x2="340" y2="210"/>
  <line class="edge" x1="235" y1="130" x2="310" y2="320"/>
  <line class="edge" x1="205" y1="275" x2="310" y2="320"/>
  <line class="edge" x1="340" y1="210" x2="430" y2="315"/>
  <circle class="node" cx="110" cy="160" r="25"/><text class="text" x="99" y="168">A</text>
  <circle class="node" cx="235" cy="130" r="25"/><text class="text" x="224" y="138">B</text>
  <circle class="node" cx="205" cy="275" r="25"/><text class="text" x="194" y="283">C</text>
  <circle class="node" cx="340" cy="210" r="25"/><text class="text" x="329" y="218">D</text>
  <circle class="node" cx="310" cy="320" r="25"/><text class="text" x="299" y="328">E</text>
  <circle class="node" cx="430" cy="315" r="25"/><text class="text" x="419" y="323">F</text>
  <g transform="translate(74 382)">
    <rect class="head" x="0" y="0" width="70" height="34"/><text class="small" x="35" y="22" text-anchor="middle">0 A</text>
    <rect class="box" x="96" y="0" width="44" height="34"/><text class="small" x="118" y="22" text-anchor="middle">1</text><rect class="box" x="146" y="0" width="44" height="34"/><text class="small" x="168" y="22" text-anchor="middle">2</text><rect class="box" x="196" y="0" width="44" height="34"/><text class="small" x="218" y="22" text-anchor="middle">3</text>
    <path class="ptr" d="M70 17 L96 17"/><path class="ptr" d="M140 17 L146 17"/><path class="ptr" d="M190 17 L196 17"/>
    <rect class="head" x="0" y="44" width="70" height="34"/><text class="small" x="35" y="66" text-anchor="middle">1 B</text>
    <rect class="box" x="96" y="44" width="44" height="34"/><text class="small" x="118" y="66" text-anchor="middle">0</text><rect class="box" x="146" y="44" width="44" height="34"/><text class="small" x="168" y="66" text-anchor="middle">4</text>
    <path class="ptr" d="M70 61 L96 61"/><path class="ptr" d="M140 61 L146 61"/>
    <rect class="head" x="0" y="88" width="70" height="34"/><text class="small" x="35" y="110" text-anchor="middle">2 C</text>
    <rect class="box" x="96" y="88" width="44" height="34"/><text class="small" x="118" y="110" text-anchor="middle">0</text><rect class="box" x="146" y="88" width="44" height="34"/><text class="small" x="168" y="110" text-anchor="middle">4</text>
    <path class="ptr" d="M70 105 L96 105"/><path class="ptr" d="M140 105 L146 105"/>
    <text class="small" x="288" y="24">A 的链表保存 A 的邻接点</text>
    <text class="small" x="288" y="58">无向边 AB 同时出现在 A 表和 B 表</text>
  </g>

  <text class="title" x="642" y="78">有向图邻接表：链表默认保存出边</text>
  <path class="arrow" d="M725 160 L855 130"/>
  <path class="arrow" d="M725 160 L810 275"/>
  <path class="arrow" d="M955 210 L855 130"/>
  <path class="arrow" d="M810 275 L955 210"/>
  <circle class="node2" cx="725" cy="160" r="25"/><text class="text" x="714" y="168">A</text>
  <circle class="node2" cx="855" cy="130" r="25"/><text class="text" x="844" y="138">B</text>
  <circle class="node2" cx="810" cy="275" r="25"/><text class="text" x="799" y="283">C</text>
  <circle class="node2" cx="955" cy="210" r="25"/><text class="text" x="944" y="218">D</text>
  <g transform="translate(660 382)">
    <rect class="head" x="0" y="0" width="70" height="34"/><text class="small" x="35" y="22" text-anchor="middle">0 A</text>
    <rect class="arc" x="96" y="0" width="44" height="34"/><text class="small" x="118" y="22" text-anchor="middle">1</text><rect class="arc" x="146" y="0" width="44" height="34"/><text class="small" x="168" y="22" text-anchor="middle">2</text>
    <path class="ptr" d="M70 17 L96 17"/><path class="ptr" d="M140 17 L146 17"/>
    <rect class="head" x="0" y="44" width="70" height="34"/><text class="small" x="35" y="66" text-anchor="middle">1 B</text>
    <text class="small" x="98" y="66">^</text>
    <rect class="head" x="0" y="88" width="70" height="34"/><text class="small" x="35" y="110" text-anchor="middle">2 C</text>
    <rect class="arc" x="96" y="88" width="44" height="34"/><text class="small" x="118" y="110" text-anchor="middle">3</text><path class="ptr" d="M70 105 L96 105"/>
    <rect class="head" x="0" y="132" width="70" height="34"/><text class="small" x="35" y="154" text-anchor="middle">3 D</text>
    <rect class="arc" x="96" y="132" width="44" height="34"/><text class="small" x="118" y="154" text-anchor="middle">1</text><path class="ptr" d="M70 149 L96 149"/>
    <text class="small" x="260" y="24">第 i 个链表直接列出 i 的出边终点</text>
    <text class="small" x="260" y="58">找入边要扫描其他顶点的链表</text>
  </g>
</svg>
