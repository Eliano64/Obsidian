<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mobile IP Process</title><style>
:root{color-scheme:light dark;--bg:#f8fafc;--panel:#fff;--text:#172033;--muted:#526174;--line:#64748b;--blue:#2563eb;--green:#16a34a;--border:#cbd5e1}@media(prefers-color-scheme:dark){:root{--bg:#020617;--panel:#111827;--text:#e5e7eb;--muted:#a8b3c5;--line:#94a3b8;--blue:#60a5fa;--green:#4ade80;--border:#334155}}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.wrap{max-width:980px;margin:auto;padding:22px}.title{text-align:center;font-size:24px;font-weight:800;margin-bottom:16px}.layout{display:grid;grid-template-columns:250px 1fr;gap:18px}.step{border:1px solid var(--border);border-radius:8px;background:var(--panel);padding:10px;margin-bottom:10px}.step.active{outline:2px solid var(--blue)}.stage{border:1px solid var(--border);border-radius:10px;background:var(--panel);padding:14px}.note{color:var(--muted);line-height:1.55}.controls{text-align:center;margin-top:14px}button{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:8px;padding:7px 14px;margin:0 5px}</style></head><body><div class="wrap"><div class="title">移动 IP：注册、隧道和交付</div><div class="layout"><div id="steps"></div><div class="stage"><svg viewBox="0 0 680 330"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="var(--blue)"/></marker></defs><rect x="40" y="140" width="110" height="58" rx="8" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/><text x="95" y="174" text-anchor="middle" fill="var(--text)" font-size="14">固定主机</text><rect x="250" y="65" width="110" height="58" rx="8" fill="var(--panel)" stroke="var(--blue)" stroke-width="2"/><text x="305" y="99" text-anchor="middle" fill="var(--text)" font-size="14">归属代理</text><rect x="430" y="220" width="110" height="58" rx="8" fill="var(--panel)" stroke="var(--blue)" stroke-width="2"/><text x="485" y="254" text-anchor="middle" fill="var(--text)" font-size="14">外地代理</text><rect x="565" y="140" width="90" height="58" rx="8" fill="var(--panel)" stroke="var(--green)" stroke-width="2"/><text x="610" y="174" text-anchor="middle" fill="var(--text)" font-size="14">移动主机</text><path id="path" d="M150 155 C200 100,230 90,250 90" fill="none" stroke="var(--blue)" stroke-width="4" marker-end="url(#arr)"/><text id="caption" x="340" y="310" text-anchor="middle" fill="var(--text)" font-size="18"></text></svg><div class="note" id="note"></div></div></div><div class="controls"><button id="prev">上一步</button><button id="next">下一步</button></div></div><script>
const data=[["代理发现","移动主机到外地网络后发现外地代理。","移动主机获得转交地址。很多教材例子中，转交地址就是外地代理的地址。","M610 140 C570 95,520 85,485 220"],["注册","移动主机通过外地代理向归属代理注册。","归属代理记录移动主机的归属地址与当前转交地址之间的绑定关系。","M565 170 C510 210,465 215,430 230 M430 230 C360 175,330 115,305 123"],["固定主机发送","固定主机仍把分组发往移动主机的归属地址。","普通因特网路由会把该分组送到归属网络，由归属代理截获。","M150 155 C200 100,230 90,250 90"],["隧道转发","归属代理把原 IP 数据报封装到新 IP 数据报中。","外层目的地址是转交地址；隧道终点收到后解封。","M360 100 C410 130,440 180,460 220"],["外地交付","外地代理解封后把原数据报交给移动主机。","移动主机收到的仍是发往永久地址的原数据报。","M540 245 C570 230,590 205,605 198"]];
let i=0;const steps=document.getElementById("steps");data.forEach((d,idx)=>{const e=document.createElement("div");e.className="step";e.innerHTML=`<b>${idx+1}. ${d[0]}</b><span style="font-size:14px;color:var(--muted);line-height:1.45">${d[1]}</span>`;e.onclick=()=>{i=idx;render()};steps.appendChild(e)});function render(){[...steps.children].forEach((e,idx)=>e.classList.toggle("active",idx===i));caption.textContent=data[i][0];note.textContent=data[i][2];path.setAttribute("d",data[i][3])}prev.onclick=()=>{i=(i+data.length-1)%data.length;render()};next.onclick=()=>{i=(i+1)%data.length;render()};render();
</script></body></html>
