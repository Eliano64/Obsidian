<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">因特网边缘部分与核心部分</title>
  <desc id="desc">展示边缘主机通过接入网络连接到由路由器和网络组成的核心部分</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--line:#334155;--text:#172033;--muted:#64748b;--edge:#dbeafe;--edge-line:#2563eb;--core:#fef3c7;--core-line:#d97706;--host:#dcfce7;--host-line:#16a34a}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--line:#94a3b8;--text:#e5e7eb;--muted:#94a3b8;--edge:#1e3a8a;--edge-line:#60a5fa;--core:#713f12;--core-line:#fbbf24;--host:#14532d;--host-line:#4ade80}}
    .bg{fill:var(--bg)}.edge{fill:var(--edge);stroke:var(--edge-line);stroke-width:2.5}.core{fill:var(--core);stroke:var(--core-line);stroke-width:3}.host{fill:var(--host);stroke:var(--host-line);stroke-width:2}.router{fill:var(--panel);stroke:var(--line);stroke-width:2.5}.link{stroke:var(--line);stroke-width:2.5;fill:none}.dash{stroke-dasharray:8 7}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:20px;font-weight:700}.small{font-size:16px;fill:var(--muted)}
  </style>
  <rect class="bg" width="980" height="560"/>
  <text x="50" y="58" class="title">因特网的边缘部分与核心部分</text>
  <rect x="55" y="105" width="260" height="340" rx="22" class="edge"/>
  <text x="185" y="145" text-anchor="middle" class="label">边缘部分</text>
  <rect x="92" y="188" width="90" height="52" rx="10" class="host"/><text x="137" y="220" text-anchor="middle" class="small">手机</text>
  <rect x="192" y="188" width="90" height="52" rx="10" class="host"/><text x="237" y="220" text-anchor="middle" class="small">PC</text>
  <rect x="92" y="270" width="90" height="52" rx="10" class="host"/><text x="137" y="302" text-anchor="middle" class="small">服务器</text>
  <rect x="192" y="270" width="90" height="52" rx="10" class="host"/><text x="237" y="302" text-anchor="middle" class="small">摄像头</text>
  <text x="185" y="375" text-anchor="middle" class="small">用户直接使用</text>
  <text x="185" y="402" text-anchor="middle" class="small">运行网络应用</text>
  <rect x="395" y="105" width="530" height="340" rx="26" class="core"/>
  <text x="660" y="145" text-anchor="middle" class="label">核心部分</text>
  <circle cx="520" cy="235" r="34" class="router"/><text x="520" y="242" text-anchor="middle" class="small">R1</text>
  <circle cx="660" cy="190" r="34" class="router"/><text x="660" y="197" text-anchor="middle" class="small">R2</text>
  <circle cx="790" cy="260" r="34" class="router"/><text x="790" y="267" text-anchor="middle" class="small">R3</text>
  <circle cx="635" cy="340" r="34" class="router"/><text x="635" y="347" text-anchor="middle" class="small">R4</text>
  <path d="M554 235 L628 198" class="link"/><path d="M691 205 L760 244" class="link"/><path d="M768 286 L664 326" class="link"/><path d="M602 322 L535 263" class="link"/><path d="M548 245 L760 260" class="link dash"/>
  <text x="660" y="402" text-anchor="middle" class="small">路由器 + 异构网络</text>
  <path d="M315 270 C350 270 360 260 395 260" class="link"/>
  <text x="355" y="245" text-anchor="middle" class="small">接入</text>
  <text x="660" y="485" text-anchor="middle" class="small">核心部分为边缘主机之间提供连通性和数据交换服务。</text>
</svg>
