<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Adjacency matrix overview</title>
  <desc id="desc">An undirected graph, a directed graph, and their adjacency matrices.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    .node{fill:#fff;stroke:#2563eb;stroke-width:3}
    .node2{fill:#fff;stroke:#16a34a;stroke-width:3}
    .edge{stroke:#475569;stroke-width:3;fill:none;stroke-linecap:round}
    .arrow{stroke:#475569;stroke-width:3;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    .title{fill:#0f172a;font-size:24px;font-weight:700}
    .label{fill:#0f172a;font-size:20px;font-weight:650}
    .small{fill:#334155;font-size:15px}
    .cell{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}
    .one{fill:#dbeafe;stroke:#60a5fa}
    .zero{fill:#fff}
    .h{fill:#eff6ff}
    .n{fill:#0f172a;font-size:16px;font-weight:650;text-anchor:middle;dominant-baseline:middle}
    .v{fill:#475569;font-size:15px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    #arrow path{fill:#475569}
    @media(prefers-color-scheme:dark){
      .panel{fill:#111827;stroke:#334155}
      .node,.node2{fill:#0b1220}
      .edge,.arrow{stroke:#cbd5e1}
      .title,.label,.n{fill:#f8fafc}
      .small,.v{fill:#cbd5e1}
      .cell,.zero{fill:#0b1220;stroke:#334155}
      .h{fill:#172554}
      .one{fill:#1e3a8a;stroke:#60a5fa}
      #arrow path{fill:#cbd5e1}
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z"/>
    </marker>
  </defs>

  <rect class="panel" x="30" y="34" width="530" height="540" rx="10"/>
  <rect class="panel" x="620" y="34" width="530" height="540" rx="10"/>

  <text class="title" x="62" y="82">无向图：矩阵关于主对角线对称</text>
  <line class="edge" x1="145" y1="170" x2="275" y2="135"/>
  <line class="edge" x1="145" y1="170" x2="235" y2="285"/>
  <line class="edge" x1="275" y1="135" x2="380" y2="230"/>
  <line class="edge" x1="235" y1="285" x2="380" y2="230"/>
  <circle class="node" cx="145" cy="170" r="26"/><text class="label" x="134" y="178">A</text>
  <circle class="node" cx="275" cy="135" r="26"/><text class="label" x="264" y="143">B</text>
  <circle class="node" cx="235" cy="285" r="26"/><text class="label" x="224" y="293">C</text>
  <circle class="node" cx="380" cy="230" r="26"/><text class="label" x="369" y="238">D</text>
  <text class="small" x="74" y="350">边集：AB, AC, BD, CD</text>

  <g transform="translate(92 380)">
    <text class="v" x="48" y="22">A</text><text class="v" x="88" y="22">B</text><text class="v" x="128" y="22">C</text><text class="v" x="168" y="22">D</text>
    <text class="v" x="18" y="52">A</text><text class="v" x="18" y="92">B</text><text class="v" x="18" y="132">C</text><text class="v" x="18" y="172">D</text>
    <rect class="cell zero" x="32" y="36" width="32" height="32"/><text class="n" x="48" y="52">0</text>
    <rect class="cell one" x="72" y="36" width="32" height="32"/><text class="n" x="88" y="52">1</text>
    <rect class="cell one" x="112" y="36" width="32" height="32"/><text class="n" x="128" y="52">1</text>
    <rect class="cell zero" x="152" y="36" width="32" height="32"/><text class="n" x="168" y="52">0</text>
    <rect class="cell one" x="32" y="76" width="32" height="32"/><text class="n" x="48" y="92">1</text>
    <rect class="cell zero" x="72" y="76" width="32" height="32"/><text class="n" x="88" y="92">0</text>
    <rect class="cell zero" x="112" y="76" width="32" height="32"/><text class="n" x="128" y="92">0</text>
    <rect class="cell one" x="152" y="76" width="32" height="32"/><text class="n" x="168" y="92">1</text>
    <rect class="cell one" x="32" y="116" width="32" height="32"/><text class="n" x="48" y="132">1</text>
    <rect class="cell zero" x="72" y="116" width="32" height="32"/><text class="n" x="88" y="132">0</text>
    <rect class="cell zero" x="112" y="116" width="32" height="32"/><text class="n" x="128" y="132">0</text>
    <rect class="cell one" x="152" y="116" width="32" height="32"/><text class="n" x="168" y="132">1</text>
    <rect class="cell zero" x="32" y="156" width="32" height="32"/><text class="n" x="48" y="172">0</text>
    <rect class="cell one" x="72" y="156" width="32" height="32"/><text class="n" x="88" y="172">1</text>
    <rect class="cell one" x="112" y="156" width="32" height="32"/><text class="n" x="128" y="172">1</text>
    <rect class="cell zero" x="152" y="156" width="32" height="32"/><text class="n" x="168" y="172">0</text>
  </g>
  <text class="small" x="340" y="456">例如 A[2][4]=1，表示 B-D 有边。</text>
  <text class="small" x="340" y="486">无向图中 A[i][j]=A[j][i]。</text>

  <text class="title" x="652" y="82">有向图：行看出边，列看入边</text>
  <path class="arrow" d="M750 170 L880 135"/>
  <path class="arrow" d="M750 170 L840 285"/>
  <path class="arrow" d="M985 230 L880 135"/>
  <path class="arrow" d="M840 285 L985 230"/>
  <circle class="node2" cx="750" cy="170" r="26"/><text class="label" x="739" y="178">A</text>
  <circle class="node2" cx="880" cy="135" r="26"/><text class="label" x="869" y="143">B</text>
  <circle class="node2" cx="840" cy="285" r="26"/><text class="label" x="829" y="293">C</text>
  <circle class="node2" cx="985" cy="230" r="26"/><text class="label" x="974" y="238">D</text>
  <text class="small" x="664" y="350">弧集：A→B, A→C, D→B, C→D</text>

  <g transform="translate(682 380)">
    <text class="v" x="48" y="22">A</text><text class="v" x="88" y="22">B</text><text class="v" x="128" y="22">C</text><text class="v" x="168" y="22">D</text>
    <text class="v" x="18" y="52">A</text><text class="v" x="18" y="92">B</text><text class="v" x="18" y="132">C</text><text class="v" x="18" y="172">D</text>
    <rect class="cell zero" x="32" y="36" width="32" height="32"/><text class="n" x="48" y="52">0</text>
    <rect class="cell one" x="72" y="36" width="32" height="32"/><text class="n" x="88" y="52">1</text>
    <rect class="cell one" x="112" y="36" width="32" height="32"/><text class="n" x="128" y="52">1</text>
    <rect class="cell zero" x="152" y="36" width="32" height="32"/><text class="n" x="168" y="52">0</text>
    <rect class="cell zero" x="32" y="76" width="32" height="32"/><text class="n" x="48" y="92">0</text>
    <rect class="cell zero" x="72" y="76" width="32" height="32"/><text class="n" x="88" y="92">0</text>
    <rect class="cell zero" x="112" y="76" width="32" height="32"/><text class="n" x="128" y="92">0</text>
    <rect class="cell zero" x="152" y="76" width="32" height="32"/><text class="n" x="168" y="92">0</text>
    <rect class="cell zero" x="32" y="116" width="32" height="32"/><text class="n" x="48" y="132">0</text>
    <rect class="cell zero" x="72" y="116" width="32" height="32"/><text class="n" x="88" y="132">0</text>
    <rect class="cell zero" x="112" y="116" width="32" height="32"/><text class="n" x="128" y="132">0</text>
    <rect class="cell one" x="152" y="116" width="32" height="32"/><text class="n" x="168" y="132">1</text>
    <rect class="cell zero" x="32" y="156" width="32" height="32"/><text class="n" x="48" y="172">0</text>
    <rect class="cell one" x="72" y="156" width="32" height="32"/><text class="n" x="88" y="172">1</text>
    <rect class="cell zero" x="112" y="156" width="32" height="32"/><text class="n" x="128" y="172">0</text>
    <rect class="cell zero" x="152" y="156" width="32" height="32"/><text class="n" x="168" y="172">0</text>
  </g>
  <text class="small" x="930" y="456">第 i 行非零数：出度。</text>
  <text class="small" x="930" y="486">第 j 列非零数：入度。</text>
</svg>
