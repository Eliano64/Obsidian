<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Paging Address Translation</title>
  <desc id="desc">A logical address is split into page number and offset; the page table maps the page number to a frame number.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--bg:#fff;--panel:#f8fafc;--panel2:#eff6ff;--text:#111827;--muted:#4b5563;--line:#64748b;--accent:#2563eb;--ok:#15803d}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#1e293b;--panel2:#172554;--text:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--accent:#93c5fd;--ok:#86efac}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:1.5;rx:8}.box2{fill:var(--panel2);stroke:var(--accent);stroke-width:1.7;rx:8}
    .title{fill:var(--text);font:700 19px "Segoe UI",Arial,sans-serif}.text{fill:var(--text);font:15px "Segoe UI",Arial,sans-serif}.small{fill:var(--muted);font:13px "Segoe UI",Arial,sans-serif}.accent{fill:var(--accent);font-weight:700}.ok{fill:var(--ok);font-weight:700}
    .arrow{stroke:var(--line);stroke-width:2;fill:none;marker-end:url(#arrow)}.cell{fill:var(--panel);stroke:var(--line);stroke-width:1}.hit{fill:var(--panel2);stroke:var(--accent);stroke-width:2}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="430"/>
  <text class="title" x="40" y="38">分页地址转换</text>
  <text class="small" x="40" y="62">逻辑地址中的页内偏移量不变；页号通过页表查到页框号。</text>

  <rect class="box2" x="58" y="105" width="300" height="72"/>
  <text class="text" x="78" y="132">逻辑地址 A</text>
  <rect class="cell" x="78" y="146" width="120" height="24"/><text class="small" x="108" y="163">页号 P</text>
  <rect class="cell" x="198" y="146" width="138" height="24"/><text class="small" x="232" y="163">页内偏移 W</text>

  <path class="arrow" d="M198 177v44h150"/>
  <text class="small" x="218" y="211">P 查页表</text>

  <rect class="box" x="348" y="112" width="230" height="210"/>
  <text class="text" x="426" y="140">页表</text>
  <rect class="cell" x="382" y="160" width="70" height="30"/><text class="small" x="407" y="180">页号</text>
  <rect class="cell" x="452" y="160" width="88" height="30"/><text class="small" x="472" y="180">页框号</text>
  <rect class="cell" x="382" y="190" width="70" height="30"/><text class="small" x="414" y="210">0</text>
  <rect class="cell" x="452" y="190" width="88" height="30"/><text class="small" x="488" y="210">3</text>
  <rect class="hit" x="382" y="220" width="70" height="30"/><text class="small" x="414" y="240">1</text>
  <rect class="hit" x="452" y="220" width="88" height="30"/><text class="small" x="488" y="240">6</text>
  <rect class="cell" x="382" y="250" width="70" height="30"/><text class="small" x="414" y="270">2</text>
  <rect class="cell" x="452" y="250" width="88" height="30"/><text class="small" x="488" y="270">4</text>
  <text class="small" x="384" y="304">P=1 对应页框号 b=6</text>

  <path class="arrow" d="M578 235h96"/>
  <text class="small" x="604" y="219">取出 b</text>

  <rect class="box2" x="674" y="196" width="248" height="78"/>
  <text class="text" x="696" y="224">物理地址 E</text>
  <rect class="cell" x="696" y="238" width="98" height="24"/><text class="small" x="716" y="255">页框号 b</text>
  <rect class="cell" x="794" y="238" width="106" height="24"/><text class="small" x="820" y="255">页内偏移 W</text>

  <path class="arrow" d="M267 177v160h500v-63"/>
  <text class="small" x="408" y="360">W 不经过页表，直接拼接到页框号后面</text>
</svg>
