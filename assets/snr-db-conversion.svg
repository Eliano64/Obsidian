<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">信噪比和 dB 换算</title>
  <desc id="desc">展示信噪比普通比值与 dB 的换算</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--blue-bg:#dbeafe;--amber:#d97706;--amber-bg:#fef3c7}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--blue-bg:#1e3a8a;--amber:#fbbf24;--amber-bg:#713f12}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.blue{fill:var(--blue-bg);stroke:var(--blue);stroke-width:2}.amber{fill:var(--amber-bg);stroke:var(--amber);stroke-width:2}.arrow{fill:none;stroke:var(--line);stroke-width:2.5;marker-end:url(#arrow)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:22px;font-weight:700}.formula{font-size:25px;font-weight:700}.small{font-size:16px;fill:var(--muted)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="430"/>
  <text x="50" y="58" class="title">信噪比 dB 换算</text>
  <rect x="90" y="130" width="300" height="110" rx="10" class="blue"/>
  <text x="240" y="172" text-anchor="middle" class="label">普通信噪比</text>
  <text x="240" y="212" text-anchor="middle" class="formula">S/N</text>
  <path d="M405 185 H575" class="arrow"/>
  <text x="490" y="160" text-anchor="middle" class="small">10 log₁₀(S/N)</text>
  <rect x="590" y="130" width="300" height="110" rx="10" class="amber"/>
  <text x="740" y="172" text-anchor="middle" class="label">分贝表示</text>
  <text x="740" y="212" text-anchor="middle" class="formula">SNRdB</text>
  <rect x="190" y="300" width="600" height="64" rx="10" class="box"/>
  <text x="490" y="340" text-anchor="middle" class="formula">S/N = 10^(SNRdB / 10)</text>
</svg>
