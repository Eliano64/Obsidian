<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">OS I/O Software Layers</title>
  <desc id="desc">I/O request flows from user layer software through device independent software, drivers, interrupt handlers, and hardware.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.kernel{fill:color-mix(in srgb,var(--blue) 10%,var(--bg));stroke:var(--blue);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--green);stroke-width:3;fill:none;marker-end:url(#ga)}.ra{stroke:var(--orange);stroke-width:3;fill:none;marker-end:url(#oa)}
  </style>
  <defs>
    <marker id="ga" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--green)"/></marker>
    <marker id="oa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--orange)"/></marker>
  </defs>
  <rect class="bg" width="980" height="560"/>
  <text class="t" x="490" y="42" text-anchor="middle" font-size="24" font-weight="700">I/O 软件层次结构</text>
  <rect class="box" x="225" y="76" width="530" height="64" rx="8"/>
  <text class="t" x="490" y="102" text-anchor="middle" font-size="17" font-weight="700">用户层软件</text>
  <text class="m" x="490" y="124" text-anchor="middle" font-size="13">库函数 / 用户接口 / 系统调用封装</text>
  <rect class="kernel" x="190" y="172" width="600" height="276" rx="12"/>
  <text class="m" x="218" y="200" font-size="13">内核态 I/O 核心子系统</text>
  <rect class="box" x="245" y="216" width="490" height="56" rx="8"/>
  <text class="t" x="490" y="240" text-anchor="middle" font-size="16" font-weight="700">设备独立性软件</text>
  <text class="m" x="490" y="260" text-anchor="middle" font-size="12">统一接口 / 保护 / 分配 / 缓冲 / LUT / 差错处理</text>
  <rect class="box" x="245" y="300" width="490" height="56" rx="8"/>
  <text class="t" x="490" y="324" text-anchor="middle" font-size="16" font-weight="700">设备驱动程序</text>
  <text class="m" x="490" y="344" text-anchor="middle" font-size="12">设置寄存器 / 检查状态 / 翻译设备细节</text>
  <rect class="box" x="245" y="384" width="490" height="44" rx="8"/>
  <text class="t" x="490" y="412" text-anchor="middle" font-size="16" font-weight="700">中断处理程序</text>
  <rect class="box" x="225" y="476" width="530" height="54" rx="8"/>
  <text class="t" x="490" y="509" text-anchor="middle" font-size="17" font-weight="700">硬件：控制器与设备</text>
  <path class="a" d="M490 140 V172"/>
  <path class="a" d="M490 272 V300"/>
  <path class="a" d="M490 356 V384"/>
  <path class="a" d="M490 428 V476"/>
  <path class="ra" d="M758 500 C880 430 880 150 755 108"/>
  <text class="m" x="865" y="304" text-anchor="middle" font-size="13">I/O 应答 / 中断</text>
  <text class="m" x="100" y="130" font-size="14">越上层越接近用户</text>
  <text class="m" x="100" y="500" font-size="14">越下层越接近硬件</text>
</svg>
