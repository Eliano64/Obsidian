<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="610" viewBox="0 0 1080 610" role="img" aria-labelledby="title desc">
  <title id="title">磁盘几何结构</title>
  <desc id="desc">展示盘面、磁道、扇区、柱面和磁头的关系。</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--bg:#fff;--text:#172033;--muted:#536171;--line:#7b8798;--blue:#2563eb;--green:#059669;--orange:#d97706;--red:#dc2626;--panel:#f8fafc}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--text:#e5e7eb;--muted:#aab4c3;--line:#687386;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24;--red:#f87171;--panel:#111827}}
    .bg{fill:var(--bg)}.title{fill:var(--text);font:700 27px "Microsoft YaHei",sans-serif}.h{fill:var(--text);font:700 18px "Microsoft YaHei",sans-serif}.body{fill:var(--muted);font:15px "Microsoft YaHei",sans-serif}.thin{stroke:var(--line);stroke-width:2;fill:none}.disk{fill:none;stroke:var(--blue);stroke-width:3}.sector{fill:var(--orange);opacity:.28;stroke:var(--orange);stroke-width:2}.arm{stroke:var(--red);stroke-width:5;stroke-linecap:round}.head{fill:var(--red)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:1.4;rx:12}.cyl{stroke:var(--green);stroke-width:3;stroke-dasharray:8 7;fill:none}
  </style>
  <rect class="bg" width="1080" height="610"/>
  <text class="title" x="54" y="54">磁盘结构：磁道、扇区、柱面</text>
  <g transform="translate(260 300)">
    <circle class="disk" r="190"/><circle class="thin" r="145"/><circle class="thin" r="100"/><circle class="thin" r="55"/>
    <path class="sector" d="M0 0 L190 0 A190 190 0 0 1 134 134 Z"/>
    <line class="thin" x1="-190" y1="0" x2="190" y2="0"/><line class="thin" x1="0" y1="-190" x2="0" y2="190"/>
    <text class="body" x="112" y="-86">磁道</text>
    <text class="body" x="112" y="76">扇区</text>
    <path class="arm" d="M300 -170 L150 -52"/><circle class="head" cx="150" cy="-52" r="9"/>
    <text class="body" x="306" y="-174">磁臂 / 磁头</text>
  </g>
  <g transform="translate(650 150)">
    <ellipse class="thin" cx="120" cy="42" rx="160" ry="36"/><ellipse class="thin" cx="120" cy="126" rx="160" ry="36"/><ellipse class="thin" cx="120" cy="210" rx="160" ry="36"/>
    <ellipse class="cyl" cx="120" cy="42" rx="102" ry="23"/><ellipse class="cyl" cx="120" cy="126" rx="102" ry="23"/><ellipse class="cyl" cx="120" cy="210" rx="102" ry="23"/>
    <line class="cyl" x1="18" y1="42" x2="18" y2="210"/><line class="cyl" x1="222" y1="42" x2="222" y2="210"/>
    <text class="h" x="120" y="300" text-anchor="middle">柱面</text>
    <text class="body" x="120" y="326" text-anchor="middle">不同盘面上半径相同的磁道集合</text>
  </g>
  <rect class="panel" x="88" y="510" width="904" height="58"/>
  <text class="body" x="540" y="545" text-anchor="middle">扇区通常是磁盘读写的最小物理单位；操作系统常把一个或多个扇区作为一个磁盘块使用。</text>
</svg>
