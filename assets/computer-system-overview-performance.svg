<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="780" viewBox="0 0 1120 780" role="img" aria-labelledby="title desc">
  <title id="title">Computer Performance Metrics</title>
  <desc id="desc">Static summary of memory capacity, CPU execution time, throughput, response time, IPS, and FLOPS.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    .bg { fill: #f7f7f4; }
    .panel { fill: #ffffff; stroke: #cfd6dd; stroke-width: 2; }
    .title { fill: #1f252b; font: 700 30px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .h { fill: #1f252b; font: 700 20px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .t { fill: #46505a; font: 15px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .formula { fill: #2d6d9d; font: 700 21px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .small { fill: #5f6873; font: 13px "Segoe UI", "Microsoft YaHei", sans-serif; }
    .blue { fill: #eef6fc; stroke: #2d6d9d; }
    .green { fill: #f1f8ef; stroke: #527d53; }
    .amber { fill: #fff5e8; stroke: #aa6b24; }
    .red { fill: #fff0ee; stroke: #9e4640; }
    .line { stroke: #8a949e; stroke-width: 2; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #151719; }
      .panel { fill: #202428; stroke: #3a4149; }
      .title, .h { fill: #edf0f2; }
      .t { fill: #c6ccd3; }
      .formula { fill: #82bce9; }
      .small { fill: #aab2bc; }
      .blue { fill: #1f3443; stroke: #82bce9; }
      .green { fill: #213522; stroke: #98ca95; }
      .amber { fill: #3b2d1c; stroke: #f0b86e; }
      .red { fill: #3a2423; stroke: #df8b84; }
      .line { stroke: #77818b; }
    }
  </style>
  <rect class="bg" x="0" y="0" width="1120" height="780"/>
  <text class="title" x="48" y="58">性能指标速记图</text>
  <text class="t" x="48" y="88">先分评价对象：存储器、CPU、浮点能力、系统整体。</text>

  <rect class="panel" x="48" y="122" width="490" height="250" rx="8"/>
  <text class="h" x="76" y="160">存储器容量</text>
  <rect class="blue" x="78" y="184" width="430" height="56" rx="8"/>
  <text class="formula" x="104" y="219">总容量(bit) = 存储单元个数 × 存储字长</text>
  <rect class="blue" x="78" y="256" width="430" height="56" rx="8"/>
  <text class="formula" x="104" y="291">总容量(Byte) = 存储单元个数 × 存储字长 / 8</text>
  <text class="small" x="84" y="340">MAR 为 n 位：最多 2^n 个存储单元；MDR 为 m 位：每个单元 m bit。</text>

  <rect class="panel" x="582" y="122" width="490" height="250" rx="8"/>
  <text class="h" x="610" y="160">CPU 执行时间</text>
  <rect class="green" x="612" y="184" width="430" height="48" rx="8"/>
  <text class="formula" x="646" y="215">CPU 时钟周期 = 1 / 主频</text>
  <rect class="green" x="612" y="246" width="430" height="48" rx="8"/>
  <text class="formula" x="646" y="277">单条指令耗时 = CPI × CPU 时钟周期</text>
  <rect class="green" x="612" y="308" width="430" height="48" rx="8"/>
  <text class="formula" x="646" y="339">CPU 执行时间 = 指令条数 × 平均 CPI / 主频</text>

  <rect class="panel" x="48" y="416" width="490" height="260" rx="8"/>
  <text class="h" x="76" y="454">速度类指标</text>
  <line class="line" x1="84" y1="486" x2="502" y2="486"/>
  <text class="h" x="84" y="523">IPS / MIPS</text>
  <text class="t" x="210" y="523">每秒执行多少条指令</text>
  <text class="h" x="84" y="575">FLOPS</text>
  <text class="t" x="210" y="575">每秒执行多少次浮点运算</text>
  <text class="small" x="84" y="618">性能单位：K, M, G, T, P, E, Z 按 10^3 逐级递增。</text>
  <text class="small" x="84" y="646">存储容量语境：K, M, G, T 常按 2^10 逐级近似理解。</text>

  <rect class="panel" x="582" y="416" width="490" height="260" rx="8"/>
  <text class="h" x="610" y="454">系统整体性能</text>
  <rect class="amber" x="612" y="482" width="190" height="58" rx="8"/>
  <text class="h" x="656" y="518">吞吐量</text>
  <text class="t" x="822" y="505">单位时间处理请求的数量，</text>
  <text class="t" x="822" y="528">受主存和 I/O 等环节影响。</text>
  <rect class="amber" x="612" y="558" width="190" height="58" rx="8"/>
  <text class="h" x="650" y="594">响应时间</text>
  <text class="t" x="822" y="580">从发出请求到获得结果的</text>
  <text class="t" x="822" y="603">等待时间。</text>
  <rect class="red" x="612" y="632" width="430" height="30" rx="6"/>
  <text class="small" x="632" y="652">主频高不一定更快；基准程序也不等于真实场景的绝对性能。</text>
</svg>
