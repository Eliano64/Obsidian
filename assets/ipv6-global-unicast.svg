<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">IPv6 global unicast hierarchy</title>
  <desc id="desc">IPv6 global unicast address has global routing prefix, subnet ID, and interface ID.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.a{fill:#dbeafe}.b{fill:#dcfce7}.c{fill:#fef3c7}.box{stroke:#334155;stroke-width:2}.label{font-size:20px;font-weight:700}.small{font-size:15px}@media(prefers-color-scheme:dark){text{fill:#e5e7eb}.a{fill:#10213f}.b{fill:#0f2b1d}.c{fill:#713f12}.box{stroke:#94a3b8}}</style>
  <text x="480" y="38" text-anchor="middle" class="label">IPv6 全球单播地址的三级结构</text>
  <rect x="70" y="90" width="370" height="70" class="box a"/><text x="255" y="120" text-anchor="middle" class="small">全球路由选择前缀</text><text x="255" y="146" text-anchor="middle" class="small">分配给机构，用于全局路由</text>
  <rect x="440" y="90" width="170" height="70" class="box b"/><text x="525" y="120" text-anchor="middle" class="small">子网标识符</text><text x="525" y="146" text-anchor="middle" class="small">机构内部划分</text>
  <rect x="610" y="90" width="280" height="70" class="box c"/><text x="750" y="120" text-anchor="middle" class="small">接口标识符</text><text x="750" y="146" text-anchor="middle" class="small">标识网络接口，常为 64 bit</text>
  <text x="480" y="215" text-anchor="middle" class="small">IPv6 地址仍分配给接口，而不是抽象地分配给整台主机</text>
</svg>
