<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>IPv6 Transition</title><style>
:root{color-scheme:light dark;--bg:#f8fafc;--panel:#fff;--text:#172033;--muted:#526174;--line:#64748b;--blue:#2563eb;--orange:#ea580c;--border:#cbd5e1}@media(prefers-color-scheme:dark){:root{--bg:#020617;--panel:#111827;--text:#e5e7eb;--muted:#a8b3c5;--line:#94a3b8;--blue:#60a5fa;--orange:#fb923c;--border:#334155}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.wrap{max-width:980px;margin:auto;padding:22px}.title{text-align:center;font-size:24px;font-weight:800;margin-bottom:16px}.layout{display:grid;grid-template-columns:250px 1fr;gap:18px}.step{border:1px solid var(--border);border-radius:8px;background:var(--panel);padding:10px;margin-bottom:10px;cursor:pointer}.step.active{outline:2px solid var(--orange)}.step b{display:block}.step span{font-size:14px;color:var(--muted);line-height:1.45}.stage{border:1px solid var(--border);border-radius:10px;background:var(--panel);padding:14px}.note{margin-top:8px;color:var(--muted);line-height:1.55}.controls{text-align:center;margin-top:14px}button{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:8px;padding:7px 14px;margin:0 5px}</style></head><body><div class="wrap"><div class="title">IPv4 到 IPv6：双协议栈与隧道</div><div class="layout"><div id="steps"></div><div class="stage"><svg viewBox="0 0 670 330"><defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="var(--blue)"/></marker></defs><rect x="35" y="120" width="105" height="60" rx="8" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/><text x="87" y="155" text-anchor="middle" fill="var(--text)" font-size="15">IPv6 主机</text><rect x="180" y="120" width="105" height="60" rx="8" fill="var(--panel)" stroke="var(--orange)" stroke-width="2"/><text x="232" y="145" text-anchor="middle" fill="var(--text)" font-size="14">双协议栈</text><text x="232" y="165" text-anchor="middle" fill="var(--muted)" font-size="12">入口 R1</text><rect x="325" y="120" width="105" height="60" rx="8" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/><text x="377" y="155" text-anchor="middle" fill="var(--text)" font-size="15">IPv4 网络</text><rect x="470" y="120" width="105" height="60" rx="8" fill="var(--panel)" stroke="var(--orange)" stroke-width="2"/><text x="522" y="145" text-anchor="middle" fill="var(--text)" font-size="14">双协议栈</text><text x="522" y="165" text-anchor="middle" fill="var(--muted)" font-size="12">出口 R4</text><rect x="610" y="120" width="50" height="60" rx="8" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/><text x="635" y="155" text-anchor="middle" fill="var(--text)" font-size="13">IPv6</text><line x1="140" y1="150" x2="180" y2="150" stroke="var(--blue)" stroke-width="4" marker-end="url(#arr)"/><line x1="285" y1="150" x2="325" y2="150" stroke="var(--blue)" stroke-width="4" marker-end="url(#arr)"/><line x1="430" y1="150" x2="470" y2="150" stroke="var(--blue)" stroke-width="4" marker-end="url(#arr)"/><line x1="575" y1="150" x2="610" y2="150" stroke="var(--blue)" stroke-width="4" marker-end="url(#arr)"/><text id="caption" x="335" y="245" text-anchor="middle" fill="var(--text)" font-size="18"></text></svg><div class="note" id="note"></div></div></div><div class="controls"><button id="prev">上一步</button><button id="next">下一步</button></div></div><script>
const data=[["双协议栈","设备同时支持 IPv4 和 IPv6。","双协议栈节点根据对端地址类型选择 IPv4 或 IPv6；DNS 返回 IPv4 地址就用 IPv4，返回 IPv6 地址就用 IPv6。"],["首部转换","IPv6 首部可转换成 IPv4 首部。","转换可能丢失 IPv6 独有字段，例如流标号无法在 IPv4 中完整保留。"],["隧道入口","IPv6 数据报进入 IPv4 网络前重新封装。","隧道入口把整个 IPv6 数据报作为 IPv4 数据报的数据部分，IPv4 首部协议字段设为 41。"],["隧道出口","IPv4 网络只转发外层 IPv4 数据报。","隧道出口去掉 IPv4 外层首部，取出原 IPv6 数据报，再交给 IPv6 网络转发。"]];
let i=0;const steps=document.getElementById("steps");data.forEach((d,idx)=>{const e=document.createElement("div");e.className="step";e.innerHTML=`<b>${idx+1}. ${d[0]}</b><span>${d[1]}</span>`;e.onclick=()=>{i=idx;render()};steps.appendChild(e)});function render(){[...steps.children].forEach((e,idx)=>e.classList.toggle("active",idx===i));caption.textContent=data[i][0];note.textContent=data[i][2]}prev.onclick=()=>{i=(i+data.length-1)%data.length;render()};next.onclick=()=>{i=(i+1)%data.length;render()};render();
</script></body></html>
