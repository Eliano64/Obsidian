<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>call ret return address</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #17212b;
      --muted: #5b6773;
      --panel: #f5f7fb;
      --line: #26323d;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --green: #15803d;
      --warn: #c2410c;
      --shadow: rgba(15, 23, 32, 0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1720;
        --fg: #e8edf2;
        --muted: #aab5c0;
        --panel: #1b2632;
        --line: #d7dee6;
        --accent: #7cb7ff;
        --accent-soft: #173963;
        --green: #7bdc91;
        --warn: #ffb07c;
        --shadow: rgba(0, 0, 0, 0.35);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 22px; }
    header { display: flex; justify-content: space-between; gap: 18px; align-items: center; margin-bottom: 14px; }
    h1 { font-size: 24px; margin: 0; font-weight: 700; letter-spacing: 0; }
    .step { color: var(--muted); font-size: 15px; white-space: nowrap; }
    .grid { display: grid; grid-template-columns: 1fr 1.15fr; gap: 18px; align-items: stretch; }
    .panel { background: var(--panel); border: 1px solid color-mix(in srgb, var(--line) 35%, transparent); border-radius: 8px; padding: 16px; box-shadow: 0 8px 20px var(--shadow); }
    .caption { color: var(--muted); font-size: 15px; margin-bottom: 12px; }
    pre { margin: 0; padding: 14px; border-radius: 7px; background: color-mix(in srgb, var(--bg) 82%, var(--panel)); border: 1px solid color-mix(in srgb, var(--line) 25%, transparent); overflow: auto; font-size: 15px; line-height: 1.55; }
    code { font-family: Consolas, "Courier New", monospace; }
    .code-line { display: block; padding: 2px 6px; border-radius: 5px; }
    .active { background: var(--accent-soft); color: var(--fg); outline: 1px solid color-mix(in srgb, var(--accent) 55%, transparent); }
    .state { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .reg { border: 1px solid color-mix(in srgb, var(--line) 32%, transparent); border-radius: 7px; padding: 10px; background: color-mix(in srgb, var(--bg) 80%, var(--panel)); }
    .reg b { display: block; font-family: Consolas, "Courier New", monospace; font-size: 18px; margin-bottom: 4px; }
    .reg span { color: var(--muted); font-size: 14px; }
    .stack { position: relative; min-height: 430px; padding-left: 96px; }
    .addr-axis { position: absolute; left: 22px; top: 28px; bottom: 28px; width: 2px; background: var(--line); }
    .addr-axis::before { content: "高地址"; position: absolute; left: -20px; top: -24px; color: var(--muted); font-size: 13px; white-space: nowrap; }
    .addr-axis::after { content: "低地址"; position: absolute; left: -20px; bottom: -24px; color: var(--muted); font-size: 13px; white-space: nowrap; }
    .cell { height: 58px; border: 1.5px solid var(--line); display: grid; grid-template-columns: 110px 1fr; align-items: center; padding: 0 12px; background: color-mix(in srgb, var(--bg) 84%, var(--panel)); margin-bottom: 8px; border-radius: 6px; }
    .cell.hot { border-color: var(--accent); background: var(--accent-soft); }
    .cell.return { border-color: var(--warn); }
    .addr { font-family: Consolas, "Courier New", monospace; color: var(--muted); font-size: 14px; }
    .val { font-family: Consolas, "Courier New", monospace; font-size: 16px; }
    .esp { display: inline-block; margin-left: 8px; color: var(--accent); font-weight: 700; }
    .note { margin-top: 14px; min-height: 58px; font-size: 17px; line-height: 1.55; }
    .note b { color: var(--accent); }
    .controls { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
    button { border: 1px solid color-mix(in srgb, var(--line) 35%, transparent); background: var(--panel); color: var(--fg); border-radius: 7px; padding: 8px 14px; font-size: 15px; cursor: pointer; }
    button:hover { border-color: var(--accent); }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } header { align-items: flex-start; flex-direction: column; } .stack { min-height: 390px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>call / ret：返回地址如何完成“去那里，再回来”</h1>
      <div class="step" id="stepText"></div>
    </header>

    <div class="grid">
      <section class="panel">
        <div class="caption">指令序列</div>
        <pre><code><span class="code-line" data-line="0">0x401000: mov eax, 1</span>
<span class="code-line" data-line="1">0x401005: call add</span>
<span class="code-line" data-line="2">0x40100A: mov [sum], eax</span>
<span class="code-line" data-line="3">0x401020 &lt;add&gt;: push ebp</span>
<span class="code-line" data-line="4">0x40102E: ret</span></code></pre>
        <div class="state">
          <div class="reg"><b>eip</b><span id="eip"></span></div>
          <div class="reg"><b>esp</b><span id="esp"></span></div>
        </div>
        <div class="note" id="note"></div>
      </section>

      <section class="panel">
        <div class="caption">栈顶变化</div>
        <div class="stack" id="stack">
          <div class="addr-axis"></div>
        </div>
      </section>
    </div>

    <div class="controls">
      <button id="prev">上一步</button>
      <button id="next">下一步</button>
      <button id="reset">重置</button>
    </div>
  </div>

  <script>
    const steps = [
      {
        line: 1,
        eip: "0x401005",
        esp: "0xA00F0020",
        stack: [
          ["0xA00F0028", "caller 局部变量"],
          ["0xA00F0024", "caller 局部变量"],
          ["0xA00F0020", "栈顶空位", "hot"]
        ],
        note: "执行 <b>call add</b> 之前，CPU 已经知道下一条指令地址是 0x40100A。这个地址就是将来要回来的位置。"
      },
      {
        line: 1,
        eip: "0x401005",
        esp: "0xA00F001C",
        stack: [
          ["0xA00F0028", "caller 局部变量"],
          ["0xA00F0024", "caller 局部变量"],
          ["0xA00F0020", "旧栈顶"],
          ["0xA00F001C", "0x40100A  返回地址", "return hot"]
        ],
        note: "<b>call</b> 先把返回地址压栈：esp 减 4，然后把 0x40100A 写到新的栈顶。"
      },
      {
        line: 3,
        eip: "0x401020",
        esp: "0xA00F001C",
        stack: [
          ["0xA00F0028", "caller 局部变量"],
          ["0xA00F0024", "caller 局部变量"],
          ["0xA00F0020", "旧栈顶"],
          ["0xA00F001C", "0x40100A  返回地址", "return hot"]
        ],
        note: "压入返回地址后，<b>call</b> 把 eip 改成 add 的入口地址，于是下一条执行的是被调用函数。"
      },
      {
        line: 4,
        eip: "0x40102E",
        esp: "0xA00F001C",
        stack: [
          ["0xA00F0028", "caller 局部变量"],
          ["0xA00F0024", "caller 局部变量"],
          ["0xA00F0020", "旧栈顶"],
          ["0xA00F001C", "0x40100A  返回地址", "return hot"]
        ],
        note: "被调用函数结束时，<b>ret</b> 要求返回地址正好位于栈顶。"
      },
      {
        line: 2,
        eip: "0x40100A",
        esp: "0xA00F0020",
        stack: [
          ["0xA00F0028", "caller 局部变量"],
          ["0xA00F0024", "caller 局部变量"],
          ["0xA00F0020", "恢复后的栈顶", "hot"]
        ],
        note: "<b>ret</b> 从栈顶弹出 0x40100A 写回 eip，esp 加 4；程序回到 call 后面的那条指令。"
      }
    ];

    let index = 0;
    const stepText = document.getElementById("stepText");
    const eip = document.getElementById("eip");
    const esp = document.getElementById("esp");
    const stack = document.getElementById("stack");
    const note = document.getElementById("note");
    const lines = [...document.querySelectorAll(".code-line")];

    function render() {
      const s = steps[index];
      stepText.textContent = `步骤 ${index + 1} / ${steps.length}`;
      eip.textContent = s.eip;
      esp.textContent = s.esp;
      note.innerHTML = s.note;
      lines.forEach(line => line.classList.toggle("active", Number(line.dataset.line) === s.line));
      stack.querySelectorAll(".cell").forEach(node => node.remove());
      s.stack.forEach(([addr, val, klass = ""]) => {
        const cell = document.createElement("div");
        cell.className = `cell ${klass}`;
        cell.innerHTML = `<div class="addr">${addr}</div><div class="val">${val}${addr === s.esp ? '<span class="esp">esp</span>' : ''}</div>`;
        stack.appendChild(cell);
      });
    }
    document.getElementById("prev").addEventListener("click", () => { index = Math.max(0, index - 1); render(); });
    document.getElementById("next").addEventListener("click", () => { index = Math.min(steps.length - 1, index + 1); render(); });
    document.getElementById("reset").addEventListener("click", () => { index = 0; render(); });
    render();
  </script>
</body>
</html>
