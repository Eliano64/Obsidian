<svg xmlns="http://www.w3.org/2000/svg" width="980" height="480" viewBox="0 0 980 480" role="img" aria-labelledby="title desc">
  <title id="title">消息 数据 信号 码元 比特</title>
  <desc id="desc">展示消息、数据、信号、码元和比特的关系</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--blue-bg:#dbeafe;--green:#16a34a;--green-bg:#dcfce7;--amber:#d97706;--amber-bg:#fef3c7;--purple:#7c3aed;--purple-bg:#ede9fe}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--blue-bg:#1e3a8a;--green:#4ade80;--green-bg:#14532d;--amber:#fbbf24;--amber-bg:#713f12;--purple:#c4b5fd;--purple-bg:#4c1d95}}
    .bg{fill:var(--bg)}.box{stroke-width:2.2;rx:10}.message{fill:var(--blue-bg);stroke:var(--blue)}.data{fill:var(--green-bg);stroke:var(--green)}.signal{fill:var(--amber-bg);stroke:var(--amber)}.symbol{fill:var(--purple-bg);stroke:var(--purple)}.arrow{fill:none;stroke:var(--line);stroke-width:2.4;marker-end:url(#arrow)}.wave{fill:none;stroke:var(--amber);stroke-width:3}.tick{stroke:var(--line);stroke-width:1.8;stroke-dasharray:5 5}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:21px;font-weight:700}.small{font-size:15px;fill:var(--muted)}.bit{font-size:20px;font-weight:700}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="480"/>
  <text x="50" y="56" class="title">从消息到物理信号</text>
  <rect x="62" y="110" width="170" height="82" class="box message"/>
  <text x="147" y="145" text-anchor="middle" class="label">消息</text>
  <text x="147" y="171" text-anchor="middle" class="small">文字、图片、音频</text>
  <path d="M238 151 H328" class="arrow"/>
  <rect x="340" y="110" width="210" height="82" class="box data"/>
  <text x="445" y="145" text-anchor="middle" class="label">数据</text>
  <text x="445" y="171" text-anchor="middle" class="small">有意义的符号序列</text>
  <path d="M558 151 H648" class="arrow"/>
  <rect x="660" y="110" width="250" height="82" class="box signal"/>
  <text x="785" y="145" text-anchor="middle" class="label">信号</text>
  <text x="785" y="171" text-anchor="middle" class="small">数据的电磁表现</text>
  <text x="340" y="250" class="small">比特序列</text>
  <text x="340" y="288" class="bit">1 0 1 1 0 0 1 0</text>
  <path d="M340 320 H835" class="tick"/>
  <path d="M360 350 C375 310 395 310 410 350 S445 390 460 350 S495 310 510 350 S545 390 560 350 S595 310 610 350 S645 390 660 350 S695 310 710 350 S745 390 760 350 S795 310 810 350" class="wave"/>
  <g>
    <rect x="360" y="382" width="55" height="46" class="box symbol"/>
    <rect x="415" y="382" width="55" height="46" class="box symbol"/>
    <rect x="470" y="382" width="55" height="46" class="box symbol"/>
    <rect x="525" y="382" width="55" height="46" class="box symbol"/>
    <text x="497" y="413" text-anchor="middle" class="label">码元</text>
  </g>
  <text x="650" y="402" class="small">每个码元是一个可判决的信号状态。</text>
  <text x="650" y="426" class="small">一个码元可携带一个或多个比特。</text>
</svg>
