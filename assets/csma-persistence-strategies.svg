<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-label="CSMA三种坚持策略对比图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .muted { fill: #5d6b7e; }
    .line { stroke: #657386; stroke-width: 2; fill: none; }
    .busy { fill: #f2c167; stroke: #a86a00; stroke-width: 2; }
    .idle { fill: #e8f3ff; stroke: #3174c7; stroke-width: 2; }
    .send { fill: #7ed99a; stroke: #23804a; stroke-width: 2; }
    .wait { fill: #f1f3f7; stroke: #8b97a8; stroke-width: 2; }
    .panel { fill: #ffffff; stroke: #8b97a8; stroke-width: 2; rx: 12; }
    .title { font-size: 28px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 15px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e7edf7; }
      .muted { fill: #b6c2d2; }
      .line { stroke: #9aa8ba; }
      .busy { fill: #6f4b16; stroke: #f0be64; }
      .idle { fill: #122d4c; stroke: #75b4ff; }
      .send { fill: #15472a; stroke: #73d99a; }
      .wait { fill: #1a202c; stroke: #718096; }
      .panel { fill: #111827; stroke: #718096; }
    }
  </style>
  <text x="480" y="42" text-anchor="middle" class="title">CSMA：发送前先监听，信道忙时如何等待</text>

  <g transform="translate(50 82)">
    <rect width="860" height="110" class="panel"/>
    <text x="28" y="34" class="label">1-坚持 CSMA</text>
    <rect x="190" y="30" width="210" height="34" class="busy"/>
    <rect x="400" y="30" width="120" height="34" class="idle"/>
    <rect x="520" y="30" width="180" height="34" class="send"/>
    <text x="295" y="53" text-anchor="middle" class="small">信道忙：持续监听</text>
    <text x="460" y="53" text-anchor="middle" class="small">变空闲</text>
    <text x="610" y="53" text-anchor="middle" class="small">立即发送</text>
    <text x="28" y="82" class="small muted">优点是等待短；缺点是多个站点都等到空闲时，容易同时发送。</text>
  </g>

  <g transform="translate(50 212)">
    <rect width="860" height="110" class="panel"/>
    <text x="28" y="34" class="label">非坚持 CSMA</text>
    <rect x="190" y="30" width="210" height="34" class="busy"/>
    <rect x="400" y="30" width="160" height="34" class="wait"/>
    <rect x="560" y="30" width="150" height="34" class="idle"/>
    <rect x="710" y="30" width="100" height="34" class="send"/>
    <text x="295" y="53" text-anchor="middle" class="small">信道忙</text>
    <text x="480" y="53" text-anchor="middle" class="small">随机等待</text>
    <text x="635" y="53" text-anchor="middle" class="small">再次监听</text>
    <text x="760" y="53" text-anchor="middle" class="small">发送</text>
    <text x="28" y="82" class="small muted">优点是降低抢发冲突；缺点是信道已空闲时也可能继续等待。</text>
  </g>

  <g transform="translate(50 342)">
    <rect width="860" height="110" class="panel"/>
    <text x="28" y="34" class="label">p-坚持 CSMA</text>
    <rect x="190" y="30" width="130" height="34" class="busy"/>
    <rect x="320" y="30" width="120" height="34" class="idle"/>
    <rect x="440" y="30" width="150" height="34" class="send"/>
    <rect x="590" y="30" width="150" height="34" class="wait"/>
    <text x="255" y="53" text-anchor="middle" class="small">忙则监听</text>
    <text x="380" y="53" text-anchor="middle" class="small">空闲时隙</text>
    <text x="515" y="53" text-anchor="middle" class="small">概率 p 发送</text>
    <text x="665" y="53" text-anchor="middle" class="small">概率 1-p 推迟</text>
    <text x="28" y="82" class="small muted">用于时隙信道，在冲突概率和等待时间之间折中。</text>
  </g>
</svg>
