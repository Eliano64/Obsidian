<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      text { font-family: Arial, "Microsoft YaHei", sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 14px; }
      .small { font-size: 12px; }
      .box-proto { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; }
      .box-host { fill: #f0fdf4; stroke: #059669; stroke-width: 1.5; }
      .box-port { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.5; }
      .box-path { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 1.5; }
      .bracket { font-size: 28px; font-weight: 400; fill: #64748b; }
      .annotation { font-size: 11px; fill: #64748b; }
      @media (prefers-color-scheme: dark) {
        .title { fill: #e6edf3; }
        .box-proto { fill: #1e293b; stroke: #3b82f6; }
        .box-host { fill: #1a2e1f; stroke: #10b981; }
        .box-port { fill: #2a2410; stroke: #fbbf24; }
        .box-path { fill: #1e1a2a; stroke: #a78bfa; }
        .bracket { fill: #52616b; }
        .annotation { fill: #b8c4cf; }
        text { fill: #e6edf3; }
      }
    </style>
  </defs>

  <text x="450" y="24" text-anchor="middle" class="title">URL 的一般格式</text>

  <!-- Format display -->
  <text x="130" y="65" text-anchor="middle" class="small" font-weight="700" fill="#1e293b">格式：</text>

  <!-- http:// -->
  <rect x="170" y="50" width="110" height="36" rx="6" class="box-proto"/>
  <text x="225" y="73" text-anchor="middle" class="label" font-weight="700" fill="#2563eb">http://</text>

  <!-- host -->
  <rect x="290" y="50" width="220" height="36" rx="6" class="box-host"/>
  <text x="400" y="73" text-anchor="middle" class="label" font-weight="700" fill="#059669">www.hnust.edu.cn</text>

  <!-- :port -->
  <rect x="520" y="50" width="70" height="36" rx="6" class="box-port"/>
  <text x="555" y="73" text-anchor="middle" class="label" font-weight="700" fill="#a16207">:80</text>

  <!-- /path -->
  <rect x="600" y="50" width="170" height="36" rx="6" class="box-path"/>
  <text x="685" y="73" text-anchor="middle" class="label" font-weight="700" fill="#7c3aed">/index.htm</text>

  <!-- labels below boxes -->
  <text x="225" y="100" text-anchor="middle" class="annotation">协议</text>
  <text x="400" y="100" text-anchor="middle" class="annotation">主机（域名或 IP）</text>
  <text x="555" y="100" text-anchor="middle" class="annotation">端口（可省略）</text>
  <text x="685" y="100" text-anchor="middle" class="annotation">路径</text>

  <!-- Bottom: explanation -->
  <rect x="30" y="120" width="840" height="70" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <style>
    @media (prefers-color-scheme: dark) { rect[fill="#f8fafc"] { fill: #16212c; stroke: #334155; } }
  </style>
  <text x="50" y="143" class="small" fill="#334155">
    <tspan font-weight="700" fill="#2563eb">协议</tspan>：访问资源所用的应用层协议，如 http、https、ftp。浏览器根据协议决定使用哪个应用层协议和默认端口。
  </text>
  <text x="50" y="163" class="small" fill="#334155">
    <tspan font-weight="700" fill="#059669">主机</tspan>：存放资源的服务器的域名（由 DNS 解析为 IP 地址）或直接使用 IP 地址。
  </text>
  <text x="50" y="183" class="small" fill="#334155">
    <tspan font-weight="700" fill="#a16207">端口</tspan>：服务器监听的端口号。HTTP 默认端口 80，HTTPS 默认端口 443。使用默认端口时可省略不写。
    <tspan font-weight="700" fill="#7c3aed">路径</tspan>：资源在服务器文件系统中的位置路径。
  </text>
</svg>
