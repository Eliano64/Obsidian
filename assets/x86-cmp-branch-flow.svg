<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">cmp and conditional branch flow</title>
  <desc id="desc">cmp subtracts operands, updates flags, and conditional jump reads flags to decide control flow.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--text:#111827;--muted:#4b5563;--line:#111827;--code:#dbeafe;--alu:#dcfce7;--flag:#fef3c7;--branch:#fee2e2;--flow:#ede9fe}
    @media(prefers-color-scheme:dark){:root{--bg:#111827;--text:#e5e7eb;--muted:#cbd5e1;--line:#e5e7eb;--code:#1e3a8a;--alu:#14532d;--flag:#713f12;--branch:#7f1d1d;--flow:#4c1d95}}
    .bg{fill:var(--bg)}.text{fill:var(--text);font-family:"Segoe UI",Arial,sans-serif}.muted{fill:var(--muted);font-family:"Segoe UI",Arial,sans-serif}
    .box{stroke:var(--line);stroke-width:1.8;rx:10}.code{fill:var(--code)}.alu{fill:var(--alu)}.flag{fill:var(--flag)}.branch{fill:var(--branch)}.flow{fill:var(--flow)}
    .line{stroke:var(--line);stroke-width:2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="1080" height="520"/>
  <text class="text" x="42" y="44" font-size="28" font-weight="700">cmp 与条件转移的关系</text>
  <text class="muted" x="42" y="76" font-size="18">cmp 不保存差值，只更新标志位；jxxx 根据标志位决定是否改写指令指针。</text>

  <rect class="box code" x="70" y="150" width="180" height="86"/>
  <text class="text" x="160" y="184" font-size="23" font-weight="700" text-anchor="middle">cmp a, b</text>
  <text class="muted" x="160" y="214" font-size="16" text-anchor="middle">比较 a 与 b</text>

  <rect class="box alu" x="330" y="150" width="180" height="86"/>
  <text class="text" x="420" y="184" font-size="23" font-weight="700" text-anchor="middle">a - b</text>
  <text class="muted" x="420" y="214" font-size="16" text-anchor="middle">差值不写回</text>

  <rect class="box flag" x="590" y="135" width="210" height="116"/>
  <text class="text" x="695" y="168" font-size="23" font-weight="700" text-anchor="middle">标志寄存器</text>
  <text class="text" x="695" y="199" font-size="18" text-anchor="middle">ZF SF CF OF</text>
  <text class="muted" x="695" y="226" font-size="16" text-anchor="middle">记录运算结果状态</text>

  <rect class="box branch" x="870" y="150" width="150" height="86"/>
  <text class="text" x="945" y="184" font-size="23" font-weight="700" text-anchor="middle">jxxx</text>
  <text class="muted" x="945" y="214" font-size="16" text-anchor="middle">读标志位</text>

  <path class="line" d="M250 193 H325"/>
  <path class="line" d="M510 193 H585"/>
  <path class="line" d="M800 193 H865"/>

  <rect class="box flow" x="210" y="335" width="260" height="80"/>
  <text class="text" x="340" y="368" font-size="21" font-weight="700" text-anchor="middle">条件不成立</text>
  <text class="text" x="340" y="397" font-size="17" text-anchor="middle">继续顺序执行</text>

  <rect class="box flow" x="610" y="335" width="260" height="80"/>
  <text class="text" x="740" y="368" font-size="21" font-weight="700" text-anchor="middle">条件成立</text>
  <text class="text" x="740" y="397" font-size="17" text-anchor="middle">跳转到标号</text>

  <path class="line" d="M945 236 C900 295 805 318 750 333"/>
  <path class="line" d="M930 236 C780 295 440 312 350 333"/>
</svg>
