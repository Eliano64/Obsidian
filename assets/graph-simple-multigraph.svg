<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Simple graph and multigraph</title>
  <desc id="desc">Simple graph has no repeated edges and no self-loop; multigraph may have repeated edges or self-loops.</desc>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="context-stroke"/>
    </marker>
  </defs>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--fg:#111827;--muted:#475569;--line:#334155;--node:#fff;--fill:#dbeafe;--accent:#2563eb;--warn:#dc2626}
    @media(prefers-color-scheme:dark){:root{--fg:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--node:#0f172a;--fill:#172554;--accent:#60a5fa;--warn:#f87171}}
    text{fill:var(--fg);font-family:"Segoe UI",Arial,sans-serif}.title{font-size:27px;font-weight:700}.small{font-size:17px;fill:var(--muted)}.label{font-size:20px;font-weight:700;text-anchor:middle}.node{fill:var(--node);stroke:var(--line);stroke-width:2.2}.main{fill:var(--fill);stroke:var(--accent);stroke-width:3}.edge{stroke:var(--line);stroke-width:2.7;fill:none}.arc{stroke:var(--accent);stroke-width:2.7;fill:none;marker-end:url(#arrow2)}.bad{stroke:var(--warn);stroke-width:2.7;fill:none}.box{fill:transparent;stroke:var(--line);stroke-width:1.5;rx:12}.ok{fill:var(--accent);font-weight:700}.warn{fill:var(--warn);font-weight:700}
  </style>
  <text class="title" x="38" y="50">简单图与多重图</text>
  <text class="small" x="38" y="82">数据结构课程通常讨论简单图：没有重复边，也没有自环。</text>

  <rect class="box" x="48" y="130" width="420" height="315"/>
  <text class="label" x="258" y="165">简单图</text>
  <line class="edge" x1="150" y1="275" x2="255" y2="210"/>
  <line class="edge" x1="255" y1="210" x2="365" y2="275"/>
  <line class="edge" x1="150" y1="275" x2="365" y2="275"/>
  <circle class="main" cx="150" cy="275" r="24"/><text class="label" x="150" y="283">A</text>
  <circle class="node" cx="255" cy="210" r="23"/><text class="label" x="255" y="218">B</text>
  <circle class="node" cx="365" cy="275" r="23"/><text class="label" x="365" y="283">C</text>
  <text class="ok" x="92" y="380">无重复边；无顶点到自身的边</text>

  <rect class="box" x="515" y="130" width="420" height="315"/>
  <text class="label" x="725" y="165">多重图</text>
  <path class="bad" d="M615 260 C660 205,710 205,755 260"/>
  <path class="bad" d="M615 285 C660 340,710 340,755 285"/>
  <path class="bad" d="M790 245 C845 205,870 285,815 300 C780 310,765 270,790 245"/>
  <circle class="main" cx="615" cy="275" r="24"/><text class="label" x="615" y="283">A</text>
  <circle class="node" cx="755" cy="275" r="23"/><text class="label" x="755" y="283">B</text>
  <circle class="node" cx="815" cy="315" r="23"/><text class="label" x="815" y="323">C</text>
  <text class="warn" x="560" y="380">允许重复边；也允许自环</text>
</svg>
