<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Ordered Sequential Search Decision Tree</title>
  <desc id="desc">Decision tree for ordered sequential search on six ascending keys, preserving the original slanted tree shape with wider spacing.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    .key { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.8; }
    .fail { fill: #fee2e2; stroke: #ef4444; stroke-width: 1.6; }
    .line { stroke: #64748b; stroke-width: 1.8; fill: none; }
    .text { fill: #0f172a; font-family: Arial, "Microsoft YaHei", sans-serif; }
    .muted { fill: #475569; font-family: Arial, "Microsoft YaHei", sans-serif; }
    .edge { fill: #334155; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0b1020; }
      .panel { fill: #111827; stroke: #334155; }
      .key { fill: #172554; stroke: #38bdf8; }
      .fail { fill: #3f1717; stroke: #f87171; }
      .line { stroke: #94a3b8; }
      .text { fill: #e5e7eb; }
      .muted { fill: #cbd5e1; }
      .edge { fill: #cbd5e1; }
    }
  </style>

  <rect class="bg" width="1280" height="760"/>
  <rect class="panel" x="24" y="24" width="1232" height="712" rx="10"/>

  <text class="text" x="56" y="66" font-size="25" font-weight="700">有序顺序查找的判定树</text>
  <text class="muted" x="56" y="98" font-size="16">关键字递增：7, 13, 19, 29, 37, 43。每层比较一个关键字：小于则提前失败，等于则成功，大于则继续向后。</text>

  <!-- Main comparison chain keeps the original slanted decision-tree shape. -->
  <path class="line" d="M250 160 L170 250"/>
  <path class="line" d="M250 160 L410 250"/>

  <path class="line" d="M410 250 L320 340"/>
  <path class="line" d="M410 250 L575 340"/>

  <path class="line" d="M575 340 L485 430"/>
  <path class="line" d="M575 340 L740 430"/>

  <path class="line" d="M740 430 L650 520"/>
  <path class="line" d="M740 430 L900 520"/>

  <path class="line" d="M900 520 L810 610"/>
  <path class="line" d="M900 520 L1050 610"/>

  <path class="line" d="M1050 610 L960 690"/>
  <path class="line" d="M1050 610 L1210 690"/>

  <!-- Level 1 -->
  <circle class="key" cx="250" cy="160" r="28"/>
  <text class="text" x="239" y="167" font-size="18" font-weight="700">7</text>
  <rect class="fail" x="108" y="228" width="124" height="44" rx="8"/>
  <text class="text" x="126" y="256" font-size="15">(-∞, 7)</text>
  <text class="edge" x="188" y="200">&gt;</text>
  <text class="edge" x="354" y="204">&lt;</text>

  <!-- Level 2 -->
  <circle class="key" cx="410" cy="250" r="28"/>
  <text class="text" x="394" y="257" font-size="18" font-weight="700">13</text>
  <rect class="fail" x="258" y="318" width="124" height="44" rx="8"/>
  <text class="text" x="282" y="346" font-size="15">(7, 13)</text>
  <text class="edge" x="348" y="290">&gt;</text>
  <text class="edge" x="520" y="294">&lt;</text>

  <!-- Level 3 -->
  <circle class="key" cx="575" cy="340" r="28"/>
  <text class="text" x="559" y="347" font-size="18" font-weight="700">19</text>
  <rect class="fail" x="423" y="408" width="124" height="44" rx="8"/>
  <text class="text" x="443" y="436" font-size="15">(13, 19)</text>
  <text class="edge" x="513" y="380">&gt;</text>
  <text class="edge" x="684" y="384">&lt;</text>

  <!-- Level 4 -->
  <circle class="key" cx="740" cy="430" r="28"/>
  <text class="text" x="724" y="437" font-size="18" font-weight="700">29</text>
  <rect class="fail" x="588" y="498" width="124" height="44" rx="8"/>
  <text class="text" x="608" y="526" font-size="15">(19, 29)</text>
  <text class="edge" x="678" y="470">&gt;</text>
  <text class="edge" x="846" y="474">&lt;</text>

  <!-- Level 5 -->
  <circle class="key" cx="900" cy="520" r="28"/>
  <text class="text" x="884" y="527" font-size="18" font-weight="700">37</text>
  <rect class="fail" x="748" y="588" width="124" height="44" rx="8"/>
  <text class="text" x="768" y="616" font-size="15">(29, 37)</text>
  <text class="edge" x="838" y="560">&gt;</text>
  <text class="edge" x="1002" y="564">&lt;</text>

  <!-- Level 6 -->
  <circle class="key" cx="1050" cy="610" r="28"/>
  <text class="text" x="1034" y="617" font-size="18" font-weight="700">43</text>
  <rect class="fail" x="898" y="668" width="124" height="44" rx="8"/>
  <text class="text" x="918" y="696" font-size="15">(37, 43)</text>
  <rect class="fail" x="1162" y="668" width="86" height="44" rx="8"/>
  <text class="text" x="1174" y="696" font-size="15">(43,+∞)</text>
  <text class="edge" x="988" y="646">&gt;</text>
  <text class="edge" x="1142" y="648">&lt;</text>
</svg>
