<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">哲学家就餐问题资源环</title>
  <desc id="desc">五个哲学家围坐，五支筷子分别位于相邻哲学家之间。哲学家 i 左边筷子编号为 i，右边筷子编号为 i+1 mod 5。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="var(--arrow)"/>
    </marker>
    <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

      :root {
        --bg: #ffffff;
        --panel: #f8fafc;
        --line: #cbd5e1;
        --text: #172033;
        --muted: #64748b;
        --philo: #dbeafe;
        --philo-line: #2563eb;
        --stick: #fef3c7;
        --stick-line: #d97706;
        --center: #dcfce7;
        --center-line: #16a34a;
        --arrow: #475569;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --panel: #111827;
          --line: #334155;
          --text: #e5e7eb;
          --muted: #94a3b8;
          --philo: #1e3a8a;
          --philo-line: #60a5fa;
          --stick: #713f12;
          --stick-line: #fbbf24;
          --center: #14532d;
          --center-line: #4ade80;
          --arrow: #cbd5e1;
        }
      }
      text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: var(--text); }
      .title { font-size: 34px; font-weight: 700; }
      .muted { fill: var(--muted); font-size: 20px; }
      .label { font-size: 22px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 18px; fill: var(--muted); text-anchor: middle; dominant-baseline: middle; }
      .philo { fill: var(--philo); stroke: var(--philo-line); stroke-width: 3; }
      .stick { fill: var(--stick); stroke: var(--stick-line); stroke-width: 3; rx: 11; }
      .center { fill: var(--center); stroke: var(--center-line); stroke-width: 3; }
      .ring { fill: none; stroke: var(--line); stroke-width: 2; stroke-dasharray: 8 8; }
      .arrow { fill: none; stroke: var(--arrow); stroke-width: 2.5; marker-end: url(#arrow); opacity: .78; }
    </style>
  </defs>
  <rect width="900" height="620" fill="var(--bg)"/>
  <text x="52" y="58" class="title">哲学家就餐问题的资源结构</text>
  <text x="52" y="94" class="muted">每位哲学家需要同时持有左右两支筷子；每支筷子只能被相邻两人中的一人持有。</text>

  <circle cx="450" cy="365" r="170" class="ring"/>
  <circle cx="450" cy="365" r="66" class="center"/>
  <text x="450" y="358" class="label">共享资源</text>
  <text x="450" y="388" class="small">五支筷子</text>

  <g id="p0"><circle cx="450" cy="160" r="43" class="philo"/><text x="450" y="153" class="label">P0</text><text x="450" y="181" class="small">哲学家 0</text></g>
  <g id="p1"><circle cx="640" cy="305" r="43" class="philo"/><text x="640" y="298" class="label">P1</text><text x="640" y="326" class="small">哲学家 1</text></g>
  <g id="p2"><circle cx="565" cy="530" r="43" class="philo"/><text x="565" y="523" class="label">P2</text><text x="565" y="551" class="small">哲学家 2</text></g>
  <g id="p3"><circle cx="335" cy="530" r="43" class="philo"/><text x="335" y="523" class="label">P3</text><text x="335" y="551" class="small">哲学家 3</text></g>
  <g id="p4"><circle cx="260" cy="305" r="43" class="philo"/><text x="260" y="298" class="label">P4</text><text x="260" y="326" class="small">哲学家 4</text></g>

  <g transform="translate(545 210) rotate(36)"><rect x="-34" y="-13" width="68" height="26" class="stick"/><text x="0" y="0" class="label">C1</text></g>
  <g transform="translate(616 418) rotate(108)"><rect x="-34" y="-13" width="68" height="26" class="stick"/><text x="0" y="0" class="label">C2</text></g>
  <g transform="translate(450 548) rotate(0)"><rect x="-34" y="-13" width="68" height="26" class="stick"/><text x="0" y="0" class="label">C3</text></g>
  <g transform="translate(284 418) rotate(72)"><rect x="-34" y="-13" width="68" height="26" class="stick"/><text x="0" y="0" class="label">C4</text></g>
  <g transform="translate(355 210) rotate(144)"><rect x="-34" y="-13" width="68" height="26" class="stick"/><text x="0" y="0" class="label">C0</text></g>

  <path class="arrow" d="M448 204 C445 242 438 274 430 308"/>
  <path class="arrow" d="M604 325 C570 336 535 348 503 360"/>
  <path class="arrow" d="M540 497 C516 464 496 430 479 397"/>
  <path class="arrow" d="M360 497 C384 464 404 430 421 397"/>
  <path class="arrow" d="M296 325 C330 336 365 348 397 360"/>

  <text x="52" y="604" class="muted">编号约定：哲学家 i 左边的筷子为 Cᵢ，右边的筷子为 C₍ᵢ₊₁₎ mod 5。</text>
</svg>
