<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 520" role="img" aria-labelledby="title desc">
  <title id="title">Balanced binary tree concept</title>
  <desc id="desc">A balanced binary tree compared with an unbalanced tree.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark;--fg:#111827;--muted:#475569;--line:#334155;--bad:#dc2626;--good:#16a34a;--node:#fff;--accent:#2563eb;--fill:#dbeafe}
    @media(prefers-color-scheme:dark){:root{--fg:#e5e7eb;--muted:#cbd5e1;--line:#94a3b8;--bad:#f87171;--good:#86efac;--node:#0f172a;--accent:#60a5fa;--fill:#172554}}
    text{fill:var(--fg);font-family:"Segoe UI",Arial,sans-serif}.title{font-size:25px;font-weight:700}.small{font-size:16px;fill:var(--muted)}.node{fill:var(--node);stroke:var(--line);stroke-width:2}.root{fill:var(--fill);stroke:var(--accent);stroke-width:3}.edge{stroke:var(--line);stroke-width:2.2}.num{font-size:17px;font-weight:700;text-anchor:middle}.good{fill:var(--good);font-weight:700}.bad{fill:var(--bad);font-weight:700}.label{font-size:20px;font-weight:700}
  </style>
  <text class="title" x="38" y="48">平衡二叉树：任一结点左右子树高度差不超过 1</text>
  <text class="small" x="38" y="78">平衡限制让树高保持在对数级，查找路径不会长期退化成链。</text>
  <text class="label" x="80" y="120">较平衡</text>
  <g transform="translate(70 155)">
    <line class="edge" x1="180" y1="20" x2="95" y2="95"/><line class="edge" x1="180" y1="20" x2="270" y2="95"/>
    <line class="edge" x1="95" y1="95" x2="50" y2="170"/><line class="edge" x1="95" y1="95" x2="145" y2="170"/>
    <line class="edge" x1="270" y1="95" x2="230" y2="170"/><line class="edge" x1="270" y1="95" x2="315" y2="170"/>
    <line class="edge" x1="315" y1="170" x2="295" y2="240"/>
    <circle class="root" cx="180" cy="20" r="24"/><text class="num" x="180" y="26">50</text>
    <circle class="node" cx="95" cy="95" r="22"/><text class="num" x="95" y="101">26</text><circle class="node" cx="270" cy="95" r="22"/><text class="num" x="270" y="101">66</text>
    <circle class="node" cx="50" cy="170" r="21"/><text class="num" x="50" y="176">21</text><circle class="node" cx="145" cy="170" r="21"/><text class="num" x="145" y="176">30</text><circle class="node" cx="230" cy="170" r="21"/><text class="num" x="230" y="176">60</text><circle class="node" cx="315" cy="170" r="21"/><text class="num" x="315" y="176">70</text>
    <circle class="node" cx="295" cy="240" r="20"/><text class="num" x="295" y="246">68</text>
  </g>
  <text class="good" x="78" y="455">任一结点的左右高度差不超过 1</text>

  <text class="label" x="560" y="120">明显不平衡</text>
  <g transform="translate(545 150)">
    <line class="edge" x1="110" y1="25" x2="160" y2="85"/><line class="edge" x1="160" y1="85" x2="205" y2="145"/><line class="edge" x1="205" y1="145" x2="250" y2="205"/><line class="edge" x1="250" y1="205" x2="295" y2="265"/>
    <circle class="root" cx="110" cy="25" r="24"/><text class="num" x="110" y="31">21</text>
    <circle class="node" cx="160" cy="85" r="22"/><text class="num" x="160" y="91">30</text>
    <circle class="node" cx="205" cy="145" r="22"/><text class="num" x="205" y="151">50</text>
    <circle class="node" cx="250" cy="205" r="22"/><text class="num" x="250" y="211">60</text>
    <circle class="node" cx="295" cy="265" r="22"/><text class="num" x="295" y="271">66</text>
  </g>
  <text class="bad" x="558" y="455">某些结点一侧很深、另一侧为空，查找效率下降</text>
</svg>
