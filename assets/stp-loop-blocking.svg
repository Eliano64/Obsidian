<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-label="STP阻塞冗余链路示意图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#172033}.sw{fill:#eef6ff;stroke:#2f73c8;stroke-width:2.5;rx:10}.net{fill:#fff;stroke:#7d8aa0;stroke-width:2;rx:10}.line{stroke:#2d8a4d;stroke-width:5;fill:none}.blocked{stroke:#d14343;stroke-width:5;fill:none;stroke-dasharray:10 8}.title{font-size:28px;font-weight:700}.label{font-size:18px;font-weight:700}.small{font-size:15px}.muted{fill:#5d6b7e}
    @media(prefers-color-scheme:dark){text{fill:#e7edf7}.muted{fill:#b6c2d2}.sw{fill:#10243d;stroke:#63a3ff}.net{fill:#111827;stroke:#718096}.line{stroke:#67d493}.blocked{stroke:#ff8585}}
  </style>
  <text x="430" y="42" text-anchor="middle" class="title">STP：物理上可有冗余，逻辑上保持无环</text>
  <rect x="160" y="90" width="130" height="58" class="sw"/><text x="225" y="126" text-anchor="middle" class="label">SW1</text>
  <rect x="570" y="90" width="130" height="58" class="sw"/><text x="635" y="126" text-anchor="middle" class="label">SW2</text>
  <rect x="340" y="275" width="180" height="64" class="net"/><text x="430" y="313" text-anchor="middle" class="label">局域网段</text>
  <path d="M290 120 L570 120" class="line"/>
  <path d="M225 148 L380 275" class="line"/>
  <path d="M635 148 L480 275" class="blocked"/>
  <text x="430" y="104" text-anchor="middle" class="small">转发链路</text>
  <text x="590" y="245" text-anchor="middle" class="small">阻塞端口</text>
  <text x="430" y="385" text-anchor="middle" class="small muted">阻塞不是删除链路；活动链路故障时，可重新生成树并启用备用链路。</text>
</svg>
