<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">码距与检错纠错能力</title>
  <desc id="desc">展示最小码距和检测、纠正错误位数之间的关系</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--text:#172033;--muted:#64748b;--line:#334155;--blue:#2563eb;--green:#16a34a;--amber:#d97706;--red:#dc2626}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--line:#94a3b8;--blue:#60a5fa;--green:#4ade80;--amber:#fbbf24;--red:#f87171}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.circle{fill:none;stroke-width:3}.c1{stroke:var(--blue)}.c2{stroke:var(--green)}.bad{stroke:var(--red);stroke-width:3}.arrow{stroke:var(--line);stroke-width:2;marker-end:url(#arrow)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.head{font-size:20px;font-weight:700}.small{font-size:15px;fill:var(--muted)}.formula{font-size:24px;font-weight:800}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="540"/>
  <text x="50" y="56" class="title">最小码距决定检错和纠错能力</text>
  <text x="50" y="84" class="small">码距是两个码字对应位不同的个数。所有合法码字之间的最小距离称为最小码距 d。</text>
  <rect x="62" y="125" width="405" height="325" rx="10" class="panel"/>
  <text x="264" y="165" text-anchor="middle" class="head">检错</text>
  <circle cx="190" cy="280" r="58" class="circle c1"/>
  <circle cx="340" cy="280" r="58" class="circle c2"/>
  <path d="M248 280 H282" class="bad"/>
  <text x="190" y="285" text-anchor="middle" class="head">合法码字 A</text>
  <text x="340" y="285" text-anchor="middle" class="head">合法码字 B</text>
  <text x="264" y="385" text-anchor="middle" class="formula">d ≥ e + 1</text>
  <text x="264" y="420" text-anchor="middle" class="small">要检测 e 位错误，错误后不能正好变成另一个合法码字。</text>
  <rect x="512" y="125" width="405" height="325" rx="10" class="panel"/>
  <text x="714" y="165" text-anchor="middle" class="head">纠错</text>
  <circle cx="640" cy="280" r="72" class="circle c1"/>
  <circle cx="790" cy="280" r="72" class="circle c2"/>
  <path d="M706 280 H724" class="bad"/>
  <text x="640" y="285" text-anchor="middle" class="head">A 的纠错范围</text>
  <text x="790" y="285" text-anchor="middle" class="head">B 的纠错范围</text>
  <text x="714" y="385" text-anchor="middle" class="formula">d ≥ 2t + 1</text>
  <text x="714" y="420" text-anchor="middle" class="small">要纠正 t 位错误，两个合法码字的纠错范围不能重叠。</text>
  <text x="490" y="505" text-anchor="middle" class="small">纠错比检错要求更高，因为接收方不仅要知道“错了”，还要判断“原来是哪一个合法码字”。</text>
</svg>
