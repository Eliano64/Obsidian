<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">容量为 N 的吸烟者问题</title>
  <desc id="desc">供应者通过 empty 和 mutex 向容量为 N 的缓冲区放入材料组合，三个吸烟者分别等待对应的计数信号量并取走匹配组合。</desc>
  <style>
    svg{background:#f8fafc}
    @media(prefers-color-scheme:dark){svg{background:#0b1020}}
    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#94a3b8;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--amber:#d97706;--purple:#7c3aed;--red:#dc2626;--soft-blue:#eff6ff;--soft-green:#ecfdf5;--soft-amber:#fff7ed;--soft-purple:#f5f3ff;--soft-red:#fef2f2;--empty:#f1f5f9}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#64748b;--panel:#111827;--blue:#60a5fa;--green:#34d399;--amber:#fbbf24;--purple:#a78bfa;--red:#f87171;--soft-blue:#13233d;--soft-green:#102c26;--soft-amber:#332411;--soft-purple:#241b3d;--soft-red:#291418;--empty:#172033}}
    .bg{fill:var(--bg)}.panel{fill:var(--panel);stroke:var(--line);stroke-width:2}.provider{fill:var(--soft-purple);stroke:var(--purple);stroke-width:2.5}.smoker{fill:var(--panel);stroke-width:2.5}.s1{stroke:var(--green)}.s2{stroke:var(--blue)}.s3{stroke:var(--amber)}.slot{stroke-width:2}.type1{fill:var(--soft-green);stroke:var(--green)}.type2{fill:var(--soft-blue);stroke:var(--blue)}.type3{fill:var(--soft-amber);stroke:var(--amber)}.vacant{fill:var(--empty);stroke:var(--line);stroke-dasharray:7 5}.badge{fill:var(--panel);stroke:var(--line);stroke-width:1.8}.notice{fill:var(--soft-red);stroke:var(--red);stroke-width:1.5}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.edge{fill:none;stroke-width:3.2;marker-end:url(#arrow)}.ep{stroke:var(--purple)}.e1{stroke:var(--green)}.e2{stroke:var(--blue)}.e3{stroke:var(--amber)}
  </style>
  <defs>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 Z" fill="context-stroke"/></marker>
  </defs>
  <rect class="bg" width="1000" height="560"/>
  <text class="t" x="500" y="38" text-anchor="middle" font-size="25" font-weight="700">容量为 N：多类型有界缓冲区</text>
  <text class="m" x="500" y="65" text-anchor="middle" font-size="14">每组材料占一个槽位；图示允许消费者按类型取出，不要求严格 FIFO</text>

  <rect class="provider" x="34" y="185" width="176" height="112" rx="12"/>
  <text class="t" x="122" y="222" text-anchor="middle" font-size="20" font-weight="700">供应者</text>
  <text class="m" x="122" y="250" text-anchor="middle" font-size="14">k = produce()</text>
  <text class="m" x="122" y="276" text-anchor="middle" font-size="13">等待空槽后放入组合</text>

  <rect class="panel" x="284" y="88" width="422" height="320" rx="14"/>
  <text class="t" x="495" y="121" text-anchor="middle" font-size="20" font-weight="700">共享缓冲区：N 个槽位</text>
  <rect class="slot type1" x="318" y="145" width="160" height="58" rx="8"/>
  <text class="t" x="398" y="170" text-anchor="middle" font-size="14" font-weight="700">组合 1</text>
  <text class="m" x="398" y="190" text-anchor="middle" font-size="12">纸 + 胶水</text>
  <rect class="slot type2" x="512" y="145" width="160" height="58" rx="8"/>
  <text class="t" x="592" y="170" text-anchor="middle" font-size="14" font-weight="700">组合 2</text>
  <text class="m" x="592" y="190" text-anchor="middle" font-size="12">烟草 + 胶水</text>
  <rect class="slot vacant" x="318" y="222" width="160" height="58" rx="8"/>
  <text class="m" x="398" y="257" text-anchor="middle" font-size="14">空槽</text>
  <rect class="slot type1" x="512" y="222" width="160" height="58" rx="8"/>
  <text class="t" x="592" y="247" text-anchor="middle" font-size="14" font-weight="700">组合 1</text>
  <text class="m" x="592" y="267" text-anchor="middle" font-size="12">纸 + 胶水</text>
  <rect class="slot type3" x="318" y="299" width="160" height="58" rx="8"/>
  <text class="t" x="398" y="324" text-anchor="middle" font-size="14" font-weight="700">组合 3</text>
  <text class="m" x="398" y="344" text-anchor="middle" font-size="12">烟草 + 纸</text>
  <rect class="slot vacant" x="512" y="299" width="160" height="58" rx="8"/>
  <text class="m" x="592" y="334" text-anchor="middle" font-size="14">… 第 N 个槽位</text>
  <text class="m" x="495" y="389" text-anchor="middle" font-size="13">所有插入、删除和内部计数均由 mutex 保护</text>

  <rect class="smoker s1" x="805" y="82" width="164" height="82" rx="10"/>
  <text class="t" x="887" y="114" text-anchor="middle" font-size="18" font-weight="700">吸烟者 1</text>
  <text class="m" x="887" y="140" text-anchor="middle" font-size="13">P(offer1)</text>
  <rect class="smoker s2" x="805" y="205" width="164" height="82" rx="10"/>
  <text class="t" x="887" y="237" text-anchor="middle" font-size="18" font-weight="700">吸烟者 2</text>
  <text class="m" x="887" y="263" text-anchor="middle" font-size="13">P(offer2)</text>
  <rect class="smoker s3" x="805" y="328" width="164" height="82" rx="10"/>
  <text class="t" x="887" y="360" text-anchor="middle" font-size="18" font-weight="700">吸烟者 3</text>
  <text class="m" x="887" y="386" text-anchor="middle" font-size="13">P(offer3)</text>

  <path class="edge ep" d="M210 241 H284"/>
  <text class="m" x="247" y="220" text-anchor="middle" font-size="12">P(empty) → P(mutex)</text>
  <path class="edge e1" d="M706 165 C752 155 767 123 805 123"/>
  <text class="m" x="754" y="143" text-anchor="middle" font-size="12">offer1</text>
  <path class="edge e2" d="M706 246 H805"/>
  <text class="m" x="755" y="231" text-anchor="middle" font-size="12">offer2</text>
  <path class="edge e3" d="M706 327 C752 335 767 369 805 369"/>
  <text class="m" x="754" y="354" text-anchor="middle" font-size="12">offer3</text>

  <rect class="badge" x="205" y="438" width="180" height="52" rx="8"/>
  <text class="t" x="295" y="470" text-anchor="middle" font-size="15" font-weight="700">empty = N − 已占槽位</text>
  <rect class="badge" x="410" y="438" width="180" height="52" rx="8"/>
  <text class="t" x="500" y="470" text-anchor="middle" font-size="15" font-weight="700">mutex = 0 或 1</text>
  <rect class="badge" x="615" y="438" width="180" height="52" rx="8"/>
  <text class="t" x="705" y="460" text-anchor="middle" font-size="14" font-weight="700">offer1 / 2 / 3</text>
  <text class="m" x="705" y="480" text-anchor="middle" font-size="12">分别等于三类组合库存</text>
  <rect class="notice" x="185" y="510" width="630" height="34" rx="8"/>
  <text class="t" x="500" y="532" text-anchor="middle" font-size="14" font-weight="700">取走材料后立即 V(empty)；吸烟在缓冲区外进行，不再用 finish 限制供应者</text>
</svg>
