<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">Graph path and distance</title>
  <desc id="desc">Examples of path, cycle, simple path, shortest distance, and unreachable vertices.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    svg{background:transparent;font-family:"Segoe UI",Arial,sans-serif}
    .panel{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    .edge{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round}
    .hot{stroke:#dc2626;stroke-width:5;fill:none;stroke-linecap:round;marker-end:url(#hotArrow)}
    .arc{stroke:#64748b;stroke-width:3;fill:none;stroke-linecap:round;marker-end:url(#arrow)}
    .node{fill:#ffffff;stroke:#2563eb;stroke-width:3}
    .isolated{fill:#ffffff;stroke:#94a3b8;stroke-width:3;stroke-dasharray:6 5}
    .text{fill:#0f172a;font-size:22px;font-weight:650}
    .small{fill:#334155;font-size:18px}
    .label{fill:#991b1b;font-size:19px;font-weight:650}
    @media (prefers-color-scheme: dark){
      .panel{fill:#111827;stroke:#334155}
      .edge,.arc{stroke:#cbd5e1}
      .node,.isolated{fill:#0b1220}
      .text{fill:#f8fafc}
      .small{fill:#cbd5e1}
      .label{fill:#fca5a5}
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <marker id="hotArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect class="panel" x="28" y="28" width="924" height="484" rx="10"/>
  <text class="text" x="60" y="76">路径、回路、距离</text>

  <line class="edge" x1="150" y1="160" x2="285" y2="150"/>
  <line class="edge" x1="285" y1="150" x2="360" y2="280"/>
  <line class="edge" x1="360" y1="280" x2="205" y2="325"/>
  <line class="edge" x1="205" y1="325" x2="150" y2="160"/>
  <line class="edge" x1="285" y1="150" x2="520" y2="165"/>
  <line class="edge" x1="520" y1="165" x2="590" y2="300"/>
  <line class="edge" x1="360" y1="280" x2="590" y2="300"/>
  <path class="hot" d="M150 160 L285 150 L520 165 L590 300"/>

  <circle class="node" cx="150" cy="160" r="28"/><text class="text" x="140" y="168">A</text>
  <circle class="node" cx="285" cy="150" r="28"/><text class="text" x="275" y="158">B</text>
  <circle class="node" cx="360" cy="280" r="28"/><text class="text" x="350" y="288">C</text>
  <circle class="node" cx="205" cy="325" r="28"/><text class="text" x="194" y="333">D</text>
  <circle class="node" cx="520" cy="165" r="28"/><text class="text" x="510" y="173">E</text>
  <circle class="node" cx="590" cy="300" r="28"/><text class="text" x="582" y="308">F</text>
  <circle class="isolated" cx="810" cy="215" r="30"/><text class="text" x="799" y="223">G</text>

  <text class="label" x="118" y="112">A → B → E → F</text>
  <text class="small" x="118" y="410">路径长度 = 边数 = 3</text>
  <text class="small" x="118" y="442">若这是 A 到 F 的最短路径，则 dist(A,F)=3</text>
  <text class="small" x="650" y="410">G 与其他顶点不可达时</text>
  <text class="small" x="650" y="442">距离记为 ∞</text>
  <text class="small" x="116" y="478">A-B-C-D-A：回路；除首尾外顶点不重复时为简单回路</text>
</svg>
