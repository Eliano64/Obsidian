<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">IPC address space isolation</title>
  <desc id="desc">Processes have isolated address spaces and need the kernel to support communication.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; --bg:#fff; --fg:#111827; --muted:#64748b; --line:#94a3b8; --blue:#dbeafe; --green:#dcfce7; --red:#fee2e2; --accent:#2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg:#0f172a; --fg:#e5e7eb; --muted:#94a3b8; --line:#64748b; --blue:#1e3a8a; --green:#14532d; --red:#7f1d1d; --accent:#60a5fa; } }
    .bg{fill:var(--bg)} text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:var(--fg)} .h{font-weight:700;font-size:22px}.t{font-size:16px}.small{font-size:14px;fill:var(--muted)}.box{stroke:var(--line);stroke-width:2;rx:10}.bad{fill:none;stroke:#ef4444;stroke-width:4;stroke-dasharray:8 7}.arrow{fill:none;stroke:var(--accent);stroke-width:3;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="var(--accent)"/></marker></defs>
  <rect class="bg" width="980" height="430"/>
  <rect class="box" x="70" y="72" width="260" height="250" fill="var(--blue)"/>
  <text class="h" x="200" y="110" text-anchor="middle">进程 P 地址空间</text>
  <rect class="box" x="115" y="145" width="170" height="54" fill="var(--bg)"/>
  <text class="t" x="200" y="179" text-anchor="middle">P 的数据</text>
  <rect class="box" x="650" y="72" width="260" height="250" fill="var(--green)"/>
  <text class="h" x="780" y="110" text-anchor="middle">进程 Q 地址空间</text>
  <rect class="box" x="695" y="145" width="170" height="54" fill="var(--bg)"/>
  <text class="t" x="780" y="179" text-anchor="middle">Q 的数据</text>
  <path class="bad" d="M285 172 C395 120 585 120 695 172"/>
  <text class="small" x="490" y="118" text-anchor="middle">不能直接访问对方地址空间</text>
  <rect class="box" x="365" y="255" width="250" height="88" fill="var(--red)"/>
  <text class="h" x="490" y="292" text-anchor="middle">操作系统内核</text>
  <text class="small" x="490" y="318" text-anchor="middle">提供受控 IPC 机制</text>
  <path class="arrow" d="M250 322 C310 360 390 365 448 343"/>
  <path class="arrow" d="M530 343 C590 365 670 360 730 322"/>
  <text class="small" x="490" y="390" text-anchor="middle">共享存储、消息传递、管道都要依赖内核建立规则和边界</text>
</svg>
