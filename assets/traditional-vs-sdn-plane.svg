<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Traditional network and SDN planes</title>
  <desc id="desc">Traditional routers contain both data and control planes while SDN separates control plane into a logically centralized controller.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
    .panel { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 12; }
    .router { fill: #fff; stroke: #475569; stroke-width: 2; rx: 10; }
    .data { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .control { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
    .link { stroke: #64748b; stroke-width: 2.5; }
    .ctl { stroke: #dc2626; stroke-width: 2.5; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 14px; }
    @media (prefers-color-scheme: dark) {
      text { fill: #e5e7eb; }
      .panel { fill: #111827; stroke: #94a3b8; }
      .router { fill: #0b1220; stroke: #cbd5e1; }
      .data { fill: #10213f; stroke: #60a5fa; }
      .control { fill: #2b1708; stroke: #fb923c; }
      .link { stroke: #94a3b8; }
      .ctl { stroke: #f87171; }
    }
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/></marker></defs>
  <rect x="45" y="65" width="420" height="300" class="panel"/>
  <rect x="515" y="65" width="420" height="300" class="panel"/>
  <text x="255" y="100" text-anchor="middle" class="label">传统路由器网络</text>
  <text x="725" y="100" text-anchor="middle" class="label">SDN</text>
  <g>
    <rect x="105" y="140" width="115" height="85" class="router"/>
    <rect x="115" y="150" width="95" height="28" class="control"/><text x="162" y="170" text-anchor="middle" class="small">控制</text>
    <rect x="115" y="186" width="95" height="28" class="data"/><text x="162" y="206" text-anchor="middle" class="small">数据</text>
    <rect x="290" y="140" width="115" height="85" class="router"/>
    <rect x="300" y="150" width="95" height="28" class="control"/><text x="347" y="170" text-anchor="middle" class="small">控制</text>
    <rect x="300" y="186" width="95" height="28" class="data"/><text x="347" y="206" text-anchor="middle" class="small">数据</text>
    <rect x="197" y="270" width="115" height="85" class="router"/>
    <rect x="207" y="280" width="95" height="28" class="control"/><text x="254" y="300" text-anchor="middle" class="small">控制</text>
    <rect x="207" y="316" width="95" height="28" class="data"/><text x="254" y="336" text-anchor="middle" class="small">数据</text>
    <line x1="220" y1="185" x2="290" y2="185" class="link"/>
    <line x1="185" y1="225" x2="225" y2="270" class="link"/>
    <line x1="325" y1="225" x2="285" y2="270" class="link"/>
  </g>
  <g>
    <rect x="620" y="125" width="210" height="60" class="control"/><text x="725" y="160" text-anchor="middle" class="small">逻辑集中 SDN 控制器</text>
    <rect x="570" y="260" width="100" height="58" class="data"/><text x="620" y="294" text-anchor="middle" class="small">交换机</text>
    <rect x="675" y="260" width="100" height="58" class="data"/><text x="725" y="294" text-anchor="middle" class="small">交换机</text>
    <rect x="780" y="260" width="100" height="58" class="data"/><text x="830" y="294" text-anchor="middle" class="small">交换机</text>
    <line x1="670" y1="289" x2="675" y2="289" class="link"/>
    <line x1="775" y1="289" x2="780" y2="289" class="link"/>
    <path d="M690 185 L620 260" class="ctl"/>
    <path d="M725 185 L725 260" class="ctl"/>
    <path d="M760 185 L830 260" class="ctl"/>
  </g>
  <text x="255" y="390" text-anchor="middle" class="small">每台设备都有自己的控制功能</text>
  <text x="725" y="390" text-anchor="middle" class="small">控制功能抽离到控制器，数据层设备按流表转发</text>
</svg>
