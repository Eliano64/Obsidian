<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">发送时延与传播时延</title>
  <desc id="desc">展示发送时延和传播时延的区别</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--panel:#f8fafc;--line:#334155;--text:#172033;--muted:#64748b;--blue:#dbeafe;--blue-line:#2563eb;--green:#dcfce7;--green-line:#16a34a;--amber:#fef3c7;--amber-line:#d97706}
    @media (prefers-color-scheme: dark){:root{--bg:#0f172a;--panel:#111827;--line:#94a3b8;--text:#e5e7eb;--muted:#94a3b8;--blue:#1e3a8a;--blue-line:#60a5fa;--green:#14532d;--green-line:#4ade80;--amber:#713f12;--amber-line:#fbbf24}}
    .bg{fill:var(--bg)}.host{fill:var(--blue);stroke:var(--blue-line);stroke-width:2.5}.wire{stroke:var(--line);stroke-width:8;stroke-linecap:round}.packet{fill:var(--green);stroke:var(--green-line);stroke-width:2}.wave{fill:none;stroke:var(--amber-line);stroke-width:4}.arrow{fill:none;stroke:var(--line);stroke-width:2.4;marker-end:url(#arrow)}text{fill:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.title{font-size:28px;font-weight:700}.label{font-size:20px;font-weight:700}.small{font-size:16px;fill:var(--muted)}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="var(--line)"/></marker></defs>
  <rect class="bg" width="980" height="520"/>
  <text x="50" y="58" class="title">发送时延 vs 传播时延</text>
  <rect x="90" y="190" width="120" height="80" rx="14" class="host"/><text x="150" y="238" text-anchor="middle" class="label">发送端</text>
  <rect x="770" y="190" width="120" height="80" rx="14" class="host"/><text x="830" y="238" text-anchor="middle" class="label">接收端</text>
  <path d="M220 230 H760" class="wire"/>
  <rect x="230" y="205" width="95" height="50" rx="8" class="packet"/><text x="277" y="237" text-anchor="middle" class="small">分组</text>
  <path d="M150 315 H325" class="arrow"/><text x="238" y="346" text-anchor="middle" class="label">发送时延</text><text x="238" y="374" text-anchor="middle" class="small">分组长度 / 发送速率</text>
  <path d="M325 405 H760" class="arrow"/><text x="542" y="436" text-anchor="middle" class="label">传播时延</text><text x="542" y="464" text-anchor="middle" class="small">链路长度 / 信号传播速率</text>
  <path d="M370 170 C410 135 450 135 490 170 S570 205 610 170" class="wave"/>
  <text x="490" y="128" text-anchor="middle" class="small">第一个比特已在链路上传播，后续比特仍可能正在发送</text>
</svg>
