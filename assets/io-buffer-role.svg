<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">I/O Buffer Role</title>
  <desc id="desc">Buffer decouples user process and slow I/O device.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{--bg:#fff;--fg:#111827;--muted:#475569;--line:#cbd5e1;--panel:#f8fafc;--blue:#2563eb;--green:#059669;--orange:#d97706}
    @media(prefers-color-scheme:dark){:root{--bg:#0b1020;--fg:#e5e7eb;--muted:#cbd5e1;--line:#475569;--panel:#111827;--blue:#60a5fa;--green:#34d399;--orange:#fbbf24}}
    .bg{fill:var(--bg)}.box{fill:var(--panel);stroke:var(--line);stroke-width:2}.buf{fill:color-mix(in srgb,var(--green) 18%,var(--bg));stroke:var(--green);stroke-width:2}.t{fill:var(--fg);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.m{fill:var(--muted);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.a{stroke:var(--blue);stroke-width:4;fill:none;marker-end:url(#ba)}
  </style>
  <defs><marker id="ba" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--blue)"/></marker></defs>
  <rect class="bg" width="1000" height="360"/>
  <text class="t" x="500" y="42" text-anchor="middle" font-size="24" font-weight="700">缓冲区协调速度差异</text>
  <rect class="box" x="70" y="125" width="210" height="100" rx="8"/>
  <text class="t" x="175" y="164" text-anchor="middle" font-size="18" font-weight="700">用户进程 / CPU</text>
  <text class="m" x="175" y="194" text-anchor="middle" font-size="13">快速产生或处理数据</text>
  <rect class="buf" x="395" y="112" width="210" height="126" rx="8"/>
  <text class="t" x="500" y="154" text-anchor="middle" font-size="18" font-weight="700">主存缓冲区</text>
  <text class="m" x="500" y="184" text-anchor="middle" font-size="13">暂存一块或多块数据</text>
  <text class="m" x="500" y="208" text-anchor="middle" font-size="13">由 OS 管理</text>
  <rect class="box" x="720" y="125" width="210" height="100" rx="8"/>
  <text class="t" x="825" y="164" text-anchor="middle" font-size="18" font-weight="700">I/O 设备</text>
  <text class="m" x="825" y="194" text-anchor="middle" font-size="13">速度慢，单位可能不同</text>
  <path class="a" d="M280 175 H395"/>
  <path class="a" d="M605 175 H720"/>
  <text class="m" x="338" y="154" text-anchor="middle" font-size="13">快速写入</text>
  <text class="m" x="662" y="154" text-anchor="middle" font-size="13">慢速取走</text>
</svg>
