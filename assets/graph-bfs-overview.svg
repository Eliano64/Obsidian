<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">BFS overview</title>
  <desc id="desc">Breadth-first search visits vertices level by level with a queue and records discovery edges as a BFS tree.</desc>
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --panel: #f6f8fb;
      --text: #172033;
      --muted: #596578;
      --edge: #8a94a6;
      --node: #ffffff;
      --node-stroke: #2f6fed;
      --active: #f59e0b;
      --tree: #16a34a;
      --queue: #e0f2fe;
      --queue-stroke: #0284c7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f14;
        --panel: #121923;
        --text: #e7edf6;
        --muted: #a5b1c2;
        --edge: #687386;
        --node: #151e2b;
        --node-stroke: #7aa2ff;
        --active: #fbbf24;
        --tree: #4ade80;
        --queue: #082f49;
        --queue-stroke: #38bdf8;
      }
    }
    .bg { fill: var(--bg); }
    .panel { fill: var(--panel); stroke: color-mix(in srgb, var(--muted), transparent 55%); rx: 12; }
    .title { fill: var(--text); font: 700 28px "Segoe UI", Arial, sans-serif; }
    .label { fill: var(--text); font: 600 18px "Segoe UI", Arial, sans-serif; }
    .small { fill: var(--muted); font: 14px "Segoe UI", Arial, sans-serif; }
    .edge { stroke: var(--edge); stroke-width: 3; fill: none; }
    .tree { stroke: var(--tree); stroke-width: 5; fill: none; }
    .node { fill: var(--node); stroke: var(--node-stroke); stroke-width: 3; }
    .node-active { fill: var(--active); stroke: var(--active); }
    .node-text { fill: var(--text); font: 700 18px "Segoe UI", Arial, sans-serif; text-anchor: middle; dominant-baseline: central; }
    .qbox { fill: var(--queue); stroke: var(--queue-stroke); stroke-width: 2; rx: 8; }
    .qtext { fill: var(--text); font: 700 16px "Consolas", monospace; text-anchor: middle; dominant-baseline: central; }
    /* contrast-audit-fix */
  @media(prefers-color-scheme:dark){.node-active{fill:#92400e;stroke:#fbbf24}}
  </style>

  <rect class="bg" width="980" height="520"/>
  <text x="38" y="48" class="title">BFS: 用队列按层扩展</text>
  <text x="40" y="78" class="small">每个顶点第一次被发现时立即标记；发现它的那条边进入广度优先生成树。</text>

  <rect x="34" y="108" width="590" height="360" class="panel"/>
  <rect x="650" y="108" width="292" height="360" class="panel"/>

  <!-- graph edges -->
  <path class="edge" d="M180 205 L300 165"/>
  <path class="edge" d="M180 205 L300 250"/>
  <path class="edge" d="M300 165 L430 160"/>
  <path class="edge" d="M300 165 L430 248"/>
  <path class="edge" d="M300 250 L430 248"/>
  <path class="edge" d="M430 160 L545 205"/>
  <path class="edge" d="M430 248 L545 205"/>
  <path class="edge" d="M300 250 L300 340"/>

  <!-- discovered tree edges -->
  <path class="tree" d="M180 205 L300 165"/>
  <path class="tree" d="M180 205 L300 250"/>
  <path class="tree" d="M300 165 L430 160"/>
  <path class="tree" d="M300 165 L430 248"/>
  <path class="tree" d="M430 160 L545 205"/>

  <!-- graph nodes -->
  <circle class="node node-active" cx="180" cy="205" r="24"/><text class="node-text" x="180" y="205">2</text>
  <circle class="node" cx="300" cy="165" r="24"/><text class="node-text" x="300" y="165">1</text>
  <circle class="node" cx="300" cy="250" r="24"/><text class="node-text" x="300" y="250">6</text>
  <circle class="node" cx="430" cy="160" r="24"/><text class="node-text" x="430" y="160">5</text>
  <circle class="node" cx="430" cy="248" r="24"/><text class="node-text" x="430" y="248">3</text>
  <circle class="node" cx="545" cy="205" r="24"/><text class="node-text" x="545" y="205">7</text>
  <circle class="node" cx="300" cy="340" r="24"/><text class="node-text" x="300" y="340">4</text>

  <text x="64" y="430" class="small">绿色边：第一次发现新顶点时记录的边；灰色边：图中存在但不一定进入 BFS 树的边。</text>

  <text x="682" y="152" class="label">队列状态</text>
  <rect x="682" y="180" width="64" height="46" class="qbox"/><text x="714" y="203" class="qtext">1</text>
  <rect x="756" y="180" width="64" height="46" class="qbox"/><text x="788" y="203" class="qtext">6</text>
  <rect x="830" y="180" width="64" height="46" class="qbox"/><text x="862" y="203" class="qtext">5</text>
  <text x="682" y="252" class="small">队头出队并访问；未访问邻接点入队。</text>

  <text x="682" y="310" class="label">考点抓手</text>
  <text x="682" y="344" class="small">1. 队列保证“先发现，先扩展”。</text>
  <text x="682" y="372" class="small">2. 邻接表顺序会影响遍历序列。</text>
  <text x="682" y="400" class="small">3. 非连通图要从未访问顶点继续调用。</text>
  <text x="682" y="428" class="small">4. 无向图调用次数等于连通分量数。</text>
</svg>
