<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-label="以太网MAC帧格式图">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root { color-scheme: light dark; }
    text { font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; fill:#172033; }
    .field { fill:#fff; stroke:#7d8aa0; stroke-width:2; }
    .data { fill:#eef6ff; stroke:#2f73c8; stroke-width:2.5; }
    .fcs { fill:#fff7e8; stroke:#bf7a18; stroke-width:2.5; }
    .title { font-size:28px; font-weight:700; }
    .label { font-size:16px; font-weight:700; }
    .small { font-size:14px; }
    .muted { fill:#5d6b7e; }
    @media (prefers-color-scheme: dark) {
      text { fill:#e7edf7; }
      .muted { fill:#b6c2d2; }
      .field { fill:#111827; stroke:#718096; }
      .data { fill:#10243d; stroke:#63a3ff; }
      .fcs { fill:#2b2111; stroke:#e4a548; }
    }
  </style>
  <text x="480" y="44" text-anchor="middle" class="title">Ethernet V2 MAC 帧格式</text>
  <g transform="translate(55 120)">
    <rect x="0" y="0" width="145" height="84" class="field"/>
    <text x="72.5" y="35" text-anchor="middle" class="label">目的地址</text>
    <text x="72.5" y="61" text-anchor="middle" class="small">6 B</text>

    <rect x="145" y="0" width="145" height="84" class="field"/>
    <text x="217.5" y="35" text-anchor="middle" class="label">源地址</text>
    <text x="217.5" y="61" text-anchor="middle" class="small">6 B</text>

    <rect x="290" y="0" width="90" height="84" class="field"/>
    <text x="335" y="35" text-anchor="middle" class="label">类型</text>
    <text x="335" y="61" text-anchor="middle" class="small">2 B</text>

    <rect x="380" y="0" width="340" height="84" class="data"/>
    <text x="550" y="35" text-anchor="middle" class="label">数据</text>
    <text x="550" y="61" text-anchor="middle" class="small">46-1500 B</text>

    <rect x="720" y="0" width="130" height="84" class="fcs"/>
    <text x="785" y="35" text-anchor="middle" class="label">FCS</text>
    <text x="785" y="61" text-anchor="middle" class="small">4 B</text>
  </g>
  <path d="M55 250 H905" stroke="#8a98aa" stroke-width="2"/>
  <text x="480" y="288" text-anchor="middle" class="small muted">以太网 MAC 帧长度：64-1518 B，不包括物理层前导码和帧间间隔。</text>
  <text x="480" y="326" text-anchor="middle" class="small muted">数据字段不足 46 B 时需要填充，使整帧至少达到 64 B。</text>
  <text x="480" y="364" text-anchor="middle" class="small muted">FCS 使用 CRC 检测差错；检测出错的帧直接丢弃。</text>
</svg>
