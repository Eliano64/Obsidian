<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540">
  <style>/* paired-theme-canvas */
svg{background:#f8fafc}
@media(prefers-color-scheme:dark){svg{background:#0b1020}}

    :root{color-scheme:light dark}
    .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.idx{fill:#e0f2fe;stroke:#0284c7;stroke-width:2}.leaf{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.edge{stroke:#64748b;stroke-width:2}.link{stroke:#16a34a;stroke-width:3;marker-end:url(#arrow)}.text{fill:#0f172a;font-family:Arial,"Microsoft YaHei",sans-serif}.title{font-size:25px;font-weight:700}.key{font-size:17px;font-weight:700;text-anchor:middle}.small{font-size:15px;fill:#475569}
    @media(prefers-color-scheme:dark){.bg{fill:#0b1020}.panel{fill:#111827;stroke:#334155}.idx{fill:#172554;stroke:#38bdf8}.leaf{fill:#12351f;stroke:#4ade80}.edge{stroke:#94a3b8}.text{fill:#e5e7eb}.small{fill:#cbd5e1}}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#16a34a"/></marker></defs>
  <rect class="bg" width="1120" height="540"/>
  <rect class="panel" x="28" y="28" width="1064" height="484" rx="8"/>
  <text class="text title" x="60" y="76">B+ 树：分支结点只做索引，全部记录都在叶结点</text>

  <line class="edge" x1="560" y1="125" x2="235" y2="225"/>
  <line class="edge" x1="560" y1="125" x2="560" y2="225"/>
  <line class="edge" x1="560" y1="125" x2="860" y2="225"/>
  <rect class="idx" x="490" y="100" width="140" height="50" rx="8"/>
  <text class="text key" x="560" y="132">15 35 56</text>

  <rect class="idx" x="145" y="205" width="180" height="50" rx="8"/>
  <text class="text key" x="235" y="237">3 9 15</text>
  <rect class="idx" x="500" y="205" width="120" height="50" rx="8"/>
  <text class="text key" x="560" y="237">30 35</text>
  <rect class="idx" x="800" y="205" width="120" height="50" rx="8"/>
  <text class="text key" x="860" y="237">42 56</text>

  <line class="edge" x1="235" y1="255" x2="105" y2="345"/>
  <line class="edge" x1="235" y1="255" x2="235" y2="345"/>
  <line class="edge" x1="235" y1="255" x2="365" y2="345"/>
  <line class="edge" x1="560" y1="255" x2="505" y2="345"/>
  <line class="edge" x1="560" y1="255" x2="615" y2="345"/>
  <line class="edge" x1="860" y1="255" x2="800" y2="345"/>
  <line class="edge" x1="860" y1="255" x2="920" y2="345"/>

  <rect class="leaf" x="35" y="335" width="140" height="52" rx="8"/>
  <text class="text key" x="105" y="367">1 3</text>
  <rect class="leaf" x="180" y="335" width="110" height="52" rx="8"/>
  <text class="text key" x="235" y="367">6 8 9</text>
  <rect class="leaf" x="310" y="335" width="110" height="52" rx="8"/>
  <text class="text key" x="365" y="367">13 15</text>
  <rect class="leaf" x="445" y="335" width="120" height="52" rx="8"/>
  <text class="text key" x="505" y="367">22 30</text>
  <rect class="leaf" x="575" y="335" width="80" height="52" rx="8"/>
  <text class="text key" x="615" y="367">35</text>
  <rect class="leaf" x="745" y="335" width="110" height="52" rx="8"/>
  <text class="text key" x="800" y="367">40 42</text>
  <rect class="leaf" x="865" y="335" width="110" height="52" rx="8"/>
  <text class="text key" x="920" y="367">47 56</text>

  <line class="link" x1="175" y1="361" x2="180" y2="361"/>
  <line class="link" x1="290" y1="361" x2="310" y2="361"/>
  <line class="link" x1="420" y1="361" x2="445" y2="361"/>
  <line class="link" x1="565" y1="361" x2="575" y2="361"/>
  <line class="link" x1="655" y1="361" x2="745" y2="361"/>
  <line class="link" x1="855" y1="361" x2="865" y2="361"/>

  <text class="text small" x="60" y="438">每个分支结点中，关键字个数等于子树个数；分支关键字可理解为对应子树中的最大关键字。</text>
  <text class="text small" x="60" y="466">叶结点包含全部关键字及记录指针，并按关键字顺序链接，便于范围查找和顺序访问。</text>
</svg>
