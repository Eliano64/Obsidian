<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TCP Four Way Close</title>
<style>
:root{color-scheme:light dark;--bg:#f8fafc;--panel:#fff;--text:#172033;--muted:#526174;--line:#64748b;--blue:#2563eb;--green:#16a34a;--border:#cbd5e1}
@media(prefers-color-scheme:dark){:root{--bg:#020617;--panel:#111827;--text:#e5e7eb;--muted:#a8b3c5;--line:#94a3b8;--blue:#60a5fa;--green:#4ade80;--border:#334155}}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif}.wrap{max-width:980px;margin:auto;padding:22px}.title{text-align:center;font-size:24px;font-weight:800;margin-bottom:14px}.layout{display:grid;grid-template-columns:250px 1fr;gap:18px}.step{border:1px solid var(--border);border-radius:8px;background:var(--panel);padding:10px;margin-bottom:10px;cursor:pointer}.step b{display:block;margin-bottom:5px}.step span{font-size:14px;color:var(--muted);line-height:1.45}.step.active{outline:2px solid var(--blue)}.stage{border:1px solid var(--border);border-radius:10px;background:var(--panel);padding:12px}.note{color:var(--muted);line-height:1.6;margin-top:6px}.controls{text-align:center;margin-top:14px}button{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:8px;padding:7px 14px;margin:0 5px}
</style>
</head>
<body><div class="wrap"><div class="title">TCP 四报文挥手</div><div class="layout"><div id="steps"></div><div class="stage">
<svg viewBox="0 0 680 380" role="img" aria-label="TCP 四报文挥手过程">
<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="var(--blue)"/></marker></defs>
<text x="150" y="35" text-anchor="middle" fill="var(--text)" font-size="17" font-weight="700">主动关闭方</text><text x="530" y="35" text-anchor="middle" fill="var(--text)" font-size="17" font-weight="700">被动关闭方</text>
<line x1="150" y1="55" x2="150" y2="325" stroke="var(--line)" stroke-width="3"/><line x1="530" y1="55" x2="530" y2="325" stroke="var(--line)" stroke-width="3"/>
<path id="m1" d="M150 80 L530 115" fill="none" stroke="var(--blue)" stroke-width="4" marker-end="url(#arr)"/><text id="l1" x="340" y="85" text-anchor="middle" fill="var(--text)" font-size="14">FIN=1, ACK=1, seq=u, ack=v</text>
<path id="m2" d="M530 145 L150 180" fill="none" stroke="var(--blue)" stroke-width="4" marker-end="url(#arr)"/><text id="l2" x="340" y="150" text-anchor="middle" fill="var(--text)" font-size="14">ACK=1, seq=v, ack=u+1</text>
<path id="data" d="M530 205 L150 225" fill="none" stroke="var(--green)" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arr)"/><text id="ldata" x="340" y="215" text-anchor="middle" fill="var(--green)" font-size="14">半关闭：服务器仍可发送剩余数据</text>
<path id="m3" d="M530 250 L150 285" fill="none" stroke="var(--blue)" stroke-width="4" marker-end="url(#arr)"/><text id="l3" x="340" y="255" text-anchor="middle" fill="var(--text)" font-size="14">FIN=1, ACK=1, seq=w, ack=u+1</text>
<path id="m4" d="M150 315 L530 345" fill="none" stroke="var(--blue)" stroke-width="4" marker-end="url(#arr)"/><text id="l4" x="340" y="325" text-anchor="middle" fill="var(--text)" font-size="14">ACK=1, seq=u+1, ack=w+1</text>
</svg><div class="note" id="note"></div></div></div><div class="controls"><button id="prev">上一步</button><button id="next">下一步</button></div></div>
<script>
const data=[
 ["发送 FIN","主动关闭方不再发送数据。","FIN 消耗序号 u，对方应确认 ack=u+1。"],
 ["确认 FIN","被动关闭方确认第一个方向关闭。","此时只是客户端到服务器方向关闭，连接处于半关闭状态。"],
 ["半关闭","被动关闭方仍可继续发送剩余数据。","TCP 是全双工，一个方向关闭不等于另一个方向立即关闭。"],
 ["发送 FIN","被动关闭方也没有数据要发后，发送自己的 FIN。","若半关闭期间发送过数据，FIN 的序号可能是 w。"],
 ["最后 ACK","主动关闭方确认对方 FIN 并进入 TIME-WAIT。","被动关闭方收到 ACK 后进入 CLOSED，主动关闭方还要等待 2MSL。"]
];let i=0;const steps=document.getElementById("steps");data.forEach((d,k)=>{const e=document.createElement("div");e.className="step";e.innerHTML=`<b>${k+1}. ${d[0]}</b><span>${d[1]}</span>`;e.onclick=()=>{i=k;render()};steps.appendChild(e)});
function op(id,on){document.getElementById(id).style.opacity=on?1:.06}
function render(){[...steps.children].forEach((e,k)=>e.classList.toggle("active",k===i));op("m1",i>=0);op("l1",i>=0);op("m2",i>=1);op("l2",i>=1);op("data",i>=2);op("ldata",i>=2);op("m3",i>=3);op("l3",i>=3);op("m4",i>=4);op("l4",i>=4);note.textContent=data[i][2]}
prev.onclick=()=>{i=(i+data.length-1)%data.length;render()};next.onclick=()=>{i=(i+1)%data.length;render()};render();
</script></body></html>
